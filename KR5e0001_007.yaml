body:
  text: 太平經庚部虛無無為自然圖道畢成誡第一百六十八虛無者乃內實外虛也有若無也反其胞胎與道居也獨存其心縣龍慮也遂為神室聚道虛也但與氣遊故虛無也在氣與神其餘悉除也以心為主故得無邪也詳論其意毋忘真書也得之則度可久遊也何不趣精反與愚俱也凶禍一至被大災也棄其真朴反成土灰也賢者見書誡之誡之右虛無之至無為者無不為也乃與道連出嬰兒前入無間也到於太初乃反還也天地初起陰陽源也入無為之術身可完也去本來末道之患也離其太初難得完也去生已遠就死門也好為俗事傷魂神也守二忘一失其相也可不誡哉道之元也子專守一仁賢源也天道行一故完全也地道行二與鬼神鄰也審知無為與其道最神也詳思其事真人先也閉子之金闕毋令出門也寂無聲長精神也神氣已畢仙道之門也易哉大道不復煩也天道無有親歸仁賢也右無為自然之法乃與道連守之則吉失之有患比若萬物生自完一根萬枝無有神詳思其意道自陳俱祖混沌出妙門無增無減守自然凡萬物生自有神千八百息人為尊故可不死而長仙所以蚤終失自然禽獸尚度況人焉愚者賤道志下與地連仁賢貴道忽上天門神道不死鬼道終焉子欲為之如環無端慎毋有奇自益身患亦毋妄去令人死焉天地之性獨貴自然各順其事毋敢逆焉道興無為虛無自然高士樂之下士恚焉詳學於師亦毋妄言有師道明無師難傳學不師訣君子不言妄作則亂文身自凶焉道已畢備便成自然右道畢成誡興上除害復文第一百六十九右興上除害復文訣令尊者無憂復文第一百七十右令尊者無憂邪自除德行吉昌復文第一百七十一右德行者吉昌每留每荷法神祐復文第一百七十二右藏之幽處神祐之要訣十九條第一百七十三其為道者取訣於入室外內批之滿日數開戶入視之於其內自批者勿入視也其內不自批者即樂人入視之也開戶入視欲出者便出之其三道行書者悉取訣於集議以為天信即其之人上建也其正神靈者取訣於洞明萬萬人也以為天信矣其凡文欲正之者取訣於拘校以為天信其欲樂知吾道書信者取訣於瞀疾行之且與天響相應善者日興惡者日消以為天信其欲署置得善人者取訣於九人其問入室成與未者取訣於洞明白也形無彰蔽以為天信其欲知身成道而不死者取訣於身已成神也即度世矣以為天信其欲洽洞知吾書文意者從上到下盡讀之且自昭然心大解無復疑也一得其意不能復去也其欲效吾書視其真與偽者以治日向太平以為天信其欲知壽可得與不者取訣於太平之後也如未太平先人流災為害難以效命以為天信矣太陽欲知太平者取訣於由斷金也水與火欲厭絶姦臣訞不得作者取訣於由斷金衰巿酒也欲得天道大興法者取訣於拘校衆文與凡人訣辭也欲得良藥者取訣於拘校凡方文而效之也欲得疾太平者取訣於悉出真文而絶去邪偽文也欲樂思人不復殺傷女者取訣於各居其處隨其力衣食勿使還愁苦父母而反逆也欲除疾病而大開道者取訣於丹書吞字也欲知集行書訣也如其文而重丁寧善約束之行之一日消百害猾人心一旦轉而都正也以為天信瑞議訓訣第一百七十四請問瑞者何等之名字也子何故因為愚邪不敢故愚也實不及願天師不棄示以一言行安坐瑞者清也靜也端也正也專也一也心與天地同不犯時令也願聞以何知其清靜端正專一邪善哉子之問也夫天地之性自古到今善者致善惡者致惡正者致正邪者致邪此自然之術無可怪也故人心端正清靜至誠感天無有惡意瑞應善物為其出子欲重知其大信古者大聖賢皆用心清靜專一故能致瑞應也諸邪用心佞偽皆無善應此天地之大明徵也子知之邪唯唯亦有應邪然邪者致邪亦是其應也不調者致不調和者致和此天之應明效也善哉善哉愚生解矣忠孝上異聞訣第一百七十五請問人之為善也上孝子上忠臣上順弟子當思上何等於其君父師哉當上其異聞珍寶希見之文而得上者是也忠臣孝子順弟子常可樂為也何不上同聞而上異聞邪同聞上自有之何須復上邪愚生不曉其意行且使子知其審實天下所來所珍悉未嘗見而善珍者也以上其君是上忠臣也未嘗見善食以上其親是上孝子也未嘗見之説以上其師是上善順弟子也子知之邪唯唯願聞上同事上之所有而重上之何也然皆應故其上罪不除何其重也子應不曉之生人之所常有重皆厭之何須復上之邪上人所厭名為故其上也下而故其上於子意寧當坐不邪愚生已覺矣故得瑞應善物希見之珍當上於君父師也上之所自有慎無上也是故自古及今大聖之定凡事也去同取異乃得天地之心意此之謂也子曉邪善哉善哉災病證書欲藏訣第一百七十六請問天師書以何知其欲見行以何知其欲見逃也子欲明之邪以災病為證也出而病人即天欲藏也逃而病人即天欲出行也以何重明之以天行四時氣生養萬物隨天意也凡物樂出而反逃藏之大凶矣凡物欲逃藏而反出之亦大凶也悉為逆天命後皆有大災矣子欲樂知吾天天樂行不以是為占也真人知之邪唯唯是故自古到今舉事不詳悉失天道意故生承負也是故使民至於無道而治共亂天正道人異政治故人民萬物多被冤也願請問夫無道乃重死罪之法也天師何不為制作重刑死法而各以其罪罪之今天下之事各以其罪罪之為平也今天師不以其無道罪之何也不可也何故夫先人但為小小誤失道行有之耳不足以罪也後生人者承負之畜積為過也雖其觸死其行邪偽空虛者後生人皆學於先生人雖失天道為無道而治者皆師師相傳更以相教示非一人造此過也故不可豫其重刑也念下古人罪過皆足以死又神聖為法不可一旦豫人重刑滅人世類也故天遣吾下者革其行除其責而不章更天地人且共治之使神病災之也後世人見是吾受天教之明效也子知之邪唯唯行語竟天辭絶傳之德君唯唯行去勿復問唯唯右凡訣瑞應説在下竟兩手策字要記第一百七十七天有兩手乃常共成凡事其一手有病邪惡則無有成事天大怨之地以為忌天下亂而無成功一由此一手邪惡而不并力凡事盡不理六方不太平亦由此兩手有病邪惡而不并力所致吉凶安危一由此兩手真人亦豈深知之邪不及唯天師開示其要意使得知之則知之不者終古冥冥昏亂無從得知之也夫師者乃天地凡事教化之本也雖難安得不言哉善哉真人之求問事之辭也天使子主問乎其言要而諾安坐為諸真人具説其意天下象而行之無復凶亂事天上諸神名為兩手策字為要記國家行之則長存凡人行之則久富要道將出近在凡人之身今為諸真人分別言之唯唯天地者主造出生凡事之兩手也四時者主傳養凡物之兩手也五行者主傳成凡物相付與之兩手也男女夫婦者主傳統天地陰陽之兩手也師弟子者主傳相教通達凡事文書道德之兩手也君與臣者主傳治理凡事人民諸物之兩手也此有六事才舉其綱見其始耳不可勝書也凡事相須而成事者皆兩手也天上名為重規沓矩皆當相應者也一手邪惡不等無成事天上名為大亂之治六方八遠名為鰥寡斷嗣日以嚮衰無成事即由此兩手不并力也善哉善哉請問天上何故正名此為兩手哉善乎子之問也得其意兩手者言其齊同并力無前無卻乃後事可成也兩手不并力者事不可成也故凡事者象此兩手皆當各得其人并力同心象此兩手乃吉安太平之氣立至也不象此兩手者億億萬年不能出上皇太平氣也太平氣常欲出若天常欲由此兩手久不調御之故使閉不得通出治悒悒可訾咎在此兩手不調若兩手平調者此上皇太平氣出前後至不相須善哉善哉是故天地不并力萬物凡事無從得出四時不并力凡物無從得長五行不并力凡物無從得成君臣不并力凡事無從得理夫婦不并力子孫無從得長家道無從得立師弟子不并力凡結事無緣得解道德無從得興矇霧無從得通六方八遠大化無從得行是故皆當并力比若兩手乃可通也不若兩手故日致凶也雖治療之無益也猶無從得成功也但空久愁苦而日日凶凶故凡象此兩手者選舉當得其人不得其人者天上諸神名為半死不持一手獨作安有能成功成事哉真人為天來遠問凡疑事宜深思此意以赤心心生於火還以付火為治象民則延年益壽萬不失一吾不欺子也以示德君以示凡人賢者各思其意無敢犯者也用之名為自厚自養不用之名為自愁自苦神哉吾之為道純天意也但可前不可卻但可順不可逆順之純得天心也逆之事亂亂禍恟恟人意西天意東名為與天意不同善哉善哉行子可謂已覺知之矣四吉四凶訣第一百七十八真人前今凡人舉士以貢帝王付國家得其人幾吉不得其人幾凶得其人何所能成不得其人何所能傾諸真人自精且對然得其人有四吉不得其人有四凶得其人天地六方八遠安不得其人天地六方八遠不安願聞其要意然貢士得其人上得以理有成功而常安日有益於上一大吉也所舉人可任得成器二吉也得成器能彰明其師道恩及其師三吉也所舉者信事有效復令上信任用之四吉也共并力同心所為者日有成功月益彰明歲益興盛天地悅喜善應悉出惡物藏去天地悅則群神喜守而不失上可以度世中可以平理下可以全完竟其天年舉士得其人善如斯矣天上明此續命之符請問何故正名為續命之符然所以續命符者舉士得人乃危更安亂更理敗更成凶更吉死更生上至於度世中得理於平下得竟其天年全其身形夫舉士不得人上無益帝王國家令其理亂帝王愁苦天地不悅盜賊災變萬種是一大凶也所舉人不能理職佞偽日欺久久坐俟不安不得保其天年或天地鬼神害之或為人所賊殺辱及其父母惡流及妻子後生已下世類遂見知過失為惡人是二大凶也其人惡則其學棄汙辱先師聖賢業禍及其師是三大凶也又舉之者不信共欺其上貢非其人亂天儀汙列宿天疾之地怨之國君惡之聖賢非之是為世大佞妄語之子當坐是事不得天地鬼神誅則人當害之辱其先人禍及妻子後生是四大凶也犯四大凶貢非其人也乃使帝王愁苦治雲亂凡害氣動起不可禁止前後不理更相承負天地大怒群神戰鬭六方不喜八遠乖錯終古不理天上名是為曰減年短命之符何故名是為短命之符哉然治當長反為其短年當多反為其少舉事逢凶無益於身天地不悅除算減年故天上名為短命之符也善哉善哉愚生聞命矣然子可謂知之矣慎此天上文以示德君以示凡賢下及民間為人上求士不可不詳為人下貢士不可不忠後世傳詳誦此書文結於胸心中急舉士不若此天地不復喜也知而故違其過重哉真人慎之唯唯誠受教敕不敢犯禁忌餘力行子可謂慎事得天命矣右天地手策貢士四吉四凶短命符續命符安國得天地心群神喜讖大功益年書出歲月戒第一百七十九惟上古之道修身正己不敢犯神靈之所記乃敢求生索活於天君不敢自恣恐不全日念生意與神為臣表其類也欲得盡忠直之言與諸所部主者之神各各分明是非乃敢信理曲直耳何日有忘須臾之間上有占人具知是非何所隱匿何所有不信者也故得自理求念本根未曾有小不善之界也但自惜得為人依仰元氣使得蠕動之物所不覩見災異之屬但人負信於誓言兩不相信故有所不安天地中和上下各自有信人不得知其要而言何獨有善有惡耶災異悉所從生人食五常之氣無所不稟無所不依無所不行獨何不奉知古有知人相及逮乎此為失善從惡令命不全何獨而是耶故天君言有善有惡善可令同所以然者當令有分別不可自從善當上行惡當見刑何得與善相及耶以人意言之亦為可知自有當直之者故設惡以分明天地四時五行之意使知成生為重增其命年人得生成之道承用其禁不敢觸忌以是言之天知愚人甚薄而無報復之意逆天所施為證天所施為加人所施行邪中類反當活惡疾善也故聖人知陰陽之會賢人理其曲直解其未知使各自知分畫不相怨善自命長惡自命短何可所疑所怨乎人人為不如六畜飛鳥走獸水中物耶以為人無狀邪天使然也天同欲使為善耳不欲令為惡也如善惡同其苦樂耳富貴壽老天在上為不能分別好醜使無知人得氣揚聲言我與汝曹等耳行善何至用是故進益善令久生其人薄者念之等耳比惡亡命乃欲正悔過見善與從事見惡退止日夜剋躬思省所負既復小生得與人等雖不仙度可竟所受不中亡年是為可矣俗人之所長須臾耳不念久生可上及知士有心念索生故不作惡耳天見其善使可安為更求富有子孫雖不盡得尚有所望何為作惡久滅亡自以當可竟年不知天遣神往記之過無大小天皆知之簿疏善惡之籍歲日月拘校前後除算減年其惡不止便見鬼門地神召問其所為辭語同不同復苦思治之治後乃服上名命曹上對算盡當入土愆流後生是非惡所致邪人何為不欲生乎人無所照見乃如是何所怨咎乎同十月之子獨何為不善施惡不息安得久乎愚士之計一何不與小善合乎行復道小不急之事凡人所為各不同計自以為可所觸所犯皆欲得人利人亦不欲利之善利得生須臾惡利不久以善不久居地上也故使有天地知不乎天使人為善故生之而反為惡故使主惡之鬼久隨之不解有解不止餘鬼上之輒生其事故使隨人不置也知不乎此書先進善退惡古今文也自不從其長命就惡無可奈何鬼使得不白也故有過者沒形於土耳精神不安未知所止是誰過乎人行且自詳思念取便安勿非所言辭語前後復重其所道非一事故重耳人命近在汝身何為叩心仰呼天乎有身不自清當清誰乎有身不自愛當愛誰乎有身不自成當成誰乎有身不自念當念誰乎有身不自責當責誰乎復思此言無怨鬼神見善白善見惡白惡皆不同也復知之乎辭小止有惡不息文書不絶人沒乃止此戒可知為惡自負其身耳不負他人也復知之乎行順所言可思無離於心離之為敗不可復理與鬼同伍何得活乎念生得生是為知惡會當盡不得久在知之不乎行復小説人居天地之間皆得為人奈何忘天地恩乎此為何等哉其愚乃如是不能改何所復望乎欲望天報當自責懇惻垂淚而行言我蒙恩得為人與萬物絶殊天使有異能言能語見好醜知善惡可不之事當自詳慎所言反天辭令不奉順是為大逆不道之人天安從得久與從事乎故置凶神古觀之還辭如所言其人自不好善天君言前已有文書不絶部主者下收其魂骨肉付地主不須時惡人不可數聞故自損威怒還就儒雅改易其惡采取衆善著之於內以心置心神言我受天心教勑使主隨人心其不得有小脫善惡輒有傍神復得心神言益復悲楚未知吉凶故自恐在惡伍之部日夜自惟不知當所自置故不敢有不善之意唯諸神相假借使得自責不用神誡被誅不恨天君遣大神下言此人有自責悔過不犯所禁假之假之後有不善取之未晚見神言日夜長息恐身過未悉除久不與太陽氣通而在死伍之部益復篤不知而何也受勑未能通達靜於間處自省責過所負以謝天地四時五行諸所部神天君聆聽令自思惟上古之人皆有知慮不敢犯禁自修自正恐見有失動輒為不承命失其年用是之故不敢小解過輒有罰首以是自省自愛敬重禁忌不敢有違失意復見責問心常恐悸悵然失氣負天心言有小不稱是為文煩輒考問實核所言所信可可以得名譽及其身無信久亡人年故復思念不失我心切怛恐怖不敢自安舍氣而行常自戀慕貪與天地四時五行共承統而行不敢有小過差心自忿當前後深知至意不失其常念恩不違精實貪生望活何有小惡聞上乎結軀行相承事何敢有解意恐不能得上至意不知如何也心益復悸切自安無益天壽難得一失不可復還遠俗日久而反中折當顧望下是令悵然故自敕惶栗而已常恐一旦大小不稱見退愁悶在心自責自過既蒙天恩得展舒前命飢渴之情不敢忘得活而已諸大神哀省録示元元稟氣於天廚駕乘天氣而行薄所主防禁衆多不可有失亡身雖鄙賤不足榮寵亦不以不肖故能見嫌疑也真以心求進索生唯大神原省語言使見四時五行生成復見日月難報想不見中棄正營之人不敢自遠傾倒枕席大神言此人自師化乃如是何憂無蒙保者邪往昔有是人天右哀之近在左右今見在視事久遠多知慮所言所語無不得天君腹心者且為之為生伏地泣出而言被勑覺寤乃以先古有心忠誠進在所知無不包懷聞之何敢比望先之人乎大神言持是有信之人相語者欲令相生為行比望耳人有不及時生言大神乃開導大分明生等比衆多獨見異使有開思是恩極重何時教大神乎大神言思從中出發憤念之為報生言自分不知所奉上雖自天有珍奇可好者思復上之見勑發憤想念是為可誠受是言非口辭相報有文也誠日夜惟思不敢有解大神言所誡衆多所諫亦非一人所問持是久遠相語者誠重生耳言特見厚哀尤深天君聞之呼大神曰比生何從發起自致大神異語乎大神言見此學人尤信故為道難易天君言見善進之使及是是其宜也大神言天君召問是信生生言不敢希望及天左側也願在無職之處自力盡忠而已大神言皆當有所部主乃見信理如是誠僥幸甚得大分不敢有小不稱者也大神言是生見化乃如是宜且復進可及先古生言不敢進長壽也其人所貪也大神言是天願生言是本因大神所保不敢失大神之戒也天君知此二人相諫勑尤深善之使自相教也惟上古聖人之為道也乃出自然心知天上之治所施行皆豫知者音聲徹通還知形容自視心昭然意解知當救之事吉凶之會了然可知心內欣然乃知得天之福也使見前行之事皆戒篤達自惟蒙恩見寵遇得與諸六神相持日久輒見教戒使不危窺望四表上下通洞益復哀哀心中歡然復得延期并及所不聞是皆天君大神恩力所施化大神言是諸神共知延者有命録籍有真未生豫著其人歲月日時在長壽之曹年數且升乃施名各通在北極真人主之變易骨體身輕潤澤生光時暮得藥以成精華所在化為無不成出窈入冥絲髮之間何所不通聖人言實有是從俗成食從地陰神出安得不重乎易之為輕乃上是易大神恩不能報功大施想大恩忍不及使得蘇息之間深厚非辭所報大神言是天稟人命祿相當直非大神意所施為見善薦之是神福也何所報謝乎恐其後有疑為施禁固者使聖知教戒後人照知之耳聖人自有知無所勑也聖人言已得被報雖生録籍會當有教導不及大神言是生之語儻然謙者是其宜也生重見辭前後悉備唯大神以成就恩意生見人分人也而不敢自解而有驕慢也請復於間靜之處伸力大神所教施願念不逮之生大神言盡辭前後可知餘無所戒也辭別各宜照所言生言受戒之日不敢解止須臾也但恐未能卒竟之耳唯蒙扶將使得視息復生望傾側在心唯大神時時相存教勑是恩不小大神言是生之所言宜稱之生言唯唯不敢以身自防大神言成名之人精進有益兼并部主非一天君聞之大神戒聖人相對辭語為有知之人宜勿忽解命可至無訾之壽各還就所部見善當進之大神聖人言俱受天君教盡力有效有效不敢倦時也天君言成人者為自成唯唯惟上古得道之人亦自法度未生有録籍録籍在長壽之文須年月日當升之時傳在中極中極一名崑崙輒部主者往録其人姓名不得有脫數使往動搖支節屈申轉傾反覆教戒勑隨神屈折以藥飲之骨節開鍊雖不時相見者知其可堅與不也示之志不傾也貪生惡死思行天上之神數使往實核有歲數乃令拜受不足之文心言出辭使知所行防禁傳示學者不用神文言自已齎書且竟神乃知相對語言亦連歲月積千三百二十日乃將與俱見大神通元氣行自然天君簿見密勑所案行不得有私相信感心易意行無失誤大神言已算計諸神所假稟常以八月晦日録諸山海陵池通水河梁淮濟江湖所受出入之簿各分明天君有所勞賜有簿署天君前自復數通藏金室署有心之人令主天君所問輒當承所教宜日夜不解屬主室之人勿失所索部別令可知應得有心之人須以定録簿當有使神主為計名諸當上下先時百日皆文上勿有失脫如有文書不相應計曹不舉者并坐先勑令勿犯神書言此書出後三歲八月乃示俗人如有道信人者大可示之天君有教言此人先時有承負勑神為解除收藏未藏者為藏之大神言此人貧厄空虛日久恐不自全得天君腹心乃令神收藏不藏者其主未藏者時恐不如所言也前乞勑拜謝受恩雖日月未至諸先時一月令知之天君言下所部神將士衆田地中勿失時以藏為作姓名令地主敬慎使有神靈往來有欲從願所求聽之有信之後宜慎之大神言如是必海內聞知好道之人將相扶承事之敬之天君言有功之人亦自當見敬大神言此人年未滿期未至請至期教其所報謝當時未升其舍空虛無以自衣有道者給食至時止天君言是小事耳以天官給家有家有心者大神言請如所道勑天官給所當得此人空虛日久與食令足大神言令勑天官神給姓名勿令空乏天君言善惟上古之人皆得天報應有信可成乃令受命為神所護視恐有毀缺日夜占之見為善助其歡悅不欲聞其惡常置長壽之曹心使為善無有惡時使有進善有孝忠順之意所承所行不敢以意承教而行人謂無知我亦見知之人有善大恩有哀以思力自善如人久見狐疑尤惡先沒用是自損度自約恐犯惡人日夜惶懼不知如何也天生人知善惡行善有信天不欲令人有惡聞也用是欲貪生惡死亦不敢犯禁如所妨害於身也故因緣天氣得與通人之辭語言自往來知人情意見其不善而退自責恐有文書汙名存其中也如人當時意加施於人誠不敢對首理委曲得自責所施行不得人意過多難除故人來悔易勢當時鋒通以為命可再得也不意天遣大神占之尤惡先入土用是自慰隱忍不敢當惡格辭有小異意既得天恩假其須臾使得蘇息長有活之望是天之部分也以故得有分意命不久存用是之故復益悵然有慚㤥之心欲見天神求哀教戒照未知之事防備未來當與天心合可得小如意貪上有計慮之人并思善惡得不見之勑乃見大神苦甘自道生求俗之人貪及上以故自修自正唯大神勑厲其不足使覺寤望戒左側唯大神哀省索生之人大神言何惜禁戒乎想自深知之辭令各自吐寫情實但恐不如所言且復諦之計從心出宜復熟念生言皆感恐既身及之何敢不從心出乎大神言如是為發且復還靜處惟思之有不足乃求生言稟知希踈少未得大通著之戒也匍匐須教乃敢進見大神言如欲盡精誠有功可得及之努力自念從生以來功效所進解先人承負承負除解過盡亦當上何所疑也且復慎所言宜勿外意也生言受勑見戒不敢餘力而不進善也已善復惡自與命戲耳大神言善人也宜復屈意雖心勞命之日當時微苦用心不解復後得福生受勑誠歸間靜處思失自責大神言思從中出天神知之勿倦也生以年窮盡乃止大神言有行乃如是何憂不前乎天君聞之重勑大神使欲進者觀其所為積歲月日各令有部有功當上名須缺補上古之人心言口語皆知人情無文而治表裏外內具見其信各不相負天有要令犯者尤醜輒見治問責其過咎用是之故益復悸動惻然念天恩所施行使得全完為人知好惡之義人以此等念恩深厚不知以何報之但心思欲進而有忠誠之信所為所作承奉不敢失小差恐為衆神所白見過於上有不竟年命之壽以是益復感傷憂心不敢自解而望報施之意實貪生與諸天神共承天心有善者財小過除竟其年耳如有大功增命益年承事元氣合精華照見所知復受大恩非辭所報但獨心不知如何也唯諸大神共省哀録不及教戒使見知慮知天上所施禁忌衆多當輒相承不得有失也唯大神惟其不足見戒不敢忘大分受施不忘生恩意也大神言生自有知之人何所教勑但當順天所為勿逆其心見勑戒應時奉行勿失脫而已是為得天心意矣賞罰有輕重宜各實之勿有失誤得為可餘少所戒宜詳慎所言出辭當諦思之令可行有小妄者輒以心自況之從善是為小戒餘者當平生之言見深戒不有失神意也自惜童蒙未見大分故固大神重戒所照衆多知慮廣博無所不包唯大神重戒欲蒙其德不逆所言唯復顧意伏須重戒大神言是語可知天上之施與中知地下傍行等耳法律相應無有差也自有相教者且隨其主勿逆而已生言自分當戒也法律雖同而用心少得其意也天心難知其訣大神言是皆實無欺而已乃豫知天君意所施為者為上第一之人可在天君左側有功勞賜賞謙遜不敢盡受益復竭盡筋力用心乙密為大故天君重復自面勑教人是生之福也所主衆多平心為行是自可矣生言不敢乃望在天君左側也見活而已但思忠孝順理盡節不敢受重賜但恐無功耳如小功效之日令生身日明長見生日久矣但思無極不敢有不思過須臾也得見溫言心志飽滿大神與生同居對治無思也誠復受恩出入上下時小相戒是大神之恩不可中謝但心意戀慕常在心中不敢解止天君聞之知之士所行莫不得願也常能自責過負想不中惡勑大神教戒之使及上勿倦也上善之人皆生於自然皆有曆紀著善籍之文名之為善人之籍常有善人之行未嘗有惡稱行止出入輒聞善意未嘗有惡故名善人動輒進之於人衆奇為不見之物得上於尊尊者見之或善其言或貪其善行或貪其誠或貪其見愛或貪其孝忠或貪其久所言或亦貪其見信是善之善也故名之為善時見寵榮復貪得長遊復貪得神仙復貪得不死位復貪使衆神是善人之貪也行仰善與天地四時五行合信諸神相愛有知相教有奇文異策相與見空缺相薦相保有小有異言相諫正有珍奇相遺共進於天神欲見敬求戒思過恐有不稱天之大神也常日夜進心念篤見善從心思聞善言忠直之志完軀之人愛其命年常恐一朝有異小不善之意聞人有過助其自悔主其有知善所諫用其人言并見其榮善教戒人求生索活之道是善人之極但當有功不敢違神之願思慕長在復得行見人之願所當逮及唯天大神通達辭令檢勑所行防禁得小失相假忍使思其意天恩廣大多所愛傷使得自思悔過命長是大分之施也但恐不而卒竟恩貸唯諸大神原其不及願蒙不見之戒使得思樂其志廣見唯思重勑大神言上天地各有文理知用前不知自卻此自然耳不惜愛戒而不相教也見衆善之人無有疑何所復戒但且詳念所言相副而已是善人之願也宜復明之生言自不肖行不純質以故自親大神所禁戒者數蒙厚遇輒見思念顯見以故復詣不知厭足天使其然大神言是生受自然之姿天使來問者知其同不耳何所嫌疑乎密欲來承勑者皆言自情實少雙辭語出於華耳會以心自正者少故使有空缺轉補是生短也宜復慎之勿解也生言稟性遲鈍設意不失但以文自防也唯哀之不耳大神言是亦出於知知善行善知信行信知忠行忠知順行順知孝行孝惡無從得復前也想生自知是故重之耳生誠悵然曰是生所聞是大善是有重戒出其中大神所道乃如是何敢有懈慢之意乎是為活生之意蒙寵如是不知何所用報大神恩也大神言是曹事視之而不足為戒念可行宜復成名可及上無疑行自得之何所報謝乎辭令自善不得相聞語耳生言是戒使生長得有活之望請於無知之處思惟所言大神言當知生辭勿離於內也前後所戒來學問之人如此矣生言誰當肯相勑如此乎生祿命大神喜之時約勑前後備足但無以副恩誠慚無以自置天君聞之是善之善善中尤善可兼行諸部勿使有失大神還語生天君所勑恩榮如是宜勿犯之唯唯上德之人乃與天地之間當化成之事使各如願善者著善之文不失其常不失其宜是為上德無所不成無所不就不失其明不失其實不失陰陽所生成不失四時主生之氣所出入不失五行之成不失日月星宿不失其度數不失吉凶之期不失有災異之變不失水旱之紀人命短長不失所稟繫星宿厚薄之意是上德所當行也故言有德之人無所不照無所不見上下中和各從其宜就其德各不失其名是為順常長生之文莫不被榮萬物巖牙部甲而生垂枝布葉以當衣裳霧露霜雪時雨以當飲食生長自成覆葉實令給人地之長名為水母民名為瓜盛夏熱時以當水漿天下所仰人無大小皆食之是德人承天統成天形於地以給民食行恩布施無不被德以自飽滿是天恩非也天所施生甚大不順命反言自然是為逆耳故使德人上知天意教民作法無失天心育養長大使得為人復知文理行成德就可上及天士天上之事功勞有差德人主知地之事令民依仰重見恩施不能以時報之德人為天行氣上下中央不得其所者人反輕天所施為是正令天怒不止神靈不愛人侵奪年命反自怨非天是愚甚劇故下神書使住勑為施禁固既民不犯有豫知來事遠惡趣善不犯所禁復得見天道所師化無不從之化者故使人主為作羽翼開導頭尾成其所為城郭倬然可知知上及大化并理元氣復知人事是亦有祿有命之人皆先知之隨人化可得延之期天亦愛之善神隨護使不中惡心使見善惡者不得以為比等故天重善使得從願不侵不剋如其平殊能過善天復增其命年不危陷是非大恩也當報何疑前有大善所行合天心意近之左側惡氣不來不敢視之延命無窮是恩難報報之不以珍奇但寫心歸誠自實有信不負所言是為有報為報為知不乎知善為善見信行信是人所長也且宜照之勿自疑前有信人已壽無極化為神靈所兼備足功勞所致復知之乎故德人有知之士所得上進天甚愛之不其文章知命不怨天行各自慎勿非有邪教人為善復得天心意者命自長事皆天君出不得留止俗人難化化之以漸無有卒暴詳慎所言勿為神所記各慎所部文書簿領自有期度勿相踰越見善進之見惡當改勿有所疑貪生之人自不忘天所施為故重之者誠愛人之命耳念善得善壽不疑也天君愛信知不乎詳慎神文勿以自試天下之事孝忠誠信為大故勿得自放恣復奪人算不得久長慎之慎之勿懈也懈為自疑耳疑之自令不令知不乎知不乎右天上文解六極大集天上八月校書象天地法以除災害大聖上章訣第一百八十惟始大聖德之人乃承元氣自然精光相感動乃為大聖悉知當所施輒如天意不失其元氣之志常行上為大神輔相如國有公卿心知大神之指歷文書相通上章各有薦舉宜得其人使可保有言事輒用天君以事更明堂得書輒下無失期輒得朝上之恩貸自天君曰不訞朝廷旨請寄之人文書所上皆自平均無有怨訟者各自身受恩分賞罰有差何有分爭者乎大聖先知天君所當施行之事安得有失乎俗人不知以為如民長吏安能知詔書所當道下文乎天上之事音聲遙相聞安得有隱也此在自然之中相檢何有脫時乎天君日夜預知天上地下中和之間大小乙密事悉自知之諸神何得自在乎故記首尾善惡使神疏記天君親隨月建斗綱傳治不失常意皆修正不敢犯之故言天遣心神在人腹中與天遙相見音聲相聞安得不知人民善惡乎天君言善信舉之惡無信下之不但天上欲得善信人也中和地下亦然人不深知當來之事故使有心志之久久與大神同路是天之所近比如國有忠臣良吏不離左側但人自不信天天何時當信有二心之人乎中不為天不如民人邪蟲蟻之人亦何因緣得天心意所壽貪惜此人不時相親者過起於民收攝十三於後亦有歲數見有心之人不念俗事貪進求生故神告其心出之耳有心志之人可與從事對談誠信之無有心志念衆口當食求利衣溫飯飽禮費相隨驅使貧弱自以高明非天腹心也行不純質復欲求道索久生是正為索所不得罪大重少有貰時此為知不乎當白日升天之人求生有籍著文北極天君內簿有數通無有心志之人何因緣得著録有姓名乎強學之人學之得天腹心者可竟天年殊能思盡力有功效者轉死籍之文復得小生何時當得駕乘精氣為天行事乎是為可知得書感心泣出自責言我同十月之子施行獨不得上心意而在死伍之中是行何一不得上意是我之過也天地上中和皆當從天恩生而反多不信是罪之重也何可望乎天上諸神聞知言此人自責自悔不避晝夜積有歲數其人可原白之天君天君言人能自責悔過者令有生録籍之神移在壽曹百二十使有續世者相貧者令有子孫得富貴少命子孫單所以然者富貴之人有子孫家強自畜不畏天地輕以傷人以滅世以財自壅殺傷無數故天不與其子孫為惡不息安得與善而壽乎此為知不乎大神遣小神下令各受其命長短之事從出無所疑也思之復思書辭可知小大念後有失脫之文當疏記有德人祿命訣第一百八十一惟太上有德之人各自有理深知未然之事照達上下莫不得開心之所念常不離於內思盡所知而奉行大化布置正天下所當奉述皆不失其宜篤達四方意常通問正其綱紀星宿而置列在四維羅列各有文章所行目有其常繫命上下各有短長生命之日司候在房記著録籍不可有忘命在子午其命自長丑未之年不失土鄉壽小薄不宜有惡使付土鄉壽未盡籍記在旁雖見王相月建氣以不長所以然者在土之鄉故令坤艮之鄉其壽自減生日及時三土相望其日以生不進價作已錢從歲至歲少有利時辰戌之歲天門地戶天土地土自當所生天地土生上草木天地土生下草木天土出聖智土地土有賢雖有衡衡伍不相干人不知之反言年在辰戌月建相破以為大惡天門地戶相對陰陽相望生日直之天戊日復直歲生是為大德之人無所妨固宜勿惶懼地土出賢為之府土乃所居何有惡者人自不知以土為人皆屬土府壽命有期直聖得聖直賢得賢是天常法祿命自當或出神仙寅申之歲其人似虎日月相直殊不得相比所以然者寅為文章在木之鄉山林猛獸自不可當但宜清潔天遣令狩不宜數見多畏之者名之為虎年在寅中命亦復長三寅合生乃可久長申為其衝了不相亡多惡畏夜但能緣木上下所畏衆多其命在金行害傷人故令小壽是為可知事神忽荒精邪厭畏無常少有利時卯酉之命各直其月其月復同卯主於東繫命東星多所生活人民飲食卯故言東方正卯為東之中春生榮華夏長其實無所不施莫不被德故名東星為仁不忍中傷天惜人年復得久長西正酉復在金鄉喜行戰鬭不得久長行惡自然何從久生雖得王相月建裁自如耳其六七惡日亡其過半是為可知巳亥之期年以生各置其月復以其名為之重陰無陽命自不長三陰會時會復當故言巳亥拘主開藏亥主西北巳主東南所向所為少得其宜治生難以進壽難以長故言十文轉相通十干名功復宜天算計其短長相推為命天之行何得自從故今大德之人并領其文籍繫星宿命在天曹外內有簿上下八方皆有文理何得自從人不得其數反言何負於天行善可盡年命行惡失長就短惡惡不止禍及未生何可希望行自得之其命亦薄不盡其算閣在天上以遺善人可戒子孫慎之反正悔過可復竟年各自分明計其所為勿怨天神努力為善子孫延年不者自在可無怨天復小正復念其後復疑者當平之矣善仁人自貴年在壽曹訣第一百八十二惟太上善人之為行也乃預知天地表裏出入陰陽道其綱紀發中念之不忘其理順天而行不敢有疑用是得成奉天大施思念在身行無愆負微稟自然數見戒前後可知人自犯之亦無所怨從古以來小有信人信欲相欺不念其後故令天地瞑怒殊不止賢聖有知自悔耳天知之教之不用人言反惡意相視諫之不用但欲自可此人無知甚於畜産用是之故故自責過負安從起日夜思人不解行所負何所怨咎但自無狀不計其咎妄為不當行不承大教而反自在自令命短何所怨咎時念上古得仙度世之人何從起念之見書皆言忠孝敬事父母兄弟和睦無有表裏上下合同知天禁神主為理白其過失無有休止修身自省既得生耳受命有期安得自在念之心痛淚下沾衣無有解已日惜年命恐不得壽見長命之人問之言有忠孝不失天地之心意助四時生助五行成不敢毀當生之物為善不行侵人無所欺抵誠信不敢有所負行成於人衆不敢失於親而虧閭里出輒相報其以時還未曾大醉臥於巿里賢知相隨不顧愚子念恩於天地不敢望報自責而已復有過失承負所起自責有歲數乃感動耳生俗多過負了無有解已愁毒而行不知所止每見人有過復還責己不知安錯思見義文及其善戒祿命僥幸逢天大神戒書文反覆思計念之過多無有解已叩頭自搏而啼鳴有身不能自正而反多怨禁書致重而自觸之致命不壽晨夜自悔冀復小久不敢施惡更念當行恩德布施蒙得其理無有惡言但見淚耳感傷於心天神聞知來下言此人為誰何一悲楚窺見大德之人延命久長在問之言此但行應天心合地意是故得壽耳還歸靖舍念之如太上德人之言以故自省也使神見自責悔人還上天道言有悔過人啼淚而行未曾有止時恐見不活以故自責大神聞知言天君常勑諸神曰有功善之人為忠孝順所言進獨其人也因白天君天君言聞知此人自責悔過有歲數也此本俗人耳而自責過無解已更為上善人也大神數往占視之知行何如有善意欲進者且著命年在壽曹觀其所為乃得復補不足大神言此人自責大久承負除解請須有闕上補名為太上善人可以報下不及者天君言太上善人之行必當如其言大神數勑之護視成神上之皆須其年數勿侵也大神言此人本無籍文也得勑在壽曹請須上闕補以年次不相踰越天君言得次補缺之日數上其姓名勿失期大神唯唯惟太上仁人為行也乃積功纍行於天天乃聽信使助東皇布置當生之物華實以給民食使得溫飽形身長大展轉相養陰陽接會男女成形老小相次稟命於天數於星二十八宿展轉相成日月照察不得脫更直相生何有解息但人不知以為各自主名雖有主更相檢持所以然者人命有短長春秋冬夏更有生死無常故使相主移轉相問壽算增減轉相付授故言四時五行日月星宿皆持命善者增加惡者自退去計過大小自有法常案法如行有何脫者天上地下相承如表裏復置諸神并相使故言天君勑命曹各各相移更為直符不得小私從上占下何得有失有性之人自無惡意雖有小惡還悔其事過則除解有文書常入之籍惡者付下曹善者白善惡者白惡吉凶之神各各自隨所入惡能自悔轉名在善曹中善為惡復移在惡曹何有解息地上之生人中有胎未生名姓在不死之録年滿行成生者攝録令有保者乃上之所以然者其壽難待重之故令保者過并責以是故自不忠孝順無功者皆無保任者但為生先祖績使有祀耳殊為惡不止何有得後生食者乎食糞之人亦安從得與天大神久共事乎糞中之有應天書度者天遣神教之歲月旦滿勑天大倉守神斷有形之物稟天大倉氣食消化令輕化神靈出窈入冥乃上姓名不在簿中何有求生人安從知之人自善無失天心大神動其心使樂為生道俗人自貪之所以然者自行惡無一善時但貪好衣車乘相隨自得不滿之命天地亦不奪其願也惡人亦不得久視天日月星宿也當歸長夜何得久在此人不得自師為善者天知為惡可久前故使食有形之食故藏土下主為地神使不得復生故以書相示令知之耳或有尸解分形骨體以分尸在一身精神為人尸使人見之皆言已死後有知者見其在也此尸解人也久久有歲數次上為白日升天者使有歲數功多成更生光照助天神周遍復還止雲中所部界皆有尸解仙人主知人鬼者有道之家其去者得封為鬼之尊者名為地靈祇亦得帶紫艾青黃所主有上下轉有所至為惡聞得片退與鬼為伍知不乎故言死生異路安得相比行辭小復息念其後遺脫不足者當説之惟太上善人之為行也乃表知天地當行之事各有所主各有其辭各修其事各成其神各立其功各行其忠各理其文各布施於人各道其進各得天地腹心各不失四時五行之生成乃應太上善之人是天之信地所保皆得中和之心腹知人情出入內外承令而行不敢失大聖之人意下不敢犯諸神所禁常念成人使樂為善人令得天心地意從表定裏成功於身使得長生在不死之籍得與大神從事對職卻知是非忠誠於天照見日月星宿不失法度不失志意常生貪活思奉承天化復知地理心乃歡喜復知吉凶之籍存亡之事欲與自然同其路行少惡貪見大神之戒閔傷未知照其不逮使及長生之録見天君蒙其生活久在不死之籍行天上之事下通地理所照見所聞目明耳聰遠知無極去來之事文書通辭復知要妙是太上善人之願也唯天上大神照知指願貪慕自然表紀合生氣而行無有窮已常言天不奪人願地不奪人所安是自然不敢有毛髮之系而煩苦諸神深記文墨也日夜思念過負恐有不稱太上君之意何惜何愛而不盡忠誠孝順乎當自言被受恩施得榮華不望報天心重愛但自過責少所貰也唯大神原之戒之不及戀慕之不敢自遠常獨念恩不報罪還著身恐不辭解但惻怛而已雖見原省使得自思念所負大神言太上善之人思過自責文辭逢出上聞是其文辭延及也但恐不知所言耳天信尤善尊之可至無極之壽宜當復遙心勿忘天所生大施之分太上之君善之言生自命好生不顧財色見活之人常思與同久何時當妄行不道無心之意不報重恩乎但自惜年生以來不見大分耳唯蒙恩教戒使知分理當言知命不怨天不敢自怨而妨活也心相加當有貪時邪但自恐年命窮盡不見天之大施分部耶唯復勑戒愚矇之生使有知慮為大恩非辭所報也但剋心念常在於內不忘其飢渴求戒見活唯蒙原省大神言我本從諸神自進於天君無有小失助天地有功之諭上籍在天君何時當相忘乎請白生辭令自責有歲數貪慕天化其人在録籍與不天君言自責之人皆於自然亦神所資善也使主案天文籍之人視之有自責乃白生籍神使勑視文文案籍有此人天君言人有生自行善不犯所禁是人行之所致也大神且復詳須施行有缺上名大神言從太初以來諸神有功得天心意者見進頗有空闕有其人所行當備上姓名天君言所部職多煩計功除過使其更勿違所言大神言此太上人自隨正過負尤少天君言復念之有未稱舉者責保信上之補闕天君言是曹之事不可不諦也大神言請如辭所言未能百日天上諸神爭保上之大神白意天君言如是各使可使使往視事遂復見重信者補真大神言請遣使神取召上之先化形容神使往化成精光耀多大神言取白天君言人已化成神上在於門外未入天君言使詣主者曹謁之大神言大神所白唯唯請屬所白如言宜遂觀望其行天君言當如大神所白有知人思慕與大神相見訣第一百八十三惟太上有知之人乃預知天上之事當所施為當所奉行事出自然元氣相加得成熟了然可知變化其心使成自然在其所為故有知乃知表裏出入所行莫不得成就莫不成其所莫不變化有時欽仰威神以成其功以名其德常不離忠信未嘗有解晝夜悲惶不離於內傾側思慕貪成得與大神相見談言通辭行其所道進其所知常思成功有恩於神益壽增年故令有知從內視外何所不知何所不見見心了了念但貪長生活之道思得駕乘為大神奉使在其所至不敢還言應時如到思得心開受神之言如神所為知神所行務以自信乃敢前言欲求蒙得見活而已不敢求大職見哀而已雖見存亡之事內心惶恐被受大教輒當行通施恩布惠有益於上有益於人著名録籍常在不死之位心乃欣然嬉思盡功於天君所積之有歲乃前語言唯蒙大神通其不足知所辭辭大故以貪進受其乙密征營門閣不敢自息欲得教戒稟其不及願得省察不逆所言使須戒勑大神之言太上有知之人自多所照見但為未能悉知天之部界耳悉何所戒天上之神皆照之太上有知之人言也但為欲知所語所道所行與耳何所嫌疑乎天君言常勑諸神有欲忠孝誠信有功之人進上姓名是太上有知之人祿相所貪故以心自明是也但恐文辭筆墨自言耳亦何惜愛天上之教戒乎常言苦無應書者恐外內不相副也如欲進其知慮廣問深達是亦當所知也行其聽大神所言天有重戒不可不慎不可不敬不可不畏乃可誠所戒衆多當知其要且復開耳目用心唯唯然從中出天上大戒諸欲見進求生久活者宜當進其所知有知不言如聽是為無自進之心也心有知思思當進見其中有志當進見其志有誠當進見其誠有孝當進見其孝乃為得天之腹心不可不悉進也天君預知人情不可有不進而不進道説之也隱知藏能天惡此人使不見壽籍為知不乎不但不見壽籍也亡先失精去離身中亡其年可不慎乎太上有知之人所以然者天君知有知無知其自知之何有疑也但詳念神言勿負於言而已太上有知之人言自下愚強問不及欲蒙得所不知何敢隱知藏能使天君諸神聞知更為亡命失年壽不久長是過禍之根滅身未足報謝何敢有進而乎唯諸大神照原其不及逮者大神言求生惡死之人亦自有心志意不可也恐有迷時生言自分不知戒文也而被大神恩貸教之乃如是何敢自息而不進所知所言乎唯大神録前不耳大神言相前不易輒有保者有信可天君心意乃可望生耳當諦之生誠貪生故盡其忠誠不敢解息思過自責何敢失日夜乎天君聞知言此太上有知之人言也乃知是案簿文有此人姓名有闕備勑生籍之神案簿籍有此人雖有姓名自善多知須年滿勿失其年月神唯唯有心之人積行補真訣第一百八十四惟太上有心之人各知分部各自有所道自有所行自有所奉自有所進自有所白自有所言自有所至自有所動心不繫於內常思盡忠信孝誠有功於天積行纍歲未曾有解而忘恩分常念貪生得於上衆神所佑不敢施有小分常懷怖心未曾自安思得太上之戒以全其命何敢有忘大分之施唯諸大神宜小顧照不及心常戀念太上之事當所奉行規矩繩墨見信自然窺望四境通達四隅承天所知表通未然心念大神之疏相通文所進所白不敢自以心意評之常與諸神集議可承用與不常恐不得神心腹自惟本素無舛之人也如自發中思慕常在不害之命全身前貪其光耀上及無精無形之音聲洞達太上奉使進不敢忘有解而妨大化唯諸神省其貪生不敢去離大神左側見戒心開目明欲在久長之文增年壽思進有功以身躬親不敢自信而擅道曲直爭其不足也望上之人常汲汲唯哀照戒之恩愛念何有解時心想日夜相見貪知防禁之失以動其心使還見其不逮及者是非文辭口言所報唯蒙見省念貫於心鬲大神言是太上有心之人亦當所宜行也求蒙天重戒防禁自有知之人本素自了曉分別其理何所道戒乎持心射心亦無間私從上占下悉自知所主今太上有心之人天之親近天神所信但當持心意常恐惶不失耳餘者自有心所知努力傳達廣問勿失所言有知之人多所分明但恐當時有不如言耳何嫌不相白説其人有心自思愆負也平但念其前後壽自從中出與天君心相應也餘少戒有心之人言生本末草野之人見有久生老化復丁光景滋液出入無有失未見其失學者衆多得者少無其人所以然者持心不致密而輕所言祿策不宜故令希少今生見是前行之事益復改正易節開心相留耳欲開音聲善聞貪壽惜年以是不敢解息唯大神省其不及大神言有心之人當賜録籍請案曹簿有姓名者白天君大神不得自從也生言唯大神照議之耳不敢自遠傾側在外必身自效大神言請持有心之人白之有報名籍者何嫌相應也生言唯大神相白成就之日以死命自效何須望還報大神以事白天君言太上有心之人皆持心堅密志常貪上有信勑主者之神察之有其人者進白大神勑主察之言有此人姓名牒文者此人未生時預有姓名大神還白曰此人未生有籍唯太上之恩耳天君言有録籍之人當見升自責承負大神遣大神除承負之數教化其心變化成神年滿上進大神言此人年滿算計過期且百日前未有定故且止天君言勑大神且上令在間職有真闕使補之殊能竭精盡志知除兼行大神言請上如天君所言復精實壽計算明者當在白日升天中天君言是有心之人所宜也欲令有所主大神唯唯請勑正者故事承本文大神言以升曹白謁見者白大神言請勑主者曹主者既白使署間職有真闕使補天君言如曹所白右天上見善事當藏匿與不吉凶所致貪財色災及胞中誡第一百八十五古者無形之神人也學求生道也乃上與委氣同願念思常慕得長活之壽思念不敢失委氣之意昏定晨省戀牢貪生常在不忘時自視顧望盡忠貞之至奉承隨委氣之願使得上行明徹昭然聞四方不見之物希聲之音出入上下皆有法度群神精氣莫不自來侍奉承顏色恐失其意繫所屬皆有懼心衣履轉成合懷施惠布恩上下流聞四方六極八表之外延及先生各加善惡厚薄之失大恩所覆敬承奉命乃感動星曜無極之資無極之德選取貞良以自障隱其願得達心自祐暢蒙得生無資之壽恬淡少文軀自念全何有懈息人不得知我我亦不聞無祿無功何因得上與委氣同陳用是自惜自愛自養及尤稚布施周遍何有不蒙者乎但自惟出入天地中和之間照達日月星辰取明於前二十八宿更直察民用有支干吉凶有文但人少知自以為賢動作行止既無益於天禍罰觸禁上至滅門絶世無續先祖無祠豈祗命不久全奈此人何奉行不承古文自以不犯鬼神是乃三氣不和亦有命厚薄不能悉深念禍殃故遣三氣神往勑誡之用諫者善不善者自期至地之下殃流子孫天命之為不順施惡廢善何可久存皇上所不欲見急斷其年人不自知反怨蒼天天何時相冤人自求之殊無知慮犬羊之命何可久遇與禽同羅觸犯其綱貪食害軀群輩相隨不惜其年其中有知乃出於四境不害之鄉是獨何得亦中命自然雖處無人之間是命所全世少報者時世命然痛哉奈何自言何負於天先古之人萬無一人相得其貪財色不顧有患災及胞中不見日月星何惜痛乎自遺不完命與土連窮哉此人亦有比等草木禽獸亦然不思自正端正意無妄有惡言上有神記下無靈上無隱匿其主坐焉各當努力求得戒勑神靈之旨吉凶之會何有不報者乎故勑神人為民施防禁使得見生死之忌生者陽氣所加録籍有真神仙録有過退焉陰氣所加輒在死部熟念惟思無失天網下及地理當知人情出入表裏可進可退無遣人咎各得增年延及子孫得戒之後重慎其言為惡在下上所不顧俗世之人少孝少忠貪慕所好劫奪取非其有殺心不離口吻何望活哉會有殃咎早與晚耳奉承天文神靈所記致當遠之不可自試試生得生試死得死會死不疑故復丁寧反覆語之勿與無知有小異言長生之道近在三神三氣合成乃為人不成離散為土在瓦石同底破碎在不見之處不得與全完為比三命之神近在心間何惜何愛反貪形殘都巿示衆何時生還父母憐念妻子被患踈親快之比鄰恨其晚死流後生能自正為善歷得復長至誠所加物有自然致慎內外陰陽之間四時生成無得毀焉天上地下中和之間皆自有主為有知之人作相之法所抵思生者與天道同願惡者自亡年可不慎哉神人之言皆受天應不得自怨延命之期上及為善竟其天年惡下入黃泉思之思之勿妄傳惡者之人傳得惡被其患死生異處無敢有言行不善自勿怨他人輒有注録之者無所復怨讀書知意戒慎神書精物鬼使皆有所因有命家得見此文慎無自傷抵欺善人天減人命得疾有病不須求助煩醫苦巫録籍當斷何所復疑諦之念之思之惟之可無被患患禍一及不復救焉真人持此書以示愚蒙自改為善勿惡書言前後所説皆復重焉所以然者死生易命不語其禁令無從得存自然唯當知真心意好文當知所言故使守一身軀竟其天年守一思過復得延期天道億萬少得其真河圖洛書廢者衆多所以然者不信其文少得仙度便為俗人今故因三神人之師復感動其心者神靈附人不欲令地氣召之致詳念思惟其意勿疑此文重復神人之師被受天教故因有録籍之人通達書意七十二色死尸誡第一百八十六天有四維地有四維故有日月相傳推星有度數照察是非人有貴賤壽命有長短各稟命六甲生有早晚祿相當直善惡異處不失銖分俗人不知反謂無真和合神靈乃得稱人得神靈腹心乃可為人君日時有應分在所部得天應者天神舉之得地應者地神養之得中和應者人鬼佑之得善應善善自相稱舉得惡應惡惡自相從皆有根本上下周遍山海諸通之水各有部界各各欲得性善不逆之人以為戶民陸地之神亦欲得善人各施禁忌上通於天為惡犯之自致不存大惡之家無大小鬼神所憎但可自正勿非謗神天道地道人道禁不空善神精氣尚能假人惡者不失其文輒舉上白積過衆多太陰主狀當直法輕重皆簿領過人不自知以為無他太陽明堂録籍數通復得部主神亦數通天神部上死亡減年滅人世不可詳念重其善致善惡自歸其身及治生天知少智故為施善惡救命之文以戒前後勿輕惡言以為談首動作進退輒有殃咎故下此文以示子使思其意使無自怨朝延尉設法人自犯之勿恨主者恨之命簿不得久生會欲殺人簿領為證驗乃令入土輒見考治文書相關何有脫者努力遠惡無以為伍可小活竟年之壽不忠疾苦雖為狂邪所擊會有活者天上禁神法令亦如中和地下四流傍行皆同法象何有疑者生人有功於天子孫為凶輒除算當時不死算盡之後亦無望其生君國子民當為教道導其善惡務得情實無天人命絶人世類刑從其刑數見賢智以為首尾威神著君神勿加暴前書已有言復宜重之君父得以遷延及後永生滋震慎無貪殺當時自可後被其患吏無大小正卒因緣宜明其事勿為民之所患殊能敬好道德仁恩與天合德與地同意與中和有益思與善神靈相覩各有其信勿欺愚者長生求活可無自苦愁毒思行天上之事神靈所舉可得仙度久生長與日月星辰相覩是天之大恩宜勿有小不善亦復遣下作惡不止久滅人戶故復申勑既無犯者犯者各為薄命少年人欲為非當為説解其愚迷使不逢凶常時不用人言後復自悔談者之福也星宿視人不可為非當各有所白善者命長不復疑教戒後生可給先祖享不者自亡其名無犯天禁無犯地刑四時奉順無有殺名五行所成宜各自守無有惡名勿輕上下皆更相主令無卒無暴乃有顯名思念在心慎離其形精神離散邪鬼驚人念以自全無忘其名各自有喜務道求善增年益壽亦可長生慎之慎之勿枉行刑初雖勞意後被其榮師有善惡念本成末弟子不順亦亡其名不得仙度犯土刑神所以增惡不得受生慎之復慎一身之內神光自生內外為一動作言順無失誠信五神在內知之短長不可輕犯輒有文章小有過失上白明堂形神拘繫考問所為重者不失輕者減年神不白舉後坐其人亦有法刑非但生人所為精神鬼物亦如是古者知不敢犯之人神數下歷之於天地人無功亦無望其報賢聖之心當照其書卷卷有戒讖惡人為逆貪生者天之所佑貪養者地之所助貪仁者人共愛之過此而為惡必得賊天知其惡故使凶神精鬼物待之入人身中外流四肢頭面腹背胸脅七政上白明堂七十二色為見是死之尸也五藏有病其去有期慎飲食無為風寒所犯隨德出入是竟年之壽天貪人生地貪人養人貪人施為惡其禍不救故以天書告令勑民無犯所禁天氣因人出辭宜各洗去不純之行慎之勿忘後將有喜不者不須復存如言寫書不用徒自苦誡第一百八十七古者神聖之言不失綱紀自有法度無知之人各戒此戒尤深徹生過罰輕重皆從人起非但空虛輒有所受天性自然不可欺矣熟念無置行成天神矣變化有時不失綱紀四時之氣不可犯矣輒有精神無復踈矣以為不白天以占之神為之使不妄白上乃得活耳不者罰謫賣菜都巿不得受取面目為醜人所輕賤衆人所鄙過重謫深四十年矣乃得復上為諸神使中者三十下者其十奪其所主各有分理能復易心自責可復長久勿易天言自遺其咎可不熟念為後仙士計慮深淺咎自在己無怨神言出入表裏慎無誤失詳諦所受被天奉使不可自在當輒承命不得留久輒有責問不頃時矣過重使退地記所受姓名如牒不得留止處有空缺下人補矣所以然者中心盡神仙尚退何況愚士自是之後可無犯矣天責人過鬼神為使不如天教輒見殃咎不須鞭笞行自得之耳以為不然見為所疑不得久在故復有言所戒慎矣不效俗人以酒肉相和復止仙道至重故語人矣有命當存神神相使乘雲駕龍周遍乃止天有教令當復行矣無失法則枉踈記為置證左不宜自服天亦止息各受其罰可無怨矣為神所白無妄犯天下地上中和之子各不自敬無怨天咎地上下相留亦如民法令辭不情實為下得怨亦不留久天上諸神爭道之何況凡人民宜自奉承天法隨順天和無資之糧無資之衣有功復進可主諸同有所白歲有定承文而行不得有疑各有所白不兩平相怨同舉者有罰更為賤矣雖不時下為大神所使不可神意便付土主不得復上故有空缺身不處之是上中下相參如一矣行慎此言亡身之壽與土相連土者非地之土自亦有凶神業守之為天土神使使不如所言輒見苦矣神仙尚有過失民何得自在故令司命近在胸心不離人遠人為精神舍宅吉凶自在何須遠避自令擾禍急不得活命未盡算盡之後遠之無益天下會神主知存亡神自有失脫反受其殃故令民命不得復久長故遣神人示其文章得戒止惡神不上白尚可須臾飲食諸穀慎無燒山破石延及草木折華傷枝實於巿里金刃加之莖根俱盡其母則怒上白於父不惜人年人亦須草自給但取枯落不滋者是為順常天地生長如人欲活何為自恣延及後生有知之人可無犯禁自有為人害者但仰成事無取幼稚給人食者命可小長終竟録籍無興兵刃賊害威劫人命天命此人不可久活惡惡相及煩苦神靈精氣鬼物各各不得懈息是非人過所為邪先時為惡殃咎下及故令生子必不良之日或當懷妊之時雷電霹靂弦望朔晦血忌反支以合陰陽生子不遂必有禍殃地氣所召反怨倉狼為惡報惡何復所望不知變易自職當絶滅無戶死不與衆等部吏正卒此伍特至曠野不潔之處才得被土狐犬所食形骸不收棄捐道側魂神俱苦適作不息或著草木六畜所食何時復生罰惡賞善人所知何不自改天報有功不與無德思之思之賞罰可知自可死獨苦極善惡之壽當消息詳之慎之可無見咎故以重誡令自悔耳吉凶之會相去萬里故下此文相勑相誡勿怨天咎地善惡當分其文相録知惡為善魂神勞極愚者不知故文辭丁寧反覆展轉相告無為後生作咎以此自證復何怨咎無所復恨各得其理此文當傳不得休止知者減年愚者自已寫書不用其言但自苦耳有過死謫作河梁誡第一百八十八上古之時神聖先知來事與天共治分布四方上下中央各有部署秩除高下上下相望不肅而成皆為善恐有不稱皆同一心天有教使奔走而行以雲氣為車駕乘飛龍神仙從者自有列行皆持簿書不動自齊恐有所問動有規矩得其所行春行生氣夏成長秋收使民得以供祭冬藏餘糧復使相續既無解時神靈之施莫不被榮恩及蚑行草木亦然是非上之恩邪各得自所食輒令有餘新陳相因奈何忘之既得民助使神不恨善人輒報自以當更相給足天使之然不可藏匿令人飢寒故令有財之家假貸周貧與陳歸新使得生成傳乎子孫神靈佑助是非大恩布行邪愚人無知不肯報謝自以職當然反心意不平強取人物以自榮無報復之心不顧患難自以可竟天年故復共文神人真人求善人能傳書文知用則其人可得延命增壽益與天地合共化為神靈復得駕來周遍上下中央流及六方豈不善哉何不熟思無忘於內神宅所居動觀人所為不自是知有及當相承事去禍就福不宜有小不稱天心也天地四時五行衆神吏直人命録可不敬重念報其恩不欲為善事反天神天神使風雨不調行氣轉易當寒反溫當溫反寒耕種不時田夫恨怨不肯為人理之輕賤諸穀用食犬豬田夫便去在有德之國其處種者少收樹木枯落民無餘糧更相殘賊爭勝而已不念真後更為貧人收無所得相隨流客未及賤穀之鄉飢餓道傍頭眩目冥步行猖狂不食有日餓死不見葬家無大無小皆被災殃反呵罪於天其國空虛倉無儲穀少肉無儲錢歲歲益劇無以給朝廷復除者多倉庫無入司農被空文無以廩食奪祿除中國少所用人民仰國家而不各施有難生之期是皆天之所惡也地不得久養惡人知不真人急以此文付有德之國各令自責有知可復竟其天年無知與禽獸同壽不可強得行自得之無怨於天詳念書文常思孝忠信仁施有過自責復有子孫書不空言無德之國天不救護機衡急疾日月催促少明有德之國機衡為遲日月有光是天之所行機衡日月星皆當為善明反便少者是行之所致何所怨咎乎同共天地日月星辰耳得見天地報信者見其明五星失度兵革橫行夷狄內侵自虜反叛國遣軍師有命得還失命不歸是大人之罪也為子不孝國少忠臣行不純故令相剋卒歲乃止故施洞極之經名曰太平能行者得其福不者自令極思聚身無離常報應不枉人所不者施惡於人常言人無貴無賤皆天所生但録籍相命不存耳愛之慎之念之慎勿加所不當為而枉人侵剋非有是天所不報地所不養凶神隨之不得久生樂生念自令自忽者勿望生殊無長生之籍強入神仙齋家所有祠祭神靈求蒙仙度仙神案簿籍子無生名禱祭神不享食也走行乞丐復諸神靈其神怒之猛獸所食骨肉了已狐狸所齧不歸故鄉同縣比廬反言得仙殊無信報何用自明以是言之難可分明當有報信衆人見之乃為已升不者苦其刑為言得略少其人狂邪可下反以為真俱入死部下歸黃泉不得自從有德度者生時有簿年滿當上輒有迎者童蒙無知何從得往但費資用棄家捐身曠野道自然人相祿不可強求倘自苦不治生養親妻子相見為賢士但恐不孝不忠少信可得竟年耳地下無罰樂而已有餘財産子傳孫亦當給用無自苦子孫賢不肖各自活無相遺患是為善行故記此文示智者愚人忽之妄怒喜遠罰避患為賢者三諫不中且可止天佑善人不與惡子各自加慎勿相怨咎各為身計行宜人人有知無有過負於天録籍所宜慎勿強索索之無益所以然者惡逆之人天不佑也無離舍宅及城郭骨節相連為阡陌筋主欲生堅城郭脈主往來為骨絡肉在皮內為脈衣神在中守司人善惡何須遠慮七政司候神門戶求道得生無離舍宅變化與神合德道欲復何索故置善文於天籍神仙籍與俗異録當升之時主籍之神及保人者來乃知所部主奉承教化各有前後輒當進有所去不得自可衆神共治務取合天心者先生之人皆心明視無有界意所行所生人未知之皆先天地變化上下皆不失其道神不悉具乃置綱紀歲月偏傍各置左右星辰分別各有所主務進其忠令使分部見善當進見惡當退何有所疑行各自力無為神所誤故得成得稱天君主天之人輒簿領亦不失度部主諸神故四方方有孟仲季更直上下名為太歲太陰在後主知地理復置四時生成所有分居於野有晚早穀草近人不壽遠人民然亦復長久叢社之樹小得自矣易世被誅延及孫子所以然者所居不安去故就新神復得還人有命樹生天土各過其春生三月命樹桑夏生三月命樹棗李秋生三月命梓梗冬生三月命槐柏此俗人所屬也皆有主樹之吏命且欲盡其樹半生命盡枯落主吏伐樹其人安從得活欲長不死易改心志傳其樹近天門名曰長生神吏主之皆潔靜光澤自生天之所護神尊榮但可常無毀名天有常命世世被榮雖不下護久自知精所以然者去俗久遠當行天上之事不得失脫諸神相檢如繩以墨何復自從故不下耳宜勿怪之功勞當見不與俗等人以為無益於家內被其榮豈不善邪故示後生令心覺悟出書無藏歲之有罰無與佞欺不孝順為心宜皆為不副書言復見責問可不慎焉傳當傳其人令可保舉勿犯神書勿試神言慎神之辭皆天報焉勿輕犯之後有患小犯才謫大過不救故使諸神更相司便宜上之有不實者當復見治事當相關不得私故使諸神轉相檢持今悔其後何須疑中復為止亦見考之不首情實考後首便見下故進止亦見考之不者如故此之謂也不可輕犯無所狐疑神法大重故當慎之詳之念之思之長生久活之道可不重之故下此文以示當施補空者為設善事輒相承無有逋亡為善有功年益長無所復疑自然之道何極時但覺寤轉相治失如銖分輒見疑天有倡樂樂諸神神亦聽之善者有賞音曲不通亦見治各自有師不可無本末不成皆食天倉衣司農寒溫易服亦陽尊陰卑粗細靡物金銀綵帛珠玉之寶各令平均無有橫賜但為有功者耳不得無功受天衣食前文已有言今為復道令無怨恨無所嫌疑是天重神靈之命也歲盡拘校簿上山海陸地諸祀叢社各上所得不用不得失脫舍宅諸守察民所犯歲上月簿司農祠官當輒轉相付文辭大陰法曹計所承負除算減年算盡之後召地陰神并召土府收取形骸考其魂神當具上簿書相應不應主者為有姦私罰謫隨考者輕重各簿文非天所使鬼神精物不得病人輒有因自相檢飭自相發舉有過高至死上下謫作河梁山海各隨法輕重各如其事勿有失脫各有府縣郵亭主者長吏察之如法勿枉夭剋鬼神精物如是上下合通行書各如舊令衣履欲好誡第一百八十九自古及今各有分部上下傍行有所受取輒如繩墨不失何有不覩死生之訣各且自慎勿犯神靈各如其職慎勿忽忘命可疏記善者當上惡者當退吉凶之會各其所願但可順從不得逆意心意不端反怨神使行自得之何所怨仇人有難化知有不足皆被其殃枉行所不及反自譽滿口出人事殊無知慮而見當前不顧其後合禍離愛謗訕善人以天亡上地不在下不知鬼神有疏記之者解人怨仇多施酒脯甘美自恣當時為可後為人所語輕口罵詈呪詛不道詐偽誹謗盜人婦女日夜司候邀取便者賣以自食衣履欲好競行鬭辨不從道理欲得生活何從得久愚人可為名惡子長吏聞知屬吏捕取急刑其身禍及親踈并得其咎貧當自力無為搖手此人命簿生所稟受惡鬼隨之安得留久此輩衆多有前後會當相得不中止所以言者惡鬼所取慎之小差不慎自已惡不可施人所怨咎當時自可不念其後見戒當止可復小生竟其餘算有故記善惡壽所起增年之期要當善矣不見賢聖知慮有餘念生惡死上及仙士壽可長年何為棄世殃流從生胞中之子反言我同從父母生耳是皆怨天咎地言惡當別不可雜廁清濁分離如君與奴使故得行大道者生不行為土古今相似亦有善亦有惡世世相傳未嘗止多與少耳天知多逆故出此文重之耳知戒之後可無有疑十百相應何有脫時不忘誡長得福訣第一百九十惟天地亦因始初乃成精神奉承自然生成所化莫不得榮因有部署日月星辰機衡司候并使五星各執其方各行其事雲雨布施民憂司農事元氣歸留諸穀草木蚑行喘息蠕動皆含元氣飛鳥步獸水中生亦然使民得用奉祠及自食但取作害者以自給牛馬騾驢不任用者以給天下至地祇有餘集共享食勿殺任用者少齒者是天所行神靈所仰也萬民愚戇恣意殺傷或懷妊胞中當生反死此為絶命以給人口當死之時皆恐懼近知不見活故天誠矜之憐愍為施防禁犯者坐之六畜尚去明愛不忍中傷人反不自惜更為賊虜所取非一妄行金刃殺人不坐也雖不即誅者天積其過殺敗不止滅尸下流未生是者亦不得逢吉鬼神憎之司候在前何有脫時故記善惡重之即不犯耳神人真人以此文示衆民義不隱藏使知不自怨故隨俗作字分明可知聖賢不犯恐愚不息師有前後無忘其本念本就新戀慕如初是生之道也功有小大所受不同當為發覺未知之訣未知之意不知其念未知之言未知之志兩分明是天意也生成之道從此出矣取信於天取信於地取信於中和取信於四時取信於五行是皆天所得報信也不失銖分知之不乎是委氣無形自然之所服化也故三台七星輔正天威日月照察是非使有自然然後無有中悔之者故復申敕諸所部主各令分明受罰不怨此之謂也無得是非他人還自直也戒無小大可法則也不忘此言長得福宜慎用行之不失節也以故言自殺試也書當未用帝王未信也佞者在側書不見理也災害并生民何所止太平之書三甲子乃復見理不如十諫令知耳且念活求知賢聖有知可及矣聖人當升賢隨後求生不惡復次之神仙之録在北極相連崑崙崑崙之墟有真人上下有常真人主有録籍之人姓名相次高明得高中得中下得下殊無搏頰乞丐者先生為師尊之為君稱之為父故師君父不可不明臣不可不忠弟子不可不順敬從其上轉上及故天不忘先生之恩地不忘先生之養人不忘先生之施故有忠孝信思生不惡以自近以自明天明下照黃泉之下土明照上天間中和之明上下合同故三明相得乃合和天以三明名日月星下照中和及地下無有懈息無德之國陰氣蔽日令使無光人民恐懼穀少滋息水旱無常民復流客有穀之鄉天實憐之令至活鄉處有明君國得昌流客還耕農休廢之地諸穀得下生之成熟民復得糧更奉先祖鬼神得安中有聖智求索神仙簿書録籍姓名有焉當復上為天之吏案行民間調和風雨使得安政以此書示後生焉故當作善有益於天自是之後可戒子孫延年之期可不及焉書雖復重天大愛人欲使得竟其年丁寧反覆屬於神善輒踈上惡亡其名無違此書思善心鬲念常不廢意當索生志常念成所以然者以人志所當及也努力精之各隨其願天亦不強不欲也地下傍行四方亦然無極之天無極之地無極之境亦然無極之明無極之光亦然然小竟是天之大分也欲理念天上之事天上理念中和中和安之欲念求貴貴神榮之欲念求富富神富之苦樂之間常思之詳慎所言天道億萬在人所為不奪人願也生養之道審可觀死亡之道鬼所患也凶神不安輒受之難為文也天上有文求生根也人所願故挺此文使可思也有過自悔案此文也不者亦已無妄言也神靈在汝前後無解時也右天上昌興國降逆明先師賢聖道天地喜神出助人治令人壽四夷卻樂怒吉凶訣第一百九十一請問太平氣俱至人民但當日相向而遊具樂器以為常因以和調相化上有益國家使天氣和調常喜國家壽天下亦被其德教而無咎其樂得與不得以何為明哉和與不和以何為效乎欲不及天師具問其事恐固固有不者故前後重問不敢懈怠恐天怒也善哉子為天問事日益間習得天意真人必益年壽無窮天所祐也諾安坐復為諸弟子具更道其意使其察察令可知也樂小具小得其意者以樂人中具中得其意者以樂治上具上得其意者以樂天地得樂人法者人為其悅喜得樂治法者治為其平安得樂天地法者天地為其和天地和則凡物為之無病群神為之常喜無有怒時也是正太平氣至具樂之悅喜也是故樂而得大角上角之音者青帝大喜則仁道德出凡物樂生青帝出遊肝氣為其無病肝神精出見東方之類其惡者悉除去善者悉前助化青衣玉女持奇方來賜人是其明效也真人詳思此意唯唯故上角音得則以化上也中角音得則以化中也下角音得則以化下也而得之以化南方徵之音大小中悉和則物悉樂長也南方道德莫不悅喜惡者除去善者悉前赤氣悉喜赤神來遊心為其無病心神出見候迎赤衣玉女來賜人奇方是其大效也故得黃氣宮音之和亦宮音之善者亦悉來也惡者悉消去得商音之和亦商音善者悉來也惡者悉消去得羽音之和羽音善者悉來也惡者悉去真人自詳思其要意所致述效本行也所以不悉究竟説五方者謂其大深上士見之自得其意以一承萬中士得之恐其大喜也小人得之或妄語也故不悉露見使凡人各自思惟其意上士且自以一承萬通知其意亦不須為其悉説也中士亦且自綝綝幾知之亦不須為其悉説也下士或得而反妄語亦不須為其悉説也是故財成慮小舉其綱見其事以示凡人使各自思其意則可上下通達而無過真人知之邪唯唯故上士治樂以作無為以度世中士治樂乃以和樂俗人以調治下士治樂裁以樂人以召食此三人者各諭意太平氣至聽其所為從其具樂琴瑟慎無禁之則樂氣不出治難平難平則氣鬭訟而多刑夫樂者致樂刑者致刑猶影響之驗不失銖分也凡樂者所以止怒也凡怒者所以止樂者也此兩者相伐是故樂則怒止怒則樂止是故怒者乃生刑罰鬭之根也喜樂者乃道德之門也故當從之使生道德之根勿止之也止之反且生刑禍之門也此者吉凶之所出安危之所發也故樂者陽也刑罰者陰也陰之與陽乃更相反陽興則陰衰陰興則陽衰陽者君也陰者臣也君盛則臣服民易治臣盛則君治侮亂此天自然之法也故當從其君樂也以猒其民臣止其數怒也下古之人愚不深知其意反多斷絶之故使陰氣盛陽氣衰也陰氣盛則多盜賊罪人不絶凡萬物不生也多被陰害大咎在此樂氣興則陽氣盛以斷此害君氣盛則致延年益壽則上老壽夫緩與樂者上屬天也急與怒刑者下屬地興行其上者萬事理興行其下者萬事亂真人戒之此言可不深思乎唯唯子可謂深知之矣傳之以示下古之人使各思其意慎無閉絶也樂則五方道德悉出怒則五方惡悉出也樂則天地道德悉出也怒則天地惡悉出也故天地樂者善應出也天地不樂者惡應出也故五方樂而和者五方善應出也故五方不樂而怒者五方惡應出也是非小事也故言毋斷絶也令凡人共惟思其意俱一覺悉出之然後悅樂氣至急怒氣去也善哉善哉行子已知之矣右天上分別樂與怒所生吉凶訣某訣第一百九十二前文原缺行有疾苦心中惻然叩頭醫前補寫孝言承事恭敬以家所有貢進上之敬稱其人醫工見是心敬其人盡意為求真藥新好分部谷令可知迎醫解除常垂涕而言謝過於天自搏求哀叩頭於地不避瓦石泥塗之中輒得令父母平安教兒婦常在親前作肥甘脆恣口所食父母商家所有不致苦其子孫令盡家所有殊私心孝於前親屬比鄰見其孝善知無所有更往給餉為其呼迎醫工蒙薦席相與日夜數勞知其安危問養視其復聞小善言心為之喜歡是孝之所致也天見其孝心令得愈更如平素心中乃喜欣復身得能食穀者齋戒巿賣進所有上於天還謝先人諸所得祟輒卒香潔不敢負言是孝子所宜行也俗聞知是善而不能行之能行之者性出自然天稟其命令使孝善子孫相傳治生有進不行侵人有益於親賓婚比鄰孝者還報不忘其恩是之善者也父母之年不可豫知為作儲待減省小費歲歲有餘藏不見之處勿使長吏及小吏聞知因緣徵發盡人財産為孝心未盡更無所有父母年盡無以餉送復為不竟孝之意行孝之人思成其功功著名太上聞帝廷州郡所舉一朝被榮是非孝所致耶子孫承之可竟無極之世此念恩不忘為天所善天遣善神常隨護是孝所致也其家一人當得長生度世後生敬之可無禍患各以壽終無中夭者是不善邪善之中所致何所不成何所不就何所不得何所不通乎努力行之勿以為懈倦也是善人之福也孝善之人人亦不侵之也侵孝善人天為治之劇於目前是為可知欲知善之為善也知孝之為孝也苦不能相效也是出自然天與善籍善孝自相得傳相勝舉亦何有極心善孝之人人自從崇之亦不犯剋人流聞八遠州郡縣長吏有空缺相補豫知善孝之家縣中薦舉長吏以人情欲聞其孝善遣吏勞來又有用心者以身往來候之知聞行意薦之歲歲被榮高德佩帶子孫相承名為傳孝之家無惡人也不但自孝於家并及內外為吏皆孝於君益其忠誠常在高職孝於朝廷郡縣出奇偽之物自以家財巿之取善不煩於民無所役郡縣皆慈孝五穀為豐熟無中夭之民天為其調和風雨使時節是天上孝善之人使不逢災害人民師化皆食養有順之心天不逆意也是善尤善孝忠尤孝遂成之使天下不孝之人相效為設孝意有大命赦天下諸所不當犯者盡除并與孝悌力田之子賜其綵帛酒肉長吏致敬明其孝行使人見之傍人見之是有心者可進愛有善意相愛此皆天下恩分使民順從此本善致善本孝致孝本不孝其末不孝本惡其末惡善者其願皆令其壽白首乃終上至百二十下百餘歲善孝所致非但空言而語也不但天愛之也四時五行日月星辰皆善之更照之使不逢邪也其善乃如是可不重邪天生人民少能善孝者身為之獨壽考復得尊官皆行孝所致不但祐言故出此書以示生民其欲法則者天復令壽可傳子孫相保書出必當行孝度世孝者其次復望官爵天下之事孝為上第一人所不及積功纍行前後相承無所有失名復生之人得承父母之恩復見孝順之文天定其録籍使在不死之中是孝之家也亦復得增度上天行天上之事復書忠孝諸所敬為天領職榮寵日見天上名之為孝善神人皆為神所敬有求美之食先上遺其孝行如是無有雙人其壽無極精光日增上見無極之天下見無極之地傍行見無極之境復知未然之事諸神皆隨其教令不逆其意共薦舉白太上之君見其孝行無輩著其親近內外神益敬重之故言天所愛者諸神敬之天所憎者諸神危之是為可知餘者各自用意自擇其便從其所宜書辭小息且念其後得善復出不令遺脫九君太上親訣第一百九十三惟太上之君有法度開明洞照可知無所不通豫知未然之事神靈未言豫知所指神見豫知不敢欺枉了然何所復道太上之言何有不動乎人同敬畏心不悉行是且得知不照其意所以然者太上皆神所生所化當生當活皆可知神録相次道其尊卑何有不從者乎九皇之上則九君九君者則太上之親也各有所行恩貸布施諸神從者諸神敬其所為靡有不就者也小神食不能知九皇之意何言俗間之人乎心聖耳聰財可觀其文章祿策當直録籍文辭自生精光皆以金為簡銀成其文章此簿在天君內中極有副其餘曹文書辭皆以奏簡自生文章精神隨字名之光明每有語言輒照有所知不逆所言神人真人得天君辭便具言神人上下皆知民間天君知神所言不失文墨規矩之中自然之道何所不知何所不化動錯自無所私飲食天廚衣服精華欲復何求是太上之君所行也大神小神自有所行皆相畏敬不敢有私恣意見所從求動搖有心之心知其所為可成以不惑迷其意使其人各隨至意言汝皆受於仙籙壽得無極金銀紫文之綬封侯食邑復賜綵帛金銀珠玉心想所得是非神仙道知人堅與不或賜與美人玉女之象為其作色便利之志意不傾復令大小之象見其形變意相隨念其後生此為不成之道或作深山大谷中多禽獸虎狼之處深水使化人心或有蟲毒之物使其人殺之或恐不敢上高山入大谷深水之中亦道不成是象戒人是在不上之中殊能堅心專意見迷惑不轉志堅隨其入出上下深山大谷之中水深大心不恐懼見其好色志不貪慕家人大小之象更相拘留不隨其人言但得生道進見太上盡忠孝之心無所顧於下是為可成戒大衆多取其要文天亦信善人使神仙度之也其人自善天何從欺之所以有欺者其人狐疑強索神仙無益之用無功而求安何從不見欺邪是天重生愛其情尤志堅念生要三明三明者心也主正明堂通日月之光名三明成道心志自不顧亦有録策不可強求白日升天之人自有其真性自善心自有明動搖戒意不傾邪財利之屬不視顧衣服粗粗衣才蔽形是升天之人行也天善其善也乃令善神隨護使不中邪天神愛之遂成其功是身行所致其人自不貪世俗大營財物天知其至意按次簿名真自有善星其生日時自不為惡天復善之貪化以助天君治理天上文辭使通徹行無私隱見行有歲數上竟榮簿有生名可太上之意能説其功行助其不及是亦神當所擁護也天信孝有善誠行無玷缺故使白日輒有承迎前後昭昭衆民所見是成其功使人見善白日之人百萬之人未有一人得者也能得之者天大神所保信也餘者不得比尸解之人百萬之人乃出一人耳功有大小更相薦舉其人當使天愛重之內為得太上腹心薦舉其為有信效各成其功名是不善邪天君出教之日神不枉其言是天君得善信效深知未然不可有毛髮之欺皆令壽命盡少盡小解於後復念語未卒意者復念道之不孝不可久生誡第一百九十四惟古今世間皆多不副人意苟欲自可不忠任事所言所道樂無奇異見人為善含笑而言何益於事輕言易口父子相欺當目無聲背去隨後而言或善或惡不可法則無益世間世間但為塵垢言談自動無應善書者心言我善行不相副無有循穀語言浮沈不可信驗名為不慎之人何可久前不可與善心有志之人等乎求生難死之人不欲見是惡人而不自知以為我健少能相勝者反晨夜候取無義之財而不攻苦得之以為可久在中和之中與人語言也傍人見之非尤其言神靈聞知亦占其所為動作其心知其惡不能久善還語天神言中和有輕口易語之人不能久善須臾之間惡言復見無有信效但佞偽相責何益於人令食諸穀衣繒布隨冬夏易衣服食欲快口衣欲快身巿有利入不肯求之而可養老親明旦下床未知所之衒賣所有更為主賓酒家箕踞調戲談笑歌舞作聲自以為健交頭耳語講説是非財物各盡更無以自給相結為非遂為惡人不可拘絆自棄惡中何有善半日之間邪無益家用愁毒父母兄弟婦兒輒當憂之無有解已攻取劫盜既無休止自以長年復見白首不知天遣候神居其左右入其身內促其所為令使凶當斷其年不可令久其揚聲為惡不欲止上至縣官捕得正法不得久生與死為比安得復生或為鬼神所害父母念之常見其獨淚孤相守無有輔佐之者老更棄捐飲食大惡希得肥美衣履空穿無有補者是惡之極歲月年長空虛日久面目醜惡不象人色如是為子乃使父母老無所依親屬不肯有之此惡人之行滅乃上親屬患之名為蔽子死不見葬無有衣木便見埋矣狐狸所食骨棄曠野何時當復見汝衣食時乎是為可知善惡之行人自致之何所怨咎乎天下之人何其甚愚不計其死生之間殊絶矣生為有生氣見天地日月星宿之明亡死者當復知有天明時乎窈冥之中何有明時愚人不深計使子孫得咎禍不可救殃流後生是誰之過乎人不化自致亡失年不當善仙士之行邪動作言談輒有綱紀有益父母使得十肥衣或復好面目生光是子孝行力非惡人亦獨不當報父母哺乳之恩邪為子不孝汝生子當孝邪汝善得善惡得惡如鏡之照人為不知汝之情邪故有善惡之文同其文墨壽與不壽相去何若生人久視有歲數命盡乃終後為鬼尚不見治問惡人早死地下掠治責其所不當為苦其苦處不見樂時是為鬼何以獨不有赦時是惡之極為鬼復惡何所依止家無食者乞丐為事逐逋亡之氣自不可久地下亦欲得善鬼不用惡也如是宜各念善不失其度才可矣不者亦欲何望乎人當同其計策與生同願天不善之邪而反為惡乎惡行之人不可久視天地日月星辰故藏之地下不得善鬼同其樂得分別也文書前後復重者誠憎是惡人不可久生耳性善之人天所祐也子孫生輒以善日下無禁忌復直月建日月星光明之時用是生者何憂不壽乎是為善行所致也善惡分別念中可行者自從便安天不逆人所為也念之復念之思之復思之可前可卻自不貪生者無可奈何也書辭可知分明疑之自令苦極念生勿懈致慎所言辭復小止使念其後有不滿意乃復議之見誡不觸惡訣第一百九十五惟夫聖德之人各有所言各有所語各分別其能各自第其功各成其宜使有可信而重天言使天愛人而有盛功得天之腹心是聖德之願也夫人皆欲承天欲得其意無有怨言故令各從其志勿有非言而自可是為富得人情使報信同其知慮而從所宜人居世間大不容易動輒當承所言皆不失其規中而不自責反怨言人言是為不平行之各有怨辭使天忿怒而不愛人言壽命無常故天下有聖心大和之人使語其意令知過之所由從來各令自改乃為人壽從中出不在他人故言司命近在胸心不離人遠司人是非有過輒退何有失時輒減人年命為知不相善之人欲聞其戒使得安靜過失之間使思其意令其受罰亡年不令有恨天大寬柔忍人不一朝而得刑罰也積過纍之甚多乃下主者之曹收取其人魂神考問所為不與天文相應復為欺欺後首過罪不可貸是故復勑下曉喻為説行惡災變所致使自改耳不用其言亦安可久久在民間為人乎故分別善惡各使不怨耳天為設禁使不犯耳而故犯之戒命於天神可以久與人等也作行如此為使人不死之道乎中為天無所知邪俗人之行不可採取乃如是安可久置中和之中使食可食之乎而反善神所護年盡乃止無中天人時是善之證也為善日久何憂不盡年壽乎是為可知人自不能力為善而自害之是惡之人何獨劇自以為可久與同命不意天神促之使下入土入土之後何時復生出乎地下復相引浸益亡尸是復不得天福之人可復計邪行且各為身計勿益後生之患是為中善之人不者欲為惡人也天所不祐地不欲載致當慎之勿有愆負財得稱人耳可為父母子孫得續行恩有施可復得增年精華潤澤氣力康強是行善所致惡自衰落亦何所疑從今以來當詳消息善惡分別念中何行者自從便安天不逆人所為也念之復念不順作逆而求久生是行當可久見於天神日月星辰安肯久照為天神所祐而爭欲危之是誰過乎不當是善行孝順之人邪輒有祿位食於司農久復子民使上下相事是民之尊者也是善所致惡自不全身相去幾何乎視其試書不用其言自快可意而行是為人非乎有惡不能自化有孝善有忠誠信之心而望天報有病求愈作惡過多無解時為可久貸與不故作此文欲使俗夫之人各不怨其得罰耳念生求活之人自不為惡行而亡其年也得書見誡使知避禁不觸惡耳如是能自改為善可得久見天地日月星辰與人比等是不善邪而反不惜其命以為死可得復生如人知不自知為惡自以為可也談語欲與人比等衣食與部人同是為可久不乎畏死之人不敢犯此誡文是亦祿策所致其人相薄少可宜直命當直之何所顧乎行各自慎努力念所行安危之事書誡亦自可知也天書文欲使人為善不欲聞其惡也故自命簿不全耳無可大怪也詳復思之勿懈也天有生籍亦可貪也地有死籍亦甚可惡也生死之間不可比也為知不乎知惡當慎自責不可須臾有亡其年壽甚可惜也與人語言發聲為善行得人心意是天善之無出惡言而自遺咎同出口氣正等擇言出之無一小不善之辭可得延命殊能思行天上之事得天神要言用其誡動作使可思可易命籍轉在長壽之曹宜復各修身正行無忘天之所施宜置心念報施大恩乃為易行改志天復追念使不逢惡可信天書言可得生治不用書言自不全擇其可行乃行之不強所為各且念身善惡天稟其性勿有所嫌疑也宜不欺善而惡人得福也是言者明白何有所疑乎神仙之人皆不為惡者各惜其命是善之證也書所言約勑前後道人之所願為道善惡使思之耳不用而自己勿自怨自怨者但當知怨身少知而窮老乃極自咎之耳餘者自從其意如欲貪生不當有惡故使自思知其苦樂樂獨何人苦亦何人亦宜自念勿有怨辭勿妄輕言出氣令可思思生為善故丁寧相語者令語言可知不失天規矩行成自然之道何所不成何所不化人皆迎之是天自然之恩非邪念下愚之人不念受天大分得為人自以當常得久也亦不意有巫靈之神者當止勿犯非也書辭非一念之復出文辭有副故置重誡顧其不及用書念生為善為有活望復有惡言不順者被踈記不息也慎之且止止復有所思思後不足不滿意者復申理不可不祠訣第一百九十六惟世俗之人各不順孝反叛為逆競行為不忠無信之行而反無報施之義自以成人久在地上也所説所道未曾有小善有惡之辭而反常懷無恩貸之施自盜可意而行不念語後有患苦哉此子不是在世間無宜少信強愚自以得人心意其念出言不可採取難以為師法無所畏忌而功犯非歷邪自以可意不計其命不見久全動作出入不報其親不復朝夕夷狄相遇此獨何人從所出生略少其輩飲食不用道理未曾了雪當亦無知之人比六畜生死無期口亦欲得美衣欲得好天當久活汝不汝行不可承用亡亦其行當可用不使天忿怒無有喜時當愛汝命令汝不死乎所為皆觸犯不當如故為之是為自索不欲見天地日月星宿人民生口之屬耳天有誡書具道善惡之事不信其言何從乎欲得見久視息乎中為不如六畜飛鳥走獸有知邪是愚之劇何可依玄但作輕薄衒賣盡財狂行首罰無復道理從歲至歲不憂家事遊放行戲殊不知止思不出中自不可久此人亦因父母得生其行反少義不見盡忠孝有順無逆之意是天當置汝使眼息不死也死中有餘過并及未生之子念其作禍之人雖以身行惡而亡其年使未生不見有算活望作鬼復死不足塞責是惡所致非乎何得自在而見活乎昨使當出生者怨是非過邪何為妄言而久朗乎天下之人何不自責而使過少積過何益於人身乎但有不全人命耳不當思之邪何為自益禍乎是為可知也人居世間作孝善而得壽子孫相續復見尊官重祿是不作善為孝所致邪自無善而不顧後有患此為大逆惡人更為無等比不休息乎父母生汝時欲聞其善寧欲聞惡聲聞老親耳邪兄弟相憎未曾有樂時各自責過負而反自用不為善是為不可久行無益於天無益於地無益於人無益於四時五行日月星之明其人甚惡欲何希望不當仰視邪以為天不遣凶神司汝為非乎不當自怪所求所為既無可恃但日有衰病死不絶邪天亦何樂殺汝乎衆曰汝無有逋須臾之間故殺之或使遭縣官財産單盡復續怨禍汝行之所致不乎何怨於天而呼怨乎俗人乃如是欲復犯天自理何益乎久逋不祠祀神官所負不肯中謝所解所負解之常以春三月得除日解之三解可使文書省減神官亦不樂重責人也迫有文書上下相推何從民人之言貧困便止不竟所為乎生時皆食有形之物死當食其氣而反不食先人自言生子但為死亡之後既得食氣與比等而反不相食生子如此安得汝久有子孫相視乎亦當亡其命與先去等飢餓當何得自在天官重孝順當祠明白何可所疑死後三年未葬之日當奉禱賽不可言地上有未葬者而不祠也不食益過咎子孫無傷時也是為可知當祠常苦富時奢侈死牛羊豬豕六畜祠官浸踈後當見責不顧有貧窮也財産不可卒得行復無狀財不肯歸便久不祠為責安可卒解乎宜當數謝逋負之過後可有善子孫必復長命是天喜首過其家貧者能食穀知味悉相呼叩頭自搏仰謝天天原其貧苦祠官假之令小有可用祠乃責是為天所假頗有自足之財當奉不疑也不奉復見先人對會祠官責之不祠意使鬼將護歸家病生人不止先人復拘閉祠卜問不得得當用日為之天聽假期至不為不中謝天下地取召形骸入土魂神於天獄考更相推排死亡相次是過太重故下其文使知受天誅罰不怨可轉相告語可令不犯先古已有書犯者不絶以棺未藏者不可不祠也今故延出文因有心之人書解其意勿疑書言尚可得生籍疑不行死日有期自消息勿復怨天咎地也行書小息念其後思惟文言知當復所行復道之天報信成神訣第一百九十七惟有進善求生之人思樂報稱天意令壽自前目見天上可行之事曰亦奉行天之所化成使見久生之文變化形容成其精神光景日增無有解時是有心志善不忘天恩報施之士何時有怨解息須臾之間心自剋責幸得為人依迎天得成就復知天禁使其遠害趨善不逆神靈見善從之未曾不自責時悔過從正思念其意常不敢自安自疑念之為善曉天知意具足可知亦無所疑自責悔過積有日數既蒙福祐承奉天化使不見危自知受天報施何可有忘須臾之間息恐神靈非尤所言故懷悵然未曾自息貪進所言欲承天意恐有失脫故復洗心易行感動於上欲見升進貪慕其生實畏短命之期恐久不見於天地竭力盡忠思其誠心數聞神言不見其人心內不自安常齋惶懼日夜愁怖不敢自安用是之故不敢廢善而就惡施人皆得飲食仰天元氣使得喘息復知人情自知受天施恩輒當報謝何有疑時天生人精地養人形使得長大使得成就見天書戒視其文辭不戰自栗何有負言心常怖悸何有安時唯天大神時哀省原數見假貸心知不以時報大恩唯大神使見覆哀久見常在生氣之中久活前年之壽不敢忘大施之分恩貸畢足不敢解忘須臾之間而背恩也唯大神成之使見天神與其語言思聞復戒重天所言唯蒙有報乃敢自信大神報有善心人言天君常愛是有心善之人於天有用輒進自今有心善之人自陳前以達白天君承用所舉聽勿疑必當如前所言是自天君所敢前也歲月垂至努力信天所言天亦信有心善之人自不在俗間也簿文內記在白日升天之中義不相欺天君欲得進善有心不違言是其人也諸大神自遙見其行雖家無之日前以有言宜勿憂之常念與天上諸神相對是善所致也宜勿懈倦也有心善之人言生本無升進人期心報大神求進貪生欲竭所知何敢望白日升乎舉選當得其人生不敢當之恐見為大神所非蒙恩自僥幸得寵為得恩分畢足但惜未及重報施唯大恩假忍蘇息之聞大神言前比白生意進之天君輒言有心善意是其人也天君自欲親近之不使有疑也恩施不在大神也何須道報乎宜復明所知必為有報信心謝懇惻而已必使諸神相護不令邪神干之也致重慎所言以善為談首書意有信相與要不負有心善進之人言也天自日夜使神將護之餘無所疑相命沮觸之書必先人承負自辭勿用為憂有心志善之人言本性單微久在俗中恐不能自出俗世之間慕大神之恩寵遇使見溫誠自知唯大神白天君才使在不死之伍中為何敢望白日乎大神言天君信有心進善之人教無有二諾無所狐疑是自天君意也雖念家不足飢寒並至自有天廚但仰成事神自師化其子無以為念也生主受分之後何時忘大神所言乎憂不成耳不敢失大神枕席常在心鬲不敢解也大神言辭乃如是天君知者善自得善有心自得天君心意前白事見天君天君勑大神言前日已白此人當升之日勿令失期竟有符在心前徹視神自語為信變化以有日期但日夜念之勿懈也生言受勑之後何敢懈邪唯蒙成不大神言須書有符自相見也不憂不得天壽也不但大神邪諸神皆言善是有心之人諸神憂之但仰成辨而已生言是大重如使如願必親心恭而已大神言是亦其人願所當承心而言天君重其家使無入大過承負輒解之勿信神象卜工之言是卜不能有所增減欲度活人者要在正神雖有小神之踈上自解之亦勿狂為不當所行也是自有心有道之人所知也且各為身計信天言天自不欺有心進善之人也雖知惠常念無有忘時聞邪神自下無有心志之人持身不謹復念非常故邪下之使不安或惡會無成功此書亦不信惡人惡人亦不信此書會有效用有報得報信之後乃為可知也今當有信知進善之人書神自欲見報信得用不信無有心進善之人欲所得也行書辭已可知見信有驗亦自不久何以明之其人自樂生者天使樂之是天報信其人必化成神必以白日不疑日自輕食日少為信精光日益親近其人是信也明之明也且勿有疑生言見誡受勑請如所言思惟念之不敢懈有忘也雖生素不知會見之後益親無異大神言善善亦當惠成名宜卒竟其功是神常誡也書語雖多重生道故多耳勿怖之也語且有止各還有言有心志念之言唯唯不敢有忘也有功天君勑進訣第一百九十八惟思古今有大誠信之人各有效用積功於天乃敢自前動作止進未曾有小差之惡常懷慈仁之施布恩有惠利於人衆不有失小信而不奉承天地隨四時五行之指歷助其生成不敢有不成之意而自危身令不安故自剋念過負恐不解除復為衆神所疏記而有簿文聞太上也以是故敢有安時也今古相承善惡相流何有絶時乎故自沈靜未嘗有懈而忘天之所施為也但自念求德之人以心自況見人有善心為之欣然見人有惡心為之惶懼想天神知之各有所進復自惟念本素生於俗間心常思樂大化貪慕生道去離死部戀牢精光貪使在身使自相愛心乃可安不者恐見不在常見之中唯諸天神時原不及教其進退當承天意不可有失而小不善聞於太上之君耳故因諸神求知曠問唯蒙不逆使不見疑為受一子之分勢不敢有忘絲髮之間唯原省念所言思見天誡以成其身不使陷危是諸神寵恩之日不敢有休息而不自念報重之大恩也諸神未白天君聞知被遣當直之神承教見之其人言所動搖云何具問其意使諸神問之還白日言中和之民自道善行積功日久貪慕久生自薄説常自垂念恐有愆負未嘗有懈息之意為諸神道其功效諸神使白各且相謂曰此有功效德人自於中和中念當報天大恩積行為善日久欲因諸神自道功德各懷狐疑不敢進白天君常屬諸神見信有功於天有者進之而諸神占觀其行日久何故不白諸神皆懷懼而言本素不知此人來恐不大精實且各消息其意不知天君聞之是諸神各無所主正見善有功之人而不時白道之使者遣使神考積其行大有功是諸神各為無狀各無有功善而齊外心以為天君不知諸神各解辭令自何用者有益而已各自安乎謝諸神各以識事免冠謝言小神奉職各平盡忠誠之心而得問是罪無狀待死於門天君出教日且待於外須勑諸神伏地自以當直危立也教日勑諸神言天君欲不惜諸神且未忍相中傷教謫於中和地上在京洛十年賣藥治病不得多受病者錢謫竟上者著聞曹一歲有功乃復故諸神見天君貫不死之罪才得薄謫誠自知過失自以摧折不望其生不忍有中傷之意復以事謝天君言告謝曹吏便下勿稽留時使神行卓視之曹白使遣下如天君教天君勑曹復告大神視其文辭令諸神見之曹以文傳視大神下所部各順其職見有功善貪進之人當進之前有事具白可知天君勑大神曰輒早觀此人與使神語言相應與不也大神曰被使往視其人積其日數視功效還白日被勑教視中和有功人還白如使神言天君亦如是有功之人而諸神所部不時白天君覺知乃道其意是不勉邪哉得簿謫於中和自今以後可以為誡有功不白天君聞之受罰自身之謫各慎職遣神導化其人使成神增其精光為視簿籍使上無者著其姓名上之大神受教還於曹視簿案其姓名有此白言曹文書有此文請案天君內簿知相應與不天君出文視之與外書同勑便上大神言不審年滿未請還諦案之天君謂大神安置耳目而不盡視之而言還案乎大神以職事謝天君言趣案疾還大神則案其人年已滿失脫不白無狀當坐伏須辜誅天君言且冠視職復勿懈因召其人上之勿失其效小職知所致奉功唯唯請如天君出教諾之大神且上其人署小職觀望其行日月尚淺請復情實有大效信真有缺者署之補缺處天君言當知大神所白勿有懈意大神言唯唯請使使神往卓視之天君言善不用書言命不全訣第一百九十九惟天上有聖明之人皆有部職各盡忠行不負於上各盡筋力所為作亦不失意皆豫知天君所施為常傾耳聽欲知其意常視儲曹文部別令可知顧君呼召無時不敢私出公事乃行輒關意相白乃敢出所周所遍被敕當所案行不敢留止須臾之間奉功私乃敢有所言誠相歸自不敢施私所不當全其命不惜晨夜而自責常恐有無牢之用各自該理其身欲副太上之意何時敢懈恐失其宜效日自進不須神言乃而欲自成欲得久視與天上諸神從事無有大小皆相關知可承行不義不自專恐有嫌疑動輒相聞何有息時所以然者人各有志各自有所念各有所成其計不同各有所見各有所出生各自欲有所得各知其所心乃了然是曹之事要當重生生為第一餘者自計所為生氣著人身皆不相去相守相成神亦貴得其名變化出入無孔之中小大自在俗夫之人不見神形容神神自相知形容皆氣所成何有不就者乎大神小神精光增減輒自有差其壽增九輒有其年大化行善壽亦無極上則無上下則無下出入無間無表無裏象如循環欲止自止欲行則行呼吸成神光景榮華上下有期得當行便以時還亦不可自在迫有尊卑各相為使各有簿領各有其職宜有其心持志不違明其所為各見其功各進所知無有所私動輒承教不失教言而精進趣志常有不息得勑乃止是生神之願輒有符傳以為信行諸所案行當所稟食勿過文書隨其多少天上傳舍自有簿領不當得止者勿止是天君常教勿妄恐守傳之吏以威勢也官有尊卑不可強詐稱大位而稱久止傳舍吏輒受天君勑有過傳舍上其姓名官位所屬不得有隱欺天君亦自知之何得為相私明各如其平乃得上不用令勑簿書數上是復亡失精光其壽損減是為可知宜當慎時無敢自從而不承上之教也天上之神更相案舉亦無息時後進上下人當知是禁聖明之人自不犯之恐後進上之人不見其戒故天下文使知防禁是天君大恩恐有犯者是天君欲成就善心之故視其文并語俗人俗人雖少知中和之間各有禁忌文書天下中和民間道上佃夫阡陌聚社廬宅官舍門戶井竈刑德各主其事不可有惡復見疏記簿其姓名積衆多聖明理之事更明堂天君得知復減人年上至死亡可不慎乎數下此文者後生之人不信前言故復因有知慮之人不犯禁者出之令俗間知之而不用書言命不可得全也惡籍纍積日多少有減時故先命勑書誡勿使相犯犯之命薄不疑也當順書言小過尚可救解大過安從得貰乎誡文非一卷宜當重慎重慎天文不可自在也有知之人少有犯者時有失脫天亦原之不著惡伍為惡不止與死籍相連傳付土府藏其形骸何時復出乎精魂拘閉問生時所為辭語不同復見掠治魂神苦極是誰之過乎同從人生何為作惡行各宜善自守天稟人壽不可再得作惡年減何有相益時乎此時當所主天君取信不敢脫人惡行令得久生也為不知乎書前後相戒者既民不改令人欲盡年耳不欲為善自令不全亦奈此人為惡不止可書辭小解且念其後如有不備乃復念之大壽誡第二百惟有志之人心不迷亂奉天之化當所師導各使從其願乃為隨心衆萬二千物皆生中和地中滋生長大皆還自覆蓋蔭其下本根其花實以給身口助其穀糧使有酸鹹醋淡自在化水為鹽使調諸味以豆為豉助鹽為味薄厚自恣菜茹衆物當入口者皆令民食之用其溫飽長大形容子孫相承復以六畜不任用者使得食之肥美甘脆之屬皆使食是天使奉職之神調和平均使各從其願不奪其所安是布恩施惠民非乎奈何天所施而不求報乎天何時當求報施乎但平民受大恩而不歸相謝故求之耳天食精華氣自然不必須民報謝辦也貴其意耳而反不念天氣所生成令得食之是民中有知不報乃如是自以職當天使奉職之人案行民間使飛蟲施令促佃者趣稼布穀日日鳴之使民用其言家無大小能食穀者晨夜盡日相勸及澤布種天為長大時雨風搖枝葉使動成其身日滿當熟以給人食恩不重邪從歲至歲何有極時而反齊不作孝順有逆之心何益於天久養惡人使見可食之物乎中為天無所知邪何為當久養不孝惡逆之人乎故置凶神隨之不孝惡逆之人移令人重禁罪至禍重不見貰時想民當如是何為犯之自致不壽亡其年命乎不當視孝善之人獨得壽有子孫乎善惡當相比不壽與不壽為有比不生之與死當相懸不行作善有孝慈使各竟其年或得增命子孫相次無中夭時天用是為善孝之行所致不當比之邪何為作非邪施於人乎天甚憎惡之輒使絶命子孫得咎是惡所致欲何所望天喜善人不用惡子宜思書言其文具足可以自護必得天福可無久苦自愁令憂滿腹復有憂氣結不解日夜愁毒大息念在錢財散亡恐不得久保疾病連年不離枕席醫所不愈結氣不解計念之日夜羸劣飯食復少不能消盡穀五藏不安脾為不磨是正在不全之部短氣飯食不下家室視之名為難活有錢財家頗有儲侍無錢財産殫盡內外盡貧不能相發死命以至不見棺木畢埋土中須治生有錢財乃當出之相貧之家財去人走何時可合家室分離不能復相救遂不見棺木為無棺槨之鬼浮遊無家亦無復食之者死為鬼餓乞求食無有止時是惡行所致而不自知亡失宗族嗚呼痛哉死無所依是過積禍之人自致無門戶後世天甚復傷之故使復有遺腹子未知男女兒生未大母去行嫁至年長大問其踈親我父母何在親言汝父少小父母不能拘止輕薄相隨不顧於家劫人強盜殊不而自休止縣官誅殺遊於他所財産殫盡不而來還故鄉久在異郡不審所至死生不可得知也諸家患毒親屬中外皆遠去矣汝母懷妊時見汝生有續心中復喜家長大人無所依止貧無自給使行事人隨夫行客未有還期遺腹子言人皆父母依仰之生我獨生不見父母至年頗大問父所在人言汝父行惡遠棄父母遊蕩他方死生不知所在無有往來者聞言已死不知所在父母憂之發病不起遂不成為人財産殫盡外內盡衰咎在餘親希踈素無恩分不直仰天悲哭淚下沾衣父有惡行自致不還於處身自過責無有解已時以行客賃作富家為其奴使一歲數千衣出其中餘少可視積十餘歲可得自用還故鄉招藏我父晨夜啼吟更無依止甚哉痛乎父時為惡使子無所依止淚下如行自無乾時天大哀傷常使強健治生有利使取妻婦復有子孫心乃小安耳復為其子説之我父行惡遠在他鄉不還時往人去者卜工問之殊死生不知所安所在招藏之有歲數去行治生天哀窮人使有利入頗有少錢因求婦相助治生因有汝耳我疾我父少小時為惡故誡汝耳從今以後但當善耳勿效我父遠之他所故復思我過天哀我耳汝努力心為善勿行遊蕩治生有次勿取人財才可足活耳各且相事無妄飲酒講議是非復見失詳思父母言可無所咎天上聞知更為善子可得久生竟年之壽為汝作大以是為誡諸神聞知上白於天天令善神隨之治生有進財復將增生子遂健更為有足是天恩也春秋節臘輒奉天報恩既不解努力為善自得其福行慎所言復自消息天神常在人邊不可狂言慎之小差不慎亡身見誡當責身勿尤他人也此戒可知也欲得大壽者勿失此戒言病歸天有費訣第二百一惟人居世之間各有所宜各有所成各不奪其願隨其所便安自在所喜商賈佃作或欲為吏及所醫巫工師各令得成道皆有成以給民可用是天師化何有不就使自給口當念奉天所行恩分之施四時之報皆使不絶香潔而已是為報天之恩行善日久神靈所愛是善行所致何有不從者乎故天常為其上司人是非使神往來知人所為善惡輒白何有失者知知少以為不然故天為視其影響使聞音以是為效風雨遲疾皆使可知何有疑者動作輒異文墨相承亦不失其法人亦當知可不安得自恣而不順天乎天親受元氣自然從其教令不敢小有違之意恐其有失而民所為功犯天法不避羅網是為故天命以自誡為當久生可與善人等也中為人得自在邪故使神隨惡行人之後司其不當所為輒以事白過無大小上聞於天是自人過何所怨天書書有戒而不用其行得病乃惶豈可免焉誠民之愚何益於天使神勞心煩苦醫巫解除欲得求生不忘為過時當為惡時乃如是何不即自悔責已病乃求生已後之多亡所有禱祭神靈輕者得解重者不貰而反多徵召呼作詐病之神為叩頭自搏欲求其生文辭數通定其死名安得復脫醫巫神家但欲得人錢為言可愈多徵肥美及以酒脯呼召大神從其寄精神致當脫汝死名籍不自致錢財殫盡乃亡其命神家求請滿三不下病不得愈何為復請事禍必更有禍責在其後邪神稱正神狂行斬殺不得其人而殺之咎怨訟上至天天君為理之殺事神之家子孫坐為病者求福欲令為求生呼召不順反受其殃事邪神之家自言我神正神者教其語邪神精物何時敢至天君之前而求請人乎但費人酒餔棗饊之屬得病反妄邪神之家得愈者謂在不死之伍中事未上過可得蒙愈此天自愈之邪神之家何得名之而言多愈人病乎而責人肥美見邪神所為則召令上之考問藏罪藏多罪大便見不活事神者神不往來人復不中精神日竭是邪神自其殃神家得邪神餘物以給家口肥美好衣自以可久神嘗坐之何望得活而壽乎受神藏多不可復貰并亡其子孫反言其過殺我子孫或身亦望久久亡戶人日當自正可勿咎天今世之人行甚愚淺得病且死不自歸於天首過自搏叩頭家無大小相助求哀積有日數天復原之假其日月使得蘇息後復犯之叩頭無益是為可知努力為善無入禁中可得生活竟年之壽不欲為善自索不壽自欲為鬼不貪其生無可奈何也行慎所言辭樂知餘者自計勿枉所為有病自歸於天可省資費無為大煩反舉家怔忪避舍遠處當死之人遠何益凶神隨之當可得脫不乎愚人為行乃如是寧能使命在不死之中可勿過也舍不殺人家自衰耳天神在上占之欲何所至乎中為不知汝處邪且慎所言天致愛人欲使人生何時欲害殺人故施禁法使人不犯之耳而自犯之壽命從何得前當思之思之復念書言可無自疑書復小止止後念之當所道説者復道之不承天書言病當解謫誡第二百二惟念俗間之人甚獨愚處不念作孝順事而為反逆不承大書言而苟自薄與人既無善而惡數聞處者致災中者衰落下者見病無有休息是為惡施於人令咎不容無有施恩之意日夜行侵剋善人令使自怨無有善意相待而反自策陷人入罪名使得有刑罰高至死亡而訣其主有財之家能自解酒無錢觸法教吏呼召亡費解之齎家所有皆有價數乃為解之分半自得以給家口美酒善腅恣其所得於意乃可不知人當從傍平之所為惡也自以可久而與人等縣君嚴者使人司候效功之吏當有報應晨夜司之欲得其為惡主默踈等輩為誰徑至門閣內刺合箋道其姓名為吏受邪簿主為間人道其短長酒肉甘肥常不離目下君得箋書默召其主為置證左使不得詆罪定送獄掠治首臧人復言之并加其罪聞亦然錢財小故不自努力周進治生有利而反賣舌於人相陷罪名是正惡何復久生長吏所疾令不得生是誰之過乎皆從惡弊人出父母愁毒宗家患毒為行如此亦何所望而欲得久視息哉主作禍罰而望求生此為何人天從上視之言不可久忍下文於主凶惡之曹遣吏從惡鬼佐助縣官治無狀之人使入死法不得有生之望是皆貪非一家之財以自增益而坐之得罪定死乃休無續世之人乃使先去者不見享食是汝過非從今以往後生之人見誡當止乃小活耳不者定在死伍之中不疑也慎之小差可無相怨人命不可再得人皆如是何為不從禁乎無狀之人結客合伍劫取人財其主不全縣官未得殺汝天代誅罰上自滅戶下流子孫用是財故而反不生是計何一不純故數出此書文者貴此不犯耳今續犯之尤處故令死亡者多天甚患之故見其人有心知者自不犯之今世俗人了不可曉視其壽書而不用其言以為書不可信用也不當見神仙之人皆以孝善乃得仙耳其壽何極且詳所言同出辭言可令好所為出惡自令得各書前後之戒者但欲使人為善不犯法耳何時相枉乎宜往念思著於五內令可奉行勿非尤於天也非之無益更相令過重慎勿有所恨行自得之何怨咎努力從善乃可為人耳行當自惜無為鬼所咎為知不乎宜各自明其計勿自逐非沒命不足塞責殃禍所歸者多怨憎何有止時持心不密但空言無益世間之用愁毒於人復何用相明使有和順乎自以為賢以化他人為不肖不當自況俱生為人無所照見問之無有相明之意是曹之人皆如六畜但口知臭香衣好禮跪起不可法則常有不録之心見比鄰老人犯倨不起閉人婦女議相刑別其醜好此為惡人無所事作端仰成事口罵呪詛以地無神更相案舉自可而行不念後患將至不及相救救之已晚何益於事但為煩苛終可見理何以自明解其所負衆多人所非作禍不止久至亡家後無子孫不見其壽冤哉此行亦何可久太平之書令下可順其上可得長久不者失命復見難治令世俗人亦自薄恩復少義理當前可意各不惜其壽縱橫自在以為無神隨疏之者衆多事事相關及更明堂拘校前後上其姓名主者任録如過負輒白司官司官白於太陰太陰之吏取召家先去人考掠治之令歸家言呪詛逋負被過行作無有休止故遣病人病人之家當為解陰解謫使得不作謫解得除之不解其謫病者不止復責作之既不解已以為不然觀其所行皆有其人多與少耳是為可知復慎其後勿益其咎乃為有知可使無咎無知自己患福之間未曾休止各慎書言不須相負難為記疏神不休止想人知人而故為耳是不善故之也固善得善惡自不壽何為有恨自得之耳下順其上可無惡子為知不乎戒之戒之可令小息書難為文辭法令開張宜不犯耳書復小解復有小不定文者詳念其後但令可知慎之慎之小事致大文復重故小息耳息後有言復陳説之為父母不易訣第二百三惟有善行之人自不犯天地四時五行日月星辰諸神之禁畏其所施恐犯之輒有上姓名以故自欲為善行孝順之義天地禁書故不欲令民犯之者欲令民充盛何時欲令藏乎設施當生之物使得食之何時欲使相危乎人自犯耳故善人無惡言者各有其文所誡所成分明可知善自得生惡自早死與民何爭故置善人文以示生民各知壽命吉凶所起為道其誡使不犯耳行善之人無惡文辭天見善使神隨之移其命籍著長壽之曹神遂成其功使後生之人常以善日直天王相下無忌諱先人餘算并之大壽百二十其子孫而承後得善意無有小惡亦復得壽白髮相次子子孫孫家足人備亦無侵者佃作商賈皆有利入為吏數遷無刑罰之意善所叔也人不能倣效反倨笑之是善人之心行自善有益於人見人窮厄假貸與之不責費息人得其恩必不負之小有先償酒肉相謝兩相得恩天見其行復善之使其出入無干犯之者行善之人天自佐之不令逢惡是行所致其餘為不善之人欲望坐得壽復有子孫是為不分別故天別其壽殊能行天上之事與天同心志合可得仙度録上賢聖精神增加其壽何極故言善不可不為亦人所不及故天重有善人愛之不欲使有惡也善惡之人各有分部何得二千乎故天書辭具自可知也善者善之惡者戒之欲使不陷於危亡之失其年耳是天報善增其命惡者使下不成人是亦可知也何為有疑乎人從生至老自致有子孫各令長大成就在所喜隨使安之無逆其意各得其宜乃為各從其願為人父母亦不容易子亦當孝承父母之教乃善人骨肉肢節各保令完全父母所生當令完勿有刑傷父母所生非敢還言有美輒進家少財物賕恭溫柔而已數問消息知其安危是善之善也鄰里近親盡愛象之成善之行見有凶惡之人不敢與語言恐相反也相反之後更失善人惡天復憎之故皆自重惜損其子孫慎無犯禁使家不安不但不安也并及家親內外肅動更逢縣官亡減財産故令自慎不違書言能親安和雍雍無有二言各自有業各成其功是大善之人行天必令壽神鬼祐之不敢失四時所奉進各有差序巿價取好不爭價直所以然者夫有所奉進皆有精神隨上下進退小異不潔輒有文墨不有失故順所賈所道乃為恭敬神靈必喜上白司命祠官各部吏安行或自行見其潔香乃享食食後大曾五祖乃於處食食必歡喜家遂富有子孫皆善無有惡子郡縣聞之取召使為有職之吏輒轉入府府有署顯職州復聞知辟召親近舉廉茂才是善所致也行自得之其位必至是亦相祿稟命所得明其為善之徵惡不過其門天上諸神皆言是行尤善但未知天意耳故使善文善人記其竹帛使後生令得貪進遂善家世世有榮子孫不離朝堂帝王愛之常在善職是功自然皆其福所致也故有善者當法此書言取信驗不空言也右天上説孝以止逆亂卻夷狄令下順從易治某訣第二百四前文原缺夫心同意合皆為大樂也苦心異意皆為乖錯悉致苦氣也夫樂者何必歌舞衆聲相和也苦者何必致鬭爭衆凶禍並起相樂者所以厭斷刑也相愁苦者所以致逆也其相順同心何謂乎凡人大小能同其意者必樂也幾類之哉宜復更自精詳其意天上皇平洞極之師為天加一言重解決其意也然未欲大得天地之心意有益於帝王政理者乃當順用天地之心意不可逆太歲諸神同合其氣與帝王用事同喜同心同指同方同運同樞同根同意故古者聖人陳法使帝王春東方夏南方秋西方冬北方者主與此天氣共事也氣同故相迎也是主所謂謹順天之道與天同氣故相承順而相樂主所言和同者相樂也相樂者則天地長喜悅不戰怒不戰怒則災害姦邪凶惡之屬悉絶去矣惡人絶去乃致平氣天上平氣得下治地下平氣得上升助之也如不順樂用皇天后土所順用氣而休廢氣也皆應錯逆逆天地之道逆帝王之氣與天地用意異天地戰怒萬變並起姦邪日興則致不安平凶年氣來故當深知之也善哉善哉愚生聞命矣易曉乎天喜之真人慎之唯唯謹詳記不敢忘善哉善哉天明師既加不得已願聞其春夏秋冬云何哉皆順其氣如其數獨六月者以夏至之日并動宮音盡五月六月者純宮音也又樂者乃舉聲歌舞夫王氣者宜動搖動搖見樂相奉順見奉助也休囚死氣皆欲安靜不欲見動搖即不悅喜則戰怒戰怒則生凶惡姦邪災害矣是乃自然天地之格性萬不失一也當動搖何氣乎願聞之以為法不敢逆一氣是常先動其帝氣其次動王氣其次動相氣其次動候氣其次動微氣此氣皆在天斗前日進欲見助興故動之其餘氣者皆在天斗後天氣所背去氣日衰故不宜興動與天反地逆不合天地之心故凶故天之所向者興之天之所背者廢之是為知時氣吉凶安危可知矣請問今純動五音五音不足不成歌舞之曲如何乎善哉子之言也然但先動故為陰陽者動則有音聲故樂動輒與音聲俱陽者有音故一宮三徵五羽七商九角而二四六八不名音也刑者太陰者無音而作故少以陰害人無音而作此之謂也今軍師何故有音哉善乎子言也然君子有軍師有音但倡樂卻之耳不必欲害之也及怒發且害之時非有音聲起中而已不復相告語也子知之邪唯唯真如是小愚生已覺矣故古者聖人將從樂者左載將從刑者右載吉事尚左凶事尚右左者陽右者陰言各從其類也善哉善哉故吾事為文也隨天為意隨地為理順之者吉且昌逆之者凶也與天不同其意復何所望故夫天乃有三氣上氣稱樂中氣稱和下氣稱刑故樂屬於陽刑屬於陰和屬於中央故東南陽樂好生西北陰怒好殺和氣隨而往來一藏一見主避害也故樂但當以樂吉事樂生事不可以樂凶事樂死事自天格法如此不可反也真人惻慎吾文言唯唯今説音獨説一甲殊不盡説之其餘當云何而悉得知其所盡引哉然宜拘校凡聖賢文各以家類引之出入上下大小莫不相應以一況十十況百百況千千況萬萬況無極衆賢共計莫不盡得故但為子舉其端首不復盡悉言之也上賢見吾文自悉得其意中人見吾文冀可上及之小人見吾文可儀而為之不犯天地之禁各使自生善意盡説之積文多反且眩瞀於文則失其綱紀令其文亂難理故當財示其端首使其自思之耳善哉善哉行吾辭小竟疑乃復來唯唯請問音聲和得其意與不得豈可知邪然可知也帝王之氣以其天數耳帝王之氣得勝教令聲響音得先發是乃比若夫帝王得先發號施令於天下則凡人萬物悉隨之而從天下和平矣有敢不從為反逆則死矣故先發其帝王之氣其餘從矣善哉善哉然不先發帝王之氣反先動發休囚之氣而反當使帝王之氣隨從之為大反逆也此者天地格法也不可強也子知之邪唯唯又五音乃各有所引動或引天或引地或引日月星辰或引四時五行或引山川或引人民萬物音動者皆有所動搖各有所致是故和合得其意者致善不得其意者致惡動音凡萬物精神悉先來朝乃後動占其形體故動樂音常當務知其事審得其意太平可致凶氣可去真人詳之唯唯請問樂音者動引之云何哉善乎子之問事也得其要意然比若春者先動大角弦動甲甲日上則引動歲星心星下則引動東嶽氣則搖少陽音則搖木行神則搖鉤芒禽則動蒼龍位則引青帝神則致青衣玉女上洞下達莫不以類來朝樂其樂聲也説一以求其類無窮極也自精詳索其要意悉自得也與凡書文合之為法式也故舉樂得其上意者可以度世得其中意者可以致平除凶害也得其下意者可以樂人也上得其意者可以樂神靈也中得其意者可以樂精下得其意者可以樂身俱得其意上帝王可遊而無事樂起而刑斷絶精神相厭也願聞樂起刑斷絶意訣善哉子之言也然樂者太陽之精也刑者太陰之精也陽盛則陰服陰盛則陽服故樂盛則刑絶也樂何故為陽刑何音和者其方和善得也音不和者其方凶惡當為之時精聽其音知音者悉知其事吉凶不知音者亦不可知也音聲者即是樂之語談也占遠占近皆當合之日時姓字分畫境界王相休廢更相取合以為談語精者聽之無失也善哉善哉請問以樂除災害姦猾凶惡象天地法為數帝當晏早而動搖其樂器而始唱其聲以解除愁苦之氣而致太平哉善哉子之問法何其常巧也皇天久疾災害憐帝王愁苦令使真人主問凡疑事邪諾諾安坐吾不敢有可匿也匿之恐得天責使吾久被重謫無益於吾天年子安坐詳聽之為子一二分別道其至意夫天道比若循環周而復始起樂也常以時加其王氣建響斗所加方響其面動其音聲人唱之亦可各以其音為之數以六甲五行五六甲五行即天地之數也時氣者即天地之所響所興為也假令立春之日斗加寅名為上帝之時先動大角月半加甲二月斗加卯月半加乙三月加辰也他行效此各次其時氣晏早為其度數先動帝音帝弦次動王音王弦次動相音相弦次動候音候弦次動徵音徵弦各如其數此名為承天之教順地之氣天地乃自樂用之而況於人乎人者最物之尊者天之所子也天乃樂人嚴敬用其數地乃樂人謹順用其數此猶比若孝子之順用父母之教父母安得不愛而好之乎今天故使子來問事吾主為天談為上太平制數不敢有可遣力畏天地之謫不敢欺諸真人不敢有可隱匿也唯不見問問輒言之吾覩真人問事承知天欲語故為子具言真人得吾道深思其意以付下古之人使其象而為之以除群災害之屬上以安天地之氣下以助帝王為治令凡人心安不為邪萬二千物各得其所豈不樂哉大哉大哉諸真人可謂知之矣請問六洞八方之事最何等者為吉善最何等者為凶惡善乎子之問事然詳聽之為子説其意最相順相樂為善為吉相逆相愁苦為凶為惡相順相樂為善聲相逆相愁苦為凶聲故樂者乃獨樂相順樂為善樂吉事乃得作樂凶惡事不得有樂有樂名為樂凶凶日多是故時加帝王之氣相氣微氣皆在天斗前吉事也天地所樂欲興起也天地所共方興用也故當樂之順之昌之也休廢之氣天地所共廢共衰故當廢之不宜興樂之樂之為逆天地心名為大逆不順時氣時氣者正天之時氣也天地為法王相之氣主太平也囚廢絶氣主凶年王相之氣多所生多善事故太平之歲凡物具生多善物是明證也天地之大效也天地之喜善效乃及見於人民萬物以是為大效證驗也故古者聖賢以是深自占相自知行之得失也明以同類同事同氣占相之也得同氣類之象則改性易行不敢為非也天地之語言以此為效不與人交頭言也視象類所得可自知矣夫囚廢死絶氣少所生無成善事是故凶年之歲少可生無善應無善物是其同事同氣也是故將太平者得具作樂樂者乃順樂王氣平氣至也先以道之凶年者不得作樂不得無故興樂囚廢之氣與天地反逆故凶年凶事不得作樂也故王相之氣德所居也囚廢之氣刑所居也故有德好生之君天使其得作樂無德之君不得作樂也是天之明證也真人知之邪唯唯可㤥哉今日具問天明師乃具知天樂意不問之時謂作樂但小事凡人凡事皆得為之也今日問乃後不敢妄動搖也善哉曉事生可謂知文書理長得天之意矣太平至災氣悉去矣謹復重請問心所疑行平言勿諱也唯唯今天地之氣乃半王半休比若晝夜無有解已樂寧可竟日作之邪獨加王鄉有王氣時可作邪但始作之時以其帝王始耳無以休氣始也歲亦然月亦然日亦然時亦然今愚生未及其意然欲樂歲歲在東方卯以春二月乃樂之欲樂月各加其月日者以王日時者以王時如是則可謂得天之道災氣去矣如不若此皆為亂天之紀生凶災矣是故古者聖王深知天地心意不敢樂凶事凶事見樂則凶事日興多興多不可救故不當樂之也天之授性各自有精神樂善善精神至樂惡惡精神至此自然之性也無有怪也但愚人不深計之耳善哉善哉真人欲知其大效此比若天道也諸清淨者樂歸天諸沈重者樂歸地各從其家無可非也故樂善得善樂凶得凶比若水從下火從高不失銖分真人以此書付有德之君以示凡人今太平氣至天興善皆使樂善也不得復有無故樂凶事者也樂凶事者乃與天為仇與地為咎其過不除今天上名此樂凶事者為大反逆之人也天凶氣地中諸咎悉且來下歸之也請問卒有急當以樂樂吉事時不暇待加王鄉斗前當奈何哉善乎子之問事也得其要意然使樂人居王鄉不得居王鄉者令樂人衆人亦向王請之亦以其音亦以其數如但其人姓字舉持律曆音氣相應亦可順其王相時氣而依其人使作樂亦可如此如此者皆為順用天地之教令無災害也如不若此有與凶囚氣合者悉生凶事又舉音倡樂亦當以吉吉音善事夫王相氣比若人之有君王亦不欲聽聞凶事凶言凶音也所以然者王相之氣乃為皇天主生主成善事乃而助天生成也惡音凶事不而助天生成凡物是故王氣不欲樂聞之也斗前之氣皆不欲樂聞之也是故古者聖賢帝王悉積聚善言善事不內凶惡之事名為祅言罪即誅死其罪未足以誅死但惡其祅言不祥耳故殺之也真人豈知此禁重邪唯唯可㤥哉可㤥哉子知早㤥可長存不知㤥死之根也一曰先順樂動天地四時帝氣一事加三倍以樂天令天大悅喜帝王老壽祅惡滅天災害悉除去太陽氣不戰怒國界安而知常先動順樂之者天道為之興真神為之出幽隱穴居之人皆樂來助正也哉二曰先順樂動天地四時王氣再倍以樂地地氣大悅不戰怒令王者壽姦猾盜賊兵革消國界興善下悉樂承順其上中賢悉出助國治地神順養哉三曰先順樂動相氣微氣令中和之氣大悅喜君臣人民順謹各保其處則佞偽盜賊不作境界保故和氣日興王氣生凡物好善四曰慎無動樂死破之氣致劇盜賊又多卒死者國界常危難安致邪氣鬼物甚多為害甚劇劇則名為亂擾極陰之氣致返逆慎之慎之五曰無動樂囚廢之氣多致盜賊囚徒獄事刑罪紛紛甚難安民相殘傷致多痼病之人六曰無動樂衰休之氣令致多衰病人又生偷猾人相欺多邪口舌國界少財民多貧困樂上帝上王相微氣三部今天地人悅致時澤災害之屬除去名為順天地人善氣也致善事樂下三部死破囚休衰之氣致逆災天時雨邪害甚衆多不可禁防也此諸廢氣動搖樂之則致惡氣大發泄賢儒藏匿縣官失政民臣難治多事紛紛不可不戒之慎之也天地凡事有固常法有氣之鄉而向尊者欲見樂無氣之鄉衰死者不宜見樂故樂善者天上名為順政樂惡者天上名為逆令順政者得天力逆令者得天賊得天力者致壽得天賊者致凶咎所以然者天之為政猶影響不奪人所安樂善得善樂惡得惡是復何言夫善惡安危各從其類亦不失也但愚人不計之耳是故樂道者道來聚樂德者德來聚樂武者武來聚樂正者正來聚樂邪者邪來聚何嘗不若此乎故吾深計天之法以戒真人也哉天法不可犯也故重丁寧子唯唯所以三倍帝氣樂賢者帝氣最尊無上象天尊故倍樂之天者而制御地與人故三倍之象天地人也夫天地人見樂興理而萬物各得其所瑞應善物萬二千為其具出矣故先樂之也樂之當詳聽一意端坐長思心中悅喜愈愈然也忠信至誠無有惡意比若對帝王而坐不敢邪僻天應其行祅惡災害之屬莫不悉去因天為尊因帝氣為權自然天述法故致太平不難也善哉善哉所以再倍王氣樂弦者王氣象地地者與人并居故再倍其樂樂地也地與人見樂悅喜而萬物并理得矣又地者卑故其樂少於天也善哉善哉又王氣弱於帝氣卑於帝氣為一等故少之也尊卑相次之法其分自然也善哉善哉所以樂相氣微氣一行者相氣微氣象中和人夫中和人卑於天地故其樂少人者主為天地理萬物人樂則悅喜為善為善則萬物理矣人不樂則為惡為惡則萬物凶矣善哉善哉又人者是中和萬物之長也其長悅喜理則其萬物事理其長亂則其物亂故先樂其長以順樂天地人之道也善哉善哉是故上善之氣最尊善故樂得三重也以樂善也是故古者帝王治得善得天心意者得重樂也是其明證也今太平氣至故教其興樂也衰亂之氣應凶年故不得興樂如興樂名為興樂凶衰天上名之為大逆也災害之本禍之所從起可不慎乎善哉善哉是故其次樂再重王氣不若帝氣故樂少是故治少善者樂為之衰少所以衰少者氣衰不而大善故不敢重多樂也中有凶氣故不敢具其樂也比若人家有七善三惡則心中為之不而樂此之謂也善哉善哉夫七善三惡善多惡少安而止樂乎人心中雖樂時念三惡則不而純樂此天性也乃且盡善無復一憂乃而大樂也故樂以樂善不以樂凶也善哉善哉吾言乃天明券書不失一也是故其次樂一行相氣微氣少所而安人德最少不而若天地氣也故乃微少不而若天地故少其樂相氣微氣少所而化乃其中國固多惡少善故不敢多具其樂也反名為樂凶惡其善少故其樂少也所以少者但樂其中善者不敢樂其中凶惡也樂其中凶惡比若小人有七凶三善三善謫得三從樂有七凶惡反七愁苦悒悒安而從樂乎所以然者十十為法者十乃三折之也帝氣十十皆善王氣者二善一惡相氣者二惡一善也故帝氣者象天天者常樂生無害心欲施與三皇象之常純善良無惡無害心天如三皇三皇如天也故上善之人無一惡但常欲為善其象天也其象真神乎善哉善哉王氣者象地地者常養而好德五帝象之也地雖養者名為殺故五帝時有刑也善哉善哉相氣微氣者象人人者無常法數變易三王象之無常法也夫和氣變易或前或退故下上無常和者覩剛亦隨之覩柔亦隨之故無常也衰死囚亡之氣象萬物數變亂無正相出入五霸象之其氣亂凶故不得有樂也夫天地之性樂以樂善不以樂惡也夫天地之武以誅惡不以誅善天地格法不可反也善哉善哉請問樂以樂善意願聞大訣使愚生心悉解而不敢復問豈可聞乎子自若不解邪謹已小解恐下古之人積愚迷日久雖與其文猶復不解復令犯天禁故不敢不問其大訣易知者矣善哉子之言得其意諾安座方解之然夫上善大樂歲凡萬物盡生善人人歡喜心中常樂欲歌舞人默自相愛不變爭自生樂上下不相剋賊皆相樂故樂生於善以樂善天使自然如此也善哉善哉夫大凶年凡物無一善者人人皆飢寒啼呼哭泣更相剋賊默自生愁苦忿恚心中不樂何而歌舞樂默自廢絶故凶年惡歲無樂天使其自然無也是則明天不樂凶惡之證也是故樂為樂善生武為興凶作是故古者帝王將興者得應樂善也將衰者得應惡也此者自然之法也是故樂生善善生樂凶凶生樂武武生凶無為生樂樂生無為武生亂亂生武樂生歌舞歌舞生樂凶惡生愁苦愁苦生凶惡以吾文見下古之人使其思之樂之訣説小竟於此善哉善哉右五音樂當所動發前後得天地人心意以致太平除災姦致和氣出大訣天樂得善人文付火君訣第二百七今真人積善又賢事事通今天上皇洞平氣具至今天上欲有可急得子亦豈知之乎哉小生性愚且蒙不及唯天師行諸真人安坐為子悉陳之今天上樂得善人可以調風雨而具生凡物者初天地開闢以來人為善者少少而中天意者天常以是為憂患而今地上人無中天上可求者今天上何不自生人而反乃取於地上人乎夫天地之生凡物也兩為一合今是上天與是下地為合凡陽之生必於陰中故乃取於此地上人也又人含陰陽氣之施必生於土泉故皆象其土而生也故五方異俗天下小小而不同故萬二千國一部中人不相似也子知之乎唯唯人生而常善者付於父故善人上付於天也萬物之精善者上合為天為三光也其中者付於人使其仕順陰陽而理萬物也其下者付於土使步行而作事也真人知之乎唯唯善哉善哉是故今天上欲調風雨具生萬物樂得善人故吾見遣下簡索之也以文付真人以與謹民令付上火精道德之君使以示天下人共思吾書言故以付真人慎毋斷絶子且病之加戒慎事唯唯今愚生以為天上乃無極而正獨與此下地為合乎善哉子之難也天雖上行無極亦自有陰陽兩兩為合今地下亦自有合乎然地亦自下行何極亦自有陰陽兩兩為合如是一陰一陽上下無窮傍行無竟大道以是為性天法以是為常皆以一陰一陽為喉襟今此乃太靈自然之術也無極之政周者反始無有窮已也欲為真人分別一二而陳道之真人會不而知之耳故略為子舉其端見其始著其大綱自思出其紀令天下地上賢聖自美之耳子知之耶唯唯願聞其教諾自詳記吾言於吾教子上而息唯唯天咎四人辱道誡第二百八今天上有何大憎惡名為天咎真人學用日久豈亦深知之邪哉今愚生不及何等也願聞之然古今諸為道者乃皇天之所取法也最善之稱冠無上包無表內無裏出無間入無孔天下凡事之師也生之端首萬事之長古今聖賢所得之長今帝王之所以得天心以自安民之父母凡化之所從起也真人知之邪唯唯夫道乃天也清且明不欲見汙辱也而今學為道者皆為四毀之行共汙辱皇天之神道并亂地之紀訖不可以為化首不可以為師法不可以為父母俱共毀敗天之寶器天之皆名之名為大反逆之子汝居地上不中師法上天安而反中師法哉子欲知其審實此若小人居民間不中師法也至於帝王之前寧而中師法不哉如使處下不中師法而上天反畜之以為師法中類天上與帝王之前反當主畜積邪惡之人邪哉故天上深知其失道意非故疾咎之也今洞上皇平氣至不而復容此四人此四人也乃使天上天下共賤為道者反名為惡子是故令使人道日衰消休廢不復起今天下之人共為惡正此四人所毀敗也今天上大憎咎之故欲更選七也真人知之邪愚生今受性頑鈍訖能不解何謂也願聞之子尚不即解何望於俗人哉諾開耳精聽為子詳陳道大瑕病所起使天下後學者令昭然知其失道也其第一曰不孝第二曰不而性真生無後世類第三曰食糞飲其小便第四曰行為乞者故此四人者皆共汙辱天正道甚非所以興化而終古為天上天下師法者也假令得道上天天上簡問之盡為惡人今不可以調風雨而興生萬二千物為其師長也可㤥哉可㤥哉小生聾暗訖不知有過於天今唯皇天明師願見為復重察察分別解之冀蒙心得更開行詳聆聽為真人具道其意使可終古以為萬世之法後生謹良為道者不復犯天禁令使得道而上天天上更喜之比若地上帝王得善人與共為治亦喜之也故天上所進地上亦然豈不善哉唯唯聞命矣道者乃皇天之師天之重寶珍物也為者其行當若天成道者當上行天乃好愛之仕也今或有過誤得道而上天者天下受如問之反皆有不謹孝之行道為化首天為人師法何可反主畜舍匿養天下不謹孝子哉子親有此惡行而天何宜使此人長生與其共事乎若此天反當主舍此惡人反逆之子邪地上尚不仕天安肯仕之乎故不孝而為道者乃無一人得上天者也雖去但悉見欺於邪神佞鬼耳會皆住死於不毛之地無人之野以戮其形天之應人如影響安得行惡而得善者乎古今希有之也地王雖為道前後衆多者其度者少今天上乃少善人無可與共事者也其行悉凶惡也如是天何不即殺之乃使到不毛之地無人絶氣之野乎所以不即滅殺之者天地之間其氣集多所而畜容故名為中和比若人和無不而包容也故得須臾天者主執清明比若居帝主之前不可得容姦惡人也故天上本不與等子為治也地上亦然也天不與不謹孝子為治比若聖王不與不謹孝人為治也聖王尚不肯與為治天何肯獨與為治乎哉古者聖賢所以不與為治者乃深覩天法象天為行也與愚者為治天即大恨矣何以明之人君與之為治天為其多災變怪夷狄數來是明天恨惡之證也與重規合矩券書何異哉今天乃見人與之為治尚憎惡疾之何肯乃自與其共事乎人所惡天亦惡之也人所愛天亦重愛之也是故古者賢聖覩天意深故常象天而為行不敢失銖分也故而常獨與天厚得天心也如不與天心合不得天心則大凶矣人行尚如此何況今乃當為天上簡士哉天上簡士乃當與天共事治無窮極之術也長相與并力同心調氣真人寧解不邪宜自慎吾言純天心意也不可犯也犯者死矣哉善哉善哉愚生心意一善解於是子尚裁一善解俗人不解冥冥憒憒是也天疾之故使吾下大言具出天法自是之後學者戒之慎之今天乃貴重傳相生故四時受天道教傳相生成無有窮已也以興長凡物類故天者名生稱父地者名養稱母因六甲十二子八卦之氣以為紀更相生轉相使故天道得常在不毀敗是常行施化之功也今學道者純當象天為法反多純無後共滅消天統其貞者尚天性也氣有不及其不貞者強為之壅塞陰陽無道種其施於四野或反棄殺窮其妻子而去者是皆大毀失道之人也無可法是大凶一分之人也不可以為人師法安而中天師法乎夫皇天乃是凡事之長人之父母也天下聖賢所取象也何用等失道妄為無世類之子為與共事乎如天但與此子共為治天名為主舍匿惡人興凶術何可以為聖治人上師乎故不舍止之也古者聖人大賢尚知諱不肯與無後世類之人共事與之為治悉不得天心故聖賢天使其皆貴重有後世而共憎惡人無後世也聖人乃深知天意故獨常法象之不失銖分也而況天乎哉今天上久純無善人故使吾下大語以示勑後來使愚者悉自知若天上仕此人天上反當主聚無後世人邪行如此反得上天天上反愛無後世而不好生邪故皆死於不毛地不生之土無人之野令使各歸其類也汝不好生與天反故投汝不生之處汝好無人故投汝無人之野俗人冥冥不覩則言其已度世矣實不也吾不敢欺真人也吾親以天上行而下覩與不覩比若示盲者以日言人欺之反掩其口而笑愚者比若此矣真人慎之天上所惡也上亦然也善哉善哉愚生未嘗見是天上事真真一覺於是子努力為善行吾之文療天地之病解帝王之愁苦子功滿得上天自往覩見之吾言乃大效矣唯唯不敢道留不敢懈忽也子慎之無懈忽審沮懈忽大命絶矣愚生甚畏天威誠受行之善哉善哉得天意矣今天乃清且明道乃清且白天與道乃最居上為人法清明者好清明故三光上著天各從其類合如為形天之為形比若明鏡比若人之有兩目洞照不欲見汙辱也若比聖王之前常欲清明不欲見汙辱汙辱之則得滅死之過也真人知之耶唯唯可㤥哉可㤥哉是故人頭口象天不欲樂見汙辱也常欲得鮮明得善物故天下人以淹汙辱惡與人食之天乃遣雷電下自捕取之真人知是逆惡邪唯唯愚生甚畏之今大中上古以來人自言為善絶殊於俗人也學為道者反多相示教食糞飲小便相名為質直善人天與道大憎之天上名此為大反逆之子天上不欲見其人形也此大邪所著犬豬之精所下也夫道之生天天之有道也乃以為凡事之師長正道者所以興善主除惡也是故古聖賢帝王將興皆得師道入受其策智以化其民人師之貴之乃言其能知天心意象天為行也天上亦尊貴善道人言其可與和風氣順四時承五行調風雨助日月星宿為光明也而使萬物興也今如此食糞飲小便何可以為師今地上師尚不中名為逆子何能反中天上師乎哉小人甚愚也甚淹汙辱天道真人得極文思其意地上所惡天上亦惡之天上所惡地上亦然是地上人惡食糞飲小便天上亦惡之故乃遣雷電霹靂下殺之也此辭者但可以曉地上人耳天上惡之劇於是地上尚憎惡之天上何用為哉天乃清明而鮮何以反當主舍聚此食糞飲小便人乎錐過誤須臾得道會不得上升天也悉往死於五廢絶氣敗凶之地以順其行以彰其過各歸其所求不欺之也真人年有善竟戒之慎之以示後來令洞上皇平氣至不得容此惡行犯之死明矣可㤥哉可㤥哉真人知㤥是子覺也子不㤥與之同罪知而故為之罪不除唯唯不敢不敢今上皇天之為性也常欲施與故主施主與主生主長主出不主納主勝不主服服則為逆故天道不可威劫也劫迫之則令人滅亡矣天主善主清明不樂欲見淹汙辱今天與道乃無上之稱也故帝王象天為行也稱無上之君不敢失天行之銖分則吉失之則大凶今學道為長生純當象天也天者好生故學長生者純守天第一生之氣其為行當隨天道意也故地者主辱殺主藏不當隨地意也夫道者乃大化之根大化之師長也故天下莫不象而生者也今下愚小人欲為道反無益於民人而共淹汙辱天道甚逆無狀天上名之為逆子大凶之人也天上不欲見之也何謂也愚生心結閉未及之也善哉子之問乎天使子言詳開耳目而聽夫天與道不好施好生好稱邪為之何不卜卦賦藥有益於民人而使神治人病固止也此三人也皆得稱師不利天道不敢淹汙辱天道夫天道不欺人也常當務至誠天道不欺以欺即其後久久日凶衰矣天之為道也不樂淹汙辱不欲利人天乃無上道復尚之道乃天皇之師法也乃高尚天是故天與道者主修正凡事為其長故能和陰陽調風雨正晝夜列行伍天地之間莫不被恩受命各得其所者今下愚為道反為欺慢癡狂乃共惑亂天之道毀敗天之化首反行乞丐求人之物無益於民間淹汙辱天道內利百姓不可以為師法反使後生者相教每為道道令人癡狂慢欺又行被淹汙辱而乞丐因以此行而名之謂為癡狂乞丐者之道反使凡人共罵天共賤正道斷絶大化天甚惡之道甚疾之天上不欲見其形也今天上皇洞正氣大至日月星羅列皆重光道與天當調風雨和陰陽使萬物各得其所而前人邂逅得道而升上天無可仕者也天上問之悉有過不可與共事汝等乃居地上尚見謂為癡狂乞丐者不中帝王之師安而中天上之師哉天其惡之大道衰廢咎在下古人相學失法度天病之大悒悒天道不通故遣吾下與真人共談分別道得失樂天下人一覺俱知天上意改其行易其心不復犯天禁則學者成矣如修其故行天不上之也會當復往死於五辱之地付命於五汙之土絶洞無人癡狂之野上無三光下無良土何也願聞之其過何重也不謫之也天道為法各從其類下奪之也如是何以不即殺之乃到此乎欲即滅殺之又其人自言欲長生而至信欲中殺之又反且哭天啼地自言甚冤又不自知其過所由出故天考之徒之其後投於五辱癡狂之土使自知也子欲知其實審比若明王考人過責非肯即殺之也猶當隨其罪大小詣獄大罪大獄小罪小獄治之使其人服自知乃死不恨而無言也如不窮其辭語會自言冤懷恨而死故五霸之君其民臣多懷恨而死者也子欲知天上之治刑如此矣真人解邪可㤥哉可㤥哉子知驚㤥生之門也不知驚㤥死之根也子慎吾言吾言正天之兵不可詆冒詆冒令人傷小詆小傷大詆滅亡也戒真人一言下古之人積愚信其無知之心且言不然自窮矣吾親以天上行而下知其萬不失一也吾不敢欺子也欺子不畏真人乃畏天威故吾言乃信復信所以言復重者乃恐其固固有失之者故復重使其言多文天上之事實遠難知故文時時下合於地也地上善即天上善也地上惡即天上惡也故人為善於地上天上亦應之為善人為惡於地上天上亦應之為惡乃其氣上通也五氣相連上下同六甲相屬上下同十二子為合上下著無有遠近皆相通其下善其上明其下惡其上凶故五行興於下五星明於上此者天所以曉於天下人也凡三光皆然天上復與地下三光相通三光明於下天上亦然天上明於上地上亦然兩兩相應和以為經於天上大善地上亦然猶天有六甲十二子地上亦然地上有六甲十二子天上亦然故常上下相應不失銖分也真人其慎之吾言雖遠慎無閉藏以示學者傳之必齋戒其慎之案文為法勿得暗誦也唯唯願請問太上中古以來諸相教為道者反多有去家棄親捐妻子反多有乞丐癡狂詳欺食糞飲小便後學者多以相教示皆有師法亦不苟空也善哉子之難問得其惡意天疾之教子問之邪其言何一巧也子何故問此乎怪其久矣無於質問常若悒悒善哉天果使子主問事邪諾開兩耳且為子分別言之夫上天初出真道之時不如此也悉作孝養親續嗣有妻子正形容不癡狂食糞飲小便也皆以其道動作中法上士為帝王之師輔傳類相養無有傷者於此之時比若三皇五帝動以正道務相利不相害傷也故得以正道行不自匿藏三王紊亂五霸將起君臣民更相欺慢故偽作癡狂尚恐見知乞丐食糞飲小便是困窮之行也困窮之辭也夫道亦有衰盛比若此三皇五帝三王五霸矣下古多見霸道乞丐棄其親捐妻子食糞飲小便是道之衰霸道起也故三皇五帝多得道上天或有尸解或有形去三王以壽五霸無得正道者皆戰鬭死於野今下古守此霸道亦皆死於野此之謂也吾不欺真人是亦道之霸與霸王同耳安得上升天哉善哉善哉愚生之心真真已解矣不意道亦有霸也天師解之乃後知之誠誠哉子可謂開矣請問今學者當奈何乎哉然今者天道大周備自今以往與古異欲修中古霸道法真道不得來真人宜戒之慎之欲樂長存修吾文失銖分之間命不全可不守乎道之元皇道已起火光行之霸道絶矣天雖浩大自有分理以示文凡人令共議之宜屬上者屬上宜屬中者屬中宜屬下者屬下宜上下中共之何不覩其誠信比若與天語善哉善哉時氣平矣真人何以知之乎見天親遣天師下言知天氣平矣善哉善哉子得其意願復請問一兩事不敢多言行道之自今以往求道皆當於何哉皆求之於間室無遠父母而去妻子以漸為之僻漏乃止或內不善而僻漏無可益也反且先死各自考實行不負天人乃可欺天不可欺也勿憂人為非也使各以是自治不敢為道者即惡人也欲欺偽者也以是占之萬不失一也學人若此姦猾絶矣善人與惡人可見矣此名為皇天簡士書上可得度世中可為帝王輔下愚無知固固可為民間謹子真人重知之唯唯願聞僻漏得道去云何然道成去而已如道未成為日守父母保妻子日日以漸清靜為之且自知其意矣賢者共策此言唯唯右天上簡士文興道斷為棄霸續命人自易心姦猾消守親保妻子禁燒山林訣第二百九請問皇天上洞極之師師幸哀愚生不肖乃告語以天上之事誠非小生所敢望也既加得已開其道路使得知天上事願聞天上皆何所喜何所禁唯得其戒誠日夜思惟其意不敢犯之以示後生善哉子之問也得其要意真人安坐為子道之可傳萬世無有去時也唯唯受命厚厚勿謝子為天地問疑吾主為天談非子之私也俱共公事何須謝哉欲不謝若為輕道易事愁師謝又觸忌諱不謙也但恐書益文多辭令難知故止真人言耳夫辭者道之柄文之所從起也勿悒悒方為子分別之唯唯今天上乃上皇洞平氣俱至興盛陽日光明邪氣止休正氣遂行衰者消去道德陽天上急禁絶火燒山林叢木之鄉何也願聞之然山者太陽也土地之綱是其君也布根之類木是其長也亦是君也是其陽也火亦五行之君長也亦是其陽也三君三陽相逢反相衰是故天上令急禁燒山林叢木木不燒則陰中陰者稱母故倚下也天所以使子丑寅最先發去興多興多則火王火王則日更明丙丁興巳午悅何也願聞之此天格也性也其母盛多而王則其子相其子相則受氣久長得延年故天上止之也陽盛即陰姦日消陽衰則陰姦日起故姦猾者常起暮夜是陽衰而姦起之大證也故天上乃欲除姦故禁之也此自然之術法也天上亦然地上亦然善哉善哉請問三陽相得何故凶衰乎善哉子之問也得其意然三陽者應天陽地陽人陽三盡陽也無一陰三盡君也無一臣三盡男也無一女名為滅亡之路無後之道也不敢復傳類不而復相生成故凶也是所謂有天而無地有日而無月有上而無下有表而無裏天上名此為立敗之紀故惡之禁之也善哉愚生過問此甚畏之矣子知畏之生之根也不知畏之凶之門也唯唯燒下田草訣第二百一十請問下田草寧可燒不天上不禁燒也當燒之獨何故當燒之乎願聞之然草者木之陰也與乙相應木者與甲相應甲者陽也與木同類故相應也乙者陰也與草同類故與乙相應也乙者畏金金者傷木木傷則陽衰陽衰則偽姦起故當燒之也又天上言乙亦陰也草亦陰也下田亦土之陰也三陰相得反共生姦故玄武居北極陰中陰極反生陽火者陽也陰得陽而順吉生善事故天上相教燒下田草以悅陰以興陽故燒之也天上亦然也甲者天上木也乙者天上之草寅與卯何等也然寅者亦陽地上木也卯者陰也地上之草也此四事俱東行也但陽者稱木陰者稱草此自然之法天上之經也吾不敢欺真人也子為天問事決疑吾為天説事二人共職共理陰陽除天地之病令帝王不愁苦萬二千物各得其所莫不悅喜而出見無有冤結者也善哉善哉然真人可謂知道矣不敢不敢然學而問道有何謝乎唯唯繫之胸心無有去時善哉善哉學問得其數矣天神考過拘校三合訣第二百一十一今天上良善平氣至常恐人民有故犯時令而傷之者今天上諸神共記好殺傷之人畋射漁獵之子不順天道而不為善常好殺傷者天甚咎之地甚惡之群神甚非之今恐小人積愚不可復禁共淹汙亂洞皇平氣故今天之大急部諸神共記之日隨其行小小共記而考之三年與閏并一中考五年一大考過重者則坐小過者減年奪算三世一大治五世一滅之故今天上集三道行文書群神共記過斷好殺傷刑罰也而興樂地上亦然真人幸為善常欲有德於皇天而憐帝王愁苦時氣不和實咎在人好殺傷畋射漁獵共興刑罰常有共逆天地之心意故使久乖亂不調帝王前後得愁苦焉是重過也真人幸欲常有功於天有恩於帝王今天上積疾毒之群神教吾言故今以文付真人歸有德君以示天下人得文各自深省思過失念書言天今良平氣俱至不喜人為嫉賊吾知天上有此言今敢不下道之不言恐為嫉賊害在吾身吾不敢犯也故以事報諸真人慎之真人不言害在子身以示凡人愚人欲犯之害在其身天亦不復過責真人也自今以往天乃興用群神使行考治人天上亦三道集行文書以記過神亦三道行文書以記過故人亦三道行文書以記過故人取象於天天取象於人天地人有其事象神靈亦象其事法而為之故鬼神精氣於人諫亦諫常興天地人同時是故神應天氣而作精物應地氣而起鬼應人治而鬭此三者天地中和之疾使隨神氣而動作應時而往來絶洞而無間往來難知處故今天道傳治與往古殊異以今占古多不中以古占今不復應故古文衰竭難復用用之不比中又有集處真真文故天上言拘校前後三合取中善者以明事以合意然後天上道正王道備邪惡悉去帝王大樂乃無事人自為謹得天意真人知此事重乎唯唯善哉子知其意矣右天上禁火以興生斷刑傷殺止畋射獵不順天時氣為天所惡記見在知赤初受符更始文三者為一家陽火數五訣第二百一十二下愚之生願一請問今天道當具無不有無不包容也天上何覩何故一時悉欲生而急刑罰乎善哉子之難問得其意吾常甚好子之言子之言常發起吾意使吾道興子向不能難問誰復而難問者乎故天道久斷絶閉而不通天甚疾苦之吾久悒悒欲言無可與言者故天道失其分理久矣歲歲至歲至於今天運生聖人使其語無而盡解除其病者故乃使真人自來與吾相覩乃一得為天具語子難常獨深得天意安坐為子悉陳道之吾欲不言畏天威也故得子問者輒欲言無可匿也真人亦知之邪唯唯然子解解矣今天上所以盡悉欲生長而急害傷者天道常有格三氣其初一者好生名為陽二者好成名為和三者好殺名為陰故天主名生之也人者主養成之成者名為殺殺而藏之天地人三共同功其事更相因緣也無陽不生無和不成無陰不殺此三者相須為一家共成萬二千物然天道本末中也今者天道初起以來大周復反來屬人屬陽陽好生而惡殺生者須樂乃而合心為一相生而中有殺氣輒傷不能相生成子欲知其信實比若胞中之子不可有小害輒傷死死不復生輒棄一人為是連傷而不止便絶滅無後世矣一家無統絶去矣故尤大急刑罰殺傷也天道同不常如此耳今者大急復更為真人察察分別之使下古人大覺知天道今不欲殺傷訣意所以更為真人察察言者俗人隨吾但無事習文辭而作巧語也故更為其陳刑天證今甲子天正也日以冬至初還反本乙丑地正也物以布根丙寅人正也平旦人以初起開門就職此三者俱天地人初生之始物之根本也初生屬陽陽者本天地人元氣故乾坎艮震在東北之面其中和在坎艮之間陰陽合生於中央故凡懷妊者在頭下足上中腹而居微在中和之下陽合者生於最先發去出其形氣投於他方者此主天地人三氣初生之處物之更始以上下不可有刑殺氣居其中也置其德氣陽氣乃萬物得遂生如中有凶氣輒傷故出其刑去之也今者天道大周更始以上下純陽治天地故急斷刑罰也天者稱神陽亦稱神故今天使神治人真人欲知吾書文與天相應不自今以往犯吾書文欲好刑殺者天上亦且考之人亦且更急之神亦且考之天上地上異處同謀鬼神不與人同家亦且同謀是天平氣且至也天初氣更始於天上地初氣更始於地下人初氣更始於中央此三氣方俱始生不欲見刑惡凶氣俱欲得見樂氣故自今以往天與地樂斷刑也真人知之乎唯唯愚生暗昧以為天上行疾人為惡而禁刑殺傷也不意乃天地人在懷妊之氣更始之本元也見天師説之甚惶甚㤥子知惶且㤥可謂覺悟知天道意矣善哉曉事生戒此文慎無斷絶為身害唯唯不敢不敢行去重之凡人學問各為身計務順天道唯唯出此天上禁忌勿藏唯唯請問天道何故正以今為大周為元初乃更大數考正文哉善乎子之難問也大得天心意然今者五陽之上長也五火之始也火之最上者上為天為日月之色者火赤與天同色天之色赤火亦赤赤者乃稱神天與神者常昌得凡事之元是故十一月為天正天上亦然故其物氣赤赤者日始還反其初九氣屬甲子為六甲長上首也甲者為精為凡事之心故甲最先出於子故上出為心星故火之精神為人心也人心之為神聖神聖人心最尊真善故神聖人心乃能造作凡事為其初元首故神聖之法乃一從心起無不解説故赤之盛者為天為日為心天與日與心常明無不而照察故自今以往行此道者姦邪之屬悉絶去矣夫陽之生者於幽冥之中是故陽氣起於北而出於東盛於南而衰消於西天之為法如此矣善哉願聞今陽之生者何故正於幽冥中乎夫生者皆反其本陰陽相與合乃能生故且生者悉復其初始也天地未分初起之時乃無有上下日月三光上下洞冥洞冥無有分理雖無分理其中內自有上下左右表裏陰陽具俱相持而不分別若陰陽相持始共生其施洞洞亦不分別已生出然後頭足具何知陰陽之初生之始如是矣故人今將變化而施生者悉往就幽冥間處天使不忘其本也人初受天地之法是其先也故天使其不忘也善哉善哉見皇天師言乃知分理也子可謂易示曉矣請問陽與火何獨伍乎行氣者各自有伍非獨火也金火最為伍赤帝之長故天策書非云邪丙午丁巳為祖始始者先也首也故書言祖始也萬事之始從赤心起心者洞照知事陽始於陰中亦洞照故水者外暗內明而洞照也中有陽精也故陽始起於北而陰始起於南十一月地下溫五月地下寒今陰陽始起何不於天上而正於地中乎善哉子之難問也然地為母父施於母故於陰中也其施陽精同始發於天耳陽者其化始氣也微難覩入陰中成形乃著可見故記其陰中不記其陽也今天雨雪同是其施化之道見可覩而言陽施精微不可覩乎善哉子之言也難得其意欲為真人分別説之恐天道大形見故不為子説也然恐真人心恨夫為人師為人上者難請安坐為子微説之天雨雪造將為之時呼吸但氣耳陰陽交相得乃施可覩於此之時天氣下地氣上合其施故雨雪有形而可見也請問今或有山潰雲上皆可覩而言不可覩何也欲不問苦悒悒今故具問之為弟子不謙不也不問無以得知之致當問之無所疑也諾為子微説之不可窮極然雲雨潰山此者陰之盛怒而不自忍傷陽化凶事也非善變也有傷於化之道陰之失也陰之傷也真人勿復窮問天道亦不可察察盡言也子自思其意唯唯行去道祐三人訣第二百一十三真人再拜謹問天師道太平氣至誰者當宜道哉誰者不宜道乎善哉子問事也夫道與人比若風雨為者則善不為則已好為者則其人也不好為者即非其人也為者不用力易開通者即是其人也不開不通終日無成功即非其人也為之即吉不為則凶是其人也不為之其人自吉善無所疾苦已為之後反有所疾苦即非其人也又凡人自養不可不詳察也夫道者乃正人之符也疾病鬼物者乃邪惡之階路也賊殺良民之盜賊也或見人且入正道因反怒人與人爭鬭於人為正道反凶不為善反安隱於等之間不可不謹詳自精者得道則吉失道則凶也死生之命不可自易而不謹詳也善哉善哉愚生已解矣然真人既問疑事且告真人天要語吾道之所以而長久養者人而樂道樂德樂仁忽於凡事獨貪生耳道正長於養守此二人也過此而下者吾道不而長久養也何哉夫人道乃無不覆蓋何故獨宥此三人不宥餘哉然善哉子之難問也得其意夫大道之出也人皆蒙之恩乃及草木莫不化為善皆得其所俱而各竟其天年夫無道德不仁不可久養也何哉然但以其不好道德仁也夫好道德仁何故獨可久養哉願聞其意然子曉事生哉其問事絶訣也詳聽為子分別言其意唯唯然是好道德仁此三人皆有三統之命樂好道者命屬天樂好德畜養者命屬地樂好仁者命屬人此三人者應陰陽中和之統皆有録籍故天上諸神言吾文能養之也行不若此亦無録籍故吾文不能久養之也今太平氣至無姦私故不而久養姦惡之人也不如往者內亂之時能包養惡人也願聞其竟説然姦邪惡氣出活者反能久養姦惡之人也而不能久養善人者是其衆害多善者少也比猶若大寒至而熱氣衰也今正氣至乃不能久養姦惡之人比若陽氣至而陰氣消亡也夫太陽上赤氣至乃火之王精也火之王者乃光上為日日者乃照察姦惡人故言不得為非故不容惡人也又道者主生德者主養仁者主用心故愛春即生夏者即養人則用心治理養長萬物故太陽所生養長用心最勞苦此之謂也善哉善哉愚生重聞命乎然安坐為子更有所修解唯唯一事學道而大度者在天中度者在神靈小度者在人也二事學德而大度者在天中度者在神靈小度者在人也三事學仁而大度者在天中度者在神靈小度者在人也四事學官而大度者在天中度者在神靈小度者在人也五者好畜聚財業大多者在天中多者在神靈小多者在人也然此五事大度中度小度一由力之歸命於天歸德於地歸仁於人守此三事學身以賢心善意思之惟之身乃可成積之聚之神且自生守之養之道且自成樂之好之身且自興天道無親無踈付歸善人是故天自力行道日一周所以一周者凡物之生悉法六甲五行四時而生一氣不至物有不具則其生不足不調矣為人君上父母而不調大過也故天日一周自臨行之也所以自臨行之者假令子水也但有水氣未周五行氣不足四時氣不周故為行而臨之甲加其上有木行有春氣丙加其上有火行有夏氣戊加其上有土行有四季中央之氣庚加其上有金行有秋氣壬加其上有水行有冬氣五身已周四氣已著乃凡物得生也天地施化得均尊卑大小皆如一乃無爭訟者故可為人君父母也夫人為道德仁者當法此乃得天意不可自輕易而妄行也天道為法如此而況人乎故上士法天其道乎中士法地其德乎下士法人其仁乎過此而下者不屬於人故與禽獸草木同乎無常命真人得吾文書自深思其要意緣而無善與天相得同事也與吾文反者乃天地之怨也吾亦不耐也吾文書所惡正是也真人慎之以付上士歸縣官示凡人自今以往天與古異善哉善哉右分別太平文出所宜所不宜訣
