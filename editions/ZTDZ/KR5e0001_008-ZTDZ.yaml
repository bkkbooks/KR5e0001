body:
  text: 太平經鈔辛部卷之八外八請問不食而飽年壽久久至于遂存此乃富國存民之道比欲不食先以導命之方居前因以留氣服氣藥之後三日小飢七日微飢十日之外爲小成無惑矣已死去就生也服氣藥之後諸食有形之物堅難消者以一食爲度食無形之物節少爲善百日之外可不食名不窮之道名爲助國家養民助天地食主少者爲吉多者爲凶全不食亦凶腸胃不通通腸之法一食爲適再食爲增三食爲下四食爲腸張五食飢大起六食大凶惡百疾從此而生至大飢年當死節食千日之後大小腸皆滿終無料也令人病悉除去顔色更好無所禁防古者得道老者皆由不食君臣民足以安身心理其職富者足以存財貧者足以度軀君子行之善樂歲凶年不危亡夫人曰有三命而不自知日三食乃生朝不食一命絶晝不食二命絶暮不食三絶絶三日不食九命絶無匿物無寳留此由飢也奸邪大起悉從此始用吾道萬事自理吉歲可以與利凶年可以存民常當忽帶收腸使利行步也天地之間凡事各自有精神光明上屬天爲星可以察安危天地之性自有格法六甲五行四時節度可以占覆未來之事作救衰亂防未然之事臣見君父之衰救之使其更興盛是大功也深知其衰也不救之或反言而去名爲倡訞罪不除也三事臣知其君有失將覩凶害而救之使其更無凶害是大功也知而不救名倡凶其罪不除也四事知君理失其要意灾害連起而救助其理之是其宜也爲曉事之臣知而不救其罪不除也五事臣知其君年少其賢未能及事而救之助其爲知是其宜也知而不助爲賢反言不及名爲不忠弱其上其罪不除也六事臣知其君老有夭期而憂之爲其索殊方大賢之助異策内文令君更得延年是大功也知而不能反言吉凶者其過大也七事爲人下知上有危有失理或失忘而共救之案之是爲大功知而不救自解避而去爲不順忠孝之人罪皆及其後八事父母有疾占相之知能盡力竭精有以救之知而不救天將大罰九事父母年老且盡爲子者知父母老期將至爲求賢師異方令得丁强孝子之宜也此由食人之食以食歸之而有大功也十事知人凶衰有大害患將至而救之使其臾興與其竒方異策内文善事令無復憂苦是爲大功知而不爲有罪不除也夫爲人子見父母有死難而抛去之處樂違苦此乃與禽獸同耳豈可統三才繼天地乎是以聖人出也施教戒勸人爲善斷絶凶惡以救天地之灾令三光五行星辰順叙豈徒言哉今天上乃具出文書以化除諸灾害以致善是故吾自曉勑真人出書也今天上教吾大言勿有蔽匿也今天地大周更始灾害比當消亡無復餘糧類故教人拘校古今文集善者以爲洞極之經定善不可復變易也雖聖賢之人不能復致其文辭夫文辭天地隂陽之語也故教訓人君賢者而勑戒之欲令勤行致太平也所以言蔽藏者賢君得而藏於心用於天下育養萬物而致太平也而歸功於上帝則堅於石室深穴也天生善物必歸之善處如珠玉也必帝王寳之其麤惡之物衆棄之況人爲善而天豈不愛乎帝王豈不重之乎今天上無極之天中無極之天下無極之天旁行無極之天今爲法況三道集氣共議其應天地人之位也乃太平至天悅喜則帝王壽其道神靈祐天地善氣莫不響應道德日至邪僞退訞臣奸冗滅凡臣悉除萬善自來五行和四氣時良其爲政法起於本本者天地之間人象神神象人而各自有隅聚亭部鄉縣善惡所好所疾苦各有其本事皆近察察自相短短長得失明於日月故大教其集議賢不肖共平其事故天下州縣鄉里置封仰萬民各隨材作書直言疾苦利害可否致書投於封中長吏更撰上天子令知民好惡賢不肖利害可集議而理之即太平之氣至矣而福國君萬民萬二千物各得所矣封即今匭函也天道有緩有急人事亦然有緩有急天道急即風雨雷電不移時而至人道有急亦趨走不移時而至急者即以時應天法則上之剌一通付還本事而有賞罰緩者須八月爲一日上也天上法如此夫隂陽爲法如此人道亦如此矣凡人腹中各有天子五氣各有王者天有五氣地有五位其一氣主行爲王者主執正凡事居人腹中自名爲心心則五臟之王神之本根一身之至也主執爲善心不樂爲妄内邪惡也凡人能執善清靜自居外不妄求端正内自與腹中王者相見謂明能還覩其心也心則王也相見必爲延命舉事理矣不得見王者皆邪也不復與王者相通舉事皆失矣而復早終今太陽德盛欲使天上天下上無竟下無極旁行八洞外内真神真精光悉出助帝王治而致上皇洞平之氣未常見之善人命長萬物無復夭死自冤者而邪神悉消亡天下無復强枉病者豈可聞乎善哉子之問也天使悉斷邪僞凶惡而出真事凡圖晝各有精神真事有真神邪事有邪神善事有善精神惡事有惡精神夫蓄積邪之家後必有邪害也蓄積真文真道之家後必有度世者也故真僞各精所致也故天有吉有凶吉則吉精神凶則凶精神地亦有吉凶吉則吉精神凶則凶精神夫三皇五帝各有親屬兄弟三王五霸各自有親屬兄弟小小分别各從其類世興則高世衰則下比若晝夜相隨而起從隂陽開闢到今不止貧爲小人富爲君子更共相爲使轉相理是天地親屬也萬物不興其中幾類似之而實非也天有六甲四時五行剛柔牝牡孟仲季共爲親屬兄弟而敬事之不失其意以化天下使爲善主仁義禮智文武更相爲親屬兄弟夫道與道爲親屬兄弟者凡道乃大合爲一更相證明轉相生今日身已得道凡道人皆來親人合心爲一家皆懷善意凡大小不復相害傷灾害悉去無禍殃帝王行之天下興昌垂拱無爲度世命長吏民行之其理日明凡道皆出莫不生光道與道爲親屬傳相行故與道召道以道求道即以道爲親屬兄弟尚化如此則天下皆好生惡殺安得有無道者哉德與德爲親屬兄弟者令日身執大德以德爲意凡有德之人推謙相事天下德人畢出矣以是爲法安坐無事帝王行之其國富吏民行之無所不理以德召德德自來矣仁與仁爲親屬兄弟者今日身爲仁凡仁者自來相求以仁召仁仁人盡來矣帝王行之天下悉仁矣吏民行之莫不相親所謂仁與仁合爲一家是爲親屬兄弟矣義與義爲親屬兄弟者以義求義今日身已成義凡義之人悉來歸之以義合也帝王行之苦樂相半吏民行之生傷半以義求義是爲親屬兄弟矣禮與禮爲親屬兄弟者以禮求禮今日身已成禮矣凡禮之人悉來行者守節生者不安腹中内空虚外使若環趨走跪起無聞命矣日短衣物盡單帝王行之愁苦且煩吏民行之職事紛紛丁者力乏老弱傷筋禮禮相親是爲親屬兄弟矣文與文爲親屬兄弟者今日已成文矣以文求文文人悉來至若浮雲中外積之聚若山至誠若少大僞出焉帝王行之以理其事或得或失吏民行之更相期妄以相拱害變疾病萬種人日短命以文相期以文相恐轉相取轉相生此乃文之親屬也武與武爲親屬兄弟今日已成武矣以武召武凡武人悉來聚其氣陽陽其兵煌煌其力皆倍其目皆張其欲怒不得止武鬼居其角取勝而已不復惜其命君子行之其治日凶則吏民行之滅殺人世無有善意理有聚害此即以武生武則武之親屬也辯與辯相爲親屬兄弟者今日已成大辯矣凡有辯之人悉來歸之辯辯相與無有終窮一言爲百言百言爲千言千言爲萬言供往供來口舌云亂無有真實人君行之其政萬端吏民無可置其命以辯求辯是爲親屬兄弟也法律與法律爲親屬兄弟者今日已成法律矣以法律求法律凡天下法律之人皆聚事無大小皆有治凡人無有無罪之人也自生至老一人之身有幾何罪過無有無罪者以此相生人君子之十九强死以此爲理天下大亂不可止也以此論親屬兄弟相求各從其類理亂之本太平之基審此九事可知也天上諸神言好行道者天地道氣出助之好行德者德氣助之行仁者天與仁氣助之行義者天與義氣助之行禮者天與禮氣助之行文者天與文氣助之行辯者亦辯氣助之行法律者亦法律氣助之天地各以類行神靈也天將助之神靈趨之深思其要意則太平氣立可致矣請問上善易爲也上惡易爲耶夫陽極爲善隂極爲惡陽極生仙隂極殺物此爲隂陽之極也夫凡民生不能盡力養父母求竒方道術以資父母使懷悒悒而至死復相教善衣食歌舞以樂之是爲大逆之民天豈福之乎天上效凡書文對今天上爲法令天上人不得相期爲猾自有大術也地上亦然今真人豈知之耶自古到今多有是佞臣猾子弄文辭共欺其上愁其君父而得官位無功於天地而食禄天甚疾之地甚惡之天上名之亂紀今天上平氣至欲斷之恐此子復亂理今人積愚多可欺而得仕今天灾不可欺而去也不可詐僞而除也真與僞與天相應不悉以示下古之人試使用之灾害悉除即是吾之真文也與天上法相應可無疑也不言而反日彰明矣用之而無成功吾道即僞矣亦不言而明矣天上爲法不效巧言乃效成功成事比若向日月而坐俱有光明何以知其熱與清乎去人積遠以何效之主以成功也向日而坐煴也足以知熱向月而坐足以知清吾之真文亦若是矣天上爲法目視則理陽瞑則理隂視則理有形瞑則理無形視則理人身瞑則理精神以是爲效故能使隂陽悉理則無有失職者也地上亦然爲洞極皇平也今天之出書神之出策符神聖之文聖人造文造經上賢之辭此皆言也故天地神聖上士爲人盡力以言積年可立天地除灾害帝王案用之乃致遨遊而無事上得仙度增年得天意子孫續嗣無有絶也世衰乃更爲大興天下仰命莫不得其天地六方八遠絶洞隂陽俱悅天病風雨爲時雷電不作日月更明三光不失度四時五行順行各得其所此神聖善言所致也其功莫不大哉天上各異自有自然元氣隂陽與吾文相似各從其俗記吾書辭而行之即太平矣天上無極之三光各異自有自然元氣隂陽與吾文相似各從其俗記吾書辭而行之即太平矣天上中居各異自有自然元氣隂陽與吾文相似各從其俗記吾書辭而行之即太平矣天上三光各異其有自然元氣隂陽與吾文相似各從其俗記吾書辭而行之即太平矣天上雲氣各異自有自然元氣隂陽與吾文相似各從其俗記吾書辭而行之即太平矣天上音響雷電各異自有自然元氣隂陽與吾文相似各從其俗記吾書辭而行之即太平矣天下風雨各異自有自然元氣隂陽與吾文相似各從其俗記吾書辭而行之即太平矣天下居中風雲氣各異自有自然元氣隂陽與吾文相似各從其俗記吾書辭而行之即太平矣地上之人各異自有自然元氣隂陽與吾文相似各從其俗記吾書辭而行之即太平矣地上蚑行各異自有自然元氣隂陽與吾文相似各從其俗記吾書辭而行之即太平矣地上草木各異自有自然元氣隂陽與吾文相似各從其俗記吾書辭而行之即太平矣地上山阜各異自有自然元氣隂陽與吾文相似各從其俗記吾書辭而行之即太平矣地上川谷水澤各異自有自然元氣隂陽與吾文相似各從其俗記吾書辭而行之即太平矣地下各異自有自然元氣隂陽與吾文相似各從其俗記吾書辭而行之即太平矣地下無極隂陽各異自有自然元氣隂陽與吾文相似各從其俗記吾書辭而行之即太平矣五行各異自有自然之氣隂陽與吾文相似各從其俗記吾書辭而行之即太平矣四時各異自有自然元氣隂陽與吾文相似各從其俗記吾書辭而行之即太平矣六甲十干各異自有自然元氣隂陽與吾文相似各從其俗記吾書辭而行之即太平矣六甲十二子各異自有自然元氣隂陽與吾文相似各從其俗記吾書辭而行之即太平矣八方各異自有自然元氣隂陽與吾文相似各從其俗記吾書辭而行之即太平矣神靈各異自有自然元氣隂陽與吾文相似各從其俗記吾善惡書辭而行之即太平矣如不從其本類教之即大亂矣志之哉天教吾具出此文以解除天地隂陽帝王人民萬物之病也凡人民萬物所患苦悉當消去之故教子用法無極以示之乃拘校前後聖賢神文與凡人俗辭合而大考之後天地之病都得消除已消除帝王延年垂拱無憂也天太陽也地太隂也人居中央萬物亦然天者常下施其氣下流也地者常上求其氣上合也兩氣交於中央人者居其中爲正也兩氣者常交用事合於中央乃共生萬物萬物悉受此二氣以成形合爲情性無此二氣不能生成也故萬物命繫此二氣二氣交相於形中故爲善天地知之爲惡天地亦知之故古者上善德之人乃内獨知天意故常方爲善也天䜟曰復樂者樂復善者善復惡者惡復喜者喜復順者順復真者真復道者道復悅者悅凡所復夭地群神亦復之以影響哉復文者文復復僞者僞復復辯者辯復復佞者佞復復武者武復復逆者逆復復凶者凶復復邪者邪復凡所復悉天地群神復之凡吉凶安危之法在所復已凡人家力强者多畜私財後反多貧凶何也神人言此乃或多智反欺不足者或力强反欺弱者或後生反欺老者皆爲逆故天不久祐之何也然智者當苞養愚者反欺之一逆也力强當養力弱者反欺之二逆也後生者當養老者反欺之三逆也與天心不同故後必凶也夫財者天地之間盈餘物也比若水常流行而相從常謙謙居其下得多財者謙者多得也故期者天不祐之矣從天地隂陽中和三法失道已來天上多餘算蓄積不施行何也願聞其意然天之受命上者百三十謂之陽曆閏餘也其次百二十謂歲數除紀也其次百歲謂之和曆物紀也人悉當象是爲年今失三法已來多不竟其年者餘算一歲一算格在天上人行失天道無能取者今象吾文爲善行者天上悉且下此算以增之或得度世或延年矣天地已來帝王專以憂天下不平失職爲憂患也微此無可憂者也天下善人忠臣孝子悉共憂此但行吾文此憂除矣天上言陽氣大興盛鬼物不得妄行爲害何也夫陽盛者隂必衰故物不得妄行爲害也誰禁之乎陽精禁之陽精何以禁之哉夫陽精爲神屬天屬赤主心心神乃天之神也精者地之精也鬼者人之鬼也地母也鬼子也子母法同行並處隂道太平氣至陽氣大興天道嚴神道明明則天且使人俱興用之神道用則以降消鬼物之道也神道興與君子同行鬼物道者與小人同行故君子理以公正神亦理公正小人理邪僞鬼物亦理邪僞明於同氣類也今陽道興火兵刃當消滅火厭之故兵積隂氣盛火積陽氣盛陽盛消兵自然感召也人生必因天氣上善者付天中善付於人下善付田畝故上士學而度世中士當理民下士當理田野上士當來雲氣中士乘車下士當步行此三人各殊職不相妨害上士度世上天爲中和調風雨中士屬縣官當理人下士當理財産各有所職不相妨矣天上諸學道之爲法也人精求道也已小合於小道見諸神爲小得道門户未合於中道乃得至於大道至於大道乃能致於真神也小合小道者致小神合於中道者致中神合於大道者致大神大神至乃得度世長存而至此皆有大邪神鬼不欲人度世善惑人致怠退而自言變怪真僞相雜當此乃能分别邪正則度世矣天上名上士從生到終無一惡意乃爲凡人所愛五方人民縣官共賜之遺之中士乃爲鄰里所愛鄰里共賜之遺之下士無有善心意無可得賜遺但竊取其家私賜遺此天下人粃所爲何謂粃哉上士純善心意無惡是上陽也中士心意半善是其中陽也下士心意純無善是下陽也故名粃粃不成實内空無米爲無實信也無信實之人爲之粃人上士得縣官四方賜與其家者言不忘本祖也中士得四鄰賜與其家言不忘父母也下士反竊取其家財以付傍鄰里者當象其粃内空外實反背其本也皆有害天上言背反其家家中不和悉由此人夫臣外交其國必空家人外交其家必空天之咎皆從此起夫安危起於人腹中神靈見於遠方上下旁行洞達億萬里可不愼乎太平道其文約其國富天之命身之寳近出胷心周流天下此文行之國可安家可富天地格法善者當理惡正者當理邪清者當理濁不可以惡理善邪理正濁理清此反逆之令盜賊不止奸邪日生乃至大亂各從此起帝王將任臣必詳其選舉當以天心列宿合乃敢任之日者君德也月者臣德也若列宿不合必不能致太平奸邪生矣說天地上下中央八逹郵亭所衣食止舍何等也作道德而懷疑者取决於此讖今天上有官舍郵亭以候舍等地上有官舍郵亭以候舍等八表中央皆有之天上官舍舍神仙人地上官舍舍聖賢人地下官舍舍太隂善神善鬼八表遠近名山大川官舍以舍天地間精神人仙未能上天者雲中風中以舍北極崑崙官舍郵亭以候聖賢善神有功者道爲首德爲腹仁爲足而行之天設官舍郵亭得而居之欲得天力者行道欲得地力者行德欲得人力者行人此三者無窮之路失此三者亂之本也不循此三者名逆天故聖人苞道德行仁過此而言屬萬物之行矣請問四時之神氣以助理致善除惡何者致大神何者致中神何者致小神日思月建帝氣者致大神思相氣者致中神思殺氣者致小神思月建後老氣者致老物思月建後病衰氣者致邪鬼思月建後死氣者致純鬼思月建後破氣者致破殺凶惡咎害也生氣者屬天屬陽屬前天道以神氣生故斗前六神皆生後六神屬地屬隂天道以死氣爲鬼爲物凶咎子欲使後世常謹常信自親自愛神明精氣不得去離其身則不知老不知死矣夫神明精氣者隨意念而行不離身形神明常在則不病不老行不遇邪惡若神明亡病者立死行逢凶惡是大效也人欲不病宜精自守也凡事不過自然自然中無精神凡事皆不成神不過大道與天地之性中無大精神尚皆不成不能自全故天地之道據精神自然而行故凡事大小皆有精神巨者有巨精神小者有小精神各自保養精神故能長存精神減則老精神亡則死此自然之分也安可强爭乎凡事安危一在精神故形體爲家也以氣爲輿馬精神爲長吏興衰往來主理也若有形體而無精神若有田宅城郭而無長吏也夫長吏者乃民之司命也忠臣孝子大順之人所宜行也夫人之身而不忠於上不孝其親是負其身戮其刑亡其本也常思善精神集來隨人也思惡精神亦來集人也乃入人腹中隨趨人所思使悁悒不能忘之矣請問胞中之子不食而取氣在腹中自然之氣已生呼吸隂陽之氣守道力學反自然之氣反自然之氣心若嬰兒即生矣隨呼吸隂陽之氣即死矣太平經鈔辛部卷之八
