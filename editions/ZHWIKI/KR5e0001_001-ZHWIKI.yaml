body:
  text: 太平經鈔甲部太平金闕帝晨後聖帝君師輔歷紀歲次平氣去來兆候賢聖功行種民定法本起問曰三統轉輪有去有來民必有主姓字可得知乎善哉子何為復問此乎明師難遭良時易過不勝喁喁願欲請聞愚闇冒昧過厚懼深噫非過也天使子問以開後人今悟者識正去偽得真吾欲不言恐天悒悒亂不時平行安坐當為子道之自當了然無有疑也昔之天地與今天地有始有終同無異矣初善後惡中間興衰一成一敗陽九百六六九乃周周則大壞天地混齏人物糜潰唯積善者免之長為種民種民智識尚有差降未同浹一猶須師君君聖師明教化不死積鍊成聖故號種民種民聖賢長生之類也長生大主號太平真正太一妙氣皇天上清金闕後聖九玄帝君姓李是高上太之冑玉皇虛無之胤玄元帝君時太皇十五年太歲丙子兆氣皇平元年甲申成形上和七年庚寅九月三日甲子卯時刑德相制直合之辰育於北玄玉國天岡靈境人鳥閣蓬萊山中李谷之間有上玄虛生之母九玄之房處在谷陰玄虛母之始孕夢玄雲日月纏其形六氣之電動其神乃冥感陽道遂懷胎真人既誕之旦有三日出東方既育之後有九龍吐神水故因靈谷而氏族用曜景為名字厥年三歲體道凝真言成金華五歲常仰日欣初對月歎終上觀陽氣之煥赫下覩陰道以虧殘於是歛魂和魄守胎寶神錄精填血固液凝筋七歲乃學吞光服霞咀嚼日根行年二七而有金姿玉顏棄俗離情擁化救世精感太素受教三元習以三洞業以九方三七之歲以孤棲挫銳四七之歲以伉會和光五七之歲流布玄津功德遐暢六七之歲受書為後聖帝君與前天得道為帝君者同無異也受記在今故號後聖前聖後聖其道一焉上昇上清之殿中遊太極之宮下治十方之天封掌億萬兆庶鑒察諸天河海地源山林無不仰從總領九重十疊故號九玄也七十之歲定無極之壽適隱顯之宜刪不死之術撰長生之方寶經符圖三古妙法祕之玉函侍以神吏傳受有科行藏有候垂謨立典施之種民不能行者非種民也今天地開闢淳風稍遠皇平氣隱災厲橫流上皇之後三五以來兵疫水火更互競興皆由億兆心邪形偽破壞五德爭任六情肆兇逞暴更相侵淩尊卑長少貴賤亂離致二儀失序七曜違經三才變異妖訛紛綸神鬼交傷人物凋喪眚禍荐至不悟不悛萬毒恣行不可勝數大惡有四兵病水火陽九一周陰孤盛則水溢百六一帀陽偏興則火起自堯以前不復須述從唐以後今略陳之宜諦憶識急營防避堯水之後湯火為災此後徧地小小水火罪重隨招非大陽九大百六也大九六中必有大小甲申甲申為期鬼對人也災有重輕罪福厚薄年地既異推移不同中人之中依期自至中之上下可上可下上下進退升降無定為惡則促為善則延未能精進不能得道正可申期隨功多少是以百六陽九或先或後常數大曆准擬淺深計唐時丁亥後又四十有六前後中間甲申之歲是小甲申兵病及火更互為災未大水也小水徧衝年地稍甚又五十五丁亥前後中間有甲申之年是大甲申三災俱行又大水蕩之也凡大小甲申之至也除凶民度善人善人為種民凶民為混齏未至少時眾妖縱橫互起疫毒衝其上兵火繞其下洪水出無定方凶惡以次沉沒此時十五年中遠至三十年內歲災劇賢聖隱淪大道神人更遣真仙上士出經行化委曲導之勸上勵下從者為種民不從者沉沒沉沒成混齏凶惡皆蕩盡種民上善十分餘一中下善者天滅半餘餘半滋長日興須聖君明師大臣於是降現小甲申之後壬申之前小甲申之君聖賢嚴明仁慈無害理亂延年長壽精學可得神仙不能深學太平之經不能久行太平之事太平少時姓名不可定也行之司命注青錄不可司錄記黑文黑文者死青錄者生生死名簿在天明堂天道無親唯善是與善者修行太平成太平也成小太平與大太平君合德大太平君定姓名者李君也以壬辰之年三月六日顯然出世乘三素景輿從飛軿萬龍舉善者為種民學者為仙官設科立典獎善杜惡防遏罪根督進福業之人不怠而精進得成神真與帝合德懈退陷惡惡相日籍充後齏混也至士高士智慧明達了然無疑勤加精進存習帝訓憶識大神君之輔相皆無敢忘聖君明輔靈官祐人自得不死永為種民升為仙真之官遂登後聖之位矣後聖李君太師姓彭君學道在李君前位為太微左真人皇時保皇道君並常命封授兆民為李君太師治在太微北塘宮靈上光臺二千五百年轉易名字展轉太虛周旋八冥上至無上下至無下真官希有得見其光顏者矣後聖李君上相方諸宮青童君後聖李君上保太丹宮南極元君後聖李君上傅白山宮太素真君後聖李君上宰西城宮總真王君右五人一師四輔輔者父也扶也尊之如父持之得行總號為輔分而別之左輔右弼前疑後承承者發言舉事拾遺充足制斷宣揚即是宰也疑者向思未得啟發成明即是傅也弼者必定猶預即是保也扶君順師周帀入道即是相也四五占候俱詳可否贊弘正化總曰輔師閑居之時前向有疑問之傅後顧慮遺問之承右有所昧問之弼左有未明問之輔諮詢四輔相保傅宰成功在師不可闕也聖帝垂範使後遵行入有保保用事也陰屬右靜寶真也出有師師用事也陽屬左動歸寂也至此最難故略輔相而言師也望有傅傅在前敷說議趣也顧有宰宰在後決斷是非也其餘公卿有司仙真聖品大夫官等三百六十一從屬三萬六千人部領三十六萬人民則十百千萬億倍也常使二十四真人密教有心之子皆隸方諸上相不可具說但諦存其大自究其小也善哉今日問疑更聞命矣問曰李君何所常行而得此高真太師四輔學業可聞乎善哉子為愚者迷不信道學不堅固進退失常墮卑賤苦故勤勤問之乎今為子說之夫無始中來積行久久一善一惡不可具言言之無益今取近所行得成高貴者靈書紫文為要東華玉保高晨師青童大君大君清齋寒靈丹殿黃房之內三年上詣上清金闕金闕有四天帝太平道君處其左右居太空瓊臺洞真之殿平玉之房金華之內侍女眾真五萬人毒龍電虎玃天之狩羅毒作態備門抱關巨蚪千尋衛於墻堓飛龍奔雀溟鵬異鳥叩啄奮爪陳于廣庭天威煥赫流光八朗風鼓玄旌回舞旄蓋玉樹激音琳枝自籟眾吹靈歌鳳鳴玄泰神妃合唱麟儛鸞邁天鈞八響九和百會青童匍匐而前請受靈書紫文口口傳訣在經者二十有四一者真記諦冥諳憶二者仙忌詳存無忘三者採飛根吞日精四者服開明靈符五者服月華六者服陰生符七者拘三魂八者制七魄九者佩皇象符十者服華丹十一者服黃水十二者服廻水十三者食鐶剛十四者食鳳腦十五者食松梨十六者食李棗十七者服水湯十八者鎮白銀紫金十九者服雲腴二十者作白銀紫金二十一者作鎮二十二者食竹筍二十三者食鴻脯二十四者佩五神符備此二十四變化無窮超淩三界之外遊浪六合之中災害不能傷魔邪不敢難皆自降伏位極道宗恩流一切幽顯荷賴不信不從不知不見自是任闇永與道乖塗炭凶毒煩惱混齏大慈悲念不可奈何哀哉有志之士早計早計無負今言曰善哉善哉今日問疑更聞命矣
