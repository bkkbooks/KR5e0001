body:
  text: 太平經鈔丙部卷之三外三分别貧富君王行之立吉禁人斷絶地統以興男女平復王政天下何者稱富何者稱貧然多有者爲富少有者爲貧然子言是也又實非也今邪僞盜賊豈可爲富也今凡人多帝王少豈可謂貧邪富之爲言畢備足矣天以凡物悉生爲富足故上皇炁出萬二千物異生名爲富足中皇物減少不能備足萬二千物故稱小貧下皇物復少於中皇爲大貧無瑞應善物不生極下貧萬物俱出地養之不中傷爲地富不能養物爲大貧天爲父地爲母此父母貧極則其子日貧矣古者帝王以道治天下能致萬二千物爲上富君善物不足三分之二爲中富君三分之一爲下富君琦物不生下貧之君也古者有道帝王深居幽室而思道德而萬物自足豈不樂哉帝王行道者天神助其化行德者地神助其治行中和者人神助其治行文者隱欺之階也故欺神助之其治逆於大心而傷善人武治天下以刑殺服人盜賊市刑殺害也爲帝王法之本意以類相報天以好生故稱君父也地以寧靜好養萬物故稱母也用心仁愛萬物故稱仁也此二者善故稱爲師長大順天地合隂陽男女無冤結者致時雨降二炁和地生萬物帝王之道治立致太平夫貞男不施貞女不化隂陽不交滅絶世類二人共絶天地之統貪虚僞之名反無後世失其實核此天下大害也天若守貞即時雨不降地若守貞即萬物不生不施不生其害大矣天將興雨先必有風雲使人知之所以然者欲令收藏今太平炁當欲至恐人爲惡不止故先覺之令帝王當法象天地先視善道王事解承負訣天地開闢以來帝王大臣人民承負爲此事出教也凡自帝王大臣人民有承負過責流及後世皆由不能善養失其紀綱故有承負之責也比若父母失道德有過於鄉里後子孫必被鄉里所害此乃承負之驗也古者帝王大臣人民各知自養之道安有承負哉天不欺人種禾得禾種麥得麥在用力多少其稼善惡爲皇天解承負之仇爲后土解承負之殃爲帝王解承負之厄爲萬民解承負之過爲萬二千物解承負之責欲解承負之責莫如守一守一久天將憐之一者天之紀綱萬物之本也思其本流及其末古者聖人將有作也仰占天文俯察地理明其本末覩其明效天下之人有四窮何謂也謂子本生於父母少年之時思其父母不能去是一窮也及其大自勝女欲嫁男欲娶不能勝其情欲因相愛不能相離是二窮也旣相愛即生子夫婦老長顔色不可愛其子少可愛又當見養是三窮也其子只大可無養身便自老長不解行是四窮也四窮之後能得明師思慮守道上可高才有天命者或得度世其次或得壽其次可得須臾樂其身魂魄居地下爲其復樂何謂也地下悉得新死之人悉問其生時所作所更因定明籍因其所作而責之故子不可不預防安危人君當思太平得天之心魂魄神常與炁合其不能平其治者不合天心不得天意謂無功於天終即魂魄神獨責於地下以惡氣合是古上聖之君預知此故努力爲善愚人不深計故生亦有譴謫於天死亦有譴謫於地可不駭哉速傳吾書使天下之人得行之俱思其身定精念合於大道且自知過所從來即承負之責除矣天地大喜復反上古而倍矣天一也反行地二其意何也今地二反行人三何也夫地爲天使人爲地使故天悅喜即使今地上萬物大喜悅地雖養物也善即民居善此其相使明效也夫治亂者猶太多端不得天之心當反還其根本夫人言太多亦致亂若本根何患哉故一言而成者本也再言而止者成章句也三言而止反成解難也將遠真故有解難也四言而止反成文辭也五言而止反成僞也六言而止反成敗也七言而止反成破也八言而止反成離散遠道遠復遠也九言而止反成大亂十言而止反成滅毁故終至十而改更相傳而敗也夫凡事毁者當反本故反守一以爲元首是故數起於一終於十自然治亂之數也是故古者聖人問事初一占者其吉凶是也守其本乃天神下告也再卜占者地神出告也三卜占者人神出告之也過此而下者皆欺人不可占故卦數即不中也人間辭多不珍善哉天數起於一終於十何也天一也下與地二也隂陽具而共生萬物始萌兆元炁起於子轉東北布根於角轉在東方生出達轉在東南而悉生枝葉轉在南方而茂盛轉在西方而成熟轉在西北而終物終故當更始故爲亥二人共抱一爲三皇初是故亥者核也乃始凝核也故水始凝於十月壬者任也巳任必滋日益巨故子者滋也三而得隂陽中和炁都具成而更反初起故復本名爲甲子天道生物當周流俱具四時五行之炁乃能成也故本於天地周流八方故數終於十問帝王諸侯之爲治何者最善哉曰廣哀不傷如天之行最善夫治莫若大象天也雖然當有次第何謂也夫人最善莫如樂生急急若渴乃後可也其次樂成他人善如己之善其次莫若人施見人貧乏謂其愁心比若憂饑寒乃可也其次莫若設法但懼而置之可也其次人有大罪莫若於治不陷於罪過乃可也其次人有過觸犯事不可奈何能不使及其家與比伍乃可也其次罪及比伍願指有罪者愼無絶嗣也人者天地神明之統傷敗天地之體其爲禍深矣無爲子孫承負之厄常思太平以消刑格也吾爲天地譚爲上德君製作可以除天地開闢已來承負之厄會議不敢忘語必得怨於皇天后土又承負於上賢明道德之君其爲罪深大矣拘校上古中古下古道書集衆賢共讀視古今諸道文如一卷得一善守如得一善訣便隨事書記之一卷一善十卷得十善百卷得百善千卷得千善萬卷得萬善億卷得億善隨而書之出衆賢共議去復重因此要文編之以究意深知古今天地人萬物之精意簡說九人意其無冤者乎王治因喜解其先王之承負夫人萬物之長也其無形委炁之神人職在治元炁大神人職在治天真人職在治地仙人職在治四時大道人職在治五行聖人職在治隂陽賢人職在治文書皆受語凡人職在治草木五穀奴婢職在治財貨夫皇天署職不奪其心各從其類不誤也反之爲大害故置署天之凡民皆當順此古者聖人深承知此不失天意得天心也言九人各易治而得天心九炁合和故能致太平也此九事迭相成生一炁不和輒有不至者元炁不和無形神人不來至天炁不和大神人不來至地炁不和真人不來至四時不和仙人不來至五行不和大道人不來至隂陽不和聖人不來至萬物不和凡民亂貨財少奴婢逃亡凡事失職爲害若此得此九人能消萬世帝王承負之灾此九人上極無刑下極奴婢各調一炁故上士修道先當食炁是欲與元炁和合當茅室齋戒不覩邪惡日鍊其形無奪其欲能出入無間上助仙真元炁天治也是爲神士爲天之吏也無禁無止誠能就之名天士簡閱善人天大喜還爲人利也夫得道去世雖不時目下之用而能和調隂陽炁以利萬物古者帝王祭天上諸神爲此神吏也凡聖皆有極爲無形神人下極爲奴婢神人者乘炁而行故人有炁即有神炁絶即神亡皇天之明要證也所以明敕人君之治得失之效夫刑德者天地隂陽神治之明效爲萬物人民法度故十一月大德在初九居地下德時在室中故内有炁萬物歸之時形在上六在四野故外無炁而消也外空萬物士衆皆歸王德隨之入黄泉之下十二月德在九二之時在丑居土之中而未出達時德在明堂萬物隨德而上未敢出見上有刑也正月寅德在九三萬物莫不隨盛德樂閱於地而生時德居庭二月德在九四在卯巳去地未及天適在界上德在門故萬物悉樂出闚於門也三月盛德在九五辰上及天之中盛德時在外道巷故萬物悉出居外也四月巳德在上九到於六遠八境盛德八方善炁陽炁莫不響相應擾擾生之屬去四室之野處時刑在萬物之根居内室下室無物而上茂盛也莫不樂從德爲治也是治以德大明效今謹已聞用德未聞用刑然五月刑在初六在午地下下内無炁地下空時刑在空中内無物皆居外六月刑居六二在未居土之中未出達也時刑在明堂時刑炁在内德炁在外擾擾之屬莫不樂露其身歸盛德也七月刑六三申之時刑在庭萬物未敢入固固樂居外八月刑在六四酉時尚未及天界時德在門萬物俱樂闚於門樂入隨德而還反也九月刑在六五在戌上及中時刑在道巷萬物莫不旦死因隨德入藏故内日興外者空亡十月刑在上六亥時刑及六遠八境四野萬物擾擾之屬莫不入藏逃隨德行到于明堂蚑行之類自懷居内野外空無士衆是非好用刑罰者見徒邪哉但心意内懷以刑治其士衆輒日爲衰少也五月内懷一刑一羣衆叛六月内懷二刑二羣衆叛七月内懷三刑三羣衆叛八月内懷四刑四羣衆叛九月内懷五刑五羣衆叛十月内懷六刑六方羣衆叛故外悉無物皆逃於内是明證效也故刑治者外恭謹而内叛故士衆日少也是故十一月内懷一德羣衆入十二月内懷二德二羣衆入正月内懷三德三羣衆入二月内懷四德四羣衆入三月内懷五陽盛德五羣賢者入從四月内六德萬物並出見莫不擾擾中外歸之此天明堂法效也二月八月德與刑相半故萬物半傷於寒夫刑日傷殺厭畏之而不得衆力古者聖人威人以道德不以筋力刑罰也爲垂象作法爲帝王立教令可儀以治王道將興取象於德王道將衰取象於刑夫爲帝王制法度先明天意内明隂陽之道即太平至矣天師乃與皇天后土常合精念其心與天地意深相得比若重規合矩不失毛髮之間也知天地常所憂預得知天地之大忌諱者何等也天地神靈深大疾苦惡人不順不孝何謂也夫天地中和三炁内共相與爲一家共養萬物天者主生稱父地者主養稱母人者爲治稱子子者受命於父恩養於母爲子乃敬事父而愛其母何謂也然父教有度數時節故因四時而教生成惡人逆父之意天炁失其政令比若家人父怒其子父子不和隂勝陽下欺上臣失其職鬼物大興天地之位如人男女之别其好惡皆同天者養人命地者養人形今凡共賊害其父母四時之炁天之按行也而人逆之則賊害其父以地爲母得衣食養育不共愛利之反賊害之人甚無狀不用道理穿鑿地大興土功其深者下及黄泉淺者數丈獨母愁患諸子大不謹孝常苦忿忿悃悒而無從得道其言古者聖人時運未得通其天地之意凡人爲地無知獨不疾痛而上感天而人不得知之故父灾變復起母復怒不養萬物父母俱怒其子安得無灾乎夫天地至慈唯不孝大逆天地不赦可不㤥哉大起土大灾起小起土小灾起是地忿使神靈生此灾也或起土不便爲灾者得良善地也即灾者得凶惡地也主能害人並害遠方何謂也比若良善之人雖見冤害强忍須臾心終不忘也惡人不能忍須臾便見灾害也地體巨大人比於地積小所穿鑿安能爲害也然比夫人軀長一丈大十圍其齒齲間蟲小小不足道食人齒大疾當作之時其人啼呼久久齒爲之墜落悉盡人比於天地大小如此蟲與人矣齒若金石之堅者小蟲但肉耳而害物若此今有大丈夫巨力之士無不能制蚧蟲者一升蚧蟲共蝕此人乃病痛不得卧劇者著牀今蛄蟲蚤蝨小小積衆多共食人蠱蟲者能殺人蚤蝨同使人煩滿不得安坐皆生瘡耳人之害天地亦若是耳穿地見泉地之血也見石地之骨也土地之肉也取血破骨穿肉復投瓦石堅木於地中爲瘡地者萬物之母也而患省若此豈得安乎凡人居母身上亦有障隱多少穿地一尺爲陽所照炁屬天二尺者物之所生炁屬中和三尺者及地身隂過此已往皆傷地形也平道德價數貴賤解通愚人心今一旦賜子千斤之金使子與國家寧得天地之懽心以調隂陽使灾異盡除帝王老壽治致太平邪今齎萬變之璧以歸國家寳而藏之此天下珍物也寧使六方太和之炁盡見瑞應悉出夷狄却去萬里不爲害吾所以告子道畢具乃能使帝王保得天地之懽心天下羣神徧說蚑行動揺之屬莫不悅喜夷狄却降瑞應悉出灾害悉除國家延命人民老壽審能好善行吾書惟思其要意莫不響應比若重規合矩無有脫者也欲與國千斤金不若與一要言以致治太平除灾安天下古者帝王未常患財貨乃患貧於愁大賢不至人民聚皆欲外附日以踈少以是不稱皇天之心若積金玉竒物縱横千里直上至天終不致大賢聖人仙士來賴助帝王之治吾書乃三光神吏常隨而照之夫上之臣子民之屬其爲行也常旦夕憂念其君王也念欲安之心正爲其疾痛常樂帝王垂拱而自治也其民臣莫不象之而孝慈也上得天心下得地意中央使萬民莫不懽心無有冤結蚑行之屬莫不嚮風而化萬物各得其所天地和悅人君爲增壽上老至于嬰兒不知復爲惡天下且惜其君恐老天地必使神人持負靈藥告之帝王服之壽無窮矣何爲上善臣子之行也上善第一孝子之行者念其父母且老去獨居閑處念思之於何得不死之術以奉親賤財貴道活而已思絃歌以樂其親風化其意使入道也樂終古與居不知老也常爲求索殊方周流遠所至誠乃感天力盡乃已也衣食纔自足不復爲後世置珍寳反愁苦父母使守之此爲上善第一孝子也上善弟子受師道德之後念縁師恩遂得成人乃得長與賢柔相隨不失行伍或得名位以報父母或得深入道味知自養之術也夫人乃得父母得成道德於師得榮尊於君獨居一處念君師父將老無以可報之常思行爲師求殊方異文可以報功者或更學事賢者屬託其師爲其言語或使上得國家之良輔有益帝王之治若此者爲太古善弟子也古者三皇上聖勝人乃與至道與德治勝人不以威嚴智詐也夫以威嚴智詐刑罰勝人者正乃寇盜賊也夫盜賊專以此勝服人君子以何分别自明殊異乎故道德之君常將嚴威智詐爲盜賊之行矣天師書辭常有上皇太平炁且至何謂也夫聖人制法皆象之意也守一而樂上卜卜者問也常樂上行而卜問不止最上之路也故上字一晝直上而卜下爲字一下而卜卜問也常思念問下行者極無下故樂下益者不復得上也皇字者一日而王上一者天數得一得日照然後大明則爲王一與日王合而成皇字也一爲天天亦君也日君德也王亦君長也三君長共成皇言盛德煌煌天下第一無復能上者也太者大也言其積大如天無有大於天者平者言治太平均凡事悉治無復不平比若地居下執平比若人種刈種善得善種惡得惡耕用力分别報之厚天氣悅下地氣悅上二氣相通而爲中和之氣相受共養萬物無復有害故曰太平天地中和同心共生萬物男女同心而生子父母子三人同心共成一家君臣民三人共成一國夫帝王者天之貴子子承父教當順行之以降天地憂因得其祐故常思力行之使天文不效者時有理亂道不空出古者帝王見微知著因任行其事順其炁遂得天心意如長吉逆之則水旱炁乖忤流灾積成變怪不可止名爲灾異衆賢迷惑不知逆順之道使其知之逢太平則安枕而理中平則可力而行之逢不平以道自輔而備之猶若夏至則備暑冬至則備寒此之謂也天道有常運故順之則吉昌逆之則危亡天道戰闘其命傷日月失度列星亂行能用者自力無敢閉藏賢明上下令自安灸刺者所以調和安三百六十脉通隂陽之炁而除害者三百六十脉者應一歲三百六十日日一脉持事應四時五行而動出外周旋身上緫於頂内擊於藏裏咸應四時而動移有疾則不應度數往來失常或結或傷或順或逆故當治之火者太陽之精公正之明也所以察奸除害惡也刺者少隂之精也太白之質所以用義斬伐治百中百治十中十此得天經脉讖書也實與脉相應則神爲驅使治十中九失一與除脉相應精爲其軀使治土中八人道書也人意爲其使過此而下不可以治疾也反或傷甲脉有病反治乙名爲恍惚不知脉獨傷絶故樂知天道神不神相應與不也直置一病人於前名爲脉本文比若書經道本文令衆賢而識其病或有長於上或有長於下三百六十脉各有所覩取其行事常所長而治訣者以記之十十中者是也不中者皆非也集衆行事愈者以爲經書則所治無不解訣者也吾道即甲子乙丑六甲相承受五行轉相從四時周反始書卷雖衆多各各有可紀比若人一身頭足轉相使一字只遺一字起賢之次之以相輔合隂陽以言語表裏相應如規矩始誦無味有久久念之不懈驗至矣灾害去身神還聚人自謹良無惡子爲無刑罰而道化美極也明按吾文以却咎扞禍禍自止民自壽原未得本無終始十十相應太陽文也十九相應太隂文也十八相應中和書也十七相應破亂文也十六相應過中書也十五相應無知書也可言半吉半凶文十四中者邪文也十三中者大亂文也十二中者棄文也十一中者佚中文也十七中者已下不可用誤人文也隨傷多少還爲人傷久久用之不止法絶後滅嗣此爲十十文也樂得其實者但觀上古之聖辭中古之聖辭下古之聖辭合其語言視其所爲可知矣復思上古道書中古道書下古道書三合以同類相召呼復令可知矣凡書文皆天談何故其治時矣然能其言正其言者理矣不正不明亂矣正言詳辭必致善也言凶辭必致怨矣欲致善但正本本正則應天文與聖辭相得再轉應天理三轉爲人文四轉爲萬物萬物則生浮華則亂敗矣天文將出以考元正始除其過者置其實明理凡書即天之道也得其正言者與天意相應邪也致邪惡氣使天地不謂萬物多失其所帝王用心愁苦得復亂焉故當急爲其考正之念念從古到今書悉已備具矣神祇之謫人非同若人得遠辟易逃也得神祇之心以解天下之憂以安帝王使萬物各得其所是吾守三實太平氣來邪僞去奸猾絶滅真人問天下有幾何急有幾何急有幾何益禍凶而不急乎神人言其人宜自精而具言之凡天下之事用爲急不事用者爲不急神人言似是而非也欲得常急而不可廢廢之天下絶滅無人理并合無名字者故爲大急夫天下大急有二小急有一其餘悉不急反厭人耳目爲人召禍亡家喪國若身絶後坐不急之務而致此禍患若此夫人生受命之時與天地分身抱元氣於自然不飲不食呼吸隂陽氣而活不知飢渴久久離神道遠漸失根本後生者復不知真道日流就僞便生飢渴不飲不食便死是大急也天地憐愍共爲生可飲食之物既食且飲天統隂陽當見傳不得中統天地之統也傳之當象天地一隂一陽一男一女然後能生生也夫隂極則生陽陽極則生隂隂陽相傳比若寒暑自然之理故能相生世世不絶天地之統夫絶天地之統何有夫婦父子君臣師弟子乎主通天教助帝王而化成天下故食飲與男女相須二者大急夫衣者依也有衣即生賢無衣則生不肖也故衣以禦害故古者聖帝明王不效玄黄之色但禦寒暑而已飲食隂陽不可絶絶之天下無復君臣父子之道守此三者以竟天年傳其天統終者復始無有窮已古者聖人以此爲理其餘皆不急但召凶禍夫男者天也女者地也衣食者中利過此三者其餘皆僞之物非可須爲活反多致禍姦致理不平和氣不至天道乖錯爲君子重憂六情所好人不能禁止因以致禍君子失其政令小人盜劫心生家亡國敗未嘗不因不急之物召之天下貧困愁苦灾變下極欺上日就浮華因而愁苦不竟天年復使後生趨走不止山川爲空竭元氣斷絶地氣衰弱生養萬物不成天灾變改生民稍耗姦僞復生不急之物爲害若此而欲悅耳目之娱而不悟深深巨害矣真人復問神人孝子事親親終後復事之當與生時等邪復有異乎事之復過於生時復不及也人由親而生得長大見親終去復無還期不得受其教敕出入有可反報念念想象不能已矣欲事之過生殆其可乎神人言子之言但世俗人孝之言耳非大道意也人生象天屬天人卒象地屬地天父也地母也事母不得過父生陽也卒隂也事隂不得過陽陽君道也隂臣道也事臣不得過於君事隂過陽即致隂陽氣逆而生灾事小過大即致政逆而禍大隂氣勝陽下欺上鬼神邪物大興而晝行人道疾疫不絶而陽氣不通君道衰臣道强盛是以古之有道帝王興陽爲至降隂爲事夫日陽也夜隂也日長即夜短夜長即日短日盛即生人盛夜盛即鬼神盛夫人以日俱鬼以星俱日陽也星隂也故日見即星逃星見即日入故隂勝即鬼神爲害與隂所致爲害如此也上古之人理喪但心至而已送終不過生時人心純朴少疾病中古理漸失法度流就浮華竭資財爲送終之具而盛於祭祀而鬼神益盛民多疾疫鬼物爲祟不可止下古更熾祀他鬼而興隂事鬼神而害生民臣秉君權女子專家兵革暴起奸邪成黨謟諛日興政令日廢君道不行此皆興隂過陽天道所惡致此灾咎可不愼哉師策文師曰吾字十一丙午丁巳爲祖始四口治事萬物理子巾用角活其右潜龍勿用坎爲紀人得見之壽長久居活而已治百萬人仙可待善治病者勿欺殆樂乎長安市使人壽若西王母比若四時周反始九十字策傳方士真人請問神人前所賜不達之生策書九十字未知趨向義理所歸願爲一一解以遺後世貫結而不忘神人言爲子直解之師曰吾字十一明爲止師者正謂皇天神人師也曰者辭也吾乃正辭於天親見遺而下爲帝王萬民具陳解億萬世諸承負之譴也吾者我也即天所急使神人也今天以是承負之灾四流始有根本後理者悉皆隨之失其政無從得中斷止之更相賊傷爲害甚深今天以爲重憂字者言今陳列天書累積之字也十者書與天真誠信洞相應十十不誤無一欺者也得而衆賢者自深計其先人皆有承負也謂之不止承負之厄小大悉且除矣一者其道要正當以守一始起也守一不置其人日明天迷解矣明爲止止者足也夫足者爲行此道者但日有益昭昭然不復愚闇冥冥也十一士也明爲止者赤也言赤氣謂此當復更盛大明也止者萬物之足也萬物始萌直布根以本足生也行此道其法乃更本元氣得天地之心第一最善政稱上皇之道也丙午丁已火也赤也丙午者純陽也丁已者純隂也隂陽主利陽氣復和合天下與也爲者爲利帝王隂凶害也祖者先也象三皇德也始者反本初也當行此道反上三皇化也四口治事萬物理四而得口者言也皆日習言吾書者即得天正經字也令得其志意乃上與天心合使萬物各得其所而不復亂故言萬物理也子巾用角治其右者誦字也誦讀此書而不止凡事悉且一旦而正上得天心歡然而常喜無復倍也潜龍勿用坎爲紀潜龍者天陽氣還復初九甲子歲冬至之日天地正始起於是也龍者乃東方少陽木之精神也故天道因木而興火行夫物將盛者必當開通其門户也真人到期月出此書宜投開明之地開者闢也通達也開其南更滌暢陽氣消去其承負之厄會潜藏也道已往到反隱藏也勿用敢也未也先見文者未知行也用者治也事也今天當用此書除灾害玄甲歲除之其時君未能深源書意得能用之也故言勿用者見天又未敢專信而即效按用之信而用之者事主效若響應爲其明證也乃與天道合響應也坎爲紀者子稱坎甲天之綱綱陽也坎者水隂也紀也故天與地常合其綱紀於玄甲子初出此書爲有德君理化作綱紀也故言坎爲紀也乃謂上皇天書下爲德君出真經書以斷邪以玄甲爲首子爲本故以上甲子序出之人得見之壽長久人正謂人君帝王一人也上德易覺知行道書之人也據瑞應又不疑天道也深得意則壽矣壽竟其天壽也長者得無窮也久者存也居天地間有活也居處也處天地間存活當學道真也浮華之文不能久活人也諸承負之厄會咎皆謂無核實之道故也今天斷去之治百萬人仙可待其理正也天以此書正衆賢之心各自理病守真去邪仙可待者言天下聞之真道翕然悉除輔佐有德之君理真道活人法也故曰仙可待善治病者勿欺殆凡人悉愚不爲身神皆爲邪僞之文無故自殆反得天重讁而生承負之大責故天使棄浮華文各守真實保其旦夕力行之令久久有益無肯復欺殆者樂乎長安市樂者莫樂上皇太平氣至也呼嗟嘆其德大優無比雙也長者行此道其德善長無窮已也安者不復危亡也得行此道者承負天地之讁悉去乃長安曠恢曠恢無復憂也市者天之所共聚人處也行此書者言國民大興皆若都市中人也使壽若西王母者使人謂使帝王有大德好行正文之人也若順也能大順行吾書即天道得之者大吉無有咎也西者人人栖存真道於胷心也王者謂帝王得行天道大興而王也其理善乃無上也母者考壽之證神之長也比若四時周反始者比者若四時傳相生相成不復相賊傷也其理無有刑也九十字策傳方士九者究竟得行此道其德究合天地隂陽萬物之心也十者十十相應無爲文也字者言天文上下字周流徧道足也傳者信也故爲作文守符信傳之方者大正也持此道急往付歸有道德之君可以消去承負之凶其理即可大正也士者有刻志一介之人也一介之人者端心可教化屬事使往通此道吾策之將可覩矣天諫正書天者小諫變色大諫天動裂其諫而不從因而消亡矣三光小諫小事星變色大諫三光失度不明諫而不從因而消亡矣地小諫動揺大諫土崩地裂諫而不從因而消亡矣五行小諫灾生大諫木行蟲殺人火行毒殺人金行虎狼殺人水行水蟲殺人土行吏民刻毒相賊殺人諫而不從因而消亡矣四時小諫寒暑不調大諫寒暑易位時候無復節度諫而不從因而消亡矣六六精氣共小諫亂起中生蟲灾或蜚或步多雲風而不雨空虚無實大諫水旱無節度殺傷萬物及人民諫而不從因而消亡矣蜚步爲獸小諫灾人大諫鳥獸食人蝗蟲大興起諫而不從因而消亡矣鬼神精物小諫崩起賊病使民大諫刑死滅門諫而不從因而消亡矣六方小諫風雨亂發狂惡毒俱行傷人民大諫横加絶理風石飛起十地上柱皇天破室屋動山阜諫而不從因而消亡矣天地音聲小諫雷電小急大諫霹靂數作諫而不從因而消亡矣吏民小諫更變色大諫多傷賊諫而不從因而消亡矣夫天地六方八極大諫俱欲正河洛文出矣天明證天下瑞應書見以諫正君王天下莫不響應諫而不從因而消亡矣天道經會當用復以次行是故古者聖賢終日思唯不敢懈怠失毛髮之間見微知著不失皇天心故能存其身安其民養萬物無憂患危亡兇禍不得來計事投筭與天意同矣天之所祐者祐易教祐至誠祐謹順祐易曉祐敕天之於帝王最厚矣故萬般誤變以致之不聽其教故廢而致之天地神明不肯復諫正也灾異日增人民日衰耗亡失其職古者聖帝明王旦夕垂拱能深思察天心不敢失之故父事皇天母事皇地兄事日姊事月正天文保五行順四時觀其進退以自照正其行自知得失矣太乎經鈔丙部卷之三
