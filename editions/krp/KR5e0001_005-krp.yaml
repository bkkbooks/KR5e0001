body:
  text: 太平經鈔戊部卷之五外五以天䜟文支干相配長安國家以理所問乃求索洞通天地之因䜟文一言萬世不可易天君疾多災愁苦夫皇天以四時爲肢地以五行爲體肢主盛衰體主規矩部此九神同流天下上下洞極變化難覩爲天下重寳爲衆門户自有固常不可妄犯順之者長吉亂之者天地乖忤天常䜟法以南方固爲君也日在南方爲君火在南方爲君太陽在南方爲君四時盛夏南方爲君五祀竈在南方爲君五藏心在南方爲君君者當衣赤服火之行也君有變怪常與陽相應非得與地相應也日者最明爲衆光之長故天常以日占君德盛衰人君之法當求與仁者同家有心者爲理共理者常當行道而好生故東方者好生南方者好養不仁不可共理不明不可爲君長東方木仁南方火明東方主道南方主德道主生德主養東方爲文龍見負之南方爲章故正爲文章也東方爲少陽之始生也故出東方南方太陽君之盛德明照少陽君之家木生火也少隂爲臣以義屈伏於太陽故金隨火屈折可欲爲臣者常以義屈折佐君欲爲也故少隂爲臣太隂爲民民流行不止故似水流行不息民者主當爲國家王侯理生故水養木木者君之家也天之格讖少陽畏少隂故臣者反主録國家王侯官屬也太陽畏太隂國有道德而君臣賢明則民從國無道德則民叛也是故理國之本民多爲富民少爲貧天格法分爲六部東南上屬天萬物生皆上行蚑行人民皆出外屬天故天爲之色外蒼象木内赤象火西北屬地萬物秋冬悉落下歸土人民蚑行至秋冬悉入穴而居故地之爲色外黄白象土金内含水黑象北行也東方南方位尊上屬天主理爲君長師父西北方屬地卑爲臣爲後宫爲民者甲之後宫也甲天也王者之本位故爲心星心星火也屬南方丙爲火之長取其大明者也君之位也辛者丙之後宫甲者丙之父也故己乃大皇后之宫也辛者配丙丙者甲之子故辛者小皇后之宫也丙者乃甲之適子受受命之君也庚者屬乙是國家諸侯王之夫也壬者屬丁是帝王女弟之夫也癸者屬戊是國大皇后之婦家也十干各有所屬地主之十二支云何哉天之爲法隂陽雖行相適者各自有家天之爲法不同不舉家相隨而止爾甲者以寅爲家乙者以卯爲家丙者以午爲家丁者以已爲家戊者以辰爲家己者以未爲家庚者以申爲家辛者以酉爲家壬者以子爲家癸者以丑爲家故天道反行理地道止也故有分土反無分民蓋有國故天地不移天反一日一夜周流一竟行之爲常故十二支各有其處不隨干轉也酒者水之王水王當尅火火者君德也急斷酒以全火德吾之道法廼出以規陽入以規隂出以規行入以規神出以規衆書入以規衆圖出以消灾入以正身出以規朝廷之學其内以規入室凡事皆使有限努力好學者各以其才能反失其常法外學遂入浮華不能自禁内學不應正路反入大邪諸學者廼有大病不能自知也其好外學才大過者多入浮華令道大邪而無正文反名真道更以相欺殆也内學才太過者多入大邪中自以得之也今古文衆多不可勝限凡學得其真事勿違其本也學於師口訣者勿違其師之言是其大要夫學之大害合於外章句者日浮淺而致文而妄語也入内文合於圖讖者實不能深得其結要意反誤言也凡事爲天譚十十相應者是也十九相應者小邪也十八相應者小亂矣過此而下不可用也名亂天文隂陽不喜萬物戰鬥人民被大咎也養性法内見形容照然者是也外見萬物衆精者非也凡事常守本文而求衆賢說以安之者是也衆文章句而忘本事者非也天師爲太平之氣出受道德以興上皇好有道之君乃下及愚小民其爲思乃洞於六合合於八極無不包裹道有九度分别一名爲元氣無爲二爲凝靖虚無三爲度數分别可見四爲神遊去而還反五爲大道神與四時五行相類六爲剌喜七爲社謀人爲洋神九爲家先一分爲九九九八十一道殊端異文宻用之則共爲一大根以神爲使以人爲門户元氣無爲者念身無一爲也但思其身洞白若委氣而無形常以是爲法二爲虚無自然者守形洞虚自然無有竒也身中照白上下若王三爲度數者積精還自視數頭髮下至足五指分别形容内外莫不畢數知其意常以是念不失銖分此爲小度之術四爲神遊出去者思念五臟之神晝出入見其行遊可以語言知其吉凶次度數也五爲大道神者人神出乃與四時五行相類青赤黄黑俱同臟神出入五行神吏爲人使可降諸邪也六爲剌喜者以剌擊地頗使人好巧不可常使七爲社謀社謀者天地四時社稷山川祭祀之神不可妄爲八爲洋神者其神洋洋其道無可繋屬天下精氣下使人妄言半類真半類邪九爲家先先者純見鬼無有真道也天神自有神寳精光隨五行爲色隨四時之氣爲興衰爲天地使人民萬物也天地之間隂陽之際莫不被德化而生焉守道德積善乃究洽天地鬼神精氣人民蚑行萬物四時五行之氣常與往來莫不知其善者矣大慈孝順閭第一慈孝者思從内出思以藏發不學能得之自然之術行與天心同意與地合上有益帝王下爲民間昌率能致和氣爲人爲先法其行如丹青故使第一明道德大柔閭第二明經道德爲百姓先學好道善聚德不致盜賊上有益帝王化之最真吉矣孝悌始學化善閭第三始學欲爲善心中有庶幾去邪就正且成仁行未化也佃家子謹閭第四佃家謹力子平旦日作日入而息不避勞苦日有積聚家中雍雍以養父母得土之利順天之道不敢爲非有益縣官大不仁之子無義少年好兵聚姦閭第五無義之人不仁之子不用道理駡天擊地不養父母行必持兵恐畏鄉里輕薄年少無益天地之化反爲大害并力計捕捐棄溝瀆不得藏埋不和家中欺老愛少共食異財閭第六家將必敗骨肉不和不能相教妄傳往來更相逃避背本向末其禍不救矣悔過棄兵閭第七生於窮里希有聞覩不知善惡有過天下行不合天賴有明君使我就善少不知學長乃悔之使善人賢士以五尺柱高卒有去閭學者當考問之一旦民皆爲善矣悔過更合善閭第八室學不成禍亂悉生賴有明君知我情由令我悔過反致爲人師矣大惡人邪貪敗化閭第九尸禄邪惡貪賊欺上害下大佞名爲官賊似人之形貪獸之情無益天地隂陽災深當誅亡除過復正悔事閭第十悔過改行易心少無善情灾害數生朝過暮改名爲善人此十閭古賢聖人之法樂人爲善使不相賊傷欲令各終天年還反其道防絶其本得覩太平之氣也神者皆以規正其根太相太相繫於帝王因以正天行之其次根繫於皇后因以順地理中根繫於衆聖因以理隂陽細微小根繫於庶民因以理萬物大人爲之得大中人爲之得中小人爲之得小皆可有正也帝王行道德興盛日大明少道德少明皇后行道德月大光明少道德少光明衆賢行道德星曆大耀少道德少耀四根俱行道德天下安寧瑞應出大光遠遥觀天象風雨時善夷狄歸心災害自消今得天師書道德以往付謹民使謹民使歸上有大仁道德之君可以平天下之理而長安身帝王尸上皇天之第一貴子也皇后乃地之第一貴女也夫至神聖貴人職當居百重之内而反憂天下萬里之外受天業爲隂陽六合八方持統首天地之尊位爲神靈所因任上下洞極萬物蚑行之屬莫不歸心於是作無上靈寳謁能知天意明於星曆之吏名爲太史直事不得逋日與夜迭上觀候天氣盛衰三光之得失樂得天勑戒以自安也十一月則修黄鍾導地下之氣使上通樂得后士意以自安矣作明堂於太陽丙午之地爲其開八窗四逹樂通八方四時之氣欲與八風四時之氣合其吉以自安也明闢四門樂得天下竒文殊策希見之物賢明異術可以長安天下而消灾異古者聖人在位常力求隱士賢柔可以共理願聞四時爲尊貴然王氣乃爲無氣之長也衆氣所繋屬諸尊貴之君也王氣乃爲天爲皇爲帝爲王爲太歲爲月建爲斗岡爲青龍爲大德爲盛興爲帝王爲無上王爲生成主是故王氣所處萬物莫不歸王之王氣所居皆王而生所背去悉死由元氣也故王氣處陽則陽王居隂則隂王居天則天王居地則地王所處者皆王受命主理是古者聖人王者春東夏南秋西冬北六月中央匝氣則謁見天王氣乃尊於天當月建名爲破大耗當帝王氣衝爲名死滅亡元氣建位帝王氣爲第一氣尊嚴不可妄當也月建後一爲閉閉者乃天主閉塞其後隂休氣恐來前爲姦猾干帝王建氣也故閉其後也開者天之法不樂害傷也故開其後者示教休氣爲其有爲姦者樂開使退去也不去當見收收則考問之則成罪罪則不可除令死危故後五爲危危則近死矣故後六爲破天斗所破乃死故魁主死亡乃至危也故帝王氣起少陽太陽常守斗建死亡氣乃起於少隂太隂常守斗魁是故後六將天常休之空之與地同氣主閉藏匿奸宄與邪鬼物同處不可妄開發古有賢人好生也悉氣屬斗前與天行并故日吉能有氣也諸爲奸猾隂賊惡邪悉象隂氣屬斗後故日衰所爲者凶元氣怳惚自然共凝成一名爲天也分而生隂而成地名爲二也因爲上天下地隂陽相合施生人名爲三也三統共生長養凡物名爲財財共生欲欲共生邪邪共生奸奸共生猾猾共生害而不止則亂敗敗而不止不可復理因窮還反其本故名爲承負夫天道無心遭不肖則亂得賢明則理古者帝王得賢明乃道興不敢以下愚不肖爲近輔速以吾此文付上德之君行之洞明者光以三氣相見問之占十中十所理悉理此第一善明可以爲帝王使占十中九一氣亂不理可爲諸侯使占十中八二氣亂不理可爲凡人使過此已下名亂天正道必有冤結鬼神精伏逃不見不可理不能調和太平之氣子欲得道思書文求道之法靜爲根爲根積精不止神之門五德和合見魂魄心神已明大道陳先知安危察四鄰群神大來集若雲若是不息長壽君哉大道不用勤形若死灰守魂神魂神不去乃長存周者反始環無端去本求末道有患衆民失之不得完思其意無失真言清靜爲本非用錢可不重愛明師言順受師語不死焉愚者逆師與鬼鄰不得正道入凶門遂不復還去神骨肉腐塗稱祖先命已滅亡大窮焉凡愚之術皆從内出自有法律厚爲本根見神而活亦無苦愁神惡勞烈安心定意愼無暴卒久久自靜萬道俱出長存不死與天相畢爲之必和與道爲一賢持無置凡事已畢俗念除去與神交結乘雲駕龍雷公同室軀化而爲神狀若太一詳思書言愼無失節凡精思之道成於幽室不求榮位志日調宻開蒙洞白類似晝日不學之時若夜視漆東西南北迷於其室令賢聖惶㤥心獨戰慄五守已强不死亡安貧樂賤可久長賤反求貴道相妨尊官重禄愼無望强求官位道即亡不若除卧久安牀不食而自明百邪皆去遠禍殃守靜不止不喪幸可長命而久行無敢恣意失常求之不止爲道王治活之術各異方與民殊事不相妨上之好生民命久長俗教道上有仁王聖主思道化下流行令民清廉永無禍殃民之不死上之明也上無明君教不行不肯爲道反好兵户有惡子家喪亡持兵要人居路傍伺人空閑奪其裝縣官不安盜賊行觀民可爲上可明人君好仁下求長生上之不仁下多邪傾皆令夭死不知樂生下愚好德上教令也民之好道者其主明也盡欲長生遠禍殃也不食廉潔去諸兵也垂拱無爲棄不祥也聖主大興其民相親也恩及下愚是其王也天道好生以安上也下愚不爭上之慶天下幸甚莫不歸王也民不好道者上之不明也内懷姦心明行也不好爲德反好兵也父子分離居道傍也不得長生積死喪也家有貧子若虎狼也上之無德兵禍殃也下愚爲君化不行也民多好仙帝王明也天見其治恩下行也蚑行喘息皆被光也天者好生道故爲天經積德者地經地者好養故爲地經積和而好施者爲人經和氣者相通往來人有財相通施及往來故和爲人經也古者將學問者皆正其本比若種木也本索善種置善地其生也本末枝葉悉善本者是其本師枝實者是弟子是故古之學悉先念思本乃學其道也故可爲者得與天心合故吉也夫種木不擇得善木又植惡地枝葉華實安得美哉此者始以端身正性道意止歸之元氣還以安身念古法先師所職行何以能自治計定意極且自得之先以安形始爲之如嬰兒之遊不用筋力但用善意詳念先人獨壽其治獨意以何得之但以至道繩邪去姦此若神矣無有竒怪本正以是爲之故得天心不負地意四時周五行安子孫不相承負各懷至德不復知爲邪惡也入室獨居思經道之本所須出入賢者先得其意其次隨之遂俱入道與邪相去矣入室思存五官轉移隨隂陽孟仲季爲兄弟應氣而動順四時五行天道變化以爲常矣失氣則死有氣則生萬物隨之人道爲雄故立五官隨氣而興天道因氣飛爲雄真人積氣聚神明故道終常獨行萬民失氣故死喪者爲賤生者爲貴子守道可長久隨氣而化天爲常無急名利道自行天道常生無有喪地道持兩主死亡夫上古聖賢者於官中士度於山下士蟲死居民間賢者見書深思此言先難後易身亦無患而守德成大道身學已更九室成神人其念常與凡人殊絶異朝夕未常念地上欲聞天事也意乃念天上職事乃後可下九室積精篤竭自化易其形容即是上天聖人也不得復理民間時事明矣吾之書乃使高士遂生而不見下士不敢妄爲妄言也吾書爲道所能窮竟人志使人賢不肖各盡其才至死無可復悔者乃各盡其天命也欲壽樂久存者思正道意可往矣不樂久存者宜就俗事但樂止其身而已驗行鏡其身自知可爲得失法賢明智廼包裹天地積書無極而不能自壽益命此名空虚無實道也術士之師也久久還自窮之學能遍授天文地理悉解萬物之情衆書並合備具而不能事親尊君此知無益也詳思此言吉凶可知矣此以簡行即令人自知得失學問何者爲急故陳列二事分明士意失得之象自閉闢已來行有二急其餘欲知之亦可不知之亦可天地與聖明所務當推行而大得者壽孝爲急壽者乃與天地同優也孝者與天地同力也故壽者長生與天同精孝者下承順其上與地同聲此二事者得天地之意凶害自去深思此意太平之理也長壽之要也諸欲爲善求活者少故父母者生之根也君者授榮尊之門也師者智之所出不窮之業也此三者道德之門户也父母廼傳天地隂陽祖統也師者廼曉知天地之意解凡事之結君者當承天地順隂陽常務得其意以理道爲事故此三者性命之門户也深思此言萬害除矣壽孝者神靈所愛好也不壽孝者百禍所趨也此道自然不用力欲知其效常隨人意善惡所致心意謀事於内響應於外欲知其道正影響之應也心以意吉凶之門户古者太平之君其理要但用心意善即臣善用意誤得臣亦誤心意天地樞機也不可妄動也使和氣錯亂灾害日生矣太平經鈔戊部卷之五
