body:
  text: 太平經鈔癸部卷之十外十一曰神道書二曰核事文三曰去浮華記都曰大順之道太者大也大者天也天能覆育萬物其功最大平者地也地平然能養育萬物經者常也天以日月五星爲經地以嶽瀆山川爲經天地失常道即萬物悉受灾帝王上法皇天下法后地中法經緯星辰嶽瀆育養萬物故曰大順之道神人真人聖人賢人自占可行是與非法古者神人自占是非得與不得真事立可觀也不但闇昧昭然清白神道至衆染習身神正心意得無藏匿善者出惡者伏即自知吉凶之法如照鏡之式也於此之時賢明自安時不再來物不重應乃得獨盛洽遠方故事見其應見愼無拒逆撰以爲寳器可謂得天地之心意矣其事時矣事皆職矣神道來矣賢者謀矣吉人到矣邪者不來矣清明見矣四方悅矣幽人隱士出矣得天心矣得治術矣邪不發矣自然達矣真人來輔矣天下善應矣各以其事來矣去憒亂矣此應出腹中發于胸心乃若雷電之應證也夫瑞應反從胷中來隨念往來須臾之間周流天下心中所欲感動皇天隂陽爲移言語至誠感天正此也念者能致正亦能致邪皆從志意生矣使能動天地和隂陽合萬物入能度身出能成名賢不肖皆由斯生故賢者善御萬不失一也人復中有過反面赤何也心者五藏之主主即王也王主執正有過乃白於天也驚即面青何也肝者主人人者憂也反㤥肝膽爲發怒故上岀青也諸神皆有可主以萬物相應故令人常自謹良而順天地而灾不得復起也外學多内學少外事日興内事日衰故人多病故多浮華浮者表也華者末也夫天道遠入邪中不能自還所謂神道書者本根與隂陽合與神明同核事文者考核異同疑誤不失浮華記者離本已遠乃居野其文錯亂不可常用時可記也守本者治若神矣守中者少亂而煩矣守末者昏矣故賢者守本戒中不敢從末也夫能守之不止方方善來者無拒逆撰爲寳器萬世不復易也人力自爲善者可厄乎邪辟夷狄却乎兵革絶乎杖策絞無聲乎四方安乎道路通乎人君明乎神策大人守之動四方中士爲之令臣良小人爲之不相傷其辭約其法明占神文乎可不行不能持乎愼無傷以拘奸乎以自防却不祥法順用四時五行外内思正身散邪却不祥懸象而思守行順四時氣和合隂陽羅網政治鬼神令使不得妄行害人立冬之後到立春盛行用太隂氣微行少陽之氣也常觀其意何者病爲人使其神吏黑衣服思之閑處四十五日上至九十日令人耳目聦明立春盛德在仁氣治少陽王氣轉在東方興木行其氣弱而仁其神吏青衣思之幽閑處四十五日至九十日令人病消以留年行不止令人日行仁愛春分已前盛行少陽之氣微行太陽之氣以助少陽觀其意無疑深思其意百邪服矣立夏日盛德火王氣轉在南方太陽之氣以中和治其神吏用之得其意口中生甘神吏赤衣守之百鬼去千里夏至之日盛德太陽之氣中和之氣也其神吏思之可愈百病季夏六月盛德合治王氣轉在西南迴入中宫其神吏黄衣思之令人口中甘每至季思之十八日立秋日盛德在金王氣轉在西方斷成萬物其神吏白衣思之四十五日至九十日可除病得其意令骨强老壽秋分日少隂之氣微行太隂之氣也逆疾順之立冬之日盛德在水王氣轉在北方其神吏黑衣令人志達耳聦守之四十五日至九十日百病除此五行四時之氣内可治身外可治邪故天用之清地用之寧天用之生地用之藏人用之興能順時氣忠臣孝子之謂也此名大順天地隂陽四時五行之道故道爲仁賢出不爲愚者生矣盛身却灾法年十歲二十年神年二十四十年神年三十六十年神年四十八十年神年五十百年神年六十百二十年神年七十百年神年八十至百二十神盡矣少年神加年衰即神滅謂五藏精神也中内之候也千二百二十善神爲其使進退司候萬神爲其民皆隨人盛衰此天地常理若以神同城而善御之靜身存神即病不加也年壽長矣神明祐之故天地立身以靖守以神興以道故人能清靜抱精神思慮不失即凶邪不得入矣其真神在内使人常喜欣欣然不欲貪財寳辯訟爭競功名久久自能見神神長二尺五寸隨五行五藏服飾君仁者道興君柔者德生中心少有邪意遠方爲之亂神氣周流疾於雷電急還神明以自照内故病自愈而人自治故人生百二十上壽八十中壽六十下壽過此皆夭折此蓋神游於外病攻其内也思本正行令人相親愛古之求壽不失其道者天地有常行不可離本也故求安而長存者愼無忘此道本元也故畫圖以示後來陳人物生受命之時久遠以來到今不失隂陽傳類更相生而久長萬萬餘世不可闕也一衰一盛高下平也盛而爲君衰即爲民盛即得道衰即受刑夫孝者莫大存形乃先人統也揚名後世此之謂善人謹民天地愛之五行功之四時利之百王任之萬民好之鬼神祐之五藏神留之遇一得生今且失之離我神器復爲灰土變化無常復爲萬物矣分别形容邪自消清身行法道之生人本皆精氣也皆有神也假相名爲人愚人不知還全其神氣故失道也能還反其神氣即終天年或增倍者皆高才或求度厄其爲之法當作齋室堅其門户無人妄得入日往自試不精不安復出勿强爲之如此復往漸精熟即安安不復欲出口不欲語視食飲不欲聞人聲關鍊積善瞑目還觀形容容象若居鏡中若闚清水之影也已爲小成無鞭策而嚴無兵杖而威萬事自治豈不神哉謂入神之路也守三不如守二守二不如守一深思此言得道深奧矣通神度世厄法天之生人萬事畢備故十月而生與物終始故可度灾厄致太平上士學道輔佐帝王當好生積功乃久長中十學道欲度其家下士學道纔脫其軀道爲賢明出不爲愚者能用之者吉不能用之寧無傷無賊哉賢不肖自知法上士高賢事無大小悉盡畏之中士半畏之下士全無可畏上士所以畏之者反取諸身不取他人心開意通無包容知元氣自然之根尊天重地日月列星五行四時六甲隂陽萬物蚑行動揺之屬皆不空生鬼神精魅六合之間表裏風雲雷電不空行也此皆有神有君長比苦人有示故畏之不敢妄行中士半畏之者上不知元氣自然之有術纔知今見風雨雲氣與生物也尚時言天無神不畏列星日月也纔知大火北斗下士則不知土地山川之廣大可㤥纔知耕田種其所有治其家眷術也不知四時五行可以何履也但知隨而種樹之收其利耳不知六甲隂陽爲神通言其無有也夫人愚學而成賢賢學不止成聖聖學不止成道道學不止成仙仙學不止成真真學不止成神皆積學不止所致也一曰延命夷狄自伏法萬種其類不同俱得老壽天地愛之其身無咎所以然者名爲大順之道道成畢身與天地同域古者爲之萬神自得欲知其效瑞應自至凶禍自伏帝王以治不用筋力能知行此夷狄自伏行之不已成真人故聖人之教非須鞁揣擊而成因其自然性立教帝王所以能安天下者各因天下之心而安之故得天下之心矣是道修古文人本生時乃名神也乃與天地分權分體分形分神分精分氣分事分業分居故爲三處一氣爲天一氣爲地一氣爲人餘氣散備萬物是故尊天重地貴人也故三皇五帝皆立師疑者跪問之故國常治雖灾戹亦可愈也王者無憂法大順之路使王者無憂無事致太平夫天地不大動揺風雨不横行百神安其居天下無灾矣萬物各居其處則樂無憂矣何以致之仁使帝王常樂道使無愁苦也若帝王愁苦即天下不安夫帝王天下心也群臣股肱也百姓手足也心愁則股肱妄爲手足行運不休止百姓流蕩是其自然相使也天亦如是也天失道雲氣亂地失道不能藏矣王者與天相通夫子樂其父臣樂其君地樂於天天樂於道然可致太平氣天氣且一治太上皇平且一下天地和合帝王且行吾道何咎之有道者天之心天之首心首已行其肢體寧得不來從之哉還神邪自消法分别三氣所長還神守身太陽天氣故稱神形者太隂主祇包養萬物故精神藏於腹中故地神稱祇精者萬物中和之精故進退無常天地隂陽之精共生萬物此三統之歷也神者主生精者主養形者主成此三者乃成一神器三者法君臣民故不可相無也故心神動揺使形不安存之不置利其可安即留矣不用其可安即去矣始學用其可安之教之久久自都安不去矣隂氣陽氣更相摩礪乃能相生人氣亦輪身上下神精乘之出入神精有氣如魚有水氣絶神精散水絶魚亡故養生之道安身養氣不欲數怒喜也古者明師教帝王皆安身使無憂即帝王自專矣天喜太平氣出無不生成天恨形罰之氣出莫不殺傷萬物莫不被其毒故同憂也天不守神三光不明地不守神山川崩淪人不守神身死亡萬物不守神即損傷故當還之乃曰强不還自守曰消亡也和合隂陽自天有地自日有月自隂有陽自春有秋自夏有冬自書有夜自左有右自表有裏自白有黑自明有㝠自剛有柔自男有女自前有後自上有下自君有臣自甲有乙自子有丑自五有六自木有草自牝有牡自雄有雌自山有阜此道之根柄也隂陽之樞機神靈之至意也令人壽治平法三氣共一爲神根也一爲精一爲神一爲氣此三者共一位也本天地人之氣神者受之於天精者受之於地氣者受之於中和相與共爲一道故神者乘氣而行精者居其中也三者相助爲治故人欲壽者乃當愛氣尊神重精也欲正大事者當以無事正之夫無事乃生無事此天地常法自然之術也若影響上士用之以平國中士用之以延年下士用之以治家此可謂不爲而成不理而治大道坦坦去身不遠内愛吾身其治自反也七事解迷法以德治身何如及以治萬民致大和之氣何如善而不達何能安哉以仁義治身何如及治萬民何如善而不達何能安哉以禮治身何如及以治萬民何如善而不達何能安哉以文治身何如及治萬民善而約束使不得爲非何如善而不達何能安哉以治身何如及治萬民何如善而不達何能安哉以滅武兵革治身何如及以治萬民何如善而不達何能安哉然此七事亦不可無亦不可純行古者神人治身皆有本也治民乃有大術也使萬物生各得其所能使六極八方遠近懽喜萬物不失其所乃當自然能安八方四遠行恩不失氂毛今未能養基本末安能得治哉今此上德仁義禮文法武七事各異治俱善有不達而各有可長亦不可廢亦不可純行治身安國致太平乃當深得其訣御此者道也合以守一分而無極上帝行之乃深乎不可測名爲洞照之式救四知優劣法天生人凡有三等第一天生第二地生第三人種類受命天者爲人君受命地者爲人臣受命人者爲民君者應天而行臣者應地而行順承其上爲民者屬臣轉相事凡是三氣共一治然後能成功故上之安者其臣良也臣職理者其民順常民臣俱善其君明其治長太平者以道行三氣悉善合乎章也懷道德不相傷也故大人治道以平天下救四海恩及夷狄禍不得起其善證日生凶不得來中士學道爲國臣助其治也度其家辟禍災其次治道損其父母反遠遊德獨小薄纔脫軀也安能輔明王助國家哉能平四海者天助之爲人臣者助爲治與地謀纔自脫者道狹小無可得治此三人皆度世老壽有大小不同邪是神去留效道法神人言明行效道視命在誰乎令人昭然覺悟知命所從來法審誰者持其正也人法隂陽生陽者常正隂者常邪陽者常在隂者常無陽者常息隂者常消陽者常生隂者常殺人日三變象三氣其政殊異相異分爭乖錯不相從也而習使其常守人形容者吉唯有真道者能專精自殊異也不學者則不知神去留之效立見之物不可隱也故君子制尸不制鬼人不卧之時行坐言語分明白黑正行住立文辭以爲法度此人神在也及其暝目而卧光景内藏所念得之但不言神在內也及其定卧精神去遊身不能動口不能言耳不能聞與衆邪合獨氣在即明證也故精神不可不常守之守之即長壽失之即命窮人之得道者志念耳失道者亦志念耳救迷轉帝王法大道變化無常乃萬里相望上下無窮周流六方守之即吉不守即傷隂陽開闢以爲常其付有道使善人行之其壽命與天地爲期夫德有優劣事有本末凡事悉道之也將興者得善將衰者得惡比若土地得良土即善得薄土爲惡善上合天賤者都澤坐者爲主人行者爲流客此盡道也善人行成福惡人行成灾善人得以爲福德尊者得之駕乘卑者得以步足聖賢得以度世小人得之不相尅賊此皆道也教不重見時不再來急教帝王令行太平之道道行身得度世功濟六方含生之類矣太平經鈔癸部卷之十
