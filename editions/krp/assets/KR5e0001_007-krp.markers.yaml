  - {type: variant, offset: 7344, length: 0, content: '', ZHWIKI: 神不享食也走行乞匄復諸神靈其神怒之猛獸所食骨肉了已狐狸所齧不歸故鄉同縣比廬反言得仙殊無信報何用自明以是言之難可分明當有報信眾人見之乃為已升不者苦其刑為言得略少其人狂邪可下反以為真俱入死部下歸黃泉不得自從有德度者生時有簿年滿當上輒有迎者童蒙無知何從得往但費資用棄家捐身曠野道自然人相祿不可彊求倘自苦不治生養親妻子相見為賢士但恐不孝不忠少信可得竟年耳地下無罰樂而已有餘財產子傳孫亦當給用無自苦子孫賢不肖各自活無相遺患是為善行故記此文示智者愚人忽之妄怒喜遠罰避患為賢者三諫不中且可止天佑善人不與惡子各自加慎勿相怨咎各為身計行宜人人有知無有過負於天錄籍所宜慎勿彊索索之無益所以然者惡逆之人天不佑也無離舍宅及城郭骨節相連為阡陌筋主欲生堅城郭脈主往來為骨絡肉在皮內為脈衣神在中守司人善惡何須遠慮七政司候神門戶求道得生無離舍宅變化與神合德道欲復何索故置善文於天籍神仙籍與俗異錄當昇之時主籍}
  - {type: variant, offset: 7346, length: 2, content: 益怒, ZHWIKI: 及保人者來乃知所部主奉承教化各有前後輒當進有所去不得自可眾神共治務取合天心者先生之人皆心明視無有界意所行所生人未知之皆先天地變化上下皆不失其道神不悉具乃置綱紀歲月偏傍各置左右星辰分別各有所主務進其忠令使分部}
  - {type: 'kr:newline', offset: 7357, content: '

      ', id: KR5e0001_krp_007-bkkkrnewl487}
  - {type: line-break, offset: 7357, content: '', id: KR5e0001_HFL_007-023a04}
  - {type: variant, offset: 7365, length: 1, content: 爲, ZHWIKI: 為}
  - {type: variant, offset: 7369, length: 0, content: '', ZHWIKI: 故得成得稱天君主天之人輒簿領亦不失度部主諸神故四方方有孟仲季更直上下名為太歲太陰在後主知地理復置四時生成所有分居於野有晚早穀草近人不壽遠人民然亦復長久叢社之樹小得自矣易世被誅延及孫子所以然者}
  - {type: 'kr:newline', offset: 7374, content: '

      ', id: KR5e0001_krp_007-bkkkrnewl488}
  - {type: line-break, offset: 7374, content: '', id: KR5e0001_HFL_007-023a05}
  - {type: variant, offset: 7381, length: 0, content: '', ZHWIKI: 人有命樹生天土各過其春生三月命樹桑夏生三月命樹棗李秋生三月命梓梗冬生三月命槐柏此俗人所屬也皆有主樹之吏命且欲盡其樹半生命盡枯落主吏伐樹其人安從得活欲長不死易改心志傳其樹近天門名曰長生神吏主之皆潔靜光澤自生天之所護神尊榮但可常無毀名天有常命世世被榮雖不下護久自知精所以然者去俗久遠當行天上之事不得失脫諸神相檢如繩以墨何復自從故不下耳宜勿怪之功勞當見不與俗等人以為無益於家內被其榮豈不善邪故示後生令心覺悟出書無藏歲之有罰無與佞欺不孝順為心宜皆為不副書言復見責問可不慎焉傳當傳其人令可保舉勿犯神書勿試神言慎神之辭皆天報焉勿輕犯之後有患小犯纔謫大過不救故使諸神更相司便宜上之有不實者當復見治事當相關不得私故使諸神轉相檢持今悔其後何須疑中復為止亦見考之不首情實考後首便見下故進止亦見考之不者如故此之謂也不可輕犯無所狐疑神法大重故當慎之詳之念之思之長生久活之道可不重之故下此文以示當施補空者為設善事輒相承無有逋亡為善有功年益長無所復疑自然之道何極時但覺寤轉相治失如銖分輒見疑天有倡樂樂諸神神亦聽之善者有賞音曲不通亦見治各自有師不可無本末不成皆食天倉衣司農寒溫易服亦陽尊陰卑粗細靡物金銀綵帛珠玉之寶各令平均無有橫賜但為有功者耳不得無功受天衣食前文已有言今為復道令無怨恨無所嫌疑是天重神靈之命也歲盡拘校簿上山海陸地諸祀叢社各上所得不用不得失脫舍宅諸守察民所犯歲上月簿司農祠官當輒轉相付文辭大陰法曹計所承負除筭減年筭盡之後召地陰神并召土府收取形骸考其魂神當具上簿書相應不應主者為有姦私罰謫隨考者輕重各簿文非天所使鬼神精物不得病人輒有因自相檢飭自相發舉有過高至死上下謫作河梁山海各隨法輕重各如其事勿有失脫各有府縣郵亭主者長吏察之如法勿枉夭剋鬼神精物如是上下合通行書各如舊令衣履欲好誡第一百八十九自古及今各有分部上下傍行有所受取輒如繩墨不失何有不覩死生之訣各且自慎勿犯神靈各如其職慎勿忽忘命可䟽記善者當上惡者當退吉凶之會各其所願但可順從不得逆意心意不端反怨神使行自得之何所怨仇人有難化知有不足皆被其殃枉行所不及反自譽滿口出人事殊無知慮而見當前不顧其後合禍離愛謗訕善人以天亡上地不在下不知鬼神有䟽記之者解人怨仇多施酒脯甘美自恣當時為可後為人所語輕口罵詈呪詛不道詐偽誹謗盜人婦女日夜司候邀取便者賣以自食衣履欲好競行鬭辯不從道理欲得生活何從得久愚人可為名惡子長吏聞知屬吏捕取急刑其身禍及親踈并得其咎貧當自力無為搖手此人命簿生所稟受惡鬼隨之安得留久此輩眾多有前後會當相得不中止所以言者惡鬼所取慎之小差不慎自已惡不可施人所怨咎當時自可不念其後見戒當止可復小生竟其餘筭有故記善惡壽所起增年之期要當善矣不見賢聖知慮有餘念生惡死上及仙士壽可長年何為棄世殃流從生胞中之子反言我同從父母生耳是皆怨天咎地言惡當別不可雜廁清濁分離如君與奴使故得行大道者生不行為土古今相似亦有善亦有惡世世相傳未嘗止多與少耳天知多逆故出此文重之耳知戒之後可無有疑十百相應何有脫時不忘誡長得福訣第一百九十}
