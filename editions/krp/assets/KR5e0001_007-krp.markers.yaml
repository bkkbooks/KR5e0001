  - {type: variant, offset: 10007, length: 219, content: 樂相化坐思其過得失莫爲善易哉天上爲政如此也地上亦然故理欲疾平者務斷分爭刑罰倡樂爲先皇平之氣立至矣請問天上太平氣自時來至也人皆當自化爲善萬物自當平安無病令天上爲法何故反以人倡之作樂以相化乎凡事在其先導之教之善惡是化之先也開蒙愚之門也故天將有可爲皆先倡其先其象見於天神文出古者聖人象之爲作意故上三皇乃教化以道其人民盡有道物亦然五帝教化多以德其人民多類經德也物亦然三王教化多以文其人民多文物亦然五霸教化多以武其人民多悉武好怒尚强勇此非悉化之首也, ZHWIKI: 犯耳}
