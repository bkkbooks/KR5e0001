  - {type: variant, offset: 13129, length: 1, content: 污, ZHWIKI: 見汙辱也若比聖王之前常欲清明不欲見汙辱汙辱之則得滅死之過也真人知之耶唯唯可㤥哉可㤥哉是故人頭口象天不欲樂見汙}
