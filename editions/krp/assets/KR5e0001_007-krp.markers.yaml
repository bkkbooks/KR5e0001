  - {type: variant, offset: 11100, length: 0, content: '', ZHWIKI: 先}
  - {type: variant, offset: 11101, length: 0, content: '', ZHWIKI: 故為陰陽者動則有音聲故樂動輒與音聲俱陽者有音故一宮三徵五羽七商九角而二四六八不名音也刑者太陰者無音而作故少以陰害人無音而作此之謂也今軍師何故有音哉善乎子言也然君子有軍師有音但倡樂卻之耳不必欲害之也及怒發且害之時非有音聲起中而已不復相告語也子知之邪唯唯真如是小愚生已覺矣故古者聖人將從樂者左載將從刑者右載吉事尚左凶事尚右左者陽右者陰言各從其類也善哉善哉故吾事為文也隨天為意隨地為理順之者吉且昌逆之者凶也與天不同其意復何所望故夫天乃有三氣上氣稱樂中氣稱和下氣稱刑故樂屬於陽刑屬於陰和屬於中央故東南陽樂好生西北陰怒好殺和氣隨而往來一藏一見主避害也故樂但當以樂吉事樂生事不可以樂凶事樂死事自天格法如此不可反也真人惻慎吾文言唯唯今說音獨說一甲殊不盡說之其餘當云何而悉得知其所盡引哉然宜拘校凡聖賢文各以家類引之出入上下大小莫不相應以一況十十況百百況千千況萬萬況無極眾賢共計莫不盡得故但為子舉其端首不復盡悉言之也上賢見吾文自悉得其意中人見吾文冀可上及之小人見吾文可儀而為之不犯天地之禁各使自生善意盡說之積文多反且眩瞀於文則失其綱紀令其文亂難理故當財示其端首使其自思之耳善哉善哉行吾辭小竟疑乃復來唯唯請問音聲和得其意與不得豈可知邪然可知也帝王之氣以其天數耳}
