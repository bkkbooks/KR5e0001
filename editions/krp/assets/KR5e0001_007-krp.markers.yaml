  - {type: variant, offset: 5254, length: 0, content: '', ZHWIKI: 為報為知不乎知善為善見信行信是人所長也且宜照之勿自疑前有信人已壽無極化為神靈所兼備足功勞所致復知之乎故德人有知之士所得上進天甚愛之不其文章知命不怨天行各自慎勿非有邪教人為善復得天心意者命自長事皆天君出不得留止俗人難化化之以漸無有卒暴詳慎所言勿為神所記各慎所部文書簿領自有期度勿相踰越見善進之見惡當改勿有所疑貪生之人自不忘天所施為故重之者誠愛人之命耳念善得善壽不疑}
  - {type: variant, offset: 5256, length: 0, content: '', ZHWIKI: 君愛信知不乎詳慎神文勿以自試天下之事孝忠誠信為大故勿得自放恣復奪人筭不得久長慎之慎之勿懈也懈為自疑耳疑之自令不令知不乎知不乎右天}
