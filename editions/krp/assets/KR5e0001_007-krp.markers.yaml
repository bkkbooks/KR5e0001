  - {type: variant, offset: 5913, length: 1, content: 毁, ZHWIKI: 毀}
  - {type: variant, offset: 5918, length: 0, content: '', ZHWIKI: 為善不行侵人無所欺抵誠信不敢有所負行成於人眾不敢失於親而虧閭里出輒相報其以時還未曾大醉臥於巿里賢知相隨不顧愚子念恩於天地不敢望報自責而已復有過失承負所起自責有歲數乃感動耳生俗多過負了無有解已愁毒而行不知所止每見人有過復還責己不知安錯思見義文及其善戒祿命僥倖逢天大神戒書文反覆思計念之過多無有解已叩頭自搏而啼鳴有身不能自正而反多怨禁書致重而自觸之致命不壽晨夜自悔冀復小久不敢施惡更念當行恩德布施蒙得其理無有惡言但見淚耳感傷於心天神聞知來下言此人為誰何一悲楚窺見大德之人延命久長在問之言此但行應天心合地意是故得壽耳還歸靖舍念之如太上德人之言以故自省也使神見自責悔人還上天道言有悔過人啼淚而行未曾有止時恐見不活以故自責大神聞知言天君常勑諸神曰有功善之人為忠孝順所言進獨其人也因白天君天君言聞知此人自責悔過有歲數也此本俗人耳而自責過無解已更為上善人也大神數往占視之知行何如有善意欲進者且著命年在壽曹觀其所為乃得復補不足大神言此人自責大久承負除解請須有闕上補名為太上善人可以報下不及者天君言太上善人之行必當如其言大神數勑之護視成神上之皆須其年數勿侵也大神言此人本無籍文也得勑在壽曹請須上闕補以年次不相踰越天君言得次補缺之日數上其姓名勿失期大神唯唯}
