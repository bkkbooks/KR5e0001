  - {type: variant, offset: 13137, length: 0, content: '', ZHWIKI: 得善物故天下人以淹汙辱惡與人食之天乃遣雷電下自捕取之真人知是逆惡邪唯唯愚生甚畏之今大中上古以來人自言為善絕殊於俗人也學為道者反多相示教食糞飲小便相名為質直善人天與道大憎之天上名此為大反逆之子天上不欲見其人形也此大邪所著犬豬之精所下也夫道之生天天之有道也乃以為凡事之師長正道者所以興善主除惡也是故古聖賢}
