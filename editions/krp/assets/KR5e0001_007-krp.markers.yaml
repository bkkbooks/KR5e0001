  - {type: line-break, offset: 1300, content: '', id: KR5e0001_HFL_007-005a03}
  - {type: variant, offset: 1307, length: 0, content: '', ZHWIKI: 子曉邪善哉善哉災病證書欲藏訣第一百七十六請問天師書以何知其欲見行以何知其欲見逃也子欲明之邪以災病為證也出而病人即天欲藏也逃而病人即天欲出行也以何重明之以天行四時氣生養萬物隨天意也凡物樂出而反逃藏之大凶矣凡物欲逃藏而反出之亦大凶也悉為逆天命後皆有大災矣子欲樂知吾天天樂行不以是為占也真人知之邪唯唯是故自古到今舉事不詳悉失天道意故生承負也是故使民至於無道而治共亂天正道人異政治故人民萬物多被冤也願請問夫無道乃重死罪之法也天師何不為制作重刑死法而各以其罪罪之今天下之事各以其罪罪之為平也今天師不以其無道罪之何也不可也何故夫先人但為小小誤失道行有之耳不足以罪也後生人者承負之畜積為過也雖其觸死其行邪偽空虛者後生人皆學於先生人雖失天道為無道而治者皆師師相傳更以相教示非一人造此過也故不可予其重刑也念下古人罪過皆足以死又神聖為法不可一旦予人重刑滅人世類也故天遣吾下者革其行除其責而不章更天地人且共治之使神病災之也後世人見是吾受天教之明效也子知之邪唯唯行語竟天辭絕傳之德君唯唯行去勿復問唯唯右凡訣瑞應說在下竟兩手策字要記第一百七十七}
