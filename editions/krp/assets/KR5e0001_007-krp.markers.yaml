  - {type: line-break, offset: 14174, content: '', id: KR5e0001_HFL_007-043a08}
  - {type: variant, offset: 14174, length: 0, content: '', ZHWIKI: 疾病鬼物者迺邪惡之階路也賊殺良民之盜賊也或見人且入正道因反怒人與人爭鬭於人為正道反凶不為善反安隱於等之間不可不謹詳自精者得道則吉失道則凶也死生之命不可自易而不謹詳也善哉善哉愚生已解矣然真人既問疑事且告真人天要語吾道之所以而長久養者人而樂道樂德樂仁忽於凡事獨貪生耳道正長於養守此二人也過此而下者吾道不而長久養也何哉夫人道乃無不覆蓋何故獨宥此三人不宥餘哉然善哉子之難問也得其意夫大道之出也人皆蒙之恩乃及草木莫不化為善皆得其所俱而各竟其天年夫無道德不仁不可久養也何哉然但以其不好道德仁也夫好道德仁何故獨可久養哉願聞其意然子曉事生哉其問事絕訣也詳聽為子分別言其意唯唯然是好道德仁此三人皆有三統之命樂好道者命屬天樂好德畜養者命屬地樂好仁者命屬人此三人者應陰陽中和之統皆有錄籍故天上諸神言吾文能養之也行不若此亦無錄籍故吾文不能久養之也今}
  - {type: variant, offset: 14176, length: 2, content: 經鈔, ZHWIKI: 氣至無姦私故不而久養姦惡之人也不如往者內亂之時能包養惡人也願聞其竟說然姦邪惡氣出活者反能久養姦惡之人也而不能久養善人者是其眾害多善者少也比猶若大寒至而熱氣衰也今正氣至乃不能久養姦惡之人比若陽氣至而陰氣消亡也夫太陽上赤氣至乃火之王精也火之王者乃光上為日日者乃照察姦惡人故言不得為非故不容惡人也又道者主生德者主養仁者主用心故愛春即生夏者即養人則用心治理養長萬物故太陽所生養長用心最勞苦此之謂也善哉善哉愚生重聞命乎然安坐為子更有所脩解唯唯一事學道而大度者在天中度者在神靈小度者在人也二事學德而大度者在天中度者在神靈小度者在人也三事學仁而大度者在天中度者在神靈小度者在人也四事學官而大度者在天中度者在神靈小度者在人也五者好畜聚財業大多者在天中多者在神靈小多者在人也然此五事大度中度小度一由力之歸命於天歸德於地歸仁於人守此三事學身以賢心善意思之惟之身迺可成積之聚之神且自生守之養之道且自成樂之好之身且自興天道無親無踈付歸善人是故天自力行道日一周所以一周者凡物之生悉法六甲五行四時而生一氣不至物有不具則其生不足不調矣為人君上父母而不調大過也故天日一周自臨行之也所以自臨行之者假令子水也但有水氣未周五行氣不足四時氣不周故為行而臨之甲加其上有木行有春氣丙加其上有火行有夏氣戊加其上有土行有四季中央之氣}
  - {type: variant, offset: 14179, length: 2, content: 部卷, ZHWIKI: 加其上有金行有秋氣壬加其上有水行有冬氣五身已周四氣已著乃凡物得生也天地施化得均尊卑大小皆如一乃無爭訟者故可為人君父母也夫人為道德仁者當法此乃得天意不可自輕易而妄行也天道為法如此而況人乎故上士法天其道乎中士法地其德乎下士法人其仁乎過此而下者不屬於人故與禽獸草木同乎無常命真人得吾文書自深思其要意緣而無善與天相得同事也與吾文反者乃天地}
  - {type: variant, offset: 14182, length: 1, content: 七, ZHWIKI: 怨也吾亦不耐也吾文書所惡正是也真人慎之以付上士歸縣官示凡人自今以往天與古異善哉善哉右分別太平文出所宜所不宜訣}
