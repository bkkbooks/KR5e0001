  - {type: variant, offset: 6847, length: 0, content: '', ZHWIKI: 大惡之家無大小鬼神所憎但可自正勿非謗神天道地道人道禁不空善神精氣尚能假人惡者不失其文輒舉上白積過眾多太陰主狀當直法輕重皆簿領過人不自知以為無他太陽明堂錄籍數通復得部主神亦數通天神部上死亡減年滅人世不可詳念重其善致善惡自歸其身及治生天知少智故為施善惡救命之文以戒前後勿輕惡言以為談首動作進退輒有殃咎故下此文以示子使思其意使無自怨朝延尉設法人自犯之勿恨主者恨之命簿不得久生會欲殺人簿領為證驗乃令入土輒見考治文書相關何有脫者努力遠惡無以為伍可小活竟年之壽不忠疾苦雖為狂邪所擊會有活者天上禁神法令亦如中和地下四流傍行皆同法象何有疑者生人有功於天子孫為凶輒除筭當時不死筭盡之後亦無望其生君國子民當為教道導其善惡務得情實無天人命絕人世類刑從其刑數見賢智以為首尾威神著君神勿加暴前書已有言復宜重之君父得以遷延及後永生滋震慎無貪殺當時自可後被其患}
