  - {type: variant, offset: 4636, length: 0, content: '', ZHWIKI: 聖人言實有是從俗成食從地陰神出安得不重乎易之為輕乃上是易大神恩不能報功大施想大恩忍不及使得蘇息之間深厚非辭所報大神言是天稟人命祿相當直非大神意所施為見善薦之是神福也何所報謝乎恐其後有疑為施禁固者使聖知教戒後人照知之耳聖人自有知無所勑也聖人言已得被報雖生錄籍會當有教導不及大神言是生之語儻然謙者是其宜也生重見辭前後悉備唯大神以成就恩意生見人分人也而不敢自解而有驕慢也請復於閑靜之處伸力大神所教施願念不逮之生大神言盡辭前後可知餘無所戒也辭別各宜照所言生言受戒之日不敢解止須臾也但恐未能卒竟之耳唯蒙扶將使得視息復生望傾側在心唯大神時時相存教勑是恩不小大神言是生之所言宜稱之生言唯唯不敢以身自防大神言成名之人精進有益兼并部主非一天君聞之大神戒聖人相對辭語為有知之人宜勿忽解命可至無訾之壽各還就所部見善當進之大神聖人言俱受天君教盡力有效有效不敢倦時也天君言成人者為自成唯唯}
