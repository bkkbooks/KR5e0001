  - {type: page-break, offset: 9002, content: '', id: KR5e0001_HFL_007-028a, image: hfl/0747/0747-058.png}
  - {type: 'kr:newline', offset: 9002, content: '

      ', id: KR5e0001_krp_007-bkkkrnewl594}
  - {type: line-break, offset: 9002, content: '', id: KR5e0001_HFL_007-028a01}
  - {type: variant, offset: 9002, length: 1, content: 蔽, ZHWIKI: 此人亦因父母得生其行反少義不見盡忠孝有順無逆之意是天當置汝使眼息不死也死中有餘過并及未生之子念其作禍之人雖以身行惡而亡其年使未生不見有筭活望作鬼復死不足塞責是惡所致非乎何得自在而見活乎昨使當出生者怨是非過邪何為妄言而久朗乎天下之人何不自責而使過少積過何益於人身乎但有不全人命耳不當思之邪何為自益禍乎是為可知也人居世間作孝善而得壽子孫相續復見尊官重祿是不作善為孝所致邪自無善而不顧後有患此為大逆惡人更為無等比不休息乎父母生汝時欲聞其善寧欲聞惡聲聞老親耳邪兄弟相憎未曾有樂時各自責過負而反自用不為善是為不可久行無益於天無益於地無益於人無益於四時五行日月星之明其人甚惡欲何希望不當仰視邪以為天不遣凶神司汝為非乎不當自怪所求所為既無可恃但日有衰病死不絕邪天亦何樂殺汝乎眾曰汝無有逋須臾之間故殺之或使遭縣官財產單盡復續怨禍汝行之所致不乎何怨於天而呼怨乎俗人乃如是欲復犯天自理何益乎久逋不祠祀神官所負不肯中謝所解所負解之常以春三月得除日解之三解可使文書省減神官亦不樂重責人也迫有文書上下相推何從民人之言貧困便止不竟所為乎生時皆食有形之物死當食其氣而反不食先人自言生子但為死亡之後既得食氣與比等而反不相食生子如此安得汝久有子孫相視乎亦當亡其命與先去等饑餓當何得自在天官重孝順當祠明白何可所疑死後三年未葬之日當奉禱賽不可言地上有未葬者而不祠也不食益過咎子孫無傷時也是為可知當祠常苦富時奢侈死牛羊豬豕六畜祠官浸踈後當見責不顧有貧窮也財產不可卒得行復無狀財不肯歸便久不祠為責安可卒解乎宜當數謝逋負之過後可有善子孫必復長命是天喜首過其家貧者能食穀知味悉相呼叩頭自搏仰謝天天原其貧苦祠官假之令小有可用祠乃責是為天所假頗有自足之財當奉不疑也不奉復見先人對會祠官責之不祠意使鬼將護歸家病生人不止先人復拘閉祠卜問不得得當用日為之天聽假期至不為不中謝天下地取召形骸入土魂神於天獄考更相推排死亡相次是過太重故下其文使知受天誅罰不怨可轉相告語可令不犯先古已有書犯者不絕以棺未}
  - {type: page-break, offset: 9002, content: '', id: KR5e0001_SJB_007-240359c, image: sjb/24/240359c.png}
  - {type: variant, offset: 9004, length: 0, content: '', ZHWIKI: 者不可不祠}
  - {type: variant, offset: 9005, length: 0, content: '', ZHWIKI: 今故延出文因有心之人書解其意勿疑書言尚可得生籍疑不行死日有期自消息勿復怨天咎地也行書小息念其後思惟文言知當復所行復道之天報信成神訣第一百九十七惟有進善求生之人思樂報稱天意令壽自前目見天上可行之事曰亦奉行天之所化成使見久生之文變化形容成其精神光景日增無有解時是有心志善不忘天恩報施之士何時有怨解息須臾之間心自剋責幸得為人依迎天得成就復知天禁使其遠害趨善不逆神靈見善從之未曾不自責時悔過從正思念其意常不敢自安自疑念之為善曉天知意具足可知亦無所疑自責悔過積有日數既蒙福祐承奉天化使不見危自知受天報施何可有忘須臾之間息恐神靈非尤所言故懷悵然未曾自息貪進所言欲承天意恐有失脫故復洗心易行感動於上欲見昇進貪慕其生實畏短命之期恐久不見於天地竭力盡忠思其誠心數聞神言不見其人心內不自安常齋惶懼日夜愁怖不敢自安用是之故不敢廢善而就惡施人皆得飲食仰天元氣使得喘息復知人情自知受天施恩輒當報謝何有疑時天生人精地養人形使得長大使得成就見天書戒視其文辭不戰自慄何有負言心常怖悸何有安時唯天大神時哀省原數見假貸心知不以時報大恩唯大神使見覆哀久見常在生氣之中久活前年之壽不敢忘大施之分恩貸畢足不敢解忘須臾之間而背恩也唯大神成之使見天神與其語言思聞復戒重天所言唯蒙有報乃敢自信大神報有善心人言天君常愛是有心善之人於天有用輒進自今有心善之人自陳前以達白天君承用所舉聽勿疑必當如前所言是自天君所敢前也歲月垂至努力信天所言天亦信有心善之人自不在俗間也簿文內記在白日昇天之中義不相欺天君欲得進善有心不違言是其人也諸大神自遙見其行雖家無之日前以有言宜勿憂之常念與天上諸神相對是善所致也宜勿懈倦也有心善之人言生本無昇進人期心報大神求進貪生欲竭所知何敢望白日昇乎舉選當得其人生不敢當之恐見為大神所非蒙恩自僥倖得寵為得恩分畢足但惜未及重報施唯大恩假忍蘇息之聞大神言前比白生意進之天君輒言有心善意是其人也天君自欲親近之不使有疑也恩施不在大神也何須道報乎宜復明所知必為有報信心謝懇惻而已必使諸神相護不令邪神干之也致重慎所言以善為談首書意有信相與要不負有心善進之人言也天自日夜使神將護之餘無所疑相命沮觸之書必先人承負自辭勿用為憂有心志善之人言本性單微久在俗中恐不能自出俗世之間慕大神之恩寵遇使見溫誠自知唯大神白天君纔使在不死之伍中為何敢望白日乎大神言天君信有心進善之人教無有二諾無所狐疑是自天君意也雖念家不足飢寒並至自有天廚但仰成事神自師化其子無以為念也生主受分之後何時忘大神所言乎憂不成耳不敢失大神枕席常在心鬲不敢解也大神言辭乃如是天君知者善自得善有心自得天君心意前白事見天君天君勑大神言前日已白此人當升之日勿令失期竟有符在心前徹視神自語為信變化以有日期但日夜念之勿懈也生言受勑之後何敢懈邪唯蒙成不大神言須書有符自相見也不憂不得天壽也不但大神邪諸神皆言善是有心之人諸神憂之但仰成辯而已生言是大重如使如願必親心恭而已大神言是亦其人願所當承心而言天君重其家使無入大過承負輒解之勿信神象卜工之言是卜不能有所增減欲度活人者要在正神雖有小神之踈上自解之亦勿狂為不當所行也是自有心有道之人所知也且各為身計信天言天自不欺有心進善之人也雖知惠常念無有忘時聞邪神自下無有心志之人持身不謹復念非常故邪下之使不安或惡會無成功此書亦不信惡人惡人亦不信此書會有效用有報得報信之後乃為可知也今當有信知進善之人書神自欲見報信得用不信無有心進善之人欲所得也行書辭已可知見信有驗亦自不久何以明之其人自樂生者天使樂之是天報信其人必化成神必以白日不疑日自輕食日少為信精光日益親近其人是信也明之明也且勿有疑生言見誡受勑請如所言思惟念之不敢懈有忘也雖生素不知會見之後益親無異大神言善善亦當惠成名宜卒竟其功是神常誡也書語雖多重生道故多耳勿怖之也語且有止各還有言有心志念之言唯唯不敢有忘也有功天君勑進訣第一百九十八惟思古今有大誠信之人各有效用積功於天乃敢自前動作止進未曾有小差之惡常懷慈仁之施布恩有惠利於人眾不有失小信而不奉承天地隨四時五行之指歷助其生成不敢有不成之意而自危身令不安故自剋念過負恐不解除復為眾神所䟽記而有簿文聞太上也以是故敢有安時也今古相承善惡相流何有絕時乎故自沈靜未嘗有懈而忘天之所施為也但自念求德之人以心自況見人有善心為之欣然見人有惡心為之惶懼想天神知之各有所進復自惟念本素生於俗間心常思樂大化貪慕生道去離死部戀牢精光貪使在身使自相愛心乃可安不者恐見不在常見之中唯諸天神時原不及教其進退當承天意不可有失而小不善聞於太上之君耳故因諸神求知曠問唯蒙不逆使不見疑為受一子之分勢不敢有忘絲髮之間唯原省念所言思見天誡以成其身不使陷危是諸神寵恩之日不敢有休息而不自念報重之大恩也諸神未白天君聞知被遣當直之神承教見之其人言所動搖云何具問其意使諸神問之還白日言中和之民自道善行積功日久貪慕久生自薄說常自垂念恐有愆負未嘗有懈息之意為諸神道其功效諸神使白各且相謂曰此有功效德人自於中和中念當報天大恩積行為善日久欲因諸神自道功德各懷狐疑不敢進白天君常屬諸神見信有功於天有者進之而諸神占觀其行日久何故不白諸神皆懷懼而言本素不知此人來恐不大精實且各消息其意不知天君聞之是諸神各無所主正見善有功之人而不時白道之使者遣使神考積其行大有功是諸神各為無狀各無有功善而齊外心以為天君不知諸神各解辭令自何用者有益而已各自安乎謝諸神各以識事免冠謝言小神奉職各平盡忠誠之心而得問是罪無狀待死於門天君出教日且待於外須勑諸神伏地自以當直危立也教日勑諸神言天君欲不惜諸神且未忍相中傷教謫於中和地上在京洛十年賣藥治病不得多受病者錢謫竟上者著聞曹一歲有功乃復故諸神見天君貫不死之罪纔得薄謫誠自知過失自以摧折不望其生不忍有中傷之意復以事謝天君言告謝曹吏便下勿稽留時使神行卓視之曹白使遣下如天君教天君勑曹復告大神視其文辭令諸神見之曹以文傳視大神下所部各順其職見有功善貪進之人當進之前有事具白可知天君勑大神曰輒早觀此人與使神語言相應與不也大神曰被使往視其人積其日數視功效還白日被勑教視中和有功人還白如使神言天君亦如是有功之人而諸神所部不時白天君覺知乃道其意是不勉邪哉得簿謫於中和自今以後可以為誡有功不白天君聞之受罰自身之謫各慎職遣神導化其人使成神增其精光為視簿籍使上無者著其姓名上之大神受教還於曹視簿案其姓名有此白言曹文書有此文請案天君內簿知相應與不天君出文視之與外書同勑便上大神言不審年滿未請還諦案之天君謂大神安置耳目而不盡視之而言還案乎大神以職事謝天君言趣案疾還大神則案其人年已滿失脫不白無狀當坐伏須辜誅天君言且冠視職復勿懈因召其人上之勿失其效小職知所致奉功唯唯請如天君出教諾之大神且上其人署小職觀望其行日月尚淺請復情實有大效信真有缺者署之補缺處天君言當知大神所白勿有懈意大神言唯唯請使使神往卓視之天君言善不用書言命不全訣第一百九十九惟天上有聖明之人皆有部職各盡忠行不負於上各盡筋力所為作亦不失意皆豫知天君所施為常傾耳聽欲知其意常視儲曹文部別令可知顧君呼召無時不敢私出公事乃行輒關意相白乃敢出所周所徧被敕當所案行不敢留止須臾之間奉功私乃敢有所言誠相歸自不敢施私所不當全其命不惜晨夜而自責常恐有無牢之用各自該理其身欲副太上之意何時敢懈恐失其宜效日自進不須神言乃而欲自成欲得久視與天上諸神從事無有大小皆相關知可承行不義不自專恐有嫌疑動輒相聞何有息時所以然者人各有志各自有所念各有所成其計不同各有所見各有所出生各自欲有所得各知其所心乃了然是曹之事要當重生生為第一餘者自計所為生氣著人身皆不相去相守相成神亦貴得其名變化出入無孔之中小大自在俗夫之人不見神形容神神自相知形容皆氣所成何有不就者乎大神小神精光增減輒自有差其壽增九輒有其年大化行善壽亦無極上則無上下則無下出入無間無表無裏象如循環欲止自止欲行則行呼吸成神光景榮華上下有期得當行便以時還亦不可自在迫有尊卑各相為使各有簿領各有其職宜有其心持志不違明其所為各見其功各進所知無有所私動輒承教不失教言而精進趣志常有不息得勑乃止是生神之願輒有符傳以為信行諸所案行當所稟食勿過文書隨其多少天上傳舍自有簿領不當得止者勿止是天君常教勿妄恐守傳之吏以威勢也官有尊卑不可彊詐稱大位而稱久止傳舍吏輒受天君勑有過傳舍上其姓名官位所屬不得有隱欺天君亦自知之何得為相私明各如其平乃得上不用令勑簿書數上是復亡失精光其壽損減是為可知宜當慎時無敢自從而不承上之教也天上之神更相案舉亦無息時後進上下人當知是禁聖明之人自不犯之恐後進上之人不見其戒故天下文使知防禁是天君大恩恐有犯者是天君欲成就善心之故視其文并語俗人俗人雖少知中和之間各有禁忌文書天下中和民間道上佃夫阡陌聚社廬宅官舍門戶井竈刑德各主其事不可有惡復見䟽記簿其姓名積眾多聖明理之事更明堂天君得知復減人年上至死亡可不慎乎數下此文者後生之人不信前言故復因有知慮之人不犯禁者出之令俗間知之而不用書言命不可得全也惡籍累積日多少有減時故先命勑書誡勿使相犯犯之命薄不疑也當順書言小過尚可救解大過安從得貰乎誡文非一卷宜當重慎重慎天文不可自在也有知之人少有犯者時有失脫天亦原之不著惡伍為惡不止與死籍相連傳付土府藏其形骸何時復出乎精魂拘閉問生時所為辭語不同復見掠治魂神苦極是誰之過乎同從人生何為作惡行各宜善自守天稟人壽不可再得作惡年減何有相益時乎此時當所主天君取信不敢脫人惡行令得久生也為不知乎書前後相戒者既民不改令人欲盡年耳不欲為善自令不全亦奈此人為惡不止可書辭小解且念其後如有不備乃復念之大壽誡第二百惟有志之人心不迷亂奉天之化當所師導各使從其願乃為隨心眾萬二千物皆生中和地中滋生長大皆還自覆蓋蔭其下本根其花實以給身口助其穀糧使有酸鹹醋淡自在化水為鹽使調諸味以豆為豉助鹽為味薄厚自恣菜茹眾物當入口者皆令民食之用其溫飽長大形容子孫相承復以六畜不任用者使得食之肥美甘脆之屬皆使食是天使奉職之神調和平均使各從其願不奪其所安是布恩施惠民非乎奈何天所施而不求報乎天何時當求報施乎但平民受大恩而不歸相謝故求之耳天食精華氣自然不必須民報謝辦也貴其意耳而反不念天氣所生成令得食之是民中有知不報乃如是自以職當天使奉職之人案行民間使飛蟲施令促佃者趣稼布穀日日鳴之使民用其言家無大小能食穀者晨夜盡日相勸及澤布種天為長大時雨風搖枝葉使動成其身日滿當熟以給人食恩不重邪從歲至歲何有極時而反齊不作孝順有逆之心何益於天久養惡人使見可食之物乎中為天無所知邪何為當久養不孝惡逆之人乎故置凶神隨之不孝惡逆之人移令人重禁罪至禍重不見貰時想民當如是何為犯之自致不壽亡其年命乎不當視孝善之人獨得壽有子孫乎善惡當相比不壽與不壽為有比不生之與死當相懸不行作善有孝慈使各竟其年或得增命子孫相次無中夭時天用是為善孝之行所致不當比之邪何為作非邪施於人乎天甚憎惡之輒使絕命子孫得咎是惡所致欲何所望天喜善人不用惡子宜思書言其文具足可以自護必得天福可無久苦自愁令憂滿腹復有憂氣結不解日夜愁毒大息念在錢財散亡恐不得久保疾病連年不離枕席醫所不愈結氣不解計念之日夜羸劣飯食復少不能消盡穀五藏不安脾為不磨是正在不全之部短氣飯食不下家室視之名為難活有錢財家頗有儲侍無錢財產殫盡內外盡貧不能相發死命以至不見棺木畢埋土中須治生有錢財乃當出之相貧之家財去人走何時可合家室分離不能復相救遂不見棺木為無棺槨之鬼浮遊無家亦無復食之者死為鬼餓乞求食無有止時是惡行所致而不自知亡失宗族嗚呼痛哉死無所依是過積禍之人自致無門戶後世天甚復傷之故使復有遺腹子未知男女兒生未大母去行嫁至年長大問其踈親我父母何在親言汝父少小父母不能拘止輕薄相隨不顧於家劫人彊盜殊不而自休止縣官誅殺遊於他所財產殫盡不而來還故鄉久在異郡不審所至死生不可得知也諸家患毒親屬中外皆遠去矣汝母懷妊時見汝生有續心中復喜家長大人無所依止貧無自給使行事人隨夫行客未有還期遺腹子言人皆父母依仰之生我獨生不見父母至年頗大問父所在人言汝父行惡遠棄父母遊蕩他方死生不知所在無有往來者聞言已死不知所在父母憂之發病不起遂不成為人財產殫盡外內盡衰咎在餘親希踈素無恩分不直仰天悲哭淚下沾衣父有惡行自致不還於處身自過責無有解已時以行客賃作富家為其奴使一歲數千衣出其中餘少可視積十餘歲可得自用還故鄉招藏我父晨夜啼吟更無依止甚哉痛乎父時為惡使子無所依止淚下如行自無乾時天大哀傷常使彊健治生有利使取妻婦復有子孫心乃小安耳復為其子說之我父行惡遠在他鄉不還時往人去者卜工問之殊死生不知所安所在招藏之有歲數去行治生天哀窮人使有利入頗有少錢因求婦相助治生因有汝耳我疾我父少小時為惡故誡汝耳從今以後但當善耳勿效我父遠之他所故復思我過天哀我耳汝努力心為善勿行遊蕩治生有次勿取人財才可足活耳各且相事無妄飲酒講議是非復見失詳思父母言可無所咎天上聞知更為善子可得久生竟年之壽為汝作大以是為誡諸神聞知上白於天天令善神隨之治生有進財復將增生子遂健更為有足是天恩也春秋節臘輒奉天報恩既不解努力為善自得其福行慎所言復自消息天神常在人邊不可狂言慎之小差不慎亡身見誡當責身勿尤他人也此戒可知也欲得大壽者勿失此戒言病歸天有費訣第二百一惟人居世之間各有所宜各有所成各不奪其願隨其所便安自在所喜商賈佃作或欲為吏及所醫巫工師各令得成道皆有成以給民可用是天師化何有不就使自給口當念奉天所行恩分之施四時之報皆使不絕香潔而已是為報天之恩行善日久神靈所愛是善行所致何有不從者乎故天常為其上司人是非使神往來知人所為善惡輒白何有失者知知少以為不然故天為視其影響使聞音以是為效風雨遲疾皆使可知何有疑者動作輒異文墨相承亦不失其法人亦當知可不安得自恣而不順天乎天親受}
  - {type: variant, offset: 9009, length: 4, content: 樂則合共, ZHWIKI: 從其教令不敢小有違之意恐其有失而民所為功犯天法不避羅網是為故天命以自誡為當久}
