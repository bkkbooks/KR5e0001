  - {type: variant, offset: 13995, length: 1, content: 拷, ZHWIKI: 亦且考}
  - {type: variant, offset: 13997, length: 0, content: '', ZHWIKI: 人亦且更急之神亦且考之天上地上異處同謀鬼神不與人同家亦且同謀是天平氣且至也天初氣更始於天上地初氣更始於地下人初氣更始於中央此三氣方俱始生不欲見刑惡凶氣俱欲得見樂氣故自今以往天與地樂斷刑也真人知之乎唯唯愚生暗昧以為天上行疾人為惡而禁刑殺傷也不意乃天地人在懷妊之氣更始之本元也見天師說之甚惶甚㤥子知惶且㤥可謂覺悟知天道意矣善哉曉事生戒此文慎無斷絕為身害唯唯不敢不敢行去重之凡人學問各為身計務順天道唯唯出此天上禁忌勿藏唯唯請問天道何故正以今為大周為元初乃更大數考正文哉善乎子之難問也大得天心意然今者五陽之上長也五火之始也火之最上者上為天為日月之色者火赤與天同色天之色赤火亦赤赤者迺稱神天與神者常昌得凡事之元是故十一月為天正天上亦然故其物氣赤赤者日始還反其初九氣屬甲子為六甲長上首也甲者為精為凡事之心故甲最先出於子故上出為心星故火之精神為人心也人心之為神聖神聖人心最尊真善故神聖人心乃能造作凡事為其初元首}
