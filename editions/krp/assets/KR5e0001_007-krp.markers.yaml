  - {type: line-break, offset: 8985, content: '', id: KR5e0001_HFL_007-027b10}
  - {type: variant, offset: 8991, length: 0, content: '', ZHWIKI: 間無宜少信彊愚自以得人心意其念出言不可採取難以為師法無所畏忌而功犯非歷邪自以可意不計其命不見久全動作出入不報其親}
  - {type: variant, offset: 8993, length: 2, content: 妄也, ZHWIKI: 朝夕夷狄相遇此獨何人從所出生略少其輩飲食不用道理未曾了雪當亦無知之人比六畜生死無期口亦欲得美衣欲得好天當久活汝不汝行不可承用亡亦其行當可用不使天忿怒無有喜時當愛汝命令汝不死乎所為}
  - {type: variant, offset: 8996, length: 0, content: '', ZHWIKI: 觸犯不當}
  - {type: variant, offset: 8997, length: 0, content: '', ZHWIKI: 故為之是為自索不欲見天地}
  - {type: variant, offset: 8999, length: 0, content: '', ZHWIKI: 星宿人民生口之屬耳天有誡書具道善惡之事不信其言何從乎欲得見久視息乎中為不如六畜飛鳥走獸有知邪是愚之劇何可依玄但作輕薄衒賣盡財狂行首罰無復道理從歲至歲不憂家事遊放行戲殊不知止思不出中自}
