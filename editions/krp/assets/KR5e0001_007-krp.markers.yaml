  - {type: variant, offset: 10229, length: 0, content: '', ZHWIKI: 無惡言者各有其文所誡所成分明可知善自得生惡自早死與民何爭故置善人文以示生民各知壽命吉凶所起為道其誡使不犯耳行善}
  - {type: variant, offset: 10230, length: 1, content: 鄉, ZHWIKI: 人無惡文辭天見善使神隨之移其命籍著長壽之曹神遂成其功使後生之人常以善日直天王相下無忌諱先人餘筭并之大壽百二十其子孫而承後得善意無有小惡亦復得壽白髮相次子子孫孫家足人備亦無侵}
  - {type: variant, offset: 10232, length: 1, content: 多, ZHWIKI: 佃作商賈皆有利入為吏數遷無刑罰之意善所叔也人不能倣效反倨笑之是善人之心行自善有益於人見人窮厄假貸與之不責費息人得其恩必不負之小有先償酒肉相謝兩相得恩天見其行復善之使其出入無干犯之者行善之人天自佐之不令逢惡是行所致其餘為不善之人欲望坐得壽復有子孫是為不分別故天別其壽殊能行天上之事與天同心志合可得仙度錄上賢聖精神增加其壽何極故言善不可不為亦人所不及故天重有善人愛之不欲使有惡也善惡之人各有分部何得二千乎故天書辭具自可知也善者善之惡者戒之欲使不陷於危亡之失其年耳是天報善增其命惡者使下不成人是亦可知也何為有疑乎人從生至老自致有子孫各令長大成就在所喜隨使安之無逆其意各得其宜乃為各從其願為人父母亦不容易子亦當孝承父母之教乃善人骨肉肢節各保令完全父母所生當令完勿有刑傷父母所生非敢還言有美輒進家少財物賕恭溫柔而已數問消息知其安危是善之善也鄰里近親盡愛象之成善之行見有凶惡之人不敢與語言恐相反也相反之後更失}
  - {type: variant, offset: 10236, length: 1, content: 人, ZHWIKI: 天復憎}
  - {type: variant, offset: 10238, length: 9, content: 鄉者多惡人此非相易, ZHWIKI: 故皆自重惜損其子孫慎無犯禁使家不安不但不安}
