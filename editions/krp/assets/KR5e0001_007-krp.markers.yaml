  - {type: variant, offset: 8779, length: 1, content: 君, ZHWIKI: 則上老壽夫緩與樂者上屬天也急與怒刑者下屬地興行其上者萬事理興行其下者萬事亂真人戒之此言可不深思乎唯唯子可謂深知之矣傳之以示下古之人使各思其意慎無閉絕也}
