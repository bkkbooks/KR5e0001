  - {type: variant, offset: 7071, length: 1, content: 即, ZHWIKI: 可主諸同有所白歲有定承文而行不}
  - {type: variant, offset: 7073, length: 1, content: 禄, ZHWIKI: 有疑各有所白不兩平相怨同舉者有罰更為賤}
  - {type: variant, offset: 7075, length: 0, content: '', ZHWIKI: 雖不時下為大神所使不可神意便付土主不得復上故有空缺身不處之是上中下相參如一矣行慎此言亡身之壽與土相連土者非地之土自亦有凶神業守之為天土神使使不如所言輒見苦矣神仙尚有過失民何得自在故令司命近在胸心不離人遠人為精神舍宅吉凶自在何須遠避自令擾禍急不得活命未盡筭盡之後遠之無益天下會神主知存亡神自有失脫反受其殃故令民命不得復久長故遣神人示其文章得戒止惡神不上白尚可須臾飲食諸穀慎無燒山破石延及草木折華傷枝實於巿里金刃加之莖根俱盡其母則怒上白於父不惜人年人亦須草自給但取枯落不滋者是為順常天地生長如人欲活何為自恣延及後生有知之人可無犯禁自有為人害者但仰成事無取幼稚給人食者命可小長終竟錄籍無興兵刃賊害威劫人命天命此人不可久活惡惡相及煩苦神靈精氣鬼物各各不得懈息是非人過所為邪先時為惡殃咎下及故令生子必不良之日或當懷妊之時雷電霹靂弦望朔晦血忌反支以合陰陽生子不遂必有禍殃地氣所召反怨倉狼為惡報惡何復所望不知變易自職當絕滅無戶死不與眾等部吏正卒此伍特至曠野不潔之處纔得被土狐犬所食形骸不收棄捐道側魂神俱苦適作不息或著草木六畜所食何時復生罰惡賞善人所知何不自改天報有功不與無德思之思之賞罰可知自可死獨苦極善惡之壽當消息詳之慎之可無見咎故以重誡令自悔耳吉凶之會相去萬里故下此文相勑相誡勿怨天咎地善惡當分其文相錄知惡為善魂神勞極愚者不知故文辭丁寧反覆展轉相告無為後生作咎以此自證復何怨咎無所復恨各得其理此文當傳不得休止知者減年愚者自已寫書不用其言但自苦耳有過死謫作河梁誡第一百八十八}
