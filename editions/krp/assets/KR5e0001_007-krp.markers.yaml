  - {type: variant, offset: 5104, length: 0, content: '', ZHWIKI: 有信之後宜慎之大神言如是必海內聞知好道之人將相扶承事之敬之天君言有功之人亦自當見敬大神言此人年未滿期未至請至期教其所報謝當時未昇其舍空虛無以自衣有道者給食至時止天君言是小事耳以天官給家有家有心者大神言請如所道勑天官給所當得此人空虛日久與食令足大神言令勑天官神給姓名勿令空乏天君言善惟上古之人皆得天報應有信可成乃令受命為神所護視恐有毀缺日夜占之見為善助其歡悅不欲聞其惡常置長壽之曹心使為善無有惡時使有進善有孝忠順之意所承所行不敢以意承教而行人謂無知我亦見知之人有善大恩有哀以思力自善如人久見狐疑尤惡先沒用是自損度自約恐犯惡人日夜惶懼不知如何也天生人知善惡行善有信天不欲令人有惡聞也用是欲貪生惡死亦不敢犯禁如所妨害於身也故因緣天氣得與通人之辭語言自往來知人情意見其不善而退自責恐有文書汙名存其中也如人當時意加施於人誠不敢對首理委曲得自責所施行不得人意過多難除故人來悔易勢當時鋒通以為命可再得也不意天遣大神占之尤惡先入土用是自慰隱忍不敢當惡格辭有小異意既得天恩假其須臾使得蘇息長有活之望是天之部分也以故得有分意命不久存用是之故復益悵然有慚㤥之心欲見天神求哀教戒照未知之事防備未來當與天心合可得小如意貪上有計慮之人并思善惡得不見之勑迺見大神苦甘自道生求俗之人貪及上以故自修自正唯大神勑厲其不足使覺寤望戒左側唯大神哀省索生之人大神言何惜禁戒乎想自深知之辭令各自吐寫情實但恐不如所言且復諦之計從心出宜復熟念生言皆感恐既身及之何敢不從心出乎大神言如是為發且復還靜處惟思之有不足乃求生言稟知希踈少未得大通著之戒也匍匐須教乃敢進見大神言如欲盡精誠有功可得及之努力自念從生以來功效所進解先人承負承負除解過盡亦當上何所疑也且復慎所言宜勿外意也生言受勑見戒不敢餘力而不進善也已善復惡自與命戲耳大神言善人也宜復屈意雖心勞命之日當時微苦用心不解復後得福生受勑誠歸閑靜處思失自責大神言思從中出天神知之勿倦也生以年窮盡乃止大神言有行乃如是何憂不前乎天君聞之重勑大神使欲進者觀其所為積歲月日各令有部有功當上名須缺補上古之人心言口語皆知人情無文而治表裏外內具見其信各不相負天有要令犯者尤醜輒見治問責其過咎用是之故益復悸動惻然念天恩所施行使得全完為人知好惡之義人以此等念恩深厚不知以何報之但心思欲進而有忠誠之信所為所作承奉不敢失小差恐為眾神所白見過於上有不竟年命之壽以是益復感傷憂心不敢自解而望報施之意實貪生與諸天神共承天心有善者財小過除竟其年耳如有大功增命益年承事元氣合精華照見所知復受大恩非辭所報但獨心不知如何也唯諸大神共省哀錄不及教戒使見知慮知天上所施禁忌眾多當輒相承不得有失也唯大神惟其不足見戒不敢忘大分受施不忘生恩意也大神言生自有知之人何所教勑但當順天所為勿逆其心見勑戒應時奉行勿失脫而已是為得天心意矣賞罰有輕重宜各實之勿有失誤得為可餘少所戒宜詳慎所言出辭當諦思之令可行有小妄者輒以心自況之從善是為小戒餘者當平生之言見深戒不有失神意也自惜童蒙未見大分故固大神重戒所照眾多知慮廣博無所不包唯大神重戒欲蒙其德不逆所言唯復顧意伏須重戒大神言是語可知天上之施與中知地下傍行等耳法律相應無有差也自有相教者且隨其主勿逆而已生言自分當戒也法律雖同而用心少得其意也天心難知其訣大神言是皆實無欺而已乃豫知天君意所施為者為上第一之人可在天君左側有功勞賜賞謙遜不敢盡受益復竭盡筋力用心乙密為大故天君重復自面勑教人是生之福也所主眾多平心為行是自可矣生言不敢乃望在天君左側也見活而已但思忠孝順理盡節不敢受重賜但恐無功耳如小功效之日令生身日明長見生日久矣但思無極不敢有不思過須臾也得見溫言心志飽滿大神與生同居對治無思也誠復受恩出入上下時小相戒是大神之恩不可中謝但心意戀慕常在心中不敢解止天君聞之知之士所行莫不得願也常能自責過負想不中惡勑大神教戒之使及上勿倦也上善之人皆生於自然皆有曆紀著善籍之文名之為善人之籍常有善人之行未嘗有惡稱行止出入輒聞善意未嘗有惡故名善人動輒進之於人眾奇為不見之物得上於尊尊者見之或善其言或貪其善行或貪其誠或貪其見愛或貪其孝忠或貪其久所言或亦貪其見信是善之善也故名之為善時見寵榮復貪得長遊復貪得神仙復貪得不死位復貪使眾神是善人之貪也行仰善與天地四時五行合信諸神相愛有知相教有奇文異策相與見空缺相薦相保有小有異言相諫正有珍奇相遺共進於天神欲見敬求戒思過恐有不稱天之大神也常日夜進心念篤見善從心思聞善言忠直之志完軀之人愛其命年常恐一朝有異小不善之意聞人有過助其自悔主其有知善所諫用其人言并見其榮善教戒人求生索活之道是善人之極但當有功不敢違神之願思慕長在復得行見人之願所當逮及唯天大神通達辭令檢勑所行防禁得小失相假忍使思其意天恩廣大多所愛傷使得自思悔過命長是大分之施也但恐不而卒竟恩貸唯諸大神原其不及願蒙不見之戒使得思樂其志廣見唯思重勑大神言上天地各有文理知用前不知自卻此自然耳不惜愛戒而不相教也見眾善之人無有疑何所復戒但且詳念所言相副而已是善人之願也宜復明之生言自不肖行不純質以故自親大神所禁戒者數蒙厚遇輒見思念顯見以故復詣不知厭足天使其然大神言是生受自然之姿天使來問者知其同不耳何所嫌疑乎密欲來承勑者皆言自情實少雙辭語出於華耳會以心自正者少故使有空缺轉補是生短也宜復慎之勿解也生言稟性遲鈍設意不失但以文自防也唯哀之不耳大神言是亦出於知知善行善知信行信知忠行忠知順行順知孝行孝惡無從得復前也想生自知是故重之耳生誠悵然曰是生所聞是大善是有重戒出其中大神所道乃如是何敢有懈慢之意乎是為活生之意蒙寵如是不知何所用報大神恩也大神言是曹事視之而不足為戒念可行宜復成名可及上無疑行自得之何所報謝乎辭令自善不得相聞語耳生言是戒使生長得有活之望請於無知之處思惟所言大神言當知生辭勿離於內也前後所戒來學問之人如此矣生言誰當肯相勑如此乎生祿命大神喜之時約勑前後備足但無以副恩誠慚無以自置天君聞之是善之善善中尤善可兼行諸部勿使有失大神還語生天君所勑恩榮如是宜勿犯之唯唯上德之人乃與天地之間當化成之事使各如願善者著善之文不失其常不失其宜是為上德無所不成無所不就不失其明不失其實不失陰陽所生成不失四時主生之氣所出入不失五行之成不失日月星宿不失其度數不失吉凶之期不失有災異之變不失水旱之紀人命短長不失所稟繫星宿厚薄之意是上德所當行也故言有德之人無所不照無所不見上下中和各從其宜就其德各不失其名是為順常長生之文莫不被榮萬物巖牙部甲而生垂枝布葉以當衣裳霧露霜雪時雨以當飲食生長自成覆葉實令給人地之長名為水母民名為瓜盛夏熱時以當水漿天下所仰人無大小皆食之是德人承天統成天形於地以給民食行恩布施無不被德以自飽滿是天恩非也天所施生甚大不順命反言自然是為逆耳故使德人上知天意教民作法無失天心育養長大使得為人復知文理行成德就可上及天士天上之事功勞有差德人主知地之事令民依仰重見恩施不能以時報之德人為天行氣上下中央不得其所者人反輕天所施為是正令天怒不止神靈不愛人侵奪年命反自怨非天是愚甚劇故下神書使住勑為施禁固既民不犯有豫知}
