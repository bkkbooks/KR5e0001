  - {type: variant, offset: 9124, length: 1, content: 病, ZHWIKI: 可省資費無為大煩反舉家怔忪避舍遠處當}
  - {type: variant, offset: 9128, length: 0, content: '', ZHWIKI: 遠何益凶神隨之當可得脫不乎愚人為行乃如是寧能使命在不死之中可勿過也舍不殺人家自衰耳天神在上占之欲何所至乎中為不知汝處邪且慎所言天致愛人欲使人生何時欲害殺人故施禁法使人不犯之耳而自犯之壽命從何得前當思之思之復念書言可}
  - {type: variant, offset: 9129, length: 2, content: 夭傷, ZHWIKI: 自疑書復小止止後念之當所道說者復道之不承天書言病當解謫誡第二百二惟念俗間之}
  - {type: variant, offset: 9132, length: 0, content: '', ZHWIKI: 甚獨愚處不念作孝順事而為反逆不承大書言而苟自薄與人既無善而惡數聞處者致災中者衰落下者見病無有休息是為惡施於人令咎不容無有施恩之意日夜行侵剋善人令使自怨無有善意相待而反自策陷人入罪名使得有刑罰高至死亡而訣其主有財之家能自解酒無錢觸法教吏呼召亡費解之齎家所有皆有價數乃為解之分半自得以給家口美酒善腅恣其所得於意乃可不知人當從傍平之所為惡也自以可久而與人等縣君嚴者使人司候效功之吏當有報應晨夜司之欲得其為惡主默踈等輩為誰逕至門閤內刺合牋道其姓名為吏受邪簿主為間人道其短長酒肉甘肥常不離目下君得牋書默召其主為置證左使不得詆罪定送獄掠治首臧人復言之并加其罪聞亦然錢財小故不自努力周進治生有利而反賣舌於人相陷罪名是正惡何復久生長吏所疾令不得生是誰之過乎皆從惡弊人出父母愁毒宗家患毒為行如此亦何所望而欲得久視息哉主作禍罰而望求生此為何人天從上視之言不可久忍下文於主凶惡之曹遣吏從惡鬼佐助縣官治無狀之人使入死法不得有生之望是皆貪非一家之財以自增益而坐之得罪定死乃休無續世之人乃使先去者不見享食是汝過非從今以往後生之人見誡當止乃小活耳不者定在死伍之中不疑也慎之小差可無相怨人命不可再得人皆如是何為不從禁乎無狀之人結客合伍劫取人財其主不全縣官未得殺汝天代誅罰上自滅戶下流子孫用是財故而反不生是計何一不純故數出此書文者貴此不犯耳今續犯之尤處故令死亡者多天甚患之故見其人有心知者自不犯之今世俗人了不可曉視其壽書而不用其言以為書不可信用也不當見神仙之人皆以孝善乃得仙耳其壽何極且詳所言同出辭言可令好所為出惡自令得各書前後之戒者但欲使人為善不犯法耳何時相枉乎宜往念思著於五內令可奉行勿非尤於天也非之無益更相令過重慎勿有所恨行自得之何怨咎努力從善乃可為人耳行當自惜無為鬼所咎為知不乎宜各自明其計勿自逐非沒命不足塞責殃禍所歸者多怨憎何有止時持心不密但空言無益世間之用愁毒於人復何用相明使有和順乎自以為賢以化他人為不肖不當自況俱生為人無所照見問之無有相明之意是曹之人皆如六畜但口知臭香衣好禮跪起不可法}
  - {type: variant, offset: 9133, length: 0, content: '', ZHWIKI: 常有不錄之心見比鄰老人犯倨不起閉人婦女議相刑別其醜好此為惡人無所事作端仰成事口罵呪詛以地無神更相案舉自可而行不念後患將至不及相救救之已晚何益於事但為煩苛終可見理何以自明解其所負眾多人所非作禍不止久至亡家後無子孫不見其壽冤哉此行亦何可久}
  - {type: variant, offset: 9135, length: 5, content: 氣至矣萬國, ZHWIKI: 之書令下可順其上可得長久}
  - {type: 'kr:newline', offset: 9138, content: '

