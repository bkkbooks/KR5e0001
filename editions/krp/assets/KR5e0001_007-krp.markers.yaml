  - {type: variant, offset: 12096, length: 0, content: '', ZHWIKI: 也無有怪也但愚人不深計之耳善哉善哉真人欲知其大效此比若天道也諸清淨者樂歸天諸沈重者樂歸地各從其家無可非也故樂善得善樂凶得凶比若水從下火從高不失銖分真人以此書付有德之君以示凡人今太平氣至天興善皆使樂善也不得復有無故樂凶事者也樂凶事者乃與天為仇與地為咎其過不除今天上名此樂凶事者為大反逆之人也天凶氣地中諸咎悉且來下歸之也請問卒有急當以樂樂吉事時不暇待加王鄉斗前當奈何哉善乎子之問事也得其要意然使樂人居王鄉不得居王鄉者令樂人眾人亦向王請之亦以其音亦以其數如但其人姓字舉持律曆音氣相應亦可順其王相時氣而依其人使作樂亦可如此如此者皆為順用天地之教令無災害也如不若此有與凶囚氣合者悉生凶事又舉音倡樂亦當以吉吉音善事夫王相氣比若人之有君王亦不欲聽聞凶事凶言凶音也所以然者王相之氣乃為皇天主生主成善事乃而助天生成也惡音凶事不而助天生成凡物是故王氣不欲樂聞之也斗前之氣皆不欲樂聞之也是故古者聖賢帝王悉積聚善言善事不內凶惡之事名為祅言罪即誅死其罪未足以誅死但惡其祅言不祥耳故殺之也真人豈知此禁重邪唯唯可㤥哉可㤥哉子知早㤥可長存不知㤥死之根}
