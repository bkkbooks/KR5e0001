  - {type: variant, offset: 6899, length: 0, content: '', ZHWIKI: 長生求活可無自苦愁毒思行天上之事神靈所舉可得仙度久生長與日月星辰相覩是天之大恩宜勿有小不善亦復遣下作惡不止久滅人戶故復申勑既無犯者犯者各為薄命少年人欲為非當為說解其愚迷使不逢凶常時不用人言後復自悔談者之福也星宿視人不可為非當各有所白善者命長不復疑教戒後生可給先祖享不者自亡其名}
