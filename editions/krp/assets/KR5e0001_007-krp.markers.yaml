  - {type: variant, offset: 10287, length: 16, content: 皇平洞極之氣俱出治陽精昌興萬物莫, ZHWIKI: 諸神皆言是行尤善但未知天意耳故使善文善人記其竹帛使後生令得貪進遂善家世世有榮子孫}
