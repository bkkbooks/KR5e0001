  - {type: variant, offset: 4395, length: 0, content: '', ZHWIKI: 心自忿當前後深知至意不失其常念恩不違精實貪生望活何有小惡聞上乎結軀行相承事何敢有解意恐不能得上至意不知如何也心益復悸切自安無益天壽難得一失不可復還遠俗日久而反中折當顧望下是令悵然故自敕惶慄而已常恐一旦大小不稱見退愁懣在心自責自過既蒙天恩得展舒前命飢渴之情不敢忘得活而已諸大神哀省錄示元元稟氣於天廚駕乘天氣而行薄所主防禁眾多不可有失亡身雖鄙賤不足榮寵亦不以不肖故能見嫌疑也}
