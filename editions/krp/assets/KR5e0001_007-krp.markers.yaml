  - {type: variant, offset: 5766, length: 0, content: '', ZHWIKI: 之事照達上下莫不得開心之所念常不離於內思盡所知而奉行大化布置正天下所當奉述皆不失其宜篤達四方意常通問正其綱紀星宿而置列在四維羅列各有文章所行目有其常繫命上下各有短長生命之日司候在房記著錄籍不可有忘命在子午其命}
  - {type: variant, offset: 5767, length: 2, content: 延福, ZHWIKI: 長丑未之年不失土鄉壽小薄不宜有惡使付土鄉壽未盡籍記在旁雖見王相月建氣以不長所以然者在土之鄉故令坤艮之鄉其壽自減生日}
  - {type: variant, offset: 5770, length: 0, content: '', ZHWIKI: 時三土相望其日以生不進價作已錢從歲至歲少有利時辰戌之歲天門地戶天土地土自當所生天地土生上草木天地土生下草木天土出聖智土地土有賢雖有衡衡伍不相干人不知之反言年在辰戌月建相破以為大惡天門地戶相對陰陽相望生日直之天戊日復直歲生是為大德之人無所妨固宜勿惶懼地土出賢為之府土乃所居何有惡者人自不知以土為人皆屬土府壽命有期直聖得聖直賢得賢是天常法祿命自當或出神仙寅申之歲其人似虎日月相直殊不得相比所以然者寅為文章在木之鄉山林猛獸自不可當但宜清潔天遣令狩不宜數見多畏之者名之為虎年在寅中命亦復長三寅合生乃可久長申為其衝了不相亡多惡畏夜但能緣木上下所畏眾多其命在金行害傷人故令小壽是為可知事神忽荒精邪厭畏無常少有利時卯酉之命各直其月其月復同卯主於東繫命東星多所生活人民飲食卯故言東方正卯為東之中春生榮華夏長其實無所不施莫不被德故名東星為仁不忍中傷天惜人年復得久長西正酉復在金鄉喜行戰鬭不得久長行惡自然何從久生雖得王相月建裁自如耳其六七惡日亡其過半是為可知巳亥之期年以生各置其月復以其名為之重陰無陽命自不長三陰會時會復當故言巳亥拘主開藏亥主西北巳主東南所向所為少得其宜治生難以進壽難以長故言十文轉相通十干名功復宜天筭計其短長相推為命天之行何得自從故今大德之人并領其文籍繫星宿命在天曹外內有簿上下八方皆有文理何得自從人不得其數反言何負於天行善可盡年命行惡失長就短惡惡不止禍及未生何可希望行自得之其命亦薄不盡其筭閣在天上以遺善人可戒}
