  - {type: variant, offset: 6484, length: 0, content: '', ZHWIKI: 自惟本素無舛之人也如自發中思慕常在不害之命全身前貪其光耀上及無精無形之音聲洞達太上奉使進不敢忘有解而妨大化唯諸神省其貪生不敢去離大神左側見戒心開目明欲在久長之文增年壽思進有功以身躬親不敢自信而擅道曲直爭其不足也望上之人常汲汲唯哀照戒之恩愛念何有解時心想日夜相見貪知防禁之失以動其心使還見其不逮及者是非文辭口言所報唯蒙見省念貫於心鬲大神言是太上有心之人亦當所宜行也求蒙天重戒防禁自有知之人本素自了曉分別其理何所道戒乎持心射心亦無間私從上占下悉自知所主今太上有心之人天之親近天神所信但當持心意常恐惶不失耳餘者自有心所知努力傳達廣問勿失所言有知之人多所分明但恐當時有不如言耳何嫌不相白說其人有心自思愆負也平但念其前後壽自從中出與天君心相應也餘少戒有心之人言生本末草野之人見有久生老化復丁光景滋液出入無有失未見其失學者眾多得者少無其人所以然者持心不致密而輕所言祿筴不宜故令希少今生見是前行之事益復改正易節開心相留耳欲開音聲善聞貪壽惜年以是不敢解息唯大神省其不及大神言有心之人當賜錄籍請案曹簿有姓名者白天君大神不得自從也生言唯大神照議之耳不敢自遠傾側在外必身自效大神言請持有心之人白之有報名籍者何嫌相應也生言唯大神相白成就之日以死命自效何須望還報大神以事白天君言太上有心之人皆持心堅密志常貪上有信勑主者之神察之有其人者進白大神勑主察之言有此人姓名牒文者此人未生時預有姓名大神還白曰此人未生有籍唯太上之恩耳天君言有錄籍之人當見升自責承負大神遣大神除承負之數教化其心變化成神年滿上進大神言此人年滿筭計過期且百日前未有定故且止天君言勑大神且上令在間職有真闕使補之殊能竭精盡志知除兼行大神言請上如天君所言復精實壽計筭明者當在白日昇天中天君言是有心之人所宜也欲令有所主大神唯唯請勑正者故事承本文大神言以升曹白謁見者白大神言請勑主者曹主者既白使署間職有真闕使補天君言如曹所白右}
