  - {type: variant, offset: 8808, length: 0, content: '', ZHWIKI: 也故五方樂而和者五方善應出也故五方不樂而怒者五方惡應出也是非小事也故言毋斷絕也令凡人共惟思其意俱一覺悉出之然後悅樂氣至急怒氣去也善哉善哉行子已知之矣右天上分別樂與怒所生吉凶訣某訣第一百九十二前文原缺行有疾苦心中惻然叩頭醫前補寫孝言承事恭敬以家所有貢進上之敬稱其人醫工見是心敬其人盡意為求真藥新好分部谷令可知迎醫解除常垂涕而言謝過於天自搏求哀叩頭於地不避瓦石泥塗之中輒得令父母平安教兒婦常在親前作肥甘脆恣口所食父母商家所有不致苦其子孫令盡家所有殊私心孝於前親屬比鄰見其孝善知無所有更往給餉為其呼迎醫工蒙薦席相與日夜數勞知其安危問養視其復聞小善言心為之喜歡是孝之所致也天見其孝心令得愈更如平素心中迺喜欣復身得能食穀者齋戒巿賣進所有上於天還謝先人諸所得祟輒卒香潔不敢負言是孝子所宜行也俗聞知是善而不能行之能行之者性出自然天稟其命令使孝善子孫相傳治生有進不行侵人有益於親賓婚比鄰孝者還報不忘其恩是之善者也父母之年不可豫知為作儲待減省小費歲歲有餘藏不見之處勿使長吏及小吏聞知因緣徵發盡人財產為孝心未盡更無所有父母年盡無以餉送復為不竟孝之意行孝之人思成其功功著名太上聞帝廷州郡所舉一朝被榮是非孝所致耶子孫承之可竟無極之世此念恩不忘為天所善天遣善神常隨護是孝所致也其家一人當得長生度世後生敬之可無禍患各以壽終無中夭者是不善邪善之中所致何所不成何所不就何所不得何所不通乎努力行之勿以為懈倦也是善人之福也孝善之人人亦不侵之也侵孝善人天為治之劇於目前是為可知欲知善之為善也知孝之為孝也苦不能相效也是出自然天與善籍善孝自相得傳相勝舉亦何有極心善孝之人人自從崇之亦不犯剋人流聞八遠州郡縣長吏有空缺相補豫知善孝之家縣中薦舉長吏以人情欲聞其孝善遣吏勞來又有用心者以身往來候之知聞行意薦之歲歲被榮高德佩帶子孫相承名為傳孝之家無惡人也不但自孝於家并及內外為吏皆孝於君益其忠誠常在高職孝於朝廷郡縣出奇偽之物自以家財巿之取善不煩於民無所役郡縣皆慈孝五穀為豐熟無中夭之民天為其調和風雨使時節是天上孝善之人使不逢災害人民師化皆食養有順之心天不逆意也是善尤善孝忠尤孝遂成之使天下不孝之人相效為設孝意有大命赦天下諸所不當犯者盡除并與孝悌力田之子賜其綵帛酒肉長吏致敬明其孝行使人見之傍人見之是有心者可進愛有善意相愛此皆天下恩分使民順從此本善致善本孝致孝本不孝其末不孝本惡其末惡善者其願皆令其壽白首乃終上至百二十下百餘歲善孝所致非但空言而語也不但天愛之也四時五行日月星辰皆善之更照之使不逢邪也其善乃如是可不重邪天生人民少能善孝者身為之獨壽考復得尊官皆行孝所致不但祐言故出此書以示生民其欲法則者天復令壽可傳子孫相保書出必當行孝度世孝者其次復望官爵天下之事孝為上第一人所不及積功累行前後相承無所有失名復生之人得承父母之恩復見孝順之文天定其錄籍使在不死之中是孝之家也亦復得增度上天行天上之事復書忠孝諸所敬為天領職榮寵日見天上名之為孝善神人皆為神所敬有求美之食先上遺其孝行如是無有雙人其壽無極精光日增上見無極之天下見無極之地傍行見無極之境復知未然之事諸神皆隨其教令不逆其意共薦舉白太上之君見其孝行無輩著其親近內外神益敬重之故言天所愛者諸神敬之天所憎者諸神危之是為可知餘者各自用意自擇其便從其所宜書辭小息且念其後得善復出不令遺脫九君太上親訣第一百九十三惟太上之君有法度開明洞照可知無所不通豫知未然之事神靈未言豫知所指神見豫知不敢欺枉了然何所復道太上之言何有不動乎人同敬畏心不悉行是且得知不照其意所以然者太上皆神所生所化當生當活皆可知神錄相次道其尊卑何有不從者乎九皇之上則九君九君者則太上之親也各有所行恩貸布施諸神從者諸神敬其所為靡有不就者也小神食不能知九皇之意何言俗間之人乎心聖耳聰財可觀其文章祿策當直錄籍文辭自生精光皆以金為簡銀成其文章此簿在天君內中極有副其餘曹文書辭皆以奏簡自生文章精神隨字名之光明每有語言輒照有所知不逆所言神人真人得天君辭便具言神人上下皆知民間天君知神所言不失文墨規矩之中}
  - {type: variant, offset: 8811, length: 0, content: '', ZHWIKI: 道何所不知何所不化動錯自無所私飲食天廚衣服精華欲復何求是太上之君所行也大神小神自有所行皆相畏敬不敢有私恣意見所從求動搖有心之心知其所為可成以不惑迷其意使其人各隨至意言汝皆受於仙籙壽得無極金銀紫文之綬封侯食邑復賜綵帛金銀珠玉心想所得是非神仙道知人堅與不或賜與美人玉女之象為其作色便利之志意不傾復令大小之象見其形變意相隨念其後生此為不成之道或作深山大谷中多禽獸虎狼之處深水使化人心或有蟲毒之物使其人殺之或恐不敢上高山入大谷深水之中亦道不成是象戒人是在不上之中殊能堅心專意見迷惑不轉志堅隨其入出上下深山大谷之中水深大心不恐懼見其好色志不貪慕家人大小之象更相拘留不隨其人言但得生道進見太上盡忠孝之心無所顧於下是為可成戒大眾多取其要文天亦信善人使神仙度之也其人自善天何從欺之所以有欺者其人狐疑彊索神仙無益之用無功而求安何從不見欺邪是天重生愛其情尤志堅念生要三明三明者心也主正明堂通日月之光名三明成道心志自不顧亦有錄策不可彊求白日昇天之人自有其真性自善心自有明動搖戒意不傾邪財利之屬不視顧衣服麤粗衣纔蔽形是昇天之人行也天善其善也乃令善神隨護使不中邪天神愛之遂成其功是身行所致其人自不貪世俗大營財物天知其至意按次簿名真自有善星其生日時自不為惡天復善之貪化以助天君治}
  - {type: variant, offset: 8812, length: 0, content: '', ZHWIKI: 天上文辭使通徹行無私隱見行有歲數上竟榮簿有生名}
  - {type: variant, offset: 8813, length: 0, content: '', ZHWIKI: 太上之意能說其功行助其不及是亦神當所擁護也天信孝有善誠行無玷缺故使白日輒有承迎前後昭昭眾民所見是成其功使人見善白日之人百萬之人未有一人得者也能得之者天大神所保信也餘者不得比尸解之人百萬之人乃出一人耳功有大小更相薦舉其人當使天愛重之內為得太上腹心薦舉其為有信效各成其功名是不善邪天君出教之日神不枉其言是天君得善信效}
  - {type: variant, offset: 8814, length: 0, content: '', ZHWIKI: 知未然不可有毛髮之欺皆令壽命盡少盡小解於後復念語未卒意者復念道之不孝不可久生誡第一百九十四惟古今世間皆多不副人意苟欲自可不忠任事所言所道樂無奇異見人為善含笑而言何益於事輕言易口父子相欺當目無聲背去隨後而言或善或惡不可法則無益世間世間但為塵垢言談自動無應善書者心言我善行不相副無有循穀語言浮沈不可信驗名為不慎之人何可久前不可與善心有志之人等乎求生難死之人不欲見是惡人而不自知以為我健少能相勝者反晨夜候取無義之財而不攻苦得之以為可久在中和之中與人語言也傍人見之非尤其言神靈聞知亦占其所為動作其心知其惡不能久善還語天神言中和有輕口易語之人不能久善須臾之間惡言復見無有信效但佞偽相責何益於人令食諸穀衣繒布隨冬夏易衣服食欲快口衣欲快身巿有利入不肯求之而可養老親明旦下床未知所之衒賣所有更為主賓酒家箕踞調戲談笑歌舞作聲自以為健交頭耳語講說是非財物各盡更無以自給相結為非遂為惡人不可拘絆自棄惡中何有善半日之間邪無益家用愁毒父母兄弟婦兒輒當憂之無有解已攻取劫盜既無休止自以長年復見白首不知天遣候神居其左右入其身內促其所為令使凶當斷其年不可令久其揚聲為惡不欲止上至縣官捕得正法不得久生與死為比安得復生或為鬼神所害父母念之常見其獨淚孤相守無有輔佐之者老更棄捐飲食大惡希得肥美衣履空穿無有補者是惡之極歲月年長空虛日久面目醜惡不象人色如是為子乃使父母老無所依親屬不肯有之此惡人之行滅乃上親屬患之名為蔽子死不見葬無有衣木便見埋矣狐狸所食骨棄曠野何時當復見汝衣食時乎是為可知善惡之行人自致之何所怨咎乎天下之人何其甚愚不計其死生之間殊絕矣生為有生氣見天地日月星宿之明亡死者當復知有天明時乎窈冥之中何有明時愚人不深計使子孫得咎禍不可救殃流後生是誰之過乎人不化自致亡失年不當善仙士之行邪動作言談輒有綱紀有益父母使得十肥衣或復好面目生光是子孝行力非惡人亦獨不當報父母哺乳之恩邪為子不孝汝生子當孝邪汝善得善惡得惡如鏡之照人為不知汝之情邪故有善惡之文同其文墨壽與不壽相去何若生人久視有歲數命盡乃終後為鬼尚不見治問惡人早死地下掠治責其所不當為苦其苦處不見樂時是為鬼何以獨不有赦時是惡之極為鬼復惡何所依止家無食者乞丐為事逐逋亡之氣自不可久地下亦欲得善鬼不用惡也如是宜各念善不失其度纔可矣不者亦欲何望乎人當同其計策與生同願天不善之邪而反為惡乎惡行之人不可久視天地日月星辰故藏之地下不得善鬼同其樂得分別也文書前後復重者誠憎是惡人不可久生耳性善之人天所祐也子孫生輒以善日下無禁忌復直月建日月星光明之時用是生者何憂不壽乎是為善行所致也善惡分別念中可行者自從便安天不逆人所為也念之復念之思之復思之可前可卻自不貪生者無可奈何也書辭可知分明疑之自令苦極念生勿懈致慎所言辭復小止使念其後有不滿意乃復議之見誡不觸惡訣第一百九十五惟夫聖德之人各有所言各有所語各分別其能各自第其功各成其宜使有可信而重天言使天愛人而有盛功得天之腹心是聖德之願也夫人皆欲承天欲得其意無有怨言故令各從其志勿有非言而自可是為富得人情使報信同其知慮而從所宜人居世間大不容易動輒當承所言皆不失其規中而不自責反怨言人言是為不平行之各有怨辭使天忿怒而不愛人言壽命無常故天下有聖心大和之人使語其意令知過之所由從來各令自改乃為人壽從中出不在他人故言司命近在胸心不離人遠司人是非有過輒退何有失時輒減人年命為知不相善之人欲聞其}
  - {type: variant, offset: 8815, length: 3, content: 哉吾書, ZHWIKI: 使得安靜過失之間使思其意令其受罰亡年不令有恨天大寬柔忍人不一朝而得刑罰也積過累之甚多乃下主者之曹收取其人魂神考問所為不與天文相應復為欺欺後首過罪不可貸是故復勑下曉喻為說行惡災變所致使自改耳不用其言亦安可久久在民間為人乎故分別善惡各使不怨耳天為設禁使不犯耳而故犯之戒命於天神可以久與人等也作行如此為使人不死之道乎中為天無所知邪俗人之行不可採取乃如是安可久置中和之中使食可食之乎而反善神所護年盡乃止無中天人時是善之證也為善日久何憂不盡年壽乎是為可知人自不能力為善而自害之是惡之人何獨劇自以為可久與同命不意天神促之使下入土入土之後何時復生出乎地下復相引浸益亡尸是復不得天福之人可復計邪行且各為身計勿益後生之患是為}
  - {type: 'kr:newline', offset: 8819, content: '

      ', id: KR5e0001_krp_007-bkkkrnewl581}
  - {type: line-break, offset: 8819, content: '', id: KR5e0001_HFL_007-027a10}
  - {type: variant, offset: 8820, length: 0, content: '', ZHWIKI: 之人不}
  - {type: variant, offset: 8821, length: 1, content: 悉, ZHWIKI: 欲為惡人也天所不祐地不欲載致當慎之勿有愆負財得稱人耳可為父母子孫得續行恩有施可復得增年精華潤澤氣力康彊是行善所致惡自衰落亦何所疑從今以來當詳消息善惡分別念中何行者自從便安天不逆人所為也念之復念不順作逆而求久生是行當可久見於天神日月星辰安肯久照為天神所祐而爭欲危之是誰過乎不當是善行孝順之人邪輒有祿位食於司農久復子民}
  - {type: variant, offset: 8823, length: 5, content: 青首而丹目, ZHWIKI: 上下相事是民之尊者也是善所致惡自不全身相去幾}
  - {type: variant, offset: 8830, length: 5, content: 吾道乃丹青, ZHWIKI: 視其試書不用其言自快可意而行是為人非乎有惡不能自化有孝善有忠誠信}
