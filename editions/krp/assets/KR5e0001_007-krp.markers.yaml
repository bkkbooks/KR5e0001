  - {type: variant, offset: 6355, length: 0, content: '', ZHWIKI: 常思成功有恩於神益壽增年故令有知從內視外何所不知何所不見見心了了念但貪長生活之道思得駕乘為大神奉使在其所至不敢還言應時如到思得心開受神之言如神所為知神所行務以自信乃敢前言欲求蒙得見活而已不敢求大職見哀而已雖見存亡之事內心惶恐被受大教輒當行通施恩布惠有益於上有益於人著名錄籍常在不死之位心乃欣然嬉思盡功於天君所積之有歲乃前語言唯蒙大神通其不足知所辭辭大故以貪進受其乙密征營門閤不敢自息欲得教戒稟其不及願得省察不逆所言使須戒勑大神之言太上有知之人自多所照見但為未能悉知天之部界耳悉何所戒天上之神皆照之太上有知之人言也但為欲知所語所道所行與耳何所嫌疑乎天君言常勑諸神有欲忠孝誠信有功之人進上姓名是太上有知之人祿相所貪故以心自明是也但恐文辭筆墨自言耳亦何惜愛天上之教戒乎常言苦無應書者恐外內不相副也如欲進其知慮廣問深達是亦當所知也行其聽大神所言天有重戒不可不慎不可不敬不可不畏乃可誠所戒眾多當知其要且復開耳目用心唯唯然從中出天上大戒諸欲見進求生久活者宜當進其所知有知不言如聽是為無自進之心也心有知思思當進見其中有志當進見其志有誠當進見其誠有孝當進見其孝乃為得天之腹心不可不悉進也天君預知人情不可有不進而不進道說之也隱知藏能天惡此人使不見壽籍為知不乎不但不見壽籍也亡先失精去離身中亡其年可不慎乎太上有知之人所以然者天君知有知無知其自知之何有疑也但詳念神言勿負於言而已太上有知之人言自下愚彊問不及欲蒙得所不知何敢隱知藏能使天君諸神聞知更為亡命失年壽不久長是過禍之根滅身未足報謝何敢有進而乎唯諸大神照原其不及逮者大神言求生惡死之人亦自有心志意不可也恐有迷時生言自分不知戒文也而被大神恩貸教之乃如是何敢自息而不進所知所言乎唯大神錄前不耳大神言相前不易輒有保者有信可天君心意乃可望生耳當諦之生誠貪生故盡其忠誠不敢解息思過自責何敢失日夜乎天君聞知言此太上有知之人言也乃知是案簿文有此人姓名有闕備勑生籍之神案簿籍有此人雖有姓名自善多知須年滿勿失其年月神唯唯有心之人積行補真訣第一百八十四}
