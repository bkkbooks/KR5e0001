  - {type: variant, offset: 9661, length: 303, content: 嬉不肯合心爲一肯共生共成共爲理共傳天地之統御無窮之術力以刑罰威而合之久久猶敗相背分爭隂陽相尅賊害不可禁止也正使父子子母夫婦極親會相害也共亂天道斷無世也其大過所致如此矣樂爲天之經太陽之精孝爲地之經太隂之精故樂者倡始倡生倡合樂成功天者常嬉善嬉生故常與天合與同氣也樂合乃能相生當有上下故樂爲天爲上孝爲下象地地者下承順其上隂事其陽子事其父臣事其君君上事天地亦事天天事其上故與地同氣故樂與孝最順天地也易者理隂陽氣八風爲節與六甲同位隂陽同體與天地連身故爲神道也刑者絶洞隂戰不和之氣也故常隨隂節而起刑者得隂而劇得春夏而服得秋冬而興盜賊得夜而起奸邪得幽㝠間處而作鬼物諸病得㝠而發怨咎得險狹而聚相殺也此則不樂從刑之大徴可不愼, ZHWIKI: 危}
