  - {type: line-break, offset: 9138, content: '', id: KR5e0001_HFL_007-028a09}
  - {type: variant, offset: 9141, length: 8, content: 戰鬥盜賊貪猾絶矣, ZHWIKI: 者失命復見難治令世俗人亦自薄恩復少義理當前可意各不惜其壽縱橫自在以為無神隨䟽之者眾多事事相關及更明堂拘校前後上其姓名主者任錄如過負輒白司官司官白於太陰太陰之吏取召家先去人考掠治之令歸家言呪詛逋負被過行作無有休止故遣病人病人之家當為解陰解謫使得不作謫解得除之不解其謫病者不止復責作之既不解已以為不然觀其所行皆有其人多與少耳是為可知復慎其後勿益其咎乃為有知可使無咎無知自己患福之間未曾休止各慎書言不須相負難為記䟽神不休止想人知人而故為耳是不善故之也固善得善惡自不壽何為有恨自得之耳下順其上可無惡子為知不乎戒之戒之可令小息書難為文辭法令開張宜不犯耳書復小解復有小不定文者詳念其後但令可知慎之慎之小事致大文復重故小息耳息後有言復陳說之為父母不易訣第二百三惟有善行之人自不犯}
  - {type: variant, offset: 9151, length: 225, content: 六萬神俱樂喜也天地真仙人出天地真仙人出則正氣悉見而邪氣悉藏惡人悉坐自思矣善人行矣神人筴書盡出而邪僞文亡矣人莫不悅樂喜隂陽和合同心爲一家傳相生凡事樂者無有惡也凡隂陽樂則生之始也萬物所受命而起也皆與人相似男女樂則同心共生無不成也不樂則不肯相與歡合也怒不樂而强歡合後皆有凶今吾之文纔舉其大綱見其始以樂化之爲不善安可勝記也已知樂之善未及不樂之禁復爲開其綱紀怳惚不樂不肯并力合心而共生元氣著自然也元氣自然不樂分爭不能合身和德而共生天地也天地不樂隂陽分爭不能合氣, ZHWIKI: ''}
