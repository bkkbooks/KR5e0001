  - {type: variant, offset: 12839, length: 0, content: '', ZHWIKI: 假令得道上天天上簡問之盡為惡人今不可以調風雨而興生萬二千物為其師長也可㤥哉可㤥哉小生聾暗訖不知有過於天今唯皇天明師願見為復重察察分別解之冀蒙心得更開行詳聆聽為真人具道其意使可終古以為萬世之法後生謹良為道者不復犯天禁令使得道而上天天上更喜之比若地上}
  - {type: variant, offset: 12841, length: 0, content: '', ZHWIKI: 得善人與共為治亦喜之也故天上所進地上亦然豈不善哉唯唯聞命矣道者乃皇天之師天之重寶珍物也為者其行當若天成道者當上行天乃好愛之仕也今或有過誤得道而上天者天下受如問之反皆有不謹孝之行道為化首天為人師法何可反主畜舍匿養天下不謹孝子哉子親有此惡行而天何宜使此人長生與其共事乎若此天反當主舍此惡人反逆之子邪地上尚不仕天安肯仕之乎故不孝而為道者乃無一人得上天者也雖去但悉見欺於邪神佞鬼耳會皆住死於不毛之地無人之野}
  - {type: variant, offset: 12842, length: 0, content: '', ZHWIKI: 戮其形天之應人如影響安得行惡而得善者乎古今希有之也地王雖為道前後眾多者其度者少今天上乃少善人無可與共事者也其行悉凶惡也如是天何不即殺之乃使到不毛之地無人絕氣之野乎所以不即滅殺之者天地之間其氣集多所而畜容故名為中和比若人和無不而包容也故得須臾天者主執清明比若居帝主之前不可得容姦惡人也故天上本不與等子為治也地上亦然也天不與不謹孝子為治比若聖王不與不謹孝人為治也聖王尚不肯與為治天何肯獨與為治乎哉古者聖賢所以不與為治者乃深覩天法象天為行也與}
