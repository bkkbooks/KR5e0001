  - {type: variant, offset: 10431, length: 192, content: 故時時生聖人生聖師使傳其事此主天時且吉樂故生善師使善言善化天道將亂凶衰則生惡師使教化惡也是主化天道且自善自惡之徴也者夫且樂歲生善物多五穀成以食人其人好善天且惡歲生惡物多善者少以惡物食人其人色惡是其化人之師明徴也故善師出惡師伏是天盛衰之徴是主天也今天道大周故使吾下善說真人善事樂其化爲上善故以第一事教之天周備其事具者必樂子知其意若人物周遍有其家爲其樂今天周遍有何不樂而曰凶乎此書萬世不改, ZHWIKI: 右}
