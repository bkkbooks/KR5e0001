  - {type: line-break, offset: 8836, content: '', id: KR5e0001_HFL_007-027b01}
  - {type: variant, offset: 8836, length: 1, content: 信, ZHWIKI: 心而望天報有病求愈作惡過多無解時為可久貸與不故作此文欲使俗夫之人各不怨其得罰耳念生求活之人自不為惡行而亡其年}
  - {type: variant, offset: 8838, length: 2, content: 青者, ZHWIKI: 得書見誡使知避禁不觸惡耳如是能自改為善可得久見天地日月星辰與人比等是不善邪而反不惜其命以為死可得復}
  - {type: variant, offset: 8841, length: 8, content: 仁而有正赤者太陽, ZHWIKI: 如人知不自知為惡自以為可也談語欲與人比等衣食與部人同是為可久不乎畏死之人不敢犯此誡文是亦祿策所致其人相薄少可宜直命當直之何所顧乎行各自慎努力念所行安危之事書誡亦自可知也}
  - {type: variant, offset: 8850, length: 12, content: 之正色也吾道太陽仁政之道, ZHWIKI: 書文欲使人為善}
