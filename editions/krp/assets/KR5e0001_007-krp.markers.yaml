  - {type: line-break, offset: 12440, content: '', id: KR5e0001_HFL_007-038a05}
  - {type: variant, offset: 12441, length: 0, content: '', ZHWIKI: 人不樂則為惡為惡則萬物凶矣善哉善哉又人者是中和萬物之長也其長悅喜理則其萬物事理其長亂則其物亂故先樂其長以順樂天地人之道也善哉善哉是故上善之氣最尊善故樂得三重也以樂善也是故古者帝王治得善得天心意者得重樂也是其明證也今太平氣至故教其興樂也衰亂之氣應凶年故不得興樂如興樂名為興樂凶衰天上名之為大逆也災害之本禍之所從起可不慎乎善哉善哉是故其次樂再重王氣不若}
  - {type: variant, offset: 12443, length: 0, content: '', ZHWIKI: 故}
  - {type: variant, offset: 12444, length: 0, content: '', ZHWIKI: 少是故治少善者樂為之衰少所以衰少者氣衰不而大善故不敢重多樂也中有凶氣故不敢具其樂也比若人家有七善三惡則心中為之不而樂此之謂也善哉善哉夫七善三惡善多惡少安而止樂乎人心中雖樂時念三惡則不而純樂此天性也乃且盡善無復一憂乃而大樂也故樂以樂善不以樂凶也善哉善哉吾言乃天明券書不失一也是故其次樂一行相氣微氣少所而安人德最少不而若天地氣也故乃微少不而若天地故少其樂相氣微氣少所而化乃其中國固多惡少善故不敢多具其樂也反名為樂凶惡其善少故其樂少也所以少者但樂其中善者不敢樂其中凶惡也樂其中凶惡比若小人有七凶三善三善謫得三從樂有七凶惡反七愁苦悒悒安而從樂乎所以然者十十為法者十乃三折之也帝氣十十皆善王氣者二善一惡相氣者二惡一善也故帝氣者象天天者常樂生無害心欲施與}
  - {type: variant, offset: 12448, length: 0, content: '', ZHWIKI: 常純善良無惡無害心天如三皇三皇}
  - {type: variant, offset: 12451, length: 0, content: '', ZHWIKI: 故上善之人無一惡但常欲為善其象天也其象真神乎善哉善哉}
