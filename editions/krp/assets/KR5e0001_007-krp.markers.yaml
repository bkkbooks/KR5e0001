  - {type: variant, offset: 4241, length: 0, content: '', ZHWIKI: 故置凶神古觀之還辭如所言其人自不好善天君言前已有文書不絕部主者下收其魂骨肉付地主不須時惡人不可數聞故自損威怒還就儒雅改易其惡采取眾善著之於內以心置心神言我受天心教勑使主隨人心其不得有小脫善惡輒有傍神復得心神言益復悲楚未知吉凶故自恐在惡伍之部日夜自惟不知當所自置故不敢有不善之意唯諸神相假借使得自責不用神誡被誅不恨天君遣大神下言此人有自責悔過不犯所禁假之假之後有不善取之未晚見神言日夜長息恐身過未悉除久不與太陽氣通而在死伍之部益復篤不知而何也}
