  - {type: line-break, offset: 13290, content: '', id: KR5e0001_HFL_007-040b05}
  - {type: variant, offset: 13296, length: 0, content: '', ZHWIKI: 善哉子之問也得其要意真人安坐為子道之可傳萬世無有去時也唯唯受命厚厚勿謝子為天地問疑吾主為天談非子之私也俱共公事何須謝哉欲不謝若為輕道易事愁師謝又觸忌諱不謙也但恐書益文多辭令難知故止真人言耳夫辭者道之柄文之所從起也勿悒悒方為子分別之唯唯}
