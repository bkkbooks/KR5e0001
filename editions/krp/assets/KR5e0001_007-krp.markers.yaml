  - {type: variant, offset: 7040, length: 3, content: 太平但, ZHWIKI: 至重故語人矣有命當存神神相使乘雲駕龍周徧乃止天有教令當復行矣無失法則枉踈記為置證左不宜自服天亦止息各受其罰可無怨矣為神所白無妄犯天下地上中和之子各不自敬無怨天咎地上下相留亦如民法令辭不情實為下得怨亦不留久天上諸神爭道之何況凡人民宜自奉}
