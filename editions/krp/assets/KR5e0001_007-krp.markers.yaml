  - {type: variant, offset: 14076, length: 0, content: '', ZHWIKI: 矣善哉願聞今陽之生者何故正於幽冥中乎夫生者皆反其本陰陽相與合乃能生故且生者悉復其初始也天地未分初起之時乃無有上下日月三光上下洞冥洞冥無有分理雖無分理其中內自有上下左右表裏陰陽具俱相持而不分別若陰陽相持始共生其施洞洞亦不分別已生出然後頭足具何知陰陽之初生之始如是矣故人今將變化而施生者悉往就幽冥閑處天使不忘其本也人初受天地之法是其先也故天使其不忘也善哉善哉見皇天師言乃知分理也子可謂易示曉矣請問陽與火何獨伍乎行氣者各自有伍非獨火也金火最為伍赤帝之長故天策書非云邪丙午丁巳為祖始始者先也首也故書言祖始也萬事之始從赤心起心者洞照知事陽始於陰中亦洞照故水者外暗內明而洞照也中有陽精也故陽始起於北而陰始起於南十一月地下溫五月地下寒今陰陽始起何不於天上而正於地中乎善哉子之難問也然地為母父施於母故於陰中也其施陽精同始發於天耳陽者其化始氣也微難覩入陰中成形乃著可見故記其陰中不記其陽也今天雨雪同是其施化之道見可覩而言陽施精微不可覩乎善哉子之言也難得其意欲為真人分別說之恐天道大形見故不為子說也然恐真人心恨夫為人師為人上者難請安坐為子微說之天雨雪造將為之時呼吸但氣耳陰陽交相得乃施可覩於此之時天氣下地氣上合其施故雨雪有形而可見也請問今或有山潰雲上皆可覩而言不可覩何也欲不問苦悒悒今故具問之為弟子不謙不也不問無以得知之致當問之無所疑也諾為子微說之不可窮極然雲雨潰山此者陰之盛怒而不自忍傷陽化凶事也非善變也有傷於化之道陰之失也陰之傷也真人勿復窮問天道亦不可察察盡言也子自思其意唯唯行去道祐三人訣第二百一十三真人再拜謹問天師道}
