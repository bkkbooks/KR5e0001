  - {type: variant, offset: 9114, length: 0, content: '', ZHWIKI: 何時敢至天君之前而求請人乎但費人酒餔棗饊之屬得病反妄邪神之家得愈者謂在不死之伍中事未上過可得蒙愈此天自愈之邪神之家何得名之而言多愈人病乎而責人肥美見邪神所為則召令上之考問藏罪藏多罪大便見不活事神者神不往來人復不中精神日竭是邪神自其殃神家得邪神餘物以給家口肥美好衣自以可久神嘗坐之何望得活而壽乎受神藏多不可復貰并亡其子孫反言其過殺我子孫或身亦望久久亡戶人日當自正可勿咎天今世之人行甚愚淺得病且死不自歸於天首過自搏叩頭家無大小相助求哀積有日數天復原之假其日月使得蘇息後復犯之叩頭無益是為可知努力為善無入禁中可得生活竟年之壽不欲為善自索不壽自欲為}
