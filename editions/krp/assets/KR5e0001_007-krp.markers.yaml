  - {type: variant, offset: 12322, length: 0, content: '', ZHWIKI: 令致多衰病人又生偷猾人相欺多邪口舌國界少財民多貧困樂上帝上王相微氣三部今天地人悅致時澤災害之屬除去名為順天地人善氣也致善事樂下三部死破囚休衰之氣致逆災天時雨邪害甚眾多不可禁防也此諸廢氣動搖樂之則致惡氣}
  - {type: variant, offset: 12323, length: 0, content: '', ZHWIKI: 發泄賢儒藏匿縣官失政民臣難治多事紛紛不可不戒之慎之也天地凡事有固常法有氣之鄉而向尊者欲見樂無氣之鄉衰死者不宜見樂故樂善者天上名為順政樂惡者天上名為逆令順政者得天力逆令者得天賊得天力者致壽得天賊者致}
  - {type: variant, offset: 12324, length: 0, content: '', ZHWIKI: 咎所以然者天之為政猶影響不奪人所安樂善得善樂}
  - {type: variant, offset: 12325, length: 0, content: '', ZHWIKI: 得惡是復何言夫善惡安危各從其類亦不失也但愚人不計之耳是故樂道者道來聚樂德者德來聚樂武者武來聚樂正者正來聚樂邪者邪來聚何嘗不若此乎故吾深計天之法以戒真人也哉天法不可犯也故重丁寧子唯唯}
  - {type: variant, offset: 12332, length: 1, content: 弦, ZHWIKI: 賢}
