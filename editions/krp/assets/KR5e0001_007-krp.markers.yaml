  - {type: variant, offset: 13165, length: 0, content: '', ZHWIKI: 天為行也天上亦尊貴善道人言其可與和風氣順四時承五行調風雨助日月星宿為光明也}
  - {type: variant, offset: 13166, length: 0, content: '', ZHWIKI: 使萬物興也今如此食糞飲小便何可以為師今地上師尚不中名為逆子何能反中天上師乎哉小人甚愚也甚淹汙辱天道真人得極文思其意地上所惡天上亦惡之天上所惡地上亦然是地上人惡食糞飲小便天上亦惡之故乃遣雷電霹靂下殺之也此辭者但可以曉地上人耳天上惡之劇於是地上尚憎惡之天上何用為哉天乃清明而鮮何以反當主舍聚此食糞飲小便人乎錐過誤須臾得道會不得上昇天也悉往死於五廢絕氣敗凶之地以順其}
  - {type: variant, offset: 13167, length: 0, content: '', ZHWIKI: 以彰其過各歸其所求不欺之也真人年有善竟戒之慎之以示後來令洞上皇平氣至不得容此惡行犯之死明矣可㤥哉可㤥哉真人知㤥是子覺也子不㤥與之同罪知而故為之罪不除唯唯不敢不敢今上皇天之為性也常欲施與故主施主與主生主長主出不主納主勝不主服服則為逆故天道不可威刦也刦迫之則令人滅亡矣天主善主清明不樂欲見淹汙辱今天與道乃無上之稱也故帝王象天為行也稱無上之君不敢失天行之銖分則吉失之則大凶今學道為長生純當象天也天者好生故學長生者純守天第一生之氣其為行當隨天道意也故地者主辱殺主藏不當隨地意也夫道者乃大}
  - {type: variant, offset: 13168, length: 0, content: '', ZHWIKI: 之根大化之師長也故天下莫不象而生者也今下愚小人欲為道反無益於民人而共淹汙辱天道甚逆無狀天上名之為逆子大凶之人也天上不欲見之也何謂也愚生心結閉未及之也善哉子之問乎天使子言詳開耳目而聽夫天與道不好施好生好稱邪為之何不卜卦賦藥有益於民人而使神治人病固止也此三人也皆得稱師不利天道不敢淹汙辱天道夫天道不欺人也常當務至誠天道不欺以欺即其後久久日凶衰矣天之為道也不樂淹汙辱不欲利人天乃無上道復尚之道乃天皇之師法也乃高尚天是故天與道者主修正凡事為其長故能和陰陽調風雨正晝夜列行伍天地之間莫不被恩受命各得其所者今下愚為道反為欺慢癡狂乃共惑亂天之道毀敗天之化首反行乞匄求人之物無益於民間淹汙辱天道內利百姓不可以為師法反使後生者相教每為道道令人癡狂慢欺又行被淹汙辱而乞匄因以此行而名之謂為癡狂乞匄者之道反使凡人共罵天共賤正道斷絕大化天甚惡之道甚疾之天上不欲見其形也今天上皇洞正氣大至日月星羅列皆重光道與天當調風雨和陰陽使萬物各得其所而前人邂逅得道而昇上天無可仕者也天上問之悉有過不可與共事汝等乃居地上尚見謂為癡狂乞匄者不中帝王之師安而中天上之師哉天其惡之大道衰廢咎在下古人相學失法度天病之大悒悒天道不通故遣吾下與真人共談分別道得失樂天下人一覺俱知天上意改其行易其心不復犯天禁則學者成矣如修其故行天不上之也會當復往死於五辱之地付命於五汙之土絕洞無人癡狂之野上無三光下無良土何也願聞之其過何重也不謫之也天道為法各從其類下奪之也如是何以不即殺之乃到此乎欲即滅殺之又其人自言欲長生而至信欲中殺之又反且哭天啼地自言甚冤又不自知其過所由出故天考之徒之其後投於五辱癡狂之土使自知也子欲知其實審比若明王考人過責非肯即殺之也猶當隨其罪大小詣獄大罪大獄小罪小獄治之使其人服自知乃死不恨而無言也如不窮其辭語會自言冤懷恨而死故五霸之君其民臣多懷恨而死者也子欲知天上之治刑如此矣真人解邪可㤥哉可㤥哉子知驚㤥生之門也不知驚㤥死之根也子慎吾言吾言正天之兵不可詆冒詆冒令人傷小詆小傷大詆滅亡也戒真人一言下古之人積愚信其無知之心且言不然自窮矣吾親以天上行而下知其萬不失一也吾不敢欺子也欺子不畏真人乃畏天威故吾言乃信復信所以言復重者乃恐其固固有失之者故復重使其言多文天上之事實遠難知故文時時下合於地也}
