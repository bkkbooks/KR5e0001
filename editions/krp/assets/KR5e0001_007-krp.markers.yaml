  - {type: line-break, offset: 8934, content: '', id: KR5e0001_HFL_007-027b07}
  - {type: variant, offset: 8938, length: 5, content: 亦然樂者陽, ZHWIKI: ''}
  - {type: variant, offset: 8944, length: 1, content: 天, ZHWIKI: 所說所道未曾有小善有惡}
  - {type: variant, offset: 8946, length: 10, content: 經也兵杖刑罰者隂也地, ZHWIKI: 辭而反常懷無恩貸}
