  - {type: variant, offset: 7242, length: 0, content: '', ZHWIKI: 不欲為善事反天神天神使風雨不調行氣轉易當寒反溫當溫反寒耕種不時田夫恨怨不肯為人理之輕賤諸穀用食犬豬田夫便去在有德之國其處種者少收樹木枯落民無餘糧更相殘賊爭勝而已不念真後更為貧人收無所得相隨流客未及賤穀之鄉飢餓道傍頭眩目冥步行猖狂不食有日餓死不見葬家無大無小皆被災殃反呵罪於天其國空虛倉無儲穀少肉無儲錢歲歲益劇無以給朝廷復除者多倉庫無入司農被空文無以廩食奪祿除中國少所用人民仰國家而不各施有難生之期是皆天之所惡也地不得久養惡人知不真人}
  - {type: variant, offset: 7250, length: 1, content: 君, ZHWIKI: 國各}
