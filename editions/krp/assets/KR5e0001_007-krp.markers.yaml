  - {type: line-break, offset: 8917, content: '', id: KR5e0001_HFL_007-027b06}
  - {type: variant, offset: 8917, length: 1, content: 至, ZHWIKI: 改}
  - {type: variant, offset: 8918, length: 1, content: 故, ZHWIKI: 志}
  - {type: variant, offset: 8920, length: 1, content: 上, ZHWIKI: 復追念使不逢惡可信天書言可得生治不用書言自不全擇其可行乃行之不彊所為各且念身善惡天稟其性勿有所嫌疑也宜不欺善而惡人得福也是言者明白何有所疑乎神仙之人皆不為惡者各惜其命是善之證也書所言約勑前後道人之所願為道善惡使思之耳不用而自己勿自怨自怨者但當知怨身少知而窮老乃極自咎之耳餘者自}
  - {type: variant, offset: 8923, length: 0, content: '', ZHWIKI: 意如欲貪生不當有惡故使自思知其苦}
  - {type: variant, offset: 8924, length: 0, content: '', ZHWIKI: 樂獨何人苦亦何人亦宜自念勿有怨辭勿妄輕言出氣令可思思生為善故丁寧相語者令語言可知不失天規矩行成自然之道何所不成何所不化人皆迎之是天自然之恩非邪念下愚之人不念受天大分得為人自}
  - {type: variant, offset: 8925, length: 0, content: '', ZHWIKI: 當常得久也亦不意有巫靈之神者當止勿犯非也書辭非一念之復出文辭有副故置重誡顧其不及用書念生為善為有活望復有惡言不}
  - {type: variant, offset: 8926, length: 1, content: 奉, ZHWIKI: 者被踈記不息也慎}
  - {type: variant, offset: 8928, length: 4, content: 大急兵杖, ZHWIKI: 且止止復有所思思後不足不滿意者復申理不可不祠訣第一百九十六惟世俗之人各不順孝反叛為逆競行為不忠無信之行}
  - {type: variant, offset: 8933, length: 3, content: 斷刑罰, ZHWIKI: 反無報施之義自以成人久在}
