  - {type: variant, offset: 10263, length: 3, content: 師法而, ZHWIKI: 功是大善之人行天必令壽神鬼祐之不敢失四時}
  - {type: variant, offset: 10267, length: 2, content: 化悉, ZHWIKI: 奉進各有差序巿價取好不爭價直所以然者夫有所奉進皆有精神隨上下進退小異不潔輒有文墨不有失故順所賈所道乃為恭敬神靈必喜上白司命祠官各部吏安行或自行見其潔香乃享食食後大曾五祖乃於處食食必歡喜家遂富有子孫皆善無有惡子郡縣聞之取召使為有職之吏輒轉入府府有署顯職州復聞知辟召親近舉廉茂才是善所致也行自得之其位必至是亦}
  - {type: variant, offset: 10270, length: 9, content: 類似天者好生興物物, ZHWIKI: 祿稟命所得明其為善之徵惡}
