  - {type: line-break, offset: 12491, content: '', id: KR5e0001_HFL_007-038a08}
  - {type: variant, offset: 12491, length: 0, content: '', ZHWIKI: 凶故不得有樂也夫}
  - {type: variant, offset: 12494, length: 1, content: 有, ZHWIKI: 性樂以樂善不以樂惡也夫天地之}
  - {type: variant, offset: 12499, length: 0, content: '', ZHWIKI: 不以誅善天地格法不可反也善哉善哉請問樂以樂善意願聞大訣使愚生心悉解}
  - {type: variant, offset: 12500, length: 1, content: 遵, ZHWIKI: 不敢復問豈可聞乎子自若不解邪謹已小解恐下古之人積愚迷日久雖與其文猶復不解復令犯天禁故不敢不問其大訣易知者矣}
  - {type: variant, offset: 12502, length: 3, content: 可深察, ZHWIKI: 哉子}
  - {type: variant, offset: 12506, length: 1, content: 令, ZHWIKI: 言得其意諾安座方解之然夫上善大樂歲凡萬物盡生善人人歡喜心中常樂欲歌舞人默自相愛不變爭自生樂上下不相剋賊皆相樂故樂生於善以樂善天使自然如此也善哉善哉夫大凶年凡物無一善者人人皆飢寒啼呼哭泣更相剋賊默自生愁苦忿恚心中不樂何而歌舞樂默自廢絕故凶年惡歲無樂天使其自然無也是則明天不樂凶惡之證也是故樂為樂善生武為興凶作是故古者帝王將興者得應樂善也將衰者得應惡也此者自然之法也是故樂生善善生樂凶凶生樂武武生凶無為生樂樂生無為武生亂亂生武樂生歌舞歌舞生樂凶惡生愁苦愁苦生凶惡以吾文見下古之人使其思之樂之訣說小竟於此善哉善哉右五音樂當所動發前後得天地人心意以致太平除災姦致和氣出大訣天樂得善人文付火君訣第二百七今}
