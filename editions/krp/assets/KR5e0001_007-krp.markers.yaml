  - {type: variant, offset: 6692, length: 2, content: 逃也, ZHWIKI: 久存皇上所不欲見急斷其年人不自知反怨蒼天天何時相冤人自求之殊無知慮犬羊之命何可久遇與禽同羅觸犯其綱貪食害軀群輩相隨不惜其年其中有知乃出於四境不害之鄉是獨何得亦中命自然雖處無人之間是命所全世少報者時世命然痛哉奈何自言何負於天先古之人萬無一人相得其貪財色不顧有患災及胞中不見日月星何惜痛乎自遺不完命與土連窮哉此人亦有比等草木禽獸亦然不思自正端正意無妄有惡言上有神記下無靈上無隱匿其主坐焉各當努力求得戒勑神靈之旨吉凶之會何有不報者乎故勑神人為民施防禁使得見生死之忌生者陽氣所加錄籍有真神仙錄有過退焉陰氣所加輒在死部熟念惟思無失天網下及地理當知人情出入表裏可進可退無遣人咎各得增年延及子孫得戒之後重慎其言為惡在下上所不顧俗世之人少孝少忠貪慕所好劫奪取非其有殺心不離口吻何望活哉會有殃咎早與晚耳奉承天文神靈所記致當遠之不可自試試生得生試死得死會死不疑故復丁寧反覆語之勿與無知有小異言長生之道近在三神三氣合成乃為人不成離散為土在瓦石同底破碎在不見之處不得與全完為比三命之神近在心間何惜何愛反貪形殘都巿示眾何時生還父母憐念妻子被患踈親快之比鄰恨其晚死流後生能自正為善歷得復長至誠所加物有自然致慎內外陰陽之間四時生成無得毀焉天上地下中和之間皆自有主為有知之人作相之法所抵思生者與天道同願惡者自亡年可不慎哉神人之言皆受天應不得自怨延命之期上及為善竟其天年惡下入黃泉思之思之勿妄傳惡者之人傳得惡被其患死生異處無敢有言行不善自勿怨他人輒有注錄之者無所復怨讀書知意戒慎神書精物鬼使皆有所因有命家得見此文慎無自傷抵欺善人天減人命得疾有病不須求助煩醫苦巫錄籍當斷何所復疑諦之念之思之惟之可無被患患禍一及不復救焉真人持此書以示愚蒙自改為善勿惡書言前後所說皆復重焉所以然者死生易命不語其禁令無從得存自然唯當知真心意好文當知所言故使守一身軀竟其天年守一思過復得延期天道億萬少得其真河圖洛書廢者眾多所以然者不信其文少得仙度便為俗人今故因三神人之師復感動其心者神靈附人不欲令地氣召之致詳念思惟其意勿疑此文重復神人之師被受天教故因有錄籍之人通達書意七十二色死尸誡第一百八十六}
