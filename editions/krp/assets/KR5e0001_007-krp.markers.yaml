  - {type: variant, offset: 7029, length: 0, content: '', ZHWIKI: 各戒此戒尤深徹生過罰輕重皆從人起非但空虛輒有所受天性自然}
  - {type: variant, offset: 7031, length: 0, content: '', ZHWIKI: 欺矣熟念無置行成天神矣變化有時不失綱紀四時之氣不可犯矣輒有精神無復踈矣以為不白天以占之神為之使不妄白上乃得活耳不者罰謫賣菜都巿不得受取面目為醜人所}
  - {type: variant, offset: 7032, length: 0, content: '', ZHWIKI: 賤眾人所鄙過重謫深四十年矣乃得復上為諸神使中者三十下者其十奪其所主各有分理能復易心自責可復長久勿易天言自遺其咎可不熟念為後仙士計慮深淺咎自在己無怨神言出入表裏慎無誤失詳諦所受被天奉使不可自在當輒承命不得留久輒有責問不頃時矣過重使退地記所受姓名如牒不得留止處有空缺下人補矣所以然者中心盡神仙尚退何況愚士自是之後可無}
  - {type: variant, offset: 7033, length: 3, content: 禁忌古, ZHWIKI: 矣天責人過鬼神為使不如天教輒見殃咎不須鞭笞行自得}
