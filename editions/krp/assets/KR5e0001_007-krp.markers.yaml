  - {type: line-break, offset: 4431, content: '', id: KR5e0001_HFL_007-014a10}
  - {type: variant, offset: 4435, length: 0, content: '', ZHWIKI: 傾倒枕席大神言此人自師化迺如是何憂無蒙保者邪往昔有是人天右哀之近在左右今見在視事久遠多知慮所言所語無不得天君腹心者且為之為生伏地泣出而言被勑覺寤迺以先古有心忠誠進在所知無不包懷聞之何敢比望先之人乎大神言持是有信之人相語者欲令相生為行比望耳人有不及時生言大神乃開導大分明生等比眾多獨見異使有開思是恩極重何時教大神乎大神言思從中出發憤念之為報生言自分不知所奉上雖自天有珍奇可好者思復上之見勑發憤想念是為可誠受是言非口辭相報有文也誠日夜惟思不敢有解大神言所誡眾多所諫亦非一人所問持是久遠相語者誠重生耳言特見厚哀尤深天君聞之呼大神曰比生何從發起自致大神異語乎大神言見此學人尤信故為道難易天君言見善進之使及是是其宜也大神言天君召問是信生生言不敢希望及天左側也願在無職之處自力盡忠而已大神言皆當有所部主乃見信理如是誠僥倖甚得大分不敢有小不稱者也大神言是生見化乃如是宜且復進可及先古生言不敢進長壽也其人所貪也大神言是天願生言是本因大神所保不敢失大神之戒也天君知此二人相諫勑尤深善之使自相教也}
