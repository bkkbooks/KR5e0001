  - {type: variant, offset: 12069, length: 0, content: '', ZHWIKI: 也故有德好生之君天使其得作樂無德之君不得作樂也是天之明證也真人知之邪唯唯可㤥哉今日具問天明師乃具知天樂意不問之時謂作樂但小事凡人凡事皆得為之也今日問乃後不敢妄動搖也善哉曉事生可謂知文書理長得天之意矣太平至災氣悉去矣謹復重請問心所疑行平言勿諱也唯唯今天地之氣乃半王半休比若晝夜無有解已樂寧可竟日作之邪獨加王鄉有王氣時可作邪但始作之時以其帝王始耳無以休氣始也歲亦然月亦然日亦然時亦然今愚生未及其意然欲樂歲歲在東方卯以春二月乃樂之欲樂月各加其月日者以王日時者以王時如是則可謂得天之道災氣去矣如不若此皆為亂天之紀生凶災矣是故古者聖王深知天地心意不敢樂凶事凶事見樂則凶事日興多興多不可救故不當樂之}
