  - {type: line-break, offset: 12338, content: '', id: KR5e0001_HFL_007-037b09}
  - {type: variant, offset: 12347, length: 0, content: '', ZHWIKI: 天者而制御地與人故三倍之象天地人也夫天地人見樂興理而萬物各得其所瑞應善物}
  - {type: variant, offset: 12350, length: 3, content: 物俱生, ZHWIKI: 為其具出矣故先樂之也樂之當詳聽一意端坐長思心中悅喜愉愉然也忠信至誠無有惡意比若對帝王而坐不敢邪僻天應其行祅惡災害之屬莫不悉去因天為尊因帝氣為權自然天述法故致太平不難也}
