  - {type: line-break, offset: 8853, content: '', id: KR5e0001_HFL_007-027b02}
  - {type: variant, offset: 8864, length: 9, content: 傷害請問今太平上皇, ZHWIKI: 聞其惡也故自命簿不全耳無可大怪也詳復思之勿懈也天有生籍亦可貪也地有死籍亦甚可惡也生死之間不可比也為知不乎知惡當慎自責不可須臾有亡其年壽甚可惜也與人語言發聲為善行得人心意是天善之無出惡言而自遺咎同出口}
