  - {type: variant, offset: 6100, length: 0, content: '', ZHWIKI: 從上占下何得有失有性之人自無惡意雖有小惡還悔其事過則除解有文書常入之籍惡者付下曹善者白善惡者白惡吉凶之神各各自隨所入惡能自悔轉名在善曹中善為惡復移在惡曹何有解息地上之生人中有胎未生名姓在不死之錄年滿行成生者攝錄令有保者乃上之所以然者其壽難待重之故令保者過并責以是故自不忠孝順無功者皆無保任者但為生先祖績使有祀耳殊為惡不止何有得後生食者乎食糞之人亦安從得與天大神久共事乎糞中之有應天書度者天遣神教之歲月旦滿勑天大倉守神斷有形之物稟天大倉氣食消化令輕化神靈出窈入冥乃上姓名不在簿中何有求生人安從知之人自善無失天心大神動其心使樂為生道俗人自貪之所以然者自行惡無一善時但貪好衣車乘相隨自得不滿之命天地亦不奪其願也惡人亦不得久視天日月星宿也當歸長夜何得久在此人不得自師為善者天知為惡可久前故使食有形之食故藏土下主為地神使不得復生故以書相示令知之耳或有尸解分形骨體以分尸在一身精神為人尸使人見之皆言已死後有知者見其在也此尸解人也久久有歲數次上為白日昇天者使有歲數功多成更生光照助天神周徧復還止雲中所部界皆有尸解仙人主知人鬼者有道之家其去者得封為鬼之尊者名為地靈祇亦得帶紫艾青黃所主有}
