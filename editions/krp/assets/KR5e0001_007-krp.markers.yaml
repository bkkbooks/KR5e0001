  - {type: variant, offset: 13073, length: 0, content: '', ZHWIKI: 其貞者尚天性也氣有不及其不貞者彊為之壅塞陰陽無道種其施於四野或反棄殺窮其妻子而去者是皆大毀失道之人也無可法是大凶一分之人也不可以為人師法安而中天師法乎夫皇天乃是凡事之長人之父母也天下聖賢所取象也何用等失道妄為無世類之子為與共事乎如天但與此子共為治天名為主舍匿惡人興凶術何可以為聖治人上師乎故不舍止之也古者聖人大賢尚知諱不肯與無後世類之人共事與之為治悉不得天心故聖賢天使其皆貴重有後世而共憎惡人無後世也聖人乃深知天意故獨常法象之不失銖分也而況天乎哉今天上久純無善人故使吾下大語以示勑後來使愚者悉自知若天上仕此人天上反當主聚無後世人邪行如此反得上天天上反愛無後世而不好生邪故皆死於不毛地不生之土無人之野令使各歸其類也汝不好生與天反故投汝不生之處汝好無人故投汝無人之野俗人冥冥不覩則言其已度世矣實不也吾不敢欺真人也吾親以天上行而下覩與不覩比若示盲者以日言人欺之反掩其口而笑愚者比若此矣真人慎之天上所惡也上亦然也善哉善哉愚生未嘗見是天上事真真一覺於是子努力為善行吾之文療天地之病解帝王之愁苦子功滿得上天自往覩見之吾言乃大效矣唯唯不敢道留不敢懈忽也子慎之無懈忽審沮懈忽大命絕矣愚生甚畏天威誠受行之善哉善哉得天意矣}
