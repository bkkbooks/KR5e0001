  - {type: variant, offset: 6280, length: 1, content: 奉, ZHWIKI: 順乎當自言被受恩施得榮華不望報天心重愛但自過責少所貰也唯大神原之戒之不及戀慕之不敢自遠常獨念恩不報罪還著身恐不辭解但惻怛而已雖見原省使得自思念所負大神言太上善之人思過自責文辭逢出上聞是其文辭延及也但恐不知所言耳天信尤善尊之可至無極之壽宜當復遙心勿忘天所生大施之分太上之君善之言生自命好生不顧財色見活之人常思與同久何時當妄行不道無心之意不報重恩乎但自惜年生以來不見大分耳唯蒙恩教戒使知分理當言知命不怨天不敢自怨而妨活也心相加當有貪時邪但自恐年命窮盡不見天之大施分部耶唯復勑戒愚矇之生使有知慮為大恩非辭所報也但剋心念常在於內不忘其飢渴求戒見活唯蒙原省大神言我本從諸神自進於天君無有小失助天地有功之諭上籍在天君何時當相忘乎請白生辭令自責有歲數貪慕天化其人在錄籍與不天君言自責之人皆於自然亦神所資善也使主案天文籍之人視之有自責乃白生籍神使勑視文文案籍有此人天君言人有生自行善不犯所禁是人行之所致也大神且復詳須施行有缺上名大神言從太初以來諸神有功得天心意者見進頗有空闕有其人所行當備上姓名天君言所部職多煩計功除過使其更勿違所言大神言此太上人自隨正過負尤少天君言復念之有未稱舉者責保信上之補闕天君言是曹之}
  - {type: variant, offset: 6282, length: 0, content: '', ZHWIKI: 不可不諦也大神言請如辭所言未能百日天}
  - {type: variant, offset: 6283, length: 2, content: 報乎, ZHWIKI: 諸神爭保上之大神白意天君言如是各使可使使往視事遂復見重信者補真大神言請遣使神取召上之先化形容神使往化成精光耀多大神言取白天君言人已化成神上在於門外未入天君言使詣主者曹謁之大神言大神所白唯唯請屬所白如言宜遂觀望其行天君言當如大神所白有知人思慕與大神相見訣第一百八十三}
