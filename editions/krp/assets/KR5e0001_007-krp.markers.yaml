  - {type: variant, offset: 13265, length: 0, content: '', ZHWIKI: 凡三光皆然天上復與地下三光相通三光明於下天上亦然天上明於上地上亦然兩兩相應和以為經於天上大善地上亦然猶天有六甲十二子地上亦然地上有六甲十二子天上亦然故常上下相應不失銖分也真人其慎之吾言雖遠慎無閉藏以示學者傳之必齋戒其慎之案文為法勿得暗誦也唯唯願請問太上中古以來諸相教為道者反多有去家棄親捐妻子反多有乞匄癡狂詳欺食糞飲小便後學者多以相教示皆有師法亦不苟空也善哉子之難問得其惡意天疾之教子問之邪其言何一巧也子何故問此乎怪其久矣無於質問常若悒悒善哉天果使子主問事邪諾開兩耳且為子分別言之夫上天初出真道之時不如此也悉作孝養親續嗣有妻子正形容不癡狂食糞飲小便也皆以其道動作中法上士為帝王之師輔傳類相養無有傷者於此之時比若三皇五帝動以正道務相利不相害傷也故得以正道行不自匿藏三王紊亂五霸將起君臣民更相欺慢故偽作癡狂尚恐見知乞匄食糞飲小便是困窮之行也困窮之辭也夫道亦有衰盛比若此三皇五帝三王五霸矣下古多見霸道乞匄棄其親捐妻子食糞飲小便是道之衰霸道起也故三皇五帝多得道上天或有尸解或有形去三王以壽五霸無得正道者皆戰鬭死於野今下古守此霸道亦皆死於野此之謂也吾不欺真人是亦道之霸與霸王同耳安得上升天哉善哉善哉愚生之心真真已解矣不意道亦有霸也天師解之乃後知之誠誠哉子可謂開矣請問今學者當奈何乎哉然今者天道大周備自今以往與古異欲修中古霸道法真道不得來真人宜戒之慎之欲樂長存修吾文失銖分之間命不全可不守乎道之元皇道已起火光行之霸道絕矣天雖浩大自有分理以示文凡人令共議之宜屬上者屬上宜屬中者屬中宜屬下者屬下宜上下中共之何不覩其誠信比若與天語善哉善哉時氣平矣真人何以知之乎見天親遣天師下言知天氣平矣善哉善哉子得其意願復請問一兩事不敢多言行道之自今以往求道皆當於何哉皆求之於閑室無遠父母而去妻子以漸為之僻漏乃止或內不善而僻漏無可益也反且先死各自考實行不負天人乃可欺天不可欺也勿憂人為非也使各以是自治不敢為道者即惡人也欲欺偽者也以是占之萬不失一也學人若此姦猾絕矣善人與惡人可見矣此名為皇天簡士書上可得度世中可為帝王輔下愚無知固固可為民間謹子真人重知之唯唯願聞僻漏得道去云何然道成去而已如道未成為日守父母保妻子日日以漸清靜為之且自知其意矣賢者共策此言唯唯右天上簡士文興道斷為棄霸續命人自易心姦猾消守親保妻子禁燒山林訣第二百九請問皇天上洞極之師師幸哀愚生不肖乃告語以天上之事誠非小生所敢望也既加得已開其道路使得知天上事願聞}
