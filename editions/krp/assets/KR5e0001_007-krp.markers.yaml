  - {type: variant, offset: 8957, length: 33, content: 怒也隂興必傷陽化今太平氣至乃天與神兵共治故斷刑罰兵杖爭訟令使察察萬, ZHWIKI: 施自盜可意而行不念語後有患苦哉此子不是在}
