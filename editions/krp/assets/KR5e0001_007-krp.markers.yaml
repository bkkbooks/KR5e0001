  - {type: variant, offset: 12641, length: 0, content: '', ZHWIKI: 真人知之乎唯唯善哉善哉是故今天上欲調風雨具生萬物樂得善人故吾見遣下簡索之也以文付真人以與謹民令付上火精道德之君使以示天下人共思吾書言故以付真人慎毋斷絕子且病之加戒慎事唯唯今愚生以為天上乃無極而正獨與此下地為合乎善哉子之難也天雖上行無極亦自有陰陽兩兩為合今地下亦自有合乎然地亦自下行何極亦自有陰陽兩兩為合如是一陰一陽上下無窮傍行無竟大道以是為性天法以是為常皆以一陰一陽為喉衿今此乃太靈自然之術也無極之政周者反始無有窮已也欲為真人分別一二而陳道之真人會不而知之耳故略為子舉其端見其始著其大綱自思出其紀令天下地上賢聖自美之耳子知之耶唯唯願聞其教諾自詳記吾言於吾教子上而息唯唯天咎四人辱道誡第二百八今天上有何大憎惡名為天咎真人學用日久豈亦深知之邪哉今愚生不及何等也願聞之然古今諸為}
