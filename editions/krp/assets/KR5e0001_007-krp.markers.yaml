  - {type: variant, offset: 13832, length: 0, content: '', ZHWIKI: 斷好}
  - {type: variant, offset: 13837, length: 0, content: '', ZHWIKI: 而興樂地上亦然真人幸為善常欲有德於皇天而憐帝王愁苦時氣不和實咎在人好殺傷畋射漁獵共興刑罰常有共逆天地之心意故使久乖亂不調帝王前後得愁苦焉是重過也真人幸欲常有功於天有恩於帝王今天上積疾毒之群神教吾言故今以文付真人歸有德君以示天下人得文各自深省思過失念書言天今良平氣俱至不喜人為嫉賊吾知天上有此言今敢不下道之不言恐為嫉賊害在吾身吾不敢犯也故以事報諸真人慎之真人不言害在子身以示凡人愚人欲犯之害在其身天亦不復過責真人也自今以往天乃興用群神使行考治人天上亦三道集行文書以記過神亦三道行文書以記過故人亦三道行文書以記過故人取象於天天取象於人天地人有其事象神靈亦象其事法而為之故鬼神精氣於人諫亦諫常興天地人同時是故神應天氣而作精物應地氣而起鬼應人治而鬭此三者天地中和之疾使隨神氣而動作應時而往來絕洞而無間往來難知處故今天道傳治與往古殊異以今占古多不中以古占今不復應故古文衰竭難復用用之不比中又有集處真真文故天上言拘校前後三合取中善者以明事以合意然後天上道正王道備邪惡悉去帝王大樂乃無事人自為謹得天意真人知此事重乎唯唯善哉子知其意矣右天上禁火以興生斷刑傷殺止畋射獵不順天時氣為天所惡記見在知赤初受符更始文三者為一家陽火數五訣第二百一十二下愚之生願一請問今天道當具無不有無不包容也天上何覩何故一時悉欲生而急刑罰乎善哉子之難問得其意吾常甚好子之言子之言常發起吾意使吾道興子向不能難問誰復而難問者乎故天道久斷絕閉而不通天甚疾苦之吾久悒悒欲言無可與言者故天道失其分理久矣歲歲至歲至於今天運生聖人使其語無而盡解除其病者故乃使真人自來與吾相覩乃一得為天具語子難常獨深得天意安坐為子悉陳道之吾欲不言畏天威也故得子問者輒欲言無可匿也真人亦知之邪唯唯然子解解矣今天上所以盡悉欲生長而急害傷者天道常有格三氣其初一者好生名為陽二者好成名為和三者好殺名為陰故天主名生之也人者主養成之成者名為殺殺而藏之天地人三共同功其事更相因緣也無陽不生無和不成無陰不殺此三者相須為一家共成萬二千物然天道本末中也今者天道初起以來大周復反來屬人屬陽陽好生而惡殺生者須樂乃而合心為一相生而中有殺氣輒傷不能相生成子欲知其信實比若胞中之子不可有小害輒傷死死不復生輒棄一人為是連傷而不止便絕滅無後世矣一家無統絕去矣故尤大急刑罰殺傷也天道同不常如此耳今者大急復更為真人察察分別之使下古人大覺知天道今不欲殺傷訣意所以更為真人察察言者俗人隨吾但無事習文辭而作巧語也故更為其陳刑天證今}
