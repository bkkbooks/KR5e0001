  - {type: variant, offset: 1666, length: 0, content: '', ZHWIKI: 得其意者立可覩不得其大要意無門戶知能大開通用者大吉可除天地之間人所病苦邪惡之屬不知其大法者神亦不可得妄空致妄得空使也願聞其意使可萬萬世傳而不妄善哉子之問也然欲候得其術自有大法四時五行之氣來入人腹中為人五藏精神其色與天地四時色相應也畫之為人使其三合其王氣色者蓋其外相氣色次之微氣最居其內使其領袖見之先齋戒居閒善靖處思之念之作其人畫像長短自在五人者共居五尺素上為之使其好善男思男女思女其畫像如此矣此者書已眾多非一通也自上下議其文意而為之以文書傳相微明也吾書雖多自有大分書以類相聚從字以相明則畢得其要意唯唯此四時五行精神入為人五藏神出為四時五行神精其近人者名為五德之神與人藏神相似其遠人者名為陽歷字為四時兵馬可以拱邪亦隨四時氣衰盛而行其法為其具畫像人亦三重衣王氣居外相氣次之微氣最居內皆戴冠幘乘馬馬亦隨其五行色具為其先畫像於一面者長二丈五素上踈畫五五二十五騎善為之東方之騎神持矛南方之騎神持戟西方之騎神持弓弩斧北方之騎神持鑲楯刀中央之騎神持劍鼓思之當先睹是內神已當睹是外神也或先見陽神而後見內神覩之為右此者無形象之法也亦須得師口訣示教之上頭壹有關知之者遂相易曰為其易致易成宜遠於人便間處為之易集近人必難成也於其道成曰明大絕反洞者聚之病形不多多則吉少則凶或有不及所治不決解愈當得多少而可哉高得萬中得四五千下得十數百如百數十其何多也噫真人其復故愚邪安坐方為子道其大要意也今承負之後天地大多災害鬼物老精凶殃尸咎非一尚復有風濕疽疥今下古得流災眾多不可勝名也或一人有百病或有數十病假令人人各有可長或有可短或各能去一病如一卜卦工師中知之除一禍祟之病大醫長於藥方者復除一病刺工長刺經脈者復除一病或有復長於炙者復除一病或復有長於劾者復除一病或有長於祀者復除一病或有長於使神自導視鬼復除一病此有七人各除一病這除去七病下古人多病或有一人十數病乃有自言身有百病者悉無不具疾苦也盡諸巧工師各去一病這去七病其餘病自若在不盡除去七工師力已極此餘病不去猶共困人久久得窮焉故多得死不能自度於戹中也人生比竟天年幾何睹病幾何遭戹會衰盛進退天之格法比如四時五行有興衰也八卦乾坤天地之體也尚有休囚廢絕少氣之時何況人乎人者乃象天地四時五行六合八方相隨而壹興壹衰無有解已也故當豫備之救吉凶之源安不忘危存不忘亡理不忘亂則可長久矣是故治邪法道人病不大多假令一人能除一病十人而除十病百人除百病千人除千病萬人除萬病一人之身安得有萬病乎故能悉治決愈之也子知之邪唯唯故教其豫作戒成其道者聚之者唯唯行子知之矣行為真人明陳列之此所治病者鬼物大邪共為盜賊夫帝王安平常備軍師兵者以備人反為無義成姦賊也故一人敢死十人不敢當十人敢死百人不敢當百人敢死千人不敢當千人敢死萬人不敢當萬人敢死四面橫行備其有疾病折傷故軍師乃備萬二千人者以備非常其二千人者但備以補其休逋耳乃能服之也真人知之耶唯唯行子已知之矣不用大言無效訣第一百一十請問一事天師今太平氣垂到邪氣當思息除去也然子言是也又非也然太平氣至邪固當自消去惟天地開闢以來積久邪氣大眾多更相承負太平之治氣雖至也亦安能一旦悉卒除此乎故當豫備之為其作法困窮然后求索良工已大後之矣夫上古之人人人各自知真道又其時少邪氣太上中古以來人多愚好為浮華不為真道又多邪氣狂精殃咎故人多卒窮天年而死亡也悉由用心愚闇蔽不知豫防其本也今當上德君治天愛之不欲使其若此愚人多窮也當使卒其大德與天同心故天使諸真人來問疑使吾為其陳法可以厭禦邪不祥妖惡者故吾為真人具言之今真人反言當自除不備此言非也名為大誤君子之辭也子言不可用也何謂乎然有大急乃后求索之不可卒得也令人窮困矣故真人言大誤不可用也今積穀乃滿倉可以備飢餓也今為真人察察道之使可萬萬世不忘也唯唯今飢乃教人種穀言耘治之待其米成乃可得火炊食亦豈及事邪於此已餓死困矣或不及春時種之至冬飢念食乃欲種穀種之不生此豈能及事活人邪非獨身窮舉家已滅亡矣是真人之一大愚無知冥冥之大效也行復為子說一事今人掘井所以備渴飲也居當近水泉所以備渴也臨渴且死乃掘井索水何及得也已窮矣是真人復問二愚闇復為真人說一事古者有穴居今者作廬宅所以備風雨也及不風雨之時居野極樂矣浮雲已起雨風已至迺作廬宅已雨寒而困窮矣是真人三愚也復為真人說一事夫太中古以來聖人作縣官城郭深池所以備不然其時默平平無他也及有不然小人欲汙亂君子乃後使民作城郭深池亦豈及急邪是真人劇愚暗效也行復為真人說一事今軍師兵不祥之器也君子本不當有也下之惡之故當置於鞘中堅治藏之必不貴有之也不貴用之也但備不然有急乃後使工師擊治石求其中銕燒治之使成水乃後使良工萬鍛之乃成莫耶可以戰鬭禦急者亦豈及事邪已窮服矣死命屬矣是非六真人之大愚不及邪唯唯有過非過也思事當詳卜之胸心乃出之也後勿輕妄語也唯唯為真人道小決事反以明大夫古者聖賢之設作梳與枇以備頭髮亂而有蝨也夫人生而不櫛頭亂不可復理蟣蝨不可復得困乃後求索南山善木及象骨奇物可中櫛者使良工治之髮已亂不可復理頭中之蝨不可勝數共食人頭皆生瘡矣然后得梳與枇已窮矣然後為真人陳小決事以小況大夫河海五湖近水之傍多蚊虻不豫備作可以隱禦之者夫蚊虻俱生而起飛共來食人及牛馬牛馬搖頭踶䠱不能復食人者大愁且死無於止息然后求可以厭禦之者已大窮矣真人寧明知之邪唯唯行子已覺矣夫良方所以能厭禦疥蟲善衣善處所以厭禦蚤蝨不豫備之病之乃求索可以去之者已得大窮愁病之矣子知之邪唯唯是尚最天下小小財備數之物也何言其大巨者乎夫天地之間時時有是暴鬼邪物凶殃尸咎殺客當其來著人時比如刀兵弓弩之矢毒著人身矣所著疾痛不可忍其大暴劇者噓不及噏倚不及立身為暴狂比若閒亭遠帝王之縣吏壅閼斷人辭語不得言變事於此之時乃求索良工長者以自救已窮矣辭已不通無可復得言之矣子知之邪唯唯行子已覺矣故吾尤急此死亡天下大凶事也故吾文倲倲教有德人君豫備之也上賢明見吾書言之必大覺矣中賢見吾文言必小覺下愚不覺反笑吾書不備其本已自窮矣天地帝王無過於是也今行太平氣至陽德君治當得長久凡天下人死亡非小事也壹死終古不得復見天地日月也脈骨成塗土死命重事也人居天地之間人人得壹生不得重生也重生者獨得道人死而復生尸解者耳是者天地所私萬萬未有一人也故凡人壹死不復得生也故當大備之雖太平氣樂歲猶有邪氣比若一家雖善中猶有惡人但相忍耳是故益聚道術士者為有不然輒當除之不疾除之則生之矣故教其豫多其人也夫大學所以益積道德之人者備求可得也如不豫蓄聚求不可卒得也如有變事欲問古今比列不豫有大渘道德之人無能卒對解者令人君闇蔽卒有疑事問之不以時決解愁乃後往求索遠方賢明渘術何及於倲倲當前乎哉真人知之邪唯唯行子已大覺矣雖每發言有過責不問又會不知之願決一事言之今是或高則萬人中則數千下則數百何可卒得卒成乎善哉子之問事也但教十數人以善成之且自轉相易有急效之有成功者令使上德道君重之愛之於其有功者賜之眾人且願之於其願之而大從使其為之於其得者共尊敬愛之此四時五行天地之神精見尊重愛莫不說喜使人吉利德君長蒙其吉福眾賢渘下及愚人莫不爭欲為之也即為者日益多以久久大小盡化能人人為之乃選取其中第一大功者悉聚之大有功者署其位小有功者賞賜之天下人莫不欲為之但恐大多不可勝記何患憂少哉真人何其大愚暗且蒙也一事大決毋取用但好大言者也是人無益於人也但效式之常有成功者即其人得道意大信人也知但數言而無大效者即是其不得道意而妄語大佞人也不可用也亂道者也真人知之耶唯唯行去慎之戒之誦讀吾書惟思其上下意以類相從更以相證明以相足也迺且大解知吾道所指趣也唯唯五神所持訣第一百一十一願請問一大決東方之神何故持矛乎然可毋問也真人必自知之所以問者天師幸哀後生為作法不問則令後世不得知天道之意決然此者天之象也物者各從其類東方者物始牙出頭盡生利刺土而出其精象矛故為矛其神吏來以此為節南方萬物垂枝布葉若戟故其精神而持戟其神吏來以此為節西方為弓弩斧西方者天弩殺象夫弓弩斧亦最傷害之長也故其神來以此為節北方為鑲楯刀北方者物伏藏逃鑲楯所以逃身者也刀者小人所服亦常以避逃以害人非上君子之有也故其神來亦以此為節中央者為雷為鼓為劍中央者土也五行之主也鼓亦五兵之長也劍亦君子道德人所服也亦五兵之長也故中央神來以此為節是天地自然實信之符節也比若人生當有頭應此持其節實信符傳來對不若此即非其行神也應他神妄來對悉為亂政久久其治亂難平安故皆求信符節也真人知之耶唯唯是說乃淺而深雖不足道者反乃當與天地四時五行氣相應和善哉善哉行真人知之矣右厭邪人盡變成道以救死命訣闕題}
