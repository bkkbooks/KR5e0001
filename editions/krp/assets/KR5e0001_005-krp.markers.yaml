  - {type: variant, offset: 867, length: 1, content: 有, ZHWIKI: 居}
  - {type: variant, offset: 872, length: 0, content: '', ZHWIKI: 十}
  - {type: variant, offset: 873, length: 0, content: '', ZHWIKI: 而行也子知之耶唯唯天地之道四時五行其道以相足}
  - {type: variant, offset: 874, length: 0, content: '', ZHWIKI: 而異辭周流幽冥無有極時獨古者大神聖人時時知之耳欲盡為子說之難為財用又復太文反令益憒憒使土德之君見眩亂不知所從故止也不惜為諸子說也而說無窮極真人知之耶唯唯行子少覺矣德君據吾天讖以治萬不失一也是故天道迺有固界也以東與南為君王象屬天故名為天子也以西與北為後宮民臣象也屬地故地為后宮也真人知之耶唯唯天之格讖東方者畏西方是故天地開闢以來王者從兵法興金氣武部則致君之象無氣火者大衰其治凶亂真人欲樂知天讖之審實也從上古中古到于下古人君棄道德興用金氣兵法其治悉凶多盜賊不祥也是故上古聖人深知天固法象故不敢從兵革武部以治也帝王欲樂長安而吉者宜按此天讖急囚斷金兵武備而急興用道與至德以象天法以稱皇天之心以長厭絕諸姦猾不祥之屬也立應不疑也真人知之耶唯唯天之讖格法太陽雖為君者反大畏太陰水之行也水之甘良者酒}
  - {type: 'kr:newline', offset: 875, content: '

      ', id: KR5e0001_krp_005-bkkkrnewl58}
  - {type: line-break, offset: 875, content: '', id: KR5e0001_HFL_005-003b03}
  - {type: variant, offset: 880, length: 0, content: '', ZHWIKI: 也長也漿飲之最善者也氣屬坎位在夜主偷盜賊故從酒名為好縱水之王長也}
  - {type: variant, offset: 882, length: 0, content: '', ZHWIKI: 則衰太陽真人欲樂知天讖之審實也從太古以降中古以來人君好縱酒者皆不能太平其治反亂其官職多戰鬭而致盜賊是明效也是故太平德君方治火精}
  - {type: variant, offset: 883, length: 5, content: 尅火火者君, ZHWIKI: 明不宜從太陰令使水}
  - {type: variant, offset: 889, length: 0, content: '', ZHWIKI: 王以厭害其治}
  - {type: variant, offset: 890, length: 1, content: 急, ZHWIKI: 故當}
  - {type: 'kr:newline', offset: 892, content: '

      ', id: KR5e0001_krp_005-bkkkrnewl59}
  - {type: line-break, offset: 892, content: '', id: KR5e0001_HFL_005-003b04}
  - {type: variant, offset: 893, length: 0, content: '', ZHWIKI: 也願聞覩斷之耶斷何所酒哉但斷巿酒耳今天師何覩何見而獨斷絕巿酒耶然夫巿者迺應水之行也故四方人民凡物悉流而往聚處是故江海亦水之王長也故凡百川財物亦流往聚處也夫水者北方玄武之行也故貪數刦奪人財物夫巿亦五方流聚而相賈利致盜賊狡猾之屬皆起於巿}
  - {type: variant, offset: 894, length: 1, content: 全, ZHWIKI: 水主坎天之法以類遙相應故巿迺為水行縱其酒大與之復名為水王巿人亦得酒而喜王名為二水重王其咎六厭衰太陽之}
  - {type: variant, offset: 896, length: 0, content: '', ZHWIKI: 氣使君治衰反致訞臣真人知之耶今見天師訣之眩亂不曉願聞其大訣善哉子之言也然諸真人乃遠為天來問事為}
  - {type: variant, offset: 897, length: 0, content: '', ZHWIKI: 君帝王解承負之害吾無所惜也俱安坐為諸真人分別悉說道其大要意唯唯天之讖訣金玉興用事人大興武部者木絕元氣土得王大起土者是太皇后之宮也氣屬西北方太陰得大王則生訞臣作後宮失路騰而起土王則金相復相隨騰而起巳與辛之氣俱得興王騰而大起天之格法則生後宮多訞此非後宮之過也此迺名為治失天讖失其大部界反使災還反相覆也是迺天地開闢以來先師天時運未及得分別具說天之大部界也令帝王便失天之法治令生此災變真人深知之耶唯唯天之讖也縱酒者水之類也市者水行大聚人王處也而縱酒於巿名為水酒大王水王則火少氣火少氣則化成灰化成灰則變成土便名為火付氣於土也土得王起地與金水屬西北太陰屬於民臣反得王後生訞臣巳氣復得作後宮犯事復動而起其災致偷盜賊無解時各在縱水令傷陽德今所以為真人分別說之者見子來問事大惓惓承知為皇天欲祐德君故吾為真人分明天地大分治所當象之勿復犯也犯者復憒憒致亂矣子知之耶唯唯願問一疑行言今京師同聚人眾財貨中類京師反應水行耶噫諸真人學何一時昭昭時時闇昧哉不及然安可盡及耶然夫京師者迺應土之中火之可安止處也非若巿但可聚財處也夫京師迺當并聚道與德仁與賢渘共治理天下何故迺言京師人君但當聚財貨乎子其大愚哉子以吾言不信為子道之古者京師到今諸聚道德賢渘者天下悉安其理但聚珍寶財貨而無賢明者悉亂於真人意京師寧可若巿但可聚財處非乎寧解耶唯唯為諸真人重明天讖格法日者生於少陽盛於太陽月者生於少陰盛於太陰日者天之精也陽之明也故曰為君位在南方月者地之精也陰之明也故月為臣位在北方南方為晝北方為夜是故日得王用事則月與夜衰短月得王用事則日與晝衰短故北方氣王則南方氣衰南方氣王則北方氣衰也故當急止酒王以斷衰水金也真人重明知之耶唯唯天之格分也陽者為天為男為君為父為長為師陰者為地為女為臣為子為民為母故東南者為陽西北者為陰真人欲知天讖審實從天地開闢以來諸縱令兵武備使王縱酒使王從女政大從其言使其王少陰太陰與地屬西北從是令者後皆亂而有凶害仁渘道德賢明聖人悉屬東南屬於陽屬於天從是言者後悉理願聞夫賢聖何以屬東南方也火之精為心心為聖木之精為仁故象在東也東南者養長諸物賢聖柔明亦養諸物不傷之也故夫聖賢柔明為性悉仁而明仁者象木明者象火故悉在東南也善哉善哉見天師之言已大解矣又天讖格法東南為天斗綱斗所指向推四時皆王受命西北屬地為斗魁所繫者死絕氣故少陰太陰土使得王勝其陽者名為反天地故多致亂也真人知之耶唯唯愚生數人緣天師哀之為其說天讖訣願問事一言之今南方為陽易反得巽離坤北方為陰易反得乾坎艮善乎子之難也覩天微意然易者迺本天地陰陽微氣以元氣為初故南方極陽生陰故記其陰北方極陰生陽故記其陽微氣者未能王持事也故易初九子為潛龍勿用未可以王持事也故勿用也此者但以元氣之端首耳善哉善哉行真人已解矣今吾所記天讖乃記天大部能王持天政氣為天下綱紀者也真人知之耶唯唯今吾所言正天下人君所當按之以為治法也子之所問正氣之端首也今真人見吾言或疑也為諸真人具說天地八界唯唯日之界者以日出於卯入於酉以南為陽北為陰天門地戶界者以巽初生東南角乾初生西北角以東北為陽以西南為陰子初九午初六以東為陽西為陰立春於東北角立秋於西北角以東南為陽西北為陰此名為天地八界分別陰陽位真人寧解耶唯唯行已解矣是故大部以東南為天西北為地地得順從令王得伏其天者為天地反故凶天得行其事王者得伏其地為順各得其所故吉真人得書思之思之以付歸上德之君思吾文行之與神無異天即祐助之不宜時也行為子說天讖證為小竟欲為真人大說天上地下絕洞八極及星宿羅列悉一二說周流天道微妙或人反眩不知所之後令真道絕不用無以解古流災復令上愁焉故但為子說大部易知者使其覺而已故不言微妙難知者也不惜之也唯唯願請問一訣事言之今且天師為愚生說天之十干皆有配合地道十二支同有陰陽奇偶何故獨得天配合乎善哉子之難也可謂為得道要乎然地者但比於天為純陰獨居同自有陰陽耳天與地法上下相應天有子地亦有子天有午地亦有午天有坎地亦有坎天有離地亦有離其相應若此矣是故丑未者寅之後宮也申者屬卯侯王之壻也亥者配辰卯者配戌辰戌者太皇后之家婦也酉者屬午小皇后也子屬巳巳帝王女弟之壻也真人知耶唯唯是故干為帝王支亦為帝王是故寅者甲之支也故丑未稱后宮午者丙之支也故酉稱后宮卯者乙之支也故申稱侯王之壻也辰者戊之支也故稱太皇后之家也亥者癸之支也故稱太皇后之家婦也子者壬之支也故稱帝王女弟之壻也巳者丁之支也故稱帝王女弟也此天地相應和之法也善哉善哉願聞此辰戌君未獨男則共聚女則共嫁何也微妙哉子之難也然天者極陽地者極陰也地眾凡陰之長也陰者常偶數故并也今戊巳同地也何故不并善乎夫戊巳者五干也地之陽也位屬天故不并也真人知之耶唯唯行子知之矣今真人難是也今五行字迺轉而相足以具天下凡事子得吾書自以類惟思其惡意上下六方絕洞皆已備是故聖人見一以知萬大賢見一以知千愚者力示會獨亂不得道真也故道德者付真人真人知之耶唯唯行知之矣願復請問一事令此上天之四時地之五行悉道帝皇侯王后宮之家天道盡往配之中亦豈有百姓萬物相配乎善哉子之問也可謂覩大道要矣然此相配者同耳夫五行者上頭皆帝王其次相其次微氣王者帝王之位也相者大臣之位微氣者小吏之位也王者之後老氣者王侯之位也老氣之後衰氣者宗室之位也衰氣之後病氣者宗室犯事失後之象也病氣之後囚氣者百姓萬民之象也囚氣之後死氣者奴婢之象也死氣之後亡氣者死者丘冢也故夫天垂象四時五行周流各一興一衰人民萬物皆隨象天之法亦一興一衰也是故萬民百姓皆百王之後也興則為人君衰則為民也真人知之耶唯唯子已知之矣右以天讖長安國家以治訞臣絕姦偽猾滅學者得失訣第一百六真人謹問吾復欲都合正所寫師前後諸文使學者不得妄言豈可聞乎善哉子何一日益閑習也然}
