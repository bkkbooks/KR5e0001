front:
  text: 太平經鈔己部卷之六外六今天下所畏口閉爲不敢妄譚今日月星曆親天之列宿神也尚相畏是故日出星輒逃匿不敢見畏其威也夫四境之内有嚴帝王天驚㤥雖京師大遠畏詔書不敢語也一州界有强長吏一州不敢語也一郡有强長吏一郡不敢語一縣有剛强長吏一縣不敢語一閭亭有亭長剛强乃一亭部爲不敢語此亭長吏之小者況其大者乎皆恐見害各取解免而已雖有善心意不敢自達於上使道斷絶一家尚親自共血脉同種類而生乃相畏如此況異世乎自中古以來失道德反多以威武相治威相迫脅有不聽者後會大得其害傷深流子孫下古尤甚小有欲上書言事自達帝王比近探其命者輒殺之不即時害傷更相囑託而傷害之故臣民悉結舌杜口爲喑雖見愁冤不得上達故令帝王聦明絶也天變日多是明證效也今民親得生於父母受命於天地以天地爲父母見灾變善惡是天地之譚語欲有所言也且尚皆畏見害乃相教勑共背皇天后土欲言共蔽冤天地乃使辭語不通天地長懷悒悒而不達今帝王雖神人之源乃據百重之内萬里之外百重之内人欲往通言迫脅比進不得往達也夫不得通天地大怒賊殺凡物乃毁天地大凶之歲斷無聦明乃爲大危之國此罪不可復名故當絶滅矣夫大災異變怪者是天地大譚也中灾異變者是天地中譚也小灾異變者天地小譚也比人事大事大言小事小言不空見也而欺人也夫見大瑞應天地大喜悅中瑞應中喜悅小瑞應小喜悅夫無灾無瑞爲平也是故天將興祐帝王皆令自有意從古到今將興祐之輒爲出竒文異策可按以理故爲者悉大吉將不祐之也悉斷竒文異策使不得見或得之又使愚不知策而用之也將興行也使心曠然開通而受用之此天祐法也不欺人也凡人將興者多好善將衰者多好惡也將吉者易開導將凶者好抵冒人也天者常祐善人道者思歸有德天不肯祐惡人道不肯付愚人也天符還精以丹書書以入腹當見腹中之文大吉百邪去矣五官五王爲道初爲神祖審能閉之閉門户外闇内明何不洞覩守之積久天醫自下百病悉除因得老壽愚者捐去賢者以爲重寳此可謂長存之道獨貴自然形神相守此兩者同相抱其有竒思反爲咎子失自然不可壽也嬰兒五精還自保也天君問天下何故難安哉五行神吏上對曰今帝王乃居百重之内去四境萬萬餘里遠者多冤結善惡不得上逹竒方異策斷絶不得到帝王前民臣冤結不得自訟通也爲此積久四方蔽塞賢良因而伏藏帝王不得竒策異辭以安天下咎在四面八方遠界閉不通也人居天地之間開闢已來人人各一生不得再生也自有名字爲人人者廼中和凡物之長也尊且貴與天地相似今一死廼終古窮天畢地不得復見自名爲人不復起行也故悲之大冤之天地格法天地爲萬物父母恐其中有自冤哭淚仰呼天俯叩地而自悲冤得少年故天爲生真道竒方可以自防而得小壽者物生皆有老終而愚人不肯力學真道善方可以永享其年不死遲老者反各自輕忽不求竒方而共笑賤真道反共作邪僞以亂天道共欺其上爭致死地名爲冢修之治以待死預作死約及凶服求死得死有何冤哉年竟算盡此比若日出自有入也古者聖人帝王時時有大自重愛而畏死者旦夕思行求異聞殊方敬事道人力盡財空而已至誠涕出感動皇天乃爲出瑞應道術之士悉佐之故多得老壽或得度世今天地乃以人爲子帝王乃最天貴子也不惜真道竒方焉故深計遠慮知天下之財物會非久其有也古者聖人聦明大達衆賢悉出上集爲輔故冤結天地亦有其理況人倫乎帝王得以垂拱無憂賢者亦得盡忠信上輔其君爲理共解天地大憂萬民因而興豈不善哉大集難問天地毁起日月星蝕人烈死萬二千國策符子開神文三光何故得蝕也天地之大怒天地戰鬥不和其驗見效於日月星曆然亦蝕亦不可蝕咎在隂陽氣戰鬥隂陽相姧迭爭勝服夫隂與陽本合相利祐共生和氣而反戰鬥悉過在此不和調如使和調不蝕也上古最善之時常在不蝕中古漸失天地之意隂陽稍稍不相愛故致戰子以吾言不然也使有德之君按行吾文盡得其意戰鬥且止小得其意小止半得其意半止帝王多行道德日月爲之不蝕星曆不亂比之人先有相厚久不相覩相覩當大喜必能相祐利及先不相與比卒相逢便戰鬥矣請問旱而盡死民困飢寒烈而死此者太陽皇天之殺也六陽具恨因爲害也何謂也六方相極其中大綱俱人久爲亂惡之故殺也其害於人何哉無有名字但逢其承負之極大怒發不道人善與惡也遭逢者即大凶也比若人大忿怒乃忿甲善人不避之乃賊害乙乙何過也而逢人怒發如此矣故承負之責最極故使人死惡不復分别也大咎在於此矣請問萬二千國之策各異意比當於何置之各隨其國俗宜以何爲始以斗極東南火氣起願聞其意訣何也火者陽也其符令主天心和者主施開者主通明者主理火者爲心王神和者爲化首萬事將興從心起心者主正事倚仁而明復有神光萬二千國殊策一通爲文書上章元氣且自隨而流行真人自屬興之吉逆之喪天乃樂出書故使吾言古者火行同當太平而不正神道令天師獨使令火行正神道何也令乃火氣最盛上皇氣至火氣盛者必正神道何也夫火者乃天之心也心主神心主神當今明天氣不調帝王爲之愁苦而人不得知其要子欲知此苦人耳令邪人多居位則亂帝王之治令使正人不得處天地爲邪氣失正夫邪氣多則共害正正多則共禁邪此二者天地自然之術請問洞極上平氣主治故天師乃考疽疥蟲食人獨此驗之所謂蟲食人其爲灾最其劇逆亂正也今皇平氣至不宜有此應付有德之君欲知道洞洽未令民間悉移蟲主名大小爲害疽疥從腹中三蟲之屬皆移主名此蟲無不有名少耳蟲逃於内而竊食人象無功之臣逃於内蠶食人矣深可畏之不畏之則至於大害矣天受人命自有格法天地所私者三十歲比若天地日月相推有餘閏也故爲私命過此者應爲仙人天命上壽百二十爲度地壽百歲爲度人壽八十歲爲度霸壽以六十歲爲度仵壽五十歲爲度過此已下死生無復數者悉被承負之灾責也故誠冤乎此人生各得天算有常法今多不能盡其算者天算積無訾故人有善得增算皆此餘算增之欲知大效比若一里有十户户有千畝田其九户爲惡盡死滅獨一户爲善并得九户田業此之謂也不望隂陽祐人今人或不得其數而望得天報者會不得天報也今日食人而後日住食之不名爲食人名爲寄糧今日飲人而後日往飲之不名爲飲人名爲寄漿今日代人負重後日往寄重焉不名代人持重乃名寄裝今日授人力後日往報之不名爲助人名爲交功今人譽舉人後日見譽舉不名爲譽舉人也乃名爲更迭相稱如此比類者衆多不可勝記如此者皆無天報也然人不祐吾吾獨隂祐之天報此人言我爲惡我獨爲善天報此人人不加功於我我獨樂加功焉天報此人人不食飲我我獨樂食飲之天報此人人盡習教爲虚僞行以相欺殆我獨教人爲善至誠信天報此人人盡言天地無知我獨隂畏承事之天報此人人盡隂欲欺其君上我獨隂祐利之不敢欺天報此人父母不愛我我獨愛祐之天報此人如是比類者衆多不可勝記真人自計之上士求天報中士求人報下愚不施反求報上善之人得天報者度也中善之人得人報故愛利之而仕之下愚無功而强報故天地人共惡而誅之故上皇皇天之氣悉下生后土之氣悉上養五行之氣悉并力四時之氣悉和合三光更明天下同心爲一天性爲行最尊之重之愛之祐之天性旣善悉生萬物無不置也地性善養萬物而無不置也聖人悉樂理天地而萬物受其功大善神真仙人助天地行不敢自苦也悉與元氣同與天心相得故獨長吉而無凶也古者聖人賢人深思遠慮乃知天道意但專隂行善不敢爲惡也深覩皇天明禁下乃背而加之學問淺劣復不信天禁故難移矣失而早亡矣願聞天壽百二十歲地壽百歲人壽八十歲霸壽六十歲仵壽五十歲三正起於東方天之首端也歲月極於東北天極也夫天壽者數之剛也東北物之始也一年大數終於此故百二十爲象天也地者隂也常受施西北爲極隂也隂者殺而陽生故亥者核也隂終西北角也西北爲地之司命故地壽得百歲八十六十者陽止隂起方立秋秋者白氣白虎持事故霸命也五十者陽氣興長於上隂氣伏起於下隂仵陽化故爲仵命過此而下悉曰無常命誠冤結哉今且曉子一解可以終古自養而極者不可忘也人欲去凶而遠害得長壽者本當保知自愛自好自親以此自養乃可無凶害也身得長保飲食以時調之不多不少是其自愛自養也而撞門户閉之居内不與俗事是自愛自養也而讀書無極安貧樂賤無憂而已是其自愛自養也已前皆如是而非也夫自愛爲言者誠誠自愛保自念身無足㝠目亦還自視無足未常須臾離之因思而憂之乃至不食而飽是爲自愛之人也自好爲言者乃好念身形形容上下累累可覩誠好愛不止面目生光明也晝夜不能忘以爲經常因得肉飛而可强是爲自好愛之道也今故使男女大小老少賢不肖共集上書爲帝王通達聦明帝王比若中極星默常居其處而衆星共往奏事也大者居前中者居中小者居後一星不得輒有絶氣天行爲傷夫星者乃人民凡物之精光故一人不得通於帝王一星亦不得通也故天氣輒爲乖錯地氣爲其逆也故教其吏民大小俱共上書以通天氣以安星曆以除天病以解帝王承負之責故示勑使三道行書者恐有不通故各自其使宜長吏者記城郭之灾變布道者記市道之灾變四野者記四野之灾變各相取長短傳以相語共爭上之長吏亦務上書邑民亦務上書行人亦務上書長吏欲不上恐民上之民人不上恐行人上之行人不上恐長吏上之故使民俱坐乃後且爭上事也吏民有信者帝王仕之不負焉故吏民樂爲也帝王得以爲聦明而稱王心而長安其身吏民得以尊天地得以無病天地四方俱有利故長吉爲萬萬世法也以付上德之君使民知天意令以自安自全無爲迷惑大集具正事考本天地之根以除天恐地咎國之害立洞極經又請問天師之書乃拘校天地開闢已來前後賢聖文河洛圖書神文下及凡民之辭語下及奴婢遠及夷狄皆受竒辭殊策合爲一語以明天道普不大煩乎哉爲其遠煩而不通故各就求善太平之宅於其所屬邑鄉主備其遠不能自致故爲其立宅道上使投異辭善策竒方於其中因取事持往獻有德之君令群賢共定按之以類相求取上第一善者去其邪辭以爲洞極之經名爲天洞極政事乃令天地之病且悉除去也帝王之理且一大安也承負萬世之灾厄會且却去也然後萬物群神且化萬一可言而不復上白人惡於天上也故勑使拘校之者乃天使吾下言也雖煩安得不力爲之乎天下文書及人各言一歲言十數而天下疑事悉自解亦無大煩也但各居其處而言之傳持獻上是爲天下集言而共語以通達天地之意以通天地之氣以除帝王灾害以利凡民及萬物莫不各得處其所者乃後天地一且大悅喜病一除喜則祐帝王也令無事長遊也願聞天地何故一時使天下人共集辭策及古今神聖之文以爲洞極經平然天地有劇病常疾亂未常得善理也故教示人集議而共集出正語竒策以除病也故使其大共集言事也願聞天地亂而有病何不更生善聖人乎力復生後聖人乃無益何也天師言行古聖人有優劣各長於一事俱爲天譚地語而作殊異是故衆聖前後出者所爲各異也俱樂得天心地意去惡致善而辭不盡同大類相似故衆聖不能悉知天地意故天地常有劇病而悉不除故遣吾語以告真人所告真人者天上諸神言天下有樂善欲稱天心獨有真久耳行所以拘校上古神文中古神文下古神文者或上古神文未及言之中古神文言之中古神文未及言之下古神文言之因以類相從相補共成一善辭故使集之然後天地意可觀矣行上古聖人失之中古聖人得之中古聖人失之下古聖人得之下古聖人失之上古聖人得之以類相從因以相補共成一善聖辭矣上聖或有短失之中聖得之中聖失之小聖得之因復以類相從因而相補共成一善聖辭矣大賢以短失之中賢得之中賢失之小賢得之以類相從共成一善賢辭矣帝王失之臣子得之臣子失之庶子得之以類相從因以相補共成一善辭矣上老失之丁壯得之丁壯失之少者得之以類相補共成一善辭矣男子失之女子得之女子失之奴婢夷狄得之以類相從因以相補共成一善辭矣上古文失之中古文得之中古文失之下古文得之以類相從因以相補共成一善辭矣行或上古人失之中古人得之中古人失之下古人得之以類相從以類相補共成一善辭矣行或上失之而下得之或下失之而上得之或上下失之中得之或中失之上下得之或天神文失之反聖人得之或聖人失之反賢人得之賢者又失之而庶民反得之庶民又失之反夷狄得之或内失之反外得之外失之反内得之會有得之者會有失之者故上下外内尊卑遠近俱取其文要語而集真長短以類相從因以相補則且矣然後文書辭言通具也天地生出凡事人民聖賢蚑行萬物之屬各有短長各有不及各有所失故所爲各異大率俱欲得天地之心而自安也故今天遣吾下爲上德君更考文教吾都集合之神文聖賢辭下及庶人奴婢夷狄以類相從合其辭語善者以爲洞經名爲皇天洞極政事之文也然後天地病一悉除去也請問合衆類以相從然善正其言則吉不善正其言則凶然後太平上皇之氣立來矣夫人有病皆願速較爲善天地之病亦願速較爲善矣夫邪文亂道經書道經亂則天文地理亂矣天文地理亂則天地病矣故使三光風雨四時五行戰鬥無常歲爲其凶帝王爲愁苦縣官亂理民愁苦飢寒此爲邪文所病矣夫邪文邪言誤辭以理國也日日得亂於是臣爲枉法而妄爲民爲之困窮共汙天地之理亂天官大怒哭泣呼冤不絶矣邪言邪文誤辭以理家也則父子夫婦亂更相憎惡而常鬥辯不絶遂爲凶家矣夫正言正文正辭乃是正天地之根而安家國寳器父母也而天下凡人萬物所受命也故當力正之也故吾之爲道悉守本戒中而棄末天守本故吾守本也天戒中故吾戒中也天棄末故吾棄末也吾之爲文也乃與天地同身同心同意同方同理同好同惡同道同路故令德君按用之無一誤也萬萬歲不可去但有日彰明無有㝠㝠時但有日理無有亂時但有日善無有惡時也故號天之洞極正道乃與天地心相抱故得其上訣者可老壽得中訣者爲國輔得下訣者可常自安請問陽何從獨得尊而貴隂獨名卑而賤哉神人言陽所以獨名尊而貴者守本常盈滿而有實也隂所以獨名卑而且賤者以其虚空而無實也故見惡見賤也夫隂陽男女者本元氣之所始起隂陽之門户也人所受命生處是其本也故男受命者盈滿而有餘其下左右尚有一實上者盈滿而有餘常施下隂而積聚有餘上施者太陽行也無不生無不能成下有積聚者太隂應地而有文理應阡陌左實者應人右實者應萬物實核實也則仁好施故陽得稱尊而貴也女所以卑賤其受命處空而虚無盈餘又無實故卑也故天道重本守始故當反本守元正守考文以解迷惑也故能使天長地久安國寧民而陽實好施故也陽天也君也隂地也臣也故敬陽之施因而養之請問神人天下凡有幾國然中部八十一域次其外復一周天下有萬國遠出列洞虚無表并合三部爲萬二千國皆禀受太平之教今太平一歲人爲喜樂順善二歲地上爲大樂三歲恩澤究洽於天下四歲風氣順行五歲行神不戰妖惡伏滅六歲而究著六紀七歲乃三光更明八歲而恩究達八方九歲隂陽俱悅十歲萬物悉各其所爲數小終物因而三合之乃天地人備故三十歲而太平今上皇氣出真道至以理十年小太平也如力行真道二十歲而中太平者乃謂帝王已下乃臣民大小按行真道其却邪僞也神人語真人言古始學道之時神遊守柔以自全積德不止道致仙乘雲駕龍行天門隨天轉易若循環真人專一老壽命與天連陽道積專日有單至信所致無爭榮名而居高官孝順事師道自來焉神乃知善人與語言夫師開曚爲道之端君父及師天下命門能敬事此三人道乃大陳不事此三人室閉無門福德皆逃禍亂爲憐詳惟其事無失書言父母生之師教其交居親仕之可不愼焉天下至士去官就仙仙無窮時命與天連長吏治民仙吏天官與俗何事其事異焉長吏治民仙萬神天下之事各自有君努力思善身可完全以是遂去不負祖先吾圖書已盡無復可陳致勉學詳請其文神人將去故戒真人愼之愼之亦無妄傳不得其人愼無出焉藏之深淵幽㝠之間道不飲血無語要文外内已悉無可復言
