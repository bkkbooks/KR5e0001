body:
  text: 於此畫神人羽服乘九龍輦升天鸞鶴小真陪從彩雲擁前如告别其人意西壁圖上古神人真人戒後學者爲惡圖象無爲隂賊不好順事反好爲嫉妬令人死凶天道不可强劫劫之必致兵喪威之死滅世亡盜神書必敗欲以爲利反以爲害此即響應天地之性也乃致自然之際會審樂以長存愼之愼之無好爲害善者自然惡者自敗觀此二象思其利害凡天下之事各從其類毛髮之間無有過差但人不自精自以不知罪名一著不可奈何不守其本身死有餘過乃爲惡於内精氣相召於外故前有害獄後有惡鬼皆來趣鬥欲悔之不得因以忘身故畫像以示後來賢明得之以爲大戒愚者不信道自若忽事審而言不失銖分故守柔者長壽好鬥者令人不存物事各從其類不復得還悔之無益鬼以著焉見戒覺以時自還今上未傷固可得爲善人善者乃上行惡者乃下降天道無私乃有自然不失開達無閉絶以稱天心地意轉天地之灾變暢天地之譚使人民各居其處萬物不傷故天出文書令使可遥行萬萬里得通其言以暢善人以知惡人以解冤結故帝王乃居百重之内得長自安聦明達遠方也由太上中古已來多背叛天地共欺其上故灾害日興死者不以數也帝王久愁不能拘制其下爲奸僞故天置三道文出也通其氣樂知得失上下和合諫及四遠卑賤令無冤結以稱皇天心樂灾除去勿令天怒下古人心邪蔽不若太上古之三皇人心質朴心意專一各樂稱天心而忠信不欺其上故可無文也下古小人愚蔽嬌妄文辭欺天地罔冒帝王故天地常忿怒而灾禍之天地病除帝王安且壽民安其所萬物得天年無有怨恨隂陽順行群神大樂且喜悅故爲要道也夫子不孝不能盡力養其親弟子不順則不能盡力順明師之道臣不忠則不能盡力共敬事其君爲此三行而不善罪名不可除也天憎之鬼神害之人共惡之死尚有餘責於地下名三行不順善之子也常以月盡明旦見對於天主正理隂陽尊卑之神吏魂魄爲之愁苦至滅乃已天以十五日爲一小界故月至十五日而折小還以一月爲中部以一歲爲大部天地之間諸神精當共助天生長養萬二千物故諸神精悉皆得禄食也比若群臣賢者共助帝王長養凡民萬物皆得禄食也故天爲法常諸神以月十五日而小上對一月而中上對一歲而大對故有大功者賜遷舉之其無功者退去之或擊治此亂治者專邪惡之神也人半爲子孝爲臣忠爲弟子順不離其身然後死魂魄神精不見對也其二部界者讀吾道書文合於古今於類相從都得其要意上賢明翕然喜之不能禁止爲善也乃至於敢入茅室堅守之不失必得度世而去志與神靈大合洞不得復譽於俗事也其善乃洞究洽於天地其神乃助天地復還助帝王化惡恩及草木小微莫不被蒙其德化者是故古者賢明得師能助帝王致太平者皆得此人也中賢力共讀吾文書合於古今道文書以類相從力讀而止其賢才者乃可上爲帝王良輔善吏助德君化惡恩下及小微草木隂陽和合無復有戰鬥者帝王長優游而無事群臣下俱相示教力爲之莫不順善而忠信無刑罰而理不善不可勝矣其民共讀吾書道文上下通都合計同筴爲一無復知爲凶惡者也拘校古今道文以類相從相因以爲世學父子相傳無窮己也如三賢中賢下及民俱爲之占天地惡氣畢去矣無復承負之厄會也善乃合隂陽天氣和地瑞應畢出游於帝王之都是皇天后土洽悅喜之證也故讀吾文者宜精詳之其三部界者夫人得道者必見神能使之其上賢明者治十中十可爲帝王使辟邪去惡之臣也或久久乃能入室而度世不復譽於俗事故守一然後具知善惡過失處然後能守道入室精思然後能守神故第三也賢者拘校古今神書以相證明也中賢守一入道之且自覩神治十中九可爲王侯大臣共辟去邪惡久久冀及入室矣其小賢守一入道讀書亦或覩神可治十中八可爲民共辟邪除惡也亦皆拘校古今道文以自相證明乃愚者悉解信道也大賢中賢下民俱守神道而爲之則天地四時之神悉與邪自消亡此則天下地上四方六屬六親之神悉悅喜天興善助人爲吉矣吾道乃爲理天地安帝王生天地所愛者乃當愛真道真德也夫天者乃道之真道之綱道之信道之因而行也地者乃德之長德之紀德之所因縁而止也故長爲萬物之母也常忍辱居其下也不自言勞苦也吾之爲德君教化下愚正以此天地二事爲祖故常按天地之法度不失其門户也吾之書即天譚地語與神祇深獨相應若表裏也天下之名今所屬皆以類相從故知命其所屬故含五姓多者象陽而仁含六情多者象隂而貪又受陽施多者爲男受隂施多者爲女受王相氣多者尊貴則專受休廢囚氣多者數病而早死又貧極也故凡人生者在其所象五行之氣其命者繫於六甲五曆以類古之萬不失一也古者聖人深原凡事知人情者以此也真人知之耶上視天而行象天可爲俯視地而行象地德而移念天地使父母生長我不欲樂我爲惡也還考之於心乃行心者最藏之神尊者也心者神聖純陽火也行火者動而上行與天同光故日者乃火之王爲天下正無不照明故人爲至誠心中正疾痛心神聖上白於日月乃上白於天故至誠於内者神靈也可不愼乎天以至道爲行地以至德爲行至德爲家共生萬物無所匿無可私古者聖人象天地爲行以至道要德力教化愚人使爲謹良令易治令世反多閉絶之故愚人共爲狡猾爲失天道不自知非各在真道善德不施行故人多天謫當死不除也今天師廣開天道之路悉拘校古者道書之文以爲真要祕道真道者多善其文乃入神故能覩神與神爲治若神入神則真道也乃多成於幽室或有使度於室中而去者或有一出一入未能去者或有但見神而終古不去者行爲子道學而得大官者决意凡人專問也今日入學門用心專一常欲利愛而不妄語年少而學至老窮無復知乃止不樂得官也但身好學務欲知經道積爲善而不止行名立經道成深知古今灾變所從起其行與學有益於上有利於下爲善積聞不可蓋閉名聞四達明王好之因而徴索詔取萬俱言善哉是其人也傍人爲其悅喜足者即其善人學而度世者也行復爲子說道其不度者意今日入學門不樂思得真道善說但欲博聞多覩可以行窮極聖人者又不欲推行作善反好浮華之文可以相欺僞者或既得入經道又用心不專一常欲妄語辯於口辭以害人爲職不尊重上不利愛下復經道空虚未足以爲帝王之良臣反行首長者傍人以財貨自助欲得大官以起名譽因而盜採財利以公趣私背上利下是即亂賊敗正治天地之害國家賊也民之虎狼父母之惡子天地憎之鬼神惡之故其罪當誅之於帝王以稱天心以解民之大害是其抵欺而得官者也或有用心不專實空虚無真守反積常思欲得官官者天之列宿官也以封有德賞有功也不以妄與無功之人也無功之人天地所忽神靈所不愛也下愚不能深自知惡反妄思得天官而不止邪鬼物因而共入其心使妄語因而妖言而不能自禁止也故時有邪言而死者此之謂也非獨爲道不得其意則凶也真人努力自度之術矣古者聖賢覩天法明故能行道守德也天乃專一晝夜行道而不言故能長吉地乃晝夜行道而不言愛養萬物故能獨吉也四時晝夜行道而不止故能常獨興王而不止也三光乃獨行真道而不言故能常明隨天運行也五行乃獨行真道而不言故能與天地爲常也凡天下之爲道者象此不可勝書也常能愛利口不妄言則道可得也欲輕忽反吾言者爲道所賊也吾乃爲天譚以戒上德之君夫德君天之興必且好道萬民且象其君而爲之皆以此文爲戒是故天之爲象法也乃尊無上反卑無下其大無外反其小無内包養萬物善惡大小皆利祐之受以元氣而生之終之不害傷也故能爲天最稱神也最名天上之君也今上皇氣至德君治當象此爲法故吾道一高一下一沈一浮欲使衆賢共策之故東南地户乃有天地之水不逆小流之力也善惡大小皆歸之真人知之耶文書億卷中有能增人年壽益人命者真文也其餘非也文書滿室中有能得天心平治者真文也其餘非也臣子滿朝廷中有能樂其君助其君致太平者是帝王之真臣良吏其餘者佐職之臣子也人生一子而父母常得其樂而不飢寒者是賢孝之子其餘皆悉備數也積方重車中有皆能益年者是真方也其餘非也天下若此類衆多不可稱記預說也真人自深思其意吾文以一推萬足以明天下之道矣故使真人傳道於上德之君拘校凡文人辭聖書者明以示衆賢使一俱覺解迷惑也拘校凡文之後灾日去矣夫邪文邪言乃奸灾之主人也夫正文正言乃遂邪奸惡之吏也以文正言以吏正奸僞無主人則無止宿之所矣夫邪言爲奸主人比若盜賊有舍止之所也主人已死亡盜賊無縁復得來止息也行天道之爲法以一況萬萬不可盡書也文多使人眩惑不若舉一綱使萬目自列而張之故萬人擾擾不若一帝王也衆星億億不若一日之明也柱天群下蚑行之言不若國一賢良也天道廣縱無復窮極不若一元氣與天持命綱也賢者上德之君得思吾言壽自長也後世共思吾言自父慈子孝日廣且明也大小爭爲善後無彊也不知復有邪文佞人國以藏也灾變盡除三光明也自然之術天師共純也爲道如此何有傷遂以爲法乃天行也垂書記之是思天地神明也以徴之文與天地響應也是天合信符也上君賢者宜共策此辭行之者日興與時宜爲朝得天地之欲故吉哉吾爲太平德君制作法度不限一人夫太平氣來有一人自冤不得其欲者則上皇太平氣不得俱來至也故天教吾廣開闢其路使自恣自擇可爲也賢明欲樂活者可學吾文思其意入室成道可得活賢柔欲樂輔帝王治象吾文爲之可以致太平乎欲樂居家治生商財者思吾文可竟天年各得其所願無大自冤也故德君以治大平之氣來也所以然者乃天下無自冤者各自得其所上德之君賢明者不奪所欲必得天下之心欲承天意以歸之天之行不奪人所欲地之行不奪人所欲明君象之故致太平天地至神猶不奪所欲況人乎哉上古神人戒弟子後學者爲善圖象隂祐利人常吉其功增倍陽善者人即相冗答而解隂者乃天地諸神知之故增倍也積德者富人愛好之其善自來也人之所譽鬼神亦然因而祐助之好道者長生乃與隂陽同其憂順皇靈之行天地之性得其道理故天祐之也失者亂天不好善人也夫求善以善無可怪學以仁得之道之始也以德得之道之中和也以道得之上也吾本少學而不止精神念之涕常欲下爲此積久蒙皇天大恩今日幸得逢天神人於曠野始學若虧思問小事外浮華也本求守一養性之法凡三百首乃見天師說而無極故敢問身寧可得長存否子爲天來學問疑吾爲天授子也願聞其訣意以何明之也今有德之君得吾書心解行之與衆賢共議以化凡民必與立響相應是其明證也吾道以誡成不設僞言行已訣矣吾含此道久以無可與語者天冤結有劇病變不絶此其悒悒不通天師何自往與付之曰位不當也吾職在天真人職在地在地者出萬物故天生者於地養之故吾傳道於真人地生君王凡民萬二千物悉得陽施從隂中出故子得傳於人也子以吾言不誠信也夫天雖有所出不與人語情意同吾書承天教令明若丹青也天數之始也是故天地未分之時積氣都合爲一分爲二成夫婦天下施於地懷妊於玄㝠字爲甲子布根東北丑與寅始見於卯畢東南辰與已垂枝於南養於午向老西南未與申成與西方日入酉畢藏西北戌與亥故數起於一而止於十者五千之始五行之本也數一以乘十百而備是故天生内故畢終是故斗建於辰破於戌建者立也故萬物欲畢生破者敗也萬物畢死於戌數天地八方十而備隂陽建破故以此往來復其故隨斗所指以明事吾書乃爲除害氣故曰象天爲法太平經鈔己部卷之六
