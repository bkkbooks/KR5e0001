body:
  text: 太平經鈔乙部卷之二外二合隂陽順道法還年不老大道將還人年皆將候驗暝目還自視正白彬彬若且向旦時身爲安著席若居温蒸中於此時筋骨不欲見動口不欲言語每屈伸者益快意心中忻忻有混潤之意鼻中通風口中生甘是其候也故順天地者其治長久順四時者其王日興道無竒辭一隂一陽爲其用也得其治者昌失其治者亂得其治者神且明失其治者道不可行詳思此意與道合同録身正神令人自知法天之使道生人也且受一法一身七縱横隂陽半隂半陽廼能相成故上者象陽下者法隂左法陽右法隂陽者好生隂者好殺陽者爲道隂者爲刑陽者爲善陽神助之隂者爲惡隂神助之積善不止道福起令人日吉陽處首隂處足故君貴道德下刑罰取法於此小人反下道德上刑罰亦取法於此故人乃道之根柄神之長也當知其意善自持養之可得壽老不善養身爲諸神所咎神叛人去身安得善乎爲善不敢失繩纏不敢自欺爲善亦神自知之惡亦神自知之非爲他神仍身中神也夫言語自從心腹中出傍人反得知之是身中神告也故端神靖身乃治之本也壽之徴也無爲之事從是興也先學其身以知吉凶是故賢聖明者但學其身不學他人深思道意故能太平也君子得之以興小人行之以傾脩一却邪天地開闢貴本根乃氣之元也欲致太平念本根也不思其根名大煩舉事不得灾並來也此非人過也失根基也離本求末禍不治故當深思之夫一者乃道之根也氣之始也命之所繋屬衆心之主也當欲知其實在中央爲根命之府也故當深知之歸仁歸賢使之行人之根處内枝葉在外令守一皆使還其外急使治其内追其遠治其近守一者天神助之守二者地神助之守三者人鬼助之四五者物祐助之故守一者延命二者與凶爲期三者爲亂治守四五者禍日來深思其意謂之知道故頭之一者頂也七正之一者目也腹之一者臍也脉之一者氣也五藏之一者心也四肢之一者手足心也骨之一者脊也肉之一者腸胃也能堅守知其道意得道者令人仁失道者令人貪以樂治身守形順念致思却灾夫樂於道何爲者也樂乃可利合隂陽凡事默作也使人得道本也故元氣樂即生大昌自然樂則物强天樂即三光明地樂則成有常五行樂則不相傷四時樂則所生王王者樂則天下無病蚑行樂則不相害傷萬物樂則守其常人樂則不愁易心腸鬼神樂即利帝王故樂者天地之善氣精爲之以致神明故靜以生光明光明所以候神也能通神明有以道爲鄰且得長生久存夫求道常苦不能還其心念今移風易俗趨其心指誰復與之爭者太平樂乃從宫中出邪固以清靖國安身入道夷狄却神瑞應來懸象還凶神往夫人神乃生内反遊於外遊不以時還爲身害即能追之以還自治不敗也追之如何使空室内傍無人畫象隨其藏色與四時氣相應懸之窗光之中而思之上有藏象下有十鄉卧即念以近懸象思之不止五藏神能報二十四時氣五行神且來救助之萬疾皆愈男思男女思女皆以一尺爲法隨四時轉移春青童子十夏赤童子十秋白童子十冬黑童子十四季黄童子十二二十五神人真人共是道德正行法陽變於隂隂變於陽隂陽相得道乃可行天須地乃有所生地須天乃有所成春夏須秋冬晝須夜君須臣乃能成治臣須君乃能行其事故甲須乙子須丑皆相成作道治正當如天行不與人相應皆爲逆天道比若東海居下而好水百川皆歸之因得其道鯨魚出其中明月珠生焉是其得道之效也道人聚者必得延年竒方出大瑞應之衆賢聚致治平衆文聚則治小亂五兵聚其治大敗君宜守道臣宜守德道之與德若衣之表裏天不廣不能包含萬物萬物皆半好半惡皆令忍之人君象之次皇后後宫之象也此二者慈愛父母之法也故父母養子善者愛之惡者憐之然後能和調家道日象人君月象大臣星象百官衆賢共照萬物和生故清者著天濁者著地中和著人調神靈法吾欲使天下萬神和親不復妄行害人天地長悅百神皆喜令人無所苦帝王得天之力舉事有福豈可間哉故聖人能守道清靜之時旦食諸神皆呼與語言比若今人呼客耳百神自言爲天吏爲天使羣精爲地吏爲地使百鬼爲中和使此三者隂陽中和之使也助天地爲理共興利帝王守一明之法長壽之根也萬神可祖出光明之門一精明之時若火始生時急守之勿失始正赤終正白久久正青洞明絶遠復遠還以治一内無不明也百病除去守之無懈可謂萬歲之術也守一明之法明有日出之光日中之明此第一善得天之壽也安居閑處萬世無失守一時之法仃道優劣夫道何等也萬物之元首不可得名者六極之中無道不能變化元氣行道以生萬物天地大小無不由道而生者也故元氣無形以制有形以舒元氣不縁道而生自然者乃萬物之自然也不行道不能包裹天地各得其所能使高者不知危天行道晝夜不懈疾於風雨尚恐失道意況王者乎三光行道不懈故著於天而照八極失道光滅矣王者百官萬物相應衆生同居五星察其過失王者復德德星往守之行武武星往守之行柔柔星往守之行强强星往守之行信信星往守之相去遠應之近天人一體可不愼哉春王當温夏王當暑秋王當凉冬王當寒是王德也夫王氣與帝王氣相通相氣與宰輔相應微氣與小吏相應休氣與後宫相同廢氣與民相應刑死囚氣與獄罪人相應以類遥相感動其道也王氣不來王恩不得施也古者聖王以是思道故得失之象詳察其意王者行道天地喜悅失道天地爲灾異夫王者靜思道德行道安身求長生自養和合夫婦之道隂陽俱得其所天地爲安天與帝王相去萬萬餘里反與道相應豈不神哉名爲神訣書元氣自然共爲天地之性也六合八方悅喜則善應矣不悅喜則惡應矣狀類景象其形響和其聲也太隂太陽中和三氣共爲理更相感動人爲樞機故當深知之皆知重其命養其軀即知尊其上愛其下樂生惡死三氣以悅喜共爲太和乃應並出也但聚衆賢唯思長壽之道乃安其上爲國寳器能養其性即能養其民夫天無私祐祐之有信夫神無私親善人爲效一身之中能爲賢能爲神能爲不肖其何故也誤也神靈露也故守一之道養其性在學之也衆中多瑞應者信人也無瑞應者行誤人也占而是非即可知矣夫斤兩所察人情也天之照人與鏡無異審詳此意與天同願與真神爲其安得不吉哉成事口口不失銖分欲得天地中和意故天地調則萬物安縣官平則萬民治故純行陽則地不肯盡成純行隂則天不肯盡生當合三統隂陽相得乃和在中也古者聖人治致太平皆求天地中和之心一氣不通百事乖錯和三氣興帝王法通天地中和譚順大業和三氣游王者使無事賢人悉出輔興帝王天大喜但大順天地不失銖分立致太平瑞應並興元氣有三名太陽太隂中和形體有三名天地人天有三名日月星北極爲中也地有三名爲山川平土人有三名父母子治有三名君臣民欲太平也此三者常當腹心不失銖分使同一憂合成一家立致太平延年不疑矣故男者象天故心念在女也是天使人之明效也臣者爲地通譚地者常欲上行與天合心故萬物生出地即上向而不止雲氣靡天而成雨故忠臣憂常在上汲汲不忘其君此地使之明效也民者主爲中和譚中和者主調和萬物者也中和爲赤子子者乃因父母而生其命屬父其統在上託生於母故寃則想君父也此三乃夫婦父子之象也宜當相通辭語並力共憂則三氣合并爲太和也太和即出太平之氣斷絶此三氣一氣絶不達太和不至太平不出隂陽者要在中和中和氣得萬物滋生人民和調王治太平人君天也其恩施不下至物無由生人不得延年人君之心不暢達天心不得通於下妻子不得君父之敕爲逆家也臣氣不得達地氣不得成忠臣何從得助明王爲治哉傷地之心寡婦在室常苦悲傷良臣無從得前也民氣不上達和氣何從得興中和乃當和帝王治調萬物者各當得治今三氣不善相通太平安得成哉安樂王者法君者當以道德化萬物令各得其所也不能變化萬物不得稱君也比若一夫一婦共生一子則稱爲人父母亦一家之象無可生子何名爲父母乎故不能化生萬物者不得稱爲人父母也故火能化四行自與五故得稱君象也本性和而專得火而散成灰金性堅剛得火而柔土性大柔得火而堅成瓦水性寒得火而温火自與五行同又能變化無常其性動而上行隂順於陽臣順於君又得照察明徹分别是非故得稱君其餘不能也土者不即化久久即化故稱后土三者佐職臣象也道無所不能化故元氣守道乃行其氣乃生天地無柱而立萬物無動類而生遂及其後世相傳言有類也比若地上生草木豈有類也是元氣守道而生如此矣自然守道而行萬物皆得其所矣天守道而行即稱神而無方上象人君父無所不能制化實得道意地守道而行五方合中央萬物歸焉三光守道而行即無所不照察雷電守道而行故能感動天下乘氣而往來四時五行守道而行故能變化萬物使其有常也隂陽雌雄守道而行故能世相傳凡事無大無小皆守道而行故無凶今日失道即致大亂故陽安即萬物自生隂安即萬物自成隂陽治道教及其臣化流其民受命於天受體於地受教於師乃聞天下要道守根者王守莖者相守浮華者善則亂而無常帝王天之子也皇后地之子也是天地第一神氣也天地常欲使樂不得愁苦憐之如此天地之心意氣第一者也故王者愁苦四時五行氣乖錯殺生無常也懸象還神法夫神生於内春青童子十夏赤童子十秋白童子十冬黑童子十四季黄童子十二此男子藏神也女神亦如此數男思男女思女皆以一尺爲法晝使好令人愛之不能樂禁即魂神速還解承負訣天地開闢已來凶氣不絶絶者而後復起何也夫壽命天之重寳也所以私有德不可僞致欲知其寳乃天地六合八遠萬物都得無所冤結悉大喜乃得增壽也一事不悅輒有傷死亡者凡人之行或有力行善反常得惡或有力行惡反得善因自言爲賢者非也力行善反得惡者是承負先人之過流灾前後積來害此人也其行惡反得善者是先人深有積畜大功來流及此人也能行大功萬萬倍之先人雖有餘殃不能及此人也因復過去流其後世成承五祖一小周十世而一反初或有小行善不能厭囹圄其先人流惡承負之灾中世滅絶無後誠冤哉承負者天有三部帝王三萬歲相流臣承負三千歲民三百歲皆承負相及一伏一起隨人政衰盛不絶今能法此以天上皇治而斷絶深思之而勿忘凡人有三壽應三氣太陽太隂中和之命也上壽一百二十中壽八十下壽六十百二十者應天大歷一歲竟終天地界也八十者應隂陽分别八偶等應地分别應地分别萬物死者去生者留六十者應中和氣得六月遁卦遁者逃亡也故主死生之會也如行善不止過此壽謂之度世行惡不止不及三壽皆夭也胞胎及未成人而死者謂之無辜承負先人之過多頭疾者天氣不悅也多足疾者地氣不悅也多五内疾者是五行氣戰也多病四肢者四時氣不和也多病聾盲者三光失度也多病寒熱者隂陽氣忿爭也多病憒亂者萬物失所也多病鬼物者天地神靈怒也多病温而死者太陽氣殺也多病寒死者太隂氣害也多病卒死者刑氣太急也多病氣脹或少氣者八節乖錯也今天地隂陽内獨盡失其所故病害萬物帝王其治不和水旱無常盜賊數起反更急其刑罰或增之重益紛紛連結不解民皆上呼天縣官治乖亂失節無常萬物失傷上感動蒼天三光勃亂多變列星亂行故與至道可以救之者也吾知天意不欺子也天威一發不可禁也獲罪于天令人夭死初天地開闢自太聖人各通逹于一面誠真知之不復有疑也故能各作一大業令後世修之無有過誤也故聖人尚各長于一大業不能必知天道故各異其德比若天而況及人乎天地各長于一故天長于高而清明地長于下而重濁中和長養萬物也猶不能兼而況凡人乎亥爲天地西北極也已爲天地東南極也亥寒不以時收閉來年巳反傷子乃天地之北極也午爲天地之南極也子今冬不善順藏午反承負而亡也丑乃天地東北極也未乃天地西南極也丑不以時且生六月反被其刑天地性運皆如此矣今帝王居百重之内其用道德仁善萬里百姓蒙其恩父爲慈子爲孝家足人給不爲邪惡帝王居内失其道德萬里之外民臣失其職是皆相去遠萬萬里其由一也習善言不若習行于身也真人問神人吾生不知可謂何等而常喜乎神人言子猶觀昔者博大真人邪所以先生而後老者以其廢邪人而獨好真道真道常保而邪者消凡人盡困窮而我獨長存即是常喜也昭昭獨樂何忿之哉卒爲不能長生當奈何神人言積習近成思善近生夫道者乃無極之經也前古神人治之以真人爲臣以治其民故民不知上之有天子也而以道自然無爲自治其次真人爲治以仙人爲臣不見其民時將知有天子也聞其教敕而尊其主也其次仙人爲治以道人爲臣其治學微有刑被法令彰也而民心動而有畏懼巧詐將生也其次霸治不詳擇其臣民多冤而亂生焉去治漸遠去亂漸近不可復制也是故思神致神思真致真思仙致仙思道致道思智致智聖人之精思賢人致賢人之神來祐之思邪致愚人之鬼來惑之人可思念皆有可致在可思者優劣而已故上士爲君乃思神真中士爲君乃心通而多智下士爲君無可能思隨命可爲真人問何以知帝王思善思惡邪神人言易知邪帝王思仁善者瑞應獨爲其出圖書獨爲其生帝王仁明生于木火武智生于金水柔和生土天之垂象無誤者也真人問古者特生之圖竒方誰當得者乎其吏民得之獻王者帝王者時氣即爲和良政治益明道術賢哲出爲輔弼之帝王之道日强盛矣夷狄滅息垂拱而治刑罰自絶民無兵革帝王思善之證可不知哉不覩其人已知之矣真人問神人何以能知此乎神人言以無聲致之君欲仁好生象天道也臣欲柔而順好養法地道也即善應出矣故天地不語而長存其治獨神神靈不語而長仙皆以内明而外闇故爲萬道之端夫神靈出入無有穴窠清靜而無聲安枕而卧神光自生安得不吉樂之哉夫用口多者竭其精用力多者苦其形用武多者賊其身此者凶禍所生也子愼吾之言不可妄思思之善或有德思之惡還自賊安危之間相錯若髮髻子戒之無雜思也夫人失道命即絶審知道意命可活勉養子精無自煎也學得明師事之禍亂不得發也真人不敢失神人之辭也神人言夫學者各爲其身不爲他人也故當各自愛而自親學道積久成神真也與衆絶殊是其言也真人問何以知道效乎神人曰决之於明師行之於身身變形易與神道同門與真爲鄰與神人同户求之子身何不覩患其失道意反求之四野索之不得便至窮老矣遂離其根言天下無道也常獨愁苦離其根是爲大灾大人失之不能平其治中士失之亂其君仁人失之無從爲賢小人失之滅其身古之賢聖所行與今同耳古之小人所窮亦與今同耳明證若此真人問何以知人將興將衰乎神人言大人將興竒文出賢者助之爲治家人將興求者得生其子善可知矣真人問何以致是賢者神人言皆以思也精思不止其事皆來神哉道之爲治可不力行哉神人言三綱六紀所以能長吉者以其守道也不失其治故常吉天之壽命不奪人之願木性仁思仁故致東方東方主仁五方皆如斯也天下之事各從其類故帝王思靖其治亦靜以類召也古之學者效之於身今之學者反效之於人古之學者以安身今之學者浮華文不積精於身反積精於文是爲不知其根矣太平經鈔乙部卷之二
