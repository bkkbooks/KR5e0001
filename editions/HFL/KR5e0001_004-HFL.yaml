body:
  text: 胞胎隂陽規矩正行消惡圖神人語真人内子已明也損子身其意得也其外理自正瞑目内視與神通靈不出言與道同隂陽相覆天所封長生之術可開眸子無强腸宜和弘天地受和如暗聾欲知其意胞中童不食十月神相通自然之道無有上不視而氣宅十二重故反嬰兒則無凶老還反少與道通是故畫像十二重正者得善不肖獨凶天道常在不得喪亡狀如四時周反鄉終老反始故長生也子思其意無邪傾積德累行道自成才不如力道歸其人苟非其人道不虚行夫道苦風默居其傍用之則有不用則亡賢者有里不肖有鄉死生在身常定行天無有過人自求喪詳思其意亦無妄行天與守道力行故長生人不肯爲故死傾記吾戒子道傳其人則易行古者聖賢傳道飲血爲盟天道積重愚人反輕道乃萬物之師也得之者明失之者迷天地雖廣大不遺失毫釐賢知自養比與神俱語是乃隂陽之統天地之樞機也古者聖賢深知之故以自表殊天道之要也内以治身外以消災不當爲之乃與天地同憂分别四治夫帝王之士失臣皆當老少子本非理世人也吾見天氣間者比連不調或過在仕臣失實令使時氣不調人君不明災害並行道人亦傷令天地三光尚爲其病故無正明道士於自逃獨得不傷故吾雖獨蒙天私久存常不敢自保初少已來事師問事無能悉解之天師解决其要意恐無復得知之夫治者有四法有天理有地理有人理三氣極然後蚑行萬物理也願聞其意天理者其臣老君乃父事其臣也夫臣卑何故師父事之哉但位卑道德尊重師父事之者乃師其道德當以合策而平天下也地理者友事其臣若以同志同心者隂順母子同列同胞同憂臣雖位卑其德和平君之治人治者卑其用臣少小小象父生子子少小未能爲父作策故亂小矣夫治天下者視天下之臣皆師父也故父愛其子何有危時師父皆能爲其子解八方之患難何有失時象地理者天下之臣皆君之友也夫同志合策爲交同憂患欲共安其位地者順而承上悉承天意皆得天心何有不安時乎象人理者得中和之氣和者可進可退難知象子少未能爲父計也欺其父也臣少未能爲君深計故欺其君少者生日月少爲學又淺未有可畏故欺也故治少亂矣象蚑行理者無理義萬物者少知無有道德夫蚑行萬物無有上下取勝而已故亂敗矣象天理者人好生不傷地理者順善而成小傷象人理者相利多欲數相賊傷相欺殆象蚑行理者終無成功無有上下取勝而已天地之間常悉使非其能强作其所不及而難其所不能時覩於不能爲不能言不怜而教之反就責之使冤結多忿爭訟民愁苦困窮即而仰呼天誠寃結氣感動六方故致灾變紛紛畜積非一不可卒除爲害甚是即告天下之人心意矣終反無成功變怪不絶太平之氣何從得來哉故不能致太平氣咎正在此天下萬物各自有宜當任其所長所能爲所不能爲者而不可强也萬物俱愛隂陽之氣比若莫不能遊高山之上及其有水不限高下皆能去矣大木不能無上生於江海之中是以古者聖人明王之受事也五土各取其宜其物得好且善而各暢茂國家得富今宗廟重味食之天下安平無疾苦惡氣休止不行而爲害如人不相其土地而種植之即萬物不竟天年皆壞冤結不解因而夭終上感皇天萬物不收國家貧極食不重味宗廟飢渴天下愁苦人民更相殘賊君臣更相欺殆外内殊辭咎正起於此大害之根危亡之路也得書讀之常苦不熟熟者悉目知之不善思其志竟不精讀之雖得吾書亦无益也得而不力行與不得何異見食不食與無五穀何異見槳不飲渴可救乎此非愁他人還自害可不詳哉故聖人力思君子力學晝夜不息也猶樂象天轉運而不止百川流聚乃成江海子愼吾言天之受事各有法律令有可屬道有可爲出或先或後其漸預見比若萬物始萌於子生於卯垂枝於午成於酉終於亥雖使預見未可保也事各有可爲至光景先見其事未對預開其路天之垂象也常居前未嘗隨其後得其人而開通得見祐助者是也不可不通行之無成功即非其人也是以爲明證道審而言萬不失一但是其人明爲其開非其人則閉審得其人則可除疾灾異自消夷狄自降不須兵革皆自消亡萬物各有可爲設張得其人自行非其人自藏凡事不得其人不可强行非其友不可强取非其土地不可强種種之不生言不良内不得其處安能久長六極八方各有所宜其物皆見事事不同大人得之以平國中士得之爲良臣小人得之以脫身應天理上下和合天灾除奸僞斷絶讖本文上古之人皆心開目明耳洞預知未然之事深念未然感動無情卓然自異未有不成之施所言所道莫不篤達不失皇虚之心思募無極之智無極之言知人壽命進退長短各有分部常以隂陽合得消息上下中取其要與衆神有約束但各不得犯天地大忌所奉所得當合天意文書相白上至天君天君得書見其自約束分明乃後出文使勿自怨中直自進不白自聞音聲洞徹上下法則各不失期恐有不及未曾有不自責時常恐有非見督録神相白未普懈有過見退用故重復語勑反覆辭文宜不違所言是天之當所奉承神祇所仰皆如法常不敢息恐有不達所受非一皆當開心意恐違期神有尊卑上下相事不如所言輒見疏記憂心惻惻常如飢渴欲食天君開言知乃出教使得相主文書非一當得其意後各有信上古之人失得來事表裏上下觀望四方四維之外見其紀綱歲月相推神通更始何有極時星數之度各有其理未曾有移動事輒相乘無有復疑皆知吉凶所起故置曆紀三百六十日大小推算持之不滿分數是小月矣春夏秋冬各有分理漏刻上下水有遲快參分新故各令可知不失分銖各置其月二十四氣前後箭各七八氣有長日亦復七八以用出入祠天神地祇使百官承漏刻期宜不失脫之爲不應坐罪非一故使晝夜有分隨日長短百刻爲期不得有差有德之國日爲長水爲遲一寸十分應法數今國多不用日月小短一刻八九故使老人歲月當弱反壯其年自薄何復持長時如使國多臣樞機衡舒遲後生蒙福小得視息不直有惡復見伐矣惟天地之明爲在南方已午同家離爲正目當明堂之事日照明以南向北陽氣進退亦不失常隂陽相薄以至子鄉寒温相直照徹自然甚可喜生養之道少陽太陽木火相榮各得其願是復何爭表裏相承無有失名上及皇燿下至無聲寂靜自然萬物華榮了然可知不施自成天之所仰當受其名機衡所指生死有期司命奉籍簿數通書不相應召所求神簿問相實乃上天君天君有主領所白之神不離左右其内外見敬亦不敢私承所上所下各不失時太隂司官不敢懈止正營門閣恐自言事輒相承爲善爲要道牒其姓名得教則行不失銖分上古之時有智慮無所不照無所不見受神明之道昭然可知亦自有法度不失其常從太初已來歷有長短甚深要妙從古至今出歷之要在所止所成輒以心思候算下所成所作無不就並數相應繩墨計歲積日月大分爲計今天地且大樂歲帝王當安坐而無憂民人但遊而無事少職五穀不復爲前無有價直天下興作善酒以相飲市道尤極名爲水令火行爲傷於陽化凡人一飲酒令醉狂脉便作買賣失職更相鬥死或傷賊或早到市反宜乃歸或爲奸人所得或縁高墜或爲車馬所尅賊推酒之害萬端不可勝記念四海之内有幾何市一月之間消五穀數億萬斗斛又無故殺傷人日日有之或孤獨因以絶嗣或結怨父母置害或流灾子孫縣官長吏不得推理叩胷呼天感動皇靈使隂陽四時五行之氣乖錯復旱上皇太平之君之治令太和氣逆行蓋無故發民令作酒損廢五穀復致如此之禍患但使有德之君有教勑明令謂吏民言從今已往敢有市無故飲一斗者笞三十謫三日飲二斗者笞六十謫六日飲三斗者笞九十謫九日各隨其酒斛爲謫酒家亦然皆使修城郭道路官舍所以謫修城郭道路官舍爲大土功也土乃勝水以厭固絶滅令水不過度傷陽也水太隂也民也反使興王傷損陽精爲害深矣修道路取興大道以類相占漸置太平考天地隂陽萬物上下相愛相治立功成名使心治一家使人不復相憎惡常樂合心同志令太和之氣日自出而大興平六極同心八方同計所治者若人意莫不皆響應而悅者本天地元氣合隂陽之位邪惡默然消去乖逆者皆順明大靈之至道神祇所好愛吾乃上爲皇天陳道德下爲山川别度數中爲帝王設法度中賢得以生善意因以爲解除天地大咎怨使帝王不復愁苦人民相愛萬物各得其所自有天法常格在不匿古者聖帝明王重大臣愛處士利人民不害傷臣亦忠信不欺君故理若神故賢父常思安其子子常思安樂其父二人并力同心家無不成者如不並力同心家道亂矣失其職事空虚貧極因爭鬥分别而去反還相賊害親父子分身血氣而生肢體相屬如此况聚天下異姓之士爲君師父乎故聖人見微知著故重戒愼之夫師陽也愛其弟子導教以善道使知重天愛地尊上利下弟子敬事其師順勤忠信不欺二人並力同心圖畫古今舊法度行聖人之言明天地部界分理萬物使各得其所積賢不止因爲帝王良輔相與合策共理致太平如不并力同計不以要道相傳反欲浮華外言更相欺殆逆天分理亂聖人之辭六極不分明爲天下大灾帝王師之失其理法反與天地爲大仇不得神明意天下大害者也人生備具隂陽動靜怒喜皆有時時未牝牡之合也是隂陽當主爲生生之效也天道三合而成故子三年而行三三爲九而和道究竟未知牝牡之合其中時念之未能施也天數五地數五人數五三五十五而内藏氣動四五二十與四時氣合而欲施四時者主生故欲施生五五二十五而五行氣足而任施五六三十而强故天使常念施以通天地之統以傳類會三十年而免老當衰小止閉房内天下蚑行之屬人象天地純耳其餘不能也故天地一日一夜共閏萬二千物盡使生夜則深晝則燥深者隂也燥者陽也天與地日共養此萬二千物具足也天之法陽合精爲雨陽之施乃下入地中相從共生萬二千物其二千者嘉瑞善物也夫萬二千物各自存精神自有君長當共一大道而行乃得通流天道上下往朝其君比若人共一大道往朝王者也萬二千物精神共天地生共二大道而出有大有中有小何謂也乃謂萬二千物有大小其道亦有大小也各自生自容而行故上道廣萬步爲法次廣千步爲法其次廣百步爲法其次廣十步爲法其次廣一步爲法凡五道應五方當共下生於地共朝於天共一道而行是以大道廣萬步容中道千步小道百步氂道十步毛道一步物有大小各自容往來凡乃上受天之施反下生施地出當俱上朝天也故大道但可張不可妄翕也翕之輒不相容有不得生者或有傷死不得生出者令人絶無後代傷者傷人死者殺人古者聖人不敢廢絶大道者覩天禁明也子以何天道得傷道者天也陽也主生德者地也隂也主養萬物多不能生即知天道傷矣其有不生者即知天克有絶者矣一物不生一統絶多則多絶少則少絶隨物多少以知天統傷夫道興者主生萬物悉生德興者主養萬物人民悉養無冤結五書中善者使青爲下而丹字何乎吾道乃丹青之信也青者生仁而有心赤者太陽天之正色吾道太陽仁政之道不欲傷害也天子者天之心也皇后者地之心也夫心者主持正也天乃無不覆無不生無大無小皆受命生焉故爲天天者至道之真也不欺人也萬物所當親愛其用心意當積誠且信但常欲利不害不負一物故爲天也夫帝王者天之子人之長其爲行當象此夫子者當承父之教令嚴勑案而行之其事乃得父心志意可爲良家矣如不承父教令其家大小不治即爲貧家矣財反四去常苦不聚其事紛紛灾變連起大得愁苦過在此矣古者帝王將行先仰視天心中受教乃可行也夫皇后之行正宜土地地乃無不載大小皆歸中無善惡悉包養之皇后乃地之子也地之心也心憂凡事子當承象母之行若母廼爲孝子夫天地之與皇后相應者比若響之與聲於其失小亦小失大亦大若失毫髮之間以母不相得志意古者皇后將有爲皆先念后土無不包養也無不可忍無不有常以是自安與土心相得矣若失之則灾變連起刑罰不禁多隂少陽萬物不茂過在此夫是二人正行者則神真見真道出賢明皆在位善物悉歸國元氣陽也主生自然而化隂也主養凡物天陽主生也地隂主養也日與晝陽也主生月星夜隂也主養春夏陽也主生秋冬隂也主養甲丙戊庚壬陽也主生乙丁己辛癸隂也主養子寅辰午申戌陽也主生丑卯巳未酉亥隂也主養亦諸九陽也主生諸六隂也主養男子陽也主生女子隂也主養萬物雄陽也主生雌隂也主養君陽也主生臣隂也主養天下凡事皆一隂一陽乃能相生乃能相養一陽不施生一隂並虚空無可養也一隂不受化一陽無可施生統也陽氣一統絶滅不通爲天大怨也一隂不受化不能生出爲大咎天怨者陽不好施無所生反好殺傷其生也地所咎在隂不好受化而無所出養長而咎人反傷其養長也天不以時雨爲惡凶天也地不以生養萬物爲惡凶地也男不以施生爲斷天統女不以受化爲斷地統隂陽之道絶滅無後爲大凶比若天地一旦毁而無復有天地也是故聖賢好天要文也天者衆道之精也賢者好道故次聖賢者入真道故次仙知能仙者必真故次真知真者必致神神者上與天同形合理故天稱神能使神也神也者皇天之吏也神人者皇天第一心也天地之性清者治濁濁者不得治清精光爲萬物之心明治者用心察事當用清明今神人真人仙人道人聖人賢人民人奴婢皆何象乎然神人者象天天者動照無不知真人者象地地者直至誠不欺天但順人所種不易也仙人者象四時四時者變化凡物無常形容或盛或衰道人者象五行五行可以卜占吉凶長於安危聖人者象隂陽隂陽者象天地以治事合和萬物聖人亦當和合萬物成天心順隂陽而行賢人象山川山川主通氣達遠方賢者亦當爲帝王通達六方凡民者象萬物萬物者生處無高下悉有民故象萬物奴婢者衰世所生象草木之弱服者常居下流因不伸也奴婢常居下故不伸也故象草木故奴婢賢者得爲善人善人好學得成賢人賢人好學不止次聖人聖人學不止知天道門户入道不止成不死之事更仙仙不止入真成真不止入神神不止乃與皇天同形故上神人舍於北極紫宫中也與天上帝同象也名天心神神而不止乃復踰天而上但承委氣有音聲教化而無形上屬天上憂天上事神人已下共憂天地間六合内共調和無使病苦也願聞絶洞彌遠六極天地之間何者最善三萬六千天地之間壽最爲善故天第一地次之神人次之真人次之仙人次之道人次之聖人次之賢人次之此八者皆與皇天心相得與其同意并力是皆天人也天之所欲仕也天内各以職署之故思慮常相似也是天所愛養人也天者大貪壽常生也仙人亦貪壽亦貪生貪生者不敢爲非各爲身計之天法垂象上古聖人常象之不敢違離也故厭不祥斷狡猾使妖臣不得作者皆由案天法而爲之欲使陽氣日興火大明不知衰時者但急絶由金氣勿使王也金氣斷則木氣王火氣大明無衰時也何謂也天君當絶兵兵者金類也故急絶之帝王戒賜兵器與諸侯是王金氣也金氣王則木衰木衰則火不明火不明則兵起之象火者君象能變四時熒惑爲變最效天法不失銖分王者居家主修田野治生見之會當有四者不賜恩愛不下加民令赤子無以訟盜當奈何見賢者賜以文飢者賜之以食寒者賜與衣賢者何故賜與文乎文者生於東明於南故天文生于東北故書出於東北象虎有文在寅龍有文在辰負而上天離爲文章在南故三光爲文日出於東盛於南天命帝王象之爲法天有三皇地有三皇人有三皇天有五帝地有五帝人有五帝天有三王地有三王人有三王天有五霸地有五霸人有五霸何謂也天有三皇若三光地有三皇若高下平人有三皇若君臣民天有五帝若五星地有五帝若五嶽人有五帝若五藏天有三王謂三光五霸爲五嶽與人地皆同天之三皇其優者日中者月下者星地之三皇優者五嶽中者平土下者田野人之三皇優者君中者臣下者民凡人乃有大罪六不可除或身即坐或流及後世然人積道無極不肯教人求生罪不除也積德無極不肯教人守德養性爲謹其罪不除積財億萬不肯救窮周急使人飢寒而死其罪不除知有道而反賤道而不肯力學以自救或得長生在其天統先人之體而反輕不學而死乃自冤罪不除也天生人幸使人人有筋力可以自衣食而不肯力爲反使飢寒負先人之體而輕休其力而罪不除强取人物以中和爲仇其罪不除此六大罪天惡之不可除也吾將去有期戒六子一言夫道乃洞無上無下無表無裏守其和氣名爲臣子近求即大遠求即失故君王善爲政者以腹中始起真能思道理自得矣近在胷心散滿四海古者聖人名要道古者聖人之教帝王也深思遠慮閉其九户休其四肢使其混沌比若環無端如胞中之子而無職事乃能得其理吾道悉以是爲大要天寳其傳焉太平經鈔丁部卷之四
