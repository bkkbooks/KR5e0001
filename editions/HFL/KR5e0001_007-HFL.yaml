  text: 太平經鈔庚部卷之七外七
  hash: sha256:b6811dc17e8760f0caf14639ef521d14429d220cf43d9869639a168af5a893b8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0001_HFL_007-001a, image: hfl/0747/0747-004.png}
body:
  text: 虚無自然圖道必成誡虚無者乃内實外虚有若無也反其胞胎與道居也獨存其心懸龍慮也遂爲神室聚道虚也但與氣游故虚無也在氣與神其餘悉除也以心爲主故得無邪也詳論其意無忘真書也得之則度世可久游也何不趣精反與愚俱也凶禍一至被大灾也棄其真朴反成土灰也賢者見書誡之無爲者無不爲也乃與道連出嬰兒前入無間到於太初乃返還也天地初起隂陽源也入無爲之術身可完也去本來末道之患也離其太初難得完也去生已遠就死門也好爲俗學傷魂神也守二忘一失其相也可不戒之道之元也子專守一仁賢源也天道行一故完全也地道行二與鬼爲鄰也審知無爲與其道最神也詳思其事真人先也閉子之金關無令出門也寂無聲長精神神氣已畢仙道門易哉大道不復煩天道無親歸仁賢也自然之法乃與道連守之則吉失之有患比若萬物生自完一根萬枝不無有神詳思其意道自陳俱相混沌出妙門無增無減守自然凡萬物生自有神千八百息人爲尊故可不死而長仙所以早終失自然禽獸尚度況人焉愚者賤道下與地連仁賢貴道忽上天門神道不死鬼神終焉子欲爲之如環無端愼無入有自益身患亦無妄去令人死焉天地之性獨貴自然各順其事無敢逆焉道興無爲虚無自然高士樂之下士忽焉詳學知師亦無忌言有師明道無師難傳學不師訣君子不言妄作則亂文身自凶焉道已畢備便成自然其三道行書悉取訣於集議以爲天信即且響應立效也其正神靈者取訣於洞明萬萬人也以爲天信其凡文欲正之者取訣於拘校以爲天信其欲樂知吾書信者取訣於瞀疾行之且與天響應善者日興惡者日消以爲天信其欲署置得善人者取訣於九人其問入室與未者取訣於洞白也形無彰蔽以爲天信其欲知身成道而不死者取訣於身已成神即度世矣以爲天信其欲洽洞知吾書文意者從上到下盡讀之且自照察心大解無復疑也一得其意不能復去也其欲效吾書視真與僞以治日向太平以爲天信其欲壽可得與不者取訣於太平之後也如未太平先人流灾爲害難以效命以爲天信大陽欲知太平者取訣於由斷金也水與火欲厭絶奸臣訞不得作者取訣於由斷金衰市酒也欲得天道大興法者取訣於拘校衆文與凡人訣辭也欲得良藥者取訣拘校凡方文而效之也欲得疾太平者取訣於悉出真文而絶去邪僞文也欲樂思人不復殺傷女者取訣於各居其處隨力衣食勿使還愁苦父母而反逆也欲除疾病而大開道者取訣於丹書吞字欲知集行書訣也如其文而重丁寧善約束之行之一日消百害獨人心一旦轉而都正也以爲天信請問瑞者何等之名也子何故爲愚耶願天師不棄示以一言夫瑞者清也靜也正也專也心與天地同不犯時令也願聞以何知其清靜端正專一耶善哉子之問也夫天地之性自古到今善者致善惡者致惡正者致正邪者致邪此自然之術無可怪也故人心端正清靜至誠感天無有惡意瑞應善物一故能致瑞應也諸邪用心佞僞皆無善應此天地之大明徴也子知之耶善惡皆有應也不調和者致不利此天之明效也善哉請問人之爲善也上孝子上忠臣上順弟子當思上何等於君父師哉當上異聞珍寳希見之文而得上者是也忠臣孝子順弟子常可樂爲也何不上同聞而上異聞即同聞上自有之何須復上耶愚生不曉其意行且使子知其審實天下所來所珍悉未常見而善珍也以上其君是上忠臣也未常見善食以上其親是上孝子也未常見之說以上其師是上善弟子也子知之耶願聞上同事上之所有而重上之何也然皆應故其上罪不除何其重也子應不曉之生人之所常有重皆厭之何須復上之耶自古及今大聖之定凡事乃去同取異乃得天地之心意此之謂也天有兩手乃成凡事一手有病邪惡則無有成事天大怨之地以爲忌天下亂而無成功一由此一手邪惡而不并力凡事盡不理六方不太平亦由此兩手有病邪惡而不并力所致吉凶安危由此兩手真人亦豈深知之耶不唯天師開示其要意使得知之知之者終古㝠㝠昏亂無從得知之也夫師者乃天地凡事教化之本也雖難安得言哉善哉真人之求問事辭也其要而言口口而已安坐爲諸真人具說其意天下象而行之無復凶亂事天上諸神召爲兩手筴字爲要記國家行之則長存凡人行之則久富安要道將出近在凡人身今爲真人分别言之天地者主造出凡事之兩手也四時者主傳養凡物之兩手也男女夫婦者主傳統天地隂陽之兩手也師弟子者主傳相教通凡事文書道德之兩手也君與臣主傳理凡事人民諸物之兩手也此有六事纔舉其綱見其始耳不可勝書也凡事相須而成事者皆兩手也天上名爲重規叠矩皆相應者也一手邪不等無成事天上名爲大亂之治六方八遠名爲鰥寡斷嗣日以向衰無成事由此兩手不并力也請問天上何故名爲兩手兩手者言其齊同并力無前却然後可成也兩手不并力者事不可成也故凡事象此兩手皆當各得其人并力同心象此兩手乃告安太平之氣立至不象此兩手億萬年不能出上皇太平氣也太平氣常欲出若天常若兩手久不調御之故使閉不得通出悒悒何訾咎在兩手不調若兩手平調者上皇太平氣出前後至不相須善哉是故天地不并力萬物無從出四時不并力凡物無從得長五行不并力凡物無從得成君臣不并力凡事無從得理夫婦不并力子孫無從得長家道無從得立師弟子不并力凡結事無縁得解道德無縁得興曚霧無從得通六方八遠大化無從得行是故皆當并力比若兩手乃可通也不若兩手故致凶也雖治療無益也無從得成功也但空久愁苦而日凶故凡象此兩手者選舉當得其人不得其人者天上諸神名爲半死不持一手獨作安有能成功成事哉凡疑事宜深思此意以赤心心生於火還以付火爲治象是則延年益算萬不失一吾不欺子也以示德君以示凡人賢者各思其意無敢犯者也用之名爲自厚自養不用之名爲自愁自苦神哉吾之爲道傳天意也但可前不可却但可順不可逆順之全得天心也逆之事亂禍凶人意西天意東名爲與天意不同可爲覺知者矣今凡人舉士以貢帝王付國家得其人幾吉不得其人幾凶得其人何所能成不得其人何所能傾諸真人自精且對然得其人有四吉不得其人有四凶得其人天地六方八遠安不得其人天地六方八遠不安願聞其要意然貢士得其人上得以理有成功而常安日有益於上一大吉也所舉人可任得成器二吉也得成器能彰明其師道恩及其師三吉也所舉者信事有效復令上信任用之四吉也共并力同心所爲者日有成功月益彰明歲益興盛天地悅喜善應悉出惡物藏去天地悅則群神喜守而不失上可以度世中可以平理下可以全完竟其天年舉士得其人善如斯矣天上明此續命之符請問何故正名爲續命之符然所以續命符者舉士得人乃危更安亂更理敗更成凶更吉死更生上至於度世中得理於平下得竟其天年全其身形夫舉士不得人上無益帝王國家令其理亂帝王悉苦天地不悅盜賊灾變萬種是一大凶也所舉人不能理職佞僞日欺久久坐俟不安不得保其天年或天地鬼神害之或爲人所賊殺辱及其父母惡流及妻子後生已下世類遂見知過失爲惡人是二大凶也其人惡則其學棄污辱先師聖賢業禍及其師是三大凶也又舉之者不信共欺其上貢非其人亂天儀汙列宿天疾之地怨之國君惡之聖人非之是謂爲世大佞妄語之子當坐是事不得天地鬼神誅之則人當害之辱其先人禍及妻子是爲四大凶也犯四大凶貢非其人也乃使帝王愁苦凡害氣動起不可禁止前後不理更相承負天地大怒群臣戰鬥六方不喜八遠乖錯終古不理天上名爲曰減年短命之符何故名短命之符哉然理長反爲短年當多反少舉事逢凶無益於身天地不悅除算減年故天上名爲短命之符也善哉此天上文以示德君以示凡人賢下及民間爲人上求士不可不詳爲人下貢士不可不忠後世傳誦此書文結於胷中急急舉士不若此天地不復喜也知而故違其讁重哉愼之天上文解六極大集天上八月校書象天地法以除灾害惟上古之道修身正己不敢犯神靈之所犯乃敢求生索活於天君不敢自恣恐不全日念生意與神爲神表其類也欲得盡忠直之言與諸所部主者之神各各分明是非乃敢信理曲直耳何日有忘須臾之間上有占人具知是非何所隱匿何所不信者也故得自理求念本根未普有小不善之界也但自惜得爲人依仰元氣使得蠕動之物所不覩見灾異之屬但人負信于誓言兩不相信故有所不安天地中和上下各有信人不得知其要人食五常之氣無所不禀不依無所不食失善從惡命不全何獨如是耶故天君言常有善有惡故有當直之者故誤惡以分明天地四時五行之意使知成生爲重增其年命人得生成之道承用其禁不敢懈怠以是言之天知愚人甚薄而無報復之意逆天所施爲證天所施爲加人所施爲行也中類反當活惡疾善也故聖人知隂陽之會賢人理其曲直解其未知使各自分盡不相怨善自命長惡自命短何可所疑何可所怨乎善者著善之文不失其文不失其常不失其宜是爲上德無所不成無所不就不失其明不失其實不失隂陽所生成不失四時主生之氣所出入不失五行之成不失日月星宿不失其度數不失吉凶之期不失灾異之變不失水旱之紀人命長短不失所禀繫星宿厚薄之意是上德所當行也故有德之人無所不照無所不見上下中和各從其宜就其德各不失其名是爲順常長生之文莫不被榮萬物巖牙剖甲而生垂枝布葉以當衣裳霧露雪霜時雨以當飲食生長自成覆華實令給人地之長名爲水母民名爲瓜盛夏之時以當水漿天下所仰人皆食之是德人承天統成天形仰地以給民食行思布施無不被德以自飽足是天恩天所施生甚大不順命及言自然是爲逆故有德之人上知天意教民作法無失天心育養長大使得爲人復知文理行成德就可上及天士天上之事功勞有差德人主知地之事命民依仰重見恩施不能以時報之德人爲天行氣上下中央不得其所者人反輕天所施爲是正令天怒不止神靈不愛人侵奪年命反自怨非天故下神書令民不犯也人有善大恩有哀以思力自善如人久見狐疑尤惡先没用是自損日夜惶懼不知何也天生人知善惡行善有信天不欲令人有惡聞也用是欲貪生惡死亦不敢犯禁如所妨害於身也故因縁天氣與通人之辭語言身往來知人情意見其不善而退自責恐有文書汙名在其中也如人當時意加施於人誠不敢對首理委曲得耳責所施行努力自念從生來功效所進解先人承負承負除解過盡亦當上行善復惡自與命戲且言善人宜復屈意當時微苦用心不懈復後得福生言受勑受勑誠歸閑靜處思失自責言思從中出天神知之固勿倦也預知天君意所施爲者爲上第一之人可在天君左側有功勞賜賞謙遜不敢進授益復竭盡筋力用心乙宻爲大故天君重復重自面勑教人是生之福也所主衆多平心爲行是自可矣生言不敢乃望在天君左側也見活而已但思忠孝順理盡節不敢受重賜但恐無功聞人有過助其自悔檢飭所行防禁使思天意知善行善知信行信知忠行忠知順行順知孝行孝惡事無復得前也過無巨細天皆知之薄疏善之籍歲日月拘校前後除算減年爲惡不止便見鬼門地神召問其所爲辭語同不同復苦思理之理後乃服上名命曹上對算盡當太士愆流後世是非惡所致也人欲得人利人亦不欲利之善利得生惡利不久以善不久居地上也故使有天地利不平天使人爲善故生之而反爲惡鬼神疾苦安得怨乎此書故先進善退惡古今文也人命近在汝身何爲叩心仰呼天乎有身不自清當清誰乎有身不自愛當愛誰乎有身不自成當成誰乎有身不自念當念誰乎有身不自責當責誰乎復思此言無怨鬼神爲惡自負其身不負他人復知之乎行順所言可思無離於心離之爲敗不可復理與鬼同伍何得活乎念生得生人在天地間奈何忘天地恩乎此爲何等哉欲望天報當自責懇惻垂淚而行言我蒙恩得爲人與萬物殊異天使有異能言語見好醜知善惡可否之事當自詳愼所言反天辭令不奉順是爲大逆不道之人天安得久與從事乎受勑未能通達靜於閑處自省責過所負以謝天地四時五行諸部神靈天君聦聽令自思惟上古之人皆有智慮不敢犯禁自循自正恐見有失動輒爲不承命失其年壽用是之故不敢小懈過輒有罰首以是自省自愛敬重禁忌不敢違失意復見責問心常恐悸悵然喪氣負天心言小不稱是爲文煩輒考問核實所言所信可以名譽及身常念慕貪與天地四時五行共承統而行不敢有小過差真以心求進索生唯大神原省語使見四時五行生成復見日月難報想不見中棄正營之人不敢自遠惟上古聖人之爲道也乃出自然心知天上之理所施行皆預知者音聲微通還知形容自視心昭然意解知當救之事吉凶之會了然可知心内欣然乃知得天之福也使見前行之事皆戒篤達自惟蒙恩見寵大神輒見教戒使不危怠闚望四表上下通洞心中懽然復得延期并及所不聞是皆天君大神之恩力所化大神言是諸神共知延者有命録籍有真未生預著其人歲月日時在長壽之曹年數旦昇乃施名通在北極真人主之變易骨體身輕潤澤時暮得藥以成精華所在化爲無有不成出窈入㝠何所不通惟上古得道之人亦自法度未生有録籍録籍在長壽之文須年月日當昇之時傳在中極中極一名崑崙輒部主者往録姓名不得漏脫使往動揺支節屈伸轉順反覆教戒勑隨師屈折以藥飲之骨節開鍊雖不時相久者知其可堅與不堅也示之志不傾也貪生惡死思行天上之事數使往實核有歲數使知所行防禁傳示學者不問神文言自己賫書且竟神乃知相對語言之亦連歲月積千三百二十日乃將與俱見大神通元氣行自然天君簿見宻勑所案行不得有私相信惑心易意行無失誤大神言己算計諸神所假禀常以八月晦日録諸山海陵池通水河梁淮濟江湖所受出入之簿各各分明天君有所勞賜有部署天君前自復數通藏金室署有心之人令主天君所問輒當承所教宜日夜不懈屬主之人勿失所索有心之人須以定録簿當有使神主爲計名諸當上昇先時百日皆文上勿有先脫如有文書不相應計曹不舉者并坐先勑令不犯神書此書出後三歲八月乃示俗人如有道信人者大可示之天君有教言此人先時有承負勑神爲解除收藏未藏者爲藏之大神言此人貧厄空虚日久恐不自全得天君腹心乃令神收藏前之勑拜謝受恩雖日月未至諸先時一月令知之天君言下所部神將士衆甲中勿失時以藏爲作姓名令地主敬愼使有神靈往來有欲從願所求聽之來事遠惡趣善不犯所禁復得見天道所師化無不從之化者故使人主爲作羽翼開導頭尾成其所爲城郭卓然可知知上及大化并理元氣復知人事是亦有禄有命之人皆先知之隨人化可得延之期天亦愛之善神隨護使不中惡心使見善惡者不得以爲此等故天重善使得從願不侵不尅如其平殊天復增其年會此大恩也報之非以珍琦但寫心歸誠自實信不負所言是爲報也天上見善事當藏匿不與吉凶所致人惟與大聖德之人乃承元氣自然精光相感動乃爲大神悉知當所施輒當天意不失其元氣之志常行上爲大神輔相如國有公卿心知大神之指曆文書相通上章各有稱舉宜得其人使可保有言事輒用天君以事更明而得書輒下無失期輒得朝上之恩大聖當知天君所當施行之事安得有失乎世人不知以爲如民長吏安能知詔書所當道下文乎天上之事音聲遥相聞安得有隱也此在自然之中相檢如此天君日夜預知天上地下中和之間大小乙宻事悉自知之諸神何得自在乎故記首尾善惡使神疏記天君親隨月建昇斗綱傳治不失常意皆修正不敢犯之故言天遣心神在人腹中與天遥相見音聲相聞安得不知人民善惡乎天君言有善信舉之無善信下之不但天上欲得善信人也中和地下亦然人不深知當來之事故使有心者志久志久與大神同路是天之所近比如國有忠臣良吏不離左側但人不信天天何信人有二心乎白日昇天之人求生有籍者北極天君内簿有數通無心志之人何因縁得上録籍早有心志之人終得駕乘精氣爲天行事乎天地中和皆當從天恩得生而反多不信是罪之重者何可望天上諸神聞知乎言世人能自悔不避晝夜積有歲數其人可原白之天君言人自責者令有生籍之神移名壽曹百二十使有續世貧者令有子孫天以滅絶者爲惡不止轉更傷害物故令絶之惟太上有德之人各自有理深知未然自延福及子孫況其身乎惟太古善人爲行也乃預知表裏出入隂陽道其紀綱發中念之忘其理順天而行不敢有疑用是得成承奉大施思念在身行無愆負微禀自然不信不篤天乃怒之自知悔過天復教之上古得仙度世者何從惡起念之見書忠孝敬事父母兄弟和穆無爲表裏上下合同和天大禁天君爲理受命有期安得自在忠孝之心不失天地意助四時五行不敢毁當生之物惟太上仁人爲行也乃積累行於天天聽信使助東皇布置當生之物華實以給民食使温飽身形長大展轉相養隂陽接會男女成形老小相次禀命於天數二十八宿轉相成日月照察不得脫更直相生何有懈息但人不知命有短長春夏秋冬更有生死無常故使相主移轉向壽算增減轉相付受故言四時五行日月星宿皆主持人命善者增加惡者退去計過大小自有格法天上地下相承如表裏復置諸神遞相使故言天君勑命曹各各相移更爲直符不得小私上下占之有何可得逃乎惟太上善人之爲行也乃表知天地當行之事各有所主各有其辭各修其事各成其神各立其功各行其忠各理其文各施於人各道其進各得天地腹心各不失四時五行之生成乃應太上善之人天之信地之保五行之腹心不犯諸禁常念成人使樂爲善令得天地神明之意從表徹裏成功於身得入長生久視之籍得與天地大神從事從忠誠於天奉承大化故天不奪人願地不奪人安常日夜思過承負恐不稱天君之意何惜忠孝奉事上報乎惟太上有知之人乃預知天上之事當所施爲當所未行事出自然在其所爲故知善惡表裏出入所行莫不成就欽仰成神以成其功以名其德得與大神通其辭行其道進其所知惟太上有心之人各知分部各自有所道自有所行自有承奉自有所進自有所白自有所言自有所至自有所動心繫於内常思盡忠孝誠有功於天積行累歲未曾有懈而忘恩思得太上之戒以全其命何敢忘通達四隅承天所知表通未然心注念大神所進所白不敢自以心意評之常以諸神集議可承用與不常恐不得神心腹天上昌興國降逆明先師賢聖道天地喜神出助人令人壽四夷却古者無形神人也學求生道乃上與委氣同願念不失委氣之意徹照四方希聲之音出入上下皆法度群神精氣莫不自來奉承顔色恐失其意繫所屬皆懼心衣履轉成合懷施惠布恩上下流聞四方六極八表之外延及先生大恩所覆敬承奉命感動皇靈出入天地之間照達日月星辰取明於前二十八宿更宣察民用有支干吉凶有文但人少知自以爲賢動作行止無益於天禍罰絶世先祖無祠三氣不和用諫者善不者自期至地之下殃流子孫天命之爲安可逃也天有四維地有四維故有日月轉相推星有度數照察是非人有貴賤壽命長短禀命六甲生有早晚善惡異處不失銖分世人不知反爲無真和合神靈乃得稱人得神靈腹心得天應者天神舉之得地應者地神養之得中和應者人鬼祐之得善應者善善相稱得惡應者惡惡相從皆有根本上下周遍欲得性善不逆之人以爲尸民陸地之神欲得善人各施禁忌上通於天爲惡犯之自致不存吏無大小民本因縁宜明其事勿爲民所患殊能好道德仁惠與天合理與地同意與中和有意思以善神靈相覩各自有信莫欺愚者無犯天禁無犯地刑奉順四時無有殺名五行所成宜各自守夫貪生者天之所祐貪養者地之所助貪仁者人共愛之爲惡者天之所賊天知其惡使凶神惡鬼入身中流布四支頭面腹背胷脅七政上白明堂七十二色爲見是死之户也天貪人生地貪人養人貪人施爲惡其禍不救以天書告之古者神聖之言不失綱紀自有法度人不可輕犯禁忌古之所得道太平但承奉天法不犯禁忌即太平臣民矣天有無貲之糧無貲之衣有功復進即得禄矣上古之時神聖先知來事與天共理分布四方上下中央各有部署上下相望不肅而成皆爲善恐不稱天心天有教使奔走而行皆持簿書不動自齊恐有勘問動有規矩得其所行春行氣夏成長秋收使民得以供祭冬藏餘糧得以相續旣無懈時神靈所施莫不被榮恩及蚑行草木亦然各得其所故令有財之家假貸周貧以陳歸新使得生成傳乎子孫神靈所護是非大忌天地四時五行衆神吏直人命禄不可敬重念報其恩急以此文付有德之君令知天之愛人而人反不愛乎洞極之經名曰太平行者得福不者自令極思聚身無離常報應不枉久所不及施惡於人人無貴賤皆天之所生愛之愼之念之愼勿加所不當而枉人侵尅非者天所不報地所不養凶神隨之不得久生禱祭之神益怒見善當進見惡當退何有所疑行各自力無爲神所誤所居不安去故就新神復得還惟天地亦因始初乃成精神承奉自然生化所化莫不得榮因有部署日月星機衡司候並使五星各報其方各行其事雲雨布施民憂司農事元氣歸留諸草木蚑行端息蠕動皆含元氣飛鳥走獸水中生亦然使民得用奉祠及自食萬民不往用者聽禽獸食之今之惡民殺不當懷妊胞中當生反死絶其命以紿其口當殺之時皆恐懼故天誠念之憐愍爲施防禁犯之坐之六畜尚愛不忍中傷人反不自惜更爲逆虜所取非一雖不即誅者將積其過殺敗不止滅户下流未生者亦不得逢吉鬼神惜之司候在前有何脫時故記善惡之重真人以此文亦衆民義恐隱藏隨俗文字分明行之故取信於天取信於地取信於中和取信於五行是皆天所報信也不失銖分知之乎乃委氣自然之服化也三台七星輔正天威日月照察是非使各有自然之報復申勑諸所部主各令分明受罰不怨此之謂也灾害之書三甲子復見理不如十諫令知耳且念活求知賢聖有知可及矣聖人當升賢復求生不惡復次之神仙之録在此北極相連崑崙崑崙之墟真人上下有常主録籍之人姓名相次高得高中得中下得下先生爲師尊之爲君稱之爲父故師君父不可不明臣不可不忠弟子不可不順敬從其上故天不忘先生之恩地不忘先生之養人不忘先生之施天以三光下照中和及地下無有懈息無德之國隂氣蔽日令無光人民恐懼穀少滋息水旱無常民復流離有穀之鄉天實憐之令至活鄉處有明君國得昌流客還耕農休廢之地諸穀得下生成熟民復得糧更奉先祖鬼神得安中有聖智求索神仙簿書録籍姓名有焉當復爲天之吏按行民間調和風雨使得安政以此書亦後生焉故當作善有益於天自爾之後可戒子孫延年之期可不及焉書復重天大愛人欲使得竟天年丁寧反覆屬於神善者録上惡者忘其名無違此書思著其心天上有文求生根也人所願故挺此文有過自悔按此文也神靈在汝前後無懈時也太平氣俱至人民但日相向而遊具樂器以爲常因以相和相化上有益國家使天氣調利天下被其德教而無咎和與不和以爲效乎得天地意者天地爲利人法之其悅喜得天地人利悅萬物無疾病君臣爲之常喜是正太平氣至具樂之悅喜也是故樂而得大角上角之音者青帝大喜則仁道德出凡物樂生肝氣爲其無病肝神出東方惡者悉除去善者悉前助化青衣玉女持竒方來賜人是其明效也中角音得則水化中也下角得以化下也南方徴之音大小中悉利則悉樂長也南方道德莫不悅喜惡者降去善者悉前赤氣悉喜赤帝來遊心爲其無病心神出見候迎赤衣玉女來賜人竒方是其效也故得黄氣宫音之利亦宫音善者悉來也惡者悉消去得商音之利商音善者悉來也惡者悉消去得羽音之利羽音善者悉來也惡者悉消去真人詳思此意所致太平也所以不悉說五方者謂大深上士見之自得其意以一承萬得之恐其大喜也小人得之或妄語也故不悉露見使各思其意上士且自以一承萬通知其意中士亦且綝綝幾知之下士得之反妄語也是故纔成慮小舉其綱見其事以示凡人使思其意則可上下通達而無過故上士治樂以作無爲以度世中士治樂乃以和樂俗人以調治下士治樂纔以樂人以召食此三人者各諭意太平氣至聽其所爲從其具樂琴瑟愼無禁禁則樂氣不出治難平難平則氣鬥訟而多刑夫樂者致樂刑者致刑猶影響之驗不失銖分也凡樂者所以止怒也凡怒者所以止樂也此兩者相代是故樂則怒止怒則樂止故怒者乃生刑罰鬥之根也喜樂者乃道德之門也故當從之使生道德之根勿止之也止之反生刑禍之門也此者吉凶之所出安危之所發也故樂者陽也刑者隂也隂之與陽乃更相反陽衰則隂興隂興則陽衰陽者君也隂者臣也君盛則臣服民易理臣盛則君理侮亂此天自然之法也故當從其君樂也以厭其民臣止其數怒也下古之人人愚不深知其意反多斷絶之故使隂氣盛陽氣衰陽氣盛則多盜賊罪人不絶萬物不生也多被隂害大咎在此君氣盛則致延年益壽君樂則五方道德出悉怒則五方惡悉出故大樂者善應出不樂者惡應出自然之理可深戒哉吾書中善者悉使青首而丹目何乎吾道乃丹青之信也青者生仁而有正赤者太陽天之正色也吾道太陽仁政之道不欲傷害請問今太平上皇氣具至天土理何所先後豈可聞乎今天上爲法也樂者順之以樂苦者順之以苦天上之爲法如此矣乃太平氣至故天上從其樂以順奉之大急兵杖而斷刑罰地上亦然樂者陽也天之經也兵杖刑罰者隂也地之怒也隂興必傷陽化今太平氣至乃天與神兵共治故斷刑罰兵杖爭訟令使察察萬世不復妄也皆如日月不可久蔽藏也元氣自然樂則合共生天地悅則隂陽和合風雨調風雨調則共生萬二千物凡物樂則竒瑞應俱出生萬物之應精上著天三光更明察察也三光樂而合則四時順行春樂生夏樂長秋樂收冬樂藏四時樂喜五行不逆則人民興人民興則帝王壽帝王壽則凡民樂凡民樂則精物鬼邪伏矣精邪伏則無天病死之人無夭傷人則太平氣至矣萬國不戰鬥盜賊貪猾絶矣天地六萬神俱樂喜也天地真仙人出天地真仙人出則正氣悉見而邪氣悉藏惡人悉坐自思矣善人行矣神人筴書盡出而邪僞文亡矣人莫不悅樂喜隂陽和合同心爲一家傳相生凡事樂者無有惡也凡隂陽樂則生之始也萬物所受命而起也皆與人相似男女樂則同心共生無不成也不樂則不肯相與歡合也怒不樂而强歡合後皆有凶今吾之文纔舉其大綱見其始以樂化之爲不善安可勝記也已知樂之善未及不樂之禁復爲開其綱紀怳惚不樂不肯并力合心而共生元氣著自然也元氣自然不樂分爭不能合身和德而共生天地也天地不樂隂陽分爭不能合氣四時五行調風雨而盛生萬二千物萬二千物不樂爭分多傷死其歲大凶凡事不樂爭分三光爲之失明帝王愁苦萬民流亡也善氣蔽藏惡氣行也正神遠去鬼物興也萬物人民夭死無有年也萬二千國分爭不樂刑罰大起兵革揚也樂斷廢也則刑大起六方不和則日日凶也天氣不調正從此起而人不知其所由反歸過以罪上而責帝王不得其大過反下責上盡逆氣何能致太平反致凶故刑氣日興樂者絶亡咎在中古以來師教時時有設者反開列兵之門閉其樂户故使邪奸得起不可卒止大咎在此故今天上洞平氣至大縱樂除刑罰也地上亦然吾不能勝記縱樂之爲善也縱樂之爲惡也是故隂陽之道從天上盡地下旁行無窮極牝牡之屬相嬉相樂然後合心共生成共爲理傳天地之統御無極之術設使不相嬉不肯合心爲一肯共生共成共爲理共傳天地之統御無窮之術力以刑罰威而合之久久猶敗相背分爭隂陽相尅賊害不可禁止也正使父子子母夫婦極親會相害也共亂天道斷無世也其大過所致如此矣樂爲天之經太陽之精孝爲地之經太隂之精故樂者倡始倡生倡合樂成功天者常嬉善嬉生故常與天合與同氣也樂合乃能相生當有上下故樂爲天爲上孝爲下象地地者下承順其上隂事其陽子事其父臣事其君君上事天地亦事天天事其上故與地同氣故樂與孝最順天地也易者理隂陽氣八風爲節與六甲同位隂陽同體與天地連身故爲神道也刑者絶洞隂戰不和之氣也故常隨隂節而起刑者得隂而劇得春夏而服得秋冬而興盜賊得夜而起奸邪得幽㝠間處而作鬼物諸病得㝠而發怨咎得險狹而聚相殺也此則不樂從刑之大徴可不愼乎愚生畏之子知畏之壽之徴也不知畏之禍之門也戒子愼之是故天上爲政各縱樂以爲化本人人使俱自樂相化坐思其過得失莫爲善易哉天上爲政如此也地上亦然故理欲疾平者務斷分爭刑罰倡樂爲先皇平之氣立至矣請問天上太平氣自時來至也人皆當自化爲善萬物自當平安無病令天上爲法何故反以人倡之作樂以相化乎凡事在其先導之教之善惡是化之先也開蒙愚之門也故天將有可爲皆先倡其先其象見於天神文出古者聖人象之爲作意故上三皇乃教化以道其人民盡有道物亦然五帝教化多以德其人民多類經德也物亦然三王教化多以文其人民多文物亦然五霸教化多以武其人民多悉武好怒尚强勇此非悉化之首也故善人之鄉者多善人惡人之鄉者多惡人此非相易也凡天上天下之事各自有師法各象其師法而所化悉相類似天者好生興物物不樂不肯生今天上皇平洞極之氣俱出治陽精昌興萬物莫不樂喜故當象其氣而大縱樂以順助天道好是則天道大喜今帝王理平人民壽故其縱樂以奉天道又使各坐思自化何有各乎又樂者天也陽精也陽與則隂精伏猶如春夏起秋冬伏自然之式也真人務順吾書言刑自絶爲化如此與神無異故理難平化失之耳今天道自有衰盛吉凶何反言師化之首乎天地不與人語也故時時生聖人生聖師使傳其事此主天時且吉樂故生善師使善言善化天道將亂凶衰則生惡師使教化惡也是主化天道且自善自惡之徴也者夫且樂歲生善物多五穀成以食人其人好善天且惡歲生惡物多善者少以惡物食人其人色惡是其化人之師明徴也故善師出惡師伏是天盛衰之徴是主天也今天道大周故使吾下善說真人善事樂其化爲上善故以第一事教之天周備其事具者必樂子知其意若人物周遍有其家爲其樂今天周遍有何不樂而曰凶乎此書萬世不改天上之化如此矣五音樂當所動發前後得天地人心意以致太平除灾奸致和氣夫心同意合皆爲大樂也苦心異意皆爲乖錯悉致苦氣也夫樂者何必歌舞衆聲相和也苦者何必致鬥爭衆凶禍並起相樂者所以厭斷刑也相愁苦者所以致逆也其相順同心何謂乎凡人大小能同其意者必樂也幾類之哉宜復更自精詳其意天上皇平洞極之師爲天加一言重解决其意也然未欲大得天地之心意有益於帝王政理者乃當順用天地之心意不可逆太歲諸神同舍其氣與帝王用事同喜同心同指同方同運同樞同根同意故古者聖人陳法使帝王春東方夏南方秋西方冬北方者主與此天氣共事也同故相迎是爲順天之道與天同氣故相承順天地長喜悅不戰怒則灾害奸邪凶惡之屬絶矣乃致太平氣天上平氣得下理地下平氣得上升助之也樂者乃舉聲歌舞王氣者宜動揺見樂相奉順見奉助也休囚死氣皆安靖不欲見動揺即不悅喜則戰怒則生凶惡奸邪灾害矣乃是自然天地之格性萬不失一也當動揺帝王之氣其次動王氣其次動相氣其次動休氣其次動死囚氣此氣皆在天斗前日進欲見助興故動之其餘氣皆在天斗後氣所背去日衰故不宜興動與天地反逆不合天地之心故天之所向者興之天之所背者廢之是知天時吉凶可知也請問今純動五音不足不成歌舞之曲如何但動帝王之氣得勝教令聲音響先發是乃比若夫帝王得先發號令於天下則凡人萬物悉隨之而從天下和平矣五音各有所引動或引天或引地或引日月星或引四時五行或引山川或引人民萬物音動者皆有所動揺各有所致是故和合得其意者致善不得其意者致惡萬物精神悉先來朝乃後動其形體故動樂音常當務知其事審得其意太平至矣春者先動大角弦動引動歲星心星下則引動東嶽氣則揺少陽音則木行神則揺勾芒禽則動蒼龍位則引青帝神則引青衣玉女上洞下達莫不以類來朝樂其聲也說一已來類無窮極也自精詳索其要意悉自得也與凡書文合之爲法式也故舉樂得其上意可以度世得中意者可致平除凶害也得下意者可以樂人復德上意者可樂神靈也得中意者可以樂精靈得下意者可樂身俱得其意上帝王可遊而無事樂而刑斷精神明厭也樂者太陽之精刑者太隂之精陽盛則隂伏隂盛則陽伏故樂盛刑絶陽者動而有音聲隂者無聲故刑多以隂害人古者聖人將從樂者隨天意亦隨地意順之者吉逆之凶故天三氣上氣稱樂中氣稱和下氣稱刑故樂屬陽刑屬隂和屬中央故東南陽好生西北隂好殺和氣隨而往來一藏一見主辟害也夫音者是樂之語譚也占遠占近皆當合時日姓字分書境界王相休廢更相取合以爲譚語聽之無失也夫天道比若循環周而復始常以時加其王氣建向斗所加方向其面動其音聲人倡之亦可以其音爲之數以六甲五行即天地之數也時氣者即天地之所向所興爲也今立春之日日斗加寅名爲上帝之時先動大角月半加甲二月加卯月半加乙三月加辰他皆倣此各次其時氣晏早爲度數先動帝音帝弦王音王弦次動相音相弦各如其數此名承天順地之氣天地乃樂用之而況於人乎人者最物之尊者天之所子也天乃樂人嚴敬用其數地乃樂人謹用其數此猶比孝子之順父母之教父母安能不愛而好之乎深思其意付告下古之人使象而爲之以除辟灾害上安天地之氣下以助帝王爲理今凡人心安不爲邪萬二千物各得其所豈不樂哉請問六洞八方之事最何等爲吉最何等爲凶最相善爲吉相逆爲凶爲惡相逆爲善相順故帝王之氣相氣微氣皆在天斗前吉事也天氣所樂欲興起也故當樂而順之休廢之氣故天地共休廢之故當廢之不宜興樂興樂即逆天地心名爲大逆不順時氣天道爲法王相之氣主太平也囚廢絶主凶年太平歲凡物具生多善物是其證也天地大效驗也故古聖賢以是深自占相順而行之明以同類同事同氣占相之得其象則改性易行不敢爲非也天地之語言以此爲效視象類所得可知矣故凶歲少善應故將太平者具樂者當順王氣凶年無故不可作樂囚廢氣與天地反逆故凶也王氣德所居也囚廢刑所居也天之授性各有精神樂善善精神至樂惡惡精神至故爲自然之性也一曰先順樂動天地四時帝氣一事加三倍以樂天今天大悅喜帝王壽夭惡滅灾害悉除去太陽氣不戰怒國界安而知常先動順樂之者天道爲人興真神爲出幽隱穴居之人皆樂來助政二曰先順動天地時王氣再倍以樂地氣大悅不戰怒令王者壽奸猾盜賊兵革消國界興善下悉樂承順其上中賢悉出助國理地神順養三曰先順動相氣微氣令中和之氣大喜悅君臣人民順保其處則佞盜賊不作境界保故和氣日興萬物好善四曰愼無動死破之氣致劇盜賊又多卒死者國界常危難安致邪氣鬼物甚多爲害甚劇五曰無動囚廢氣致大凶惡六曰無動衰休之氣大凶惡所以三倍帝氣樂弦者帝氣最尊無上象天尊故倍樂之萬二千物俱生善氣悉應所以再樂相氣樂弦者相氣象地地與人并居故再倍其樂地地也與人并人見皆悅喜而萬物并理所以樂相氣微氣一行者象中和人夫中和人卑于天地故樂少人者主爲天地理萬物人樂則悅喜爲善萬物理矣帝氣樂三皇象之如天也王氣樂五帝法之象地好德養物而時復刑也微氣者三王象之無常法衰囚亡之氣五霸象之其氣亂天地之有武以誅惡而遵善可深察之令真人積善又賢事事通今天上皇洞太平氣具至今太上欲有可急得今天上樂得善人可調風雨而具生萬物者開闢已來爲善者少少能中天意天常以是爲憂患而今地上人少中天上可永者大天之下萬二千國皆隨水土不相類也夫善人上付于天萬物之精光者上屬于天中者付于人使仕順隂陽萬物也下者付于土使步行而作事也道者乃皇天之所取法也最善之稱冠無上包無裏出無間入無孔天下凡事之師也生端百萬事之長古今賢聖得長全帝王得天心以自安民之父母凡化所從起也天道乃天也清且明不欲見污辱也今之爲道皆爲四毁之行天污辱皇天之神道並亂地之紀記不可爲化首不可爲師法不可爲父母俱共毁敗天之寳器名爲大返叛之子故天上深知疾咎之也洞上皇平氣至不能容此四人第一不孝第二能性真而無後類也第三日食糞飲其小便第四行爲乞者故四人皆共污辱天正道非所興化也帝王以愚者爲理天將大限矣何以明之人君與之爲理天爲其多灾變怪夷狄數來是明天限惡之證也與重規合矩券書何異哉人所惡天亦惡之人所愛天亦愛之是故古者聖賢覩大意深故常象天而爲行不敢失銖分也故能常獨與天厚得天心也若不得天心乃大凶矣天上揀士乃與天共事治無窮極之術也長相與併士乃與天共事治無窮極之術也長相與併力同心調氣故能長久矣今天乃貴重傳相生故四時受天道教相生成無有窮極也故天者稱父地者稱母因六甲十二子八卦之氣以爲紀更相生轉相使故天道常在不毁敗是常行施化之助也故學者當象天爲法無絶天統今天乃清明道乃清白天與道最居上爲人法清明者好清明故三光上著天各從其類合而爲形天之爲形比若明鏡皆若人有而目洞照不欲污辱也常欲得鮮明帝王將興皆得師道人愛其榮智以化其民師之所貴爲能知天心意象而行化地上善即天上善地上惡即天上惡故人爲善于地上天亦應之爲善人爲惡于地上天亦應之爲惡乃氣上通五氣相連上下同六申相屬上下洞十二子上下著無有遠近皆通下善上通下惡上凶五行興于下五星明于上此者天所曉於天下人也天上皆何所喜何所禁唯得其禁唯得戒誠日夜思惟其意不敢犯之以示後生今天上乃上皇平氣俱至興盛陽日先明邪氣止休止氣遂行衰者消去道德陽天上急禁絶火燒山聚木之鄉者山太陽也土地之綱是其君也布根之聚木是其長也亦是君也火五行之長陽也三君三陽相逢反相衰是故急禁斷火燒山林聚木不燒則興多興多則火王火王則日月丙丁巳午悅其母盛多則其子受氣長久故天上止之也隂盛則隂奸日消陽衰則隂奸日起此自然之法也請問三陽相得何故凶乎夫三陽者天陽人陽土陽三陽也無一隂三盡君也無一臣三盡男也無一女名爲滅亡之路無後之道無後之道不能復傳類不能復相生故成凶也是爲有天而無地有日而無月有上而無下有表而無裏天上名爲立敗之紀請問田草可燒否天上不禁也燒也當燒獨何故燒之乎草者木之隂也與乙相應木與甲相應甲者陽也與木同類故相應乙者隂也與草同類故相應乙者畏金金者傷木木傷陽衰陽衰則姦起故當燒之乙隂也草隂也地隂也三隂相反共生姦故云歲居北極隂中隂極生陽火者陽也隂得陽而順生善事故天上相教燒下田草以悅隂而順陽也二人共職共理隂陽除天地之病令帝王不愁苦萬二千物各得其所草木悅喜而出無有冤結今天上良善平氣至常恐人民有犯時令而傷之也天上諸神共記好殺傷之人畋射漁獵之子不順天道而不爲善常好殺傷天咎之地惡之群神非之共記而拷之三年一中拷五年一大拷過重者則坐小過者減年奪算三世一大治五世一大滅之故今天上集三道行文書群神共記過殺傷刑罰也甲子天正也日以冬初還反乙丑地正也物以布根丙寅人正也平旦人以初起開門就職此三者俱天地人初生之始物之根本也初生屬陽者本天地之元氣故乾坎艮震在東北之面其中和在坎艮之間隂陽合生於中央故凡懷妊者皆中腹而居微在中和之下生於隂中隂故稱母不可使刑氣居中央今者天道大周更始以上下純陽治天地故急斷刑罰天者稱神陽亦稱神今往犯吾書好刑者天上拷之故神聖之法乃一從心起無不解說故赤之盛者爲天爲日爲心天與日常明無不照察行此道者姦邪之屬悉絶矣夫陽之生者於幽㝠之中是故陽氣起於北而出東盛於南而衰消於西天之爲法如此太平氣至誰者當宜道哉誰者不當道哉夫道與人比若風雨爲者則善不爲者則已爲好者則其人也不爲好即非其人也爲者不用力易開通者即是其人也不開通終日無成功即非其人也爲之即吉不爲則凶凡人自養可不詳察夫道正人之符也太平經鈔庚部卷之七
