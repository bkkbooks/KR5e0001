body:
  text: 太平經鈔乙部合陰陽順道法還年不老大道將還人年皆將候驗瞑目還自視正白彬彬若且向旦時身為安著席若居溫蒸中於此時筋骨不欲見動口不欲言語每屈伸者益快意心中忻忻有混潤之意鼻中通風口中生甘是其候也故順天地者其治長久順四時者其王日興道無奇辭一陰一陽為其用也得其治者昌失其治者亂得其治者神且明失其治者道不可行詳思此意與道合同錄身正神令人自知法天之使道生人也且受一法一身七縱橫陰陽半陰半陽迺能相成故上者象陽下者法陰左法陽右法陰陽者好生陰者好殺陽者為道陰者為刑陽者為善陽神助之陰者為惡陰神助之積善不止道福起令人日吉陽處首陰處足故君貴道德下刑罰取法於此小人反下道德上刑罰亦取法於此故人乃道之根柄神之長也當知其意善自持養之可得壽老不善養身為諸神所咎神叛人去身安得善乎為善不敢失繩纏不敢自欺為善亦神自知之惡亦神自知之非為他神乃身中神也夫言語自從心腹中出傍人反得知之是身中神告也故端神靖身乃治之本也壽之徵也無為之事從是興也先學其身以知吉凶是故賢聖明者但學其身不學他人深思道意故能太平也君子得之以興小人行之以傾脩一卻邪法天地開闢貴本根乃氣之元也欲致太平念本根也不思其根名大煩舉事不得災並來也此非人過也失根基也離本求末禍不治故當深思之夫一者乃道之根也氣之始也命之所繫屬眾心之主也當欲知其實在中央為根命之府也故當深知之歸仁歸賢使之行人之根處內枝葉在外令守一皆使還其外急使治其內追其遠治其近守一者天神助之守二者地神助之守三者人鬼助之四五者物祐助之故守一者延命二者與凶為期三者為亂治守四五者禍日來深思其意謂之知道故頭之一者頂也七正之一者目也腹之一者臍也脈之一者氣也五藏之一者心也四肢之一者手足心也骨之一者脊也肉之一者腸胃也能堅守知其道意得道者令人仁失道者令人貪以樂卻災法以樂治身守形順念致思卻災夫樂於道何為者也樂乃可和合陰陽凡事默作也使人得道本也故元氣樂即生大昌自然樂則物強天樂即三光明地樂則成有常五行樂則不相傷四時樂則所生王王者樂則天下無病蚑行樂則不相害傷萬物樂則守其常人樂則不愁易心腸鬼神樂即利帝王故樂者天地之善氣精為之以致神明故靜以生光明光明所以候神也能通神明有以道為鄰且得長生久存夫求道常苦不能還其心念今移風易俗趨其心指誰復與之爭者太平樂乃從宮中出邪固以清靖國安身入道夷狄卻神瑞應來懸象還凶神往夫人神乃生內返遊於外遊不以時還為身害即能追之以還自治不敗也追之如何使空室內傍無人畫象隨其藏色與四時氣相應懸之窗光之中而思之上有藏象下有十鄉臥即念以近懸象思之不止五藏神能報二十四時氣五行神且來救助之萬疾皆愈男思男女思女皆以一尺為法隨四時轉移春青童子十夏赤童子十秋白童子十冬黑童子十四季黃童子十二二十五神人真人共是道德正行法陽變於陰陰變於陽陰陽相得道乃可行天須地乃有所生地須天乃有所成春夏須秋冬晝須夜君須臣乃能成治臣須君乃能行其事故甲須乙子須丑皆相成作道治正當如天行不與人相應皆為逆天道比若東海居下而好水百川皆歸之因得其道鯨魚出其中明月珠生焉是其得道之效也道人聚者必得延年奇方出大瑞應之眾賢聚致治平眾文聚則治小亂五兵聚其治大敗君宜守道臣宜守德道之與德若衣之表裏天不廣不能包含萬物萬物皆半好半惡皆令忍之人君象之次皇后後宮之象也此二者慈愛父母之法也故父母養子善者愛之惡者憐之然後能和調家道日象人君月象大臣星象百官眾賢共照萬物和生故清者著天濁者著地中和著人調神靈法吾欲使天下萬神和親不復妄行害人天地長悅百神皆喜令人無所苦帝王得天之力舉事有福豈可間哉故聖人能守道清靜之時旦食諸神皆呼與語言比若今人呼客耳百神自言為天吏為天使群精為地吏為地使百鬼為中和使此三者陰陽中和之使也助天地為理共興利帝王守一明法守一明之法長壽之根也萬神可祖出光明之門一精明之時若火始生時急守之勿失始正赤終正白久久正青洞明絕遠復遠還以治一內無不明也百病除去守之無懈可謂萬歲之術也守一明之法明有日出之光日中之明此第一善得天之壽也安居閑處萬世無失守一時之法行道優劣夫道何等也萬物之元首不可得名者六極之中無道不能變化元氣行道以生萬物天地大小無不由道而生者也故元氣無形以制有形以舒元氣不緣道而生自然者乃萬物之自然也不行道不能包裹天地各得其所能使高者不知危天行道晝夜不懈疾於風雨尚恐失道意況王者乎三光行道不懈故著於天而照八極失道光滅矣王者百官萬物相應眾生同居五星察其過失王者復德德星往守之行武武星往守之行柔柔星往守之行強強星往守之行信信星往守之相去遠應之近天人一體可不慎哉行道有優劣法春王當溫夏王當暑秋王當涼冬王當寒是王德也夫王氣與帝王氣相通相氣與宰輔相應微氣與小吏相應休氣與後宮相同廢氣與民相應刑死囚氣與獄罪人相應以類遙相感動其道也王氣不來王恩不得施也古者聖王以是思道故得失之象詳察其意王者行道天地喜悅失道天地為災異夫王者靜思道德行道安身求長生自養和合夫婦之道陰陽俱得其所天地為安天與帝王相去萬萬餘里反與道相應豈不神哉名為神訣書元氣自然共為天地之性也六合八方悅喜則善應矣不悅喜則惡應矣狀類景象其形響和其聲也太陰太陽中和三氣共為理更相感動人為樞機故當深知之皆知重其命養其軀即知尊其上愛其下樂生惡死三氣以悅喜共為太和乃應並出也但聚眾賢唯思長壽之道乃安其上為國寶器能養其性即能養其民夫天無私祐祐之有信夫神無私親善人為效一身之中能為賢能為神能為不肖其何故也誤也神靈露也故守一之道養其性在學之也眾中多瑞應者信人也無瑞應者行誤人也占而是非即可知矣夫斤兩所察人情也天之照人與鏡無異審詳此意與天同願與真神為其安得不吉哉成事不失銖分欲得天地中和意故天地調則萬物安縣官平則萬民治故純行陽則地不肯盡成純行陰則天不肯盡生當合三統陰陽相得乃和在中也古者聖人治致太平皆求天地中和之心一氣不通百事乖錯和三氣興帝王法通天地中和譚順大業和三氣游王者使無事賢人悉出輔興帝王天大喜真人問神人曰吾欲使帝王立致太平豈可聞邪神人言但大順天地不失銖分立致太平瑞應並興元氣有三名太陽太陰中和形體有三名天地人天有三名日月星北極為中也地有三名為山川平土人有三名父母子治有三名君臣民欲太平也此三者常當腹心不失銖分使同一憂合成一家立致太平延年不疑矣故男者象天故心念在女也是天使人之明效也臣者為地通譚地者常欲上行與天合心故萬物生出地即上向而不止雲氣靡天而成雨故忠臣憂常在上汲汲不忘其君此地使之明效也民者主為中和譚中和者主調和萬物者也中和為赤子子者乃因父母而生其命屬父其統在上託生於母故冤則想君父也此三乃夫婦父子之象也宜當相通辭語并力共憂則三氣合并為太和也太和即出太平之氣斷絕此三氣一氣絕不達太和不至太平不出陰陽者要在中和中和氣得萬物滋生人民和調王治太平人君天也其恩施不下至物無由生人不得延年人君之心不暢達天心不得通於下妻子不得君父之敕為逆家也臣氣不得達地氣不得成忠臣何從得助明王為治哉傷地之心寡婦在室常苦悲傷良臣無從得前也民氣不上達和氣何從得興中和乃當和帝王治調萬物者各當得治今三氣不善相通太平安得成哉安樂王者法君者當以道德化萬物令各得其所也不能變化萬物不能稱君也比若一夫一婦共生一子則稱為人父母亦一家之象無可生子何名為父母乎故不能化生萬物者不得稱為人父母也故火能化四行自與五故得稱君象也本性和而專得火而散成灰金性堅剛得火而柔土性大柔得火而堅成瓦水性寒得火而溫火自與五行同又能變化無常其性動而上行陰順於陽臣順於君又得照察明徹分別是非故得稱君其餘不能也土者不即化久久即化故稱后土三者佐職臣象也道無所不能化故元氣守道乃行其氣乃生天地無柱而立萬物無動類而生遂及其後世相傳言有類也比若地上生草木豈有類也是元氣守道而生如此矣自然守道而行萬物皆得其所矣天守道而行即稱神而無方上象人君父無所不能制化實得道意地守道而行五方合中央萬物歸焉三光守道而行即無所不照察雷電守道而行故能感動天下乘氣而往來四時五行守道而行故能變化萬物使其有常也陰陽雌雄守道而行故能世相傳凡事無大無小皆守道而行故無凶今日失道即致大亂故陽安即萬物自生陰安即萬物自成陰陽治道教及其臣化流其民受命於天受體於地受教於師乃聞天下要道守根者王守莖者相守浮華者善則亂而無常帝王天之子也皇后地之子也是天地第一神氣也天地常欲使樂不得愁苦憐之如此天地之心意氣第一者也故王者愁苦四時五行氣乖錯殺生無常也懸象還神法夫神生於內春青童子十夏赤童子十秋白童子十冬黑童子十四季黃童子十二此男子藏神也女神亦如此數男思男女思女皆以一尺為法畫使好令人愛之不能樂禁即魂神速還解承負訣天地開闢已來凶氣不絕絕者而後復起何也夫壽命天之重寶也所以私有德不可偽致欲知其寶乃天地六合八遠萬物都得無所冤結悉大喜乃得增壽也一事不悅輒有傷死亡者凡人之行或有力行善反常得惡或有力行惡反得善因自言為賢者非也力行善反得惡者是承負先人之過流災前後積來害此人也其行惡反得善者是先人深有積畜大功來流及此人也能行大功萬萬倍之先人雖有餘殃不能及此人也因復過去流其後世成承五祖一小周十世而一反初或有小行善不能厭囹圄其先人流惡承負之災中世滅絕無後誠冤哉承負者天有三部帝王三萬歲相流臣承負三千歲民三百歲皆承負相及一伏一起隨人政衰盛不絕今能法此以天上皇治而斷絕深思之而勿忘凡人有三壽應三氣太陽太陰中和之命也上壽一百二十中壽八十下壽六十百二十者應天大歷一歲竟終天地界也八十者應陰陽分別八偶等應地分別應地分別萬物死者去生者留六十者應中和氣得六月遁卦遁者逃亡也故主死生之會也如行善不止過此壽謂之度世行惡不止不及三壽皆夭也胞胎及未成人而死者謂之無辜承負先人之過多頭疾者天氣不悅也多足疾者地氣不悅也多五內疾者是五行氣戰也多病四肢者四時氣不和也多病聾盲者三光失度也多病寒熱者陰陽氣忿爭也多病憒亂者萬物失所也多病鬼物者天地神靈怒也多病溫而死者太陽氣殺也多病寒死者太陰氣害也多病卒死者刑氣太急也多病氣脹或少氣者八節乖錯也今天地陰陽內獨盡失其所故病害萬物帝王其治不和水旱無常盜賊數起反更急其刑罰或增之重益紛紛連結不解民皆上呼天縣官治乖亂失節無常萬物失傷上感動蒼天三光勃亂多變列星亂行故與至道可以救之者也吾知天意不欺子也天威一發不可禁也獲罪于天令人夭死初天地開闢自太聖人各通達于一面誠真知之不復有疑也故能各作一大業令後世修之無有過誤也故聖人尚各長于一大業不能必知天道故各異其德比若天而況及人乎天地各長于一故天長于高而清明地長于下而重濁中和長養萬物也猶不能兼而況凡人乎亥為天地西北極也巳為天地東南極也亥寒不以時收閉來年巳反傷子乃天地之北極也午為天地之南極也子今冬不善順藏午反承負而亡也丑乃天地東北極也未乃天地西南極也丑不以時且生六月反被其刑天地性運皆如此矣今帝王居百重之內其用道德仁善萬里百姓蒙其恩父為慈子為孝家足人給不為邪惡帝王居內失其道德萬里之外民臣失其職是皆相去遠萬萬里其由一也習善言不若習行于身也闕題真人問神人吾生不知可謂何等而常喜乎神人言子猶觀昔者博大真人邪所以先生而後老者以其廢邪人而獨好真道真道常保而邪者消凡人盡困窮而我獨長存即是常喜也昭昭獨樂何忿之哉卒為不能長生當奈何神人言積習近成思善近生夫道者乃無極之經也前古神人治之以真人為臣以治其民故民不知上之有天子也而以道自然無為自治其次真人為治以仙人為臣不見其民時將知有天子也聞其教敕而尊其主也其次仙人為治以道人為臣其治學微有刑被法令彰也而民心動而有畏懼巧詐將生也其次霸治不詳擇其臣民多冤而亂生焉去治漸遠去亂漸近不可復制也是故思神致神思真致真思仙致仙思道致道思智致智聖人之精思賢人致賢人之神來祐之思邪致愚人之鬼來惑之人可思念皆有可致在可思者優劣而已故上士為君乃思神真中士為君乃心通而多智下士為君無可能思隨命可為闕題真人問何以知帝王思善思惡邪神人言易知邪帝王思仁善者瑞應獨為其出圖書獨為其生帝王仁明生于木火武智生于金水柔和生土天之垂象無誤者也真人問古者特生之圖奇方誰當得者乎其吏民得之獻王者帝王者時氣即為和良政治益明道術賢哲出為輔弼之帝王之道日強盛矣夷狄滅息垂拱而治刑罰自絕民無兵革帝王思善之證可不知哉不覩其人已知之矣真人問神人何以能知此乎神人言以無聲致之君欲仁好生象天道也臣欲柔而順好養法地道也即善應出矣故天地不語而長存其治獨神神靈不語而長仙皆以內明而外闇故為萬道之端夫神靈出入無有穴窠清靜而無聲安枕而臥神光自生安得不吉樂之哉夫用口多者竭其精用力多者苦其形用武多者賊其身此者凶禍所生也子慎吾之言不可妄思思之善或有德思之惡還自賊安危之間相錯若髮髻子戒之無雜思也夫人失道命即絕審知道意命可活勉養子精無自煎也學得明師事之禍亂不得發也真人不敢失神人之辭也神人言夫學者各為其身不為他人也故當各自愛而自親學道積久成神真也與眾絕殊是其言也真人問何以知道效乎神人曰決之於明師行之於身身變形易與神道同門與真為鄰與神人同戶求之子身何不覩患其失道意反求之四野索之不得便至窮老矣遂離其根言天下無道也常獨愁苦離其根是為大災大人失之不能平其治中士失之亂其君仁人失之無從為賢小人失之滅其身古之賢聖所行與今同耳古之小人所窮亦與今同耳明證若此真人問何以知人將興將衰乎神人言大人將興奇文出賢者助之為治家人將興求者得生其子善可知矣真人問何以致是賢者神人言皆以思也精思不止其事皆來神哉道之為治可不力行哉神人言三綱六紀所以能長吉者以其守道也不失其治故常吉天之壽命不奪人之願木性仁思仁故致東方東方主仁五方皆如斯也天下之事各從其類故帝王思靖其治亦靜以類召也古之學者效之於身今之學者反效之於人古之學者以安身今之學者浮華文不積精於身反積精於文是為不知其根矣
