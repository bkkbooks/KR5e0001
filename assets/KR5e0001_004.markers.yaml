  - {type: variant, offset: 21381, length: 389, content: 根也夫天將生人悉以真道付之物具故在師開之導之學之則可使無不知也不闓其門戶雖受天真道無一知也比若嬰兒生投一室中不導學以事無可知也所以人異者但八方異俗故其知學不同也若能一人學周流表裏盡知之矣吾將遠去有所之當復有可授不可得常安坐守諸弟子也六人自詳讀吾書從上到下為有結不解子意者考源古文以明之上行者玄真知之下行者順真知之東者初真知之南者太真知之西者少真知之北者幽真知之夫道迺大同小異故能分別陰陽而無極化為萬一千五百二十字中和萬物小備未能究天地陰陽絕洞無表裏也故但考其無舉其綱見其始使可儀而記記古記今其要亂自同神聖所記猶重規合矩雖相去億億萬年比若相對而語也故可為為天地常經為陰陽作神道勿怪吾書前後甚復重也所以復重者恐有失之也又天道至嚴既言不敢不具通不通名為戔道為過劇吾誠哀之此雖復重比若上古聖人中古聖人下古聖人皆異世而生其辭相因復重而說更以相考明迺天道悉可知此之謂也行矣吾有急行重慎持天寶, HFL: ''}
