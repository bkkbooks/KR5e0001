  - {type: variant, offset: 21771, length: 591, content: 付其人右戒六弟子胞胎陰陽規矩正行消惡圖神人語真人內子已明也損子身其意得也其外理自正瞑目內視與神通靈不出言與道同陰陽相覆天所封長生之術可開眸子無強腸宜和弘天地受和如暗聾欲知其意胞中童不食十月神相通自然之道無有上不視而氣宅十二重故反嬰兒則無凶老還反少與道通是故畫像十二重正者得善不肖獨凶天道常在不得喪亡狀如四時周反鄉終老反始故長生也子思其意無邪傾積德累行道自成才不如力道歸其人苟非其人道不虛行夫道若風默居其傍用之則有不用則亡賢者有里不肖有鄉死生在身常定行天無有過人自求喪詳思其意亦無妄行天與守道力行故長生人不肯為故死傾記吾戒子道傳其人則易行古者聖賢傳道飲血為盟天道積重愚人反輕道乃萬物之師也得之者明失之者迷天地雖廣大不遺失毫釐賢知自養比與神俱語是乃陰陽之統天地之樞機也古者聖賢深知之故以自表殊天道之要也內以治身外以消災不當為之乃與天地同憂分別四治法第七十九真人純稽首戰慄吾今欲有所復問非道事也見明師言事無不解訣者故乃敢冒慚復前有可問疑一事何等平行吾即為子說矣夫帝王之仕大臣皆當老少子本非治世人也何為問此哉吾見天氣間者比連不調或過在仕臣失實令使時氣不調人君不明災害並行道人亦傷今天地三光尚為其病故無正明道士於何自逃獨得不傷故吾雖得獨蒙天私久存常不敢自保初少以來事師問事無能悉解之者今不冒慚重問於天師解訣其要意恐遂無復以得知之也恩唯明師既加不得已為弟子說其所不及善哉子之言也今旦見子之言吾知, HFL: 焉}
