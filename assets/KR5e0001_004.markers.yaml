  - {type: variant, offset: 13678, length: 909, content: 也有其全者其人民萬物悉無病平安無為盜賊欺偽佞者也天地無災變所謂上優有其全者也其四分有其三者其三分人平善忠信其一分傷死或為盜賊共為邪惡變怪多少隨此四分一其四分有其二者其半人民萬物有病為不信半人有欺偽之心其天怪變半其四分有其一者其三分者悉病無實欺為佞皆為盜賊無有相利之心一分者為善耳天怪前後不絕不處甲處乙會不去其部界中也何故乎善哉子之言也是令盡有者其道德悉及之德所及者能制之故盡善萬物都蒙其道德故平平也其四分有其三者其道德不及一分故一分凶也其四分有其二者其半道德不及覆蓋故半凶也其四分有其一者德微財及一分不及其三分故三凶也是故古者聖人帝王欲自知優劣以此占之萬不失一也所不及何故病乎道德不能及無為無君長萬物無長故亂而多病姦猾盜賊不絕也古者以此占治以知德厚薄視其氣與何者相應以此深知治之得失衰盛明於日月也善哉善哉以何救其失乎善哉今真人以既知天經當止此流災承負萬物也夫災以何止之唯天師教眾賢使得及上皇氣然宜各論真道於究各思初一以自治勞病即其復優盡令有之矣善哉善哉行真人戒事唯唯謹已敬受四十八部戒矣其行道長短云何哉詳乎子問也不敢不詳天道致重師敕致嚴故敢不一二問之也善哉知為弟子數可以通天道意然天道有三道應太陽太陰中和優者行外其次行中其次行內霸者無道但假路三王之內道最短天皇大優者最行外九皇共一道相次劣者在內其優者步行而不移其次微移其次微知十五帝共一中道也其優者行外其次行而知其劣者行而疾也三王九人共一內道騎行其次小疾其劣者馳也十五霸最假內極路其優者若飛行外其中者若飛而疾其劣者若矢也真人知之乎善哉善哉真人前子問此事何一詳也哉然吾初生以來怪歲一長一短日一厚日一薄一前一卻不及天師問恐遂不知之願聞其意善哉子之言也然厚者天之日也其次厚者地之日也其次厚者人之日也其最薄者萬物之日也真人知之耶唯唯行去勿復竟問是者子之私也非難為子窮說之也天下會無以為亦無益於帝王承負厄會百姓之愁苦故不為子分別道耳不惜之也唯唯多犯天師諱有大過不謙也樂欲知天上之事者有私乃來為子悉說之唯唯行去右分別九皇十五帝九王十五霸行度優劣法六罪十治訣第一百三真人前凡平平人有幾罪乎平平人不犯事何罪過哉噫真人何其暝冥也愚生不開達初生未常聞人不犯非法而有罪也子言是也與俗同記不睹, HFL: ''}
