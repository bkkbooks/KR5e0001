  - {type: variant, offset: 11404, length: 967, content: 凡物悉歸道德故萬物都出生東南而上行也天地四方六陽氣俱與生物於辰巳也子知之耶唯唯天之法下刑故西北少陰太陰為刑禍刑禍者主傷主殺故物傷老衰於西而死於北天氣戰鬭六陰無陽物皆伏藏於內穴中畏刑興禍不敢出見天道惡之下之故其畜生悉食惡棄也是故古者聖人覩天法明故尚真道善德奇文而下武也是明效也今刑禍武生於西北而尚之名為以陰乘陽以賤乘貴多出戰鬭令民臣不忠無益王治其政難乎真人寧知之耶唯唯子可謂以覺矣是故古者聖賢常尚道德文常投於上善處而兵革戰備投於下處一人獨居則投文於床上而兵居床下如是則夷狄自降盜賊日消滅矣善哉善哉行子可謂已知之矣六子詳思吾書意以付上道德之君以示眾賢吾之言不負天地賢明也行去辭小竟也事他所疑迺復來問之唯唯今六真人受天師嚴教謹歸各居閑處思念天師言俱有不解唯天師示訣之行言何等也今天迺自有四時之氣地自有五行之位其王相休囚廢自有時今但人興用之也安能迺使其生氣而王相更相剋賊乎咄咄噫六子雖日學無益也反更大愚略類無知之人何哉夫天地之為法萬物興衰反隨人故凡人所共與事所貴用其物悉王生氣人所休廢悉衰而囚故人所興事者即成人君長師也人所爭用物悉貴而無平也人所休廢物悉賤而無賈直也是故天下人所興用者王自生氣不必當須四時五行氣也故天法凡人興衰迺萬物興衰貴賤一由人是故古者聖人知天格法不可妄犯也故上古時人深知天尊道用道興行道時道王中古廢不行即道休囚不見貴也中古興用德則德王下古廢至德即德復休囚也故人興用文則文王興用武則武王興用金錢則金錢王興用財貨財貨王天下人所興用悉王自生氣其所共廢而不用者悉由凡物何必迺當須天四時五行王迺王哉子學何不日昭昭而反日益冥冥無知乎真人用意尚如此夫俗人共犯天禁言其不然故是也今以子況之人愚獨久矣若真人言中類吾為天陳法為德君解承負先王流災將有誤人不可用者耶如誤何可案用乎六子若有疑欲知吾道大效知其真真與不令疾上付賢明道德之君使其按用之立與天地迺響相應是其人明效證驗也今真人尚迺不能深知是人能使物興衰進退俗人比於子冥冥與盲何異哉今見天師分別為愚生說之已解矣有過不也夫人既學也當務思惟其要意勿但習言也而知其意訣是天地與道所怨也又學者精之慎之唯唯行去記此天政事可以厭猾祅勿使德君失政事文也唯唯三五優劣訣第一百二大暗愚日有不解冥冥之生稽首再拜問一大疑何等也書中比比道天上皇氣且下今訖不知其為上皇氣云何哉子迺知深疑此可謂已得道意矣行明聽為真人具陳之, HFL: ''}
