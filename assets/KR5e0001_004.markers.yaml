  - {type: variant, offset: 15218, length: 5851, content: 真人知之耶唯唯願聞天師其為罪何一重也噫子日益愚何哉是乃滅門之罪也何故言其重乎愚生甚怪之不知其要意今唯天師更開示之令使大覺悟深知其意不敢復犯也然真人言善哉吾辭將見矣真人宜自隨而力記之唯唯行今皇天有道以行生凡物擾擾之屬悉仰命焉今大渘道人或默深知之著其腹中不肯力以教人也夫教人以道比若以火予人矣少人來取之亦不傷其本也無極人來取之亦不傷其本今幸可共之以教天下之人助天生物助地養形助帝王脩正又使各懷道求生惡死令使治助治人不復犯法為邪凶惡其心善則助天地帝王養萬二千物各樂長生人懷仁心不復輕賊傷萬物則天為其大悅地為其大喜帝王為其大樂而無憂也其功增不積大哉夫一人教導如化百愚人百人俱歸各教萬人萬人俱教已化億人億人俱教教無極矣此之善上洽天心下洞無極人民莫不樂生為善帝王遊無職又何傷於人而不力相示勑今人幸蒙先師勑戒得深懷至道而閉絕不以相教示使人無所歸命皆令強死冤結名為斷天道人多失道而妄為天也不得久生地也不得久養夫人不得不知道小人無道多自輕共作反逆犯天文地理起為盜賊相賊傷犯王法為君子重憂紛紛不可勝理君王旦夕念之悒悒自愁苦使天地失其正災變怪不絕為帝王留負吾尚未能悉言夫斷天道大逆罪過不可勝記故財舉其綱紀示真人是非重罪當死明耶死中尚得有餘過故流後生也可㤥哉真人其慎之矣唯真人迺知一㤥可謂已得長吉遠凶害矣唯唯不敢離勑然子已賢明知天命矣必生去死不復疑也今謹以聞天道之命願得知地德之勑然夫地之有大德專以順天之道以好養萬物擾擾之屬莫不被恩德養成其中者是故大渘大德之人當象此為行幸蒙先師功力得懷藏善道無極之德夫德以教人比若臨大水而飲之也少人往學德亦不傷其本無極之人往學德亦不傷其本也如力教教之皆使凡人知守渘抱德各自愛養其身其善者上可助天養且生長之物下可助地畜養向成之物悉并力同心無有惡意其中大賢明心易開示者迺可化而上使為君之輔其中賢者可為長吏師其下無知者尚可為民間之師長凡人莫不俱好德化而為善者也為教如是迺上有益於天下有益於地即大化之本根助帝王養人民令不犯惡為耶君子垂拱而無憂其功著大天地愛之可移於官也今則或懷有德廣大而反詳愚閉絕道德之路不助天養其且生不助地養其且成不助帝王和諸民人今使愚人後生遂暗無知白黑不分明互死不移遂為小人不可東西忽身自輕相隨為非奸軌畜積上下不能復相教冥冥憒憒無有忌諱上犯天文下犯地形其行逆四時亂五行為君子大憂為小人起害為賊盜或還以自敗僇其父母因而無世今尚但為真人舉其綱紀見其始使眾人一覺自策之耳不肯教久德名為斷絕地之養道其罪過如此矣是之為無狀乃死尚有餘罪故流後生也真人知之耶可㤥哉可㤥哉真人知蚤㤥可謂且得活矣唯慎之唯唯謹已受道德之禁願聞仁者之行然夫天地生凡財物已屬於人使其無根亦不上著於天亦不下著於地物者中和之有使可推行浮而往來職當主周窮救急也夫人畜金銀珍物多財之家或億萬種以上畜積腐塗如賢知以行施予貧家樂名仁而已助地養形助帝王存良謹之民夫億萬之家可周萬戶予陳收新毋疾利之心德洽天地聞於遠方尚可常得新物而腐塗者除去也其中大賢者迺日奏上其功於帝王其中小賢日舉之於鄉里其中大愚人不償報恩者極十有兩三耳安能使人大貧哉為善不止大賢渘明舉之名聞國中四海人道之者塞道明王聖主聞之見助養民大喜因而詔取位至鼎輔因是得尊貴世世無有解已尚為大仁天下少有上不負先祖下不負於子孫天地愛之百神利之帝王待之若明友比鄰示之若父母功著天地不復去也祿著官位不復賤也名著萬民不復滅也夫仁可不為乎哉或有遇得善富地并得天地中和之財積之迺億億萬種珍物金銀億萬反封藏逃匿於幽室令皆腐塗見人窮困往求罵詈不予既予不即許必求取增倍也而或但一增或四五迺止賜予富人絕去貧子令使其飢寒而死不以道理反就笑之與天為怨與地為咎與人為大仇百神憎之所以然者此財物迺天地中和所有以共養人也此家但遇得其聚處比若倉中之鼠常獨足食此大倉之粟本非獨鼠有也少內之錢財本非獨以給一人也其有不足者悉當從其取也愚人無知以為終古獨當有之不知迺萬尸之委輸皆當得衣食於是也愛之反常怒喜不肯力以周窮救急令使萬家之絕春無以種秋無以收其冤結悉仰呼天天為之感地為之動不助君子周窮救急為天地之間大不仁人人可求以祭祀尚不給與百神惡之欲使無世鄉里祝固欲使其死盜賊聞之舉兵往趨攻擊其門戶家困且死而盡固固不肯施予反深埋地中使人不睹無故絕天下財物乏地上之用反為大壯於地下天大惡之地大病之以為大咎中和之物隔絕日少因而坐之不足飢寒而死者眾多與人為重仇夫天但好道地但好德中和好仁凡物職當居天下地上而通行周給凡人之不足反迺見埋病悒悒不得出見夫天與地本不樂欲得財也天迺樂人生地樂人養也無知小人反壅塞天地中和之財使其不得周足殺天之所生賊地之所養無故埋逃此財物使國家貧少財用不能救全其民命使有德之君其治虛空夫金銀珍物財貨作之用人功積多誠若且勞當為國家之用無故棄捐去之上下地又不樂得之以為大病以為大壯今愚人甚不仁罪若此寧當死不耶中尚有忽然不知足者爭訟自冤反奪少弱小家財物殊不知止吾尚但見真人倲倲財舉其綱見其始夫大不仁之人過積多不可勝紀難為財用真人宜熟思之故天地中和三氣憎之死尚有餘罪當流後生真人寧覺知之耶唯唯可㤥哉吾不欲聞也真人遺此語天必奪子命令知覺悟惡之且活矣自勑慎事唯唯謹已敬受道德仁戒願聞有知不好學真道意善哉子之言也夫天生人幸得有賢知可以學問而長生天之有道樂與人共之地有德樂與人同之中和有財樂以養人故人生樂求真道真人自來為之不止比若與神謀日歌為善善自歸之力事眾賢眾賢共示教之不復遠也可以全其身不負先人之統佗人盡夭終獨得竟其天年人皆名惡獨得為善人為眾人師聞於遠方內懷真道德仁而有之助天生物助地養形助帝王化民上師迺可化無極人盡使愚人守道不為非中師可化萬人小師可化千數百人致有益於君王使小人知禁不犯非匿邪上感得官不負祖先不辱後生維學若此寧可不為乎故古者聖賢悉以勑學人為大憂助天地生成助帝王理亂此天地之間善人之稱也或有愚人生而懷愿有知而不肯力學真道反好為浮華行以欺人為子則欺其父母為臣則欺其君為下則欺其上名為欺天罪過不除也或有反好俗事爭鬭相隨為非睹真人之人反大笑之笑之言無以學為遂令冥冥愚無可知又好勝而不可苛言天地無數賢渘無知恣情而行上犯天文下犯地理出入無復節度歸則不事父母群愚相與會聚遂為惡子為長吏致事還戮其父母不能自惟思因逃亡為盜賊行害傷殺人殊不止此正天所忌地所咎帝王所愁苦百神所憎父母所窮也此害人之大災絕其先人之統子也今不力學真道為行如此於真人意寧當死不死有餘罪流其子孫尚名為惡人之世盜賊之後惡寧流後生不耶今尚但為真人舉其端首其惡不可勝記難為財用真人寧覺知之耶真人自慎唯唯吾甚㤥哉子知㤥已去惡矣謹已具聞四事願後聞其次然夫天生人使其具足乃出之常樂其為道與德仁人幸有知可以學德天地以德養萬物樂人象之故太古之德人忍辱象地之養物也人學為之則其心意常悅不復好傷害也見事而慎之日而為者善不復欲為惡也以類相聚日益高遠為之積久因成盛德之人莫不響應眾人歸向之聚謹順善不止因成大渘師其德迺之助天養欲生之物助地養欲長之物又好助明王化民使為謹不復知其凶惡小為德或化千數百人大為德或化萬人以上因使萬人轉成德師所化無極為德不止凡人莫不悅喜天地愛之增其筭鬼神好之因而共利祐之其有功者迺人君官仕之德不樂傷害眾人樂之好之所求者得居常獨樂無欲害之者此本由學順善為德迺到于斯名聞遠方功著天地不負祖先不辱後生今人或幸有知心知善惡而反自輕易不力學為善德反隨俗愚暗之人為惡好用氣尚武辭語常凶言出而逆欲以伏人自言便復有便於人者人自言勇力復有勇力於人者故凡天下之事各有所伏窮故可制也夫大火當起之時若將不可拘得水便死人為不善當怒之時若將不可制也得獄便窮用口若將不拘得病使降故夫天地治人悉自有法尺寸人乃有知不肯好學反自輕為非所居為凶無愛之者天地憎之百神惡之帝王得愁苦之此不成善人自成盜賊死尚成惡鬼用力強梁其死皆不得用道理人莫不共知之而自易不為善汙先人之統負於後生之子遂見字為凶賊人之類也人莫肯與其交語行人不欲與同道此子何過承負父母之惡尚或見謂為盜賊之子或遂得死亡焉真人來人自易不好學於明師為德反隨小人過乃如此寧當死有餘罪不乎可畏哉天師勿須道吾念之已苦心痛矣見人不學以為小事安知迺致此乎人甚愚與俗人相似人不深計死有餘罪真人既有功於天地慎之唯唯不可自易也吾尚但舉其綱見其始不學之惡不但盡於是也子得吾書覺悟自深計之唯唯誠得歸便閒處精之詳之然是也學而不精與夢何異唯唯謹已受吾事之勑願聞人生有力不為之教然天地共生蚑行皆使有力取氣於四時而象五行夫力本以自動舉當隨而衣食是故常力之人日夜為之不懈聚之不止無大無小物得者愛之凡物自有精神亦好人愛之人愛之便來歸人比若東海愛水最居其下天下之水悉往聚因得為海君子力而不息因為委積財物之長家遂富而無不有先祖則得善食子孫得肥澤舉家共利為力而不止四方貧虛莫不來受其功因本已大成施予不止眾人大譽之名聞遠方功著天地常力周窮救急助天地愛物助人君養民救窮乏不止凡天地增其筭百神皆得來食此家莫不悅喜因為德行或得大官不辱先人不負後生人人或有力反自易不以為事可以致富反以行鬭訟妄輕為不祥之事自見力伏人遂為而不止反成大惡之子家之空極起為盜賊則飢寒並至不能自禁為姦其中頓不肖子即飢寒而死勇力則行害人求非其有奪非其物又數害傷人與天為怨與地為咎與君子為仇帝王得愁焉遂為之不止百神憎之不復利祐也天不欲蓋地不欲載凶害日起死于道旁或窮於牢獄中戮其父母禍及妻子六屬鄉里皆欲使其死尚有餘罪復流後生或成乞者之後或為盜賊之子為後世大瑕真人前其過責如此寧當死有餘罪不吾見天師說事吾甚驚㤥心痛恐不能自愈真人知心痛將且生活矣若忽然不大覺悟子死不久也慎之吾言不可犯犯者身滅矣非吾殺之也其行自得之子亦知之乎唯唯吾為子陳此六事未能道其萬分之一也賢渘得吾道宜深思遠慮勿反苟自易不恕為善也為力學想得善為惡則反迺降人也各自為身計此中有六死罪又有六大善俱象之為身為其善必得善也自易為惡者日得凶惡子矣自策自計莫樂於自恣慎之思之惟之念之賢明之心必當易開也道德仁善付有道德之士凶惡付不深計之子此格法能皆象吾書文以自正則天下無復惡人也此乃天上太古洞極之道可以化人人一知之俱為善亦不復還反其惡也上士樂生可學其真道大渘大賢可學其德好施之人可學其仁有知之人可學其知有能之人可學其能有力之人可學其力如能并盡用之思之熟之身已遠凶惡矣天地愛之六方養之帝王無復事也迺長游而治真人亦知之乎大樂至矣吾甚大喜子可謂樂善知之矣是故古者賢聖迺教而不止者迺睹天禁明各為身計也故賢聖之教辭語滿天下也子獨不覺乎善哉善哉是故古者聖賢上士皆悉學晝夜力學而不止者亦睹見天地教令明也故不敢自易為非也不敢自輕易而不力學也故得長吉而無害此諸賢者異士本皆無知但由力學而致也此中諸凶惡人悉由不力學自輕自易所致也吾之為道吉凶之門戶也子亦豈知之耶唯唯故都舉迺以上及其下也何謂也哉噫子意何不覺也見天師連說今更眩不自知以何為覺以何為不覺也今使子知行之真人前夫天治法化人為善從上到下有幾何法哉其法萬端各異意然真人尚正若此俗人難覺迷日久是也有過唯天師然助帝王治大凡有十法一為元氣治二為自然治三為道治四為德治五為仁治六為義治七為禮治八為文治九為法治十為武治十而終也何也夫物始於元氣終於武武者斬伐故武為下也故物起於太玄中於太陽終死於白虎故元氣於北而白虎居西此之謂也故天使元氣治使風氣養物地以自然治故順善得善順惡得惡也人者順承天地中和以道治主動道凡事通而往來此三事應天地人讖過此三事而下者德仁為章句過仁而下多傷難為意故吾之為道常樂上本天之性戒中棄未夭之性也生凡物本者常理到中而成至終而亂失亂者不可復理故當以上始也故天常守本地守其中一轉人者守其下三轉故數亂道也真人豈已曉知之耶唯唯子今有疑夫隨師可言不敢有疑也真人前天將祐帝王以何為明證哉將利民臣以何為效乎唯天師今不及何也數言而不中多得過故不敢復言也嗛乎行唯唯然天將祐帝王予其琦文今可以治用之絕踰與陰陽相應將利小臣也予其良吏將利民也使其生善子真人言是豈復有奇說耶而已極唯天將欲興有德人君也為其生神聖使其傳天地談通天地意故真人來為其學也宜以付謹良之民覺其心使其惟思付上有大德之君也以示眾賢共曉其意已解以歸百姓百姓得之十五相從議之治之連不平非獨天地人君也過乃本一在人長長自得重過責於皇天后土皆由一人時有先學得真道者不力相化教大渘幸先知德力不相化畜積有財之家不肯力施為仁人生有知足以學而不肯力學求真道以致壽有能足以學德以化其身而不肯力學德以自化有力不肯力作自易反致困窮此有大過六天人為是獨積久天地開闢以來更相承負其後生者尤劇積眾多相聚為大害令使天地共失其正帝王用心意久愁苦而不治前後不平天大疾之故吾急傳天語自太古到今天地有所疾苦悒悒而不通凡人不得知之皆使神聖人傳其辭非獨我也真人勿怪之也今吾已去世不可妄得還見於民間故傳書付真人真人反得已去世俗不可復得為民間之師故使真人求索良民而通者付之今趨使往付歸有德之君也敢不往付留難者坐之也何其重也今天當以解病而安帝王令道德君明示眾賢以化民間各自思過以解先人承負之讁使凡人各自為身計勿令懈忽迺後天且大喜治立平矣子或懷狐疑以吾言不大誠信者吾文但以試為真所以然者古文億億卷其治常不能太平也令賢明渘長獨懷狐疑謂書不然也夫勇士不試安知其多力見文而不試用安知其神哉吾受天言以試真人自是之後得凡文書皆立試之不得空復設偽言也天大疾之地大苦之以為大病誠冤忿恚因使萬物不興昌多災夭死不得竟其天年帝王悁悒吏民雲亂不復相理大咎在此六罪也有道妬道不肯力教愚人有德妬德不肯力化愚人有財畜積而妬財不肯施予天生凡人使施之天有知不肯力學正道以自窮見教反笑之有能不肯力學施見教反罵詈之有力不肯力作可以致富為仁反自易懈惰見父母學教之反非之故勑真人疾見此文使眾賢各自深惟念百姓自思大過真人寧曉知教勑耶唯唯今神人既為天陳法何不但得人而已布於民間必當以上下乎善哉善哉今天上極太平氣立至凡事當順故以上下也不以上下則為逆氣令治不平但多由逆氣不順故也真人欲復增之耶不敢也故當以上下勿復重問唯唯行去慎事各為身計此有大過六天道至嚴不可妄為天居上視人唯唯願復更請問一言凡人已得要道要德當於何置之當上以付其君何必當以付之也夫要道迺所以安君也以治則得天心夫要德所以養君以治則得地意實知之而不肯奏上皆為不敬其罪不除何其重也觀子之事植辭如無一知者夫為子乃不考為民臣迺不忠信其罪過不可名字也真人乃言何一重者等也真人之學何不日深反日向淺哉甚愚生實不睹子尚言不睹夫俗人蔽隱藏其要道德反使其君愁而苦愚暗咎在真道德蔽而不通也又要道迺所以稱天也要德迺所以稱地也愚人迺斷絕之天憎之地惡之其過不除也真人幸獨為天所私得壽而學反未盡迺及天禁宜事者慎之唯唯右天教合和使人常吉遠凶之經戒六子訣第一百四, HFL: ''}
  - {type: variant, offset: 15218, length: 5851, content: 真人知之耶唯唯願聞天師其為罪何一重也噫子日益愚何哉是乃滅門之罪也何故言其重乎愚生甚怪之不知其要意今唯天師更開示之令使大覺悟深知其意不敢復犯也然真人言善哉吾辭將見矣真人宜自隨而力記之唯唯行今皇天有道以行生凡物擾擾之屬悉仰命焉今大渘道人或默深知之著其腹中不肯力以教人也夫教人以道比若以火予人矣少人來取之亦不傷其本也無極人來取之亦不傷其本今幸可共之以教天下之人助天生物助地養形助帝王脩正又使各懷道求生惡死令使治助治人不復犯法為邪凶惡其心善則助天地帝王養萬二千物各樂長生人懷仁心不復輕賊傷萬物則天為其大悅地為其大喜帝王為其大樂而無憂也其功增不積大哉夫一人教導如化百愚人百人俱歸各教萬人萬人俱教已化億人億人俱教教無極矣此之善上洽天心下洞無極人民莫不樂生為善帝王遊無職又何傷於人而不力相示勑今人幸蒙先師勑戒得深懷至道而閉絕不以相教示使人無所歸命皆令強死冤結名為斷天道人多失道而妄為天也不得久生地也不得久養夫人不得不知道小人無道多自輕共作反逆犯天文地理起為盜賊相賊傷犯王法為君子重憂紛紛不可勝理君王旦夕念之悒悒自愁苦使天地失其正災變怪不絕為帝王留負吾尚未能悉言夫斷天道大逆罪過不可勝記故財舉其綱紀示真人是非重罪當死明耶死中尚得有餘過故流後生也可㤥哉真人其慎之矣唯真人迺知一㤥可謂已得長吉遠凶害矣唯唯不敢離勑然子已賢明知天命矣必生去死不復疑也今謹以聞天道之命願得知地德之勑然夫地之有大德專以順天之道以好養萬物擾擾之屬莫不被恩德養成其中者是故大渘大德之人當象此為行幸蒙先師功力得懷藏善道無極之德夫德以教人比若臨大水而飲之也少人往學德亦不傷其本無極之人往學德亦不傷其本也如力教教之皆使凡人知守渘抱德各自愛養其身其善者上可助天養且生長之物下可助地畜養向成之物悉并力同心無有惡意其中大賢明心易開示者迺可化而上使為君之輔其中賢者可為長吏師其下無知者尚可為民間之師長凡人莫不俱好德化而為善者也為教如是迺上有益於天下有益於地即大化之本根助帝王養人民令不犯惡為耶君子垂拱而無憂其功著大天地愛之可移於官也今則或懷有德廣大而反詳愚閉絕道德之路不助天養其且生不助地養其且成不助帝王和諸民人今使愚人後生遂暗無知白黑不分明互死不移遂為小人不可東西忽身自輕相隨為非奸軌畜積上下不能復相教冥冥憒憒無有忌諱上犯天文下犯地形其行逆四時亂五行為君子大憂為小人起害為賊盜或還以自敗僇其父母因而無世今尚但為真人舉其綱紀見其始使眾人一覺自策之耳不肯教久德名為斷絕地之養道其罪過如此矣是之為無狀乃死尚有餘罪故流後生也真人知之耶可㤥哉可㤥哉真人知蚤㤥可謂且得活矣唯慎之唯唯謹已受道德之禁願聞仁者之行然夫天地生凡財物已屬於人使其無根亦不上著於天亦不下著於地物者中和之有使可推行浮而往來職當主周窮救急也夫人畜金銀珍物多財之家或億萬種以上畜積腐塗如賢知以行施予貧家樂名仁而已助地養形助帝王存良謹之民夫億萬之家可周萬戶予陳收新毋疾利之心德洽天地聞於遠方尚可常得新物而腐塗者除去也其中大賢者迺日奏上其功於帝王其中小賢日舉之於鄉里其中大愚人不償報恩者極十有兩三耳安能使人大貧哉為善不止大賢渘明舉之名聞國中四海人道之者塞道明王聖主聞之見助養民大喜因而詔取位至鼎輔因是得尊貴世世無有解已尚為大仁天下少有上不負先祖下不負於子孫天地愛之百神利之帝王待之若明友比鄰示之若父母功著天地不復去也祿著官位不復賤也名著萬民不復滅也夫仁可不為乎哉或有遇得善富地并得天地中和之財積之迺億億萬種珍物金銀億萬反封藏逃匿於幽室令皆腐塗見人窮困往求罵詈不予既予不即許必求取增倍也而或但一增或四五迺止賜予富人絕去貧子令使其飢寒而死不以道理反就笑之與天為怨與地為咎與人為大仇百神憎之所以然者此財物迺天地中和所有以共養人也此家但遇得其聚處比若倉中之鼠常獨足食此大倉之粟本非獨鼠有也少內之錢財本非獨以給一人也其有不足者悉當從其取也愚人無知以為終古獨當有之不知迺萬尸之委輸皆當得衣食於是也愛之反常怒喜不肯力以周窮救急令使萬家之絕春無以種秋無以收其冤結悉仰呼天天為之感地為之動不助君子周窮救急為天地之間大不仁人人可求以祭祀尚不給與百神惡之欲使無世鄉里祝固欲使其死盜賊聞之舉兵往趨攻擊其門戶家困且死而盡固固不肯施予反深埋地中使人不睹無故絕天下財物乏地上之用反為大壯於地下天大惡之地大病之以為大咎中和之物隔絕日少因而坐之不足飢寒而死者眾多與人為重仇夫天但好道地但好德中和好仁凡物職當居天下地上而通行周給凡人之不足反迺見埋病悒悒不得出見夫天與地本不樂欲得財也天迺樂人生地樂人養也無知小人反壅塞天地中和之財使其不得周足殺天之所生賊地之所養無故埋逃此財物使國家貧少財用不能救全其民命使有德之君其治虛空夫金銀珍物財貨作之用人功積多誠若且勞當為國家之用無故棄捐去之上下地又不樂得之以為大病以為大壯今愚人甚不仁罪若此寧當死不耶中尚有忽然不知足者爭訟自冤反奪少弱小家財物殊不知止吾尚但見真人倲倲財舉其綱見其始夫大不仁之人過積多不可勝紀難為財用真人宜熟思之故天地中和三氣憎之死尚有餘罪當流後生真人寧覺知之耶唯唯可㤥哉吾不欲聞也真人遺此語天必奪子命令知覺悟惡之且活矣自勑慎事唯唯謹已敬受道德仁戒願聞有知不好學真道意善哉子之言也夫天生人幸得有賢知可以學問而長生天之有道樂與人共之地有德樂與人同之中和有財樂以養人故人生樂求真道真人自來為之不止比若與神謀日歌為善善自歸之力事眾賢眾賢共示教之不復遠也可以全其身不負先人之統佗人盡夭終獨得竟其天年人皆名惡獨得為善人為眾人師聞於遠方內懷真道德仁而有之助天生物助地養形助帝王化民上師迺可化無極人盡使愚人守道不為非中師可化萬人小師可化千數百人致有益於君王使小人知禁不犯非匿邪上感得官不負祖先不辱後生維學若此寧可不為乎故古者聖賢悉以勑學人為大憂助天地生成助帝王理亂此天地之間善人之稱也或有愚人生而懷愿有知而不肯力學真道反好為浮華行以欺人為子則欺其父母為臣則欺其君為下則欺其上名為欺天罪過不除也或有反好俗事爭鬭相隨為非睹真人之人反大笑之笑之言無以學為遂令冥冥愚無可知又好勝而不可苛言天地無數賢渘無知恣情而行上犯天文下犯地理出入無復節度歸則不事父母群愚相與會聚遂為惡子為長吏致事還戮其父母不能自惟思因逃亡為盜賊行害傷殺人殊不止此正天所忌地所咎帝王所愁苦百神所憎父母所窮也此害人之大災絕其先人之統子也今不力學真道為行如此於真人意寧當死不死有餘罪流其子孫尚名為惡人之世盜賊之後惡寧流後生不耶今尚但為真人舉其端首其惡不可勝記難為財用真人寧覺知之耶真人自慎唯唯吾甚㤥哉子知㤥已去惡矣謹已具聞四事願後聞其次然夫天生人使其具足乃出之常樂其為道與德仁人幸有知可以學德天地以德養萬物樂人象之故太古之德人忍辱象地之養物也人學為之則其心意常悅不復好傷害也見事而慎之日而為者善不復欲為惡也以類相聚日益高遠為之積久因成盛德之人莫不響應眾人歸向之聚謹順善不止因成大渘師其德迺之助天養欲生之物助地養欲長之物又好助明王化民使為謹不復知其凶惡小為德或化千數百人大為德或化萬人以上因使萬人轉成德師所化無極為德不止凡人莫不悅喜天地愛之增其筭鬼神好之因而共利祐之其有功者迺人君官仕之德不樂傷害眾人樂之好之所求者得居常獨樂無欲害之者此本由學順善為德迺到于斯名聞遠方功著天地不負祖先不辱後生今人或幸有知心知善惡而反自輕易不力學為善德反隨俗愚暗之人為惡好用氣尚武辭語常凶言出而逆欲以伏人自言便復有便於人者人自言勇力復有勇力於人者故凡天下之事各有所伏窮故可制也夫大火當起之時若將不可拘得水便死人為不善當怒之時若將不可制也得獄便窮用口若將不拘得病使降故夫天地治人悉自有法尺寸人乃有知不肯好學反自輕為非所居為凶無愛之者天地憎之百神惡之帝王得愁苦之此不成善人自成盜賊死尚成惡鬼用力強梁其死皆不得用道理人莫不共知之而自易不為善汙先人之統負於後生之子遂見字為凶賊人之類也人莫肯與其交語行人不欲與同道此子何過承負父母之惡尚或見謂為盜賊之子或遂得死亡焉真人來人自易不好學於明師為德反隨小人過乃如此寧當死有餘罪不乎可畏哉天師勿須道吾念之已苦心痛矣見人不學以為小事安知迺致此乎人甚愚與俗人相似人不深計死有餘罪真人既有功於天地慎之唯唯不可自易也吾尚但舉其綱見其始不學之惡不但盡於是也子得吾書覺悟自深計之唯唯誠得歸便閒處精之詳之然是也學而不精與夢何異唯唯謹已受吾事之勑願聞人生有力不為之教然天地共生蚑行皆使有力取氣於四時而象五行夫力本以自動舉當隨而衣食是故常力之人日夜為之不懈聚之不止無大無小物得者愛之凡物自有精神亦好人愛之人愛之便來歸人比若東海愛水最居其下天下之水悉往聚因得為海君子力而不息因為委積財物之長家遂富而無不有先祖則得善食子孫得肥澤舉家共利為力而不止四方貧虛莫不來受其功因本已大成施予不止眾人大譽之名聞遠方功著天地常力周窮救急助天地愛物助人君養民救窮乏不止凡天地增其筭百神皆得來食此家莫不悅喜因為德行或得大官不辱先人不負後生人人或有力反自易不以為事可以致富反以行鬭訟妄輕為不祥之事自見力伏人遂為而不止反成大惡之子家之空極起為盜賊則飢寒並至不能自禁為姦其中頓不肖子即飢寒而死勇力則行害人求非其有奪非其物又數害傷人與天為怨與地為咎與君子為仇帝王得愁焉遂為之不止百神憎之不復利祐也天不欲蓋地不欲載凶害日起死于道旁或窮於牢獄中戮其父母禍及妻子六屬鄉里皆欲使其死尚有餘罪復流後生或成乞者之後或為盜賊之子為後世大瑕真人前其過責如此寧當死有餘罪不吾見天師說事吾甚驚㤥心痛恐不能自愈真人知心痛將且生活矣若忽然不大覺悟子死不久也慎之吾言不可犯犯者身滅矣非吾殺之也其行自得之子亦知之乎唯唯吾為子陳此六事未能道其萬分之一也賢渘得吾道宜深思遠慮勿反苟自易不恕為善也為力學想得善為惡則反迺降人也各自為身計此中有六死罪又有六大善俱象之為身為其善必得善也自易為惡者日得凶惡子矣自策自計莫樂於自恣慎之思之惟之念之賢明之心必當易開也道德仁善付有道德之士凶惡付不深計之子此格法能皆象吾書文以自正則天下無復惡人也此乃天上太古洞極之道可以化人人一知之俱為善亦不復還反其惡也上士樂生可學其真道大渘大賢可學其德好施之人可學其仁有知之人可學其知有能之人可學其能有力之人可學其力如能并盡用之思之熟之身已遠凶惡矣天地愛之六方養之帝王無復事也迺長游而治真人亦知之乎大樂至矣吾甚大喜子可謂樂善知之矣是故古者賢聖迺教而不止者迺睹天禁明各為身計也故賢聖之教辭語滿天下也子獨不覺乎善哉善哉是故古者聖賢上士皆悉學晝夜力學而不止者亦睹見天地教令明也故不敢自易為非也不敢自輕易而不力學也故得長吉而無害此諸賢者異士本皆無知但由力學而致也此中諸凶惡人悉由不力學自輕自易所致也吾之為道吉凶之門戶也子亦豈知之耶唯唯故都舉迺以上及其下也何謂也哉噫子意何不覺也見天師連說今更眩不自知以何為覺以何為不覺也今使子知行之真人前夫天治法化人為善從上到下有幾何法哉其法萬端各異意然真人尚正若此俗人難覺迷日久是也有過唯天師然助帝王治大凡有十法一為元氣治二為自然治三為道治四為德治五為仁治六為義治七為禮治八為文治九為法治十為武治十而終也何也夫物始於元氣終於武武者斬伐故武為下也故物起於太玄中於太陽終死於白虎故元氣於北而白虎居西此之謂也故天使元氣治使風氣養物地以自然治故順善得善順惡得惡也人者順承天地中和以道治主動道凡事通而往來此三事應天地人讖過此三事而下者德仁為章句過仁而下多傷難為意故吾之為道常樂上本天之性戒中棄未夭之性也生凡物本者常理到中而成至終而亂失亂者不可復理故當以上始也故天常守本地守其中一轉人者守其下三轉故數亂道也真人豈已曉知之耶唯唯子今有疑夫隨師可言不敢有疑也真人前天將祐帝王以何為明證哉將利民臣以何為效乎唯天師今不及何也數言而不中多得過故不敢復言也嗛乎行唯唯然天將祐帝王予其琦文今可以治用之絕踰與陰陽相應將利小臣也予其良吏將利民也使其生善子真人言是豈復有奇說耶而已極唯天將欲興有德人君也為其生神聖使其傳天地談通天地意故真人來為其學也宜以付謹良之民覺其心使其惟思付上有大德之君也以示眾賢共曉其意已解以歸百姓百姓得之十五相從議之治之連不平非獨天地人君也過乃本一在人長長自得重過責於皇天后土皆由一人時有先學得真道者不力相化教大渘幸先知德力不相化畜積有財之家不肯力施為仁人生有知足以學而不肯力學求真道以致壽有能足以學德以化其身而不肯力學德以自化有力不肯力作自易反致困窮此有大過六天人為是獨積久天地開闢以來更相承負其後生者尤劇積眾多相聚為大害令使天地共失其正帝王用心意久愁苦而不治前後不平天大疾之故吾急傳天語自太古到今天地有所疾苦悒悒而不通凡人不得知之皆使神聖人傳其辭非獨我也真人勿怪之也今吾已去世不可妄得還見於民間故傳書付真人真人反得已去世俗不可復得為民間之師故使真人求索良民而通者付之今趨使往付歸有德之君也敢不往付留難者坐之也何其重也今天當以解病而安帝王令道德君明示眾賢以化民間各自思過以解先人承負之讁使凡人各自為身計勿令懈忽迺後天且大喜治立平矣子或懷狐疑以吾言不大誠信者吾文但以試為真所以然者古文億億卷其治常不能太平也令賢明渘長獨懷狐疑謂書不然也夫勇士不試安知其多力見文而不試用安知其神哉吾受天言以試真人自是之後得凡文書皆立試之不得空復設偽言也天大疾之地大苦之以為大病誠冤忿恚因使萬物不興昌多災夭死不得竟其天年帝王悁悒吏民雲亂不復相理大咎在此六罪也有道妬道不肯力教愚人有德妬德不肯力化愚人有財畜積而妬財不肯施予天生凡人使施之天有知不肯力學正道以自窮見教反笑之有能不肯力學施見教反罵詈之有力不肯力作可以致富為仁反自易懈惰見父母學教之反非之故勑真人疾見此文使眾賢各自深惟念百姓自思大過真人寧曉知教勑耶唯唯今神人既為天陳法何不但得人而已布於民間必當以上下乎善哉善哉今天上極太平氣立至凡事當順故以上下也不以上下則為逆氣令治不平但多由逆氣不順故也真人欲復增之耶不敢也故當以上下勿復重問唯唯行去慎事各為身計此有大過六天道至嚴不可妄為天居上視人唯唯願復更請問一言凡人已得要道要德當於何置之當上以付其君何必當以付之也夫要道迺所以安君也以治則得天心夫要德所以養君以治則得地意實知之而不肯奏上皆為不敬其罪不除何其重也觀子之事植辭如無一知者夫為子乃不考為民臣迺不忠信其罪過不可名字也真人乃言何一重者等也真人之學何不日深反日向淺哉甚愚生實不睹子尚言不睹夫俗人蔽隱藏其要道德反使其君愁而苦愚暗咎在真道德蔽而不通也又要道迺所以稱天也要德迺所以稱地也愚人迺斷絕之天憎之地惡之其過不除也真人幸獨為天所私得壽而學反未盡迺及天禁宜事者慎之唯唯右天教合和使人常吉遠凶之經戒六子訣第一百四, ZTDZ: ''}
  - {type: variant, offset: 15218, length: 5851, content: 真人知之耶唯唯願聞天師其為罪何一重也噫子日益愚何哉是乃滅門之罪也何故言其重乎愚生甚怪之不知其要意今唯天師更開示之令使大覺悟深知其意不敢復犯也然真人言善哉吾辭將見矣真人宜自隨而力記之唯唯行今皇天有道以行生凡物擾擾之屬悉仰命焉今大渘道人或默深知之著其腹中不肯力以教人也夫教人以道比若以火予人矣少人來取之亦不傷其本也無極人來取之亦不傷其本今幸可共之以教天下之人助天生物助地養形助帝王脩正又使各懷道求生惡死令使治助治人不復犯法為邪凶惡其心善則助天地帝王養萬二千物各樂長生人懷仁心不復輕賊傷萬物則天為其大悅地為其大喜帝王為其大樂而無憂也其功增不積大哉夫一人教導如化百愚人百人俱歸各教萬人萬人俱教已化億人億人俱教教無極矣此之善上洽天心下洞無極人民莫不樂生為善帝王遊無職又何傷於人而不力相示勑今人幸蒙先師勑戒得深懷至道而閉絕不以相教示使人無所歸命皆令強死冤結名為斷天道人多失道而妄為天也不得久生地也不得久養夫人不得不知道小人無道多自輕共作反逆犯天文地理起為盜賊相賊傷犯王法為君子重憂紛紛不可勝理君王旦夕念之悒悒自愁苦使天地失其正災變怪不絕為帝王留負吾尚未能悉言夫斷天道大逆罪過不可勝記故財舉其綱紀示真人是非重罪當死明耶死中尚得有餘過故流後生也可㤥哉真人其慎之矣唯真人迺知一㤥可謂已得長吉遠凶害矣唯唯不敢離勑然子已賢明知天命矣必生去死不復疑也今謹以聞天道之命願得知地德之勑然夫地之有大德專以順天之道以好養萬物擾擾之屬莫不被恩德養成其中者是故大渘大德之人當象此為行幸蒙先師功力得懷藏善道無極之德夫德以教人比若臨大水而飲之也少人往學德亦不傷其本無極之人往學德亦不傷其本也如力教教之皆使凡人知守渘抱德各自愛養其身其善者上可助天養且生長之物下可助地畜養向成之物悉并力同心無有惡意其中大賢明心易開示者迺可化而上使為君之輔其中賢者可為長吏師其下無知者尚可為民間之師長凡人莫不俱好德化而為善者也為教如是迺上有益於天下有益於地即大化之本根助帝王養人民令不犯惡為耶君子垂拱而無憂其功著大天地愛之可移於官也今則或懷有德廣大而反詳愚閉絕道德之路不助天養其且生不助地養其且成不助帝王和諸民人今使愚人後生遂暗無知白黑不分明互死不移遂為小人不可東西忽身自輕相隨為非奸軌畜積上下不能復相教冥冥憒憒無有忌諱上犯天文下犯地形其行逆四時亂五行為君子大憂為小人起害為賊盜或還以自敗僇其父母因而無世今尚但為真人舉其綱紀見其始使眾人一覺自策之耳不肯教久德名為斷絕地之養道其罪過如此矣是之為無狀乃死尚有餘罪故流後生也真人知之耶可㤥哉可㤥哉真人知蚤㤥可謂且得活矣唯慎之唯唯謹已受道德之禁願聞仁者之行然夫天地生凡財物已屬於人使其無根亦不上著於天亦不下著於地物者中和之有使可推行浮而往來職當主周窮救急也夫人畜金銀珍物多財之家或億萬種以上畜積腐塗如賢知以行施予貧家樂名仁而已助地養形助帝王存良謹之民夫億萬之家可周萬戶予陳收新毋疾利之心德洽天地聞於遠方尚可常得新物而腐塗者除去也其中大賢者迺日奏上其功於帝王其中小賢日舉之於鄉里其中大愚人不償報恩者極十有兩三耳安能使人大貧哉為善不止大賢渘明舉之名聞國中四海人道之者塞道明王聖主聞之見助養民大喜因而詔取位至鼎輔因是得尊貴世世無有解已尚為大仁天下少有上不負先祖下不負於子孫天地愛之百神利之帝王待之若明友比鄰示之若父母功著天地不復去也祿著官位不復賤也名著萬民不復滅也夫仁可不為乎哉或有遇得善富地并得天地中和之財積之迺億億萬種珍物金銀億萬反封藏逃匿於幽室令皆腐塗見人窮困往求罵詈不予既予不即許必求取增倍也而或但一增或四五迺止賜予富人絕去貧子令使其飢寒而死不以道理反就笑之與天為怨與地為咎與人為大仇百神憎之所以然者此財物迺天地中和所有以共養人也此家但遇得其聚處比若倉中之鼠常獨足食此大倉之粟本非獨鼠有也少內之錢財本非獨以給一人也其有不足者悉當從其取也愚人無知以為終古獨當有之不知迺萬尸之委輸皆當得衣食於是也愛之反常怒喜不肯力以周窮救急令使萬家之絕春無以種秋無以收其冤結悉仰呼天天為之感地為之動不助君子周窮救急為天地之間大不仁人人可求以祭祀尚不給與百神惡之欲使無世鄉里祝固欲使其死盜賊聞之舉兵往趨攻擊其門戶家困且死而盡固固不肯施予反深埋地中使人不睹無故絕天下財物乏地上之用反為大壯於地下天大惡之地大病之以為大咎中和之物隔絕日少因而坐之不足飢寒而死者眾多與人為重仇夫天但好道地但好德中和好仁凡物職當居天下地上而通行周給凡人之不足反迺見埋病悒悒不得出見夫天與地本不樂欲得財也天迺樂人生地樂人養也無知小人反壅塞天地中和之財使其不得周足殺天之所生賊地之所養無故埋逃此財物使國家貧少財用不能救全其民命使有德之君其治虛空夫金銀珍物財貨作之用人功積多誠若且勞當為國家之用無故棄捐去之上下地又不樂得之以為大病以為大壯今愚人甚不仁罪若此寧當死不耶中尚有忽然不知足者爭訟自冤反奪少弱小家財物殊不知止吾尚但見真人倲倲財舉其綱見其始夫大不仁之人過積多不可勝紀難為財用真人宜熟思之故天地中和三氣憎之死尚有餘罪當流後生真人寧覺知之耶唯唯可㤥哉吾不欲聞也真人遺此語天必奪子命令知覺悟惡之且活矣自勑慎事唯唯謹已敬受道德仁戒願聞有知不好學真道意善哉子之言也夫天生人幸得有賢知可以學問而長生天之有道樂與人共之地有德樂與人同之中和有財樂以養人故人生樂求真道真人自來為之不止比若與神謀日歌為善善自歸之力事眾賢眾賢共示教之不復遠也可以全其身不負先人之統佗人盡夭終獨得竟其天年人皆名惡獨得為善人為眾人師聞於遠方內懷真道德仁而有之助天生物助地養形助帝王化民上師迺可化無極人盡使愚人守道不為非中師可化萬人小師可化千數百人致有益於君王使小人知禁不犯非匿邪上感得官不負祖先不辱後生維學若此寧可不為乎故古者聖賢悉以勑學人為大憂助天地生成助帝王理亂此天地之間善人之稱也或有愚人生而懷愿有知而不肯力學真道反好為浮華行以欺人為子則欺其父母為臣則欺其君為下則欺其上名為欺天罪過不除也或有反好俗事爭鬭相隨為非睹真人之人反大笑之笑之言無以學為遂令冥冥愚無可知又好勝而不可苛言天地無數賢渘無知恣情而行上犯天文下犯地理出入無復節度歸則不事父母群愚相與會聚遂為惡子為長吏致事還戮其父母不能自惟思因逃亡為盜賊行害傷殺人殊不止此正天所忌地所咎帝王所愁苦百神所憎父母所窮也此害人之大災絕其先人之統子也今不力學真道為行如此於真人意寧當死不死有餘罪流其子孫尚名為惡人之世盜賊之後惡寧流後生不耶今尚但為真人舉其端首其惡不可勝記難為財用真人寧覺知之耶真人自慎唯唯吾甚㤥哉子知㤥已去惡矣謹已具聞四事願後聞其次然夫天生人使其具足乃出之常樂其為道與德仁人幸有知可以學德天地以德養萬物樂人象之故太古之德人忍辱象地之養物也人學為之則其心意常悅不復好傷害也見事而慎之日而為者善不復欲為惡也以類相聚日益高遠為之積久因成盛德之人莫不響應眾人歸向之聚謹順善不止因成大渘師其德迺之助天養欲生之物助地養欲長之物又好助明王化民使為謹不復知其凶惡小為德或化千數百人大為德或化萬人以上因使萬人轉成德師所化無極為德不止凡人莫不悅喜天地愛之增其筭鬼神好之因而共利祐之其有功者迺人君官仕之德不樂傷害眾人樂之好之所求者得居常獨樂無欲害之者此本由學順善為德迺到于斯名聞遠方功著天地不負祖先不辱後生今人或幸有知心知善惡而反自輕易不力學為善德反隨俗愚暗之人為惡好用氣尚武辭語常凶言出而逆欲以伏人自言便復有便於人者人自言勇力復有勇力於人者故凡天下之事各有所伏窮故可制也夫大火當起之時若將不可拘得水便死人為不善當怒之時若將不可制也得獄便窮用口若將不拘得病使降故夫天地治人悉自有法尺寸人乃有知不肯好學反自輕為非所居為凶無愛之者天地憎之百神惡之帝王得愁苦之此不成善人自成盜賊死尚成惡鬼用力強梁其死皆不得用道理人莫不共知之而自易不為善汙先人之統負於後生之子遂見字為凶賊人之類也人莫肯與其交語行人不欲與同道此子何過承負父母之惡尚或見謂為盜賊之子或遂得死亡焉真人來人自易不好學於明師為德反隨小人過乃如此寧當死有餘罪不乎可畏哉天師勿須道吾念之已苦心痛矣見人不學以為小事安知迺致此乎人甚愚與俗人相似人不深計死有餘罪真人既有功於天地慎之唯唯不可自易也吾尚但舉其綱見其始不學之惡不但盡於是也子得吾書覺悟自深計之唯唯誠得歸便閒處精之詳之然是也學而不精與夢何異唯唯謹已受吾事之勑願聞人生有力不為之教然天地共生蚑行皆使有力取氣於四時而象五行夫力本以自動舉當隨而衣食是故常力之人日夜為之不懈聚之不止無大無小物得者愛之凡物自有精神亦好人愛之人愛之便來歸人比若東海愛水最居其下天下之水悉往聚因得為海君子力而不息因為委積財物之長家遂富而無不有先祖則得善食子孫得肥澤舉家共利為力而不止四方貧虛莫不來受其功因本已大成施予不止眾人大譽之名聞遠方功著天地常力周窮救急助天地愛物助人君養民救窮乏不止凡天地增其筭百神皆得來食此家莫不悅喜因為德行或得大官不辱先人不負後生人人或有力反自易不以為事可以致富反以行鬭訟妄輕為不祥之事自見力伏人遂為而不止反成大惡之子家之空極起為盜賊則飢寒並至不能自禁為姦其中頓不肖子即飢寒而死勇力則行害人求非其有奪非其物又數害傷人與天為怨與地為咎與君子為仇帝王得愁焉遂為之不止百神憎之不復利祐也天不欲蓋地不欲載凶害日起死于道旁或窮於牢獄中戮其父母禍及妻子六屬鄉里皆欲使其死尚有餘罪復流後生或成乞者之後或為盜賊之子為後世大瑕真人前其過責如此寧當死有餘罪不吾見天師說事吾甚驚㤥心痛恐不能自愈真人知心痛將且生活矣若忽然不大覺悟子死不久也慎之吾言不可犯犯者身滅矣非吾殺之也其行自得之子亦知之乎唯唯吾為子陳此六事未能道其萬分之一也賢渘得吾道宜深思遠慮勿反苟自易不恕為善也為力學想得善為惡則反迺降人也各自為身計此中有六死罪又有六大善俱象之為身為其善必得善也自易為惡者日得凶惡子矣自策自計莫樂於自恣慎之思之惟之念之賢明之心必當易開也道德仁善付有道德之士凶惡付不深計之子此格法能皆象吾書文以自正則天下無復惡人也此乃天上太古洞極之道可以化人人一知之俱為善亦不復還反其惡也上士樂生可學其真道大渘大賢可學其德好施之人可學其仁有知之人可學其知有能之人可學其能有力之人可學其力如能并盡用之思之熟之身已遠凶惡矣天地愛之六方養之帝王無復事也迺長游而治真人亦知之乎大樂至矣吾甚大喜子可謂樂善知之矣是故古者賢聖迺教而不止者迺睹天禁明各為身計也故賢聖之教辭語滿天下也子獨不覺乎善哉善哉是故古者聖賢上士皆悉學晝夜力學而不止者亦睹見天地教令明也故不敢自易為非也不敢自輕易而不力學也故得長吉而無害此諸賢者異士本皆無知但由力學而致也此中諸凶惡人悉由不力學自輕自易所致也吾之為道吉凶之門戶也子亦豈知之耶唯唯故都舉迺以上及其下也何謂也哉噫子意何不覺也見天師連說今更眩不自知以何為覺以何為不覺也今使子知行之真人前夫天治法化人為善從上到下有幾何法哉其法萬端各異意然真人尚正若此俗人難覺迷日久是也有過唯天師然助帝王治大凡有十法一為元氣治二為自然治三為道治四為德治五為仁治六為義治七為禮治八為文治九為法治十為武治十而終也何也夫物始於元氣終於武武者斬伐故武為下也故物起於太玄中於太陽終死於白虎故元氣於北而白虎居西此之謂也故天使元氣治使風氣養物地以自然治故順善得善順惡得惡也人者順承天地中和以道治主動道凡事通而往來此三事應天地人讖過此三事而下者德仁為章句過仁而下多傷難為意故吾之為道常樂上本天之性戒中棄未夭之性也生凡物本者常理到中而成至終而亂失亂者不可復理故當以上始也故天常守本地守其中一轉人者守其下三轉故數亂道也真人豈已曉知之耶唯唯子今有疑夫隨師可言不敢有疑也真人前天將祐帝王以何為明證哉將利民臣以何為效乎唯天師今不及何也數言而不中多得過故不敢復言也嗛乎行唯唯然天將祐帝王予其琦文今可以治用之絕踰與陰陽相應將利小臣也予其良吏將利民也使其生善子真人言是豈復有奇說耶而已極唯天將欲興有德人君也為其生神聖使其傳天地談通天地意故真人來為其學也宜以付謹良之民覺其心使其惟思付上有大德之君也以示眾賢共曉其意已解以歸百姓百姓得之十五相從議之治之連不平非獨天地人君也過乃本一在人長長自得重過責於皇天后土皆由一人時有先學得真道者不力相化教大渘幸先知德力不相化畜積有財之家不肯力施為仁人生有知足以學而不肯力學求真道以致壽有能足以學德以化其身而不肯力學德以自化有力不肯力作自易反致困窮此有大過六天人為是獨積久天地開闢以來更相承負其後生者尤劇積眾多相聚為大害令使天地共失其正帝王用心意久愁苦而不治前後不平天大疾之故吾急傳天語自太古到今天地有所疾苦悒悒而不通凡人不得知之皆使神聖人傳其辭非獨我也真人勿怪之也今吾已去世不可妄得還見於民間故傳書付真人真人反得已去世俗不可復得為民間之師故使真人求索良民而通者付之今趨使往付歸有德之君也敢不往付留難者坐之也何其重也今天當以解病而安帝王令道德君明示眾賢以化民間各自思過以解先人承負之讁使凡人各自為身計勿令懈忽迺後天且大喜治立平矣子或懷狐疑以吾言不大誠信者吾文但以試為真所以然者古文億億卷其治常不能太平也令賢明渘長獨懷狐疑謂書不然也夫勇士不試安知其多力見文而不試用安知其神哉吾受天言以試真人自是之後得凡文書皆立試之不得空復設偽言也天大疾之地大苦之以為大病誠冤忿恚因使萬物不興昌多災夭死不得竟其天年帝王悁悒吏民雲亂不復相理大咎在此六罪也有道妬道不肯力教愚人有德妬德不肯力化愚人有財畜積而妬財不肯施予天生凡人使施之天有知不肯力學正道以自窮見教反笑之有能不肯力學施見教反罵詈之有力不肯力作可以致富為仁反自易懈惰見父母學教之反非之故勑真人疾見此文使眾賢各自深惟念百姓自思大過真人寧曉知教勑耶唯唯今神人既為天陳法何不但得人而已布於民間必當以上下乎善哉善哉今天上極太平氣立至凡事當順故以上下也不以上下則為逆氣令治不平但多由逆氣不順故也真人欲復增之耶不敢也故當以上下勿復重問唯唯行去慎事各為身計此有大過六天道至嚴不可妄為天居上視人唯唯願復更請問一言凡人已得要道要德當於何置之當上以付其君何必當以付之也夫要道迺所以安君也以治則得天心夫要德所以養君以治則得地意實知之而不肯奏上皆為不敬其罪不除何其重也觀子之事植辭如無一知者夫為子乃不考為民臣迺不忠信其罪過不可名字也真人乃言何一重者等也真人之學何不日深反日向淺哉甚愚生實不睹子尚言不睹夫俗人蔽隱藏其要道德反使其君愁而苦愚暗咎在真道德蔽而不通也又要道迺所以稱天也要德迺所以稱地也愚人迺斷絕之天憎之地惡之其過不除也真人幸獨為天所私得壽而學反未盡迺及天禁宜事者慎之唯唯右天教合和使人常吉遠凶之經戒六子訣第一百四, krp: ''}
