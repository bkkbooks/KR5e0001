  - {type: variant, offset: 12634, length: 1035, content: 若君其中者若臣其下者若民其優劣相懸如此矣天之五帝其優者比若四分日有其三也其中者比若四分月有其三也其下者比若四分星有其三也地之五帝其優者比若四分五嶽有其三也其中者比若四分平土有其三也其劣下者比若四分下田有其三也人之五帝其優者比若四分大國有其三也其中者比若四分大臣有其三也其劣下者比若四分民有其三也天之三王其優者比若四分日有其二也其中者比若四分月有其二也其劣下者比若四分大星有其二也地之三王其優者比若四分五嶽有其二也其中者比若四分平土有其二也其劣下者比若四分下田有其二也人之三王其優者比若四分大國有其二也其中者比若四分大臣有其二也其劣下者比若四分民有其二也天之五霸其優者比若四分日有其一也其中者比若四分月有其一也其下者比若四分大星有其一也地之五霸其優者比若四分五嶽有其一也其中者比若四分平土有其一也其下者比若四分下田有其一也人之五霸其優者比若四分大國有其一也其中者比若四分大臣有其一也其下者比若四分民有其一也此迺天道不遠三五各自反也故天有三皇五帝三王五霸地亦自有三皇五帝三王五霸人亦自有三皇五帝三王五霸也其何一多也願天師分解其訣意然夫天地人本同一元氣分為三體各有自祖始故三皇者其祖頭也五帝者其中興之君也三王者其平平之君也五霸者是其末窮劣衰興刑危亂之氣也故到五霸迺四分有其一者天道其統幾絕也過此下者微末不能復相拘制比若大弱不能制強柔不能制剛少不能制眾道且大亂不能復相理故更以上復起何謂也然九皇者皆始萌於北五帝者始生於東三王者茂盛於南五霸者殺成於西也天生凡物者陽氣因元氣從太陰合萌生生當出達故茂生於東既生當茂盛故盛於南既茂盛當成實故殺成於西天地陰陽道都周夫物不可成實死而已根種實當復更生故令陰陽俱並入天門合氣於乾更以上始此天地自然之性也善哉善哉夫天地人何不共三皇五帝三王五霸乎善哉子之難得其意夫天地人分部為三家各異處夫皇道者比若家人有父也帝道比若家人有母也王道比若家人有子也霸道者比若家人有婦也今三家各異處豈可共父母子婦耶是若人分為三家寧得共父母子婦乎真人寧曉不唯唯慎之亦無妄枉難也天道自有格常法不可但以強抵觸之也不敢不行弩力唯唯雖每問事犯天師諱不問又無緣得知之欲復乞一言平行今是有四十八部四十八部其行云何哉善乎詳哉子之問事也此行得天心意者災變不得起也失天要道者災變不絕故使前後萬萬世更相承負夫善為君者迺能使災咎自伏消其所失至要自養之道者反使邪氣流行周遍天下故生是餘災反為承負之厄會何謂也然精聽吾言唯唯天之上君若日中者若月下者若星也地之上君若五嶽中者若平土下者若下田也人之上君若, HFL: ''}
