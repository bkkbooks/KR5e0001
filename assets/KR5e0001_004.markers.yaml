  - {type: variant, offset: 11196, length: 207, content: 化為善也善哉善哉六子已覺之矣興衰由人訣第一百一今天師幸都為愚生言願問賜飢者以食寒者以衣意然夫飢者思食寒者思衣得此心結念其帝王矣至老不忘也思自效盡力不敢有二心也恩愛洽著民間如有所得奇異殊方善道文不敢匿也悉思付歸其君使其老壽是故當以此賜之也此名為周窮救急夫賢者好文飢者好食寒者好衣為人君賜其臣子務當各得其所欲則天下厭服矣善哉善哉是以天性上道德而下刑罰故東方為道南方為德道者主生故物悉生於東方德者主養故物悉養於南方天之格, HFL: 爲}
