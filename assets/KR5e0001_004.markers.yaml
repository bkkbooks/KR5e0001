  - {type: variant, offset: 9757, length: 842, content: 唯唯行為六子重明陳天之法故金氣都滅絕斷迺木氣得大王下厭土位黃氣不得起故春木王土死也故惟春則天激絕金氣於戊故木得遂興火氣則明日盛則金氣囚猾人斷絕金囚則水氣休陰不敢害陽則生下慎無災變木氣王無金則得興用事則土氣死生民臣忠謹且信不敢為非也是天之格法券書也天地之常性常行子知之耶唯唯行子已知矣今復為六子重明天法使今天下從兵金氣也又王者或以歲始賜刀兵或四面巡狩止居反賜金兵王者王也以金兵賜人名為王金金王則水相金王則害木水相則害火西北陰也東南陽也少陰得王太陰得相也名為二氣俱得勝其陽其災生下狡猾為非陰氣動則多妄言而生盜賊是天格法也六子知之耶唯唯然六真人已知之矣慎天法唯唯今願請問東南陽也何故為地戶今西北陰也反為天門然門戶者迺天地氣所以初生凡物所出入也是故東南極陽也極陽而生陰故東南為地戶也西北者為極陰陰極生陽故為天門真人欲知其效若初九起甲子初六起於甲午此之謂也故天道比若循環周者復反始何有解已其王者得用事其微氣復隨而起矣善哉善哉復為六真人具陳一事王者大興兵則使木行大驚駭無氣則土得王起土得王則金大相金大相則使兵革數動乾兌之氣作西北夷狄猾盜賊數起是者自然法也天地神靈不能禁止也故當務由厭斷金物無令得興行也善哉善哉見師說天法知其可畏矣子知畏之則吉矣今皇天明師幸哀其愚蔽不達於道迺具為明陳天法今是獨為一君生耶天下之為法悉如此耶哉然天以是為常格法雖然木行火行無妄從興金嶽使錢得數王盜行以為大害使治難平也反使金氣得大王為害甚甚能應吾天法斷之者立吉矣治興祅臣絕天法不欺人也願聞天以此為格法意訣然詳哉六子問事也然天地以東方為少陽君之始生也故日出東方以南方為太陽太陽君也故離為日日為君南方火也火為君南方為夏夏最四時養長懷妊盛興處也其為德最大故為君也以此為格法雖然音為角者并於東方位為火者并於南方今太平氣盛至天當興陽氣故吾見六真人問事知為天使之故吾為六真人具說所以興太陽君之行法真人慎之唯唯王者賜下法第一百今天師辛哀為愚生陳天法悉具願復問一事今帝王見群臣下及民人天法為人父母見其臣是王者賢子也故助王者治理天地也民者是, HFL: ''}
