  - {type: variant, offset: 4807, length: 623, content: 若金行在西木行在東各得其處則昌失其處則消亡故萬物著於土地迺生不能著於天日月星曆反著於天迺能生光明夫道如此矣故有其人星在天時有明墮地反無光即非其處也故亂常道有可為出不妄行是其人則明非其人則不可行夫道迺深遠不可測商矣失之者敗得之者昌欲自知盛衰觀道可著神靈可興也內有壽證候之以此萬不失一也此迺神書也還年之期其道至重何可不思故傳之仁賢明試使行之以自命是其人應當並出賢知並來神書並至奇方自出皆令歡喜即其人也以此為效不如此言或但先見非可得行也當遺後來道不妄出也實有可之但問其人令使自思道之可歸亦不可禁亦不可使聽其可之觀其成功道不可空雖然夫才不如力力不如為而不息也夫天下之事皆以試敗天地神靈皆試人故人亦象天道而相試也得見善者其命已善矣其見惡者命已疑矣自古到今不至誠動天名為強求或亦遂得之強求不得真非其有也安可強取其事以不和良乖忤錯亂人命有三品歸道於野付能用者不能用者付於京師投於都市慎無閉絕後世無子傳書聖賢及與道士無主無名付能用者道自有可之不可各人可附言語猶若大木歸山水流歸海不可禁止也天性使然順之者昌逆之者敗亡神書欲出亦不可閉藏得其人必自揚不得其人暗聾盲身則不悅目中無光精讀此策文樂也夫央天昌延命之期數皆在此中也太平之氣皆已見焉民慈愛謹良皆以出焉賢聖明者皆已悅焉殊方奇文皆已付焉勉行無懈以自輔焉明王聖主皆以昌焉夷狄卻降皆以去焉萬民幸甚皆以無言天壽已行不復自冤老以命去少者遂全書傳萬世無絕子孫相傳日以相教名為真文萬世無易令人吉焉道以畢就便成自然有祿自到無敢辭焉, HFL: ''}
