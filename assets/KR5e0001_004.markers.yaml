  - {type: variant, offset: 2995, length: 1352, content: 可不慎哉可不深思慮之胸心乎故古者大聖大賢將任人必先試其所長何所短而後署其職事因而任之其人有過因而責之責問其所長不過所短是者不感天也反為習進此家學因而慎之故能得天下之心也令後世忽事不深思惟古聖人言反署非其職責所不能及問所不能覩盲者不覩日瘖者不能言反各趣得其短以為重過因而罪之不為欲樂相利祐反為巧弄上下迭相賊害此是天下之大敗也自古者諸侯太平之君無有奇神道也皆因任心能所及故能致其太平之氣而無冤結民也禍亂之將起皆坐任非其能作非其事職而重責之其刑罰雖坐之而死猶不能理其職務也災變連起不可禁止因以為亂敗吉凶安危正起於此是以古者將為帝王選士皆先問視試其能當與天地陰陽瑞應相應和不不能相應和者皆為偽行其相應和柰何大人得大應小人得小應風雨為其時節萬物為其好茂百姓為其無言鳥獸跂行為其安靜是其效也故治樂欲安國者審其署置夫天生萬物各有材能又實各有所宜猶龍昇於天魚遊於淵此之謂也夫治者從天地立以來迺萬端天變易亦其時異要當承天地得其意得其所欲為也天者以三光為書文記則一興一衰以風為人君地者以山川阡陌為文理山者吐氣水通經脈衰盛動移崩合以風異為人臣人者以音言語相傳書記文相推移萬物者以衰盛而談語使人想而知之人者在陰陽之中央為萬物之師長所能作最眾多象神而有形變化前卻主當䟽記此變異為其主言故一言不通則有冤結二言不通輒有杜塞三言不通轉有隔絕四言不通和時不應其生物無常五言不通行氣道戰六言不通六方惡生七言不通而破敗八言不通而難處為數家九言不通更相賊傷十言不通更相變革故當力通其言也古者無文以何通之文迺當起但中止天地者幾何起幾何止但後世不覩之耳中古三皇當無文而設言下古復有天地之氣一絕一起獨神人不知老所從來經歷多故知其分理內當有文後世實不覩言其無有何故時有文時無乎哉天氣且弊人且愚薄不壽不能有可刻記故勑之以書文令可傳往來以知古事無文且相辯訟不能相正各自言是故使有文書此但時人愚故為作書天為出券文耳見師言已知之矣願聞今通氣當云何但三道通行八方之書民吏白衣之言勿苟留急者以時解之不急者隨天地萬物須七月物終八月而蕑視九月而更次十月而不歸三年上書而盡信誠者求其人而任之此人迺國家之良臣聰明善耳目因以視聆不失四方候也帝王得之曰安而明故當任之其任之云何乎必各問其能所及使各自䟽記所能為所能分解所能長因其天性而任之所治無失者也故得天下之歡心其治日興太平無有刑無窮物無冤民天地中和盡得相通也故能致壽上皇所以壽多者無刑不傷多傷者迺還傷人身故上古者聖賢不肯好為刑也中古半用刑故壽半下古多用刑故壽獨少也刑者其惡迺干天逆陰陽畜積為惡氣還傷人故上古聖賢不重用之者迺惜其身也中古人半愚輕小用刑故半賊其半下古大愚則自忽用刑以為常法故多不得壽咎在此讀此書者宜反復之重之慎之死生重事不可妄也夫子賢明者為父計臣賢明者為君深計子不賢不肯為父深計臣不賢明不肯為君計是少年者即是其人身邪其人邂逅吉凶者流後生此格法也是故上古聖帝王將任臣者謹選其有道有德不好殺害傷者非為民計也迺自為身深計也故得天地心意舉措如與神俱此之謂審舉得其人而得人力之君也如此迺感神祇迺後天上真神愛之因而獨壽也好用刑迺與陰氣并陰者殺故不得大壽天之命略可覩可知矣天地人所疾惡同耳右得天地人民萬物歡心國興家安天下無爭訟者力行博學訣第八十二今大命可知與未乎雖然可知矣見明師比言大迷惑已解唯加不得已願復丁寧之然吾道可覩意矣, HFL: ''}
