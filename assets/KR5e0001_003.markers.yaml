  - {type: variant, offset: 15899, length: 816, content: 天地開闢以來流災委毒之謫古今天文聖書賢人辭已備足但愁其集居各長於一事耳今案用一家法也不能悉除天地之災變故使流災不絕更相承負後生者曰得災病增劇故天怜德君復承負之天和為後生者不能獨生比積災諸咎也實過在先生賢聖各長於一而俱有不達俱有所失天知其不具足故時出河雒文圖及他神書亦復不同辭也夫大賢聖異世而出各作一事亦復不同辭是故各有不及各有短長也是也明其俱不能盡悉知究洞極之意故使天地之間常有餘災前後訖不絕但有劇與不耳是故天上筭計之今為文書上下極畢備足迺復生聖人無可復作無可復益無可復容言無可復益於天地大德之君若天復生聖人其言會復長於一業猶且復有餘流災毒常不盡與先聖賢無異也是故天使吾深告勑真人付文道德之君以示諸賢明都并拘校合天下之文人口訣辭以上下相足去其復重置其要言要文訣事記之以為經書如是迺后天地真文正字善辭悉得出也邪偽畢去天地大病悉除流災都滅亡人民萬物迺各得居其所矣無復殃苦也故天教吾拘校之也吾之為書不效言也迺效徵驗也案吾文而為之天地災變怪疾病姦猾詙臣不詳邪偽悉且都除去比與陰日而除雲無異也以此效吾言與吾文萬不失一也如不力用吾文也吾雖敬受天辭下語見文不用天安能空除災哉自若文書內亂人亦內亂災猶無從得去也真人知之耶唯唯行子已知之矣願請問一疑事平言之今天地開闢以來神聖賢人皆為天所生前後主為天地語悉為王者制法可以除災害而安天下者今帝王案用之不失天心陰陽規矩其所作文書各有名號今當名天師所作道德書字為等哉善哉真人之問事也然名為大洞極天之政事何故正名為大洞極天之政事乎然大者大也行此者其治最優大無上洞者其道德善惡洞洽天地陰陽表裏六方莫不響應也皆為慎善凡物莫不各得其所者其為道迺拘校天地開闢以來天文地文人文神文皆撰簡得其善者以為洞極之經帝王案用之使眾賢共迺力行之四海四境之內災害都掃地除去其治洞清明狀與天地神靈相似故名為大洞極天之政事也真人知之耶唯唯可駭哉可駭哉行子已覺知之矣右拘校上古中古下古文書人辭訣九天消先王災法第五十六凡天理九人而陰陽得何乎哉, HFL: ''}
