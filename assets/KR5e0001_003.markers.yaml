  - {type: variant, offset: 26617, length: 1203, content: 疑事今河海下田作室廬或無柱梁入地法三尺輒得水當云何哉善乎子之問也此同為害耳宜復淺之此者地之薄皮也近地經脈子欲知其效比若人有厚皮難得血血出亦為傷矣薄皮者易得血血出亦為傷俱害也故夫血者天地之重信效也夫傷人者不復道其皮厚與薄也見血為罪名明白夫人象天地不欲見傷傷之則怒地何獨欲樂見傷哉夫天地乃人之真本陰陽之父母也子何從當得傷其父母乎真人宜深念是於赤心愚人或輕易忽然不知是為大過也今子當得飲食於母故人穿井而飲之有何劇過哉子言已失天心明矣今人飲其母乃就其出泉之處故人乳人之泉坼也所以飲子處比若地有水泉可飲人也今豈可無故穿鑿其皮膚而飲其血汁邪真人難問甚無意愚生有過觸天師忌諱不謙也然難問不極亦不得道至訣也不惡子言也此必皇天大疾乃使子來口口問是此故子言屈折不止也今唯天師原之除其過愚生欲言不能自禁止平行何所謙子既勞為天地遠來問慎無閉絕吾書文也唯唯凡人不見覩此書不自知罪過重反獨常共過罪天地何不和也治何一惡不平也不知人人有過於天地前後相承負後生者得并災到無復天命死生無期度也真人努力無滅去此文天地且非怒人唯唯真人被其謫罰則凶矣唯唯書以付歸有德之君宜以示凡人人乃天地之子萬物之長也今為子道當柰何乎俱各自深思從今以往欲樂富壽而無有病者思此書言著之胸心各為身計真人無匿也傳以相告語今天地之神乃隨其書而行察視人言何也真人知之邪今以何知其隨人而行以吾言不信也子誡絕匿此書即有病有敢絕者即不吉是即天地神隨視人之明證也可畏哉唯唯行去自勵自勵夫人命乃在天地欲安者乃當先安其天地然後可得長安也今乃反愁天地共賊害其父母以何為而得安吉乎哉前後為是積久故災變不絕也吾語不誤也吾常見地神上自訟未嘗絕也是故誠知其見真人比如丁寧問之即知為天使真人來問是天欲一發覺此事令使人自知百姓適知責天不知深自責也今天何故一時使吾問是乎所以使子問是者天上皇太平氣且至治當太平恐愚民人犯天地忌諱不止共亂正氣使為凶害如是則太平氣不得時和故使子問之也欲樂民不復犯之則天地無病而愛人使五穀萬物善以養之也如忽之忿不愛人不肯養之也故將凶歲者無善物將興歲其物善此之謂也真人知之邪善哉善哉古者同當太平何不禁人民動土地哉善乎子之問事也天地初起未嘗有今也以何明之今者天都舉故乃錄委氣之人神人真人仙人道人聖人賢人皆當出輔德君治故為未嘗有也初陰陽開闢以來錄天民仕之未嘗有此也故為最大也可駭哉可駭哉是故都出第一之道教天下人為善之法也人善即其治安君王樂遊無憂善哉善哉樂乎樂乎是故教真人急出此書慎無藏匿以示凡民百姓見禁且自息如不止禍及後世不復救得罪於天地無可禱也真人寧知之邪唯唯行去書中有所疑乎來問之唯唯右解天地冤結道無價卻夷狄法第六十二天師將去無有還期願復乞問一兩結疑行今疾言之吾發已有日矣所問何等事也願乞問明師前所賜弟子道書欲言甚不謙大不事今不問入猶終古不知之乎行勿諱今唯明師開示下愚弟子諾今師前後所與弟子道書其價直多少噫子愚亦大甚哉迺謂吾道有平耶諾為子具說之使子覺悟深知天道輕重價直多少然今且, HFL: 旦}
