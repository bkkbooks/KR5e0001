  - {type: variant, offset: 34206, length: 216, content: 天至道大德盛仁時已到皇靈樂人急行之故天氣諷子之心使子旦夕問天法察察吾甚怪之諾真人安坐為子具分解其字意使可傳而無極時然上為字者一畫也中央復畫一直上行復抱一一而上得三一上行而不止不復下行也故名為上者迺其字無復上也反上為下下者一畫也亦中央復畫直下行復抱一其行遂下不得復上故名為下也夫志常欲下行者久久最下無復下也比若濁者樂下為地故地最下無復下也上為字者常上行不得復下比若清者樂上行為天天乃無上也是故天之為法名各各自字各自定凡天下事皆如此矣故, HFL: ''}
