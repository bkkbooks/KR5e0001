  - {type: variant, offset: 9799, length: 2584, content: 也真人解未唯唯今訾子悒悒已舉承負端首天下之事相承負皆如此豈知之耶唯唯今天師都舉端首愚生心結已解行語真人一大要言上古得道能平其治者但工自養守其本也中古小失之者但小忽自養失其本下古計不詳輕其身謂可再得故大失之而亂其治雖然非下古人過也由承負之厄會也行文已復重吾不復言百言百同無益也可毋增書為文今天辭已通囑於真人唯唯行歸思其要以付有德君書要為解承負出唯唯右問凡事承負結氣訣師策文師曰吾字十一明為止丙午丁巳為祖始四口治事萬物理子巾用角治其右潛龍勿用坎為紀人得見之壽長久居天地間活而已治百萬人仙可待善治病者勿欺紿樂莫樂乎長安巿使人壽若西王母比若四時周反始九十字策傳方士解師策書訣第五十真人稽首再拜唯唯請問一疑事解平言何等也天師前所與愚昧不達之生策書凡九十字謹歸思於幽室閒處連日時質性頑頓晝夜念之不敢懈怠精極心竭周徧不得其意今唯天師幸哀不達之生願為其具解說之使可萬萬世貫結而不忘善哉子之難問乎可謂天人也諾真人詳聆聽為子悉解其要意師曰吾字十一明為止師者正謂皇天神人師也曰者辭也吾迺上辭於天親見遣而下為帝王萬民具陳解億萬世諸承負之謫也吾者我也我者即天所急使神人也今天以是承負之災四流始有本根後治者悉皆隨之失其政無從得中斷止之更相賊傷為害甚深今天以為重憂字者言吾今陳列天書累積之字也十者書與天真誠信洞相應十十不誤無一欺者也得而眾賢各自深計其先人皆有承負也誦之不止承負之厄小大悉且已除矣一者其道要正當以守一始起也守一不置其人日明乎大迷解矣明為止止者足也夫足者為行生行此道者但有日益昭昭不復愚暗冥冥也十一者士也明為止者赤也言赤氣得此當復更盛王大明也止者萬物之足也萬物始萌直布根以本足生也行此道其法迺更本元氣得天地心第一最善故稱上皇之道也丙午丁巳為祖始丙午丁巳火也赤也丙午者純陽也丁巳者純陰也陰陽主和凡事言陰陽氣當復和合天下而興之也為者為利帝王除凶害出也祖者先也象三皇德也始者反本初也故行是道當得反上皇也四口治事萬物理四而得口者言也能日習言吾書者即得天正經字也令得其至意迺上與天心合使萬物各得其所而不復亂故言萬物理也子巾用角治其右者誦字也言誦讀此書而不止凡事悉且一旦而正上得天意歡然而常喜無復留倍也潛龍勿用欿為紀潛龍者天氣還復初九甲子歲也冬至之日也天地正始起於是也龍者迺東方少陽木之精神也故天道因木而出以興火行夫物將盛者必當開通其門戶也真人到期月滿出此書宜投之開明之地開者闢也通也達也開其南更調暢陽氣消去其承負之戹會也潛者藏也道已往到反隱藏也勿者敢也未也先見文者未知行也用者治也事也今天當用此書除災害也玄甲歲出之其時君未能深原書意得能用之也故言勿用者見天文未敢專信而即效案用之也信用之者事立效見響應是其明證也迺與天合故響應也欿為紀者子稱欿甲天也綱也陽也欿者子也水也陰也紀也故天與地常合其綱紀於玄甲子初出此可為有德上君治綱紀也故言欿為紀也迺謂上皇天書下為德君出真經書以繩斷邪以玄甲為微初也凡物生者皆以甲為首子為本故以上甲子序出之也人得見之壽長久人者正謂帝王一人也上德易覺知行道書之人也據瑞應文不疑天道也深得其意則壽矣壽者竟其天年也長者得無窮也久者久存也居天地間活而已居者處也處天地間活而已者當學真道也浮華之文不能久活人也諸承負之厄會咎皆在無實核之道故也今天斷去之也治百萬人仙可待治者正也天以此書正眾賢之心各自治病守真去邪仙可待者言天下聞之真道翕然悉出往輔佐有德之君治真道者活人法也故言仙可待也善治病者勿欺殆凡人悉愚不為身計皆以邪偽之文無故自欺殆冤哉反得天重謫而生承負之大責故天使其棄浮華文各守真實保其一旦夕力行之令人人各有益其身無肯復自欺殆者也樂乎長安巿樂者莫樂於天上皇太平氣至也乎者嗟歎其德大優無雙也長者行此道者其德善長無窮已也安者不復危亡也得行此道者承負天地之謫悉去迺長安曠曠恢恢無復憂也巿者天下所以共致聚人處也行此書者言國民大興云云比若都巿中人也使人壽若西王母使人者使帝王有天德好行正文之人也若者順也能大順行吾書即天道也得之者大吉無有咎也西者人人棲存真道於胸心也王者謂帝王得案行天道者大興而王也其治善迺無上也母者老壽之證也神之長也比若四時周反始比者比也比若四時傳相生傳相成不復相賊傷也其治無有刑也九十字策傳方士九者究也竟也得行此者德迺究洽天地陰陽萬物之心也十者十十相應無為文也字者言天文上下字周流徧道足也傳者信也故為作委字符信以傳之也方者大方正也持此道急往付歸有道德之君可以消去承負之凶其治即方且大正也士者有可剋志一介之人也一介之人者端心可教化屬事使往通此道也吾策之說將可覩矣真人豈曉解未乎唯唯善哉善哉見天師言大樂已至矣子可謂已知之矣愚生每有所問自知積愁天師嚮不問何從得知之然子言是也賢聖有疑皆問之故賢聖悉有師也不可苟空強說也夫強說適可一言不能再轉也唯唯是以愚生不敢強說也子言是也大儒謙亦不失之也今天師事事假