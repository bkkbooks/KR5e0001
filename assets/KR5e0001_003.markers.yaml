  - {type: variant, offset: 25747, length: 206, content: 陶瓦豎柱妄掘鑿溝瀆或閉塞壅閼當通而不得通有幾何乎今是水泉或當流或當通又言閉塞穿鑿之幾何也今水泉當通利之乃宣因天地之利瀆以高就下今或有不然妄鑿地形皆為瘡瘍或有塞絕當通不通王治不和地大病之無肯言其為病疾痛者地之精神上天告愬不通日無止也天地因而俱不說喜是以太和純氣難致也真人寧解不邪唯唯今人生天地之間會當得室廬以自蓋得井飲之云何乎善哉子之言也今天不惡人有室廬也乃其穿鑿地大深皆為瘡瘍或得地骨或得地血何謂也泉者地之血石者, HFL: ''}
