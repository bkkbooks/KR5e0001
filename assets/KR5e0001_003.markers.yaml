  - {type: variant, offset: 18690, length: 729, content: 容可異善哉善哉今當柰何乎然行守本法天者是其始也法地者其多賊也法和者其次也無常者其行未也今人何故迺得至無常之行乎哉然先人小小佚失之其次即小耶其次大耶其次大失道路根本更迷亂無可倚著其意因反為無常之行便易其辭為無常之年也是明道弊未極也當反本夫古者聖人睹此知為末流極即還反故不失政也而保其天命故大賢聖見事明是以常獨吉也真人樂重知其信效耶唯天師開示之耳行歲本興而末惡者陰陽之極也人後生者惡且薄世之極也萬物本興末無收者物之極也後生語多空欺無核實者言之極也文書多蓄委積而無真者文之極也是皆失本就末失實就華故使天地生萬物皆多本無末實其咎在失本流就末失真就偽失厚就薄因以為常故習俗不知復相惡獨與天法相違積久後生者日輕事更作欺偽積習成神不能復相禁反言曉事故致更相承負成天咎地殃四面橫行不可禁防君王雖仁賢安能中絕此萬萬世之流過始失小小各失若粟天道失之若毫釐其失千里粟粟相從從聚迺到滿太倉數萬億斛夫雨一一相隨而下流不止為百川積成四海水多不可本去故當繩之以真道反其末極還就本反其華還就實反其偽還就真夫末窮者宜反本行極者當還歸天之道也夫失正道者非小病也迺到命盡後復相承負其過後生復迷復失正道日闇冥復失道天氣乖忤治安得平哉人人被其毒害人安得壽萬物傷多夭死故比比勑真人傳吾書使人人自思失道意身為病各自憂勞則天地帝王人民萬物悉安矣真人樂合天心宜勿懈忽也唯唯願復問一疑天師今是吉凶曾但其時運然耶善哉真人之難得道意矣極上者當反下極外者當反內故陽極當反陰極於下者當反上故陰極反陽極於末者當反本今天地開闢以來小小連失道意更相承負便成邪偽極矣何以知之乎以萬物人民皆多前善後惡少成事言前哉前有實後空虛古者聖人常觀視萬民之動靜以知之故常不失也善哉善哉願復乞問一事行言今若天師言物有下極上極今若九人上極為委氣, HFL: ''}
