  - {type: variant, offset: 33880, length: 121, content: 謂也或有力弱而不能自理亦不敢言皆名為閉絕不通使陰陽天氣不和天之命人君也本以治強助劣弱為職而寇吏反以此嚴畏之威之也乃以智詐驚駭之使平氣到德君治恐以是亂其正氣故以此示真人也以付上德君以示諸賢及凡人使吏民自思治當有益於上慎毋亂之也真人覺曉知之邪唯唯, HFL: ''}
