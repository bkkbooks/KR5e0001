  - {type: variant, offset: 22948, length: 736, content: 是猶易之乾坤不可反也猶六甲之運不可易也猶五行固法不可失也猶日月之明不可掩蓋也猶若君居上臣在下故不可亂也此所以明天地陰陽之治有好行德者或有愚人反好刑宜常觀視此書以解迷惑務教人為善儒守道與德思退刑罰吾書正天法度也夫為道德易乎為刑罰難乎愛之則日多威之反日無也子疾去矣為天傳吾書毋疑也吾書言不負於天地六合之擾擾也唯唯誠歸思過惟論上下不敢失一也行戒之慎之子不能分別詳思吾書意但觀天地陰陽之大部也從春分到秋分德居外萬物莫不出歸王外蟄蟲出穴人民出室從秋分至春分德在內萬物莫不歸王內蟄藏之物悉入穴人民入室是以德治之明效也從春分至秋分刑在內治萬物皆從出至外內空寂然獨居從秋分至春分刑居外治外無物無氣空無士眾悉入從德是者明刑不可以治之證也故德者與天并心同力故陽出亦出陽入亦入刑與地并力同心故陰出亦出陰入亦入德者與生氣同力故生氣出亦出入亦入刑與殺氣同力故殺氣出亦出入亦入德與天上行同列刑與地下行同列德常與實者同處刑與空無物同處德常與興同處故外興則出內興則入故冬入夏出刑與衰死氣同處故冬出而夏入死氣者清故所居而清也故德與帝王同氣故外王則出陰內王則入刑刑與小人同位故所居而無士眾也物所歸者積帝王德常見歸故稱帝王也刑未嘗與物同處無士眾故不得稱君子是故古者聖人獨深思慮觀天地陰陽所為以為師法知其大萬不失一故不敢犯之也是正天地之明證也可不詳計乎可不慎哉自然法也不以故人也是天地之常行也今悉以告子矣子宜反復深思其意動作毋自易唯唯不敢負行吾已悉傳付真法語於子吾憂解矣為天除咎以勑至德以興王者子毋敢絕且蒙其害唯唯右案天法以明古今前後治者所好得失訣起土出書訣第六十一下愚賤生不勝心所欲問犯天師忌諱為過甚劇意所欲言不能自止小人不忍情願五內發煩懣悃悒請問一大疑唯天師既待以赤子之分必衰原其飢渴汲汲乎行道之何謙哉唯唯今, HFL: ''}
