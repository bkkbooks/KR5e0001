  - {type: variant, offset: 13839, length: 411, content: 不乎唯唯善哉善哉誠受厚恩子勿謝也何乎夫師弟子功大重比若父母生子不可謝而解也何謂也父母未生子之時愚者或但投其施於野便著土而生草木亦不自知當為人也洞洞之施亦安能言哉遂成草木及迺得陰陽相合生得成人何於成草木乎哉夫人既得生自易不事善師反事惡下愚之師迺教人以惡學入邪中或使人死滅身尚有餘罪過并盡其家也人或生而不知學問遂成愚人夫無知之人但獨愁苦而死尚有過於地下魂魄見事不得遊樂身死尚不得成善鬼今善師學人也迺使下愚賤之人成善人善善而不止更賢賢而不止迺得次聖聖而不止迺得深知真道守道而不止迺得仙不死仙而不止迺得成真真而不止迺得成神神而不止迺得與天比其德天比不止迺得與元氣比其德元氣迺包裹天地八方莫不受其氣而生德迺復覆蓋天地八方精神迺從天地飲食天下莫不共祭食之尚常恐懈不能致之也是至善師生善弟子之功也寧可謝不乎可駭哉愚生觸忌諱過言耳何謙不置真人也行覺子使知可謝不耳唯唯右分解本末終始數父子師弟子功要文樂生得天心法第五十四真人前凡人之行君王之, HFL: 爲}
