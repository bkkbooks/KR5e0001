  - {type: variant, offset: 4848, length: 350, content: 化天下故此飲食與男女相須二者大急天道有寒熱不自障隱半傷殺人故天為生萬物可以衣之不衣但穴處隱同活耳愁半傷不盡滅死也此名為半急也所謂天道大急者迺謂絕滅死亡也急無過此也夫人不衣固不能飲食合陰陽不為其善衣則生賢無衣則生不肖也故衣者有以禦害而已故古者聖賢不效玄黃也飲食陰陽不可絕絕之天下無人不可治也守此三者足以竟其天年傳其天統終者復始無有窮已故古者聖人以此為治也其餘不急召凶禍物者悉已去矣何謂也此三者應天行男者天也女者地也衣者依也天地父母所以依養人形身也過此三者其餘奇偽之物不必須之而活傳類相生也反多以致偽姦使治不平皇氣不得至天道乖錯為君子重憂六情所好人人嬉之而不自禁止意轉樂之因以致禍君子失其政令小人盜劫刺皆由此不急之物為召之也天下貧困愁苦災變連起下極欺其上皆以此為大害所從來者久亦非獨今下古後世之人過也傳相, HFL: 事解}
