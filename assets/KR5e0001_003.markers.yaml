  - {type: variant, offset: 14569, length: 627, content: 而不用也所以然者迺為後生計也今真人見此微言耶唯唯真人前唯唯真人真人不及說乎但引謙耶一言之然吾統迺繫於地命屬崑崙今天師命迺在天北極紫宮今地當虛空謹受天之施為弟子當順承象地虛心敬受天師之教然後至道要言可得無有師弟子之義但名為交其才是名為亂學不純也勑教使道不明一是一非其說不可傳於為帝王法故不敢有言不也何謙吾願與真人共集議之為善亦無傷於說也也何乎生有先後知有多少行有尊卑居有高下今吾可說不若天師所云也小人之言不若耆老之覩道端首之明也天師既過覺愚不及之生使得開通知善惡難之何一卒致也願毋中棄但為皇天后土然今既為天語不與子讓也但些子悒悒常不言故問之耳不敢悒悒也今見天師說積喜且駭何也喜者喜得逢見師也駭者恐頑頓學不徧而師去也今欲問汲汲常若大渴欲得飲何乎願得天師道傳弟子付歸有德之君能用者今陰陽各得其所天下諸承負之大病莫不悉愈者也善哉子之言也詳案吾文道將畢矣次其上下明於日月自轉相使今日思行之凡病且自都除愈莫不解甚皆稱歎喜唯唯右治所先後復天心訣師弟子讓說件古文名書訣第五十五日益愚闇曚不闓生謹再拜請問一事平言真人迺曰自新力學不懈為天問事吾職當主授真人義無敢有所惜也疾言之唯唯今小之道書以為天經也拘校上古中古下古聖人之辭以為聖經也拘校上古中古下古大德之辭以為德經也拘校上古中古下古賢明之辭以為賢經也今念天師言不能深知其拘校之意願天師闓示其門戶所當先後令使德君得之以為嚴教也勑眾賢令使各得生校善意於其中也然精哉真人問事常當若此矣善哉善哉諾吾將具言之真人自隨而記之慎毋失吾辭, HFL: ''}
