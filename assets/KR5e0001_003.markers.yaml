  - {type: variant, offset: 30839, length: 2390, content: 及後生者明君賢者名為上善之人若真人今且可言易教謹信從今不達師心此者財應順弟子耳但務成其身也又何益於上而言為善弟子乎哉真人說尚言而民俗夫愚人常自言有功於師固是也夫為人臣子及弟子為人子而不從君父師教令皆應大逆罪不可復名也真人所說善子民臣善弟子其行財不合於罪名耳愚哉子也何謂為善乎是故俗夫之人愚獨已洞達久矣今以真人說繩之已知其實失正路入邪偽迷惑久哉是故天獨深知之故怒不悅災委積更相承負是也皆若真人言行財保其身不犯非者自言有功於天地旁人也是其大愚之劇者也子復慎之子言未盡合於天心也吾所以使真人言者不以故子也但欲觀俗人之得失以何為大過乎故使子言之視其枉直非耳子赤知之耶唯唯行子已覺矣本覺真人之時不欲與真人語言也見子惓惓日致善也故與子深語道天地之意解帝王之所愁苦百姓之冤結萬物之失理耳今既為子陳法言義無所復惜也子但努力記之唯唯吾向睹幾何弟子但不可與語故不與研究竟語也故吾之道未嘗傳出也子知之耶唯唯行去子曉矣然天師既哀弟子得真言不諱君賢則臣多忠師明則弟子多得不諱而言善哉子之言也得覺意行言之今天地實當有仙不死之法不老之方亦豈可得耶善哉真人問事也然可得也天上積仙不死之藥多少比若太倉之積粟也仙衣多少比若太官之積布白也眾仙人之第舍多少比若縣官之室宅也常當大道而居故得入天大道者得居神靈之傳舍室宅也若人有道德居縣官傳舍室宅也天上不惜仙衣不死之方難予人也人無大功於天地不能治理天地之大病通陰陽之氣無益於三光四時五行天地神靈故天不予其不死之方仙衣也此者乃以殊異有功之人也子欲知其大效乎比若帝王有太倉之穀太官之布帛也夫太倉之穀幾何斗斛而無功無道德之人不能得其一升也而人有過者反入其獄中而正尚見治上其罪之狀此明效也今人實惡不合天心故天不具出其良藥方也反日使鬼神精物行考笞擊其無狀之人故病者不絕死者眾多也比若縣官治亂則獄多罪人多暴死者此之謂如有大功於帝王宮宇積多官穀有布帛可得常衣食也夫人命帝王但常思與善人為治何惜愛哉人君職會當與眾賢柔共平治天下也夫君無賢臣父無孝子師無順善弟子其為愁不可勝言也是故上古三皇垂拱無事無憂也其臣謹良憂其君正常心痛乃敢助君平天下也尚復為其索得天上仙方以予其君也故其君得壽也或有大功功大尚得俱仙去共治天上之事天復衣食之此明效也不虛言也夫中古以來多妬真道閉絕之更相欺以偽道使人愚令少賢者故多君臣俱愁苦反不能平天下也又多不壽非獨今下古人過也所由來久矣或大咎在此子亦豈知之耶唯唯故今天上積奇方仙衣乃無億數也但人無大功不可而得之耳比若人有縣官室宅錢穀布帛常當大道而居為家不逃匿也而無功德者不能得穀一斗錢一枚布帛一寸此明效也故太古中古以來真道日衰少故真壽仙方不可得也而人過得獨壽者極是其天下之大壽人也何也真道德多則正氣多故人少病而多壽也邪偽文多則邪惡炁多故人多病而不得壽也此天自然之法也故古者三皇之臣多真道也故其君多壽五帝之臣少真道故其君不若三皇之壽也三王之臣復少真道不能若五帝也五霸之臣最上功偽文禍無有一真道故多夭死是明效也其中時時得壽者極天下之壽人也子重知之耶唯唯是故占者聖賢但觀所得瑞應善惡即自知安危吉凶矣其得上善文應者其治已最無上矣其得中文應者已象中人矣其得下文應者已象下人矣何謂也謂得文如得三皇之文者即其上也若得五帝之文者即其中也若得三王之文者即其大中下也如得五霸之文者即其最下也何以明如斯文乎善哉子之言也教其無刑而自治者即其上也其出教令其懼之小畏之者即其中也教其小刑治之者即其大中下也多教功偽以虛為實失其法浮華投書治事暴用刑罰多邪文無真道可守者即是其下霸道之效也古有聖賢但觀可得天教勑即自知優劣矣願聞教者使誰持往乎然或為其生賢輔助其治此若人家將興必生賢子也或河洛為其出應文圖以為券書即是也子知之耶唯唯復為真人更明之家人且衰生子凶惡人君且衰天不為生賢良輔也人家且衰子孫不好為真正道德反好佞偽浮華功邪淫法即成凶亂家矣且人家興盛必求真道德奇文殊方可以自救者君子且興天必子其真文真道真德善人與其俱共為治也河洛尚復時或勑之災害日少瑞應日來善應日多此即其效也善哉善哉行去真人勉之力之當有功於天當助德君為聰明何謂也欲有大功於天者子今又去世之人也不得譽於治以何得有功於天乎今當柰何哉但以文書付歸德君德君天之子也應天心當以此治報天重功而以安天下興其身即子亦得吉保子壽矣善哉唯唯行去三行之說已竟矣以是示眾賢凡人後世為善當若此也勿敢但財利其身者自言為善上以置天君父師也真人所說人行也尚可折中以上及其大下愚為惡性惡行者積多訖不可勝名以書付下古之人各深自實校為行以何上有益於天君父師其為行增但各自祐利而已邪天深知人心哉故病者眾多也善乎愚生得覩天心師言已大覺矣子可謂易覺之人也今世多下愚之人自信愚心不復信人言也過在此毀敗天道使帝王愁苦者正起此下愚之士反多妬真道善德言其不肖而信其不仁之心天病苦之故使吾為上德之君出此文可以自致能安其身而平其治得天心者太古上皇之君深與天厚者正以此也真人寧曉不邪唯唯行子已知之去矣行思之唯唯願復請問一事行言天師陳此法教文何一眾多也善哉子之難也可謂得道意矣然天下所好善惡義等而用意各異故道者大同而小異一事分為萬一千五百二十字然后天道小耳而王道小備若令都道天地上下八方六合表裏所有謂此書未能記其力也真人寧知之耶唯唯行子已知之矣以此書付道德之君令出之使凡人自思行得失以解天地之疾以安帝王其治立平真人曉邪唯唯行去自厲勿忽也唯唯右分別君臣父子師弟子知其善惡行得失占服人以道不以威訣第六十四真人前凡人當以嚴畏智詐常威勝服人邪不宜邪子自精言之然人致當以嚴威智詐勝服人何也夫人以此乃能治正人噫真人內但俗夫之人知耳未得稱上真人也其投辭皆類俗人不入天心也夫上真人投說乃當與天心同也今以嚴畏智詐勝服人乃鬼神非惡之也非獨鬼神非惡之也乃陰陽神非惡之也非獨陰陽神非惡之也是故從天地開闢以來天下所共病苦而所共治者皆以此勝服人者不治其服者故其中服而冤者乃鬼神助之天地助之天地助之故人者亦治其勝人者而助服其服者也是故, HFL: ''}
