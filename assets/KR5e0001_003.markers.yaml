  - {type: variant, offset: 28708, length: 883, content: 也唯唯吾書即天心也意也子復深精念之唯唯子能聽吾言者復為子陳數不見之事唯唯出口入耳不可眾傳也帝王得之天下服神靈助其行治人自為善不日令而自均也唯唯弟子六人悉愚暗無可能言必觸忌諱今俱唯師自為皇天陳列道德為帝王制作萬萬歲寶器必師且悉出內事無隱匿誠得伏受嚴教密勑不敢漏泄諾今且為子考思於皇天如當悉出不敢有可藏如不可出亦不敢妄行天地之運各自有歷今且案其時運而出之使可常行而家國大吉不危亡所以不付小人而付帝王者帝王其歷常與天地同心乃能行此小人不能行故屬君子令付其人也右平道德價數貴賤解通愚人心上善臣子弟子為君父師得仙方訣第六十三真人前凡為人臣子民之屬何者應為上善之人也真人雖苦宜加精為吾善說之唯唯但恐反為過耳何謙諾誠言今為國君臣子及民之屬能常謹信未嘗敢犯王法從生到死訖未嘗有重過生無罪名也此應為最上善之人也噫子說似類之哉若是而非也子之所說可謂中善之人耳不屬上善之人也行真人復為吾說最上善孝子之行當云何乎宜加精具言之今所言已不中天師意不敢復言也何謙真人取所知而言之不及者吾且為子達之唯唯然上善孝子之為行也常守道不敢為父母致憂居常善養旦夕存其親從已生之後有可知以來未嘗有重過罪名也此為上孝子也噫真人所說類似之又非也此所說謂為中善之人也不中上孝也不及為過非過也今乃以真人為師弟子行作法真人視其且言何耳今子言財如是俗人愚闇無知難教是也積愚日久見上善孝之人或反怪之子不及為子說之唯唯行雖苦復為吾具說上善之弟子今已有二過於天師不敢復言也行子宜自力加意言之為人弟子見教而不信反為過甚深也但不及者是天下從古到今所共有也平說之唯唯然為人弟子旦夕常順謹隨師之教勑所言不失銖分不敢妄說亂師之文出入不敢為師致憂從見教於師之後不敢犯非歷邪愉愉日嚮為善無有惡意不逆師心是為上善弟子也噫真人言幾類似之是非上善之弟子也財應中善之弟子耳實不及愚生見師嚴勑自力強說三事三事不中明天師意為過責甚重恐復有罪不除也凡人行有不及耳子無惡意無罪也今天下人俱大愚冥冥無一知是也極於真人說事常如此今何望於俗夫愚人哉其常不達信其愚心固是也天師幸事事哀之既闓示之願復見為達其所不及恩惟明師師行吾將為真人具陳說之子宜自力隨而記之唯唯諾然, HFL: ''}
