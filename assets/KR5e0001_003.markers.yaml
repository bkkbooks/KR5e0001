  - {type: variant, offset: 48949, length: 297, content: 願也子願何一獨善不可復及也然吾所以常獨有善意者吾學本以思善得之故人悉老終吾獨得在而吾先人子孫盡已亡而吾獨得不死誠受厚命慚於倉皇無以自效報之復之也常思自竭盡力不知以何效哉見天地不調風雨不節知為天下大病常憐之今得神人言大覺悟思盡死以自效於明天以解大病而安地理固以興帝王令使萬物各得其所想以是報塞天重功今不知其能與不哉願復乞問不及於明師善哉子之言也今見子言吾尚喜何言天哉吾書萬不失一也子但努力勿懈而理之是可以復天功不復疑也帝王行之尚且立得其力何況於子哉吾連見子之言吾不敢餘力也吾雖先生志不及子也今俱與子共是天地願與子共安之吾欲不言恐得重過於子反得重謫於天子更詳聆之復為子反復悉分別道之正文者迺本天地心, HFL: ''}
