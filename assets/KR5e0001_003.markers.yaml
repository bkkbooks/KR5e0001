  - {type: variant, offset: 4233, length: 451, content: 也真人寧知之邪唯唯行去勿妄言此致太平之書也唯唯右興善止惡聰明達立得盜賊忠信者得訣法守三實法第四十四真人前唯唯天下凡人行有幾何者大急有幾何者小急有幾何者日益禍凶而不急乎真人宜自精具言之唯唯誠言心所及不敢有可匿行言之凡天下之事用者為急不用者為不急子言是也雖然非也欲得其常急而不可廢者廢之天下絕滅無人天文并合無名字者故為大急今子所言但當前小合於人意反長候致諸禍凶所從起也真人前吾今所問於子迺問其常急而不可廢置者誰也今唯天師為其陳列分別解示之愚生自強過壹言不中不敢復言然子言是也知之迺可說不知而強說之會自窮矣凡人所不及也事無大小不可強知也及之無難不及無易也是故唯天師既開示淺闇不達之生願為開闢其端首諾聽之天下大急有二小急有一其餘悉不急反厭人耳目當前善而長為人召禍凡人皆得窮敗焉何謂也愚哉然天下人本生受命之時與天地分身抱元氣於自然不飲不食噓吸陰陽氣而活不知飢渴久久離神道遠小小失其指意後生者不得復知真道空虛日流就偽更生飢渴不飲不食便死是一大急也天地憐哀之共為生可飲食既飲既食天統陰陽當見傳不得中斷天地之統也傳之當, HFL: ''}
