  - {type: variant, offset: 26205, length: 175, content: 後世不知其過多深賊地故多不壽何也此劇病也今時時有近流水而居不鑿井固多病不壽者何也此天地既怒及其比伍更相承負比若一家有過及其兄弟也今人或有不動土有所立但便時就故舍自若有凶何也是者行不利犯神何神也神非一不可豫名也真人曉邪唯唯是故人居地上不力相教為善故動作過反相及也是者冤今人或大遠流水會當得井水飲之乃活當云何乎善哉子之言也然有故井者宜使因故相與共飲之慎無, HFL: 平道德價}
