  - {type: variant, offset: 28447, length: 247, content: 一旦而同計比若都巿人一旦而會萬物積聚各資所有往可求者得行吾書天地更明日月列星皆重光光照紘遠八方四夷見之莫不樂來服降賢儒悉出不復蔽藏其兵革皆絕去天下垂拱而行不復相傷同心為善俱樂帝王吾書乃能致此其價直多少子亦知之耶故古者聖賢獨深知道重氣平也故不以和土但付歸有德有德知天地心意故尊道重德愚人實奇偽之物故天書不下賢聖不授此之謂也子其慎之矣吾言不誤也子慎吾道矣夫人持珍物璧玉金錢行冥尚坐守之不能寐也是尚但珍物耳何言當傳天寶祕圖書乃可以安天地六極八遠乎出子復重慎之唯唯吾書乃天神吏常坐其傍守之也子復戒之唯唯, HFL: ''}
