  - {type: variant, offset: 24540, length: 118, content: 復愛人也視其死亡忽然人雖有疾臨死啼呼罪名明白天地父母不復救之也乃其罪大深過委頓咎責反在此也其後生動之尤劇乃過前更相倣效以為常法不復拘制不知復相禁止故災日多誠共冤天地天地人之父母也子反共害其父母而賊傷病之非小罪也故天地最以不孝不順為怨不復, HFL: ''}
