  - {type: variant, offset: 8764, length: 124, content: 令吾悉具說之耶不惜難之也但恐太文難為才用具說天下承負迺千萬字尚少也難勝既為子舉其凡綱令使眾賢可共意而盡得其意與券書無異也唯天師語明開兩耳安坐定心聽唯唯然天地生凡物無德而傷之天下雲亂家貧不足老弱飢寒縣官無收倉庫更空此過迺本在地傷物而人反承負之一大凡事, HFL: ''}
