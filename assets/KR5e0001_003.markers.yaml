  - {type: variant, offset: 8668, length: 95, content: 又言下愚弟子迺為天問事不敢不冒過悉道之願具聞其意何等也平言今帝王人民有承負凡事亦皆自有承負耶善哉子為天問事誠詳且謹今每與天師對會常言弟子迺為天問疑事故敢不詳也善哉子有謹良之意且可屬事行今子樂, HFL: ''}
