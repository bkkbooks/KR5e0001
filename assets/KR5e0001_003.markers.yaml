  - {type: variant, offset: 9281, length: 270, content: 此矣寧可罪後生耶四事解然責人復更明聽南山有毒氣其山不善閉藏春南風與風氣俱行迺蔽日月天下彼其咎傷死者積眾多此本獨南山發泄氣何故反使天下人承負得病死焉時人反言猶惡故天則殺汝以過其人曾不冤乎哉此人無過反承負得此災魂神自冤生人復就過責之其氣冤結上動天其咎本在山有惡氣風持來承負之責如此矣五事解然真人復更危坐詳聽吾言本道常正不邪偽欺人人但座先人君王人師父教化小小失正失正言失自養之正道遂相效學後生者日益劇其故為此積久傳相教俱不得其實天下悉邪不能相禁止故災變萬種興起不可勝紀此所由來者積久復久愚人無知反以過時君以責時人曾不重被冤結耶天下悉耶不能自知帝王, HFL: 守}
