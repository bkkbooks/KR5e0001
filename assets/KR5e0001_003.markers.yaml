  - {type: variant, offset: 4687, length: 160, content: 一陰一陽故天使其有一男一女色相好然後能生也何迺正使一陰一陽夫陽極者能生陰陰極者能生陽此兩者相傳比若寒盡反熱熱盡反寒自然之術也故能長相生也世世不絕天地統也如男女不相得便絕無後世天下無人何有夫婦父子君臣師弟子乎以何相生而相治哉天地之間無牝牡以何相傳寂然便空二大急也故陰陽者傳天地統使無窮極也君臣者治其亂聖人師弟子主通天教助帝, HFL: 先視善道}
