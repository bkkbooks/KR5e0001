  - {type: variant, offset: 3506, length: 498, content: 子言是也其賞罰獨無名字邪不及勤能壹言不敢復重今唯天師大開示之然子主記之為子具言之長吏到其發所悉召其部里人民故大臣故吏使其東向坐明經及道德人使北向坐孝悌人使西向坐佃家謹子使居東南角中西北向坐惡子少年使居西南角中東北向坐君自南向坐何必正如此坐乎各從其類迺天道順人立善也盜賊易得何謂也大臣故吏投義處此人去不仕欲樂使以義相助也明經道德投明處欲使明其經道相助察惡也孝悌投本鄉至孝者用心故使歸本鄉也孝悌者欲使常謹敬如朝時也物生於東樂其日進也謹力之子投東南角者東南長養之鄉欲樂其修治萬物而不懈怠也惡子少年投西南西南者陽衰陰起之鄉惡欲相巧弄刑罰罪起焉故猴猿便巧處向衰之地置焉東向西向北向悉居前不謹子與惡子居其後有酒者賜其各一器無酒者賜其善言者使相助為聰明已畢也君坐間處居戶內自閉也一一而呼此眾人以尊卑始教其各言一各記主名也所言所記後當相應後不相應者坐之言而不相應者大佞偽人也後即知佞偽人處矣言而相應者久久乃賜之進其人毋即時也何乎將致怨為人君父而使其臣子致怨非慈父賢君也故已畢悉遣諸善人去惡子少年與吏俱逐捕不得賊者不得止也真人用此書以付上德之君以示凡人各知有此教善者日興惡者日衰矣盜賊邪姦得矣善哉善哉何故先示之乎夫, HFL: ''}
