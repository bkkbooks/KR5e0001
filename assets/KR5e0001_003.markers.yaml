  - {type: variant, offset: 8889, length: 387, content: 未復更明聽今一師說教十弟子其師說邪不實十弟子復行各為十人說已百人偽說矣百人復行各為十人說已千人邪說矣千人各教十人萬人邪說矣萬人四面俱言天下邪說又言者大眾多傳相徵不可反也因以為常說此本由一人失說實迺反都使此凡人失說實核以亂天正文因而移風易俗天下以為大病而不能相禁止其後者劇此即承負之厄也非後人之過明矣後世不知其所由來者遠反以責時人故重相冤也復為結氣不除日益劇甚故凡二事解真人復更明聽令一人為大欺於都巿中四面行於巿中大言地且陷成涵水垂泣且言一巿中人歸道之萬家知之老弱大小四面行言天下俱得知之迺使天下欺後者增益之其遠者尤劇是本由一人言是即承負空虛言之責也後人何過乎反以過時人三事解然真人復更明聽夫南山有大木廣縱覆地數百步其本莖一也上有無訾之枝葉實其下根不堅持地而為大風雨所傷其上億億枝葉實悉傷死亡此即萬物草木之承負大過也其過在本不在末而反罪未曾不冤結耶今是末無過無故被流災得死亡夫, HFL: ''}
