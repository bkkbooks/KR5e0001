  - {type: variant, offset: 15423, length: 472, content: 以為文成天經矣子知之乎善哉善哉子已知之矣拘校上古中古下古聖經中善字訣事卷得一善也十卷得十百卷得百千卷得千萬卷得萬億卷得億如卷得十善字也已得十億矣卷得百善字也已百億矣賢明共記書聚一間善處已都合校之以類相從使賢明共安而次之去其復重即成聖經矣真人知之乎唯唯子已知之矣拘校上古中古下古之賢明辭其中大善者卷記一十卷得十百卷得百千卷得千萬卷得萬億卷得億卷得十十億矣卷得百百億矣已畢竟復以類次之使相從賢明共安之去其復重編而置之即成賢經矣真人知之耶唯唯子已知之矣如都拘校道文經書及眾賢書文及眾人口中善辭訣事盡記善者都合聚之致一間處都畢竟迺與眾賢明大德共訣之以類更相微明去其復重次其辭文而記置之是名為得天地書文及人情辭究竟畢定其善訣事無有遺失若絲髮之間此道道者名為洞極天地陰陽之經萬萬世不可復易也善哉善哉行諸真人可謂已覺矣愚生不及今願復問一疑行言今天地開闢以來久遠河雒出文出圖或有神文書出或有神鳥狩持來吐文積眾多本非一也聖賢所作亦復積多畢竟各自有事天師何疑何睹何見而一時示教下古眾賢明共拘校古今之文人辭哉然有所睹見不敢空妄愁下古賢德也今吾迺見遣於天下為大道德之君, HFL: 喜}
