  - {type: variant, offset: 35086, length: 360, content: 此皆本之元氣自然天地授命凡事悉皆三相通迺道可成也共生和三事常相通并力同心共治一職共成一事如不足一事便凶故有陽無陰不能獨生治亦絕滅有陰無陽亦不能獨生治亦絕滅有陰有陽而無和不能傳其類亦絕滅故有天而無地凡物無於止有地而無天凡物無於生有天地相連而無和物無於相容自養也故男不能獨生女不能獨養男女無可生子以何而成一家而名為父與母乎故天法皆使三合迺成故古者聖人深知天情象之以相治故君為父象天臣為母象地民為子象和天之命法凡擾擾之屬悉當三合相通并力同心迺共治成一事共成一家共成一體也迺天使相須而行不可無一也一事有冤結不得其處便三毀三凶矣故君者須臣臣須民民須臣臣須君迺後成一事不足一使三不成也故君而無民臣無以名為君有臣民而無君亦不成臣民臣民無君亦亂不能自治理亦不能成善臣民也此三相須而立相得迺成故君臣民當應天法三合相通并力同心共為一家也比若, HFL: ''}
