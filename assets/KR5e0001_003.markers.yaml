  - {type: variant, offset: 8325, length: 302, content: 何況天哉今故天積怨下愚無知者更相教輕事為愚後生者日益劇故生災異變怪非一也是天與人君獨深厚比若父子之恩則相教愚者見是不以時報其君反復蔽匿斷絕天路天復益忿忿後復承負之增劇不可移帝王雖有萬人之善猶復無故被其害也故使為善者不明若無益也令使下愚言天無知固有以乎哉今見天師言心解與更生無異也善哉善哉弟子雖多愁天師冒死問事始若有過已問得解意大喜不悔之也夫無知而不問無由得通達子言是其意也行書多悉備頭足腹背表裏悉具自與眾賢共案之勿復問唯唯右問天師文書眾多從上到下所為出斷訣五事解承負法第四十八蔽暗弟子再拜言夫大賢見師說一面知四面之說小賢見師說一負知四負之說故易為說也其愚暗蔽頓之人不事見為說之猶復心懷疑故敢具問天師師既為, HFL: 惡爲}
