  - {type: variant, offset: 22239, length: 162, content: 不樂為善德劣者反欲以刑罰威驚以助治猶見去也夫刑但可以遺窮解卸不足以生萬物明擾擾之屬為其長也今使人不內附反欺詐其大咎在此今子比連時來學問事雖眾多畜積文則未能純信吾書言也得此寧解未哉純稽首敬拜有過甚大負於明師神人之言內慚流汗但愚小德薄至賤學日雖多心頓不能究達明師之言故敢不反復問之甚大不謙久為師憂不也但為子學未精耳可慎之天乃為人, HFL: 爲}
