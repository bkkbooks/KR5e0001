  - {type: variant, offset: 5200, length: 2491, content: 失其本真實悉就浮華因還自愁自害不得竟其天年也後生多事紛紛但以其為不急之事以致凶事故常趨走不得止也上古所以無為而治得道意得天心意者以其守本不失三急中古小多事者以其小多端也下古大多憂者以其大多端而生邪偽更以相高上而相愁也因生邪姦出其中也內失其真實離其本根轉而相害使人眩亂君子雖愁心欲樂正之所為億萬端不可勝理以亂其治真人深思此意善哉善哉右守三實平氣來邪偽去奸猾絕三急吉凶法第四十五真人前蚑行之屬有幾何大急幾何小急幾何不急乎然各有所急千條萬端皆名為何等急跂行各有所志也不可名字也真人已愁矣昏矣子其故為愚何壹劇也實不及子尚自言不及何言俗夫之人失計哉其不及乎是也唯天師願為其愚暗解之然跂行俱受天地陰陽統而生亦同有二大急一小急耳何謂乎哉跂行始受陰陽統之時同髣髴噓吸含自然之氣未知食飲也久久亦離其本遠大道消竭天氣不能常隨護視之因而飢渴天為生飲食亦當傳陰陽統故有雄雌世世相生不絕絕其食飲與陰陽不相傳天下無蚑行之屬此二大急者也其一小急者有毛羽鱗亦活但倮蟲亦生活但有毛羽者恆善可愛禦寒暑有鱗者恆禦害非必須而生也故為小急也其餘凡行悉禍處也不守此三本無故妄行悉得死焉此自然懸於天地法也真人宜思其意守此三行者與天地中和相得失此三而多端者悉被凶害也善哉善哉天師既開示願乞問一事平行今布根垂枝之屬不食不飲不衣當柰何乎噫子學不日進反日無知何哉亦有二大急一小急何謂也明聽唯唯萬物須雨而生是其飲食也須得晝夜壹暴壹陰晝則陽氣為暖夜則陰氣為潤迺得生長居其處是其合陰陽也垂枝布葉是其衣服也其物多葉亦生少葉亦生是其質文也故無時雨則天下萬物不生也天下無一物則大凶也是一大急也不得晝夜合陰陽氣物無以得成也天下無成實物則大凶是二大急也物踈葉亦實數葉亦實俱實不必當數葉也是其小急也實者是其核也是故古者聖人守三實治致太平得天心而長吉竟天年質而已非必當多端玄黃也故迷於末者當還反中迷於中者當還反本迷於文者當還反質迷於質者當還反根根者迺與天地同其元也故治眩亂於下古者思反中古中古亂者思反上古上古亂者思反天地格法天地格法疑者思反自然之形自然而惑者思反上元靈氣故古者聖賢飲食氣而治者深居幽室思道念得失之象不敢離天法誅分之間也居清靜處已得其意其治立平與天地相似哉真人深惟思吾道言豈知之邪善哉善哉行子已覺矣而象吾書以治亂者立可試不移時也無匿此文使凡人當自知質文所失處深念其意宜還反三真無自愁苦以邪偽也真人慎之唯唯右解萬物守本得三急而吉失三急而有害事死不得過生法第四十六真人前唯唯孝子事親親終然後復事之當與生時等邪不也事之當過其生時也何也哉人由親而生得長巨焉見親死去迺無復還期其心不能須臾忘生時日相見受教勑出入有可反報到死不復得相覩訾念其悒悒故事之當過其生時也真人言是也固大已失天道真實遠復遠矣今真人說尚如此俗人冥冥是也失天法明矣何謂也唯天師然人生象天屬天也人死象地屬地也天父也地母也事母不得過父生人陽也死人陰也事陰不得過陽陽君也陰臣也事臣不得過君事陰反過陽則致逆氣事小過則致小逆大過則致大逆名為逆氣名為逆政其害使陰氣勝陽下欺其上鬼神邪物大興共乘人道多晝行不避人也今使疾病不得絕列鬼行不止也其大咎在此子知之邪子知之耶愚生大不及有過不也今見天師已言迺惻然大覺師幸原其勉勉慎事開示其不達今是過小微何故迺致此乎哉事陰過陽事下過上此過之大者也極於此何等迺言微乎真人復重不及矣又生人乃陽也鬼神迺陰也生人屬晝死人屬夜子欲知其大深放此若晝大興長則致夜短夜興長則致晝短陽興則勝其陰陰伏不敢妄見則鬼神藏矣陰興則勝其陽陽伏故鬼神得晝見也夫生人與日俱也奸鬼物與星俱也日者陽也星者陰也是故日見則星逃星見則日入故陰勝則鬼物共為害甚深不可名字也迺名為興陰反衰陽也使治失政反傷生人此其為過甚重子深計之唯唯故天道制法也陰職常當弱於陽比若臣當弱於其君也迺後臣事君順之子弱於其父母迺子事父母致孝也如強不可動移者為害甚深劇故孝子雖恩愛不能忘其親者事之不得過生時也真人亦寧曉不耶唯唯慎之慎之凡事不可但恣意而妄為也唯唯子欲事死過於生迺得過於天是何乎迺為不敬其陽反敬其陰名為背上向下故有過於天也愚生大負唯天師原之耳不也但自詳計之言事皆當應法唯唯天師開示之願悉聞其不得過其生時意其葬送其衣物所齎持治喪不當過生時皆為逆政尚為死者得謫也送死不應本地下簿考問之失實反為詐偽行故得謫又深敬其興凶事大過反生凶殃尸鬼大興行病害人為怪變紛紛以何明之耶善哉子難也以上古聖人治喪心至而已不敢大興之也夫死喪者天下大凶惡之事也興凶事者為害故但心至而已其飲食象生時不負焉故其時人多吉而無病也皆得竟其天年中古送死治喪小失法度不能專其心至而已失其意反小敬之流就浮華以厭生人心財半至其死者耳死人鬼半來食治喪微違實興其祭祀即時致邪不知何鬼神物來共食其祭因留止祟人故人小小多病也下古復承負中古小失增劇大失之不心至其親而已反欲大厭生人為觀古者作榮行失法反合為偽不能感動天致其死者鬼不得常來食也反多張興其祭祀以過法度陰興反傷衰其陽不知何鬼神物悉來集食因反放縱行為害賊殺人不止共殺一人者見興事不見罪責何故不力為之乎是故邪氣日多還攻害其主也習得食隨生人行不置也陰強陽弱厭生人臣下欺上子欺父王治為其不平而民不覺悟故邪日甚劇不復拘制也是故古者聖賢事死不敢過生迺覩禁明也真人亦豈已解耶可㤥哉可㤥哉嚮天師不示愚生心無由得知此也真人前子與吾合心必天使子主問事不可自易也是以吾悉告子也所以然者今良平氣且臨至凡事當順一氣逆轉不至何謂也夫天道當興陽也而衰陰則致順令反興陰而厭衰陽故為逆也反為敬凶事致凶氣令使治亂失其政位此非小過也真人無匿此書出之使凡人自知得失之處夫治不調非獨天地人君之過也咎在百姓人人自有過更相承負相益為多皆悉坐不守實所致也以離去其實遠本反就偽行而不自知何謂乎生者其本也死者其偽也何故名為偽乎實不見覩其人可欲而生人為作知妄圖畫形容過其生時也守虛不實核事夫人死魂神以歸天骨肉以付地腐塗精神者可不思而致尚可得而食之骨肉者無復存也付歸於地地者人之真母人生於天地之間其本與生時異事不知其所職者何等也故孝子事之宜以本乃後得其實也生時所不樂皆不可見於死者故不得過生必為怪變甚深真人曉不慎之慎之唯唯善哉善哉實已出矣子可謂知之矣行去唯唯右事生到終本末當相應, HFL: ''}
