  - {type: variant, offset: 12587, length: 303, content: 皆其身自得之也真人慎之見此誡耶唯唯天師迺勑以不見之言然所以勑教子者見子常有善意恐真人懈倦故明示勑之耳唯唯真人今學以何自期乎以年窮盡為期善哉子志可謂得道意矣然凡人行皆以壽盡為期顧有善惡盡耳何謂也願聞之然守善學遊樂而盡者為樂遊鬼法復不見愁苦其自愁苦而盡者為愁苦鬼惡而盡者為惡鬼也此皆露見之事凡人可知也而人不肯為善樂其魂神其過誠重何謂也人生迺受天地正氣四時五行來合為人此先人之統體也此身體或居天地四時五行先人之身常樂善無憂反復傳生後世不肖反久苦天地四時五行之身令使更自冤死尚愁其魂魄是故愚士不深計不足久居也故令欲使其疾死亡於其死不復恨之也精神但自冤憐無故得愁恚於此下士是故古者大賢聖深計遠慮知如此故學而不止也其為, HFL: ''}
