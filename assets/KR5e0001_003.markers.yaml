  - {type: variant, offset: 971, length: 1833, content: 也故當斷之也今真人以吾書付有道德之君力行之令效立與天相應而致太平可名為富家不疑也可無使帝王愁苦反名為貧家也今民間時相謂為富家何等也是者但俗人妄語耳富之為言者迺悉備足也一事不具輒為不具足也故古者聖賢不責備於一人者言其不能備之也故不具責之也今八十一域國物各少不備足也不能常足也故從他國取之也今一家有何等富哉真人其好隨俗人妄言邪不敢不敢子既學慎言無妄談也夫妄談乃亂天地之正文不可為人法慎之唯唯今天師既加恩愛乃憐帝王在位用心愁苦不得天意為其每具開說可以致上皇太平之路愚生受書眾多大眩童蒙不知當復問何等哉唯天明師悉具陳列其誡善哉善哉然天法陽數一陰數二故陽者奇陰者偶是故君少而臣多陽者尊陰者卑故二陰當共事一陽故天數一而地數二也故當二女共事一男也何必二人共養一人乎尊者之傍不可空為一人行一人當立坐其傍給侍其不足故一者迺象天也二者迺象地也人者乃是天地之子故當象其父母今天下失道以來多賤女子而反賊殺之令使女子少於男故使陰氣絕不與天地法相應天道法孤陽無雙致枯令天不時雨女者應地獨見賤天下共賤其真母共賊害殺地氣令使地氣絕也不生地大怒不悅災害益多使王治不得平何也夫男者乃天之精神也女者乃地之精神也物以類相感動王治不平本非獨王者之過也迺凡人失道輕事共為非其得過非一也乃萬端故使治難平乖錯也天地之性萬二千物人命最重此賊殺女深亂王者之治大咎在此也今天師為王者開闢太平之階路太平之真經出為王者但當游而無事今是傷女為其致大災當柰何之乎善哉子之問也得天心矣然天下所以賤惡女者本惡過在其行何謂也願聞之試得記於竹帛萬萬世不敢去也善哉子今能記之天下無復殺女者也唯唯願記之以除帝王之災吾所樂也以救冤女之命善哉子已得益天筭矣何謂也然活人名為自活殺人名為自殺天愛子可為已得增筭於天司命易子籍矣不敢也不敢也無可復讓此迺天自然之法也然天下所以殺女者凡人少小之時父母自愁苦絕其衣食共養之非獨人也跂行亦皆然至於老長巨細各當隨其力而求衣食故萬物尚皆去其父母而自衣食也賢者得樂不肖得苦又子者年少力日強有餘父母者日衰老力日少不足也夫子何男何女智賢力有餘者尚乃當還報復其父母功恩而供養之也故父母不當隨衣食之也是者名為弱養強不足筋力養有餘也名為逆政少者還愁苦老者無益其父母父母故多殺之也今但為乏衣食而殺傷之孰若養活之者而使各自衣食乎真人是誠冤絕地統民之愚甚劇也今小生聞是心大悲而恐㤥知冤者誠多當柰何哉然夫好學而不得衣食之者其學必懈而道止也而得衣食焉則賢者學而不止也當使各有所利不當使其還反相愁窮也何謂也夫女者無宮女之就夫比若男子之就官也當得衣食焉女之就夫家迺當相與併力同心治生乃共傳天地統到死尚復骨肉同處當相與併力而因得衣食之令使賢且樂令使不肖者且苦比若土地良土其物善天亦付歸之薄土其物惡天亦付歸之不奪其材力所生長也天地尚不奪汝功何況人乎哉如是則凡人無復殺其女者也善哉善哉一大深害除矣帝王太平已至矣真人何以知之乎然夫父母與子極天下之厚也不得困愁焉不宜殺之也毋乃殺其子是應寇賊之氣大逆甚無道也故其亂帝王治最深夫女今得生不見賊殺傷故大樂到矣然子說是也可謂知之矣今天下一家殺一女天下幾億家哉或有一家乃殺十數女者或有妊之未生出反就傷之者其氣冤結上動天柰何無道理乎故吾誠重知之也夫人各自衣食其力則令婦人無兩心則其意專作事不復狐疑也苦而無功則令使人意常不和調此者乃天性自然之術也真人慎之無去此書以付仁賢之君可以除一大冤結災害也慎吾書言以示凡人無肯復去女者也是則且應天地之法也一男者得二女也故天制法陽數者奇陰數者偶大中古以來人失天道意多賊殺之迺反使男多而女少不足也大反天道令使更相承負以為常俗後世者劇天下惡過甚痛無道也夫男者迺承天統女者承地統今迺斷絕地統令使不得復相傳生其後多出絕滅無後世其罪何重也此皆當相生傳類今乃絕地統滅人類故天久久絕其世類也又人生皆含懷天氣具迺出頭圓天也足方地也四支四時也五藏五行也耳目口鼻七政三光也此不可勝紀獨聖人知之耳人生皆具陰陽日月滿乃開胞而出戶視天地當復長共傳其先人統助天生物也助地養形也今天地神信此家故天地神統來寄生於此人人反害之天大咎之而人不相禁止故天使吾出此書以示後世也事已發覺而復故為者名為故犯天法其罪增倍滅世不疑真人慎之自勵自勵唯唯子今既已發覺此事而逃亡其書子代人得罪坐之矣不敢不敢行去各為身計唯唯右分別說貧富君王行之立吉禁人斷絕地統以興男女平復王政一男二女法第四十二真人前今天太和平氣方至王治且太平人當貞邪不當貞何以當貞夫貞者少情欲不妄為也噫真人之說純大中古以來俗人之失也其師內妒反教民妄為也真人曰何謂也, HFL: ''}
