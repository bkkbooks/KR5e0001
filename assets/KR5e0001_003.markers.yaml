  - {type: variant, offset: 50195, length: 4370, content: 幸甚矣皆稱萬歲矣子無閉塞吾文唯唯不敢蔽匿也既受師辭誠報歸之匿之恐為重罪成事也善哉子之言也已得天心子名為已報天重功唯唯誠得退歸閑處思其至意不解懈也行去矣勿復疑也右考文訣分別貧富法第四十一真人前子連時來學道實已畢足未邪今天師不復為其說也以為已足復見天師言迺知其有不足也今意極訖不知所當復問唯天師更開示其所不及也行真人來天下何者稱富足何者稱貧也然多所有者為富少所有者為貧然子言是也又實非也何謂也今若多邪偽佞盜賊豈可以為富邪今若凡人多也君王少豈可稱貧邪愚暗生見天師有教不敢不言不及有過子尚自言不及俗人安知貧富之處哉今唯天師令弟子之無知比若嬰兒之無知也須父母教授之乃後有知也善哉子之言也太謙亦不失之也諾真人自精為子具言之富之為言者迺畢備足也天以凡物悉生出為富足故上皇氣出萬二千物具生出名為富足中皇物小減不能備足萬二千物故為小貧下皇物復少於中皇為大貧無瑞應善物不生為極下貧子欲知其大效實比若田家無有奇物珍寶為貧家也萬物不能備足為下極貧家此天地之貧也萬二千物俱出地養之不中傷為地富不而善養令小傷為地小貧大傷為地大貧善物畏見傷於地形而不生至為下極貧無珍寶物萬物半傷為大因貧也悉傷為虛空貧家此以天為父以地為母此父母貧極則子愁貧矣與王治相應是故古者聖王治能致萬二千物為上富君也善物不足三分之二為中富之君也不足三分之一為下富之君也無有珍奇善物為下貧君也萬物半傷為衰家也悉傷為下貧人古者聖賢迺深居幽室而自思道德所及貧富何須問之坐自知之矣善哉善哉今唯天師幸哀帝王久愁苦不得行意以何能致此貧富乎善哉善哉子之難問也已入微言要矣然所行得失致之也力行真道者迺天生神助其化故天神善物備足也行德者地之陽養神出輔助其治故半富也行仁者中和仁神出助其治故小富也行文者隱欺之階也故欺神出助之故其治小亂也行武者得盜賊神出助之故其治逆於天心而傷害善人也道者乃天所案行也天者最神故真神出助其化也地者養故德神出助其化也人者仁故仁神出助其化也文者主相文欺失其本根故欺神出助之也上下相文其事亂也武者以刑殺傷服人盜賊亦以刑殺傷服人夫以怒喜猛威服人者盜賊也故盜賊多出其治凶也盜賊多以財物為害故其治失於財貨也故古者上君以道服人大得天心其治若神而不愁者以真道服人也中君以德服人下君以仁服人亂君以文服人凶敗之君將以刑殺傷服人是以古者上君以道德仁治服人也不以文刑殺傷服人也所以然者乃鄙用之也上君子乃與天地相似故天迺好生不傷也故稱君稱父也地以好養凡物故稱良臣稱母也人者當用心仁而愛育似於天地故稱仁也此三者善也故得共治萬物為其師長也夫欺刑者不可以治日致凶矣不能為帝王致太平也故當斷之也今真人以吾書付有道德之君力行之令效立與天相應而致太平可名為富家不疑也可無使帝王愁苦反名為貧家也今民間時相謂為富家何等也是者但俗人妄語耳富之為言者迺悉備足也一事不具輒為不具足也故古者聖賢不責備於一人者言其不能備之也故不具責之也今八十一域國物各少不備足也不能常足也故從他國取之也今一家有何等富哉真人其好隨俗人妄言邪不敢不敢子既學慎言無妄談也夫妄談乃亂天地之正文不可為人法慎之唯唯今天師既加恩愛乃憐帝王在位用心愁苦不得天意為其每具開說可以致上皇太平之路愚生受書眾多大眩童蒙不知當復問何等哉唯天明師悉具陳列其誡善哉善哉然天法陽數一陰數二故陽者奇陰者偶是故君少而臣多陽者尊陰者卑故二陰當共事一陽故天數一而地數二也故當二女共事一男也何必二人共養一人乎尊者之傍不可空為一人行一人當立坐其傍給侍其不足故一者迺象天也二者迺象地也人者乃是天地之子故當象其父母今天下失道以來多賤女子而反賊殺之令使女子少於男故使陰氣絕不與天地法相應天道法孤陽無雙致枯令天不時雨女者應地獨見賤天下共賤其真母共賊害殺地氣令使地氣絕也不生地大怒不悅災害益多使王治不得平何也夫男者乃天之精神也女者乃地之精神也物以類相感動王治不平本非獨王者之過也迺凡人失道輕事共為非其得過非一也乃萬端故使治難平乖錯也天地之性萬二千物人命最重此賊殺女深亂王者之治大咎在此也今天師為王者開闢太平之階路太平之真經出為王者但當游而無事今是傷女為其致大災當柰何之乎善哉子之問也得天心矣然天下所以賤惡女者本惡過在其行何謂也願聞之試得記於竹帛萬萬世不敢去也善哉子今能記之天下無復殺女者也唯唯願記之以除帝王之災吾所樂也以救冤女之命善哉子已得益天筭矣何謂也然活人名為自活殺人名為自殺天愛子可為已得增筭於天司命易子籍矣不敢也不敢也無可復讓此迺天自然之法也然天下所以殺女者凡人少小之時父母自愁苦絕其衣食共養之非獨人也跂行亦皆然至於老長巨細各當隨其力而求衣食故萬物尚皆去其父母而自衣食也賢者得樂不肖得苦又子者年少力日強有餘父母者日衰老力日少不足也夫子何男何女智賢力有餘者尚乃當還報復其父母功恩而供養之也故父母不當隨衣食之也是者名為弱養強不足筋力養有餘也名為逆政少者還愁苦老者無益其父母父母故多殺之也今但為乏衣食而殺傷之孰若養活之者而使各自衣食乎真人是誠冤絕地統民之愚甚劇也今小生聞是心大悲而恐㤥知冤者誠多當柰何哉然夫好學而不得衣食之者其學必懈而道止也而得衣食焉則賢者學而不止也當使各有所利不當使其還反相愁窮也何謂也夫女者無宮女之就夫比若男子之就官也當得衣食焉女之就夫家迺當相與併力同心治生乃共傳天地統到死尚復骨肉同處當相與併力而因得衣食之令使賢且樂令使不肖者且苦比若土地良土其物善天亦付歸之薄土其物惡天亦付歸之不奪其材力所生長也天地尚不奪汝功何況人乎哉如是則凡人無復殺其女者也善哉善哉一大深害除矣帝王太平已至矣真人何以知之乎然夫父母與子極天下之厚也不得困愁焉不宜殺之也毋乃殺其子是應寇賊之氣大逆甚無道也故其亂帝王治最深夫女今得生不見賊殺傷故大樂到矣然子說是也可謂知之矣今天下一家殺一女天下幾億家哉或有一家乃殺十數女者或有妊之未生出反就傷之者其氣冤結上動天柰何無道理乎故吾誠重知之也夫人各自衣食其力則令婦人無兩心則其意專作事不復狐疑也苦而無功則令使人意常不和調此者乃天性自然之術也真人慎之無去此書以付仁賢之君可以除一大冤結災害也慎吾書言以示凡人無肯復去女者也是則且應天地之法也一男者得二女也故天制法陽數者奇陰數者偶大中古以來人失天道意多賊殺之迺反使男多而女少不足也大反天道令使更相承負以為常俗後世者劇天下惡過甚痛無道也夫男者迺承天統女者承地統今迺斷絕地統令使不得復相傳生其後多出絕滅無後世其罪何重也此皆當相生傳類今乃絕地統滅人類故天久久絕其世類也又人生皆含懷天氣具迺出頭圓天也足方地也四支四時也五藏五行也耳目口鼻七政三光也此不可勝紀獨聖人知之耳人生皆具陰陽日月滿乃開胞而出戶視天地當復長共傳其先人統助天生物也助地養形也今天地神信此家故天地神統來寄生於此人人反害之天大咎之而人不相禁止故天使吾出此書以示後世也事已發覺而復故為者名為故犯天法其罪增倍滅世不疑真人慎之自勵自勵唯唯子今既已發覺此事而逃亡其書子代人得罪坐之矣不敢不敢行去各為身計唯唯右分別說貧富君王行之立吉禁人斷絕地統以興男女平復王政一男二女法第四十二真人前今天太和平氣方至王治且太平人當貞邪不當貞何以當貞夫貞者少情欲不妄為也噫真人之說純大中古以來俗人之失也其師內妒反教民妄為也真人曰何謂也夫貞男乃不施貞女乃不化也陰陽不交乃出絕滅無世類也二人共斷天地之統貪小虛偽之名反無後世失其實核此天下之大害也汝嚮不得父母傳生汝於何得有汝乎而反斷絕之此乃天地共惡之名為絕理大逆之人也其應乃使天地隔絕天不肯雨地不肯化生何也乎夫天不雨即其貞不施也夫地不生萬物即其貞不化也夫天乃不雨地乃無所生物天下之大凶咎也何以為善哉觀真人之說也不順天地之教令逆天道不樂助天地生化反欲斷絕之子之吐口出辭曾無負於皇天后土乎無壯不及有過見天師說自知罪重不也為子言事無當反天道而以俗人之言不順天意陰陽所以多隔絕者本由男女不和男女者乃陰陽之本也夫治事乃失其本安得吉哉今唯天師當云何乎然太皇天上平氣將到當純法天故令一男者當得二女以象陰陽陽數奇陰數偶也迺太和之氣到也如大多女則陰氣興如大多男則陽氣無雙無法亦致凶何也人之數當與天地相應不相應力而不及故得凶害也夫帝王后宮迺應土地意云何哉今真人所言即助吾語也夫女即土地之精神也王者天之精神也主恐土地不得陽之精神王氣不合也令使土地有不化生者故州取其一女以通其氣也樂其化生者恐其施恩不及王施不洽故應土地而取之也徧施焉乃天氣通得時雨也地得化生萬物令太平氣至不可貴貞人也內獨為過甚深使王治不和良凡人亦不可過節度也故使一男二女也善哉善哉右順天地法合陰陽使男女無冤者致時雨令地化生王治和平興善止惡法第四十三真人前今太平氣臨到欲使謹善者日益興惡者日衰卻也為其有傷殺人盜賊發為作政當云何乎何謂也謂臨發所知也如人君坐有所疑而欲使善者大興惡者立衰也盜賊起使即時得也其為政當柰何乎今真人宜善記之今天師使之敢不言每言不中天師法何謙為言之自古大聖人不責備於一人也今子言不中何謙乎唯唯但當賞善罰惡令使其分明即善者日興惡者日衰矣子言是也其賞罰獨無名字邪不及勤能壹言不敢復重今唯天師大開示之然子主記之為子具言之長吏到其發所悉召其部里人民故大臣故吏使其東向坐明經及道德人使北向坐孝悌人使西向坐佃家謹子使居東南角中西北向坐惡子少年使居西南角中東北向坐君自南向坐何必正如此坐乎各從其類迺天道順人立善也盜賊易得何謂也大臣故吏投義處此人去不仕欲樂使以義相助也明經道德投明處欲使明其經道相助察惡也孝悌投本鄉至孝者用心故使歸本鄉也孝悌者欲使常謹敬如朝時也物生於東樂其日進也謹力之子投東南角者東南長養之鄉欲樂其修治萬物而不懈怠也惡子少年投西南西南者陽衰陰起之鄉惡欲相巧弄刑罰罪起焉故猴猿便巧處向衰之地置焉東向西向北向悉居前不謹子與惡子居其後有酒者賜其各一器無酒者賜其善言者使相助為聰明已畢也君坐間處居戶內自閉也一一而呼此眾人以尊卑始教其各言一各記主名也所言所記後當相應後不相應者坐之言而不相應者大佞偽人也後即知佞偽人處矣言而相應者久久乃賜之進其人毋即時也何乎將致怨為人君父而使其臣子致怨非慈父賢君也故已畢悉遣諸善人去惡子少年與吏俱逐捕不得賊者不得止也真人用此書以付上德之君以示凡人各知有此教善者日興惡者日衰矣盜賊邪姦得矣善哉善哉何故先示之乎夫天將興雨必先有風雲使人知之所以然者欲樂其收藏也所以先示者樂其為善者日興為惡者日止也今太平氣當至恐人為惡亂其治故先覺之也為政當象天夫天不掩人之短太古聖人不為也名為暗昧政反復致凶不得天地心意故先示之也善哉善哉君何故必居戶內自閉而使言者居戶外乎哉然夫人將聞密言者必心不自知前也頭面相近傍人知之令為言者得害矣夫為人君長受人聰明後使其人得害名為中傷忠信賢良股肱後無肯復言者也聰明閉絕其政亂危者矣又君者陽也居陰中臣者陰也處陽中也陰陽相得者使人悅所言進必盡信也此天自然之法也真人寧知之邪唯唯行去勿妄言此致太平之書也唯唯右興善止惡聰明達立得盜賊忠信者得訣法守三實法第四十四真人前唯唯天下凡人行, HFL: ''}
