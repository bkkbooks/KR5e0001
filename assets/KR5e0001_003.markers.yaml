  - {type: variant, offset: 4066, length: 166, content: 象天夫天不掩人之短太古聖人不為也名為暗昧政反復致凶不得天地心意故先示之也善哉善哉君何故必居戶內自閉而使言者居戶外乎哉然夫人將聞密言者必心不自知前也頭面相近傍人知之令為言者得害矣夫為人君長受人聰明後使其人得害名為中傷忠信賢良股肱後無肯復言者也聰明閉絕其政亂危者矣又君者陽也居陰中臣者陰也處陽中也陰陽相得者使人悅所言進必盡信也此天自然之, HFL: ''}
