  - {type: variant, offset: 49502, length: 618, content: 且悉自出收聚其中要言以為其解謂之為章句得真道心矣可謂為解天之憂大病去矣可謂除地之所苦矣可謂使帝王遊而得天心矣可謂使萬物各得其所矣是者萬不失一也吾見子之言知為天使吾不敢欺子也今欺子正名為欺天令使天不悅喜反且減吾年名為負於吾身又上慚於皇天復無益於萬民其咎甚大子努力記之但記吾不敢有遺力也唯唯見師言也心中恐駭既為天問事不敢道留止也猶當竟之耳師幸原其不及示告其難易故敢具問其所以今文書積多願知其真偽然故固若子前日所問耳十百相應者是也不者皆非也治而得應者是也不者皆偽行也欲得應者須其民臣皆善忠信也何以言之然子賢善則使父母常安而得其所置妻善則使夫無過得其力臣善則使國家長安帝王民臣俱善則使天無災變正此也子寧解耶不解耶行吾今欲與子共議一事今若子可刺取吾書寧究洽達未哉小子童蒙未得其意子試言之吾且觀子具解不今若愚生意欲悉都合用之上下以相足儀其事百以校千千以校萬更相考以為且可足也不者恐不能盡周古文也然子今言真是也子前所記吾書不云乎以一況十十況百百況千千況萬萬況億正此也唯唯願聞其校此者皆當使誰乎各就其人而作事之明於本者恃其本也長於知能用者共圍而說之流其語從帝王到于庶人俱易其故行而相從合議小知自相與小聚之歸於中知中知聚之歸於上知上知聚之歸於帝王然後眾賢共圍而平其說更安之是為謀及下者無遺筭無休言無廢文也小賢共校聚之付於中賢中賢校聚之於大賢大賢校聚之付於帝王於其成理文是之無誤真得天心得陰陽分理帝王眾臣共知其真是迺後下於民間令天下俱得誦讀正文如此天氣得矣, HFL: ''}
