  - {type: variant, offset: 22567, length: 302, content: 意乃後隨天地可為以治與神明合其心觀視其可為也故其治萬不失一也今愚吏人民以為天法可妄犯也自恣不以法度故多亂其君治也大咎在此也今子得書何不詳結心意丁寧思之幽室閑處念天之行乃可以傳天之教以示勑愚人以助帝王為法度也將舉刑用之當深念刑罰之所居皆見從去寂然無士眾獨處故冬刑在四野無人萬物悉叛之內藏避之甚夏刑在內萬物悉出歸德地下室內中空刑寂然獨居皆隨德到野處德在外則萬物歸外德在幽空則物歸內天刑其威極盛幸能厭服人民萬物何故反不能拘制其士眾獨不怪斯耶明刑不可輕妄用傷一正氣天氣亂傷一順氣地氣逆傷一儒眾儒亡傷一賢眾賢藏凡事皆有所動搖故古者聖人聖王帝主乃深見是天戒書故畏之不敢妄為也恐不得天心不能安其身也上皇天德之人乃獨深見, HFL: ''}
