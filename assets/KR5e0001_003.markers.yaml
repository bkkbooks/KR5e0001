  - {type: variant, offset: 17722, length: 967, content: 冤者平王治天因喜解其先王承負驗道真偽訣第五十七行事亦且畢不久真人前詳受教勑唯唯自行此道之後承負久故彌遠積厄結氣并災委毒誠多不可須臾而盡也知力行是之後承負之厄日少月消歲除愈何以知之乎善哉子之難也可謂得道意矣然明聽行此之後天下文書且悉盡正人亦且盡正皆入真道無復邪偽文絕去人人自謹其後生者尤甚更相倣學皆知道內有睹其身各自重愛其後生者孝且壽悉工自養老顏色不與無道時等後生者日知其至意以為家也學復過其先日益就相厚相親愛重有道人兵革姦猾悉無復為者也故承負之厄會日消去此自然之術也萬不失一是吾之文大效也不可但苟空設善言也親以徵驗起迺與天地響相應何可妄語乎故文書前後出非一人蓄積難知情是故吾道以誠也子連時問必樂欲知其大效其效相反猶寒與暑暑多則寒少寒多則暑少夫天地開闢以來先師學人者皆多絕匿其真道反以浮華學之小小益耶且薄後生者日增益復劇其故使成偽學相傳雖天道積遠先為文者所以相欺殆之大階也壹欺不知後遂利用之也令上無復所取信下無所付歸命因兩相意疑便為亂治後生者後連相承負先人之厄會聚并故曰劇也天今冤是故吾語子也真人努力自愛勉之子迺為天除病為帝王除厄天上知子有重功不敢不敢右效行徵驗道知真偽訣四行本末訣第五十八真人前唯唯人行有幾何乎有百行萬端不然也真人語幾與俗人語相類似哉人有四行其一者或何謂也然人行不善則惡不善亦不惡為浮平行壹善壹惡為不純無常之行兩不可據吉凶無處也善哉行吉凶有幾何乎有千條億端真人之言幾與俗人同吉凶之行有四一者惑何謂也然凡事為行不大吉當大凶不吉亦不凶為浮平命一吉一凶為雜不純無常之吉凶不占善哉行天地之性歲月日善惡有幾何乎不可勝紀子已熟醉其言眩霧矣天地歲月日有四行一者不純主為變怪何謂也然真人明聽今天地歲不大樂當大惡不樂亦不惡為浮平歲壹善壹惡為天變惑歲令今日不大善當大惡不善亦不惡為浮平日月壹善壹惡為惑行主行為怪異災吾是但舉綱見始天下之事皆然矣何謂也然天下之萬物人民不入於善必陷於惡不善亦不惡為平平之行壹善壹惡為詐偽行無可立也平平之行無可勸大善與大惡有成名何故正有此四行乎善哉子之難問可謂得道意矣然大善者太陽純行也大惡者得太陰煞行也善惡并合者中和之行也無常之行者天地中和君臣人民萬物失其道路也故行欲正從陽者多得善從陰者多得惡從和者這浮平也其吉凶無常者行無復法度是故古聖賢深觀天地歲月日人民萬物視所興衰浮平進退以自知行得與不得與用洞明之鏡自照, HFL: ''}
