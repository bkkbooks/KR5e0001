  - {type: variant, offset: 49279, length: 222, content: 轉成章句也四轉成浮華五轉者分別異意各司其忤六轉者成相欺文章句者尚小儀其本也過此下者大病也乃使天道失路帝王久愁苦不能深得其理正此也子幸欲報天恩復天重功天者不樂人與其錢財奇偽之物也但樂人共理其文不亂之耳今吾見覩子初來學之時以為子但且問一兩事而去何意乃欲畢天道乎吾言而不正天道略可見覩矣子樂欲正天地但取微言還以逆考合於其元即得天心意可以安天下矣拘校上古中古下古之文以類召之合相從執本者一人自各有本事凡書文各自有家屬令使凡人各出其材圍而共說之其本事字情, HFL: ''}
