  - {type: variant, offset: 34107, length: 97, content: 為上何謂為皇何謂為太何謂為平何謂為氣真人今且何睹何疑一時欲難問微言意哉所以及天師徧具問書文意者書上多道上皇氣且至而不得其大要意今不及天明師訣問之恐後遂無從得知之故敢不具問之也善哉子之言萬世不可易, HFL: ''}
