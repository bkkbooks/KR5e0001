  - {type: variant, offset: 19525, length: 1794, content: 則神去故無神亦死無氣亦死委氣神人寧入人腹中不邪唯唯又五行迺得興生於元氣神迺與元氣并同身并行今五行迺入為人藏是寧九人上極復下反人身不善哉善哉初學雖久一睹此說耳然子學當精之不精無益也唯唯見天師言夫天道固如循環耶然子可謂已知之矣行去有疑勿難問唯唯右簡天四行實本末太極以反政大小諫正法第五十九真人稽首言愚生暗昧實不曉道今既為天視安危吉凶乃敢具問道之訣今世神祇法豈亦有諫正邪唯天師教勑示以至道意子之所問何其妙要深遠也吾伏見人有相諫正故問天亦有相諫正不善哉子之所問已得天道實核矣天精已出神祇悅喜矣今且為子具說其大要意今使可萬萬世不可忘也唯唯然天者小諫變色大諫天動裂其身諫而不從因而消亡矣三光小諫小事星變色大諫三光失度無明諫而不從因而消亡矣地也小諫動搖大諫山土崩地裂諫而不從因而消亡矣五行小諫災生大諫生東行蟲殺人南行毒殺人西行虎狼殺人北行水蟲殺人中央行吏民剋毒相賊殺人諫而不從因而消亡矣四時小諫寒暑小不調大諫寒暑易位時氣無復節度諫而不從因而消亡矣六方精氣共小諫亂覆數起中有生蟲災或飛或步多雲風而不雨空虛無實大諫水旱無常節賊殺傷萬物人民諫而不從因而消亡矣飛步鳥獸小諫災人大諫禽獸食人蝗蟲大興起諫而不從因而消亡矣鬼神精小諫微數賊病吏民大諫裂死滅門諫而不從因而消亡矣六方小諫風雨亂發狂與惡毒俱行傷人大諫橫加絕理瓦石飛起地土上柱皇天破室屋動山阜諫而不從因而消亡矣天地音聲之小諫雷電小急聲大諫人多相與汙惡使霹靂數作諫而不從因而消亡矣吏民小諫更變色大諫多相賊傷諫而不從因而消亡矣天地六方八極大諫俱欲正河雒文出天明證天下瑞應書見以諫正君王天下莫不響應諫而不從因而消亡矣天道經會當用復以次行是故古者聖賢見事輒惟論思其意不敢懈忽失毛髮之間以見微知著故不失皇天心故能存其身安其居無憂患無危亡凶不得來者計事校笇實迺天心意同也善哉善哉愚生已解今唯明天師既陳法願聞其因而消亡意黨開之善哉善哉子之心也然天道迺祐易教祐至誠祐謹順祐易曉祐易勑將要人君厚故教之不要其厚者不肯教之也其象效猶若人相與親厚則相教示以事不相與至厚不肯教示之也教而不聽忿其不以時用其言故廢而置之不復重教示之也於是災變怪便止不復示勑人也如是則雖賢聖聾闇無知也聰明閉塞天地神祇不肯復諫正者也災異日增不除人日衰亡失其職矣故古者聖賢旦夕垂拱能深思慮未嘗敢失天心也故能父事皇天母事皇地兄事日姊事月正天文保五行順四時觀其進退以自照正行以深知天得失也唯天地自守要道以天保應圖書為大命故所行者悉得應若神是迺獨深得天意也比若重現合矩相對而語也故神靈為其動搖也如逆不肯用其諫正也迺要天反與地錯五行四時為其亂逆不得其理故所為者不中因而大凶矣此之謂也子寧曉未唯唯故天地之性下亦革諫其上上亦革諫其下各有所長短因以相補然后天道凡萬事各得其所是故皇天雖神聖有所短不若地之所長故萬物受命於天反養體於地三光所短不若火所長三光雖神且明不能照幽寢之內火反照其中大聖所短不若賢者所長人之所短不若萬物之所長故相諫及下極小微則不失道得天心故天生凡事使其時有變革悉皆以諫正人君以明至德之符不可不大慎也夫天地萬物變革是其語也唯唯皇天師既示曉願效於人諾子詳聆吾言而深思念之臣有忠善誠信而諫正其上也君不聽用反欲害之臣駭因結舌為瘖六方閉不通賢儒又畏事因而蔽藏忠信伏匿真道不得見君雖聖賢無所得聞因而聾盲無可見奇異也日以暗昧君聾臣瘖其禍不禁臣昧君盲姦邪橫行臣瘖君聾天下不通善與惡不分別天災合同六極戰亂天下並凶可不慎乎哉唯唯故古者聖賢重災變怪因自以繩正故萬不失一者實乃與要文大道同舉事悉盡忠無復凶子重誡之謹慎吾言唯唯然夫天高且明本非一精之功德也帝王治得天心非一賢臣之功今吾之言但舉其綱見始凡事不可盡書說也子自深計其意唯唯行去矣說何極乎勿復有可問也唯唯右天諫正書訣案書明刑德法第六十真人純謹敬拜純今所問必且為過責甚深吾歸思師書言悉是也無以易之也但小子愚且蒙悃悒不知明師皇天神人於何取是法象今怪師言積大願師既哀憐示其天證陰陽之訣神祇之卜要效今且不思心中大煩亂所言必觸師之忌諱又欲言不能自禁絕唯天師雖非之願以天之明證法示教使可萬萬世傳昭然無疑比若日中之明也終始不可易而去也然子固固不信吾言邪子自若未善開通知天心意也子自若愚乎愈於俗人無幾耳以為吾言可犯也犯者亂矣逆者敗矣吾且與子語皆已案考於天文合於陰陽之大訣乃後言也子來者為天問事吾者為天傳言制法非敢苟空偽言佞語也子生積歲月日幸不少獨不見擾擾萬物之屬悉盡隨德而居而反避刑氣邪此者純, HFL: ''}
