  - {type: variant, offset: 2950, length: 555, content: 凶咎也何以為善哉觀真人之說也不順天地之教令逆天道不樂助天地生化反欲斷絕之子之吐口出辭曾無負於皇天后土乎無壯不及有過見天師說自知罪重不也為子言事無當反天道而以俗人之言不順天意陰陽所以多隔絕者本由男女不和男女者乃陰陽之本也夫治事乃失其本安得吉哉今唯天師當云何乎然太皇天上平氣將到當純法天故令一男者當得二女以象陰陽陽數奇陰數偶也迺太和之氣到也如大多女則陰氣興如大多男則陽氣無雙無法亦致凶何也人之數當與天地相應不相應力而不及故得凶害也夫帝王后宮迺應土地意云何哉今真人所言即助吾語也夫女即土地之精神也王者天之精神也主恐土地不得陽之精神王氣不合也令使土地有不化生者故州取其一女以通其氣也樂其化生者恐其施恩不及王施不洽故應土地而取之也徧施焉乃天氣通得時雨也地得化生萬物令太平氣至不可貴貞人也內獨為過甚深使王治不和良凡人亦不可過節度也故使一男二女也善哉善哉右順天地法合陰陽使男女無冤者致時雨令地化生王治和平興善止惡法第四十三真人前今太平氣臨到欲使謹善者日益興惡者日衰卻也為其有傷殺人盜賊發為作政當云何乎何謂也謂臨發所知也如人君坐有所疑而欲使善者大興惡者立衰也盜賊起使即時得也其為政當柰何乎今真人宜善記之今天師使之敢不言每言不中天師法何謙為言之自古大聖人不責備於一人也今子言不中何謙乎唯唯但當賞善罰惡令使其分明即善者日興惡者日衰, HFL: ''}
