  - {type: variant, offset: 8007, length: 298, content: 道之要意令後世日浮淺不能善自養自愛為此積久因離道遠謂天下無自安全之術更生忽事反鬭祿故生承負之災子解意豈知之耶善哉善哉見天師言昭若開雲見日無異也行子可謂已得道意矣愚生蒙恩已大解今問無足時唯天師丁寧重戒之然夫人能深自養迺能養人夫人能深自愛迺能愛人有身且自忽不能自養安能厚養人乎哉有身且不能自愛重而全形謹守先人之祖統安能愛人全人愚哉子寧深解不耶唯唯善哉善哉行子以為吾書不可信也試取上古人所案行得天心而長吉者書文復取中古人所案行得天心者書策文復取下古人所思務行得天意而長自全者文書宜皆上下流視考之必與重規合矩無殊也迺子蒙且大解迺後且大信吾書言也今天疾人後生者日益輕易鬭命試才下愚迺言天無知道天不效也夫地尚, HFL: ''}
