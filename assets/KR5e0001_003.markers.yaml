  - {type: variant, offset: 46220, length: 1683, content: 矣天道制脈或外或內不可盡得而知之也所治處十十治訣即是其脈會處也人有小有大尺寸不同度數同等常以窞穴分理乃應也道書古今積眾所言各異名為亂脈也陽脈不調反治陰脈使人被咎賊傷良民使人不壽脈乃與天地萬物相應隨氣而起周者反始故得其數者因以養性以知時氣至與不也本有不調者安之古者聖賢坐居清靜處自相持脈視其往來度數至不便以知四時五行得失因反知其身衰盛此所以安國養身全形者也可不慎乎哉人惑隨其無數灸刺傷正脈皆傷正氣逆四時五行使有災異大人傷大小人傷小盡有可動遙不居其處者此自然之事也是故古聖賢重之聖帝王居其處候脈行度以占知六方吉凶此所謂以近知遠以內知外也故為神要道也神祝文訣第七十五天上有常神聖要語時下授人以言用使神吏應氣而往來也人民得之謂為神祝也祝也祝百中百祝十中十祝是天上神本文傳經辭也其祝有可使神伭為除疾皆聚十十中者用之所向無不愈者也但以言愈病此天上神讖語也良師帝王所宜用也集以為卷因名為祝讖書也是乃所以召群神使之故十愈也十九中者真神不到中神到大臣有也十八中者人神至治民有也此者天上神語也本以召呼神也相名字時時下漏地道人得知之傳以相語故能以治病如使行人之言不能治愈病也夫變事者不假人須臾天重人命恐奇方難卒成大醫失經脈不通死生重事故使要道在人口中此救急之術也欲得此要言直置一病人於前以為祝本文又各以其口中密祕辭前言能即愈者是真事也不者盡非也應邪妄言也不可以為法也或有用祝獨愈而他傍人用之不決效者是言不可記也是者鬼神之長人自然使也名為孤言非召神真道也人雖天遙遠欲知其道真不是與非相應和若合符者是也不者非也葬宅訣第七十六葬者本先人之丘陵居處也名為初置根種宅地也魂神復當得還養其子孫善地則魂神還養也惡地則魂神還為害也五祖氣終復反為人天道法氣周復反其始也欲知地效投小微賤種於地而後生日興大善者大生地也置大善種於地而後生日惡者是逆地也日衰少者是消地也以五五二十五家冢丘陵效之十十百百相應者地陰寶書文也十九相應者地陰寶記也十八相應者地亂書也不可常用也過此而下者邪文也百姓害書也欲知其審記過定事以效來事乃後真偽分別可知吾書猶天之有甲地之有乙萬世不可易也本根重事效生人處也不可苟易而已成事邪文為害也令使災變數起眾賢人民苦之甚甚故大人小人欲知子子孫孫相傳者審知其丘陵當正明其故以占來事置五五二十五丘陵以為本文案成事而考之錄過以效今去事之證以為來事真師宜詳惟念書上下以解醉迷名為占陰覆文以知祖先利後子孫萬世相傳慎無閉焉諸樂古文是非訣第七十七諸樂者所以通聲音化動六方八極之氣其面和則來應順善不和則其來應戰逆夫音聲各有所屬東西南北甲乙丙丁二十五氣各有家或時有集聲相得成文辭故知聲聆聲音以知微言占吉凶舉音與吹毛律相應乃知音絃聲宮商角徵羽分別六方遠近以名字善惡云何哉精者乃能見其精神來對事也故古者聖賢調樂所以感物類和陰陽定四時五行陰陽調則其聲易聽陰陽不和乖逆錯亂則音聲難聽絃又當調宜以九九次其絲絃大小聲相得思之不傷人藏精神也不調則舞亂無正聲音不可聽傷人藏精神也故神祇瑞應奇物不來也故得其人能任長於聲音者然後能和合陰陽化也以何知之也為之神明來應瑞應物來會此其人也不者皆亂音不能感動故不來也故凡事者當得其人若神不得其人若妄言得其人事無難易皆可行矣不得其人事無大小皆不可為也是故古聖賢重舉措求賢無幽隱得為古得其人則理不得其人則亂矣古文眾多不可勝書以一事況十十況百百況千千況萬萬況億億況無極事各自有家類屬皆置其事本文於前使曉知者執其本使長能用者就說之視其相應和中者皆是也不應又不中者悉非也欲知古聖人文書道審不也此比若呼人得其姓字者皆應鬼神亦然不得姓字不應雖欲相應和無緣得達故不應也故古者名學為往精精者乃精念其事象可宜復思其言也極思惟此書策凡事畢矣書卷上下眾多各有事宜詳讀之更以相足都得其意已畢備不深得其要意言道無效事故見變不能解陰陽戰鬭吾書乃為仁賢生往付有德有德得之以為重寶得而不能善讀言其非道故不能樂其身除患咎也夫大道將見其如無味乎用之不可既乎眾賢原之可以和剛柔窮陰陽位乎諸文書畢定各得其所不復憒憒乎惡悉去矣上帝大樂民無祟乎澤及小微萬物擾擾不失氣乎復反於太初天地位乎邪文已消守元炁乎一者道之綱二者道之橫行三者已亂不可明, HFL: ''}
