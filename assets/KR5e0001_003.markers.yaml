  - {type: variant, offset: 30359, length: 311, content: 之人乎此財名為自祐利之人耳真人尚乃以此為善何況俗人哉自見行謹信不犯王法而無罪名者啼呼自言不負天不負君父師也汝行適財自保全其身耳反深自言有功於上而啼呼天地此悉屬下愚之人也不能為上善之人也今所以為真人分別具說此者欲使真人以文付上德之君以深示勑眾賢使一覺悟自知行是與非亦當上有益於君父師不邪太上中古以來人益愚日多財為其邪行反自言有功於天地君父師此即大逆不達理之人也真人亦豈知之耶唯唯子可謂已覺矣今為行善實大難也子慎之子不力通吾文以解天地之大病使帝王游而無憂無事天下莫不懽喜下及草木子未能應上善之人也財名為保全子身之人耳又何以置天地乎夫人欲樂全其身者小人尤劇子亦知之乎唯唯子可謂為已覺矣慎之唯唯今天師幸哀愚賤不達道之生願復聞上善之, HFL: ''}
