  - {type: variant, offset: 35447, length: 6983, content: 婦子共為一家也不可以相無是天要道也此猶若人有頭足腹迺成一身無可去者也去之即不足不成人也是天地自然之數也故古者聖人取法於天故男子須得順善女與為治然且有善子男者君也女者臣也子者民也故天命治國之道以賢明臣為友善女然後能和其子也善臣然後能和其民也善女然後能生善子善臣然後能生善民民臣俱好善然後能長安其上也真人欲樂知其效天者君也地者臣也天雨周流雨之善地生物善雨之惡地生物惡此之謂也今父母君臣尚但共持其大綱紀耳大要實仰衣食於子人無子絕無後世君少民迺衣食不足令常用心愁苦故治國之道迺以民為本也無民君與臣無可治無可理也是故古者大聖賢共治事但旦夕專以民為大急憂其民也若家人父母憂無子無子以何自名為父母無民以何自名為君也故天之法常使君臣民都同命同吉凶同一職一事失正即為大凶矣中古以來多失治之綱紀遂相承負後生者遂得其流災尤劇實由君臣民失計不知深思念善相愛相通并力同心反更相愁苦夫君乃一人耳又可處深隱四遠冤結實閉不通治不得天心災變怪異委積而不除天地所欲言人君不得知之大咎在此不三并力聰明絕邪氣結不理上為皇天大仇下為地大咎為帝王大憂災紛紛不解為民大害為凡物大疾病為是獨積久矣非獨今下古人過所致也真人亦知之乎知如此久矣實不知其所由致故問之誠冤今當柰何之乎然天太平氣方到治當得天心乃此惡悉自除去故天使吾具言之欲使吾救其失為出正文故使真人來悉問之也此所由生凶也不象天地元氣自然法不三相通并力同心故致此也若三相通并力同心今立平大樂立無災願聞治之當云何乎哉急象天法如比上為也天法凡事三并力同心故天以三光為文三光常相通共照無復絕時也天券出以來人以書為文以治象天三光故天時時使河洛書出重勑之文書人文也欲樂象天洞極神治之法度使善日興惡日絕滅書者但通文書三道行書也君宜善開導其下為作明令示勑教使民各居其處而上書悉道其所聞善惡因卻行亦可但寄便足亦可寄商車載來亦可善自明姓字到為法如此則天下善惡畢見矣君導天氣而下通臣導地氣而上通民導中和氣而上通真人傳書付有德之君審而聆吾文言立平立樂災異除不失銖分也吾書敬受於天法不但空陳偽言也天誅殺吾子亦知是讁重耶唯唯欲得吾書信得即效司之與天地立響相應是吾文信也以此大明效證可毋懷狐疑夫治國之道樂得天心自安者但行此效與天響相應即天與人談之明券也吾但見真人常樂助有德之君欲報天重功故一二言之耳吾知其失在此閉不通得書君為制作明教善令言從今以往吏民宜各居其處力上書悉道善惡以明帝王治以通天氣勿得相止止者坐其事三年獨上書盡信無欺文者言且召而仕之其仕之云何各問其才能所長以筋力所及署其職何必署其筋力所能及乎天之事人各因其能不因其才能名為故冤人則復為結氣增災所以然者人所不及雖生之死猶不能為也今人所樂極樂得善物金玉也今使明君有教言人有能撫手盡得天下縣官金銀奇偽之物不以過汝盡以與汝其人極樂得之也力而不及物繫其兩手弊盡之猶不能致也今為人父母君將署臣子之職不以其所長正交殺之猶不能理其職事但空亂其官職愁苦其民耳官職亂民臣愁則復仰呼天自言冤上動天復增災怪故古聖賢欲得天心重慎署置皆得人心故能稱天心也其稱天心云何行之得應其民吏日善且信忠是其效也則遷之以時是助國得天心之人也或但有樂一旦貪名得官其行無效不稱天心無應者夫帝王迺承天心而治一當稱天心不稱天心為過故其治無善放應當退使思過如此則天已喜而天下莫不盡忠信盡其能力者也幽隱遠方聞之無藏其能者也其上書急者人命至重不可須臾人且復啼呼冤今復結增怪變疾解報之其事可忍者須秋冬何必須秋冬乎然秋者物畢成冬者物畢藏天氣定也物以仲秋八月成熟其實核可分別故當順天地之法始以八月分別視之九月者天氣之究竟也物到九月盡欲死故當九月究竟讀視之觀其善惡多少十者數之終也故物至十月而反初天正以八月為十月故物畢成地正以九月為十月故物畢老人正以亥為十月故物畢死三正竟也物當復生故乾在西北凡物始核於亥天法以八月而分別之九月而究竟之十月實核之故天地人三統俱終實核於亥故十月而實核下付歸之所以然者此八月九月十月三月也天地人正俱畢竟當復反始不實不核不得其意天地且不悅喜其災不除復害來年故八月而分別視之九月而究竟之十月而實核下付歸之令使吏民悉得更思過失不敢復為也來年吏民更謹凡物悉善矣不歸使思過固固民臣居下失政令不自知有過其心不易天道固固惡不易矣故當付歸之也真人欲知其效今年所付歸因書一通自置之亦教吏民自記一通置之視善惡多少名為天券來年付歸復置一通視善惡多少來年復付歸置一通視善惡多少下踈與上所記置當繇相應名為天徵合符令吏民更易心為善得天意所上當多善若令大易當大善若令固固無變不易所上固固如令為惡不止所上當益惡吏民大欺忿天所上當大惡增劇故是天洞明照心之鏡也不失銖分以明吏民治行夫天地比若影響隨人可為不脫也真人幸有善意努力卒之慎之子雖來問此若無事無益天內默視子口可言以何明之以言也夫人言事辭詳善人即報之以善響亦應之以善其言凶惡不祥人亦報之以惡響亦應之以惡也凡事相應和者悉天使之也子寧解耶唯唯夫天迺高且遠尊嚴安可事事自下與人言語乎故其法皆以自然應和之也子心今開不唯唯已解願及天師復假一言行道之中古皇無文不三相通以何能安之乎善哉子之言也天運使其時人直質樸其人皆懷道而信又專一但流言相通人人各欲至誠信思稱天心迺無一相欺者也故君臣民三并力同心相通故能相治也如使不同心為一家即亂矣今者承負而文書眾多更文相欺尚為浮華賢儒俱迷共失天心天既生文不可復流言也但當實核得其實三相通即天氣平矣天法者或億或萬時時不同治各自異術各不同也今者太平氣且至當實文本元正字迺且得天心意也子不能分別天地立事以來其治億端行其事悉得天應者是也不得天應者非也是即其大明天券徵驗效也寧解耶唯唯行去勿得復問今非不能為子悉記天地事立以來事事分別解天下文字也但益文難勝記不可為才用無益於王治故但悉指授要道而言夫治不理本由天文耳是天地大病所疾也古時賢聖所共憎惡也故道為有德君出不敢作文皆使還守實求其根保其元迺天道可理國自安真人雖好問勿復令益文也去思之唯唯右包裹元氣自然天地凡事三合相通并力同心天明券和皇平治法急學真法第六十六真人前今良和氣且俱至人但當游而無職事當以何明其心而正其意常使其忽然忘為邪惡而日好為善不知置令帝王垂拱而無可治上善之人滿其朝忠信孝子皆畢備當以何致之乎真人有天性好善之心常汲汲憂天道宜自精具陳說之然但當急學之以真道真德真仁耳何以當學以真道哉然道乃能導化無前好生無輩量夫有真道乃上善之名字夫無道者乃最惡衰凋凶犯死喪之名稱也真人此今但說真善哉吾無以加之何以當學之以真德夫人有真德乃能包養無極之名字夫無德者乃最劣弱困窮小人之名字也善哉真人之言吾復無以加之也真真是也何以當學之以仁道也仁者乃能恩愛無不包及但樂施與無窮極之名字夫不仁之人乃好德反惡典與是乃大貪鄙之名稱與禽獸同志無可以自別異也善哉真人之言吾復無以加此也今真人說三事吾無以加此也今人當學為善邪不當邪當力學為善夫為善亦豈有名稱字不邪小子不及唯師開示之然夫為善者乃事合天心不逆人意名為善善者乃絕洞無上與道同稱天之所愛地之所養帝王所當急仕人君所當與同心并力也夫惡者事逆天心常傷人意好反天道不順四時令神祇所憎人所不欲見父母之大害君子所得愁苦也最天下絕凋凶敗之名字也故人之行失吉輒入凶離凶則入吉一吉一凶一善一惡為不純謹之徒子寧知之唯唯令於真人意凡人之行當云何哉然人今不力學道輒為無可知道輒名無道之人夫無道之人人最為惡凶人也今不力學德輒為無可知德夫無德而好害傷之人乃凶敗之符也今人不力學仁已不仁矣夫不仁之人乃與禽獸同路人與禽獸同心愈於死少耳今人不旦夕力學善失善即入惡夫惡乃死凶之處故凡人不力學吉輒乃入凶夫凶迺天下惡名稱善哉子已長入真道不復還反惡矣今真人久懷智而作愚何哉不敢行子幸有能極陳子所言吾甚喜之今能極於此子曾但見吾言說反中棄而止耶不敢也見師比勑使說適意有所不及不敢悉言之善哉子之言常大謙今能極意真門唯天師錄示所不及然子向所言悉是也是故古者大聖三皇常自旦夕力學真道見不好學真道者名為無道之人夫無道之人其行無數天之大重怨夫無道之人本天不欲覆蓋地不欲載也神靈精鬼所不欲祐天下所共苦也聖人賢者君子乃大疾無道之人故古者上皇之時人皆學清靜深知天地之至情故悉學真道乃後得天心地意人不力學德名為無德之人夫無德之人天不愛地不喜人不欲親近之其行常行事不為德乃為王者致害為君子致災鬼神承天教不久與為治是故古者賢聖大儒見無德之人不與其通言語也不力旦夕學仁即且忽事為不仁夫不仁之人言即逆於凡事傷人心不合天意反與禽獸相似故古者聖賢不與其同路也今人不事師力學善即且愚闇不知為善也反且恣其無知之心輕為惡夫惡人下愚蔽闇之人其行乃不順天地之道尚為君子得事戮其父母愁其宗親為行無法鬼神承天心為使不喜之為害甚處三法所當誅古者聖賢以為大怨故古者悉自實核其學問也合於天心事入道德仁善而已行要當合天地之心不以浮華言事所以然者且失天法失之即入凶絕短命矣或害後世天道不誤有格法夫不力學大吉之道反事者輕忽自易必且入凶夫凶者乃天地人萬物所疾惡不可久存是大患之本禍之門戶過而陷其中便死不得還悔過反故也天下莫不共知之而下士大愚常共笑道不知守道早避凶害傳傳為愚更相承負後生愚闇復劇於前故真道閉而不通令人各自輕忽不能窮竟其天年其大咎過乃由此也真人見吾書宜深計之慎無閉藏以付賢柔明使其覺悟是故古道乃承天之心順地之意有上古大真道法故常教其學道學德學壽學善學謹學吉學古學平學長生所以盡陳善者天之為法乃常開道門地之為法常開德戶古之聖賢為法常開仁路故古者聖賢與天同心與地合意共長生養萬二千物常以道德仁意傳之萬物可興也如以凶惡意傳之凡物日衰少故有道德仁之處其人日多而好善無道德仁之處其人日衰少其治日貧苦此天地之格懸法夫有至道明德仁善之心乃上與天星曆相應神靈以明其行故古者聖賢常思為善無極力盡乃以不敢有惡念凶路也夫下愚之人其心常閉塞實無知不可復妄假之以凶衰之惡路也不自知大失天道相隨為惡以為常習俗不能自退還也是以吾上敬受天書教勑承順天心開闢之大開上古太平之路令使人樂為善者不復知為惡之術天下之人其志也常高而其所成者反常下不能應其本所志念也故夫上士忿然惡死樂生往學仙勤能得壽耳此上士是尚第一有志者也中士有志疾其先人夭死忿然往求道學壽勤而竟其天年耳是其第一堅志士也其次疾病多而不得常平平忿然往學可以止之者勤能得復其故已小困於病病乃學想能禁止之已大病矣其次大病劇乃求索道術可以自救者已死矣是故吾書教學人乃以天長壽之法旦夕自力為之纔得且平平耳如以平平之法學凡人已入凶矣愚者不知天下凡人其本志所為常念善高已者不能應其所志故為其高舉之上極於仙即纔得保其天年耳夫大賢者志十得十必與吾道書相應中賢者志十或中止更懈纔得五小人朝志之暮忘其所言故大高舉者樂使其上中下各得其心所志念今下古人大愚去真道遠力學以天正文法纔不陷於偽欺耳學以平平之文已大欺矣學以習文好言大偽姦猾已起矣天以帝王為子惡下欺上夫人行下多邪偽即上道德仁君無所信下民人無所附歸其命夫力旦夕教學以真道耳力學以善道纔得平平之道也力學以平平之道已入浮華矣入浮華凡人大迷惑窮困矣便成大凶惡之路帝王為愁苦人不可治真人欲知是信比若人家慈父母日教其子為善自苦絕衣食養之老尚固固為惡何況凡人乃相示教以浮華之文哉以吾書不信也使凡人見吾書者各自思所失中古以來有善道者皆相教閉藏不肯傳與其弟子反以浮華偽文教之為是積久故天道今獨以大亂矣天地災怪萬類不空也賢儒宜各深思然吾今雖不旦夕與俗人同處昭然已知之矣天下大疾苦之故使吾出此文以告屬之吾不空也真人實宜重慎之且有天讁唯唯不敢也每見天師言常駭慄子之言是也即天且大悅大喜不害子也唯唯凡人雖力旦夕學勑教以真德尚纔得平平之德耳學以平平之德已入邪偽德矣學以邪偽德愚人已無復數矣無有真德恣心而行此純君子之賊力學以上仁纔得成中仁耳力學以中仁其行纔平平無有仁也學以不仁愚人已成盜賊矣不自知殺傷無復數恣意而行不用道理是正天怨地咎人之大賊力旦夕學以大吉之道纔得中吉耳學以中吉纔得小吉耳學以小吉此已入凶道矣學以凶道已不復救矣俱大闇昧無一知見天道言其不真但欺誷純信其愚心妄言上千天文下亂地理為百姓害災是故吾道書學凡人也乃大學之使其上列真仙如不能及真仙可得平安不為有德之君憂真人宜深思惟吾言勿復反怪之唯唯今吾乃為天談當悉解天地開闢以來承負之責不能大張之以上大道大德之法上壽之術上善之路人失諸闇昧誠久信其愚蔽之心人會為惡不可禁止猶復不能解其承負天地之讁過真人寧曉吾言耶唯唯夫聖賢高士見文書而學必與吾書本相應不失絲髮之間中士意半達必得其半下士自力勤能不失法所以大舉天民凡人者樂其上下中無失法者皆得正道各自愛不敢輕事為大憂上士得吾道學之不止可為國之良臣久久得其要意可以度世不復爭訟事視權也中士學吾道可以為良善小臣可以竟其天年小人學吾道可以長謹父慈母愛子孝兄良弟順夫婦同計不相賊傷至死無怨魂神居地下尚復長不復見作事不見名為惡子無夭年戮死者也夫古者本元氣天生之時人盡樂學欲仙尚不能壽纔使人各畏死不犯刑法耳夫下古人大愚反誦浮華相教共學不壽之業生時忽然自言若且無死反相教無可愛惜共興凶事治死喪過生生乃屬天也死乃屬地事地反過其天是大害也吾以是行占之知其俱愚積久無一知也凶事興即鬼大盛共疾殺人人不得竟其天命夫力學真道纔得偽道力學真德尚纔得偽德耳何況下古之人反相學以浮華之文其去道遠哉困窮不得復相拘制反相教為章奏法律辯慧相持長短夫教其為仁尚愁其不仁及教其學為不仁之路天乃為人垂法天自名為大道地自名為德所以然者夫天地乃萬物之父母凡事君長故常導之以善不敢開昌導教之以凶惡之路而況人乎人者天之子也當象天為行今乃失法故人難治教導之以道與德乃當使有知自重自惜自愛自治今反開之以刑法使其視死忽然尚勇力自輕令使傳相治因而相困反更相剋賊迭相愁苦故天下人無相愛者大咎在此真人知之耶慎之唯唯夫力勑教其仁尚苦不仁下古之人反相教數書已大薄矣其相憎怨不得絕力教其為吉尚苦不吉下古之人反相勑力學死喪之具豫與凶事以待之日死不以其壽幾滅門矣而不自知過誤臨時呼天號地自言冤王治不平使我失年內行自得之愚人不防其本罪定乃悔不為謹以無益也雖號死其口猶不復救矣故吾今力勑教以大仙經道纔開其壽階耳學人以德纔使其仁學人以仁纔使其平平保其故不敢相欺奪人財物也學人以平平已失法矣學人以法已失相剋賊矣學人相剋賊已入大武矣入大武即民已無罪而欺矣困窮也成盜賊故吾承天道法開大吉之門閉其凶惡之路開天太平之階人人誦之且各自謹無可復治也致令天時運轉樂王者乃長游而無事是故吾書悉考凡事之本元纔得其中也考其中已得其下矣學愚人以下已大亂矣今下古所以帝王雖有萬萬人之道德仁思稱天心而凶不絕者乃承負流災亂以來獨積久雖愁自苦念之欲樂其一理變怪盜賊萬類夷狄猾夏乃先王之失非一人所獨致當深知其本是以天使吾出書為帝王解承負之過真人以吾道不與天相應今但案吾文行之不失銖分立相應矣是吾文大信不力行以解冤結天道安能默空相應乎夫愚不學安能賢乎夫貧而不耕安能收耶學輒日賢耕輒有收行吾書其如是矣吾保之不學無求賢不耕無求收子知之乎唯唯真道以正也大德興盛仁各得其所矣治平而言莫不失一真人解未幸欲報天地之功而得壽者努力信道勿懈唯唯今愚生欲復有所問不敢卒言平行今天師以何知人大無道德仁也善哉子之言觀其人行言云何願聞之然覩道人而忿然反非之以知其洞無道之人覩德而非惡之以知為大無德之人覩仁而非之以知為大惡不仁之人覩善謹而非之以知為不謹不善之人天性凡同志者相愛異志者相憎善人亦疾苦惡人惡人亦疾苦善人真人寧解不唯唯夫古者聖賢見人不即與其語但精觀占視其所好惡以知之矣正以此鏡其行萬不失一善哉故夫道者乃與皇天同骨法血脈故天道疾惡好殺故與天為重怨地者與德同骨法血脈故惡人傷害與地為大咎夫仁與聖賢同骨法血脈故聖賢好施仁而惡奪故與聖人仁為大仇是故昔者聖賢深知此為三統所案行故其制法不敢違離真道與德仁也故天行者與四時并力天行氣四時亦行氣相與同心故逆四時者與天為怨地者與五行同心并力共養凡物未當終死而見傷害與地為大咎聖賢與仁同心并力故游居常尊道而貴德倚附仁而處如人好奪而不仁與聖賢為怨仇故火為心心為聖故火常倚木而居木者仁而有心火者有光能察是非心者聖而明故古者大聖賢常倚仁明而處歸有道德仁之君故吾重戒真人以吾書付歸有道德仁明之君必且樂好吾道深知其意案而效之與神無異吾不自譽於真人也行之得應必如重規合矩乃後下古之人且念吾言唯唯行去力之勉之力學道德與仁餘者無可為者出此書無令藏唯唯右重明賢人心以解愚闇書疑者宜取訣於此去邪文飛明古訣第六十七六端真人純稽首再拜謹具敢問上皇神人求真吾欲使天地平安陰陽不亂常順行災害不得妄生王者但日游冶為大樂之經雖所問上下眾多豈可重聞乎善哉深乎子之所問也何其密達也正問此要會子其欲進至道而退去邪文邪諾今且悉說之子積善於天吾何敢匿之今為子眷眷其善究於神明之心吾不言不行恐逆天意若天故使子求問之也為子具分別言自隨而記之慎無遺也帝王能力用吾書災害悉已一旦除矣天下咸樂皆欲為道德之士後生遂象先世老稚相隨而起盡更知求真文校事浮華去矣心究洽於神靈君無一憂何故不日游乎哉如是天地凡事各得其所百神因而歡樂王者深得天意至道往祐之但有日吉無有一凶事也吾言誠誠萬不失一也但恐得之不行眾邪結也災異浮華天地陰陽之大病也大病而不治以何得解愈哉子既來問事為天語言子詳思吾書上下之辭幸有至意慎無亂之唯唯誠得歸便處日夜惟思得傳而記之反覆重䟽冀其萬世無有去時也天地開闢言語書文前後相因事同氣者以類相明求其類而聚之其道日以彰明無有衰時也故自古到今眾聖共為天談眾賢者同其辭共為聖謀, HFL: ''}
  - {type: variant, offset: 35447, length: 6983, content: 婦子共為一家也不可以相無是天要道也此猶若人有頭足腹迺成一身無可去者也去之即不足不成人也是天地自然之數也故古者聖人取法於天故男子須得順善女與為治然且有善子男者君也女者臣也子者民也故天命治國之道以賢明臣為友善女然後能和其子也善臣然後能和其民也善女然後能生善子善臣然後能生善民民臣俱好善然後能長安其上也真人欲樂知其效天者君也地者臣也天雨周流雨之善地生物善雨之惡地生物惡此之謂也今父母君臣尚但共持其大綱紀耳大要實仰衣食於子人無子絕無後世君少民迺衣食不足令常用心愁苦故治國之道迺以民為本也無民君與臣無可治無可理也是故古者大聖賢共治事但旦夕專以民為大急憂其民也若家人父母憂無子無子以何自名為父母無民以何自名為君也故天之法常使君臣民都同命同吉凶同一職一事失正即為大凶矣中古以來多失治之綱紀遂相承負後生者遂得其流災尤劇實由君臣民失計不知深思念善相愛相通并力同心反更相愁苦夫君乃一人耳又可處深隱四遠冤結實閉不通治不得天心災變怪異委積而不除天地所欲言人君不得知之大咎在此不三并力聰明絕邪氣結不理上為皇天大仇下為地大咎為帝王大憂災紛紛不解為民大害為凡物大疾病為是獨積久矣非獨今下古人過所致也真人亦知之乎知如此久矣實不知其所由致故問之誠冤今當柰何之乎然天太平氣方到治當得天心乃此惡悉自除去故天使吾具言之欲使吾救其失為出正文故使真人來悉問之也此所由生凶也不象天地元氣自然法不三相通并力同心故致此也若三相通并力同心今立平大樂立無災願聞治之當云何乎哉急象天法如比上為也天法凡事三并力同心故天以三光為文三光常相通共照無復絕時也天券出以來人以書為文以治象天三光故天時時使河洛書出重勑之文書人文也欲樂象天洞極神治之法度使善日興惡日絕滅書者但通文書三道行書也君宜善開導其下為作明令示勑教使民各居其處而上書悉道其所聞善惡因卻行亦可但寄便足亦可寄商車載來亦可善自明姓字到為法如此則天下善惡畢見矣君導天氣而下通臣導地氣而上通民導中和氣而上通真人傳書付有德之君審而聆吾文言立平立樂災異除不失銖分也吾書敬受於天法不但空陳偽言也天誅殺吾子亦知是讁重耶唯唯欲得吾書信得即效司之與天地立響相應是吾文信也以此大明效證可毋懷狐疑夫治國之道樂得天心自安者但行此效與天響相應即天與人談之明券也吾但見真人常樂助有德之君欲報天重功故一二言之耳吾知其失在此閉不通得書君為制作明教善令言從今以往吏民宜各居其處力上書悉道善惡以明帝王治以通天氣勿得相止止者坐其事三年獨上書盡信無欺文者言且召而仕之其仕之云何各問其才能所長以筋力所及署其職何必署其筋力所能及乎天之事人各因其能不因其才能名為故冤人則復為結氣增災所以然者人所不及雖生之死猶不能為也今人所樂極樂得善物金玉也今使明君有教言人有能撫手盡得天下縣官金銀奇偽之物不以過汝盡以與汝其人極樂得之也力而不及物繫其兩手弊盡之猶不能致也今為人父母君將署臣子之職不以其所長正交殺之猶不能理其職事但空亂其官職愁苦其民耳官職亂民臣愁則復仰呼天自言冤上動天復增災怪故古聖賢欲得天心重慎署置皆得人心故能稱天心也其稱天心云何行之得應其民吏日善且信忠是其效也則遷之以時是助國得天心之人也或但有樂一旦貪名得官其行無效不稱天心無應者夫帝王迺承天心而治一當稱天心不稱天心為過故其治無善放應當退使思過如此則天已喜而天下莫不盡忠信盡其能力者也幽隱遠方聞之無藏其能者也其上書急者人命至重不可須臾人且復啼呼冤今復結增怪變疾解報之其事可忍者須秋冬何必須秋冬乎然秋者物畢成冬者物畢藏天氣定也物以仲秋八月成熟其實核可分別故當順天地之法始以八月分別視之九月者天氣之究竟也物到九月盡欲死故當九月究竟讀視之觀其善惡多少十者數之終也故物至十月而反初天正以八月為十月故物畢成地正以九月為十月故物畢老人正以亥為十月故物畢死三正竟也物當復生故乾在西北凡物始核於亥天法以八月而分別之九月而究竟之十月實核之故天地人三統俱終實核於亥故十月而實核下付歸之所以然者此八月九月十月三月也天地人正俱畢竟當復反始不實不核不得其意天地且不悅喜其災不除復害來年故八月而分別視之九月而究竟之十月而實核下付歸之令使吏民悉得更思過失不敢復為也來年吏民更謹凡物悉善矣不歸使思過固固民臣居下失政令不自知有過其心不易天道固固惡不易矣故當付歸之也真人欲知其效今年所付歸因書一通自置之亦教吏民自記一通置之視善惡多少名為天券來年付歸復置一通視善惡多少來年復付歸置一通視善惡多少下踈與上所記置當繇相應名為天徵合符令吏民更易心為善得天意所上當多善若令大易當大善若令固固無變不易所上固固如令為惡不止所上當益惡吏民大欺忿天所上當大惡增劇故是天洞明照心之鏡也不失銖分以明吏民治行夫天地比若影響隨人可為不脫也真人幸有善意努力卒之慎之子雖來問此若無事無益天內默視子口可言以何明之以言也夫人言事辭詳善人即報之以善響亦應之以善其言凶惡不祥人亦報之以惡響亦應之以惡也凡事相應和者悉天使之也子寧解耶唯唯夫天迺高且遠尊嚴安可事事自下與人言語乎故其法皆以自然應和之也子心今開不唯唯已解願及天師復假一言行道之中古皇無文不三相通以何能安之乎善哉子之言也天運使其時人直質樸其人皆懷道而信又專一但流言相通人人各欲至誠信思稱天心迺無一相欺者也故君臣民三并力同心相通故能相治也如使不同心為一家即亂矣今者承負而文書眾多更文相欺尚為浮華賢儒俱迷共失天心天既生文不可復流言也但當實核得其實三相通即天氣平矣天法者或億或萬時時不同治各自異術各不同也今者太平氣且至當實文本元正字迺且得天心意也子不能分別天地立事以來其治億端行其事悉得天應者是也不得天應者非也是即其大明天券徵驗效也寧解耶唯唯行去勿得復問今非不能為子悉記天地事立以來事事分別解天下文字也但益文難勝記不可為才用無益於王治故但悉指授要道而言夫治不理本由天文耳是天地大病所疾也古時賢聖所共憎惡也故道為有德君出不敢作文皆使還守實求其根保其元迺天道可理國自安真人雖好問勿復令益文也去思之唯唯右包裹元氣自然天地凡事三合相通并力同心天明券和皇平治法急學真法第六十六真人前今良和氣且俱至人但當游而無職事當以何明其心而正其意常使其忽然忘為邪惡而日好為善不知置令帝王垂拱而無可治上善之人滿其朝忠信孝子皆畢備當以何致之乎真人有天性好善之心常汲汲憂天道宜自精具陳說之然但當急學之以真道真德真仁耳何以當學以真道哉然道乃能導化無前好生無輩量夫有真道乃上善之名字夫無道者乃最惡衰凋凶犯死喪之名稱也真人此今但說真善哉吾無以加之何以當學之以真德夫人有真德乃能包養無極之名字夫無德者乃最劣弱困窮小人之名字也善哉真人之言吾復無以加之也真真是也何以當學之以仁道也仁者乃能恩愛無不包及但樂施與無窮極之名字夫不仁之人乃好德反惡典與是乃大貪鄙之名稱與禽獸同志無可以自別異也善哉真人之言吾復無以加此也今真人說三事吾無以加此也今人當學為善邪不當邪當力學為善夫為善亦豈有名稱字不邪小子不及唯師開示之然夫為善者乃事合天心不逆人意名為善善者乃絕洞無上與道同稱天之所愛地之所養帝王所當急仕人君所當與同心并力也夫惡者事逆天心常傷人意好反天道不順四時令神祇所憎人所不欲見父母之大害君子所得愁苦也最天下絕凋凶敗之名字也故人之行失吉輒入凶離凶則入吉一吉一凶一善一惡為不純謹之徒子寧知之唯唯令於真人意凡人之行當云何哉然人今不力學道輒為無可知道輒名無道之人夫無道之人人最為惡凶人也今不力學德輒為無可知德夫無德而好害傷之人乃凶敗之符也今人不力學仁已不仁矣夫不仁之人乃與禽獸同路人與禽獸同心愈於死少耳今人不旦夕力學善失善即入惡夫惡乃死凶之處故凡人不力學吉輒乃入凶夫凶迺天下惡名稱善哉子已長入真道不復還反惡矣今真人久懷智而作愚何哉不敢行子幸有能極陳子所言吾甚喜之今能極於此子曾但見吾言說反中棄而止耶不敢也見師比勑使說適意有所不及不敢悉言之善哉子之言常大謙今能極意真門唯天師錄示所不及然子向所言悉是也是故古者大聖三皇常自旦夕力學真道見不好學真道者名為無道之人夫無道之人其行無數天之大重怨夫無道之人本天不欲覆蓋地不欲載也神靈精鬼所不欲祐天下所共苦也聖人賢者君子乃大疾無道之人故古者上皇之時人皆學清靜深知天地之至情故悉學真道乃後得天心地意人不力學德名為無德之人夫無德之人天不愛地不喜人不欲親近之其行常行事不為德乃為王者致害為君子致災鬼神承天教不久與為治是故古者賢聖大儒見無德之人不與其通言語也不力旦夕學仁即且忽事為不仁夫不仁之人言即逆於凡事傷人心不合天意反與禽獸相似故古者聖賢不與其同路也今人不事師力學善即且愚闇不知為善也反且恣其無知之心輕為惡夫惡人下愚蔽闇之人其行乃不順天地之道尚為君子得事戮其父母愁其宗親為行無法鬼神承天心為使不喜之為害甚處三法所當誅古者聖賢以為大怨故古者悉自實核其學問也合於天心事入道德仁善而已行要當合天地之心不以浮華言事所以然者且失天法失之即入凶絕短命矣或害後世天道不誤有格法夫不力學大吉之道反事者輕忽自易必且入凶夫凶者乃天地人萬物所疾惡不可久存是大患之本禍之門戶過而陷其中便死不得還悔過反故也天下莫不共知之而下士大愚常共笑道不知守道早避凶害傳傳為愚更相承負後生愚闇復劇於前故真道閉而不通令人各自輕忽不能窮竟其天年其大咎過乃由此也真人見吾書宜深計之慎無閉藏以付賢柔明使其覺悟是故古道乃承天之心順地之意有上古大真道法故常教其學道學德學壽學善學謹學吉學古學平學長生所以盡陳善者天之為法乃常開道門地之為法常開德戶古之聖賢為法常開仁路故古者聖賢與天同心與地合意共長生養萬二千物常以道德仁意傳之萬物可興也如以凶惡意傳之凡物日衰少故有道德仁之處其人日多而好善無道德仁之處其人日衰少其治日貧苦此天地之格懸法夫有至道明德仁善之心乃上與天星曆相應神靈以明其行故古者聖賢常思為善無極力盡乃以不敢有惡念凶路也夫下愚之人其心常閉塞實無知不可復妄假之以凶衰之惡路也不自知大失天道相隨為惡以為常習俗不能自退還也是以吾上敬受天書教勑承順天心開闢之大開上古太平之路令使人樂為善者不復知為惡之術天下之人其志也常高而其所成者反常下不能應其本所志念也故夫上士忿然惡死樂生往學仙勤能得壽耳此上士是尚第一有志者也中士有志疾其先人夭死忿然往求道學壽勤而竟其天年耳是其第一堅志士也其次疾病多而不得常平平忿然往學可以止之者勤能得復其故已小困於病病乃學想能禁止之已大病矣其次大病劇乃求索道術可以自救者已死矣是故吾書教學人乃以天長壽之法旦夕自力為之纔得且平平耳如以平平之法學凡人已入凶矣愚者不知天下凡人其本志所為常念善高已者不能應其所志故為其高舉之上極於仙即纔得保其天年耳夫大賢者志十得十必與吾道書相應中賢者志十或中止更懈纔得五小人朝志之暮忘其所言故大高舉者樂使其上中下各得其心所志念今下古人大愚去真道遠力學以天正文法纔不陷於偽欺耳學以平平之文已大欺矣學以習文好言大偽姦猾已起矣天以帝王為子惡下欺上夫人行下多邪偽即上道德仁君無所信下民人無所附歸其命夫力旦夕教學以真道耳力學以善道纔得平平之道也力學以平平之道已入浮華矣入浮華凡人大迷惑窮困矣便成大凶惡之路帝王為愁苦人不可治真人欲知是信比若人家慈父母日教其子為善自苦絕衣食養之老尚固固為惡何況凡人乃相示教以浮華之文哉以吾書不信也使凡人見吾書者各自思所失中古以來有善道者皆相教閉藏不肯傳與其弟子反以浮華偽文教之為是積久故天道今獨以大亂矣天地災怪萬類不空也賢儒宜各深思然吾今雖不旦夕與俗人同處昭然已知之矣天下大疾苦之故使吾出此文以告屬之吾不空也真人實宜重慎之且有天讁唯唯不敢也每見天師言常駭慄子之言是也即天且大悅大喜不害子也唯唯凡人雖力旦夕學勑教以真德尚纔得平平之德耳學以平平之德已入邪偽德矣學以邪偽德愚人已無復數矣無有真德恣心而行此純君子之賊力學以上仁纔得成中仁耳力學以中仁其行纔平平無有仁也學以不仁愚人已成盜賊矣不自知殺傷無復數恣意而行不用道理是正天怨地咎人之大賊力旦夕學以大吉之道纔得中吉耳學以中吉纔得小吉耳學以小吉此已入凶道矣學以凶道已不復救矣俱大闇昧無一知見天道言其不真但欺誷純信其愚心妄言上千天文下亂地理為百姓害災是故吾道書學凡人也乃大學之使其上列真仙如不能及真仙可得平安不為有德之君憂真人宜深思惟吾言勿復反怪之唯唯今吾乃為天談當悉解天地開闢以來承負之責不能大張之以上大道大德之法上壽之術上善之路人失諸闇昧誠久信其愚蔽之心人會為惡不可禁止猶復不能解其承負天地之讁過真人寧曉吾言耶唯唯夫聖賢高士見文書而學必與吾書本相應不失絲髮之間中士意半達必得其半下士自力勤能不失法所以大舉天民凡人者樂其上下中無失法者皆得正道各自愛不敢輕事為大憂上士得吾道學之不止可為國之良臣久久得其要意可以度世不復爭訟事視權也中士學吾道可以為良善小臣可以竟其天年小人學吾道可以長謹父慈母愛子孝兄良弟順夫婦同計不相賊傷至死無怨魂神居地下尚復長不復見作事不見名為惡子無夭年戮死者也夫古者本元氣天生之時人盡樂學欲仙尚不能壽纔使人各畏死不犯刑法耳夫下古人大愚反誦浮華相教共學不壽之業生時忽然自言若且無死反相教無可愛惜共興凶事治死喪過生生乃屬天也死乃屬地事地反過其天是大害也吾以是行占之知其俱愚積久無一知也凶事興即鬼大盛共疾殺人人不得竟其天命夫力學真道纔得偽道力學真德尚纔得偽德耳何況下古之人反相學以浮華之文其去道遠哉困窮不得復相拘制反相教為章奏法律辯慧相持長短夫教其為仁尚愁其不仁及教其學為不仁之路天乃為人垂法天自名為大道地自名為德所以然者夫天地乃萬物之父母凡事君長故常導之以善不敢開昌導教之以凶惡之路而況人乎人者天之子也當象天為行今乃失法故人難治教導之以道與德乃當使有知自重自惜自愛自治今反開之以刑法使其視死忽然尚勇力自輕令使傳相治因而相困反更相剋賊迭相愁苦故天下人無相愛者大咎在此真人知之耶慎之唯唯夫力勑教其仁尚苦不仁下古之人反相教數書已大薄矣其相憎怨不得絕力教其為吉尚苦不吉下古之人反相勑力學死喪之具豫與凶事以待之日死不以其壽幾滅門矣而不自知過誤臨時呼天號地自言冤王治不平使我失年內行自得之愚人不防其本罪定乃悔不為謹以無益也雖號死其口猶不復救矣故吾今力勑教以大仙經道纔開其壽階耳學人以德纔使其仁學人以仁纔使其平平保其故不敢相欺奪人財物也學人以平平已失法矣學人以法已失相剋賊矣學人相剋賊已入大武矣入大武即民已無罪而欺矣困窮也成盜賊故吾承天道法開大吉之門閉其凶惡之路開天太平之階人人誦之且各自謹無可復治也致令天時運轉樂王者乃長游而無事是故吾書悉考凡事之本元纔得其中也考其中已得其下矣學愚人以下已大亂矣今下古所以帝王雖有萬萬人之道德仁思稱天心而凶不絕者乃承負流災亂以來獨積久雖愁自苦念之欲樂其一理變怪盜賊萬類夷狄猾夏乃先王之失非一人所獨致當深知其本是以天使吾出書為帝王解承負之過真人以吾道不與天相應今但案吾文行之不失銖分立相應矣是吾文大信不力行以解冤結天道安能默空相應乎夫愚不學安能賢乎夫貧而不耕安能收耶學輒日賢耕輒有收行吾書其如是矣吾保之不學無求賢不耕無求收子知之乎唯唯真道以正也大德興盛仁各得其所矣治平而言莫不失一真人解未幸欲報天地之功而得壽者努力信道勿懈唯唯今愚生欲復有所問不敢卒言平行今天師以何知人大無道德仁也善哉子之言觀其人行言云何願聞之然覩道人而忿然反非之以知其洞無道之人覩德而非惡之以知為大無德之人覩仁而非之以知為大惡不仁之人覩善謹而非之以知為不謹不善之人天性凡同志者相愛異志者相憎善人亦疾苦惡人惡人亦疾苦善人真人寧解不唯唯夫古者聖賢見人不即與其語但精觀占視其所好惡以知之矣正以此鏡其行萬不失一善哉故夫道者乃與皇天同骨法血脈故天道疾惡好殺故與天為重怨地者與德同骨法血脈故惡人傷害與地為大咎夫仁與聖賢同骨法血脈故聖賢好施仁而惡奪故與聖人仁為大仇是故昔者聖賢深知此為三統所案行故其制法不敢違離真道與德仁也故天行者與四時并力天行氣四時亦行氣相與同心故逆四時者與天為怨地者與五行同心并力共養凡物未當終死而見傷害與地為大咎聖賢與仁同心并力故游居常尊道而貴德倚附仁而處如人好奪而不仁與聖賢為怨仇故火為心心為聖故火常倚木而居木者仁而有心火者有光能察是非心者聖而明故古者大聖賢常倚仁明而處歸有道德仁之君故吾重戒真人以吾書付歸有道德仁明之君必且樂好吾道深知其意案而效之與神無異吾不自譽於真人也行之得應必如重規合矩乃後下古之人且念吾言唯唯行去力之勉之力學道德與仁餘者無可為者出此書無令藏唯唯右重明賢人心以解愚闇書疑者宜取訣於此去邪文飛明古訣第六十七六端真人純稽首再拜謹具敢問上皇神人求真吾欲使天地平安陰陽不亂常順行災害不得妄生王者但日游冶為大樂之經雖所問上下眾多豈可重聞乎善哉深乎子之所問也何其密達也正問此要會子其欲進至道而退去邪文邪諾今且悉說之子積善於天吾何敢匿之今為子眷眷其善究於神明之心吾不言不行恐逆天意若天故使子求問之也為子具分別言自隨而記之慎無遺也帝王能力用吾書災害悉已一旦除矣天下咸樂皆欲為道德之士後生遂象先世老稚相隨而起盡更知求真文校事浮華去矣心究洽於神靈君無一憂何故不日游乎哉如是天地凡事各得其所百神因而歡樂王者深得天意至道往祐之但有日吉無有一凶事也吾言誠誠萬不失一也但恐得之不行眾邪結也災異浮華天地陰陽之大病也大病而不治以何得解愈哉子既來問事為天語言子詳思吾書上下之辭幸有至意慎無亂之唯唯誠得歸便處日夜惟思得傳而記之反覆重䟽冀其萬世無有去時也天地開闢言語書文前後相因事同氣者以類相明求其類而聚之其道日以彰明無有衰時也故自古到今眾聖共為天談眾賢者同其辭共為聖謀, ZTDZ: ''}
  - {type: variant, offset: 35447, length: 6983, content: 婦子共為一家也不可以相無是天要道也此猶若人有頭足腹迺成一身無可去者也去之即不足不成人也是天地自然之數也故古者聖人取法於天故男子須得順善女與為治然且有善子男者君也女者臣也子者民也故天命治國之道以賢明臣為友善女然後能和其子也善臣然後能和其民也善女然後能生善子善臣然後能生善民民臣俱好善然後能長安其上也真人欲樂知其效天者君也地者臣也天雨周流雨之善地生物善雨之惡地生物惡此之謂也今父母君臣尚但共持其大綱紀耳大要實仰衣食於子人無子絕無後世君少民迺衣食不足令常用心愁苦故治國之道迺以民為本也無民君與臣無可治無可理也是故古者大聖賢共治事但旦夕專以民為大急憂其民也若家人父母憂無子無子以何自名為父母無民以何自名為君也故天之法常使君臣民都同命同吉凶同一職一事失正即為大凶矣中古以來多失治之綱紀遂相承負後生者遂得其流災尤劇實由君臣民失計不知深思念善相愛相通并力同心反更相愁苦夫君乃一人耳又可處深隱四遠冤結實閉不通治不得天心災變怪異委積而不除天地所欲言人君不得知之大咎在此不三并力聰明絕邪氣結不理上為皇天大仇下為地大咎為帝王大憂災紛紛不解為民大害為凡物大疾病為是獨積久矣非獨今下古人過所致也真人亦知之乎知如此久矣實不知其所由致故問之誠冤今當柰何之乎然天太平氣方到治當得天心乃此惡悉自除去故天使吾具言之欲使吾救其失為出正文故使真人來悉問之也此所由生凶也不象天地元氣自然法不三相通并力同心故致此也若三相通并力同心今立平大樂立無災願聞治之當云何乎哉急象天法如比上為也天法凡事三并力同心故天以三光為文三光常相通共照無復絕時也天券出以來人以書為文以治象天三光故天時時使河洛書出重勑之文書人文也欲樂象天洞極神治之法度使善日興惡日絕滅書者但通文書三道行書也君宜善開導其下為作明令示勑教使民各居其處而上書悉道其所聞善惡因卻行亦可但寄便足亦可寄商車載來亦可善自明姓字到為法如此則天下善惡畢見矣君導天氣而下通臣導地氣而上通民導中和氣而上通真人傳書付有德之君審而聆吾文言立平立樂災異除不失銖分也吾書敬受於天法不但空陳偽言也天誅殺吾子亦知是讁重耶唯唯欲得吾書信得即效司之與天地立響相應是吾文信也以此大明效證可毋懷狐疑夫治國之道樂得天心自安者但行此效與天響相應即天與人談之明券也吾但見真人常樂助有德之君欲報天重功故一二言之耳吾知其失在此閉不通得書君為制作明教善令言從今以往吏民宜各居其處力上書悉道善惡以明帝王治以通天氣勿得相止止者坐其事三年獨上書盡信無欺文者言且召而仕之其仕之云何各問其才能所長以筋力所及署其職何必署其筋力所能及乎天之事人各因其能不因其才能名為故冤人則復為結氣增災所以然者人所不及雖生之死猶不能為也今人所樂極樂得善物金玉也今使明君有教言人有能撫手盡得天下縣官金銀奇偽之物不以過汝盡以與汝其人極樂得之也力而不及物繫其兩手弊盡之猶不能致也今為人父母君將署臣子之職不以其所長正交殺之猶不能理其職事但空亂其官職愁苦其民耳官職亂民臣愁則復仰呼天自言冤上動天復增災怪故古聖賢欲得天心重慎署置皆得人心故能稱天心也其稱天心云何行之得應其民吏日善且信忠是其效也則遷之以時是助國得天心之人也或但有樂一旦貪名得官其行無效不稱天心無應者夫帝王迺承天心而治一當稱天心不稱天心為過故其治無善放應當退使思過如此則天已喜而天下莫不盡忠信盡其能力者也幽隱遠方聞之無藏其能者也其上書急者人命至重不可須臾人且復啼呼冤今復結增怪變疾解報之其事可忍者須秋冬何必須秋冬乎然秋者物畢成冬者物畢藏天氣定也物以仲秋八月成熟其實核可分別故當順天地之法始以八月分別視之九月者天氣之究竟也物到九月盡欲死故當九月究竟讀視之觀其善惡多少十者數之終也故物至十月而反初天正以八月為十月故物畢成地正以九月為十月故物畢老人正以亥為十月故物畢死三正竟也物當復生故乾在西北凡物始核於亥天法以八月而分別之九月而究竟之十月實核之故天地人三統俱終實核於亥故十月而實核下付歸之所以然者此八月九月十月三月也天地人正俱畢竟當復反始不實不核不得其意天地且不悅喜其災不除復害來年故八月而分別視之九月而究竟之十月而實核下付歸之令使吏民悉得更思過失不敢復為也來年吏民更謹凡物悉善矣不歸使思過固固民臣居下失政令不自知有過其心不易天道固固惡不易矣故當付歸之也真人欲知其效今年所付歸因書一通自置之亦教吏民自記一通置之視善惡多少名為天券來年付歸復置一通視善惡多少來年復付歸置一通視善惡多少下踈與上所記置當繇相應名為天徵合符令吏民更易心為善得天意所上當多善若令大易當大善若令固固無變不易所上固固如令為惡不止所上當益惡吏民大欺忿天所上當大惡增劇故是天洞明照心之鏡也不失銖分以明吏民治行夫天地比若影響隨人可為不脫也真人幸有善意努力卒之慎之子雖來問此若無事無益天內默視子口可言以何明之以言也夫人言事辭詳善人即報之以善響亦應之以善其言凶惡不祥人亦報之以惡響亦應之以惡也凡事相應和者悉天使之也子寧解耶唯唯夫天迺高且遠尊嚴安可事事自下與人言語乎故其法皆以自然應和之也子心今開不唯唯已解願及天師復假一言行道之中古皇無文不三相通以何能安之乎善哉子之言也天運使其時人直質樸其人皆懷道而信又專一但流言相通人人各欲至誠信思稱天心迺無一相欺者也故君臣民三并力同心相通故能相治也如使不同心為一家即亂矣今者承負而文書眾多更文相欺尚為浮華賢儒俱迷共失天心天既生文不可復流言也但當實核得其實三相通即天氣平矣天法者或億或萬時時不同治各自異術各不同也今者太平氣且至當實文本元正字迺且得天心意也子不能分別天地立事以來其治億端行其事悉得天應者是也不得天應者非也是即其大明天券徵驗效也寧解耶唯唯行去勿得復問今非不能為子悉記天地事立以來事事分別解天下文字也但益文難勝記不可為才用無益於王治故但悉指授要道而言夫治不理本由天文耳是天地大病所疾也古時賢聖所共憎惡也故道為有德君出不敢作文皆使還守實求其根保其元迺天道可理國自安真人雖好問勿復令益文也去思之唯唯右包裹元氣自然天地凡事三合相通并力同心天明券和皇平治法急學真法第六十六真人前今良和氣且俱至人但當游而無職事當以何明其心而正其意常使其忽然忘為邪惡而日好為善不知置令帝王垂拱而無可治上善之人滿其朝忠信孝子皆畢備當以何致之乎真人有天性好善之心常汲汲憂天道宜自精具陳說之然但當急學之以真道真德真仁耳何以當學以真道哉然道乃能導化無前好生無輩量夫有真道乃上善之名字夫無道者乃最惡衰凋凶犯死喪之名稱也真人此今但說真善哉吾無以加之何以當學之以真德夫人有真德乃能包養無極之名字夫無德者乃最劣弱困窮小人之名字也善哉真人之言吾復無以加之也真真是也何以當學之以仁道也仁者乃能恩愛無不包及但樂施與無窮極之名字夫不仁之人乃好德反惡典與是乃大貪鄙之名稱與禽獸同志無可以自別異也善哉真人之言吾復無以加此也今真人說三事吾無以加此也今人當學為善邪不當邪當力學為善夫為善亦豈有名稱字不邪小子不及唯師開示之然夫為善者乃事合天心不逆人意名為善善者乃絕洞無上與道同稱天之所愛地之所養帝王所當急仕人君所當與同心并力也夫惡者事逆天心常傷人意好反天道不順四時令神祇所憎人所不欲見父母之大害君子所得愁苦也最天下絕凋凶敗之名字也故人之行失吉輒入凶離凶則入吉一吉一凶一善一惡為不純謹之徒子寧知之唯唯令於真人意凡人之行當云何哉然人今不力學道輒為無可知道輒名無道之人夫無道之人人最為惡凶人也今不力學德輒為無可知德夫無德而好害傷之人乃凶敗之符也今人不力學仁已不仁矣夫不仁之人乃與禽獸同路人與禽獸同心愈於死少耳今人不旦夕力學善失善即入惡夫惡乃死凶之處故凡人不力學吉輒乃入凶夫凶迺天下惡名稱善哉子已長入真道不復還反惡矣今真人久懷智而作愚何哉不敢行子幸有能極陳子所言吾甚喜之今能極於此子曾但見吾言說反中棄而止耶不敢也見師比勑使說適意有所不及不敢悉言之善哉子之言常大謙今能極意真門唯天師錄示所不及然子向所言悉是也是故古者大聖三皇常自旦夕力學真道見不好學真道者名為無道之人夫無道之人其行無數天之大重怨夫無道之人本天不欲覆蓋地不欲載也神靈精鬼所不欲祐天下所共苦也聖人賢者君子乃大疾無道之人故古者上皇之時人皆學清靜深知天地之至情故悉學真道乃後得天心地意人不力學德名為無德之人夫無德之人天不愛地不喜人不欲親近之其行常行事不為德乃為王者致害為君子致災鬼神承天教不久與為治是故古者賢聖大儒見無德之人不與其通言語也不力旦夕學仁即且忽事為不仁夫不仁之人言即逆於凡事傷人心不合天意反與禽獸相似故古者聖賢不與其同路也今人不事師力學善即且愚闇不知為善也反且恣其無知之心輕為惡夫惡人下愚蔽闇之人其行乃不順天地之道尚為君子得事戮其父母愁其宗親為行無法鬼神承天心為使不喜之為害甚處三法所當誅古者聖賢以為大怨故古者悉自實核其學問也合於天心事入道德仁善而已行要當合天地之心不以浮華言事所以然者且失天法失之即入凶絕短命矣或害後世天道不誤有格法夫不力學大吉之道反事者輕忽自易必且入凶夫凶者乃天地人萬物所疾惡不可久存是大患之本禍之門戶過而陷其中便死不得還悔過反故也天下莫不共知之而下士大愚常共笑道不知守道早避凶害傳傳為愚更相承負後生愚闇復劇於前故真道閉而不通令人各自輕忽不能窮竟其天年其大咎過乃由此也真人見吾書宜深計之慎無閉藏以付賢柔明使其覺悟是故古道乃承天之心順地之意有上古大真道法故常教其學道學德學壽學善學謹學吉學古學平學長生所以盡陳善者天之為法乃常開道門地之為法常開德戶古之聖賢為法常開仁路故古者聖賢與天同心與地合意共長生養萬二千物常以道德仁意傳之萬物可興也如以凶惡意傳之凡物日衰少故有道德仁之處其人日多而好善無道德仁之處其人日衰少其治日貧苦此天地之格懸法夫有至道明德仁善之心乃上與天星曆相應神靈以明其行故古者聖賢常思為善無極力盡乃以不敢有惡念凶路也夫下愚之人其心常閉塞實無知不可復妄假之以凶衰之惡路也不自知大失天道相隨為惡以為常習俗不能自退還也是以吾上敬受天書教勑承順天心開闢之大開上古太平之路令使人樂為善者不復知為惡之術天下之人其志也常高而其所成者反常下不能應其本所志念也故夫上士忿然惡死樂生往學仙勤能得壽耳此上士是尚第一有志者也中士有志疾其先人夭死忿然往求道學壽勤而竟其天年耳是其第一堅志士也其次疾病多而不得常平平忿然往學可以止之者勤能得復其故已小困於病病乃學想能禁止之已大病矣其次大病劇乃求索道術可以自救者已死矣是故吾書教學人乃以天長壽之法旦夕自力為之纔得且平平耳如以平平之法學凡人已入凶矣愚者不知天下凡人其本志所為常念善高已者不能應其所志故為其高舉之上極於仙即纔得保其天年耳夫大賢者志十得十必與吾道書相應中賢者志十或中止更懈纔得五小人朝志之暮忘其所言故大高舉者樂使其上中下各得其心所志念今下古人大愚去真道遠力學以天正文法纔不陷於偽欺耳學以平平之文已大欺矣學以習文好言大偽姦猾已起矣天以帝王為子惡下欺上夫人行下多邪偽即上道德仁君無所信下民人無所附歸其命夫力旦夕教學以真道耳力學以善道纔得平平之道也力學以平平之道已入浮華矣入浮華凡人大迷惑窮困矣便成大凶惡之路帝王為愁苦人不可治真人欲知是信比若人家慈父母日教其子為善自苦絕衣食養之老尚固固為惡何況凡人乃相示教以浮華之文哉以吾書不信也使凡人見吾書者各自思所失中古以來有善道者皆相教閉藏不肯傳與其弟子反以浮華偽文教之為是積久故天道今獨以大亂矣天地災怪萬類不空也賢儒宜各深思然吾今雖不旦夕與俗人同處昭然已知之矣天下大疾苦之故使吾出此文以告屬之吾不空也真人實宜重慎之且有天讁唯唯不敢也每見天師言常駭慄子之言是也即天且大悅大喜不害子也唯唯凡人雖力旦夕學勑教以真德尚纔得平平之德耳學以平平之德已入邪偽德矣學以邪偽德愚人已無復數矣無有真德恣心而行此純君子之賊力學以上仁纔得成中仁耳力學以中仁其行纔平平無有仁也學以不仁愚人已成盜賊矣不自知殺傷無復數恣意而行不用道理是正天怨地咎人之大賊力旦夕學以大吉之道纔得中吉耳學以中吉纔得小吉耳學以小吉此已入凶道矣學以凶道已不復救矣俱大闇昧無一知見天道言其不真但欺誷純信其愚心妄言上千天文下亂地理為百姓害災是故吾道書學凡人也乃大學之使其上列真仙如不能及真仙可得平安不為有德之君憂真人宜深思惟吾言勿復反怪之唯唯今吾乃為天談當悉解天地開闢以來承負之責不能大張之以上大道大德之法上壽之術上善之路人失諸闇昧誠久信其愚蔽之心人會為惡不可禁止猶復不能解其承負天地之讁過真人寧曉吾言耶唯唯夫聖賢高士見文書而學必與吾書本相應不失絲髮之間中士意半達必得其半下士自力勤能不失法所以大舉天民凡人者樂其上下中無失法者皆得正道各自愛不敢輕事為大憂上士得吾道學之不止可為國之良臣久久得其要意可以度世不復爭訟事視權也中士學吾道可以為良善小臣可以竟其天年小人學吾道可以長謹父慈母愛子孝兄良弟順夫婦同計不相賊傷至死無怨魂神居地下尚復長不復見作事不見名為惡子無夭年戮死者也夫古者本元氣天生之時人盡樂學欲仙尚不能壽纔使人各畏死不犯刑法耳夫下古人大愚反誦浮華相教共學不壽之業生時忽然自言若且無死反相教無可愛惜共興凶事治死喪過生生乃屬天也死乃屬地事地反過其天是大害也吾以是行占之知其俱愚積久無一知也凶事興即鬼大盛共疾殺人人不得竟其天命夫力學真道纔得偽道力學真德尚纔得偽德耳何況下古之人反相學以浮華之文其去道遠哉困窮不得復相拘制反相教為章奏法律辯慧相持長短夫教其為仁尚愁其不仁及教其學為不仁之路天乃為人垂法天自名為大道地自名為德所以然者夫天地乃萬物之父母凡事君長故常導之以善不敢開昌導教之以凶惡之路而況人乎人者天之子也當象天為行今乃失法故人難治教導之以道與德乃當使有知自重自惜自愛自治今反開之以刑法使其視死忽然尚勇力自輕令使傳相治因而相困反更相剋賊迭相愁苦故天下人無相愛者大咎在此真人知之耶慎之唯唯夫力勑教其仁尚苦不仁下古之人反相教數書已大薄矣其相憎怨不得絕力教其為吉尚苦不吉下古之人反相勑力學死喪之具豫與凶事以待之日死不以其壽幾滅門矣而不自知過誤臨時呼天號地自言冤王治不平使我失年內行自得之愚人不防其本罪定乃悔不為謹以無益也雖號死其口猶不復救矣故吾今力勑教以大仙經道纔開其壽階耳學人以德纔使其仁學人以仁纔使其平平保其故不敢相欺奪人財物也學人以平平已失法矣學人以法已失相剋賊矣學人相剋賊已入大武矣入大武即民已無罪而欺矣困窮也成盜賊故吾承天道法開大吉之門閉其凶惡之路開天太平之階人人誦之且各自謹無可復治也致令天時運轉樂王者乃長游而無事是故吾書悉考凡事之本元纔得其中也考其中已得其下矣學愚人以下已大亂矣今下古所以帝王雖有萬萬人之道德仁思稱天心而凶不絕者乃承負流災亂以來獨積久雖愁自苦念之欲樂其一理變怪盜賊萬類夷狄猾夏乃先王之失非一人所獨致當深知其本是以天使吾出書為帝王解承負之過真人以吾道不與天相應今但案吾文行之不失銖分立相應矣是吾文大信不力行以解冤結天道安能默空相應乎夫愚不學安能賢乎夫貧而不耕安能收耶學輒日賢耕輒有收行吾書其如是矣吾保之不學無求賢不耕無求收子知之乎唯唯真道以正也大德興盛仁各得其所矣治平而言莫不失一真人解未幸欲報天地之功而得壽者努力信道勿懈唯唯今愚生欲復有所問不敢卒言平行今天師以何知人大無道德仁也善哉子之言觀其人行言云何願聞之然覩道人而忿然反非之以知其洞無道之人覩德而非惡之以知為大無德之人覩仁而非之以知為大惡不仁之人覩善謹而非之以知為不謹不善之人天性凡同志者相愛異志者相憎善人亦疾苦惡人惡人亦疾苦善人真人寧解不唯唯夫古者聖賢見人不即與其語但精觀占視其所好惡以知之矣正以此鏡其行萬不失一善哉故夫道者乃與皇天同骨法血脈故天道疾惡好殺故與天為重怨地者與德同骨法血脈故惡人傷害與地為大咎夫仁與聖賢同骨法血脈故聖賢好施仁而惡奪故與聖人仁為大仇是故昔者聖賢深知此為三統所案行故其制法不敢違離真道與德仁也故天行者與四時并力天行氣四時亦行氣相與同心故逆四時者與天為怨地者與五行同心并力共養凡物未當終死而見傷害與地為大咎聖賢與仁同心并力故游居常尊道而貴德倚附仁而處如人好奪而不仁與聖賢為怨仇故火為心心為聖故火常倚木而居木者仁而有心火者有光能察是非心者聖而明故古者大聖賢常倚仁明而處歸有道德仁之君故吾重戒真人以吾書付歸有道德仁明之君必且樂好吾道深知其意案而效之與神無異吾不自譽於真人也行之得應必如重規合矩乃後下古之人且念吾言唯唯行去力之勉之力學道德與仁餘者無可為者出此書無令藏唯唯右重明賢人心以解愚闇書疑者宜取訣於此去邪文飛明古訣第六十七六端真人純稽首再拜謹具敢問上皇神人求真吾欲使天地平安陰陽不亂常順行災害不得妄生王者但日游冶為大樂之經雖所問上下眾多豈可重聞乎善哉深乎子之所問也何其密達也正問此要會子其欲進至道而退去邪文邪諾今且悉說之子積善於天吾何敢匿之今為子眷眷其善究於神明之心吾不言不行恐逆天意若天故使子求問之也為子具分別言自隨而記之慎無遺也帝王能力用吾書災害悉已一旦除矣天下咸樂皆欲為道德之士後生遂象先世老稚相隨而起盡更知求真文校事浮華去矣心究洽於神靈君無一憂何故不日游乎哉如是天地凡事各得其所百神因而歡樂王者深得天意至道往祐之但有日吉無有一凶事也吾言誠誠萬不失一也但恐得之不行眾邪結也災異浮華天地陰陽之大病也大病而不治以何得解愈哉子既來問事為天語言子詳思吾書上下之辭幸有至意慎無亂之唯唯誠得歸便處日夜惟思得傳而記之反覆重䟽冀其萬世無有去時也天地開闢言語書文前後相因事同氣者以類相明求其類而聚之其道日以彰明無有衰時也故自古到今眾聖共為天談眾賢者同其辭共為聖謀, krp: ''}
