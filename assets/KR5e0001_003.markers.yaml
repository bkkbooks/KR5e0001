  - {type: variant, offset: 33339, length: 514, content: 治民也中古設象而不敢用也下古小用嚴畏智詐刑罰治民而小亂也夫下愚之將霸道大興以威嚴與刑罰畏其士眾故吏民數反也是故以道治者清白而生也以德治者進退兩度也故下古之人進退難治多智詐也天以道治故其形清三光白地以德治故忍辱人以和治故進退多便其辭變易無常故也天正為其初地正為其中人正最居下下極故反上也以何知其下極也以其言進退無常出入異辭也此三氣下極也下極當反上就道乃后得太平也與天相似就德乃中平也與地相似就和乃得小亂也與人相似就嚴畏智詐刑罰乃日亂故與霸君相似刑罰大起也今真人反言當以嚴畏智詐此乃亂天義者也今天師言不當以嚴畏刑罰也天何故時遣雷電辟歷取人乎善哉子之難也得其意然所以取之者人主由所敬重事欲施惡以易冤人人乃至尊重反使與人六畜同食故天治之也而助其服人食此人惡之也是故天下無大無小輕易冤人者也悉共見治也而怜助服者也故君子勝服人者但當以道與德不可以寇害勝人冤人也夫嚴畏智詐但可以伏無狀之人不可以道德降服而欲為無道者當下此也比若雷公以取無狀之人不可常行也與天心逆治欲得天地心者乃行道與德也故古者聖賢乃貴用道與德仁愛利勝人也不貴以嚴畏刑罰驚駭而勝服人也以此邪枉安威駭服人者上皇太平氣不得來助人治也所以然者其治理人不知或有大冤結而畏之不敢言者比若寇, HFL: 爲}
