  - {type: variant, offset: 48480, length: 395, content: 俱愁其集居而不純集廁相亂故使賢明共疑迷惑不知何從何信遂失天至心因而各從其忤是也使與天道指意微言大相遠皆為邪言邪文書此邪致不能正陰陽災氣比連起內咎在此也吾見子問之積眷眷不忍故反覆為子具道其意疾䟽吾辭自深思念之夫凡事者得而不能專行亦無益也若能行之除大謫也夫天文亂欲樂見理若人有劇病欲樂見治也何以乎哉然子自若愚耳誠無知乎劇病不以時治也到于死亡天文不治正至於大亂四時為其失氣五行逆戰三光無正明皆失其正路因而毀敗人民雲亂皆失其居處老弱負荷夭死者半國家昏亂迷惑至道善德隔絕賢者蔽藏不能相救是不大劇病邪故當力正之今愚人日學遊浮文更迭為忤以相高上不深知其為大害以為小事也安知內獨為陰陽天地之大病乎哉天下不能相治正者正此也夫神祇有所疾苦故使子來反復問之也見書宜旦夕宿夜深惟思其要意不可但自易不為皇天重計也今帝王無所歸心其咎甚大吾今雖與子相對二人而談以為小事內迺為皇天是正語議不敢苟空妄言其咎在吾身罪重不可除也, HFL: ''}
