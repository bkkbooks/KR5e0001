  - {type: variant, offset: 9552, length: 133, content: 人雖有萬人之德獨能如是何然今人行豈有解耶若食盡欲得之而病人獨不能食迺到於死亡豈有解耶今交陰陽相得盡樂有子孫祭神求吉而自若不能生子豈有解耶夫人生盡樂好善而巨壯而固反不肖且惡豈有解耶此盡承負之大效也反以責時人故不能平其治也時人傳受邪偽久安能卒自改正乎哉遂從是常冤因為是連, HFL: 守一}
