  - {type: variant, offset: 26381, length: 224, content: 易之既易宜填其故塞地氣無使發泄飲地形令地衰不能養物也填塞故去中壯何謂也謂井中瓦石材木也此本無今有比若人身中有奇壯以為病也可㤥哉可㤥哉卿不及天師詳問之不但知是真人來前唯唯子問事恆常何一究詳也所以詳者比與天師會見言人命在天地天地常悅喜乃理致太平壽為後是以吾居天地之間常駭忿天地故勉勉也天地不和不得竟吾年善哉子之言也吾所以常恐駭者見天地毒氣積眾多賊殺不絕帝王愁苦其治不平常助其憂之子何豫助王者憂是乎吾聞積功於人來報於天是以吾常樂稱天心也善哉子意今天師既開, HFL: 貴賤解}
