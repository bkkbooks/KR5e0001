  - {type: variant, offset: 4288, length: 686, content: 神人真人聖人賢人自占可行是與非法古者神人自占是非得與不得其事立可觀也不但闇昧昭然清白神道至眾染習身神正心意得無藏匿善者出惡者伏即自知吉凶之法如照鏡之式也於此之時賢明自安時不再來物不重應乃得獨盛洽遠方故事見其應見慎無拒逆撰以為寶器可謂得天地之心意矣其事時矣事皆職矣神道來矣賢者謀矣吉人到矣邪者不來矣清明見矣四方悅矣幽人隱士出矣得天心矣得治術矣邪不發矣自然達矣真人來輔矣天下善應矣各以其事來矣去憒亂矣此應出腹中發于胸心乃若雷電之應證也夫瑞應反從胸中來隨念往來須臾之間周流天下心中所欲感動皇天陰陽為移言語至誠感天正此也念者能致正亦能致邪皆從志意生矣使能動天地和陰陽合萬物入能度身出能成名賢不肖皆由斯生故賢者善御萬不失一也人腹中有過反面赤何也心者五藏之主主即王也王主執正有過乃白於天也驚即面青何也肝者主人人者憂也反㤥肝膽為發怒故上出青也諸神皆有可主以萬物相應故令人常自謹良而順天地而災不得復起也外學多內學少外事日興內事日衰故人多病故多浮華浮者表也華者末也夫天道遠入邪中不能自還所謂神道書者本根與陰陽合與神明同核事文者考核異同疑誤不失浮華記者離本已遠乃居野其文錯亂不可常用時可記也守本者治若神矣守中者少亂而煩矣守末者昏矣故賢者守本戒中不敢從末也夫能守之不止方方善來者無拒逆撰為寶器萬世不復易也人力自為善者可厄乎邪辟夷狄卻乎兵革絕乎杖策絞無聲乎四方安乎道路通乎人君明乎神策大人守之動四方中士為之令臣良小人為之不相傷其辭約其法明占神文乎可不行不能持乎慎無傷以拘奸乎以自防卻不祥法順用四時五行外內思正身散邪卻不祥懸象而思守行順四時氣和合陰陽羅網政治鬼神令使不得妄行害人立冬之後到立春盛行用, HFL: ''}
