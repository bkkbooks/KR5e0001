  - {type: variant, offset: 4975, length: 236, content: 陰氣微行少陽之氣也常觀其意何者病為人使其神吏黑衣服思之閑處四十五日上至九十日令人耳目聰明立春盛德在仁氣治少陽王氣轉在東方興木行其氣弱而仁其神吏青衣思之幽閑處四十五日至九十日令人病消以留年行不止令人日行仁愛春分已前盛行少陽之氣微行太陽之氣以助少陽觀其意無疑深思其意百邪服矣立夏日盛德火王氣轉在南方太陽之氣以中和治其神吏用之得其意口中生甘神吏赤衣守之百鬼去千里夏至之日盛德太陽之氣中和之氣也其神吏思之可愈百病季夏六月盛德合治王氣轉在西南迴入中宮其神吏黃衣思之令人口中甘每至季思, HFL: 平經鈔癸部卷}
