合之間表裏風雲雷電不空行也此皆有神有君長比若人有示故畏之不敢妄行中士半畏之者上不知元氣自然之有術纔知今見風雨雲氣與生物也尚時言天無神不畏列星日月也纔知大火北斗下士則不知土地山川之廣大可㤥纔知耕田種其所有治其家眷術也不知四時五行可以何履也但知隨而種樹之收其利耳不知六甲陰陽為神通言其無有也夫人愚學而成賢賢學不止成聖聖學不止成道道學不止成仙仙學不止成真真學不止成神皆積學不止所致也利尊上延命法一曰延命夷狄自伏法萬種其類不同俱得老壽天地愛之其身無咎所以然者名為大順之道道成畢身與天地同域古者為之萬神自得欲知其效瑞應自至凶禍自伏帝王以治不用筋力能知行此夷狄自伏行之不已成真人故聖人之教非須鞁揣擊而成因其自然性立教帝王所以能安天下者各因天下之心而安之故得天下之心矣是道修古文人本生時乃名神也乃與天地分權分體分形分神分精分氣分事分業分居故為三處一氣為天一氣為地一氣為人餘氣散備萬物是故尊天重地貴人也故三皇五帝皆立師疑者跪問之故國常治雖災戹亦可愈也王者無憂法大順之路使王者無憂無事致太平夫天地不大動搖風雨不橫行百神安其居天下無災矣萬物各居其處則樂無憂矣何以致之仁使帝王常樂道使無愁苦也若帝王愁苦即天下不安夫帝王天下心也群臣股肱也百姓手足也心愁則股肱妄為手足行運不休止百姓流蕩是其自然相使也天亦如是也天失道雲氣亂地失道不能藏矣王者與天相通夫子樂其父臣樂其君地樂於天天樂於道然可致太平氣天氣且一治太上皇平且一下天地和合帝王且行吾道何咎之有道者天之心天之首心首已行其肢體寧得不來從之哉還神邪自消法分別三氣所長還神守身太陽天氣故稱神形者太陰主祇包養萬物故精神藏於腹中故地神稱祇精者萬物中和之精故進退無常天地陰陽之精共生萬物此三統之歷也神者主生精者主養形者主成此三者乃成一神器三者法君臣民故不可相無也故心神動搖使形不安存之不置利其可安即留矣不用其可安即去矣始學用其可安之教之久久自都安不去矣陰氣陽氣更相摩礪乃能相生人氣亦輪身上下神精乘之出入神精有氣如魚有水氣絕神精散水絕魚亡故養生之道安身養氣不欲數怒喜也古者明師教帝王皆安身使無憂即帝王自專矣天喜太平氣出無不生成天恨形罰之氣出莫不殺傷萬物莫不被其毒故同憂也天不守神三光不明地不守神山川崩淪人不守神身死亡萬物不守神即損傷故當還之乃曰強不還自守曰消亡也和合陰陽自天有地自日有月自陰有陽自春有秋自夏有冬自晝有夜自左有右自表有裏自白有黑自明有冥自剛有柔自男有女自前有後自上有下自君有臣自甲有乙自子有丑自五有六自木有草自牝有牡自雄有雌自山有阜此道之根柄也陰陽之樞機神靈之至意也令人壽治平法三氣共一為神根也一為精一為神一為氣此三者共一位也本天地人之氣神者受之於天精者受之於地氣者受之於中和相與共為一道故神者乘氣而行精者居其中也三者相助為治故人欲壽者乃當愛氣尊神重精也欲正大事者當以無事正之夫無事乃生無事此天地常法自然之術也若影響上士用之以平國中士用之以延年下士用之以治家此可謂不為而成不理而治大道坦坦去身不遠內愛吾身其治自反也七事解迷法以德治身何如及以治萬民致大和之氣何如善而不達何能安哉以仁義治身何如及治萬民何如善而不達何能安哉以禮治身何如及以治萬民何如善而不達何能安哉以文治身何如及治萬民善而約束使不得為非何如善而不達何能安哉以治身何如及治萬民何如善而不達何能安哉以滅武兵革治身何如及以治萬民何如善而不達何能安哉然此七事亦不可無亦不可純行古者神人治身皆有本也治民乃有大術也使萬物生各得其所能使六極八方遠近懽喜萬物不失其所乃當自然能安八方四遠行恩不失氂毛今未能養其本末安能得治哉今此上德仁義禮文法武七事各異治俱善有不達而各有可長亦不可廢亦不可純行治身安國致太平乃當深得其訣御此者道也合以守一分而無極上帝行之乃深乎不可測名為洞照之式救四知優劣法天生人凡有三等第一天生第二地生第三人種類受命天者為人君受命地者為人臣受命人者為民君者應天而行臣者應地而行順承其上為民者屬臣轉相事凡是三氣共一治然後能成功故上之安者其臣良也臣職理者其民順常民臣俱善其君明其治長太平者以道行三氣悉善合乎章也懷道德不相傷也故大人治道以平天下救四海恩及夷狄禍不得起其善證日生凶不得來中士學道為國臣助其治也度其家辟禍災其次治道損其父母反遠遊德獨小薄纔脫軀也安能輔明王助國家哉能平四海者天助之為人臣者助為治與地謀纔自脫者道狹小無可得治此三人皆度世老壽有大小不同邪是神去留效道法神人言明行效道視命在誰乎令人昭然覺悟知命所從來法審誰者持其正也人法陰陽生陽者常正陰者常邪陽者常在陰者常無陽者常息陰者常消陽者常生陰者常殺人日三變象三氣其政殊異相與分爭乖錯不相從也而習使其常守人形容者吉唯有真道者能專精自殊異也不學者則不知神去留之效立見之物不可隱也故君子制尸不制鬼人不臥之時行坐言語分明白黑正行住立文辭以為法度此人神在也及其瞑目而臥光景內藏所念得之但不言神在內也及其定臥精神去遊身不能動口不能言耳不能聞與眾邪合獨氣在即明證也故精神不可不常守之守之即長壽失之即命窮人之得道者志念耳失道者亦志念耳救迷轉帝王法大道變化無常乃萬里相望上下無窮周流六方守之即吉不守即傷陰陽開闢以為常其付有道使善人行之其壽命與天地為期夫德有優劣事有本末凡事悉道之也將興者得善將衰者得惡比若土地得良土即善得薄土為惡善上合天賤者都澤坐者為主人行者為流客此盡道也善人行成福惡人行成災善人得以為福德尊者得之駕乘卑者得以步足聖賢得以度世小人得之不相剋賊此皆道也教不重見時不再來急教帝王令行太平之道道行身得度世功濟六方含生之類矣, ZHWIKI: ''}
  - {type: variant, offset: 4288, length: 686, content: 神人真人聖人賢人自占可行是與非法古者神人自占是非得與不得其事立可觀也不但闇昧昭然清白神道至眾染習身神正心意得無藏匿善者出惡者伏即自知吉凶之法如照鏡之式也於此之時賢明自安時不再來物不重應乃得獨盛洽遠方故事見其應見慎無拒逆撰以為寶器可謂得天地之心意矣其事時矣事皆職矣神道來矣賢者謀矣吉人到矣邪者不來矣清明見矣四方悅矣幽人隱士出矣得天心矣得治術矣邪不發矣自然達矣真人來輔矣天下善應矣各以其事來矣去憒亂矣此應出腹中發于胸心乃若雷電之應證也夫瑞應反從胸中來隨念往來須臾之間周流天下心中所欲感動皇天陰陽為移言語至誠感天正此也念者能致正亦能致邪皆從志意生矣使能動天地和陰陽合萬物入能度身出能成名賢不肖皆由斯生故賢者善御萬不失一也人腹中有過反面赤何也心者五藏之主主即王也王主執正有過乃白於天也驚即面青何也肝者主人人者憂也反㤥肝膽為發怒故上出青也諸神皆有可主以萬物相應故令人常自謹良而順天地而災不得復起也外學多內學少外事日興內事日衰故人多病故多浮華浮者表也華者末也夫天道遠入邪中不能自還所謂神道書者本根與陰陽合與神明同核事文者考核異同疑誤不失浮華記者離本已遠乃居野其文錯亂不可常用時可記也守本者治若神矣守中者少亂而煩矣守末者昏矣故賢者守本戒中不敢從末也夫能守之不止方方善來者無拒逆撰為寶器萬世不復易也人力自為善者可厄乎邪辟夷狄卻乎兵革絕乎杖策絞無聲乎四方安乎道路通乎人君明乎神策大人守之動四方中士為之令臣良小人為之不相傷其辭約其法明占神文乎可不行不能持乎慎無傷以拘奸乎以自防卻不祥法順用四時五行外內思正身散邪卻不祥懸象而思守行順四時氣和合陰陽羅網政治鬼神令使不得妄行害人立冬之後到立春盛行用, ZTDZ: ''}
