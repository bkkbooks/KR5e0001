  - {type: variant, offset: 2077, length: 116, content: 也願聞覩斷之耶斷何所酒哉但斷巿酒耳今天師何覩何見而獨斷絕巿酒耶然夫巿者迺應水之行也故四方人民凡物悉流而往聚處是故江海亦水之王長也故凡百川財物亦流往聚處也夫水者北方玄武之行也故貪數刦奪人財物夫巿亦五方流聚而相賈利致盜賊狡猾之屬皆起於巿, HFL: ''}
