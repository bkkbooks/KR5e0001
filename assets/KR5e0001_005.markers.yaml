也今愚生見師言眩冥不知東西願分別為下愚生說之然其上第一元氣無為者念其身也無一為也但思其身洞白若委氣而無形常以是為法已成則無不為無不知也故人無道之時但人耳得道則變易成神仙而神上天隨天變化即是其無不為也其二為虛無自然者守形洞虛自然無有奇也身中照白上下若玉無有瑕也為之積久久亦度世之術也此次元氣無為象也三為數度者積精還自視也數頭髮下至足五指分別形容身外內莫不畢數知其意當常以是為念不失銖分此亦小度世之術也次虛無也四為神游出去者思念五藏之神晝出入見其行游可與語言也念隨神往來亦洞見身耳此者知其吉凶次數度也五為大道神者人神出迺與五行四時相類青赤白黃黑俱同藏神出入往來四時五行神吏為人使名為具道可降諸邪也六為刺喜者以刺擊地道神各亦自有典以其家法祠神來游半以類真半似邪頗使人好巧不可常使也久久愁人七為社謀者天地四時社稷山川祭祀神下人也使人恍惚欲妄言其神暴仇狂邪不可妄為也八為洋神者言其神洋洋其道無可繫屬天下精氣下人也使人妄言半類真半類邪九為家先家先者純見鬼無有真道也其有召呼者純死人之鬼來也此最道之下極也名為下士也得其上道者能并使下得其下道者不能使其上也今願聞何故有是上下乎哉然此者人行之所致也守本者得上好身神出入游者得中也愚人迺損其本守末他游神者得下守本者能盡見之守中者半見之守末者不能還自鏡見之道也故凡學者迺須得明師不得明師失路矣故師師相傳迺堅於金石不以師傳之名為妄作則致凶邪矣真人慎之慎之唯唯故古者上學聖賢得明師名為更生不得明師者名為亂經故賢聖皆事師迺能成無有師道不而獨自生也善哉善哉真人欲知其效比若夫人居大賢之里則使人大賢居中賢之里則使人中賢居不肖之里則使人不肖常不及此之謂也學此道者審之詳之此天之要道也慎之慎之唯唯行去道歸其人以付賢明唯唯是神訣要道也右真道九首得失文訣致善除邪令人受道戒文第一百八真人問神人曰受道以何為戒乎神人言道乃有大戒不可不慎之也夫且得道臨且成之時乃與諸神交結也與精神為鄰里出入相見覩與人相愛若父子也夫道乃重事也或悔與人且欲奪人道故先試人視人堅不共來欺人使人妄語得其辭語堅閉之慎無傳之也即可得壽也久可得真道矣傳之日消亡矣又使人好生而惡害真人曰願聞其日消亡意精神消亡身即死矣夫虛無絕洞之道常欲使人好生而惡殺閉口無泄迺可萬萬歲也真人問神人願聞無泄之禁忌神人言然大人泄之亡其位中人泄之即斷其氣小人泄之滅其世類也所以然者夫天地乃以此自殊異自私故能神尤重之也夫天地不深知絕洞之道以何為神乎以何為壽乎記之吾告子其精之重之慎之真人唯唯不敢妄言也真人稽首願更聞其將欲敗人柰何乎哉神人言然於人心中有惡意使大邪來欺人能堅閉耳不聽其辭語則吉矣聽其辭則凶害矣夫人君聽之惡其臣言其臣不忠信而欲反也臣子聽之惡其君就來欺之言子今當為聖人今當為人君小人聽之使人自言且大尊也父聽之惡其子子聽之惡其父辯變其辭語熒惑人心意言其且善且惡亂人政治一喜一怒大佞之邪也方欲害人也從古到今諸學長壽者皆不得度於此辭也真人問曰當柰何哉神人言閉耳無聽閉口無語此但佞邪無可聽者也聽之即真道去去即死矣子欲長存慎之此辭也吾已為子先更之幾何中於此大邪矣吾常自正吾心不復用之也此大邪常積欲觀人堅不大猾邪常或乃來入人之腹中動人之心使人心妄為故也時時怒喜不能自禁止皆為邪所誤也為邪所推眾渘得滅亡於此者積眾多審得其重戒心亦不可移也非獨學道者也百姓喜怒無常同是子可為也子慎之自精真人唯唯真人曰吾身嘗中於大邪使吾欲走言吾欲當為人主後當飛仙上天吾受其言信之大喜後反三月病癲疾見神人天師言心中大悅喜吾親嘗中如此矣幾為劇病後癲疾自止得愈遂得數千歲今自幸復與神人相覩重復道戒覩見門戶冀得長度為天上之吏神人言子持心志堅如此何憂不得上九天周歷二十五天乎哉今是諸得上天之士皆得持心堅密不可誤者也諸可熒惑誤者皆反蚤死不得度也欲得長壽讀此文以為重戒此乃死生之戒不可不慎也是故古者聖賢先得度世者不聆此之力也學道而反不得不長度者皆坐聆此得其賊也夫天上大神非賊人可為便使人還此害剋故無大福也當生反死轉為天賊也今吾所教示真人書悉皆可得大壽矣或得度世但謹自持無以此為害審能專心可得萬萬歲真人唯唯吾不敢為非請受明戒神人言子好道如此成事得上天之階矣真人問戒獨有此邪復有深者邪復有上天之戒固固戒人耳專戒以言共欺人言人且尊貴以是戒人故使人觸防禁得誅死焉復數試人以玉女使人與其共遊已者共笑人賤還反害人之軀但人常默萬歲無可聆但獨自守終命何有害哉死生之間專此也真人唯唯真人問何故專使邪神來試人乎神人言道重難與人也其執必堅死而已者亦不奪人之願也天上度世之士皆不貪尊貴也但樂活而已者亦無有奇道也記吾戒子矣吾言萬世不可忘也正使上行窮周無訾之天其戒皆如此矣無復有奇哉也真人唯唯不敢離繩墨之間也神人言審如子言已得道矣吉者日進邪者上休矣持心若此成神戒矣成事乘雲駕龍周流八極矣大道坦坦已得矣命已長壽無極矣真人曰唯唯神人言道實大無內外但常恐為大邪所害而不聽一邪邪於何敗乎故古者帝王好道而學不聽邪者盡得萬萬歲其聽用邪言者悉自敗矣吾道迺萬端悉當知其利害真人唯唯今得神人之辭皆得須臾長生乎神人言不深戒成事凶矣道不得成也真人言吾生有祿命邪僥倖也迺得與神人相遭逢神人言然六人生各自有命一為神人二為真人三為仙人四為道人五為聖人六為賢人此皆助天治也神人主天真人主地仙人主風雨道人主教化吉凶聖人主治百姓賢人輔助聖人理萬民錄也給助六合之不足也故人生各有命也命貴不能為賤命賤不能為貴也子欲知其審實若魚雖乘水而不因水氣而蜚龍亦乘水因水氣迺上青雲為天使乎貴賤實有命愚者而妄語古者聖人帝王其大優者不復錄問偽言也知其會無可能為也此比若教無道之人令卒蜚安而蜚乎哉能飛者獨得道仙人耳夫百姓相與游戲言我能蜚實不能蜚此妄言者若此矣真人言善哉吾一覺於此神人言子自若愚為天命可強得也哉真人言然此道亦可學耶神人言然有天命者可學之必得大度中賢學之亦可得大壽下愚為之可得小壽子欲知其效同若凡人學耳大賢學可得大官中賢學者可得中官愚人學者可得小吏夫小吏使於白衣之民乎以是言之猶當勉學耳真人唯唯吾為之未嘗敢懈也神人言然努力信道天地之間各取可宜亦無妄也真人唯唯請得尊天重地敬上愛下順用四時五行可為不敢為非也神人言善哉善哉子得道意矣吾不復重教示子矣右致善除邪令人受道戒文齋戒思神救死訣第一百九六方真文悉再拜問前得天師言太平氣垂到調和陰陽者一在和神靈歸俱分處深惟天師之語使能反明洞照者一一而見之其人積眾多何以能致此諸道士能洞反光者能聚之乎噫大善哉天上皇氣且至帝王當垂拱而無憂故天遣諸真人來具問至道要可以為大道德明君悉除先王之流災承負天地之間邪惡氣鬼物凶姦尸咎殃為害者耶故真人來一一口口問此至道要也諸弟子亦寧自知不乎忽然不自知也今忽不自知何故問之歸思天師教勑有不解者今不自知當皆以何能聚此諸絕洞虛靖反光能見邪者怪之今故相與俱來共問之也善哉真人精益進乃知疑此天使子來悉為德君具問可解邪者諾方今為真人具說分別道其要意安坐共記唯唯天地自有神寶悉自有神精光隨五行為色隨四時之氣興衰為天地使以成人民萬物也夫天地陰陽之間莫不被其德化而生焉得其意者立可覩不得其大要意無門戶知能大開通用者大吉可除天地之間人所病苦邪惡之屬不知其大法者神亦不可得妄空致妄得空使也願聞其意使可萬萬世傳而不妄善哉子之問也然欲候得其術自有大法四時五行之氣來入人腹中為人五藏精神其色與天地四時色相應也畫之為人使其三合其王氣色者蓋其外相氣色次之微氣最居其內使其領袖見之先齋戒居閒善靖處思之念之作其人畫像長短自在五人者共居五尺素上為之使其好善男思男女思女其畫像如此矣此者書已眾多非一通也自上下議其文意而為之以文書傳相微明也吾書雖多自有大分書以類相聚從字以相明則畢得其要意唯唯此四時五行精神入為人五藏神出為四時五行神精其近人者名為五德之神與人藏神相似其遠人者名為陽歷字為四時兵馬可以拱邪亦隨四時氣衰盛而行其法為其具畫像人亦三重衣王氣居外相氣次之微氣最居內皆戴冠幘乘馬馬亦隨其五行色具為其先畫像於一面者長二丈五素上踈畫五五二十五騎善為之東方之騎神持矛南方之騎神持戟西方之騎神持弓弩斧北方之騎神持鑲楯刀中央之騎神持劍鼓思之當先睹是內神已當睹是外神也或先見陽神而後見內神覩之為右此者無形象之法也亦須得師口訣示教之上頭壹有關知之者遂相易曰為其易致易成宜遠於人便間處為之易集近人必難成也於其道成曰明大絕反洞者聚之病形不多多則吉少則凶或有不及所治不決解愈當得多少而可哉高得萬中得四五千下得十數百如百數十其何多也噫真人其復故愚邪安坐方為子道其大要意也今承負之後天地大多災害鬼物老精凶殃尸咎非一尚復有風濕疽疥今下古得流災眾多不可勝名也或一人有百病或有數十病假令人人各有可長或有可短或各能去一病如一卜卦工師中知之除一禍祟之病大醫長於藥方者復除一病刺工長刺經脈者復除一病或有復長於炙者復除一病或復有長於劾者復除一病或有長於祀者復除一病或有長於使神自導視鬼復除一病此有七人各除一病這除去七病下古人多病或有一人十數病乃有自言身有百病者悉無不具疾苦也盡諸巧工師各去一病這去七病其餘病自若在不盡除去七工師力已極此餘病不去猶共困人久久得窮焉故多得死不能自度於戹中也人生比竟天年幾何睹病幾何遭戹會衰盛進退天之格法比如四時五行有興衰也八卦乾坤天地之體也尚有休囚廢絕少氣之時何況人乎人者乃象天地四時五行六合八方相隨而壹興壹衰無有解已也故當豫備之救吉凶之源安不忘危存不忘亡理不忘亂則可長久矣是故治邪法道人病不大多假令一人能除一病十人而除十病百人除百病千人除千病萬人除萬病一人之身安得有萬病乎故能悉治決愈之也子知之邪唯唯故教其豫作戒成其道者聚之者唯唯行子知之矣行為真人明陳列之此所治病者鬼物大邪共為盜賊夫帝王安平常備軍師兵者以備人反為無義成姦賊也故一人敢死十人不敢當十人敢死百人不敢當百人敢死千人不敢當千人敢死萬人不敢當萬人敢死四面橫行備其有疾病折傷故軍師乃備萬二千人者以備非常其二千人者但備以補其休逋耳乃能服之也真人知之耶唯唯行子已知之矣不用大言無效訣第一百一十請問一事天師今太平氣垂到邪氣當思息除去也然子言是也又非也然太平氣至邪固當自消去惟天地開闢以來積久邪氣大眾多更相承負太平之治氣雖至也亦安能一旦悉卒除此乎故當豫備之為其作法困窮然后求索良工已大後之矣夫上古之人人人各自知真道又其時少邪氣太上中古以來人多愚好為浮華不為真道又多邪氣狂精殃咎故人多卒窮天年而死亡也悉由用心愚闇蔽不知豫防其本也今當上德君治天愛之不欲使其若此愚人多窮也當使卒其大德與天同心故天使諸真人來問疑使吾為其陳法可以厭禦邪不祥妖惡者故吾為真人具言之今真人反言當自除不備此言非也名為大誤君子之辭也子言不可用也何謂乎然有大急乃后求索之不可卒得也令人窮困矣故真人言大誤不可用也今積穀乃滿倉可以備飢餓也今為真人察察道之使可萬萬世不忘也唯唯今飢乃教人種穀言耘治之待其米成乃可得火炊食亦豈及事邪於此已餓死困矣或不及春時種之至冬飢念食乃欲種穀種之不生此豈能及事活人邪非獨身窮舉家已滅亡矣是真人之一大愚無知冥冥之大效也行復為子說一事今人掘井所以備渴飲也居當近水泉所以備渴也臨渴且死乃掘井索水何及得也已窮矣是真人復問二愚闇復為真人說一事古者有穴居今者作廬宅所以備風雨也及不風雨之時居野極樂矣浮雲已起雨風已至迺作廬宅已雨寒而困窮矣是真人三愚也復為真人說一事夫太中古以來聖人作縣官城郭深池所以備不然其時默平平無他也及有不然小人欲汙亂君子乃後使民作城郭深池亦豈及急邪是真人劇愚暗效也行復為真人說一事今軍師兵不祥之器也君子本不當有也下之惡之故當置於鞘中堅治藏之必不貴有之也不貴用之也但備不然有急乃後使工師擊治石求其中銕燒治之使成水乃後使良工萬鍛之乃成莫耶可以戰鬭禦急者亦豈及事邪已窮服矣死命屬矣是非六真人之大愚不及邪唯唯有過非過也思事當詳卜之胸心乃出之也後勿輕妄語也唯唯為真人道小決事反以明大夫古者聖賢之設作梳與枇以備頭髮亂而有蝨也夫人生而不櫛頭亂不可復理蟣蝨不可復得困乃後求索南山善木及象骨奇物可中櫛者使良工治之髮已亂不可復理頭中之蝨不可勝數共食人頭皆生瘡矣然后得梳與枇已窮矣然後為真人陳小決事以小況大夫河海五湖近水之傍多蚊虻不豫備作可以隱禦之者夫蚊虻俱生而起飛共來食人及牛馬牛馬搖頭踶䠱不能復食人者大愁且死無於止息然后求可以厭禦之者已大窮矣真人寧明知之邪唯唯行子已覺矣夫良方所以能厭禦疥蟲善衣善處所以厭禦蚤蝨不豫備之病之乃求索可以去之者已得大窮愁病之矣子知之邪唯唯是尚最天下小小財備數之物也何言其大巨者乎夫天地之間時時有是暴鬼邪物凶殃尸咎殺客當其來著人時比如刀兵弓弩之矢毒著人身矣所著疾痛不可忍其大暴劇者噓不及噏倚不及立身為暴狂比若閒亭遠帝王之縣吏壅閼斷人辭語不得言變事於此之時乃求索良工長者以自救已窮矣辭已不通無可復得言之矣子知之邪唯唯行子已覺矣故吾尤急此死亡天下大凶事也故吾文倲倲教有德人君豫備之也上賢明見吾書言之必大覺矣中賢見吾文言必小覺下愚不覺反笑吾書不備其本已自窮矣天地帝王無過於是也今行太平氣至陽德君治當得長久凡天下人死亡非小事也壹死終古不得復見天地日月也脈骨成塗土死命重事也人居天地之間人人得壹生不得重生也重生者獨得道人死而復生尸解者耳是者天地所私萬萬未有一人也故凡人壹死不復得生也故當大備之雖太平氣樂歲猶有邪氣比若一家雖善中猶有惡人但相忍耳是故益聚道術士者為有不然輒當除之不疾除之則生之矣故教其豫多其人也夫大學所以益積道德之人者備求可得也如不豫蓄聚求不可卒得也如有變事欲問古今比列不豫有大渘道德之人無能卒對解者令人君闇蔽卒有疑事問之不以時決解愁乃後往求索遠方賢明渘術何及於倲倲當前乎哉真人知之邪唯唯行子已大覺矣雖每發言有過責不問又會不知之願決一事言之今是或高則萬人中則數千下則數百何可卒得卒成乎善哉子之問事也但教十數人以善成之且自轉相易有急效之有成功者令使上德道君重之愛之於其有功者賜之眾人且願之於其願之而大從使其為之於其得者共尊敬愛之此四時五行天地之神精見尊重愛莫不說喜使人吉利德君長蒙其吉福眾賢渘下及愚人莫不爭欲為之也即為者日益多以久久大小盡化能人人為之乃選取其中第一大功者悉聚之大有功者署其位小有功者賞賜之天下人莫不欲為之但恐大多不可勝記何患憂少哉真人何其大愚暗且蒙也一事大決毋取用但好大言者也是人無益於人也但效式之常有成功者即其人得道意大信人也知但數言而無大效者即是其不得道意而妄語大佞人也不可用也亂道者也真人知之耶唯唯行去慎之戒之誦讀吾書惟思其上下意以類相從更以相證明以相足也迺且大解知吾道所指趣也唯唯五神所持訣第一百一十一願請問一大決東方之神何故持矛乎然可毋問也真人必自知之所以問者天師幸哀後生為作法不問則令後世不得知天道之意決然此者天之象也物者各從其類東方者物始牙出頭盡生利刺土而出其精象矛故為矛其神吏來以此為節南方萬物垂枝布葉若戟故其精神而持戟其神吏來以此為節西方為弓弩斧西方者天弩殺象夫弓弩斧亦最傷害之長也故其神來以此為節北方為鑲楯刀北方者物伏藏逃鑲楯所以逃身者也刀者小人所服亦常以避逃以害人非上君子之有也故其神來亦以此為節中央者為雷為鼓為劍中央者土也五行之主也鼓亦五兵之長也劍亦君子道德人所服也亦五兵之長也故中央神來以此為節是天地自然實信之符節也比若人生當有頭應此持其節實信符傳來對不若此即非其行神也應他神妄來對悉為亂政久久其治亂難平安故皆求信符節也真人知之耶唯唯是說乃淺而深雖不足道者反乃當與天地四時五行氣相應和善哉善哉行真人知之矣右厭邪人盡變成道以救死命訣闕題守道德積善乃究洽天地鬼神精氣人民蚑行萬物四時五行之氣常與往來莫不知其善者矣闕題大慈孝順閭第一慈孝者思從內出思以藏發不學能得之自然之術行與天心同意與地合上有益帝王下為民間昌率能致和氣為人為先法其行如丹青故使第一明道德大柔閭第二明經道德為百姓先學好道善聚德不致盜賊上有益帝王化之最真吉矣孝悌始學化善閭第三始學欲為善心中有庶幾去邪就正且成仁行未化也佃家子謹閭第四佃家謹力子平旦日作日入而息不避勞苦日有積聚家中雍雍以養父母得土之利順天之道不敢為非有益縣官大不仁之子無義少年好兵聚姦閭第五無義之人不仁之子不用道理罵天擊地不養父母行必持兵恐畏鄉里輕薄年少無益天地之化反為大害并力計捕捐棄溝瀆不得藏埋不和家中欺老愛少共食異財閭第六家將必敗骨肉不和不能相教妄傳往來更相逃避背本向末其禍不救矣悔過棄兵閭第七生於窮里希有聞覩不知善惡有過天下行不合天賴有明君使我就善少不知學長乃悔之使善人賢士以五尺柱高卒有去閭學者當考問之一旦民皆為善矣悔過更合善閭第八室學不成禍亂悉生賴有明君知我情由令我悔過反致為人師矣大惡人邪貪敗化閭第九尸祿邪惡貪賊欺上害下大佞名為官賊似人之形貪獸之情無益天地陰陽災深當誅亡除過復正悔事閭第十悔過改行易心少無善情災害數生朝過暮改名為善人此十閭古賢聖人之法樂人為善使不相賊傷欲令各終天年還反其道防絕其本得覩太平之氣也闕題神者皆以規正其根太相太相繫於帝王因以正天行之其次根繫於皇后因以順地理中根繫於眾聖因以理陰陽細微小根繫於庶民因以理萬物大人為之得大中人為之得中小人為之得小皆可有正也帝王行道德興盛日大明少道德少明皇后行道德月大光明少道德少光明眾賢行道德星曆大耀少道德少耀四根俱行道德天下安寧瑞應出大光遠遙觀天象風雨時善夷狄歸心災害自消今得天師書道德以往付謹民使謹民使歸上有大仁道德之君可以平天下之理而長安身帝王尸上皇天之第一貴子也皇后乃地之第一貴女也夫至神聖貴人職當居百重之內而反憂天下萬里之外受天業為陰陽六合八方持統首天地之尊位為神靈所因任上下洞極萬物蚑行之屬莫不歸心於是作無上靈寶謁能知天意明於星曆之吏名為太史直事不得逋日與夜迭上觀候天氣盛衰三光之得失樂得天勑戒以自安也十一月則修黃鍾導地下之氣使上通樂得后土意以自安矣作明堂於太陽丙午之地為其開八窗四達樂通八方四時之氣欲與八風四時之氣合其吉以自安也明闢四門樂得天下奇文殊策希見之物賢明異術可以長安天下而消災異古者聖人在位常力求隱士賢柔可以共理願聞四時為尊貴然王氣乃為無氣之長也眾氣所繫屬諸尊貴之君也王氣乃為天為皇為帝為王為太歲為月建為斗岡為青龍為大德為盛興為帝王為無上王為生成主是故王氣所處萬物莫不歸王之王氣所居皆王而生所背去悉死由元氣也故王氣處陽則陽王居陰則陰王居天則天王居地則地王所處者皆王受命主理是古者聖人王者春東夏南秋西冬北六月中央帀氣則謁見天王氣乃尊於天當月建名為破大耗當帝王氣衝為名死滅亡元氣建位帝王氣為第一氣尊嚴不可妄當也月建後一為閉閉者乃天主閉塞其後陰休氣恐來前為姦猾干帝王建氣也故閉其後也開者天之法不樂害傷也故開其後者示教休氣為其有為姦者樂開使退去也不去當見收收則考問之則成罪罪則不可除令死危故後五為危危則近死矣故後六為破天斗所破乃死故魁主死亡乃至危也故帝王氣起少陽太陽常守斗建死亡氣乃起於少陰太陰常守斗魁是故後六將天常休之空之與地同氣主閉藏匿奸宄與邪鬼物同處不可妄開發古者賢人好生也悉氣屬斗前與天行并故日吉能有氣也諸為奸猾陰賊惡邪悉象陰氣屬斗後故日衰所為者凶元氣怳惚自然共凝成一名為天也分而生陰而成地名為二也因為上天下地陰陽相合施生人名為三也三統共生長養凡物名為財財共生欲欲共生邪邪共生奸奸共生猾猾共生害而不止則亂敗敗而不止不可復理因窮還反其本故名為承負夫天道無心遭不肖則亂得賢明則理古者帝王得賢明乃道興不敢以下愚不肖為近輔速以吾此文付上德之君行之洞明者光以三氣相見問之占十中十所理悉理此第一善明可以為帝王使占十中九一氣亂不理可為諸侯使占十中八二氣亂不理可為凡人使過此已下名亂天正道必有冤結鬼神精伏逃不見不可理不能調和太平之氣子欲得道思書文求道之法靜為根為根積精不止神之門五德和合見魂魄心神已明大道陳先知安危察四鄰群神大來集若雲若是不息長壽君哉大道不用勤形若死灰守魂神魂神不去乃長存周者反始環無端去本求末道有患眾民失之不得完思其意無失真言清靜為本非用錢可不重愛明師言順受師語不死焉愚者逆師與鬼鄰不得正道入凶門遂不復還去神骨肉腐塗稱祖先命已滅亡大窮