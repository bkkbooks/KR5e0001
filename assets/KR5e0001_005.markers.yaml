  - {type: variant, offset: 1611, length: 341, content: 而異辭周流幽冥無有極時獨古者大神聖人時時知之耳欲盡為子說之難為財用又復太文反令益憒憒使土德之君見眩亂不知所從故止也不惜為諸子說也而說無窮極真人知之耶唯唯行子少覺矣德君據吾天讖以治萬不失一也是故天道迺有固界也以東與南為君王象屬天故名為天子也以西與北為後宮民臣象也屬地故地為后宮也真人知之耶唯唯天之格讖東方者畏西方是故天地開闢以來王者從兵法興金氣武部則致君之象無氣火者大衰其治凶亂真人欲樂知天讖之審實也從上古中古到于下古人君棄道德興用金氣兵法其治悉凶多盜賊不祥也是故上古聖人深知天固法象故不敢從兵革武部以治也帝王欲樂長安而吉者宜按此天讖急囚斷金兵武備而急興用道與至德以象天法以稱皇天之心以長厭絕諸姦猾不祥之屬也立應不疑也真人知之耶唯唯天之讖格法太陽雖為君者反大畏太陰水之行也水之甘良者酒, HFL: ''}
