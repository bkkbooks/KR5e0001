  - {type: variant, offset: 15798, length: 2020, content: 天讖支干相配法第一百五真人再拜曰愚賤生緣天師常待之以赤子之分恩愛洽著倉皇得旦夕進見天功至大不可謝今欲復有質問密要天之祕道又不敢卒言平道之子既為天問事當窮竟不得中棄而止也唯唯愚生見天師所說無有窮極時也迺後弟子俱天覺承知天師深洞知天地表裏陰陽之精諸弟子恐一旦與師相去無可復於質問疑事故觸冒不嗛問可以長久安國家之讖令人君常垂拱而治無復有憂但常當響琴瑟作樂而遊安若天地也無復有危時豈可聞乎哉然諸真人思精進乎深眇哉所問迺求索洞通天地之圖讖文一言迺萬世不可易也天公疾多災愁苦之迺使諸真人來問疑乎諾且為真人具說天之規矩大要祕文訣令使其真人自隨而記之唯唯然夫皇天迺以四時為枝厚地以五行為體枝主衰盛體主規矩部此九神周流天下上下洞極變化難覩為天地重寶為眾神門戶自有固常不可妄犯順之者長吉亂之者長與天地乖仵唯唯願聞其意豈可睹耶善哉諸真人言也方為子具道之但俱自精安坐思吾言唯唯天常讖格法以南方固為君也故日在南方為君也火在南方為君太陽在南方為君四時盛夏在南方為君五祀竈在南方為君五藏心在南方為君君者法當衣赤火之行也是故君有變怪常與陽相應非得與他行相應也陽者日最明為眾光之長故天讖常以日占君盛衰也真人知之耶唯唯行知之矣人君之法常當求與仁者同家有心者為治其可與共為治者常當行道而好生小小幼弱於其長臣賢成器者君當養之不宜傷也故東方者好生南方者好養夫不仁用心不可與長共事不明不可以為君長故東方者木仁有心南方者火明也夫天法帝王治者常當以道與德故東方為道道者主生南方為德德者主養故南方主養也治者當象天以文化故東方為文龍見負之也南方為章故正為文章也章者大明也故文生於東明於南故天文者赤也赤者火也仁與君者動上行日當高明為人作法式故木與火動者輒上行也君之象也故居東依仁而上其治者故當處南故東方為少陽君之始生也故日出於東方也南方為太陽君之盛明也少陽為君之家及父母太陽為君之身君之位也少陽為君之家木為火之父母君以少陽為家火稱木之子真人知之耶唯唯子已知之矣少陰為臣臣者以義屈折伏於太陽故金隨火屈折在人可欲為臣者常以義屈折佐君可欲為也故少陰稱臣也真人知之耶唯唯太陰為民民流行而不止故水流行而不知息也民者職當主為國家王侯治生故水者當隨生養木也東方者君之家也真人知之耶唯唯行子已知之矣天之格讖少陽者畏少陰故臣者反主錄國家王侯官屬也太陽畏太陰是故國有道與德而君臣賢明則民從也國無道德則民叛也是故治國之大要以多民為富少民為大貧困諸真人曉知之耶唯唯行已覺矣天之格法分為六部東南上屬於天故萬物生皆上行蚑行人民皆出處外也屬於天故天為之色外蒼象木內赤象火真人知之耶唯唯行已曉矣天地之格讖西方北方下屬於地故萬物至秋冬悉落下歸土也人民蚑行至秋冬悉入穴而居故地之為色也外黃白象土金內含水而黑象北行也真人知之耶唯唯天之格讖東方南方位尊上屬天主治為君長師父西方北方位卑屬地為臣為後宮為民故己者甲之後宮也甲天也王者之本位也故甲為心星心星火也為王者故東方亦為王者之先也心星火也行屬南方比若日出東方而位在南方也真人知之耶唯唯行子已知之矣天之格讖丙為火之長最其大明者也君之位也辛者屬丙辛者丙之後宮也真人知之耶唯唯行子已知之矣今己亦為皇后辛亦為皇后何謂也善哉子之難也得天讖訣意然己配甲甲者丙之父也故己迺太皇后之宮也辛者配丙丙者甲之子也故辛者小皇后之宮也丙者迺甲之適子受命皇之君也真人知之耶唯唯行真人已知之矣庚者屬乙是國家諸侯王之壻也壬者屬丁是帝王女弟之壻也癸者屬戊是國家太皇后之婦家也善哉真人已知之矣今十干已解各有所屬願聞地之十二支當云何哉善耶然天之為法陰陽雖行相過事者各自有家天之為法同不舉家悉相隨而止耳甲者以寅為家乙者以卯為家丙者以午為家丁者以巳為家戊者以辰戌為家己者以丑未為家庚者以申為家辛者以酉為家壬者以子為家癸者以亥為家故天道者反行治也地道者止也故有分土反無分民蓋有國土而無國故天地者不移天反一日一夜周流一竟行之以此為常故十二支各居其處不隨十干而行也子知之耶唯唯天地之道四時五行其道以相足轉而異辭周流幽冥無有極時獨古者大神聖人時時知之耳欲盡為子說之難為財用又復太文反令益憒憒使土德之君見眩亂不知所從故止也不惜為諸子說也而說無窮極真人知之耶唯唯行子少覺矣德君據吾天讖以治萬不失一也是故天道迺有固界也以東與南為君王象屬天故名為天子也以西與北為後宮民臣象也屬地故地為后宮也真人知之耶唯唯天之格讖東方者畏西方是故天地開闢以來王者從兵法興金氣武部則致君之象無氣火者大衰其治凶亂真人欲樂知天讖之審實也從上古中古到于下古人君棄道德興用金氣兵法其治悉凶多盜賊不祥也是故上古聖人深知天固法象故不敢從兵革武部以治也帝王欲樂長安而吉者宜按此天讖急囚斷金兵武備而急興用道與至德以象天法以稱皇天之心以長厭絕諸姦猾不祥之屬也立應不疑也真人知之耶唯唯天之讖格法太陽雖為君者反大畏太陰水之行也水之甘良者酒也酒者水之王也長也漿飲之最善者也氣屬坎位在夜主偷盜賊故從酒名為好縱水之王長也水王則衰太陽真人欲樂知天讖之審實也從太古以降中古以來人君好縱酒者皆不能, HFL: ''}
