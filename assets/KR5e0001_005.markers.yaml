  - {type: variant, offset: 2007, length: 68, content: 從太古以降中古以來人君好縱酒者皆不能太平其治反亂其官職多戰鬭而致盜賊是明效也是故太平德君方治火精當明不宜從太陰令使水德王以厭害其治也故當, HFL: 急}
