  - {type: variant, offset: 17820, length: 310, content: 其治反亂其官職多戰鬭而致盜賊是明效也是故太平德君方治火精當明不宜從太陰令使水德王以厭害其治也故當斷酒也願聞覩斷之耶斷何所酒哉但斷巿酒耳今天師何覩何見而獨斷絕巿酒耶然夫巿者迺應水之行也故四方人民凡物悉流而往聚處是故江海亦水之王長也故凡百川財物亦流往聚處也夫水者北方玄武之行也故貪數刦奪人財物夫巿亦五方流聚而相賈利致盜賊狡猾之屬皆起於巿以水主坎天之法以類遙相應故巿迺為水行縱其酒大與之復名為水王巿人亦得酒而喜王名為二水重王其咎六厭衰太陽之火氣使君治衰反致訞臣真人知之耶今見天師訣之眩亂不曉願聞其大訣善哉子之言也然諸真人乃遠為天來問事為德君帝王解承負之害吾無所惜也俱安坐為諸真人分別悉說道其大要意唯唯天之讖訣金玉興用事人大興武, HFL: 經鈔戊}
