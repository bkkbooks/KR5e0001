  - {type: variant, offset: 6693, length: 2278, content: 出入游者得中也愚人迺損其本守末他游神者得下守本者能盡見之守中者半見之守末者不能還自鏡見之道也故凡學者迺須得明師不得明師失路矣故師師相傳迺堅於金石不以師傳之名為妄作則致凶邪矣真人慎之慎之唯唯故古者上學聖賢得明師名為更生不得明師者名為亂經故賢聖皆事師迺能成無有師道不而獨自生也善哉善哉真人欲知其效比若夫人居大賢之里則使人大賢居中賢之里則使人中賢居不肖之里則使人不肖常不及此之謂也學此道者審之詳之此天之要道也慎之慎之唯唯行去道歸其人以付賢明唯唯是神訣要道也右真道九首得失文訣致善除邪令人受道戒文第一百八真人問神人曰受道以何為戒乎神人言道乃有大戒不可不慎之也夫且得道臨且成之時乃與諸神交結也與精神為鄰里出入相見覩與人相愛若父子也夫道乃重事也或悔與人且欲奪人道故先試人視人堅不共來欺人使人妄語得其辭語堅閉之慎無傳之也即可得壽也久可得真道矣傳之日消亡矣又使人好生而惡害真人曰願聞其日消亡意精神消亡身即死矣夫虛無絕洞之道常欲使人好生而惡殺閉口無泄迺可萬萬歲也真人問神人願聞無泄之禁忌神人言然大人泄之亡其位中人泄之即斷其氣小人泄之滅其世類也所以然者夫天地乃以此自殊異自私故能神尤重之也夫天地不深知絕洞之道以何為神乎以何為壽乎記之吾告子其精之重之慎之真人唯唯不敢妄言也真人稽首願更聞其將欲敗人柰何乎哉神人言然於人心中有惡意使大邪來欺人能堅閉耳不聽其辭語則吉矣聽其辭則凶害矣夫人君聽之惡其臣言其臣不忠信而欲反也臣子聽之惡其君就來欺之言子今當為聖人今當為人君小人聽之使人自言且大尊也父聽之惡其子子聽之惡其父辯變其辭語熒惑人心意言其且善且惡亂人政治一喜一怒大佞之邪也方欲害人也從古到今諸學長壽者皆不得度於此辭也真人問曰當柰何哉神人言閉耳無聽閉口無語此但佞邪無可聽者也聽之即真道去去即死矣子欲長存慎之此辭也吾已為子先更之幾何中於此大邪矣吾常自正吾心不復用之也此大邪常積欲觀人堅不大猾邪常或乃來入人之腹中動人之心使人心妄為故也時時怒喜不能自禁止皆為邪所誤也為邪所推眾渘得滅亡於此者積眾多審得其重戒心亦不可移也非獨學道者也百姓喜怒無常同是子可為也子慎之自精真人唯唯真人曰吾身嘗中於大邪使吾欲走言吾欲當為人主後當飛仙上天吾受其言信之大喜後反三月病癲疾見神人天師言心中大悅喜吾親嘗中如此矣幾為劇病後癲疾自止得愈遂得數千歲今自幸復與神人相覩重復道戒覩見門戶冀得長度為天上之吏神人言子持心志堅如此何憂不得上九天周歷二十五天乎哉今是諸得上天之士皆得持心堅密不可誤者也諸可熒惑誤者皆反蚤死不得度也欲得長壽讀此文以為重戒此乃死生之戒不可不慎也是故古者聖賢先得度世者不聆此之力也學道而反不得不長度者皆坐聆此得其賊也夫天上大神非賊人可為便使人還此害剋故無大福也當生反死轉為天賊也今吾所教示真人書悉皆可得大壽矣或得度世但謹自持無以此為害審能專心可得萬萬歲真人唯唯吾不敢為非請受明戒神人言子好道如此成事得上天之階矣真人問戒獨有此邪復有深者邪復有上天之戒固固戒人耳專戒以言共欺人言人且尊貴以是戒人故使人觸防禁得誅死焉復數試人以玉女使人與其共遊已者共笑人賤還反害人之軀但人常默萬歲無可聆但獨自守終命何有害哉死生之間專此也真人唯唯真人問何故專使邪神來試人乎神人言道重難與人也其執必堅死而已者亦不奪人之願也天上度世之士皆不貪尊貴也但樂活而已者亦無有奇道也記吾戒子矣吾言萬世不可忘也正使上行窮周無訾之天其戒皆如此矣無復有奇哉也真人唯唯不敢離繩墨之間也神人言審如子言已得道矣吉者日進邪者上休矣持心若此成神戒矣成事乘雲駕龍周流八極矣大道坦坦已得矣命已長壽無極矣真人曰唯唯神人言道實大無內外但常恐為大邪所害而不聽一邪邪於何敗乎故古者帝王好道而學不聽邪者盡得萬萬歲其聽用邪言者悉自敗矣吾道迺萬端悉當知其利害真人唯唯今得神人之辭皆得須臾長生乎神人言不深戒成事凶矣道不得成也真人言吾生有祿命邪僥倖也迺得與神人相遭逢神人言然六人生各自有命一為神人二為真人三為仙人四為道人五為聖人六為賢人此皆助天治也神人主天真人主地仙人主風雨道人主教化吉凶聖人主治百姓賢人輔助聖人理萬民錄也給助六合之不足也故人生各有命也命貴不能為賤命賤不能為貴也子欲知其審實若魚雖乘水而不因水氣而蜚龍亦乘水因水氣迺上青雲為天使乎貴賤實有命愚者而妄語古者聖人帝王其大優者不復錄問偽言也知其會無可能為也此比若教無道之人令卒蜚安而蜚乎哉能飛者獨得道仙人耳夫百姓相與游戲言我能蜚實不能蜚此妄言者若此矣真人言善哉吾一覺於此神人言子自若愚為天命可強得也哉真人言然此道亦可學耶神人言然有天命者可學之必得大度中賢學之亦可得大壽下愚為之可得小壽子欲知其效同若凡人學耳大賢學可得大官中賢學者可得中官愚人學者可得小吏夫小吏使於白衣之民乎以是言之猶當勉學耳真人唯唯吾為之未嘗敢懈也神人言然努力信道天地之間各取可宜亦無妄也