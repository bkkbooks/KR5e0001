  - {type: variant, offset: 5020, length: 854, content: 失天道意矣使人身自化為神者是也身無道而不成神自言使神者非也但可因文書相驅使之術耳說凡事本末中央相似者是也不相類似者非也入室始少食久久食氣便解去不見者是也求道自言得之不還反有問者非也凡去者悉還有教問者是也而無教問者而容死也守清靜於幽室成者是也自言得道行以怒語言者非也失精之人也入學而日善過其故者得道之是也入學而反為日惡不忠信者非也陷於大邪中也讀書見其意而守師求見訣示解者是也讀書不師訣反自言深獨知之者非也內失大道指意也學已得道固事眾師眾賢不懈者是也此日進之數也故古聖師已知道自若事師不敢止也去師則讀文不懈也學而獨自言得其要意不復力讀古文聖辭自言是不事眾聖明者非也下愚之人也凡人學而窮竟其可求學者是也萬物皆然萬物既生皆能竟其壽而實者是也但能生不而竟其壽無有信實者非也為善得其實宜者是也不得其實宜者但外是內非也案讀吾書盡不離繩墨而得其實者是也讀書出其奇多才而不得其要實者非也天有風雨而萬物時生者是也風雨而萬物反傷者非也有毒也為經道而日興盛者是也不日向興反日向衰者行內失其意者非也是故夫天地之性為善不即見其身則流後生以明其行也為惡亦不即止其身必流後生亦以謬見明其行也故夫為善惡者會當見耳但為善者比若向日出猶且彰明也為惡者比若向日入猶且冥冥此天地陰陽自然性也天生萬物迺各隨其行而彰之不隱匿也故善者上行命屬天猶生人屬天也惡者下行命屬地猶死者惡故下歸黃泉此之謂也得吾書者以付上德君也吾有此書敢障絕而傳讀之也天道治天不可盡知也不可聽信一人之言今故為子定古聖文今復要其合策明書前後相因以相證也天地開闢以來賢聖雖異世而生相去積遠所疾惡者同也共為天談救世得失也其言相似猶若重規合矩轉以相彰明不得不也夫物類相聚興也其法皆以比類象相召也是明效也為其失之於前得之於後考合異同以成文也拘古以明今共議其事以內文者明其外文以外文者還考繫其內文也使可萬世傳無重過於天一人之言不可獨從也眾人之言深策取古賢聖之辭內與天同也共定而置之帝王日明解訣諸憒亂災惡除天無重憂共為者興拒逆者災不除也右是學者得失訣真道九首得失文訣第一百七真人再拜請問一事然言之今, HFL: ''}
