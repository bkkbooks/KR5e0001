body:
  text: 太平經鈔壬部凡人不能相拘故自制命為不善天將誅之故小人得誅於中人中人得誅於上人上人得誅於大人夫小失法自致危亡夫神靈大小之誅亦若此而不能拘制天當誅之必矣天畏道道畏自然夫天畏道者天以至行也道廢不行則天道亂毀天道亂毀則危亡無復法度故自然使天地之道守行道不懈陰陽相傳相付相生也道乃主生道絶萬物不生萬物不生則無世類無可相傳萬物不相生相傳則敗矣何有天地乎天地陰陽乃當相傳相生今絶滅則滅亡故天畏道絶而危亡道畏自然者天道不因自然則不可成也故萬物皆因自然乃成非自然悉難成如使成皆為詐僞成亦不可久夫天地雖相去遠闊其制命無脫者請問太平氣俱至欲常以善意去姦惡當何先哉夫天地之性半陽半陰陽為善主賞賜陰為惡惡者為刑罰主姦僞賞者多罰者少姦猾者多賞者少姦門開所以然者罰者多刑主殺傷犯法者皆成姦罪人故姦門開姦猾多也陽者主賞賜施與多則德王用事陽與德者主養主生此自然之法也故晝為陽為日為君為德夜為陰為月為臣為姦天地之性半善半惡故君子上善以閉姦興善者得善興惡者得惡此由若以斗拱斗非斗者自然走以尺拱尺非尺者自然落猶方與圓不相得規與矩不相值縱與橫不相合故陽興必動以類行故火盛乃雷鳴朱雀在其中是以夏雷也冬則藏凡事各因其本乃天道可得而明不緣其類聖賢何從得深知之故從天地開闢已來人之善惡真僞但觀其所行以類求之占其成功善惡得失賢不肖可覩矣何須坐爭之乎請問從古到今賢者明者智者辨者力者勇者此六人皆有萬倍之才豈有善惡哉此六人悉有萬倍人之才能其才能安和天地令使凡邪惡害之屬不生帝王長無憂而壽身能自除其疾病各竟其天年恩流凡人此賢明智辨力勇大善有益矣而不能共和天地使帝王無憂而壽而身有疾病被災不能祓去或夭年而死與凡人無別此六人無益也但效其成功無復問也成功者是也不成功者非也效事若此深得皇天心意帝王為之延年命萬物悉治也請問凡物一時有不生者又有不養者長之不成其大過悉從何來當生而不生者天也當養所不養者地也天地為萬物之廬賢人為萬物工匠帝王者象天常欲生后妃者象地常欲養大臣者象人常欲思成此三人并力凡物從生到終無有傷也欲象平之道為法者必當如此矣請問天道助弱耶助強耶助寡耶助衆耶神人言天道助弱何哉夫弱者道之用也寡者道之要也故北極一星而衆星屬以寡而禦衆也道要一而道屬焉是故國王極寡而天下助而治助寡之效也父母極強反助嬰兒是強助弱之效也上善之人寡而弱不善之人強而衆衆則寡矣強則弱矣故君子求弱不求強求寡不求衆故天道祐之故不與人爭也而人自為爭不與人爭強也而人助為強故不爭而善勝也分別天道精身與德不訣請問夫道審當樂欲行何為明效神人言吾受此文於天上諸神諸神言吾聞與陰陽風雨寒暑相應也以是為大效天樂其道行而人未明信之以乞雨止雨而明效之行太平之道乞請皆應不行太平之道乞請不應明天道至在大平也故萬物不生者失在太陽生而不養者失在太陰養而不成者失在中和故生者父也養者母也成者子也生者道也養者德也成者仁也一物不生一道閉不通一物不養一德不修治一德不成一仁不行欲自知有道德與仁否觀物可自知矣五者帝王君父師欲深自知道德仁優劣但觀此故理之第一善者莫若樂生其次善者樂養其次善者樂施故生者象天養者象地施者象仁此三者天地人之大綱也過此而下者但備窮乃後用之耳如此天氣自為平安邪氣自消滅善人自至惡人自去莫不響應也明之者師也謂先知之稱師當主證而明之自古至今凡文出皆天地也故天地先出之明之者師也故夫文出皆有師行之者縣官也古者帝王承天意受師教力行以除去災害以稱天心得延年益命此之謂也造之者天明之者師行之者帝王此三事者相須而成天不出文師無由得知師不明文帝王無從得知治故天將興帝王必有奇文出明師使教帝王縣官令得延年益壽是祐帝王之明證也凡人民萬物不生生而不養養而不長長而反不成不竟其天年其過安在凡民萬物不生者天也不養者地也長而不成者人也過在人乎萬物不得時生者君也生而不養者臣也長而不成者民也天與君父主生此太陽之長也生之祖也天不欲生物不得生父不欲施物亦不得生君不欲生物亦不得生故天與君父主生夫君父常念生不樂殺者凡物盡生一念殺者一物死十念殺者十物死百念殺者百物死自此至萬念皆若此矣地母臣承陽之施主長養萬物常念長養之不念一不長養則一物被傷十念則十物傷百念則百物傷自此至萬乃若此矣是故上古帝王之任臣常求慈仁好長養萬物與為治中古半慈仁物半傷下古不詳擇臣而任之故萬物悉傷矣其德皇王之言煌煌也帝者為天地之間作智使不陷於凶惡故稱帝也王者人民萬物歸王之不傷故稱王王者往也君者各安其部界人歸附之而無害故稱君君者號也吏者治也而助上治物使凡民萬物大小不失其治乃得稱吏師者悉解天下辭悉乃得稱大師者所謂能解天下天下文也故得稱皇帝王君師也故皇道為首帝道為腹王道為股吏為手足師道者繩墨為法為則上下相須而立故善治者常念皇道中念帝道下念君吏吏道常誦大師之法則守其繩墨然後天心可安地意可得四時自順五行不戰三光常明鬼神精氣不害五官五土各得其所盜賊不發帝王垂拱俱稱萬歲天道為法如此不如吾文誠難哉謹思其意行此二事亦有戒哉天地之性精氣鬼神行治人學人教人神者居人心陰精者居人腎陰鬼者居人肝陰於人念正善因教人為善常居人藏陰趨人為惡教人為惡亦趨人為惡古者賢人聖人腹中常陰念為善故得善應凡人腹中常陰念惡故得惡應不能自禁咎在常陰念善惡鬼神因而趨善惡安鬼於此可驗矣太平氣風雨時節萬物生多長又好下糞地地為之日壯且富多可能長生凶年雨澤不時地上生萬物踈少短而不長不能自糞則地之為日貧薄少無可能成生萬物天地之行尚須陰陽相得和合然後太平而致四時五行之吏也帝王月建前後也職當為帝王氣逐邪惡之吏也夫建氣王氣是乃天四時五行之帝氣也相氣除氣為前一是正其前毛頭直指之吏也所向者伏姦不得復行為害除前滿平定氣皆善良吏也前五執者居前預為帝王氣執除大邪建前五將悉受天正氣皆天之神吏當為天使無大小萬二千物之屬皆當被服其德而奉行其化當王氣為死當月建為破此尊嚴第一之氣故不可當也當者死名為殺氣大耗月建後為閉閉塞邪姦恐後休伏之氣來干帝王建氣也故天閉其後後而開卻休邪氣教去也其後為成姦便當收之也後五為危危者其處近天執大殺一轉破即擊故為危也此後五將天將欲休之與地同氣主閉藏姦邪鬼物同處不可使也問曰北方為皇之始東方為帝之始南方為王之始西方為霸之始今天有六甲十二子皇道當於何起然天有三統各有大無初一者天皇二者帝三者王四者霸天皇起於上甲子地皇起於乙丑人皇起於丙寅霸道起於丁卯是天曆氣數也地曆者皇道起於子帝道起於丑王道起於寅霸道起於卯此四者初受天地微氣造生不得有刑有刑者傷皇道道法不得有傷故子刑卯丑刑戌寅刑巳皆出刑氣不與同處問曰天封人以等地封人以等人封人以等豈可聞耶曰天封人以道地封人以養德人封人以祿食何也天者以道自殊且久故封之道使壽可得食風氣而飽地者主養善地地令人富故封人以德富君者封人以祿食賜之以衣服此三事皆善也好道不解故得封於天好德愛地知相地授而居之去凶得吉得封於地好學而有益於上政者君父乃不能遠也須以理事故得封於人也是古者聖賢力學不敢失此三事故有得道而去者有避世而之復地者或有得君之祿食者也問曰夫樂五音者得其音何如不得其音何如並可聞耶夫音非空也以致真事以虛致實以無形身召有形身之法也夫樂乃以音響召事比若人開口出聲有好有惡善者致吉惡者致凶此書俱出於人口乃致善惡之應樂聲正天地陰陽五行之語言也聽其音知天地情四時五行之氣和以不知盡矣故上士得其意以平理度也中士為之以助君理以致壽賢者為之以致無憂音者乃一以乘萬萬乘無極天下畢備矣問太平經何以百七十卷為意曰夫一者乃數之始起故天地未分之時積氣都為一分為二成夫婦天下施於地懷妊於玄冥字為甲子布根東北丑為寅始見於東日出卯畢生東南辰以巳垂枝於南養於午向老西南未以申也成於西方日入酉畢藏於西北戌與亥故數起於一而止十二干之本五行之根也故一以成十百而備也故天生物春響百日欲畢終故天斗建辰破於戌建者立也萬物畢生於辰破者敗也萬物畢死於戌故數者從天下地八方十而備陰陽建破以七往來還復其故隨天斗所指以明事故斗有七星以明陰陽之終始故作太平經一百七十卷象天地為數應陰陽為法順四時五行以為行不敢失銖分也失之則為脫天事無所據不應天地之心意不隨天數而為經無益於理世之用也不象天地之法不能去害也欲知其效收世之間文積之三十里乃至天行之不能消災害矣大天之下八十一域萬一千國中各自有文書悉欲除惡致善消災害今盡收録聚之方圓百里上可將至天終不能消去災害此文雖少帝王能行必俟明效矣上古第一神人第二真人第三仙人第四道人皆象天得真道意眩目內視以心內理陰明反洞於太陽內獨得道要猶火令明照內不照外也使長存而不亂今學度世者象古而來內視此之謂也久久傳相生復衰微反日猒其所為傳失道意不能內照日益不理故天出聖人象天文理故天文自覩也故天文正天亦正地文正地亦正人文正人亦正天地人俱正萬物悉正人者萬物之長也人失職被傷不以壽死萬物亦隨之天地亦爾邪氣大作病人不絶天年惟古今之行各有次第不相踰越上皇神人之尊者自名委氣之公一名大神常在天君左側主為理明堂文之書使可分別曲領大職當為君通神仙録未生之人各有姓名置年歲月及日時當上升之期使神往師化其身乃上之各有姓名置年歲月及日時至時當上升之期使神往師化其身乃上之隨其智能高下各各使不忘部署分別各令可知使自狀其能卻乃任之奏上出言曰大神為上主領群神各有所部宜服明之勿使有疑令壽命長藉宜當諦之聖明有心宜以白日所有生復而以簿書籌算相明可在計曹主領錢數珍寶之物諸當上計之者悉先時告白併計曹者正謂奏司農當大月三十日小月二十九日集上大神明堂勿失期如天君教皆不得失平旦三刻之間也明堂大神上承五刻集奏如天君舊令從事大神受君之勑部下司農司農受勑使下所部州郡國言所部領所主當上簿入司農委輸者各以所出送書到如懈惰不時送者司農輒上明堂大神上白天君出教下司農令郡國催促不失後書置時日漏刻相授各有分別勿有所亂皆令同文各有所副文天上自無水旱之災不得有增減之文轉輪當至勿稽留因緣恐獨受取覺知者有主天上知聞罪輒不赦各慎其職各明其事天君皆預知不言音宜詳所問不用此言水旱無常災害併生人民疾病死生無數不用天君教令致也天君教出告大神卿相中二千石文書群僚在職之神務盡其忠務盡其行上稱天君之心天君與諸師化之當得升度者就而正各使成神光景隨其尊卑所化之神皆隨有職位次第官屬天君勑大神常化成之人各自度量志意日高貪慕上升其化生光耀日中所見洞徹正神相隨浮遊八表觀天所施為知其動搖各從其宜朝天謁見自有常日當以月初建大神小神自相差次銓次尊卑朝大臣不過平旦朝會群神各明部署案行無期務明其文書督責有職之人先坐其事當如天君教令有所白輒開明堂乃得所言各有所明各有所帶不得無有功效天君勑大神群僚集會各正其儀勿使有過差以法令各察所部天上覺知其過不除各慎所職無為諸神所得短天君勑大神曰郡國之中有聖智志意常念貪生之術願與生神同行與天合思欲布恩於人思惟生成助天理生助地養形慕仁善化上其姓名於大神使曹有文辭數上功有信可任曹白其意天君當自有數衆神所舉各令保是郡國選擇務取尤善天君勑明堂諸當為天君理衆職務平其心各行天上所部使有分理皆盡忠誠通達所知務成其功務理其所各譽篤達宜進所思音聲所通其意雖有心言天君預聞其語當何隱蔽而不盡忘誠問曰今欲更明聖賢仁之法而悉絶邪文何更能明之哉天病此邪僞文使除之取明天之道夫古今聖人之文所以理天地夫聖人之文明則天道大理矣夫皇天所怒而不悅故有戰鬭水旱災害不絶王者愁苦皆曰聖人文稍稍亂而不明故天道雲亂而難理也聖人文亂天道亦亂聖人文廢而不用天道亦廢而不用問曰古者無文天道不亂時天券文未出上皇神人理上祖考本與皇天分體久久去天道遠喪亂不復知天意故天出券使聖人書師傳之聖人不竟久留也故記而置之以遺後生故太平氣至天道當理矣問曰今欲使理氣事而長生豈可得聞不然詳念吾之言皇天自有常法為人君上者當象天而行乃以道德仁為行三統君上樂欲無事者朝常念道晝常念德暮常念仁既無一事矣願聞朝何故念道晝何故念德暮何故念仁然天道可順不可逆也順天者昌逆天者亡今願聞其要意然天有四時三部朝主生晝主養暮主施故東南生西南養西北施故人象天為行以東南種而生之西南養而長之仲秋已往夏內居嫁娶而施傳類此皇天自然教令也故人民默自隨之理能常象此者即得天意矣不能象此名為逆天教令故多傷也傷少則春物傷傷丁壯則夏物傷傷老即秋物傷傷懷妊即冬物傷此自然之法也古者聖王常思念天道而行不敢失銖分矣問曰欲得與地長厚可得聞乎然常順天所為者長與天厚輕逆之者長與天為怨故古聖王之理者一曰常生二曰常養三曰常施為行如是謹以承仰天道不理之名四曰刑之而不理五曰殺是其極也以此分別第一之君純生第二之君純養第三之君純施第四之君純刑第五之君純殺生者延年國昌養者增算施者無過刑者有病殺者暴窮古者聖王覩天禁明不敢妄為也古者聖王得六甲王相微氣之日不怒不言惡事至此之日故言善事飲食作樂以止災去凶邪也故王氣常欲見尊敬故上古度世之人聖王之理順此故得臥理而思訖無一事春東首夏南首秋西首冬北首四季首其角君臣人民俱知其法天下邪氣悉消天上格法常以王日下取庫兵理之地下以休廢之日乃致之故盜賊不興兵革息矣問曰天獨怒而不應和人寧可知否然天理乃以氣為語言見於四時春角氣不知肝脈不動角蔟不和清音不應此即天不悅不語言也古者聖王見此即思惟得失之理以反之然王氣所居乃得仁助其理也此二氣共生成於此也乃反休廢凶氣至來助其理此乃三氣小人之氣反見於是無統天位故象小人天見照見其類令賢聖策之而思之當索幽隱道人德人仁人以反復其氣立相應矣故王者御天道以民臣為股肱為御不良則亂其道矣古者聖人將御天道索道德仁賢明共御之乃居安也故道人屬天德人屬地仁人屬中和故三統不和三賢理之故太平氣至萬物皆理矣問曰萬民何以盡為仁哉然天道乃生德德乃生仁今君乃以道人為師取法於道君乃法道其臣德矣民乃取法於臣臣德則民仁矣令下象上法上法天也轉而相生民安得不盡仁哉古者聖王以大道人為師者乃欲化下流也上君為政如天中君為政如地下君為政如人如天者不失天意父事大道也如地者不失地意母事地道也如人者不失人意思樂得中和之道聖人見萬物盡生知其理重道也見物盡養知其真德也見萬物盡成知其真仁也夫理真道者但有生心理真德者但有養心理仁者但有施心非此三統道德仁非謂太平之君矣天上之士乃生天上受委氣無形而生知天上之士何所不知何所不明何所不見自然元氣同職共行天上之士常在無極之殿與天同理文書上下不失其事乃知可生之物復下地形使得成就萬物皆被榮天上之士天之所尊敬諸神所仰如帝王太子敢有不敬者乎天君者則委氣故名天君尊無上所勑所教何有不從令者乎問曰夫太平之君道盛其德乃次天也得書獨行化流天下乃可無不平也夫大神不過天與地大明不過日與月尚皆兩半共成一夫天地各出半力并心同欲和合乃能發生萬物晝夜各半力乃成一日春夏秋冬各出半力而成一歲月始生於西長而東行至十五日名為陽過十五日消名為陰各出半力乃成一月也男女各出半力同志和合乃成一家天地之道乃一陰一陽各出半力合為一乃後共成一故君與臣合心并力各出半力區區思同乃成太平之理問曰時人文雖多乃自言物畢備者災害盜賊常有餘也而常得愁苦於此凶日以為憂吏民共救之不能救也絶者復起今吾可以長補其不足而使無復災也從古天券文出已來凡賢聖文書寧亦有同者皆異也故天命師使出除凶德覆民臣光被四表遠邇響應恩及草木是其用心意開也其書皆異也問曰古今要道皆言守一可長存而不老人知守一名為無極之道人有一身與精神常合并也形者乃主死精神者乃主生常合即吉去則凶無精神則死有精神則生常合即為一可以長存也常患精神離散不聚於身中反令使隨人念而遊行也故聖人教其守一言當守一身也念而不休精神自來莫不相應百病自除此即長生久視之符也陽者守一陰者守二故名殺也故晝為陽人魂常并居冥為陰魂神爭行為夢想失其形分為兩至於死亡精神悉失而形獨在守一者真真合為一也人生精神悉皆具足而守之不散乃至度世為良民父母見太平之君神靈所愛矣
