body:
  text: 太平經己部來善集三道文書訣一百二十七六方真人俱謹再拜前得天師教人集共上書嚴勑歸各分處結胸心思其意七日七夜六真人三集議俱有不解三集露議者三睹天流星變光一者見流星出天門入地戶再者見流星出太陽入太陰三者見列宿流入天獄中因三并而共策之恐天師三道行書為下所斷絶使不得上通復令天怒重忿忿上皇氣不得來也令帝王道德之君固固承負先王餘災不絶而得愁苦焉咄咄六真人為皇靈共來問事益精進天焉哉吾見諸弟子言無可復以加諸真人也今試自説其流星意六弟子愚蔽敢不言初始一流星出天門入地戶天門者陽也君也地戶者陰也民臣也今民臣其行不流而上附返上施恩於下夫門戶乃主通事今下戶不上行返上門通門而下知為下辭會見斷絶不得上行也善哉真人言吾無以加之也行雖苦復説二事唯唯二事見太陽星乃流入太陰中太陽君也太陰民臣也太陽明也太陰暗昧也今暗昧當上流入太明中此比若民臣暗昧無知困窮當上自附歸明王聖主求見理冤結今反太明下入暗昧中是象詔書施恩下行者見斷絶暗昧而不明下治內獨亂而暗蔽其上也又象比近下民所屬長吏共蔽匿天地災變使不得上通冥冥與民臣共欺其上共為姦之證也善哉善哉吾無以加六子言也行雖苦復説其三事唯唯三事見列宿星流入天獄中夫列宿者善正星也乃流入天之獄獄者天之治罪名處也恐列士善人欲為帝王盡力上書以通天地之談返為間野遠京師之長吏所共疾惡後返以他事害之故列宿乃流入獄中也善哉精哉吾無以加六子言今六子問事乃何一怒也獨不懈倦耶不敢也常見天師言真人為天來問事今欲止恐天辭不通今凡人命屬天地天地不喜返且害病人則不得竟吾天年壽矣善哉真人之言是也不失之也今吾為諸真人説亦不敢遺懈止也吾與諸真人等耳俱命屬天地若閉不説説而中止也天地同且害我故我説亦不敢妄道止也行且為六真人具説之今六真人新出穴為天思可以除天病者為有德君思可以除解災安身者六真人極共説其意盡心所欲言者令使不得閉絶唯唯天師所勑不敢不盡雀鼠之智悉言之不也大慊唯唯今天下所畏口閉為其不敢妄誕今日月星曆親天之列宿神也尚相畏是故日出星輒逃匿不敢見畏其威夫四境之內有嚴帝王天下驚駭雖去京師大遠者畏詔書不敢語也一州界有強長吏一州不敢語也一郡有強長吏一郡不敢語也一縣有剛強長吏一縣不敢語也一閭亭有剛強亭長尚乃一亭部為不敢語此亭長尚但吏之最小者也何況其臣者哉皆恐見害焉各取其解免而已雖有善心意不敢自達於上也使道斷絶於此今但一里有剛強之人常持一里之正者一里尚為其不敢語後恐恨之得害焉但一家有剛強武氣之人常持政尚一家為其不敢語也一家尚親自共血脈同種類而生尚乃相厭畏如此何況異世乎今太上中古以來多失道德反多以威武相治威相迫協有不聽者後會大得其害為傷甚深流子孫故人民雖見天災怪咎駭畏其比近所屬而不敢妄言為是獨積久更相承負到下古尤益劇小有欲上書言事自達於帝王者比近持其命者輒殺之不即時害傷後會更相屬託而傷害之故民臣悉結舌杜口為喑雖見愁冤睹惡不敢上通故今帝王聰明絶也而天變日多是明證效也今民親得生於父母受命於天地以天地為父母見其有災變善惡是天地之談語欲有此言也人尚皆駭畏且見害於比近所繫屬者不敢語言泄事乃相勑教共背天地與共斷絶不通皇天后土所欲言也共蔽冤天地乃使其辭語不通天地長懷恨悒而不達今帝王雖神聖一人之源乃處百重人之內萬里之外百重之內雖欲往通言迫脅於比近不得往達也夫帝王雖有萬萬人之仁聖人各迫劫畏事天地極最神聖人乃仰視俯睹尚倚之當前自解而已帝王安能神聖於天與地乎愚生六人常逢猛虎於遠方間野六人俱止足不敢移口不敢語頭不敢動目不敢瞑夫人之所迫脅所畏如此矣善哉善哉今見六真人言承知天獨久病苦冤辭語不得通雖為帝王作萬萬怪變以為談下會閉絶不得上達獨悒悒積久今故風諸真人教其丁寧勑此行書之事故諸真人悚悚倦倦是天使也諾諾吾其畏天威方為子思惟其要意而具説今之六真人問此事常何一最劇也愚生六人七日七夜共念此行書事三集議三睹流星以為天告人教勑使人問也又六人俱食氣俱咽不下通氣逆而更上當此之時耳目為之眩瞑無睹俱怪而相從議之不知其為何等大駭驚怖唯天師為愚生説之善哉諸真人古變得具意見諸真人言乃知三道書真人會且復見閉絶何乎願聞其意決然夫九竅乃象九州之分也今諸真人自言俱食氣乃㘉不通眩瞑無光明是九州大小相迫脅下不得上通其言急事也夫氣者所以通天地萬物之命也天地者乃以氣風化萬物之命也而氣㘉不通者是天道閉不得通達之明效也天欲使真人丁寧此事故以此氣動感真人也子知之耶唯唯行子已知之矣諾天告六真人教吾極言耶六子安坐為諸弟子悉説之道之為畏其州郡長吏不敢言者一州中諸善士賢明相索共集議於他州上之畏其郡集議於他郡上之畏其縣集議於他縣上之畏其鄉亭集議於他鄉亭上之畏其里集議於他里上之皆悉在方其禁畏人者以其所上罪變怪輕重罪之復加故罪一等何其重也不應重也尚恐其輕今天地愛有德帝王欲為其具談人生於天地乃背天地斷絶天談使天有病乃畜積不除悃悒不得通言報其子是一大逆重罪也夫民臣乃是帝王之使也手足也當主為君王達聰明使上得安而無憂共稱天心天喜説則使君延年今返居下不忠背反天地閉絶帝王聰明使其愁苦常自責治失正災變紛紛危而不安皆應不孝不忠不信大逆法不當得與於赦今何重之有乎天談不得通天地大怒賊殺凡物乃為毀天地乃為太凶之歲國斷無聰明乃為大危之國此罪不可復名故為當死過也真人知之耶唯唯行子已知之矣吾所以敢不者見六子來問事致承知為天使諸真人故敢不也子知之耶唯唯今不之名為誤上也德君見文皆令勑上書者使其大有功者德賜之也如此則天下莫不歡喜樂盡其力共上書言事也勿得獨有孤一人言也皆令集議一人言或妄偽佞欺名為使上失實不可聽大過也比連年上書比比有信有大功者上士之人衆集者常病不多兩三人集固固有有姦偽多者無姦偽何也願聞之然多者則其上書者便自傳相畏恐事漏泄見得長短反為欺上為傍人所上故盡實核乃敢言之也不不敢言又不敢有可隱皆畏恐有後事是故悉信也比若一里百戶共欺也男女小兒巨人會有泄之者旁里會有知之者其里賢明畏事者會不敢匿恐坐其事何況乃一州一郡一縣一鄉一亭郡有非常事陽陽何可隱猶為旁人所得長短故善惡都畢出天乃大喜災除去與流水無異也子知之耶唯唯又大集議無敢欺者一兩人欲欺餘人會不從之也有欲欺不信者即時衆共記之上之其法應為背天地欺帝王詐偽大逆不道之人也天怨之人惡之其罪不得與赦也真人知之耶唯唯行子已覺矣已行上書還反其家有怨其行上書欲害者即左方之名為怨章罪過不除如是則三道行書已通無敢閉絶者也如是則天地已悅矣帝王承負之災厄已大除去天下太平矣上皇氣悉來到助德君治矣不負六真人也唯唯行六真人精已大進為天除病矣為帝王除厄會矣功已著於天矣王者已日強明矣六真人為善已得其數矣宜勉力慎之慎之唯唯願問一大訣惟天師示之欲知行書乃出入究洽於神靈未豈可聞乎然自有大驗天道不欺人也各以其類相求索令德君數遣信吏問民間有疽癘疥者無有者多少有疽癘疥者行書未究洽於神靈自苦有餘蟲食人蟲乃食人即蟲治人也固固下有餘無道德臣民比若蟲矣反食於人是使蟲治人之效也無有疽癘疥者即皆應善人在位無復蟲也此者萬不失一善哉善哉獨以此明之耶復有餘耶凡天下災異皆隨治而起各有可為但精思其事且自知之也何獨以疽癘疥言之乎其餘災尚但見於萬物蟲反食人最劇故以效之也善哉善哉嚮不力問於天師無從得知之也觀諸真人今且説已自知之矣但引謙耳不敢不敢愚生六人重得天師嚴教各歸居便間處惟思其要意今天師書文悉使小大下及奴婢皆集議共上書道災異善惡曾不太繁耶哉異生願聞其意善哉子六人為天問事詳慎乎天使諸真人言也然所以使下及庶人奴婢者今天之法界萬里異天地五千里復小異千里異風氣五百里復小異百里異陰雨五十里復小異一縣異變災怪善惡也夫皇天有災怪變非必常當處帝王之宅縣官之庭長吏之前也災變異之見常於曠野民間庶賤反先知之也各為其部吏諱不敢言吏復各為其君諱而不敢言反共斷絶天地談人人欲譽其長吏使其名善而高功疾遷共作無道互天地之災異變怪令閉塞不得通達帝王之前使帝王無故斷絶無聰明不得天地心意其治危亂難安得愁苦焉夫帝王天所父命生以天為以地為母帝王為天子民臣共為無道乃斷人父母談語不得通於其子其罪莫大焉為共斷絶天地之談共欺其上為人民臣不忠信遇乃如斯罪當輕重寧可名字耶子覺未唯唯又凡民臣奴婢皆得生於天長於地得見養理於帝王以此三事為命無此三事則無緣得生長自養理也而反下皆共欺其上共無知天與地使帝王無聰明閉塞罪皆應萬死尚復有餘罪何其重也真人其愚暗不解何哉人得生於天長於地天地愁苦有病故作怪變以報其子欲樂見理愚民反共斷絶天辭天地大怒之帝王民臣之父母也民臣反共欺其父母使其常用心意愁困而不能平其治咎莫大焉天地開闢已來承負之厄會大積悉起於是故使民間上書也今陽明德君治天難愁苦之故使吾言也善哉善哉行今為真人道之今天下日蝕極天下之大怪也尚或有睹或有不睹天下之災異怪變萬類皆天地陰陽之變革談語也或國不睹而州睹或州不睹而郡睹或郡不睹而縣睹或縣不覩而鄉亭睹或鄉亭不睹而民間人睹或甲里不睹而乙里睹故古者賢聖之治下及庶賤者樂得異聞以稱天心地意以安其身也故其治獨常安平與天合同也今太平盛氣至有一事不得輒有不和即天正氣為不至比若愚民竭水而漁蛟龍為不見此之謂也今故悉使民間言事乃不失天心絲髮之間乃治可安也民間自力集上書部諸長吏亦且恐後民言事且力遣吏問民間所睹疾復上之則變災無有失也如是皇天后土為其大喜愛其帝王以何明之乎然有證乃日月為其大明列星守度不亂錯行是天喜之證也地喜則百川順流不妄動出萬物見養長好善也即是地之悅喜之證也真人知之耶唯唯天師幸哀愚生得其事者進問緣見待厚乃得悉問所疑今使民間記災變怪云何哉然善乎子問事也然當見之時支日晏蚤戶記之月盡者共集議之可上而上之未足上者復待後月災異如此縣邑長吏且取晏蚤之時於民間也則可謂為不失天之災絲髮之間也吏亦畏民民亦畏吏兩相畏恐所上皆得實不失銖分之間則令帝王安坐幽室無憂矣民臣百姓大小盡忠信得達其情實矣天下莫不歡喜如有止者即共記之皆應姦臣不忠孝之民無知天地共欺其上使上聰明斷絶是大過也故當共急記之真人知之耶唯唯行去有疑來問之今六真人俱歸慕思惟天師使長吏民間共記災異變怪皆當共記何等者哉善乎六子問事詳善不失天心不負德君是為有功於天地萬物莫不被蒙之也所以然者乃其為天問事悉究竟詳善故不失銖分天地陰陽三光五行四時神祇萬物所欲言悉得見故為大有功也子知之耶唯唯行今為六真人陳之詳自隨而記之唯唯然夫大災異變怪者是天地之大談也中災異變怪者是天地之中談也小災異變怪者是天地之小談也子欲樂知其大意要比若人大事大談中事中談小事小談此大小皆有可言也不空見也天地不妄欺人也見大善瑞應是其大悅喜也見中善瑞應是其中悅喜也見小善瑞應是其小悅喜也見大惡凶不祥是天地之大怒也見中惡凶不祥是天地之中怒也見小惡凶不祥是天地之小怒也平平無善變亦無惡變是其平平亦不喜亦不怒子知之耶唯唯災異變怪大小記之勿失銖分也何其悉詳乎真人何其愚也過大小盡當見知善惡大小亦悉當見知也善者當謝其功以善踰異之過者數讓之以稱天地之心意子欲知其效者天比若人君長也一小言不見從則小恨更中言中言不見從則更大恨更大言則為害矣故當大小記之不當使天地恨怒也善哉善哉願聞所記意記變怪災異疾病大小多少風雨非常人民萬物所病苦大小皆集議而記之所以使其共記之者吏自相知長短民民自相知長短迫近山阜而居者知山阜變近巿城郭而居者知巿城郭變近平土而居者知平土變近水下田而居者知水下田變高下外內悉得知之故無失也是立致太平之術也而帝王所宜用不失大心之法也真人知之耶唯唯行子已知之矣天地開闢以來所以多承負之災者由其記事不及民間大小共集記之故也有變怪反乃他所長吏來行之比近各為其部界長吏諱不言共匿之因使天地辭語斷絶不得上通達其帝王為害甚深令天悒悒災為之復增益咎在此也他所長吏來考事安知民間素所苦者乎或相與厚善反復相與共隱匿之或得素有所不比之家反復增加災妄增益其事故之也共匿之則使天地談斷絶加故共冤無罪之人復令下比貨財相隨此三事皆為大害冤結氣復更增其災害也故其治殊不可平也令夫太陽興平氣盛出德君當治天下太平莫不各得其所者是故六真人來為其具問事吾為其悉語也子知之耶唯唯是故天將興祐帝王皆令自有意從古到今將興祐之輒為奇文異策令可案以治故所為者悉大吉也將不祐利之悉斷之奇文異策使不得之也如得之又使其心愚不知策而用之也將興利之使其心曠然開通而好嬉用之也此者天之格法也不欺人也故凡人將興者多好善將衰者多好惡也將吉者易開導也將凶者好抵冒人也不可開導也真人知之耶唯唯是故天者常祐善人道者思歸有德故天者不肯祐惡人道者不肯附於愚蔽人也故常勑真人以付歸有德之君也所以悉記其災異變怪大小善惡外內遠近者欲令上有德之君與衆賢原其災異所起夫天下變怪災異皆象其事法其行緣類而生衆賢共集議思之曠然如其意以其事類考問之則得之矣則天地日為其大喜帝王日為其大安如此則德究洽於神祇莫不饗應欲知其大效天下所疾苦災異悉盡民臣悉善應詔書而行不失銖分下不欺其上之明效也有餘多害自若多欺者少害少欺者無一餘害無一欺者常安觀下所上以占民臣大小忠信與不以其事對之比若窺明鏡相對而面語神哉為道如斯此乃天祐上德之君子其治天下之明鏡也真人知之耶唯唯行去付上德之君急急一人獨上書名為投書治事付一信名為大欺與皇天為重怨天道為其常亂也二人共上書名為太陰合姦共欺二猾人固固相勑戒或共有可怨惡共上之共為虛偽也與地為咎地道為其大亂也三人共上書固固尚不實三人固固可相勑教共有所疾共上事以公報私固固為共欺其上也與中和為仇令和氣大亂也四人共上書中輒有畏事不真者為傍人所得長短為罪名固固耶將似類真也其不信者亂四時也五人共上書似真未信也其不信者輒亂五行也六人共上書將真未信也其不信者輒亂六合也七人共上書似信八人近真九人近實十人而小今天師何其疑之多也願聞其要意然所以疑之多者或五方好猾人俱自有私怨咎以公報私固固可共相與為大欺猾姦人亂天地道而誤上故未疾純敢信之也但為小是故使衆人老小賢不肖男女下及奴婢者大小集議不可得以偽其以公報私也中會有不安而言之者或有不肖或有輕口不能匿或有老人壽在旦暮不復忌諱或有婦女小兒行言不能隱匿共為姦也故其事會泄故無姦悉得真也得真則天地心調真人知之耶唯唯本帝王所以連連相承負之過責治常失天心流災不絶絶者復起皇天不安多害氣疾病不得久大樂須臾樂者復惡其大咎正在此猾姦人共背天地而欺帝王人乃以天地為命以帝王為父母愚人及背其命而共欺其父母故天地共憎之帝王惡之其法惡死有餘罪當流後生也是故災不絶害日多人壽日少萬物常亂也正咎在是也豈真人已大覺重知之耶唯唯子可謂已知之矣是故吾知皇天深疾惡是故吾使是文復重為其平遺失其一事一事可起失之于前得之于後此事尤重天大惡之也吾知其以示勑真人以付歸上道德之君得而行之與神無異也乃且太平上皇正氣立自來也吾之文不敢負天地不負上德君不負後生下古之人不負萬物行之立效善哉善哉願聞一人上書何故亂天二人何故亂地然此者各從其家并策相應者相感動此自然法子知之耶唯唯行子已知之矣天下之事各從其類也願問天師今應此文言為之寧能盡實核天下悉信耶然天下悉信矣願聞其意然且語真人大要説今是主者長吏亦畏民泄其事而生之六考問長得其信也民亦畏縣官得其短亦復信也縣官長吏居民亦畏行於他方上書者得其短亦信也行上書者亦畏縣長吏居民得其短也亦信也更相畏非敢有妄語者也亦非有可隱也是故使三處上書縣官與居民與行者悉旦三相應不失銖分也神哉為道如此願聞到也所集議人當於何期乎善哉子之言悉記於太平來善之宅下何必於此然其有奇方殊文可使投於太平來善宅中因集議善惡於其下而四方共上事也為一人議中悔而止或為旁人所止上書便在方道中止意以其所匿事罪之如此書者天下已得矣帝王已長遊矣善哉善哉今天師文積備多當盡何投之其文獨為上出者止於上悉為天下事出者悉出之子知之耶唯唯行去夫上德之君天自使有聖心且緣是自有善意自有善令儀此為天法不失絲髮也事亦不可勝記常苦文行去唯唯右天告六真人使重知三道行文書訣長存符圖第一百二十八天符還精以丹書書以入腹當見腹中之文大吉百邪去矣五官五王為道初為神祖審能閉之閉門戶外暗內明何不洞覩守之積久天醫自下百病悉除因得老壽愚者捐去賢者以為重寶此可謂長存之道獨貴自然形神相守此兩者同相抱其有奇思反為咎子失自然不可壽也嬰兒五精還自保也作來善宅法第一百二十九六方真人再拜願有所問一疑行言之今天師前所勑愚生拘校上古中古下古之要文及究竟賢明之善辭口中訣事也今四境之界外內或去帝王萬萬里或有善書其文少不足乃遠持往到京師或有奇文殊方妙術大儒穴處之士義不遠萬里往詣帝王衒賣道德或有黎庶幼弱老小田家嬰兒婦女胸心各有所懷善字訣事各有一兩十數少少又不足使人遠齎持往詣京師或有四境夷狄隱人胡貊之屬其善人深知祕道者雖知中國有大明道德之君不能遠故齎其奇文善策殊方往也今天師言乃都合古今河洛神書善文之屬及賢明口中訣事以為洞極之經乃後天地開闢以來災悉可除也帝王長遊樂垂拱無憂也言一事不足備輒有餘災故當都合之今不知當以何來致此奇方殊策善字乃悉得之善哉善哉諸真人思念劇也天神已下告諸真人矣上皇之氣來祐助道德之君矣行真人今乃為皇靈天具問事吾職當為天下具談何敢有懈焉諾諸真人安坐方為真人悉説之唯唯以此書付歸上皇道德之帝王見天文必思其要意勑州郡下及四境遠方縣邑鄉部宜各作一善好宅於都巿四達大道之上也高三丈其中廣縱亦三丈為四方作善踈使與人面等其踈間使可容手往來善庇其戶也勿令人得妄開入也懸書於其外而大明其文使其書其宅四面亦可也其文言帝王來索善人奇文殊異之方及善策辭口中訣事人胸心常所懷所能言各悉書記之投於此宅中自記姓字已且徵索之各以其道德能大小署其職也所言多少其能不可徵者且悉勑所屬縣邑長吏以職仕之也其老弱婦女有善言者且勑主者賜之其有大功而不可仕者且復之也四境之外其有所貢進善奇異策用之有大效者且重賞賜之也如此四境外內一旦而同計大興俱喜思為帝王盡力從上到下從內到外遠方無有餘遺策善字奇殊方也人皆一旦轉樂為善也隱士穴處人中出遊於都巿觀帝王太平來善之宅無有自藏匿者也風雨為其時節三光為其大明是天大喜之效也四夷八十一域中善人賢聖聞中國有大德之君治如此莫不樂來降服皆齎其珍奇物來前後成行吾之書萬不失一也豈不大樂哉大德之治如此諸真人寧解曉之耶唯唯然子已覺矣於其宅中文太多者主者更開其宅戶收其中書文持入與長吏衆賢共次其中善者以類相從除其惡者去其復重因事前後齎而上付帝王帝王復使衆賢共次去其中復重及惡不正者以類相從而置一間處復令須四方書來前後次之復以類相從復令須後書至也其四方來善宅已出中奇文殊方善策者復善閉之於其畜積多者復出次之復齎上之於四方辭旦日少畢竟也所上略同使衆賢明共集次之編以為洞極之經因以大覺賢者乃以下付歸民間百姓萬民一旦俱化為善不復知為惡之數也此所謂畢得天地人及四夷之心大樂日至并合為一家共成一治者也六真人豈知之耶唯唯行六真人已知之矣夷狄聞之日自卻去中國日以廣不戰鬭伐而日強也天地助其除惡是為天地開闢以來未常有也是故天下大喜也天地神靈共除帝王承負也災變已消去其治與神無異也天下人且大得道德奇方皆思善文正字不復為邪惡也所上且歲益善於其後三歲一小録五歲一大録次之此以下附歸於民間也使其各好為善不能自禁止也取其中大善之事有益於帝王正治者留之勿下之也真人知之耶唯唯然今真人天使諸弟子問是今既為天問事乃為德君作大樂之經努力勿懈也天且報子功子乃為皇天后土除病為帝王除災毒承負之厄會子明自當增算吾言不敢欺真人也慎之唯唯行去歸努力精行有疑者來唯唯真人前子前問事之時吾欲去久矣故中與子斷訣之文見子惓惓知為皇天祐陽精所以然者見真人精中國當大興平八十一域善人當降來歸中國故吾為子更止留悉究竟説之也所以然者見真人為天問事不止反恐得大過於子得謫於天地故不敢棄道而中去也真人知之耶唯唯行努力精卒之勿棄天道問一訣也唯唯願請訣事言之天師何睹正於都巿四達道上為太平作來善文奇策密方之室乎善哉真人之難問也得其大要意天積悒悒帝王使子難問耶其投辭何一工也然吾居天上觀之有可覩見不空妄作此皇平之宅於四達道上也天公問天下何故難平安哉五行神吏上對言今帝王乃居百重之內去其四境萬萬餘里大遠者多冤結善惡不得上通達也奇方殊文異策斷絶不得到其帝王前也民臣冤結不得自訟通也為此積久四方蔽塞賢儒因而伏藏久懷道德悒悒而到死亡帝王不得其奇策異辭以安天下大咎在四面八方遠界閉不通今故承天心意為太平道德之君作來善致上皇良平之氣宅於四達道上也欲樂四方悉知德君有此教令翕然俱喜各持其善物殊方來付歸之於上無遠近悉出也無復斷絶者也善哉善哉響不及天師力問不得知之也然真若真人言也夫人天性自知之其上也不能自知之力問亦其次也子知之邪唯唯願請問一事言之何故必使其廣縱三丈高三丈乎哉善乎子之言也一者數之始也天數亦終於十地數亦終於十人數亦終於十故使三丈也欲樂合天地人使其俱悅喜也故象天地人為之也今請問三數何故俱十乎哉然天有五行亦自有陰陽地有五行亦自有陰陽人有五行亦自有陰陽也故皆十善哉善哉今獨天地人如此邪哉然萬物悉如此邪哉然萬物悉象天地人也故天地人皆隨四時五行為盛衰也真人知之邪善乎善乎然子可謂已知之矣願請問一事言之今何故必為其四方作踈與面齊者然踈者欲使賢儒策之也踈者樂四方踈達不復閉絶也欲使賢者各踈記其辭投此太平來善之室中也與面齊者面者最人之善者也太陽之分象天道也樂人各順天心思為善與德君并力共平天下也故使與面齊面者有七正耳目口鼻可以通氣神祇往來樂大賢策之使四方八極遠境聰明悉來至也今帝王雖居百重之內與民相去萬萬里光明教令悉暢達也不失天地之心以安其身善哉善哉願請問當使何吏守此宅哉長吏直署唱名為太平之宅樂善之吏也善乎愚生知天已大喜矣地已大悅慎行也人已太平理矣萬物已得其所矣今真人何以知之乎愚生見天師為太平德君制作大樂之宅以通天地人之談語今使下民臣各得奏上其辭於其君令帝王得奇策異文殊方可以長自安全者又天地得通其談語百姓下賤得達其善辭以解天地悒悒以助其君為聰明天地與人為凡物之長也乃得悉通達故大樂也真人説是也善哉吾無以加之也子之言事大入真道矣願請問一疑言之今天乃悒悒欲言何故返使人談哉善乎子之難問得其意然夫天道乃轉而相因更相使也故兌為天地之口人亦然故以類相求故人為天地談也真人知之耶唯唯行子易開哉勉力勉力唯唯然辭小竟勿復問令道文難知反益憒憒也唯唯行戒真人一事為已校書文殊方也卷投一善方始善養性之術於書卷下使衆賢誦讀此當為洞極之經竟者因各集此方以自養誦此術以自全令各樂得久存上賢可以為國輔中賢可為國小吏下小人不能仕者可長養其親而久守其子孫善哉善哉天下大樂悅也為善無雙無復惡人也子已知之矣行去思之念之既為天問事勿懈唯唯右求善以致太平令天下一旦合心上皇大樂之宅文八卦還精念文第一百三十玄明內光大幽多氣與賢同位壬癸之居亥子共身周流相抱極陰生陽名為初九一合生物陰止陽起受施於亥懷妊於壬藩滋於子子子孫孫陽入陰中其生無已思外洞內壽命增倍不可卒致宜以長久少陽有氣與肝共位甲乙寅卯青色相類萬物之精前後雜出仁恩心著勇士將發念之覩此字光若日之始出百病除愈增年三倍太陽盛氣與心相類丙丁之家巳午養位覩之百邪除去身日以正宜意柔明大不可強求見字而壽光若日中之明中和之氣與脾相連四出季鄉乃返還戊己中居辰戌丑未為根舉順之而思其意還以治其病精若黃龍而見此字其病消亡增年五倍令人順孝臣愛其君子愛其父少陰之旬與師精并靈扇出氣位屬庚辛申酉義誅猾邪盜賊不起邪不得害人腎盛之氣增年百倍極陰生陽其國大昌常而思之不知死亡陰上陽起故玄武為初始龍德生北位在東方故隨其後朱雀治病黃氣正中君而行之壽命無窮升執其平百邪滅亡八卦在內神成列行白虎在後誅禍滅殃正道日到邪氣消亡思精而不止延年之紀身而服之何憂之有下承其上名為順道無有謫過萬病自愈念字覩形容愛若父子令人常喜洞照無已審而用者其效立可待長與書俱日與神遊道以自然為洞虛無一旦自來其道仁良子為之孝臣為其忠信知則令人愛其身不敢妄言守而不止命無窮焉書不空出與道連思深知其意神自來焉初端形念字反得道元精得神明因無自然天道萬端在人可為道成其事不為非患人不力為正氣何從得來行而不上日吉遠危大人為之其國太平小人為之去禍招福形思之幽處趣具成子而守道亂何從得生思念而不止自太平心中不亂無邪傾守之不止日自生道不妄出付有德歸其人右升平八卦六甲追道還精念文冤流災求奇方訣第一百三十一真人前子學是凡事積之當知天下大訣分理後乃言事無復有疑也今見凡人死當大冤之叩胸心而呼天自投劈而告地邪不當邪宜自精道之令使可萬世誦讀以為常法而不可復忘也今天師有嚴教愚生敢不強一言也平行勿疑也然人死者大劇事當大冤之叩胸心自投劈也力盡長悲哀而已此亦無傷生也當冤何等人哉皆當冤之何也夫人死者乃盡滅盡成灰土將不復見今人居天地之間從天地開闢以來人人各一生不得再生也自有名字為人人者乃中和凡物之長也而尊且貴與天地相似今一死乃終古窮天畢地不得復見自名為人也不復起行也故悲之大冤之也噫子説與俗人同又實非也愚生甚不覩其意人死當奈何哉願聞之唯天師然夫物生者皆有終盡人生亦有死天地之格法也天為其中時時且有自冤死者或自少年不壽者天地乃為萬物父母恐其中有自冤哭淚仰呼天俯叩地而自悲冤得年少故天為其生真道奇方可以自防而得小壽者物生皆自有老終而愚人不肯力學真道善方何以小增其年不死遲老者反各自輕忽不求奇方而共笑賤真道反曰共作邪偽以亂天道共欺其上爭置死地名為冢修之治之以待死預作死約及凶服求死得死有何可冤哉年竟算盡此比若日出自有入也真人何故反冤之乎真人投辭多與俗人同正似無一知人何也當冤其何等者願聞之當冤其年少未有所知而死者也未知學問求可自防禦者故當冤之也又復當冤其常謹良畏不壽年少常自若行求真道善德奇方為行常善不為陰賊或逢流災而中死或到老力盡而訖不得遭逢明師可得須臾竟其天年者是者大冤可悲傷也若無故冤悲不求奇方真道而死者反捶胸哭泣呼天叩地汝身自得之反過天地是為反民天甚怨惡之真人怨是不若早自悲傷學不得真道不知天地陰陽大分部訣也久苦無明師而長懷悒悒而天年將竟也是誠可悲傷子知之乎唯唯愚生甚恐駭命在天師吾同乞真道與子欲使子努力不懈天下何不有但求之不力至誠淚出感動天故天不與之耳若不道懈止亦將得之不久也子知之耶唯唯夫愚人不自重愛力求奇殊方可得須臾反預置死器死處求得死天之為法若慈父母賢明君不奪人可求也是自然常求之名為得其所求之名為得其所求亦可毋大冤之也是以古者聖人帝王時時有大自重愛而畏死者旦夕思行求異聞殊方敬事道人力盡財空而已至誠涕出感動皇天天乃為出瑞應道術之士悉往佑之故多得老壽或得度世其中時時有求而不得者但未至誠固固好俗事輕忽其身言可再得也今天地乃以人為子帝王乃最天之所貴子也不惜真道奇方焉子知之耶唯唯是故古者聖人深計遠慮知天下之財物會非久是其有也身在財物固固屬人身身亡財物他人有也故無可愛惜極以財物自輔求索真道異聞也故其身反得長存財則在常屬於人也是故當極力財空盡而已財者但過求須臾得之耳失財乃天下人之有也會不久吾有也此名為賢聖明智養身以道知用財法故多得老壽也子知之乎唯唯行為人師者多難訾真人悒悒為子更復分別悉道其意夫天道乃有格法不以故人也子欲樂知其審此若冬至之後天當大寒殺人乃以五月初始見陰氣於井中為其清日日益劇到冬至後乃大寒傷殺人不可無衣也賢者預防也則獨得大樂不傷於寒而無憂其懈惰不力不預備之則獨飢寒而窮矣此之謂也天無過也人自得之子寧重曉不哉唯唯行子已覺矣夫天之為法不以卒故人也愚人自故觸冒之耳願請問不及復當冤何等者哉復當冤大賢少而學善順良有真道德當為帝王輔助其理陰陽帝王得之抱腹因心垂拱而無憂或反蔽塞不通懷真道德到老死亡是可冤悲傷而帝王治不得大賢明反與愚者共治陰陽亂萬變起常旦夕自苦得大愁焉是復大冤可悲傷之甚是故古者聖人聰明大達衆賢悉出上集為輔故兩無冤者也天地亦為其理無病而不冤何況於人乎哉真人知之耶唯唯善哉天師之言也以何為善乎然此乃天得之以解病苦帝王得之以垂拱無憂賢者亦得盡其忠信之心上輔其君為治亦得盡其能力勉勉使共解天地大憂百姓萬物亦復得之而興也故言善哉也善乎真人之言吾無以加之也是故凡人可求作者皆不為冤結也自行得之也所求不得反為大冤今人求死得死求惡得惡求善得善天順其心是為大吉可求者得若人預爭置死地作死約得死是也日求凶得凶惡而死復是也名偽凡事所求者得天與地無可大負於此人也真人寧亦大覺未唯唯行子已覺矣行今欲為子悉説之益文今已為子舉其大綱自思其意以付上道德之君以示衆賢各加努力在所求求而不得未一至誠也夫天地比若影響不欺人乃愁愚人各自欺自輕自忽大咎在此夫群愚乃共亂天與地不獨自愁也其過乃如此也天乃得大愁於是也愚人自身求而得之窮則反啼呼天與地為是積久天地大疾之悒悒故遣吾下具語分解天下人意使衆賢明共策吾辭吾辭則天談地語也吾不空乙二與真人道事也乃天示教勑吾下言之也使一各自知過所由來勿復更相罪責也故吾悉言之吾不敢妄語吾所以究竟盡言者獨知天地心意故見遣下與真人共議天下分別其曲直使德君與賢者俱思惟之使可萬萬世傳後生者歌誦以為常法而不復忘也故吾每見真人問事常喜為天訣訣得一解其憂故睹天言者輒承天心地意分別道説之也不敢有懈也子有疑者為復來共議之既見信而見遣下語實畏天威無可惜也子重明知之邪唯唯行子已得天地之意應曉事生哉夫人積愚不知早學真道善德殊方以為小事不知其過積大乃亂天地而共愁其帝王身尚得天死不得竟其天年而亡也真人熟思吾書言天下過寧復有大於是死者邪善哉善哉愚生已大覺矣子知早覺可謂為曉事之生遠凶而近吉乎覺而不止也真道畢乎一旦得王侯不若得仙人乎今行逢千斤之金萬雙之璧不若得明師乎帝王有愚臣億萬不若得一大賢明乎父母生百子而不肖不若生一子而賢乎一里百戶不好學不若近一大德乎萬目慺慺不若一大綱乎天下擾擾無不有不若天獨神且聖乘氣而飛行乎凡物雖衆多不若一氣獨活人乎故今勑真人學者疾棄浮華能務核事求真道乎欲太吉者真若稱天乎天地無病而長悅喜真道奇殊方出祐人乎是以古者聖人常稱天不敢懈也故常獨吉也賢儒集策天道畢也各言一善而陰陽理神靈悅也災害悉伏不復發也所謂治得天心而祅臣絶也神哉為道自然術也善哉善哉愚生向不力問復無緣得知是也然子言是也學而不力問何從得日進乎行而不數移其足道何從得達乎學而不得明師知何從得發乎治國欲樂安之不得大賢事之何從得一旦而理乎善哉天師之言也然子已覩其微意矣故金城九重不如事一大賢也是故古者聖賢皆事明師以解憂患也故聖賢悉有師法也真人宜戒凡事自愛吉凶門戶可睹乎唯唯戒真人一言唯唯人所求而得者天以順其所求不負焉也勿復臨死而哭天泣地也是名為自求而得之反以罪天地是名為大逆之人也天不好也地不嬉也鬼神會不祐也所冤者獨當冤求而不得者耳夫萬物各得其所求何故自冤哉真人熟思吾言是實非也吾之文不誤也大萬不失一也今天乃惡之疾之故吾反覆道之雖上已言復戒真人於下也吾乃故使其復重樂下古之人深思之美之念之傳之寫之以相示勿匿之也天之戒書樂見發揚不欲見藏也唯唯行去右集難人死當見冤與不所求得與不合國安危學逢明師與不肖師拘校三古文法第一百三十二請問天師之書乃拘校天地開闢以來前後賢聖之文河雒圖書神文之屬下及凡民之辭語下及奴婢遠及夷狄皆受其奇辭殊策合以為一語以明天道曾不煩乎哉不也為其遠煩而不通故各就其為作求善太平之宅於其所屬邑鄉主備其遠不能自致故為其立宅道上使其投異辭善奇策殊方於其中也因取中事傅持往付於上有德之君令其群臣臣共定案之以類相求上第一善者去其邪辭以為洞極之經名為天洞極政事乃後天地之病且悉除去也帝王之治且一大安也承負萬萬世之災厄會且一都去也然後萬物群神且無一可言而不復上白人惡於上天也故勑使其拘校之者乃天使吾下言也雖煩安得不力為之乎天下文書及人各言一或言十數而天下之疑事悉自解亦無大煩也但各居其處而言之傅持付上耳是名為天下集久集言而共語以通達天地之意以通達天地之氣以除帝王災害以利凡民及萬物莫不各得處其所者乃後天地一且大悅喜病一除喜則祐帝王也今使無事而長遊也願問天地何故一時使天下人共集辭策及古今神聖之文以為洞極經乎善哉子之問然天地有劇病亂未嘗得善理也故教示人使集議而共集出正語奇策以除其病也故使其大共集言事也願請問天地亂而有劇病何不更生善聖人乎力復生後聖人乃無益何也噫真人愚哉吾聞前已有言矣下賤暗之生積愚固固不能察察知之真人尚乃言如此俗人何以可曉乎必且互置吾文而更大忿天災害反且更大起而不可救故天使子反覆問是也欲使吾更具言耶諾諾吾親見遣為是事下吾不敢有所匿而忿天也行真人明聽為子條訣解之更以上下悉説道之但安坐唯唯行古今聖人有優劣各長於一事俱為天談地語而所作殊異是故衆聖前後出者所為各異也俱樂得天心地意去惡而致善而辭不盡同一合一不大類相似故衆聖不能悉知天地意故天地常有劇病而不悉除復欲生聖人會復如斯天久悒悒於是故遣吾下具為其語以告真人所以告真人者天上諸神言天下有樂善欲稱天心者獨有真人耳故吾以辭情告於真人也吾不同空語耳真人自知之耶唯唯行子已自知矣行所以拘校上古神文中古神文下古神文者或上古神文未及言之中古神文言之中古神文未及言之下古神文言之也因以類相從相補共成一善辭故使集之也乃後神書天地意可睹矣真人知之耶唯唯行子已解矣行上古聖人失之中古聖人得之中古聖人失之下古聖人得之下古聖人失之上古聖人得之以類相從因以相補共成一善聖辭矣真人知之耶唯唯行子可謂大解已行大聖或有短失之中聖得之中聖失之小聖得之因復以類相從因而相補共成一善聖辭矣真人知之耶唯唯行子已解矣行大賢以短失之中賢得之中賢失之小賢得之以類相從因以相補共成一善賢辭矣真人知耶唯唯行子已大解矣行帝王失之臣子得之臣子失之庶民得之以類相從因以相補共成一善辭矣真人知之耶唯唯行子已大解矣行上老失之丁壯得之丁壯失之少者得之以類相從因以相補共成一善辭矣真人知之耶唯唯行子已解矣行男子失之女子得之女子失之奴婢夷狄得之以類相從因以相補共成一善辭矣真人知之耶唯唯行子已知之矣行或上古文失之中古文得之或中古文失之下古文得之以類相從因以相補共成一善辭矣真人知之耶唯唯行子以大解矣行或上古人失之中古人得之中古人失之下古人得之以類相從因以相補共成一善辭矣真人知之乎唯唯行子已解矣行或上失之而下得之或下失之而上得之或上下失之而中得之或中失之而上下得之或天神文失之反聖文得之或聖文失之反賢者文得之或賢者文失之而百姓文得之或百姓文失之而夷狄得之或內失之反外得之或外失之反內得之會有失之者會有得之也故上下外內尊卑遠近俱收其文與要語而集其長短以類相從因以相補則俱矣然後文書及辭言一都通具也真人知之耶唯唯行之子已知之矣天地出生凡事人民聖賢跂行萬物之屬各有短長各有所不及各有所失故所為所作各異不同其大率要俱欲樂得天地之心而自安也當時各自言所為是也孔孔以為真真也而俱反失天地之心故常有餘災毒或大或小相流而不絶是其明效也故生承負之責後生者病之日劇真人知之耶唯唯行子已解矣故今天遣吾下為上德道君更考文教吾都合之從神文聖賢辭下及庶人奴婢夷狄以類相從合其辭語善者以為洞極之經名為皇天洞極政事之文也乃後天地病一悉除去也真人知之耶唯唯可㤥哉可㤥哉行真人已應曉事生已知之矣天已使子壽矣及上真人矣不敢不敢子自行得之非吾力也子為善天下無雙故天愛之也不敢不敢今愚生但無忿天而已無敢可望也不嗛也唯唯請問合是衆類以相從願聞其訣意然善哉子難問天使之乎哉諾安坐為子分別道之也唯唯行假令正共説一甲字也是一事也正投衆賢明前是宜天下文書衆人之辭各有言説此一且無訾之文無訾之言取中善者合衆人心第一解者集之以相徵明而起合於人心者即合於天地心矣以何明之願聞其訣然凡人之行也考之於心及衆賢聖心而合而俱言善是也其應即合於天心矣考之於心自疑者考之於衆賢聖心下及小人心而言非者即凶天竟應之以凶也是即其明徵也故集此説以為經都合人心者是不合人心者非也子知之耶唯唯行凡書文凡事各自有本按本共以衆文人辭葉共因而説之如此矣俱合人心意者即合神祇不合人心意者不合神祇善哉善哉聞命矣今真人何故言聞命乎然行善正則得天心而生行惡失天心則凶死此死生即命所屬也故言聞命也善哉真人言是也吾無以加之也是故天正其言與文則吉不正其言與文則凶是以吾教真人拘校之也唯唯然後太平上皇之氣立出延年立來天文聖人之辭尚乃有短長故上皇之氣見圄於邪辭誤言未嘗得來也故天地後開闢以來未嘗有上皇之氣來助帝王治也今天欲都開出之故拘校文書也有餘一邪言輒餘一病餘一邪説誤文輒有餘一病餘十十病餘百百病餘千千病餘萬萬病隨此餘邪言邪文誤辭為病天地病之故使人亦病之人無病即天無病也人半病之即天半病之人悉大小有病即天悉病之矣故使人病者乃樂覺之也而不覺故死無數也願聞以何以天病邪言邪辭邪文而有病乎噫子反更冥冥暗愚何哉行安坐為真人説之夫邪言邪文以説經道也則亂道經書道經亂則天文地理亂矣天文地理亂則天地病矣故使三光風雨四時五行戰鬭無常歲為其凶年帝王為其愁苦縣官亂治民愁恚飢寒此非邪文邪言所病邪如大用之乃到于大亂不治也子知耶唯唯夫邪文邪言誤辭以治國也日日得亂於是邪言邪辭誤文為耳所共欺則國為之亂危臣為之枉法而妄為民為之困窮共汙天地之治亂天官大怒日教不絶也人哭泣呼冤亦不絶也子知之耶唯唯邪言邪文誤辭以治家也則父子夫婦亂更相憎惡而常鬭辨不絶遂為凶家子知之耶唯唯可㤥哉見天師言誠怖惶愚生不深計不知是惡致此也真人獨愚日久矣夫俗人以為小事而不去之乃不知此邪言邪辭邪文乃與天地為大怨也是乃國家之大賊也百姓之烈鬼也寧可不一都投而力去之耶是故天愛上德之君恐其不覺悟復彼是大災故遣吾下具言之真人疾以文付之使其疾思天意可以自安不者天怒會不絶也故天不復使聖人語會不能悉都除其病故使天下人共一言俱一集古文考之也今天忿忿積恚於是邪言邪文單言孤佞辭也今考是真人欲知之比若帝王愁恚夷狄數來害人也故發兵士萬萬往擊之病不怒也怒者功賜多不怒者帝王復考之今考邪文如此矣真人知之耶唯唯可畏乎天下已正矣真人可謂已知之矣今急是孤辭一人邪言邪文邪辭天地今以是為大怨是帝王大賊也本治不安悉亂於是也故今斷之皆使集言集説集上書定安事乃天氣旦一悉得其所邪言邪辭乃旦一悉絶也滅亡也天從今以往旦使人亦考之神亦且行考之但有日急非有懈時也真人知之耶唯唯愚生甚㤥子知㤥可無并見考唯唯愚生事事不及有重謫過於天地為天師憂念謹已見此邪文邪辭一人之言戒今願更見勑戒丁寧是正文之所到至戒善哉書文已比言矣子自若問之何也暗昧之人固固心結聰明猶不達不重反覆見曉勑者猶曚曚冥冥復亂天師道故敢不反復問之也善哉子言也諾安坐為諸群真人具説之夫正言正文正辭乃是正天地之根而安國家之寶器父母也而天下凡人萬物所受命也故當力正之也唯唯願聞正言正文正辭為天地根國家寶器凡民萬物所受命決意噫真人已比比受此語吾文書中悉病疾浮華邪言子乃復重問之何也愚生而隨俗為愚積久不知邪止所在故不重見丁寧解之殊不解也然子欲知其審實也俗人俱言善善而共力行之而災殊不除去者即不善之文不善之言之亂也俗人言此可耳不能善也而按行之反與天相應災日除去者即正文正言正辭也內獨與天相應得天地心意之明徵也是故正言正文乃見是正天地之心也故言悉正文悉正辭悉正而帝王按而行之下及小民莫不俱好行正天地乃為大正四時五行萬物一旦皆各得其正日月三光守度各得正也國家大安無憂乃到于神負不老之方賜之奇物善應悉出姦猾妖惡悉滅絶凡民各得保其家而竟其天年萬物悉得長老終各以時也是即正言正文正辭之為天地根而國家寶器父母民萬物之命大明效也真人知之耶唯唯可㤥哉可㤥哉天地之根國家寶器命反在此行子可謂曉事之生知之矣是故天遣吾下悉考正之也天地開闢以來行正言正文者天地常為其大喜説故常善行邪言邪文者天地常為其大怒不悅喜故常凶不安而多危亡也俗人不知是為天地大病而亂帝王治也而下愚之士反共巧工下作篇記習邪言邪文以相高下以欺其上而汙天正法亂天正儀是乃天之大怨地之大咎也而國家之大賊也今乃得天怨地咎國家賊而日共行之其治安得平哉今天師責此邪言邪文罪之何一重也噫真人其愚耶今人而共以邪言邪文共亂天地天地乃為其常有病是非天之怨咎耶比若人常行病人害人人亦怨咎之不耶唯唯是故為天怨地咎明白矣今邪言邪文邪辭乃已共欺其上危國家其治常失天心其年命不增為之絶者前後非一人坐之是非國家之大賤耶諸真人知之不唯唯下古人多愚或有見天文反言不若此言是純復國賊之長也天地之大怨咎也民之大害萬物之烈鬼物也德君慎毋用其言也用其言者天怨不正當為身深計遠慮思其患害以長自安天乃與德君獨厚故為其製作可以自安而保國者也真人知之耶唯唯行子已大覺矣自慎自慎天威不可犯也唯唯戒真人一言自是之後德君詳察思天教天文為得下吏民三道所共集上書文到八月拘校之分處為三部始校書者於君之東已一通傳校於君之南已再通傳校於君之西已三通傳校者棄去於君之北校者各異處不得相時也何乎願聞之然相睹復有姦有可弊不實復為欺如是復忿天地為怨咎為國之大賊天地惡人使帝王治亂故異其處使三校之當共實核之也以解天心以安王者治也何必始校於君之東東者天氣有心而仁也校源事者當用心詳務力仁以稱天地而念欲安帝王也故於東也仁者以行當明察之故傳於君之陽也已明察當以義斷除之有功者因記有功無功者使記無功以為行狀已者藏於君之北幽室而置之以是知天下人行知善惡勿去也故德君桉行是名為大神人悉坐知天下之心凡變異之動靜也真人知耶可㤥哉可㤥哉子知㤥畏天談子長活矣唯唯是故自是之後長吏不復言行狀行狀見於是因以此為行狀故德君乃安枕而臥無憂也豫知之耶唯唯天戒校書脫一事者笞三十十事者笞三百百事者笞三千德君使退之勿復仕也此人乃輕忽事是天怨地咎國之大賊夫怨咎與賊不可與久共事必且忿天地故當疾去之善哉善哉戒真人一大要吾書文道所以從上到下無窮也悉愛正言正辭正文者吾乃深受天勑而下也誠知天愛是正言正文正辭所以大疾是邪言邪辭邪文者正知天地大怨咎之以是勑吾使吾下校去是怨咎與賊以安有道德之國以長解天地開闢已來承負之謫使害一悉去得休使正氣悉得前治也然後六方極八遠皇天平氣悉一旦自來子知之耶唯唯是故吾文者純天語不失銖分也天疾是邪文故吾疾之也天愛是正文故吾愛之也故吾之為道悉守本而戒中而棄末天守本故吾守本也天戒中故吾戒中也天棄末故吾棄末也吾之為文也乃與天地同身同心同意同分同理同好同惡同道同路故令德君桉用之無一誤也萬萬歲不可去但有日章明無有冥冥時也但有日理無有亂時也但有日善無有惡時也但有日吉無有凶時也故號為天之洞極正道乃與天地心相抱故得其上訣者可老壽得其中訣者為國輔得其下訣者可以常自安行吾語辭小竟疑者乃復來問之唯唯請問無故脫誤事一正笞三十乎善哉子問也天使子言耶然夫數者起於一十而終是誤脫一事即其問一之本也脫誤不實復為欺則復為天怨地咎國家之大賊也笞十者以謝於地笞十者以謝於帝王天地人各十合這為三十也笞此以謝過以解天怨地咎帝王之賊也乃天地喜悅神祇戰怒也本天地所以常亂而戰怒者本由考實文書人言不詳多誤故生此流災承負之厄也今復不詳旦復如此故當笞之也不以故人也乃以正事也今已集議實核乃右上之尚復集實核乃右下之則名為上下已俱實矣如獨下上不實固固無益也如獨上下不實亦無益也上下俱為實乃天氣平也下實上不實為上冤下下復自冤力為善無益天怒復發矣如上實下不實為下冤上地怒復發矣上下盡已實帝王不以意平理之則四時五行六親之神吏六宗之氣中和戰怒凶氣復發矣雖力使三道行文書正天下之言及文而自不力平之無益也故吾乃承天心為上皇德君作化不敢失天心也故悉拘天法以天地象為經隨陽為正順四時五行為令萬世不易也子知之耶唯唯愚生謹以覺矣甚畏天法子知畏之已長吉矣戒真人一大要言也夫拘校文書法毋但言其神文如其書文言如此以為真也是名為聾文也言事獨無本柄耶何以言如此哉不禁其有也但問其言之意當得其意乃事可明也如不説其意以何能得知之乎哉故當問其解決意不者不可用也名為聾治子欲樂知其意比若人語必有本當有可由而起不可但言東公言以立事也夫人證立事者悉有本安得但空設偽空言乎故赤凡事者皆當以其實有據乃可立事也子欲得知其大效明徵比若吾為德君化法皆以試立應為效言也行之而不應即偽言也行之而不應即為天也夫實説文與言矣比若此矣安得空立徵而言其文言而無説乎愚人或反有拘何各神文言如是也但可以解難拒窮之辭耳夫神文何雄或獨有意但傳言其文不居一卷也獨自傳遙相説人不深得其訣意反但以拒難救窮言東久言以是自明實非也皆為失説意令至道德辭不得通達者悉坐是子知之乎唯唯愚生謹已覺矣然子如此而不覺則遂迷矣是故桉吾書考文及人辭者皆竟問其意何以得其説者以類聚之乃後天下之文及辭言且一窮竟天道法可睹矣善惡之辭得通矣善哉善哉行吾之道見於此真人自上下思之思之悉更相徵明則無不解矣天下之事無不畢矣大道得矣天地悅矣德君長安矣天下俱同口皆曰善哉無復言天治乃復得天地心意故曰安舉事得凡人之心故天下無復言真人知之耶唯唯行辭小異有疑復來問唯唯右天怨地咎國之害徵立洞極經文三光蝕訣第一百三十三請問天之三光何故時蝕邪善哉子之所問是天地之大怒天地戰鬭不和其驗見效於日月星辰然亦可蝕亦可不蝕咎在陰陽氣戰鬭何故戰鬭乎陰陽相姦遞諍勝負夫陰與陽本當更相利祐共為和氣而反戰鬭悉過在此不和調如使和調不蝕亦當不蝕邪然大洞上古最善之時常不蝕後生彌彌共失天地意遂使陰陽稍稍不相愛故至於戰鬭子以吾言不然也子使德君案行吾文盡得其意戰鬭且止小得其意小止半得其意半止如不力行固困耳請問夫日月蝕以何時運相逢邪噫子其愚哉真人正復更發天怒今真人以何知為時運邪愚生見其同處也冥冥哉子之心也其暗冥何劇也審若子言運相逢也何故於一年之間日月蝕無解矣或連歲不蝕運何以然帝王多行道德日月為之不蝕星辰不亂其運何以然哉又天性陰陽同處本當相愛何反相害耶又陰陽本當轉相生轉相成功何反相賊害哉是子之愚也子欲知其實比若人矣人常相厚久不相覩一相得逢遇大喜則更相祐利相譽相明及其素相與不比也卒相逢便戰鬭大不比鬭死而已小不比小鬭可駭哉可駭哉愚生已解矣請問今日乃太陽火之精神也月乃太陰水之精神也今水火不同處自相遭逢則相滅何謂也不比邪善哉子言得其意然水火各以其道守其行皆相得乃立功成事比若五行不可無一也皆轉相生成子欲知其實也比若五藏居人腹中同一處心乃火也腎乃水也豈可為同處而日相與戰鬭相蝕邪子寧解知不乎唯唯愚生已覺矣是故和平氣至三光不復戰鬭蝕也三光不相蝕乃後始可言得天地之心矣以是為證故欲自知優劣行道德未俱觀此天證而聚衆文言同處相蝕是者但記同愛之文未深得之意也正使有神文言天乃未深見其情實也子知之耶唯唯行子已覺矣吾文出之後帝王德君思此天意勿忘此言此言所以致得天心之文也如得天意命乃長全也不得天意亂命門也行而不稱天心亦大患也初上古以來衆聖帝王以此為戒深記吾言結於胸心乃微言可見道可得也以付上德之君以救三光之鬭蝕也唯唯行去辭小竟疑復來問之唯唯萬二千國始火始氣訣第一百三十四請問天下共日月共斗極一大部乃萬二千國中部八十一域分為小部各一國德優者張地萬二千里其次張地廣從萬里其次九千里其次八千里其次七千里其次六千里其次五千里其次四千里其次三千里其次二千里其次千里其次五百里其次百里此乃平平之土德優劣之所張保也德劣者乃或無一平之土悉有病變令一國日月戰蝕萬二千國中寧盡蝕不斗極不明萬二千國寧盡不明不乎善哉深邪遠邪眇邪子所問也何故正問此變今怪一國有變萬二千國何譽當復有變者邪怪之不及天師問恐終古無以知之故問之也善哉子之所疑可謂入道矣一國有變獨一國日不明名為蝕比近之國亦遙覩之其四遠之國固不蝕也斗極凡星不明獨失其天意者不明其四遠固不蝕今請問於何障隱而獨不明邪噫子固童蒙未開也類俗人哉今是天與地相去積遠是其失道無德之國下邪氣共上蔽隱天三光各以其類上行使其不明比若霧中之處其三光獨不明無霧之處固大明也子欲重知之陰處獨不見月蝕陽處獨見日蝕子欲重知其審實比若今年太歲在子有德之國獨樂歲無德之國獨凶年今是俱共一國一歲共一年而其吉凶異比若人俱共一天一地其安危處異俗不同子知之邪唯唯善哉善哉今是日月運照萬二千國俱共之而其明與不明者處異也有道德之國其治清白靜而無邪故其三光獨大明也乃下邪陰氣不得上蔽之也不明者咎在下共欺上邪氣俱上蔽其上也無道之國其治汙濁多姦邪自蔽隱故其三光不明矣子欲重知其審比若翕目視日與張目視日比若善張目視日與蒙薄帛視日正此也寧解不邪唯唯可駭哉可駭哉子知駭是則得長生矣唯唯其且凶衰之國三光盡不明比若盲人而獨不覩三光明三光自若以其人盲獨不見之矣比若年盛者獨覩三光明年老者獨不覩三光明是其盛衰之效也悉寧解邪唯唯行去矣請問一絶訣説何等也今不審知一者何等也噫真人守文極多何故為疑此邪今眩冥也子知守一萬事畢子何問眇哉宜思其言唯唯一者心也意也志也念此一身中之神也凡天下之事盡是所成也自古到今賢聖之化盡以是成器名以其早知學其心意志念善也守善業也愚者盡凶是也以其守學之以惡業也天地之性蚑行萬物悉然故在師學之壽可得也在學何道天地可按也聚衆人億萬不若事一賢也衆愚億萬但可疾凶敗耳審能守一賢身何害有身者不能還自鏡照見念反還鏡身志念遠即身疾衰枯落務志念近則身有澤凡志念所成衆多不豫記之天下之事悉是也子知之邪唯唯請問旱凍盡死民困飢寒而烈而死何殺也此者皇天太陽之殺也六陽俱恨因能為害也何謂邪願聞之然六方洞極其中大剛俱恨人久為亂惡之故殺也其害於人何哉無有名字也但逢其承負之極天怒發不道人善與惡也遭逢者即大凶矣子欲知其實比若人矣人大忿忿怒乃忿甲善人不避之反賊害乙丙丁今乙丙丁何過邪而逢人怒發天之怒發亦如此矣故承負之責最劇故使人死善惡不復分別也大咎在此故吾書應天教今欲一斷絶承負責也天其為過深重多害無罪人天甚憂之故教吾勑真人以書付上德之君令惡邪佞偽人斷絶而天道理子知之邪唯唯願請問天地開闢以來人或烈病而死盡或水而死盡或兵而死盡願聞其意何所犯坐哉將悉天地之際會邪承負之厄耶然古今之文多説為天地陰陽之會非也是皆承負厄也天氣中和氣怒神靈戰鬭烈病而死者天伐除之水而死者地伐除之兵而死者人伐除也願聞烈病而死者何故為天殺天者為神主神靈之長也故使精神鬼殺人地者陰之卑水者陰之劇者也屬地陰者主懷妊凡物懷妊而傷者必為血血者水之類也懷妊而傷者必怒不悅更以其血行汙傷人水者乃地之血脈也地之陰也陰者卑怒必以其身行戰鬭殺人比若臣往捕賊必以其身行捕取之也不得若君但居其處而言也中和者人主之四時五行共治焉人當調和而行之人失道不能順忿之故四時逆氣五行戰鬭故使人自相攻擊也此者皆天地中和忿忿不悅積久有病悒悒故致此善哉嚮不力問無從知之也願聞此悉承負之厄乃忿三氣其不承負之時人死云何哉然人生有終上下中各竟其天年或有得真道因能得度世去者是人乃無承負之過自然之術也子知之耶唯唯行子曉哉乃一旦而相隨死者皆非命也是乃天地中和四時五行戰怒伏殺效也善哉善哉嚮不及天師問無緣知是也故天地開闢以來常有此厄也人皆不得知之今甚病之憂之人多無罪而死上感天天故遣吾下為其具言已行吾天文之後人民萬物且各以其壽命死無復并死之會也善哉善哉後生各得其命矣真人知之邪唯唯請問即非天道時運周而死何故常以天地際會而亂哉五行際會而戰邪五帝之神歷竟而窮困邪噫善哉真人之難也今天且使子問邪其投辭乃入天心讖其何一要訣哉吾甚嬉之今是真若子言今為子具條解之今諸真人遠來為天地具問事乃為天地開闢以來帝王問疑宜安坐聽吾辭唯唯然夫天之為法人民萬物之為數也比若四時之氣但當更相生成相傳而去比若人生少者後當老長更迭相傳而去不當乃道鬭戰因絶滅世類也所以道戰水旱癘病死盡者人主由先王先人獨積稍失道心意積久至是際會即自不而自度因而滅盡矣既滅盡無餘種類夫天地人三統相須而立相形而成比若人有頭足腹身一統凶滅三統反俱毀敗若人無頭足腹有一亡者便三凶矣故人大道大毀敗天地三統滅亡更冥冥憒憒萬物因而亡矣夫物盡又不能卒生也由是失幾何滅絶幾何更起或即復或大久大敗久乃能復也故小毀則疾復也子欲重知其審實令後世德君察察知天地冤不之大效比若家人治生有畜積多者雖邂逅逢承負凶年不收也固固而自存大多畜積之家雖連年遭惡歲猶常活小有畜積之家遭連年不收餓而死盡常貧之家遭一年凶便盡死不而自度出也困而無世天道有格法運非際會也比若夏秋當力收冬春當坐食成事夏秋不善力收冬春當餓死滅盡古者聖人天書因此共記為際會也真人欲知之如此矣今太平氣至當常平不當復道際會死亡者也夫天命帝王治故覺德君凡民為其道事要使一覩覺知如此矣嚮使先生凡民人常守要道與要德雖遭際會不死亡也夫天命帝王治國之法以有道德為大富無道德為大貧困名為無道無德者恐不能安天地而失之也先生稍稍共廢絶道德積久復久乃至於更相承負後生者被其冤毒災劇悉應無道而治至於運會滅絶不能自出大咎在此子知之邪唯唯可駭哉可駭哉行復更曉真人一語夫道德與人正天之心也比若人有心矣人心善守道則常與吉人心惡不守道則常衰凶矣心神去則死亡矣是故要道與德絶人死亡天地亦亂毀矣故道使天地人本同憂同事故能迭相生成也如不得同憂同事不肯迭相生成也相憂相利也故道德連之使同命是故天地覩人有道德為善則大喜見人為惡則大怒忿忿真人豈解邪唯唯可駭哉愚生甚畏之子知畏之則可長生無凶矣不知畏之則天已易去子矣宜重慎之唯唯行復重曉真人一解今是吉凶之行比若道德禮義與刑罰矣人而守其道德禮義則刑罰不起矣失其道德禮義則刑罰興起矣故守善道者凶路自絶不教其去而自去守凶道者言路自絶此猶若日出而星逃星出而日入不失銖分善哉善哉今曉真人一大訣言也今世人積愚暗甚劇傳相告語言時運周有吉凶如此言為善復何益邪為惡何傷乎哉乃時運自然力行善復何功邪而吉者聖人常承天心教人為善正是也言時運而反共亂天道者是辭也使天地常不悅喜實人行致之反言天時運自惡不肯自言惡反意天地為惡比若人家不孝惡子不肯自言惡反言父母惡此之謂也故天常苦忿忿悒悒因是運會者殺之鬭之樂易其世類也嚮不但當相隨老者去少者長各以其年命窮變化比若天地開闢以來人形變化不同是也善哉愚生以一大解於是古今人形雖異而氣同子欲重知其審比若四時氣五行位雖不同受內同氣轉相生成猶若人頭足不相似內反合成一人也善哉善哉今復重曉真人一言天積疾人為惡反常言時運凶上皇氣至當助德君治恐時人行不改易為惡行以亂正氣毀天寶故遣吾下為德君出文以曉衆人使共常按吾文為行不復共愁天地而不犯天禁自是之後行吾天文使神助德君治犯者誅之人不誅之神且誅之子知邪唯唯不敢犯也行辭小小竟凡書自思其要唯唯請問天師萬二千國之策符各異意皆當於何置之各隨其國俗宜以何為始以斗極東南火氣起願聞其意訣何也火者陽也其符今主天心和者主施開者主通明者主理凡事火者為心心者主神和者可為化首萬事將興從心起心者主正事倚仁而明復有神光萬二千國殊策一通以為文書上章天氣且自隨而流行真人自勵興之子勿逆之子喪乃天樂出書故使吾言子乃不信吾言也求信於子之身也子行之而災日除是天樂行之喜也故災除也子不行而多疾災是天忿忿悒悒子留難其道也火凶勿問於人取效於此明於日月天意所欲為子不可不慎也不行不順令使人心亂也真人慎之唯唯行復誡真人一言天不欲行子獨行之且病之吾文以此為信自是之後亦皆然文已復重不復多言益文使道難知唯唯行重復誡子一言此災病非一世人過也其所從來久遠勿反卒害之但當行天道以消亡之耳如是者所謂得天心意矣不如吾文言復枉急其刑罰災日多天不悅喜真人知之邪唯唯火氣正神道訣第一百三十五請問古者火行同當太平而不正神道今天師獨使令火行正神道何也善哉子之問也是故百人百意千人千意萬人萬意用策不同各殊異故多不得天心意真人言是也今乃火氣最盛上皇氣至乃凡陪古者火行太平之氣後天地開闢以來未嘗有也夫火氣盛者必正神道何也願聞其意然夫火者乃是天之心也心主神心正則神當明故天使吾下理神道也夫神道已自神何必當理之邪善哉子之言夫神乃天之正吏也今邪神多則正神不得其處天神道內獨大亂俱失其居今天氣不調帝王為之愁苦而人又不得知其要意子欲樂知其也此比若人矣今邪人多居位共亂帝王之治今使正人不得其處天地為其邪氣失正夫邪多則共害正正多則共禁止邪此二者天地自然之術也子知之邪故令太陽最盛未嘗有也陽者稱神故天為神陰者稱邪故姦氣常以陰中往來不敢正晝行姦而正晝行為名陰乘陽路病而晝作名為陰盛興為陽失其道君衰間為是久矣故天道吾正神道也令使不敢復為也子知之耶唯唯善哉善哉洞極上平氣無蟲重復字訣第一百三十六請問洞極上平氣至無不治故天師乃考疽疥蟲食人也今獨以此驗之邪其餘蟲云何哉善哉真人今旦問事也天疾是教子問此邪天甚疾人為惡猾吏民背天逆地共欺其上獨陰伏為姦積久如蟲食人也天毒惡之故使子反覆問之然蟲食人所謂蟲而治人也其為災最甚劇逆氣亂正者也今皇平氣至不宜有此應真人付德君欲知道洞洽未令民間悉移蟲主名大小為害之屬何也謂疽癘傷疥盡從腹中三蟲之屬皆移主名其移大多者固固下多蟲治人此蟲無者下無蟲治人此少者少蟲治人善哉小生愚暗覩此以為天性也故反應治邪子其愚何一劇痛也夫天地之性人為貴蟲為至賤反乃俱食人是為反正象賤人無道以蟲食人故天深見其象故使賢聖策之改其正也凡災異各以類見故古者聖賢得知之若不以類目不可思策也所以逃匿於內者象下共為姦而不敢見於外外者陽也陽者天也君也天正帝王也故蟲逃於內而竊食人象無功之臣逃於內而竊蠶食人也可駭哉愚生甚畏之子知畏天固是也若不畏天早已死矣真人慎之唯唯是故古者為治神者致真神為治鬼者致鬼為治物者致物為治蟲者治蟲為治何畏也願聞之然神者動作與天合心與神同意故神者天之使也天愛之鬼者動作避逃人所鬼倚陰中竊隱語似鬼故致鬼物者動作共欺其上猾若物故致物蟲者動作價利人共價利其上其用意雜若故致蟲天天變相應悉如此矣太平德君得天下上書文悉源其災異意以報之其正如神哉善哉善哉災氣已究洽矣子何以知之見天師之正以知無復逃蟲食人故洽矣子可謂知道意邪請問重復之字何所主主導正導正開神為思之也端及入室以為保券其為之云何豈可聞邪然易知而微密此辭輕而重不可妄傳也精者吞之謂之神也不精者吞之謂之不神也不精吞之謂之妄言也故道者傳其人乃行凡事者得其人乃明非其人謂之為妄行過還及入其人身真人知之邪唯唯不敢妄行誠歸付其人如是者為子言之以丹為字以上第一次下行將告人必使沐浴端精北面西面南面東面告之使其嚴以善酒如清水已飲隨思其字終古以為事身且曰向正平善氣至病為其除去面目益潤澤或見其字隨病所居而思之名為還精養形或無病人為之日益安靜或身有強邪鬼物反且變爭雖忿爭自若力思勿惑也久久且服去矣自是之後天樂人為正直以他文為之天神亦助下之隨人意往來上士見人吞字歸思亦然當一吞字皆能教故曰天道一旦而行吾之為道不效辭語效立與天道響相應和以是為神真人慎之既開天神道歸于德君付于賢良人立自正有益於上政明矣德君明師告之以威為嚴所告悉愈為有所覩見神靈慎勿道之上士因是乃至度世中士至於無為下士至於平平人所得各有厚薄天神隨符書而命之故言勿傳其所思不可得不同也不同故不可相語也信哉易哉其為道也要哉約哉其為志壽也因而學之其人將自順也將自善有神明轉其心意使其悅也或今日吞吾字後皆能以他文教教十十百百而相應其為道須臾之間乃周流八方六合之間精神隨而行治病故自是之後天下人畢早正易其行皆樂真文不復為邪偽也真人欲樂安天地道使疾正最以三道行書為前願聞為前言善哉子之問事愚者難正自若亂人治令德君愁故投行書於前令使上下大小自相拾正其俗人無孤言辨士之害善哉善哉願聞三道行書文何但使一通集行書而上必使有前後文書衆多善哉善哉子之言中天心意所以使有前後難問者欲使俗人深自知過也獨言之大病也不見孤辭單文之惡則無以見集行書之善不傳其誤分別其大失皆解人心乃後且可救也心不解不如其所行久大誤也人心覺則易正凡吾為文皆如此矣非獨是也子知之邪唯唯行子已曉矣真人慎事書文已足無輕數句問欲不為子説之恐恨子意欲復為子道之今道大文又天道不可句極得其意天大喜不得其意逆天道反與天為咎不敢復數言也行去右大集難問天地毀起日月星蝕人烈死萬二千國策符字開神訣方藥厭固相治訣第一百三十七今愚生得天師文書拘校諸文及方書歸居間處分別惟思其要意有疑不能解願請問一事言之今天師拘校諸方言十十治愈者方使天神治之也十九治愈者方使地神治之十八治愈者方使人精神治之過此以下者不可用也愚生以為但得其厭固可畏者能相治也不得其厭固者不能相治也善哉真人言也得其難意然夫凡洞無極之表裏目所見耳所聞蠕動之屬悉天所生也天不生之無此也因而各自有神長命各屬焉比若六畜命屬人也死生但在人耳人即是六畜之司命神也是萬二千物悉皆受天地統而行一物不具即天統有不足者因使其更相治服也因復各使有尊卑君長故天道悉能相治制也得其所畏而十十者治愈者即是其命所屬天也真人知之邪唯唯行子已知之矣請問一疑甚不謙順豈不言哉平行勿諱今若盜賊劫人者同服人耳豈可以為天命君長邪善哉子之難也夫盜賊劫人者但以無義妄於枉服人耳不得常服久也一過服人即有重罪長吏遂之不止也子何以言是為天命乎今若王者治服人豈當見逐索邪凡人生以王者為君長為命也真人亦寧解不今已大解善哉善哉行學者精之亦無妄難問也天且非人也唯唯有過有過不也敬慎之勿但若俗夫之人欲言便語也唯唯今愚生每語有劇過不言又無緣得知之今欲復有可問不敢卒言平行今獨萬物各有君長天地亦有君長邪噫子難問何一深妙遠劇也今自知所問不謙不及天師問之會遂不得知之也然天者以中極最高者為君長地以崑崙墟為君長日以王日為君長月以大月為君長星以中極一星為君長衆山以五嶽為君長五嶽以中極下泰山為君長百川以江海為君長有甲者以神龜為君長有鱗之屬以龍為君長飛有翼之屬以鳳凰為君長獸有毛者以麒麟為君長裸蟲者以人為君長人以帝王為君長天下若此者積衆多不可勝記才為真人舉其綱見其始子豈解邪唯唯宜自深思其意亦不可盡記也難為財用唯唯今故言蚑行有知之屬方在其身者不待而成事者無妄殺傷何乎主恐忿其君長也今天太平氣至當與有德君并力治無妄傷害則亂太平之氣令治憒憒今小物安能感動天使其治亂憒憒乎噫子自若愚蒙未大解也今是各自有君長若遠方四境之下賤小人極最帝王之下極螻蟻惡人也無可比數人無故共賊傷此百數十人其家自冤枉上書帝王帝王聞之即大怒下令以章考問之紛紛州郡縣以為大事因而坐之危亡者非一人也子知之邪可駭哉可駭哉行子知大駭乃且長生矣唯唯是故古者聖王知天法象格明故不敢妄用刑也乃深思遠慮之極也故其治常平不用筋力而得天心者以其重慎之也今先王小小失之承負之後各有得失故治難平也子知之邪唯唯今太平氣至天愛有德之君故具為陳戒也難其犯之也以吾文歸上德之君自使思其惡意唯唯右集難方藥命所屬物各自有君長陽尊陰卑訣第一百三十八願問陽何從獨得尊而貴陰獨名卑而賤哉善乎子之難也幾覩道德意陽所以獨名尊而貴者守本常盈滿而有實也陰所以獨名卑且賤者以其虛空而無實也故見惡見賤也愚生受天命劣少無知蔽暗難開願天師具為分解其意子學何不具覩天道意何哉真人尚乃不解俗人冥冥固是也然夫天名陰陽男女者本元氣之所始起陰陽之門戶也人所受命生處是其本也故男所以受命者盈滿而有餘其下左右尚各有一實上者盈滿而有餘尚常施與下陰有餘積聚而常有實上施者應太陽天行也無不能生無不能成下有積聚應太陰應地而有文理應阡陌左實者應人右實者應萬物實者核實也則仁好施又有核實也故陽得稱尊而貴也子知之耶唯唯陰為女所以卑而賤者其所受命處戶空而虛無盈餘又無實故見卑且賤也本名為陰陽男女者此二事也其一身上下既盡無名者也本名陰陽以此二事分別之也念女之頭目面耳支體俱與男等耳其好善尚乃或好於男子而反卑賤者此也男子其頭面肢體其好善不及女也而名尊且貴者正以此也善哉善哉然子可謂已覺知之矣是故天道重本守始是以聖人覩天法象明故當反本守元正字考文以解迷惑也故能使天地長安國家樂也故守本而有實好施與者為善人本空虛無實核常不足而反好求者為惡人為賤人此之謂也今願訣問一疑行言之令女見懷妊實如天師言無實何也噫子內空虛略類似無道之人但天見子勉勉一心故使子來問事耳今女之妊子陰本空虛但陽往施化實於陰中而陰卑賤畏陽順而養之不敢去也陽乃天也君也陰乃地也臣也故重尊敬陽之施因而養之而不敢去也子欲知其實比若君王有客託於小家小家養之不敢去也客亦遂得肥巨成人正此也今俗者言陽生陰成但陰隨而養成陽實也吾書中同多以養説之如此矣吾見真人欲樂得知真道之核天之至要意故為子要言之耳子知之邪唯唯行子已覺矣今願問獨人有男女可以分別陰陽實邪天地萬物盡然邪噫子自若癡迷不解善哉真人之難問也然天地之性萬物盡然吾為子説一事已上洞下達子自若言不行更開兩耳聽勿失銖分也唯唯行然陽在外之時凡物盡上懷妊於上枝葉之間時天陽氣在外未還反下根也故皆實於表也蚑行衆生人民積聚亦於外及陽氣還反內在地中也萬物之屬上悉空無實盡下懷妊實於下地中養根葉蚑行人民亦入實積聚於內此即皇天證明陽實核之大明效也是故執陽道者有實核守陰道者天實核故古者聖人治常象天不敢象地也願聞之何謂為象天乎象天者聚仁賢明儒道術聖智此者名為象天也聚財貨小人不肖無知文章名為象地也善哉善哉願聞此仁賢明儒道術聖智何以象天天者仁賢明儒道術聖智也又天者能乘氣而飛此六人其上才而志真道不懈者亦乃至於能乘氣而飛故屬天象天也是以古者聖人獨深知皇天意故不敢失之也願聞此聚財貨小人不肖何以象地乎然夫財者會下財成塗塗化成糞糞化成土夫小人愚不肖者會聾暗不知道術入凶門戶會當早居地下若令不葬久則為天地之害甚深與之為治則共亂天文地理五行日戰乎四時失紀三光少明天地惡之百神不愛之矣無益於分理當早終死如此財矣真人知之邪唯唯可駭哉可駭哉子知駭者可謂將長存矣不知早駭與天地為重咎愚生甚畏之子知畏此天法天且活子如不敬畏之與生同理夫吉凶本非天也過也人自求得之耳子知之邪唯唯行去去戒之唯唯右集難男女本所以得尊卑陰陽實核君子小人訣國不可勝數訣第一百三十九請問一事平道之願聞天下凡有幾國深哉妙哉子所問也然中部有八十一域次其外復一周天下有萬國乃遠出到洞虛無表合三部為萬二千國何故乃有萬二千國乎天數始起於一終於十十而相乘天道到於五而反故適萬國也其二千國者應陰陽更數比若數十而終也歲月數獨十二也尚五歲再閏在其中也此應天地之更起在天天洞虛之表裏應為天地并數故十二月反并為一歲尚從閏其中此十二月者乃元氣幽冥陰陽更建始之數也比若萬物終死於亥乾因建初立位於天門始凝核於亥懷妊於壬成形初九於子日始還九二於丑而陰陽運九三於寅天地人萬物俱欲背陰向陽窺於寅故萬物始布根於東北見頭於寅物之大者以木為長也故寅為始生木甲最為木之初也故萬物見於甲寅終死於癸亥故木也乃受命生於元氣太陰水中故以甲子為初始天道變數因五相乘而周故五千加十二支字適六十癸亥為數終也真人知之邪唯唯未得其意也今眩冥行子思之久久自得其意行子思之今真人恆何故問天下有幾國哉愚生受天師書言可以報天地重功療天地病而為有德帝王除天地立事以來流災厄會今以天師文書道一付一有德之國今一國之原雖其君有德萬萬人者安能乃并解陰陽無極天地之災乎乃周流遍治天地之表裏絶洞虛洞遠無極之天地病乎噫善哉天乃使子問是邪咄咄可駭哉咄咄可駭哉吾欲不言也今恐得大適死過不除於子也真人何以乃知問是乎愚生得天師教勑者歸別處思惟其意各有不解者故問之也今子解一國有德之君而已何故為問之乎今以天師文但解一有德之君國之災名為但療治一國耳安能乃療治天地病而報皇天重功乎哉善哉子之言也吾無以加子言也真人試説其意然今天師乃言天地洞虛有萬二千國今一有德之國受道安能乃解是萬二千國之災而都安天地者乎善哉子之言子果見使主問是邪諾今為真人具分別説之使其昭然可以畢除天下病災吾畏天威義不敢有可匿也子力隨記吾言唯唯行天數本起於一十而終一乘十十也各乘十而至百百乘十至於千千乘十至於萬一者其數之始也十者其數之終也百者其有德之國鄉子但持吾書往授教其一有大德之國傳記吾書者持本去無盡以與也周流以授百有德之鄉一國得吾書者國善人并歸向之其德乃并洽四方百國皆被其化而為善天地乃俱為其安災害為其除以授百有德之國而萬國無害天地病悉除去矣善哉善哉願聞何故不教愚生比以教授之然所以不可比以教者無道德之國天所衰會不能行真道故但歸有德之國也今無德之國并歸有道德之國亦自理矣善哉善哉願聞何故正以是百國有德為法乎善哉子之難也得其意然天地人之數也天數起於一終於十天下布施於地而生數成乃後出適合為百天地人備天地人三合同心乃成德也一事有不和輒不成道德也願聞天數何故正一乎一者其元氣純純之時也元氣合無理若風無理也故都合名為一也一凝成天天有上下八方故為十也又有五方各自有陰陽故數十也下因地也一下因地者數俱於十乃生故人象天數至十月乃生也一者正是其施和洞洞之時也已愛施者反當象天數十月乃出故數終於十故一者乘十地道者母也當禺故與和并連人天地人三相得乃成道德故適百國有德也故天主生地主養人主成一事失正俱三邪是故天為惡亦凶地為惡亦凶人為惡亦凶三共為惡天地人滅盡更數也三共為善德洞虛合同故至於三合而成德適百國善哉善哉是者天下萬國之綱天地人合德之鄉也子知之邪唯唯故真人今既為天地除病為德君除承負雖苦持吾文往授百有德國而陰陽病悉消亡帝王之災皆已除矣善哉善哉愚生嚮不力問無緣得知是也子言是也學而不力問與不學者等耳是故古聖賢之學旦夕問於師不敢懈也故遂得知天之道也唯唯誠得力問不敢有懈也如是者子已知道矣願聞今天下乃習俗不同以一道往教勑之曾不疑乎噫子於是言者更愚略冥冥無知何哉今是習俗禮義者但偽行耳非其真也天下人乃俱受天地之性五行為藏四時為氣亦合陰陽以傳其類俱樂生而惡死悉皆飲食以養其體好善而惡惡無有異也於其有不曉真人文而不達者當授教之時真人宜以其俗語習教其言隨其俗使人自力記之如是者天下悉知用之無有疑也吾之道比若日月周流運行照天下各自言昭昭大明而足子欲重知其審實比若萬物蚑行之屬共一天地六甲五行四時以是為大足故皆以天地陰陽格法教示之也子知之邪唯唯行去難不止則説無窮今道大文反但難得意唯唯願復問一事而止行言之今其萬二千國當云何哉然此者并於數中與閏同子欲知其審比若數十而終一歲反十二月乃終尚閏并其中時有十三月此之謂也但百國行道德乃萬國無災天地病已盡也此亦并除善哉善哉子能自力以吾文周流百有德之國使其各隨俗説吾書者即萬二千國悉安天地病大除子已增年亦無極矣子安之少也則得少年安之半則得半年盡安之則得無極之年真人既有善意天使子具問是宜具安之子亦無大自苦勞也夫天極自神且明而無上也尚常行道自苦日一周行凡物而安之故獨得常吉而長生也地亦順隨天所為而養之也如天一日不行日月星不移即有不周之氣天則毀矣天尚乃行道不敢止故長生也而況子乎努力各自為身屈不能為他人也吾所以説而不止者吾亦為吾身屈非而為子也凡六極之表裏擾擾之屬俱各為其身計不能為他人也子知之邪唯唯吾得天師言行之使有德之國記之不敢懈也行子已知之矣俱努力努力事畢而相從唯唯行去願問一事何等也今六人謹歸居間處共思天師言時時若且大解時時有迷亂不懈者願及天師決其意今念數愁天師欲忍不言也恐與天師相離終古竟天年無以復得知之故冒慚復前假一言平行天使吾與六子相覩共語勿辭謝也唯唯今願聞天下之國獨有萬二千國邪復有餘邪噫密哉子之問也天地開闢以來未嘗有也然此萬二千國者記一大部耳其餘者何有窮極乎哉何一多也噫子今旦問疑極知也今反覆閉冥冥愚哉實不及然觀弟子問事未大究洽知天道也適應校綝綝若且及而內獨不及夫俗人冥冥憒憒固是也以真人況之吾不非也然更開耳為六真人説之天者乃上下無極傍行無極往往一合為一部界復分何極乎願聞之然天上當於何極上復有何等而中得止極乎地下當於何極下復有何等於何得中止而言極乎天地傍行於何極何故得中上而反極窮乎此六表者當於何窮極乎是故天道乃無有窮已也大用之亦適足小用之亦適足大用亦有餘小用亦有餘真人寧知其意乎唯唯可駭哉可駭哉嚮不力問復無從得知之也然子可謂小覺矣行去勿復竟問也恐六真人驚而敗也非力所及而強問之是亦大害也然為人師者多難今訾子悒悒為子更明之行更明開耳安坐聽唯唯子欲樂知其大效也比若一家有父有母有子亦天道具成一家父象天母象地子象中和其聚財物家中所有象萬物亦成一家父為君母為臣子為民財貨以相通養共之象萬物此一家亦共一大憂一縣萬戶亦合成一家共一大憂十縣合成為一郡亦合成一家共一大憂十郡合成一大州亦合成一家共一大憂十州合共成一大國亦合成一大家亦共一大憂而為一大界其帝王有德憂及十二州大憂及十三州亦共為一大家亦共一大憂也其外界遠方不屬於人國者於人國有道德其中善人來於人國無道德則不來於人德劣則來害人也此一部者一界也天地之分畫也樂使天下擾擾之屬各有處不相剋賊也故為太極中極小極何謂也太極者主無復外表也中極者主中部也小極者各應其部界而止也但可以道德相求不得大相剋賊也天怨之此名為共一家故各共一大憂也子欲知其審實比若一家父子夫婦但獨憂其家不富不肯憂他家也一縣但共憂其君善則當遷之使高功各爭進其長吏惡則欲共去之一縣一郡一州一國皆義説等此其共一大憂也今故記萬二千國乃共一大部以與真人共一大憂也共一界其餘若此萬二千國者不可勝數是故古者聖人之作皆共記一小部也何不記大部界乎天使不言也大化未出所作者異不得同法故不記之也今者為大化出萬二千國歷運周故天使真人來問無極之經洞竟之政故以文付百有德之國一有德之國兼化九十九國其萬二千國并數若一歲十二月為一部時十三月閏亦并其中此之謂也子知之邪唯唯行去唯唯慎天道神靈守之勿妄亂毀唯唯今已受天明師嚴勑文慺慺小覺知一大部願聞一小界見示説此無極之國諾為真人悒悒且小言子詳記之今欲使真人積財用上柱天日月下柱地廣從萬里恐財用固固常病苦少也不能記是其國多少之名字也子知之邪唯唯愚生不敢極問天道也見天師言今恍若失氣惚若亡魂不敢重問之也然子可謂曉事之生子欲報天地重功而命無極者但周流是一大部萬二千國則壽已無極矣其上下六方洞極者天亦不獨使六子憂之也憂之者自有人與子異界亦不以過責反罪子也其安危善惡亦自有主之者也一部説絶勿復問唯唯行六子努力請真人學為小通但未大覩天道意耳加精勿懈唯唯學而不精與狂同精而不得名瘖聾示之以西反問東故天下師共辨難何恟恟雖恟恟無益也猶不知比若嬰兒蒙蒙未出胞中隨其母身而行安知天道廣遠而無方是故小師強怒喜狂説反令使天地道傷故失道意不能安其君王天下恟恟皆被其過言之殊異令災害橫行不可禁防書雖億億萬卷天下流災害猶不絶前後合同皆由強説之生不知道要之過也真人知之邪唯唯行欲復為子具説無窮竟難為財用又且復重故一小止疑復來問之唯唯右集難問授書訣諸國部界敬事神十五年太平訣第一百四十願請問一事平言之今天將太平寧亦可預知邪哉然可知占天五帝神氣太平而其歲將樂平矣何謂也願聞之然春也青帝神氣太平夏也赤帝神氣太平六月也黃帝神氣太平秋也白帝神氣太平冬也黑帝神氣太平今以何明之然太平者乃無一傷物為太平氣之為言也凡事無一傷病者悉得其處故為平也若有一物傷輒為不平也二物傷輒為被刑也三物傷輒為群物傷也四物傷輒為四方傷也五物傷輒為五方傷天下有大害也六物傷輒為惡究於六方也七物傷輒為其害氣乃橫行也八物傷輒使人賢不肖異計不并力也九物傷輒為惡究竟陰陽令物雲亂席轉也十物傷乃為大綱傷天數終盡更數也是故古者上聖人但明觀天五帝神氣平未輒自知治得失且平與未哉願聞其平訣意然春物悉生無一傷者為青帝太平也夏物悉長無一傷者為赤帝太平也六月物悉見養無一傷者為黃帝太平也秋物悉成實收無一傷者為白帝太平也冬物悉藏無一傷者為黑帝太平也五帝太平一歲人為其喜樂順善二歲地上為其太樂三歲恩澤究竟於天四歲風氣順行五歲九神不戰祅惡伏滅六歲而究著六綱七歲乃三光更明八歲而恩究達八方九歲陰陽俱悅十歲萬物悉各得其所為數小終物因而三合之乃天地人備故三十歲而太平也今上皇氣出真道至以治故十五年而太平也如不力行真道安得空致太平乎此十五歲而太平者乃謂帝王以下及臣大小案行真道共卻邪偽故十五年而平也真人知之邪是故欲知將平與未平但觀五帝神平與未足以自明足以自知也是故凡象乃先見於天神也天神不平人安得獨稱平乎哉是故五帝更迭治可皆致太平其失天神意者皆不能平其治也是故謹順四時慎五行無使九神戰也故當敬其行而事其神今天第一上平氣且至故教真人敬四時五行而令人大小共興用事其神事古者但敬事四時五行故致太平遲三十年致平今乃并敬事其神故疾十五年而平也真人知之耶唯唯可駭哉可駭哉然子已覺矣願請問人行忠直有實寧可知邪善哉子之所問也與其交也言行日若惡忿人長念之反月善月若惡忿人反歲善少時觀其所為作若最惡老反最善也人皆歸其言而樂其行而好愛其道是即忠信上善有實核之人善哉善哉願復請問不忠信佞行亦可知邪然可知也與之交也觀其所言行也日月合於人心若順善長念用之反月使人益惡邪月若善反歲惡少時觀其人可為若善也言若忠信至老念用其所為反最惡邪是純為偽佞不忠信之人行也至老長則窮其言與行最賤矣災及妻子禍流後生善哉善哉效言不效行致災訣第一百四十一太上中古以來人多效言乃不效行故致災害疾病畜積而不可除去以是自窮也是故吾敬受此道於天乃效信實不效虛言也執一行吾書道者下古人且日言吾道惡無益也反月善月言無益反且歲善歲言無益反至老常善久久不而去也後生者以為世學矣不知疾行者但空獨一世之間久苦耳故吾教勑真人常眷眷勉勉也道為有德人出先生與後俱與吾無有獨奇親也吾受之等耳故但得而力行之者即其人也無有甲與乙也子知之邪唯唯行天道無親歸于人地德無私付于謹民人交無有先後但愛于有實信是故古者帝王有宮宅以仕有德不仕無功之臣有德之人天地所愛可助帝王安萬物無德之人天地所怨陰陽之賊何其重也子自若愚哉然無德之人其行無數乃逆天地故與天地為怨也乃亂陰陽故與陰陽為賊也子知之邪唯唯行去勿復問善惡可覩矣唯唯行為子悒悒且為子分別解下古人之行人人曰自言惠且善曉事而反其行徵也反月德惡月月各自言有善行不負於天而反歲得災多且凶惡夭死少時人人自言善且大賢賢過其父與母而行到老長反無一善賢者皆為不肖之人貧賤且共壽則日少無一知真道夫下古之人善惡賢與不肖見於是矣何須自言賢且曉事乎但觀其徵可自知矣可長明可行真與偽矣何須復辨陳之成事已真人以吾書文示之令使一覺悟可天久迷與無地為重怨行吾辭小竟後復有疑乃來共議之唯唯右集難問太平訣人行有實與邪文闕題神人語真人言古始學道之時神遊守柔以自全積德不止道致仙乘雲駕龍行天門隨天轉易若循環真人專一老壽命與天連陽道積專日有單至信所致無爭榮名而居高官孝順事師道自來焉神乃知善人與語言夫師開曚為道之端君父及師天下命門能敬事此三人道乃大陳不事此三人室閉無門福德皆逃禍亂為憐詳惟其事無失書言父母生之師教其交居親仕之可不慎焉天下至士去官就仙仙無窮時命與天連長吏治民仙吏天官與俗何事其事異焉長吏治民仙萬神天下之事各自有君努力思善身可完全以是遂去不負祖先吾圖書已盡無復可陳致勉學詳請其文神人將去故戒真人慎之慎之亦無妄傳不得其人慎無出焉藏之深淵幽冥之間道不飲血無語要文外內已悉無可復言六極六竟孝順忠訣第一百五十一真人前子共記吾辭受天道文比久豈得其大部界分盡邪吾道有幾部以何為極以何為大究竟哉文中有道六極六竟愚生今説不知以何為六極六竟咄子其愚不開又學實自若未大精也故不知道之所到至也有過負於天師其責必不可復除不嫌也真人自責何一重也愚生聞子不孝則不能盡力養其親弟子不順則不能盡力修明其師道臣不忠則不能盡力共敬事其君為此三行而不善罪名不可除也天地憎之鬼神害之人共惡之死尚有餘責於地下名為三行不順善之子也常以月盡朔旦見對於天主正理陰陽是尊卑之神吏魂魄為之愁至滅乃已故自知不精有過於師不除也善哉善哉子於何受此辭語乎受之於先師也又愚生瞥覩天師説受天師之法見天象天地乃是四時五行之父母也四時五行不盡力供養天地所欲生為不孝之子其歲少善物為凶年人亦天地之子也子不慎力養天地所為名為不孝之子也故好用刑罰者其國常亂危而毀也萬物者隨四時五行而衰興而生長自養是其弟子也不能盡力隨其時氣而生長實老終為不順之弟子其年物傷人反共罪過其時氣不和為時氣得重過民者聖人賢者之弟子也今下愚弟子妄盜強説反使聖人賢者有過名為共亂逆天道其罪至重不可赦除故愚生過不除也風雨者乃是天地之忠臣也受天命而共行氣與澤不調均使天下不平比若人之受命為帝王之臣背上向下用心意不調均衆臣共為不忠信而共欺其上使天下恟恟多變諍國治為之危亂比三事者子不孝弟子不順臣不忠罪皆不與於赦令天甚疾之地甚惡之以為大事以為大咎也鬼神甚非之故為最惡下行也噫真人久懷智而反詐愚使吾妄説説得過於天地也吾之所説不若子今且所言深遠也愚生意適達於是今不能復有所言也大謙然亦不失之也下而不謙其過亦重唯唯不敢不敢也是故愚生為弟子不能明理師道之部界自知過重故説天象以是自責也善哉子之言也吾亦無以復加之也今以子説況之子已自知也書之部界矣實不及之也然子真不及之為子具分別解之使相次各有部界萬世不可復忘也今真人言人三行不順修善言魂魄見對極巧也於何受是説哉比若天師會事先師自言為上古真人戒愚生以此言又見天師書文中言故重知之也愚生問上古真人時不知屈折有所疑然上古真人言是也吾無以加之也今願及天師問其是意行明聽然所以月盡歲盡見對非獨生時不孝不順不忠大逆惡人魂神也天地神皆然天以十五日為一小界故月到十五日而折小還也以一月為中部以一歲為大部天地之間諸神精當共助天共生養長是萬二千物故諸神精悉皆得祿食也比若群臣賢者共助帝王養長凡民萬物皆得祿食也故隨天為法常以月十五日而小上對一月而中上對一歲而大對故有大功者賜遷舉之其無功者退去之或擊治此亂治者專邪惡之神也邪惡之神行與是故生時不善之人魂魄俱行對善人魂魄不肯為其使也是故逆不孝不順不忠之人為其使共亂天儀汙天治故其惡神見收治故并收治其客比若反逆惡臣為無狀乃罪及其客也此之謂之也善哉善哉愚生已解矣故人生之時為子當孝為臣當忠為弟子當順孝忠順不離其身然後死魂魄神精不見對也子知之耶唯唯可駭哉可駭哉今唯天師幸哀開示其天法象多少願無中棄唯見示勑書文部界所到至也然子問之大致數吾猶當言也如吾不言名為妒道業學而止而反得天適諾六真人安坐為子分別其部署凡有六屬一大集夫守一者以類相從古今守一其文大同大賢見吾文守行之不解策之得其要意如學可為孝子中學可為忠臣終老學之不中止不懈皆可得度世尚有餘策也行之不止尚或乃洞於六方八極也萬事已畢何不有也上乃可助有德帝君共安天地其恩乃下可及草木也萬物擾擾之屬莫不盡理也天地為之歡喜帝王為之長遊但響琴瑟唱樂而無復憂子知之耶唯唯中賢守行之力之旦夕惟思其意亦可少為孝子長為良臣助國致太平天下悉伏莫不言善哉外謹內信還各自責自正不敢負於天地不敢欺其上也衆賢共案力行之令使君治乃與天相似象天為行恩愛下及草木蚊蚋之屬皆得其所子知之耶唯唯凡民守讀之共強行之且相易共好嬉之不能自禁令人父慈母愛子孝妻順兄良弟恭鄰里悉思樂為善無復陰賊好竊相災害有人盡思樂忠順孝欲思上及中賢大賢故民不知復為凶惡家家人人自勑自治故可無刑罰而治也上人中人下人共行之天下立平不移時子知之耶唯唯守一入室知神戒第一百五十二是故夫守一之道得古今守一者復以類聚之上賢明力為之可得度世中賢力為之可為帝王良輔善吏小人力為之不知喜怒天下無怨咎也此者是吾書上首一部大界也恐俗人積愚迷惑日久不信吾文故教示使與古今守一之文合之以類相從乃以相證明也善哉善哉愚生謹以覺矣夫守一者大人守之亦有餘中人守之亦有餘小人守之亦有餘三人俱守行之其善乃洞洽於六方八遠其恩愛與天地同計也如最下愚有不樂守行者名為天下最惡凶人也天地疾惡之鬼神不復祐之也凡人久久共不好利之也此即天書所以簡人善惡之法也其好欲讀視者天知為善人示之不欲視者天知之為凶惡人也以此占人萬不失一也吾為上德君作文上不負天下不負地中不負德君不欺真人也守此得其意者道已畢矣竟矣六真人自深思其意吾不能悉記此之善夫一乃至道之喉襟也上士所樂德中士所響知下士之所疾惡也子知之耶唯唯是故上士得之大喜不而自禁為也中士得之不而自止常悅欲言也下士見之是其大忌也以吾文觀此三人而天下善惡分別明矣子知之乎唯唯是文乃天所以券正凡人之心以除下古承負先人之餘流災以解天病以除上德之君承負之謫也子知之邪唯唯善哉善哉行子已覺矣其二部界者其讀吾書道文合於古今以類相從都得其要意上賢明翕然喜之不能自禁止為善也乃上到於敢入茆室堅守之不失必得度世而去也志與神靈大合洞不得復譽於俗事也其善乃洞究洽於天地其神乃助天地復還助帝王化惡恩下及草木小微莫不被蒙其德化者是故古者賢明德師乃能助帝王致太平者皆得此人也故其言事悉順善而忠信也乃其所受道師善也真人知之耶唯唯其中中賢力共讀而吾文書合於古今道文書以類相從力共讀而不止其賢才者乃可上為帝王良輔善吏助德君化惡恩下及小微草木陰陽和合無復有戰鬭者帝王長遊而無憂事群臣下俱相示教力為之莫不順善而忠信無刑罰而治其善不可勝書真人知之耶唯唯其百姓俱共讀吾書道文上下通都合計同策為一無復知為凶惡者也拘校古今道文以類相從相明因以為世學父子相傳無窮已也如三人大賢中賢下賢及百姓俱為之占天地之惡氣畢去矣無復承負之厄會也善乃合陰陽天地和氣瑞應畢出遊於帝王之都是皇天后土洽悅喜之證也故讀吾文者宜精詳之以上到下思惟其要意得其訣與神明無異也真人知之耶唯唯其三部界者夫人得道者必多見神能使之其上賢明者治十中十可以為帝王使辟邪去惡之臣也或久久乃復能入茆室而度去不復譽於俗事也故守一然後且具知善惡過失處然後能守道入茆室精修然後能守神故第三也賢者得拘校古今神書以相證明也真人知之耶唯唯中賢守一入道亦且自覩神治十中九可為王侯大臣共辟除邪惡或久久亦冀及入茆室矣真人知之邪唯唯其小賢守一入道讀書亦或覩神可治十中八可為百姓共辟邪除惡也亦皆當拘校古今道文以自相證明乃愚者一明悉解信道也如使讀一卷書必且不信之也反且言其非而自解則邪惡日興得害人也如大賢中賢下及百姓俱守神道而為之則天地四時之神悉興邪自消亡矣真人知之耶唯唯如此則天下地上四方六屬六親之神悉悅喜大興助人為吉以解邪害上為帝王除災病中為賢者除疾下為百姓除惡氣令姦鬼物不得行也善哉善哉須有大訣戒見神以占事言十中十者法與天神相應言十中九與地神相應也言十中八者與人神相應也過此而下者言不可用也或有初覩神反十十相應久久反日不中者見試於神道故使不中也見是能復更自新力自正思過更為精善無惡意者且復日上行或中神意乃射十中十或出十或射十乃中一十日以大中而上行者是其日思為善得道意之人也故曰進以是自占萬不失一也或有初見神占事不中已反日已上行大中是者精得道神意日上進之人也或有平平如故不進不退是其用精不過故之人也日衰者曰懈之人也以是占之不得道意矣見試而不覺悟固固自若為惡者諸神且共欺之牽人入邪中則致吉凶無常或入祅言或坐病止故大賢中賢小賢百姓男女為道悉以是自占不失之也非猶神道試人也凡天下之事皆以試敗天地有試人故人亦象天地有相試也真人知之耶唯唯子欲重知其大信效天道神靈及人民相得意相合與心而至誠信不相得意則相欺是故上古之人誠信相得意故上下不相欺中古人半不相得意故半相欺下古之人純不相信故上下純以相欺為事故上古舉事悉中中古半中下古純不中故危亡是故古者賢聖常以是自占可為得與不得則無失也以此戒真人吾見子常苦勞故深戒子子乃為天地長使也解天地流災為王者除害其功甚大少雙恐子為道中懈故以是神事以戒子子乃為天地使而日吉者是其得天地心意也日凶衰惡是其失天地心意也與道神交日吉善者是其得道心意也而日凶衰者是其失道心意也與人交日益厚善者是其相得心意也而反日凶惡薄者是其相失心意也比若耕田得穀獨成實多善者是用心密用力多也而耕得穀少不成善實者是其用心小懈用力少也此但草木尚乃隨人心意用力多少功苦為善惡何況天地神靈與人哉可不戒耶真人也此之為戒若薄少不足言而深思念之反大重此正所為謂安危吉凶門戶也子知之耶唯唯愚生已覺矣受命受命夫賢明為上德君拘校上古中古下古文書之屬以類相從更相證明道一旦而正與日月無異復大集聚大賢中賢下賢乃及人民男女口辭訣事以類相從還以相證明書文且大合比若與重規合矩無殊異也天地人策俱并合比若一也如此則天地人情悉在萬二千物亦然故德君當努力用之則災害一旦而去天下自治無有餘邪文邪辭洞白悉正則無餘邪氣夫邪文邪辭繫災之根也子欲重知其明審信效比若人以邪文相記於君比若人以邪言相惡則怨咎日興衆多人亦自相怨咎相惡君亦聽之反失正聰明不達為天地所非治危辭不吉又下反以邪文邪言共欺熒惑其上久久上知之亦復君臣相咎故是邪文邪言日至凶惡之門戶也故當力拘校去之也真人知之耶唯唯故德君盡以正辭而天地開闢以來承負之災厄悉除無復災害真人欲重知其大信也夫正文正辭乃為天地人萬物之正本根也是故上古大聖賢案正文正辭而行者天地為其正三光為其正四時五行乃為其正人民凡物為其正是則正文正辭乃為天地人民萬物之正根大效也子欲重明知其信比若人以正文正辭相譽於君前君得以為大聰明大達也舉事悉得無失正者下上乃得天地之心意三光為其不失行度四時五行為其不錯人民莫不歡喜皆言善哉萬物各得其所矣恩洽神祇則名聞遠方群神瑞應奇物為喜而出天下賢儒盡悉樂往輔其君為不閉藏仙人神靈乃負不老之方與之祅癢為其滅絶人民為其行政言正文正辭乃無復相憎惡者則怨咎為其絶天下凡善悉出凡邪惡悉藏德君但當垂拱而自治何有危亡之憂此即吾正文正辭為善根之明證效也可不力正哉真人寧解不唯唯可駭哉見天師言謹已大覺矣愚生知天下已太平矣德君聽用之已延命矣善哉子可謂為曉事之生也已洞知之矣樂乎樂乎天憂已解矣地病已除矣真人以何知之然此邪惡盡應當見去天地人民萬物之大病已除也今已拘校正文正辭故知天地之大病已除也善哉善哉子已知之矣帝王力行吾文與天地厚無復厄會也善哉善哉語真人一大要言也上德之君得吾文天法象以仕臣上至神人下至小微賤凡此九人神真仙道聖賢凡民奴婢此九人有真信忠誠有善真道樂來為德君輔者悉問其能而仕之慎無署非其職也亦無逆去之也名為逆人勉勉眷眷之心天非人但因據而任之而各問其所能長則無所不治矣德君宜試之日有善效者進之慎無失也無效者疾退之此名為汙亂天官使正氣不得來咎在此邪人也夫正善人心常欲陰祐凡事為憂故曰致正善人也邪人有邪心不欲陰祐利凡事則致邪此乃皇天自然之格法也故當即退之不退之且忿天使地殺氣出故當疾去之是大事也真人知之耶唯唯愚生甚畏之子知畏之可謂曉事生矣天且祐子不敢不敢此無可讓也非吾而使子見祐於天也子為善自然行得之也故古者聖人之為行也不敢失繩墨者乃覩天戒明知其善惡各為其身也故常求與賢者為治乃恐忿天也得罪於天無所禱也是故古者帝王其心明達不敢妄與愚者共事也故獨得長吉也真人知之耶唯唯夫中古以來人半愚以為選舉為小事也不詳察之半得非其人半亂天官政半凶也下古復承負中古輕事復令自易不詳察之選舉多不俱得其人汙亂天官三光為其不正證上見於天天不喜之也故多凶年不絶絶者復起不知天甚怨惡之人不深自責反言天時運也古者為有如此者天道非人反以其太過上歸天下愚不自思過失反復上共責歸過於帝王天乃名此為大反逆之民過在下傳欺其上以惡為善以善為惡共致此災反以上歸天以歸天者復上責其君天下絶洞凶民臣無狀之人也今天地神靈共疾惡之故天乃親自謁遣吾下為德君更制作法也選舉署人官職不可不審且詳也真人欲知是惡民臣之審也比若家人父母共生數子子共欺其父母行為惡父母默坐家一室中安而知之已行為凶惡盜劫人反還共罪其父母父母惡故生我惡也縣官吏得之不直殺其惡子反復還罪其父母夫父母生子皆樂其賢且善何時樂汝行為惡哉反還罪其父母是為大逆不孝子也夫君之謂臣皆樂其為善何時教其為惡而民臣自下共為凶惡之行得天地災者反以還罪責其君百姓愁苦於是猾吏亦復共上責於天名是為民臣共作反逆罪不除也共責其君極已應大劇矣尚復乃上罪責天下罪責地人之反逆乃如此可不短其命而疾殺之哉故下古皆應霸命死生無時也比若民家欲殺畜生忽欲殺之便殺之也善畜尚惜其死惡畜樂其病死真人知之耶唯唯愚生甚畏天威行子已覺矣出此文令德君以示諸賢儒慎無匿天樂出之急急唯唯告真人一大要大德上君已仕臣各得其人合於天心則當知治民除害之術夫四遠伏匿甚難知也夫下愚之人各取自利反共欺其上德君當與賢明共正之悉正乃天地之心意且大悅喜使帝王長吉也天明知下古人且愚難治正故故為其出券文名為天書也書之為法著也明也天下共以記事當共所行也可以記天下人之文章也故文書者天下人所當共讀也不為一人單孤生也故天下共以記凡事也聖人共以記天地文理賢者用記聖人之文辭凡人所當學而共讀之乃後得其意也書之為類乃當共原共策共記共誦讀之乃以無姦也故自古到今賢聖之文也幾何校幾何傳幾何實核幾何共安之尚故故有餘邪文誤辭不可純行故大賢諸道士乃周流遍天下考辭習語視異同以歸喻愚蒙尚故故誤人赤子使妄説其學則不可妄仕不足以為帝王之臣也故一本文者章句衆多故異言令使天地之道乃大亂不理故生承負之災也真人知之耶唯唯行子已覺矣子明更聽且語子一大戒下古之人所以久失天心使天地常悒悒者君乃用單言孤亂核事其不實甚失其意明矣真人但以此上乃使天下衆賢共考辭文而不知皆為誤學故生災異不絶天甚疾之得亂生病焉陰陽戰鬭而不止也故天教吾下拘校正之今大中古以來信孤辭單言每視覆下之文為不敬共以是相法罪遂用孤辭單言反應投書治事故與天為怨亂天官文書本使人共議其是與非反使一人陰為辭夫聖人尚不而獨畢知天地之道故聖賢前後生所作各異天上言其各長於一分不能具除災故教吾都合集校之今反信一人之言寧可用不故教其三道行書大小賢不肖男女共為之參錯共議是與非皆令得其實核乃可上也中一人欲欺輒記之如是則天地病已除帝王無承負之貴矣天地得以無病而喜帝王得以自安而喜賢者得以自達而喜百姓得以自解不見冤家富人足而喜奴婢得其主不為非而喜四時五行得順行民謹不犯之而喜萬二十物各得其處所不見害而喜鬼神見德君可為積善亦復悅喜惡氣不復上蔽日月三光亦喜太上平氣得來治王者用事亦喜惡氣得一伏藏不伏見使行誅伐亦喜夷狄得安其處不復數來為天戰鬭亦喜軍師使兵器得休止不用士卒不戰死亦喜凡天地之間若此喜者衆多不可勝記行為真人舉其大綱見其始子自思其意凡事以類推之盡以得矣德君案行之天下咸服矣故天尤急此三道行書慎無復廢故災不去也欲斷天文反復為聾盲之治也夫聾盲之治亂危之本也滅身之災害也可不慎乎夫文乃天下之人所當共案行也不可信一人之言也故天地開闢以來文書及人辭更相傳以相考明也不考明則不可獨行獨信一人言而行之則危亡矣是天下之大失大傷也故吾書不敢容單言孤辭也故教真人拘校上古中古下古文以相明拘校天下凡人之辭以相證盟然後天地之間可正陰陽之間無病也以吾書往考古今之天文地神書與人辭必且與響相應與神無異也乃吾道且可信也故吾為道不試言也乃求試行不行之安知吾道與天相應而信哉今日行之比若與天語十十五五無有脫者神哉為道如斯誠可謂大樂矣真人知之耶唯唯行去曉事生矣告真人一大訣此本守一專善得其意故得入道故次之以道文也為道乃到于入室入真道而入室必知神故次之以神戒也得守一得道得神必上能為帝王德君良臣臣者必當助帝王德君共安天地六方八洞得其意乃國可長安也欲安之必當正文正辭正言故以拘校文辭得以大正必當群賢上士出共輔帝王為其聰明股肱故次之以仕臣九人九人各得其所當共安天地天下并力同心為一也必常相與常通語言相報善惡故次之以三道行書也人已都知守一已入道已入神已入正文以尊卑仕臣各得其處也已行文書并力六事已究竟都天下共一心無敢復相憎惡者皆且相愛利若同父母而生故德君深得天心樂乎無事也以為道恐有遺失使天地文不畢備故復次之以大集之難以解其疑深者居其下畢書出之以書付有德君天下一旦轉計響善自治其為易比若火沿高燥水從下不教其為自然往也不可禁止也故為太皇天道教化立可待也德君行之乃名為天之神子也號曰上皇與天地元氣相似故天下之神盡可使也從天地開闢以來未嘗有天書神文使真人傳之為真道記也以往付德君名為道母也太陽之氣火行有也得而行之得其信也不知行之則不真也真人知之耶唯唯誠寄謹民往付歸德君不敢久留也行子已曉之矣天書不可久留也天神考人使人不吉子慎之行去唯唯六究洽洞極七竟以類次書文使相得災悉滅亡致洞極之吉文忍辱象天地至誠與神相應大戒第一百五十三真人前唯唯今且戒真人一大戒吾道乃為理天地安帝王生天地所愛者乃當愛真道與真德也故天者乃道之真道之綱道之信道之所因緣而行也地者乃德之長德之紀德之所因緣而止也故能長為萬物之母也常忍辱居其下也不自言勞且苦也吾之為德君教化下愚正以此天地二事為祖也故常案天地之法度不失其門戶也吾之書即天談地語與神祇深獨相應若表裏也步即相隨若規矩也故順行者得天地意失之者凶衰矣今以戒真人子宜思吾言而常慎之矣唯唯行見子好真道德好為善少雙且示子一言今上士多樂真道善德中士半好之下士無狀純無道無德皆應大逆無道之人也大凶無德之人與天地內獨不比不而相知非天常所宥也愛子也故無道德者命不在天地也與禽獸同祿同命今不解願聞其要意然六真人明聽唯唯然天者純為道地者純為德此無道德之人與天地絶屬無所象象於天行當有真道而好生象地當有善德而好養長今人無道與無德故天地不宥子也欲知其明信效也比若道人知道人德人知德人各自相收録故命迭相在故道人者好興道人德人者好興德人有道德之人與無道德之人不比故不肯相收録命不繫天也善哉善哉願聞其與禽獸同命意善乎子難深得其數然禽獸者命繫於四方其為性者好相抵觸無有道德勝者為右無道德下愚之人亦好相觸冒勝者為右其氣與禽獸同故同命也天道為法以是分別人優劣故知之也凡天下之名命所屬皆以類相從故知其命所屬故含五性多者象陽而仁含六情多者象陰而貪受陽施多者為男受陰施多者為女受王相氣多者為尊貴則壽受休廢囚氣多者數病而早死又貧極也故凡人生者在其所象何行之氣其命者繫於六甲何曆以類占之萬不失一也故古者聖人深原凡事知人情者以此也真人知之耶唯唯善哉善哉今故下古之人承負先人失計稍稍共絶道德日獨積久與天地斷絶精氣不通不相知命反與四足同命故天地憎惡之鬼神精氣因而不祐之病之無數殺之無期其大咎在此今上德之君命繫天地當更象天地以道德治故吾更理出天道出以上付之天樂其為善不欲復使其有餘是四足之人行也故吾書復重丁寧欲使其大覺悟也故敘六極一大集難以付歸之真人知之耶唯唯可駭乎樂哉樂哉真人以何知其可駭而樂哉然愚生見天師言真道德出民一旦而轉皆守為道德象天地不復為四足之人行人人道人人德故知其大樂至意矣善哉真人之言無以加之也今願及天師請問一事言之今人求道德及凡人行當以何為急務哉以何而得知之以何而與天地響相應也善乎子之問也當以至誠五內情實為之乃可得也如不以五內情實為之是道德之所怨也求善不可得也神靈不應也今願聞至誠以何而感動天地神靈乎噫真人於是殊為愚學吾書文多固固未解邪愚生其為暗昧曚乃久重難一旦而開然子亦大謙行更明聽為子道至誠感動天地之意唯唯聞命然夫至誠者名為至誠乃言其上視天而行象天道可為俯視地而行象地德而移念天地使父母生長我不欲樂我為惡也還考之於心乃行心者最藏之神尊者也心者神聖純陽火之行也火者動而上行與天同光故日者乃火之王為天之正無不照明故人為至誠心中正疾痛應心神至聖乃上白於日日乃上白於天故至誠於五內者動神靈也是故可不慎乎真人曰可畏哉可畏哉愚生過問是甚大怖子知怖活之根也子不知怖死之門也安危在子之身無於他所焉今雖每問天師而怖駭者又問乃訣乃大解不問又無緣得知之然子言是也暗而不好問何時復得昭昭哉行言欲問何等今謹已聞至誠動天願聞動地意善哉子言日益大深不惜之也行安坐為子道之不言恐得過於子若天獨疾後世人不至誠而使真人來主問之也諾今為子説之明聽唯唯行人之至誠有所可念心中為其疾痛故乃發心腹不而食也念之者心也意也心意不忘肝最仁故目為其主出涕泣是其精思之至誠也精明人者心也念而不置者意也脾也心者純陽位屬天脾者純陰位屬地至誠可專念乃心痛涕出心使意念主行告示遠方意陰也陰有憂者當報陽故上報皇天神靈脾者陰家在地故下入地報地故天地乃為其移凡神為其動也子欲知其大效吾不欺真人也真人但安坐深幽室間處念心思神神悉自來到此不明效證邪是吾告子至誠之信也吾未嘗空無法而説也故求道德凡人行皆由至誠乃天地應之神靈來告之也如不至誠不而感動天地移神靈也故承負之後下古之人實無信不至誠不而感動天地共欺天與地故神靈害之不止也願聞以何明之乎然有大明證於日月今願聞之然下古之人生於父與母而共忽其父母背叛其父母萬未一人而孝也得解蒙暗於師已覺去者忽其師不師為其師自屈折執勞苦也以貧賤得富貴於君而反相教下皆共日欺其上萬未有一人有誠信也群愚共欺其三綱名為反逆而無信也其罪過彰彰下可覆蓋皆上見於日月三光也故天地甚疾之惡之使其短命而早死也不自深十問過罪重反復哭而行也言天酷何一冤也汝乃自冤何時天冤汝哉可駭乎善哉善哉愚生已聞命矣然子而守此以為重戒則可萬萬世無患矣然辭小竟疑者復來問之唯唯右大集難道德至誠天戒以示賢妒道不傳處士助化訣第一百五十四真真愚暗日益劇不曉大不達之生謹再拜問一從事言之必為過不問又愚心不能獨自解行言之愚生竊聞祕道要德是乃天地之珍寶天下之珍奇物也故名之為至道不傳其非凡人所宜聞所宜言所宜用也而令天師都開太平學之路悉勑使人為道德要文不得蔽匿皆言其有天謫到死罪尚不除復流後世皆授以真道祕德曾不大哉令小人與君子不別愚生以為真道祕德不宜使小人聞小人言小人用之也咄噫子今且言有萬死之責於皇天后土不復除也自天地開闢以來後生日益薄妒道小人斷絶天地之珍寶以是為失積久故生承負令天災不絶常使天地內獨歲不平安災變盜賊衆多國家為其愁苦正起於是子今且所言是正是也亂天反地使治昏憒民難治正是也子今且語正與天為重怨錯哉錯哉亡子功矣何謂也今要道善德出之以教化小人得之守道德更相倣學不敢為非其中小賢得善道德可為良順之吏其中大賢可上為國家輔其中最下極無知者猶為善人夫天以要真道生物乃下及六畜禽獸夫四時五行乃天地之真要道也天地之神寶也天地之藏氣也六畜禽獸皆懷之以為性草木得之然後生長若天不施具要道焉安能相生長哉而真人言小人不宜聞要道不宜言不宜用也天地之神保終類人乃不若六畜草木善邪哉真人自知今且言有萬死之罪不復除也愚生事師日少淺不深知天道見天師言乃自知罪重上負皇天下負后土中負於大德之君然子退自責是也凡舉事可不慎乎哉皇天常獨視人口言何故使響隨人音為吉凶故響應不失銖分也子獨不常觀此天地之音證邪宜自慎不及勿強妄語其為害重子今且言至道不傳人何以傳知之乎終類至道不可傳天道無私但當獨為誰生乎弟子自慎戒事甚無狀子欲若俗夫小人復相教妒天道耶不敢不敢真人自精戒事天怒一發罪過著不復除也天道正由此言廢毀子復共增之耶帝王所以不能理其治而嘗多災者但由盡若子今旦可言因使真道道絶也邪道起故不可理也寧曉心解不乎唯唯已覺矣慚負天師不也常常慎事唯唯今念每言有過欲不言也又不知平言今人所不宜聞所不宜言所不宜用者何等也然凡人乃不宜聞非真要道非真要德是故夫下愚之師教化小人也忽事不以要祕道真德勑教之反以浮華偽文巧述示教凡人其中大賢得邪偽巧文習知便上共欺其君其中中賢得習偽文便成猾吏上共佞欺其上下共巧其謹良民下愚小人得之以作無義理欺其父母巧其鄰里或成盜賊不可止賢不肖吏民共為姦偽俱不能相禁絶覩邪不正乃上亂天文下亂地理賊五行所成逆四時所養共欺其上國家昏亂其為害甚甚不可勝記真人反言小人不宜聞要道要德反當以邪巧偽之事教化使天下人眩瞑共習偽非而不自知遂俱為無道耶是以真人有萬死之罪不復除也天下所不宜聞所不宜言所不宜用正不宜聞此偽文邪巧大猾所生正由此故吾為天陳法為德君作教不敢及之所以專開道德之門而閉絶狡猾階路也故吾書本道德之根棄除邪文巧偽之法悉不與焉子獨不怪之耶是乃天地以為病帝王以為害行復為真人具説之其以要道德以教化小人也上賢得以守儒良中賢德以上為國家至德之輔臣其中小賢化為順善之吏其中下愚猶為謹民不知相害傷故自天地四時五行日月星宿共以真道要德養萬二千物下及六畜糞土草皆被服其祕道要德而以得生長今若以真人今且言終類此人不若六畜及糞土草耶子今且言寧自知有萬死之過不除邪有死過有死過勿謝同不解耳今過言當奈何哉今欲解此過常以除日於曠野四達道上四面謝叩頭各五行先上視天回下叩頭於地唯唯今且天師教愚生何一急也然所以急者不以故真人也乃真人言得天地之忌太上中古以來人教化多妒真道善德反相教逃匿之閉藏絶之反以邪巧道相教導化愚人使俱為非其中大賢遠去避世獨其中小賢為吏無有真道亂其民其中下愚因為無道起為盜賊民臣俱為邪聚蚊成雷動共逆天文毀天道逆地意反四時氣逆五行使災怪億億三光失其正明帝王大愁苦之得昏亂焉治不得平安正由此也故真人寧知此罪重不天不除之也吾不教子當謝也故所以當於曠野者當於鮮明地所以四達道上者道者主通事所以四達者當付於四時天之使氣也且為子上通於天也四時者仁而生成且解子過於天地也後有過者皆象子也天從今以往大疾人為惡故夫君子乃當常過於大善不宜過於大惡慎之慎之子尚若此何況於俗人愚哉相教嫉妒道藏匿之是也子所言常善是今旦一言名為大逆天地從古到今人君所得愁也然真人前人安得生為君子哉皆由學之耳學之以道其人道學之以德其人得學之以善其人善學之以至道善德其人到老長乃復大益善良故懷要道善德之人乃名為帝王之處士人之第一上善者也能助君子化者也其不仕者為上謹之人學之人學之以惡其人惡學之以文其人文學之以偽其人偽學之以巧其人巧學之其中大賢者則巧言其習書者則巧文小人得之為猾民於子心寧可以教不哉故夫要道祕德乃所以承天心而順地意可以長安國家使帝王樂者也而反禁絶不以力化人有謫於天罪不除也天以至道為行地以至德為家共以生萬物無所匿無可私也故古者聖人象天地為行以至道要德力教化愚人使為謹良令易治今世反多閉絶之故愚人共為狡猾失天道不自知為非咎在真道善德不施行故人多被天謫當死不除也愚人無道不避忌諱遂共犯天地由不知道德要也吾之為書所以反覆勉勉眷眷者恐人積愚一言不信吾文故復重之也人俱習為邪久或反謂吾可言非也復令使真道祕德門絶斷不行天怒不絶帝長愁苦吏民無所投頭足相隨雲亂不能相救試誠冤吾辭於天正為解除此制作道也人人被邪文愚蒙積久故常勑真人使出吾道以付上道德之君以示衆賢疾試吾道乃知吾書之信與天地相似不用不試安知其哉今保吾道不誤故求試非一卷之文真人慎之唯唯行去常慎吾言勿自易妄語也唯唯出之無匿藏使凡人言語學問當知得失處不復妄為唯唯右解人常所不宜聞所不宜言所不宜用斷邪出真文事師如事父言當成法訣第一百五十五今愚生舉言不中天師心常為重謫過不冒過問又到年竟猶無從得知之願復請問一言平道之何所謙哉不知而問之是其數也今以第一上道要德以教凡人曾不大知乎善哉子言也何有大知之有乎子何故疑此哉吾聞子智過其父弟子智過其師臣智過其君則名為下賢智過於其上以為不宜今子言是也又非也今下智過於上者乃謂不當使下智為巧偽之法其智過其上則還欺其上子欲樂知其效比若教學巧家弟子智過其師則還害其師矣夫為人下習知猾偽姦道則下共還熒惑欺其上矣是故古者大聖賢不敢妄授教猾巧偽文道也常深念其本而斷其末不使愚人知之故以猾智知國國之大賊也故古者聖人常務授其真道不授浮華偽相巧弄之法也知其為害大深故常閉其凶學而務開其吉路使民常自謹不知為非子欲重知其信是故上三皇乃師事臣如父也時臣各懷真道要德無巧偽文猾人故其時臣智悉過其君能為帝王師其教若父故師父事之是則道德過其君之則也故能使其君安坐垂拱而無憂故言十中十可輔帝王言十中九可佐大臣言十中八可為小吏過此而下不足取策所言不中名為妄語亂誤上者也子知之耶唯唯行子欲重知其大效到于五帝道小衰故君臣道德不能復相問同門為朋同志為友所知君臣同不能復大相高上要道祕德小塞不通故無可師父事但朋友事之也到于三王師授者多妒學閉絶真道奇德其弟子日益愚蔽無知反多入浮文使君洽眩亂其道德淺薄不足父事不足友事故子事之其智少故不而為帝王圖難易故使天地大怒災變連起不可禁絶大咎在此子知之耶唯唯行子已覺矣復為子重明之今五霸其臣悉無真道德皆能作巧偽猾所以相欺詐者其臣多知邪猾佞偽巧所以相驚動惑之道或乃過其君因而反逆子殺其父臣殺其君下殺其上悉懷無義夷狄之心人人有巧偽之術各有姦心無有真道故數反逆故事斧鑽視臣若死籍乃其臣皆懷佞文多巧猾道不足重故視之若畜也是明效也故古者聖賢應天心娉真道德士仁人而放佞偽猾以稱皇天之心是故吾道悉開吉門而閉凶戶不敢及猾知可以過其君者也子寧曉知之耶唯唯慎之矣太上古之臣多仙壽故能使其君壽中古臣多知懷道德故能使其君常無憂下古臣多無真道而愚故多使其君愚甚君愚其洽常亂憒不得天心霸君之臣盡佞偽多猾巧詐共熒惑其君使其失天正路反入凶戶故與天為大怨子知之乎故其治悉凶不得大久真人為天問事宜日謹不可但恣意妄言言當成法言不成經不若默也舉言不中罪深不除唯唯行去子已知矣右智賢過其君難解訣神司人守本陰祐訣第一百五十六請問一大疑事行言之今天師廣開天道之路悉拘校古者道書之文以為真要祕道真道者多善其文乃入神故能睹神與神為治所治若神入神則真其道也乃多成於幽室或有使度於室中而去者或有一出一入未能去者或有但見神而終古不去者夫度去者萬未有一人大壽者千未有一人也小壽者百未有一人也竟其天年者比是也凡天下之人學問也萬未一人得上官也千未一人得中官也百未一人得小官也其於佃家活生萬未一人得億萬也千未一人得千萬也百未一人得百萬也凡事者皆如此矣故其本者衆多其度世及富貴者少也愚生甚憂之今為道當以何為大戒而得長成乎學問當以何為大戒而得到大官乎治生聚財當以何為大戒而得致富乎今不及天師力問諸疑恐終古蒙昧不復開通無以得知之也善哉善哉諸真人問疑事也天使子來問之諾安坐善問身聽今為真人悉道之使可知自隨而力記之唯唯行後世得吾文為其廣開真道之路必且俱學真道夫真道而多與神交際神道專以司人為事親人且喜善與不視人且驚駭與不俱爭語言於人旁狀若群鳥相與往來無有窮極或言人且度去或言人且富而貴或言人且貧而賤或譽旁人或毀旁人或使人大悅喜或使人常苦大忿夫神乃無形象變化無窮極之物也人為之能專心自守能不聽其言考心乃行閉口不傳其言又不隨為其愁怒喜固固堅守本不移務陰利祐人及凡物不欲為害以年一知道之後常為上善務利而不害傷求道為善到年窮乃止為是不敢懈怠萬萬度世一不耳萬得大吉一凶耳如此則群神轉共祐助人也使人日樂善不知復為邪惡也真人知之耶唯唯行子已知矣行為真人道其且亂敗者人用心意不專純又易喜易怒易驚易惑又易事輕口清辨慧常欲語善惡無可能隱匿遭者欲言不能自禁止於其如是則群神共來欺之或之小人則且上入祅言而死也或數爭辨口而妄言也或為鬼神所驚因而病狂也大用心意不專一人怒喜無常舉事失正惚恍無方或以是失其賢友善輔也因以危亡是者大咎在不愛利為上則不欲利其下聽邪神反欲害之故賢者使去反失其賢輔用其於小人也不欲尊重其上反聽邪神詐偽祅言妄語是即為道不成所以得凶之門戶也吾不能豫勝記之也凡人用心不能專堅密者易營或皆舉事不吉所為多害得凶其過失積衆多不可盡言但為真人舉道其大綱見其端首使賢明深見吾文自精詳隨而察之必已知矣真人寧曉不耶唯唯行子已大覺矣守吾文以為深戒以為行者萬世可無凶害誠故後世讀吾文書從上到下盡睹其要意義而行者萬不失一也守之不置自然畢也專心善意乃與神交結也邪心惡意道必失也大人不精聽耶或失其正位小人不精聽耶與祅結也此悉成身之害不可不大戒慎也凡人舉事有過皆自身得之也夫禍變近從胸心中出不以他所來也真人知耶唯唯可駭哉可駭哉子知懼駭於是可謂已得入真道矣愚生已大覺矣賢儀此以為行成事得長入吉門辟凶戶矣死生之路可長睹矣案此為行凶耶日遠去吉者來矣然子已知之矣不復重戒子也唯唯行為子道學而得大官者決意凡人學問也今日入學門用心專一常欲祐利愛而不妄語年少而學至老窮無復知乃止不樂得官也但身好學務欲得知經道積為善而不止行名立經道成深知古今災變所從起其行與學有益於上有利於下為善積聞不可闔閉名聞四遠明王好之因而徵索召取百姓俱言善哉俱言大吉是其人也旁人為其説喜是者即其善人學而度世者也真人知之耶唯唯為道敗成戒第一百五十七行復為子説道其不度者意今日入學門不樂思得真道善説但欲博聞多睹可以行窮極聖人者又不樂推行作善反好浮華之文可以相欺偽者或既得入經道又用心不專一常欲妄語辨於口辭以害人為職不尊重上不利愛下其行與經道實空虛未足以為帝王之良臣反行守長者旁人以財貨自助欲得大官以起名譽因而盜採財利以公趣私背上利下是即亂敗正治天地之害國家之賊也民之虎狼父母之惡子也天地憎之鬼神惡之故其罪泄見者時時見誅於帝王以稱天心以解民之大害也是其工欺而得官者也或有用心不專實空虛無真守反積常思欲得官官者乃天之列宿之官也以封有德賞有功也不以妄豫無功之人也無功之人天地所忽神靈所不好愛也下愚不能深自知惡反妄思得天官而不止邪鬼物因而共下其心使其妄語因而妖言不而自禁止也故時有邪言而死者此之謂也非獨為道不得其意則凶也凡人為行不欲樂善為悉凶也真人努力子幸有善意常欲愛利為事已度矣雖然真人凡人且度不度不在於前也其失皆在於後皆由不自愛自易自言且度反中有過而不度也故吾今説而不得中止者乃真人使吾説不得止也今欲中閉説而自易不言恐恨真人真人恨則上視天反且使天害吾故吾言不敢道自易閉學而中止也子知之耶唯唯行凡人之得害如此矣常得於未解不與本相應故失之也子既有大功於天努力努力唯唯不敢自易業學而道上也行子已知自度之術矣吾無以加之也行復為真人具説其人樂治家畜財得富貴者年少力能布作而長思為事力盡因乃止能揚善隱惡常用心樂為善栗栗思尊上凡疑悉慎戒之不敢妄為又愛下不欲害人不枉王法不樂隨邪禮相隨飲食也凡不急之事不敢與焉有知而為此行到老無知乃已雖實若虛口不輕語故能致珍物畜積因以成人也夫人賢不肖用意各異或有不善之人輕上害下好從邪禮不急之行數到巿道用口妄語不能忍非即凶亂危亡之人也非為道也子知之耶唯唯是故夫為道者專汝心閉汝口毋妄言也是故古者聖賢睹天法明故能行道守德也天乃專一晝夜行道而不言故能獨吉也地乃晝夜行道而不言愛養萬物故能長獨安也四時乃獨行道晝夜不止故能常獨興王而不止也三光乃獨行真道而不言故能常明隨天運行也五行乃獨行真道而不言故能與天地為常也凡天下之為道行者象此不可勝書也故能愛利口不妄言則道可得也欲輕忽事反吾文言者成為道所賊萬不失一也真人既遠來問疑故以戒子也得書思之惟之吾不負子也吾乃為天談以戒上德之君夫德君天與之必且好道百姓且象其君而為之皆以此文為大戒則可得吉而遠凶也出此之書以戒下愚慎毋藏之唯唯行去此説戒乃若小而反大若薄而反厚何謂也然念其辭言也若小耳其戒反大也念其言若類似俗辨士所為也則似薄不足傳也念其戒人成人則厚矣故念吾為真人作道其大也則洞至無表其小也則洞達無裏尊則極其上卑則極其下故上及神人下及奴婢所以然者欲使大人為之亦言足小人為之亦言足賢聖為之亦言足百姓為之亦言足何也願聞其意善哉子之難也得其意然吾乃為太平之君作經夫太平之君治乃當象天為法不可若小國但長於一界也是故天之為象法也乃尊無上反卑無下大無外反小無內包養萬二千物善惡大小皆利祐之授以元氣而生之終之不害傷也故能為天最稱神也最名無上之君也今上皇氣至德君治當象此為法故吾道一高一下一沈一浮欲使衆賢共察之也是故東南地戶乃有柱天之水不逆小流之力也善惡大小皆歸之真人知之耶唯唯行欲復説辭無極為其大文且小止息各歸思之於胸臆作道不得其意示之以南反問北用心如此則終古所學不得也不敢不行子已曉矣右集難道戒學治生成與不成吉凶何所起訣核文壽長訣第一百五十八願請問一疑事言之今願及天師問文之訣人之實長可與共事而終古無復厭之時豈可得聞乎然子欲核衆文知賢者處耶諾安坐為真人道之積文億卷不能得壽何益於命乎文書滿室而不能理平其治又何益於政乎臣子滿朝而不能為君致太平樂其上又何益於帝王乎一人生百子使父母飢寒又何益於親乎積方重車不能益壽又何益於人命乎説事無窮於不能為君除災患又何益於朝廷乎凡事類若此者衆多不可勝記也但為真人舉綱見始令諸賢柔自深察之耳願得其效子欲知之耶唯天師諾安坐自精方為子言之文書億卷中有能增人壽益人命安人身者真文也其餘非也文書滿室中有能得天心平理治者真文也其餘非也臣子滿朝廷中有能樂其君助其君致太平者是帝王之真臣良吏也其餘者佐職之臣子也人生一子而父母常得其樂而不飢寒者是賢孝之子其餘悉備數也積方重車中有能益年者是真方也其餘悉非也天下若此比類衆多不可勝記豫説也真人自深思其意吾文以一推萬足以明天下之道矣故令使真人付道於上德之君拘校凡文人辭聖書者明以示衆賢使一俱覺解迷與惑也已拘校凡文之後災日去矣夫邪文邪言乃是姦災之主人也夫正文正言乃逐除邪姦惡之吏也文已正言已正姦偽無主人則無於止宿也夫邪文邪言為姦主人比若盜賊有主舍止宿者主人已死亡盜賊無緣復得來止息也真人亦曉知之耶唯唯行天道之為法以一況萬亦不可盡書也真人得之自深惟思其要意賢明心有九孔易達見文自大覺矣勿復問也曾文唯唯文多使人眩冥不若舉其一綱使萬目自列而張也故萬民擾擾不若一帝王也衆星億億不若一日之明也柱天群蚑行之言不若國一賢良也天道廣從無復窮極不若一元氣與天持其命綱也賢者上德之君深思吾言壽自長也後世共思吾言自父慈子孝日廣且明也母愛婦順俱一國旦而賢良也大小爭為善後者無強也不知復有邪文佞人因以藏也災變盡除三光明也自然之術天神所共純行也為道如此乎大樂何有傷遂以為法乃天行也誰書記之是乃天地神明也以徵之文與天地響相應也是天合信符也上君賢者宜共察此辭行之者日興與時宜為期得天地之欲故吉哉陰陽順行風雨時萬變除去以徵書吾不自譽也誠知之不但飾言也宜疾效之真人知之耶唯唯行去矣行去矣精之詳之道自來唯唯男女反形訣第一百五十九願復請問一疑事言之天師前所賜子愚生書本文有男女反形願聞其意噫子書略已説可睹何故復問之乎心愚閉難闓示唯及天師訣問之諾安坐方為子言之天地之性陽好陰陰好陽故陽當變於陰陰當變於陽凡陰陽之道皆如此矣更相好故其開練日疾但宜以品訣之耳不可徑以示教人也且入邪中然子明聽陽者以其形反為陰形陰者以其形反為陽形正自以其身為其人形容也不可徑及也且中於耶唯唯若且曉而疑也噫子何一難示也但便以自身為其形陽者若陰人身也陰者若陽人身也唯唯子已知矣行去事可知唯唯右集難解凡文方訣簡賢得失實陰陽反形以致道包天裹地守氣不絶訣第一百六十願及天師請問一事乃止行言何疑哉凡道包天裹地誰持其氣候者深哉遠哉妙哉子之所問也何睹而問此有睹有見見天地之道獨不知窮極故怪而問之也善哉子之言入微意然天地之道所以能長且久者以其守氣而不絶也故天專以氣為吉凶也萬物象之無氣則終死也子欲不終窮宜與氣為玄牝象天為之安得死也亦不可卒得乃成幽室也入室思道自不食與氣結也因為天地神明畢也不復與於俗治也乃上從天太一也朝於中極受符而行周流洞達六方八遠無窮時也子思書言自得之也為神之階可見矣去世上天而治不復見矣子欲重知其明效也世不可得久有而獨治也故得道者則當飛上天亦是其去世也不肯力為道者死當下入地會不得久居是中部也故天地開闢以來更去避世聖文常格在而不見其人是明效也不死得道則當上天死則當下入地不得久當害中和之路也子得吾文自深思其意欲樂上行常生在與天并力隨四時天下祭祀而飲食者努力為真道是其汙法也若不樂常在而樂死者棄道隨俗亦將歸地下不得久睹天日月星曆也吾文萬萬不失一也故古者聖賢人盡去今無見者是其大效也子自思之樂上則上樂下則下無奪子志者也故吾為太平德君制作法度不限一人也夫太平氣來有一人自冤不得其欲者則上皇平氣不得俱來至也故天教吾廣開闢其路使得自恣自擇可為也賢明欲樂活者可學吾文思其意入室成道可得活賢柔欲樂輔帝王治象吾文為之可以致太平欲樂居家治生畜財者思吾文可竟其天年而終死故各為得其所願無大自冤者也故太平之氣得來前也平之為言者乃平平無冤者故為平也是故德君以治太平之氣立來也所以然者乃天下無自冤者各自得其所樂所以勑真人以付上德之君者上德之君其用心必仁賢而明明者不奪人所欲必得天下之心欲承天意以道歸之也真人知之耶唯唯署置官得失訣第一百六十一行且重戒真人一言使其有似天行也天之為行不奪人所欲為也地之為行亦不奪人所欲為也明君之為行亦樂象天地不奪人所為也與天地相似故能獨長稱天地得其心也子知之耶唯唯夫天且為惡其歲且大凶者常害人所為故民無可收也其歲凶飢寒也是故地將為惡也傷人所養其根不固而有病也其歲不成多傷民困窮也衰惡之君將凶署置不以其人所任職名為故亂天官犯天禁失天儀反復就責而罪之不原其力所不及人之所不及比若一旦使君王步行百里恐其不能到而道止也人所不及正是此也故不擇選人而妄事署其職則名為愁人而危其國也則名為亂治政敗也夫天地極神且明尚不敢奪人所欲為奪之則為大凶歲也何況人哉真人寧解迷曉耶唯唯誠得隨其國以師書授之因就其俗示之曉之解之行子可謂曉事之生天不奪人願也子行正自得天命年日益增何有窮已子學不求居世尊榮何復求索得天意而增年今已告子子今寧能説不耶然其受恩大喜無復有所恨但恐力極行以師文授教恐不能一旦而遍也何必一旦而遍但為之不止自舟流不久唯唯受嚴勑不敢雖繩墨子已知其意吾無復以戒子也行辭小竟事畢異日有疑乃復來唯唯右大集難問天地氣候為道與不吉凶君署置官得失文乘雲駕龍圖第一百六十二東壁圖第一百六十三著東壁上古神人戒弟子後學者為善圖象陰祐利人常吉其功增倍陽善者人即相冗答而解陰善者乃天地諸神知之故增倍也積德者富人愛好之其善自日來也人之所譽鬼神亦然因而祐助之好道者長壽乃與陰陽同其憂順皇靈之行天地之性得其道理故天祐之也失者亂故天不祐之也夫求善以善無可怪者學以仁得之道之始也以德得之道之中和也以道得之道之上也咄咄慎之慎之行無妄也極思此書傳之後世可無傷也隨四時轉道之上也善者自興惡者自病吉凶之事皆出於身以類相呼不失其身天道無私但行之所致故前有弟子後有善氣趣學不止令命得陽遂也或得長壽身不敗故為善乃於內外神反為其除害弟子居前主為其對物有自然天下之事各從其類也西壁圖第一百六十四上古神人真人誡後學者為惡圖象無為陰賊不好順事反好為害嫉妒令人死凶天道不可強劫劫必致兵喪威之死滅世亡道神書必敗欲以為利反以為害此即響應天地之性也乃致自然之際會審樂以長存慎之慎之無好無害善者自興惡者自敗觀此二象思其利害凡天下之事各從其類毛髮之間無有過差但人不自精自以不知罪名一著不可奈何不守其本身死有餘過乃為惡於內邪氣相召於外故前有害獄後有惡鬼皆來趨鬭欲止不得也因以亡身故畫象以示後來賢明得之以為大誡愚者不信道自若忽事書審如言不失銖分故守柔者長壽好鬭者令人不存物事各從其類不復得還雖悔之無益鬼已著焉見誡當覺以時自還今尚未傷固可得為善人善者乃上行惡者下降天道無私乃有自然故不失法也其事若神右著西壁神人自序出書圖服色訣第一百六十五吾本少學而不止精神念之涕常欲下為此積久蒙皇天大恩今日幸得逢天師人於曠野始學若虧司問小事外浮華也本求守一養性之法凡三百首乃見天師説而無極故敢問身寧可得長存與不見天師説而無極故敢問小政事見師説無極乃敢具問天地開闢以來帝王更相承負愁苦天災變怪訖不絶何以除之又群神無故共害人人不得竟其年命以何止之今受天師嚴教深戒之後宜何時出此止姦偽興天地道之書乎乙巳而出以付郵客而往通之者也後世歲歲在玄甲乃出之是天諸甲之首最上旬也與元氣為初乃以書前後付國家可以解天地初起以來更相承負之厄會也比付當以何字其文教積纍其字獨自深知之勿令泄皇天上和與第一之道也將傳與能往付者共分別解之比到玄甲使其憤憤如有求吾書者以守一浮華為前以付之已付郵客方士往付上有至德之君何謂也得而防行之即其人也不知行之即非其人也真人勿先出之也且天威怒反殺人也吾戒悉盡於是矣所以誠畏天有言也今天師教勑下愚弟子胸中慺慺若且可知不敢負也誠問著圖者畫神衣云何哉皆象天法無隨俗事也今不曉天法其人圖大小自以意為衣衣者隨五行色也今使母含子居其內以色相次也大重之衣五也中重之衣四也小重之衣三也微重之衣象陰陽二也大集之衣亂彩六重也願聞大重何象象五行氣相合也四重何象象四時轉相生也三重何象象父母子陰陽合和也二重何象象王相氣相及也六重何象象六方之彩雜也故天下有雜色也此之謂善哉善哉行去慎圖密文唯唯今弟子至愚且賤蒙恩得與天師文用日久凡事響且畢願更問一疑平言何等也今見天地開闢以來文書前後出非一乃積多復多河洛出之今此書何不須河洛出之乎善哉善哉子今難也天使子言可謂得其意矣今天悉使吾為帝王人民具出陳承負之責會也文書積衆多不可以河洛出之也夫河洛文書文多當見其策文多難以策悉知之故天因人出之也天乃深知吾而為其言知而具難問故反使子與吾共傳其要言也子亦自知學而不得道心真人為何來哉今愚蔽暗不自知也右問閉藏出其圖畫衣服文位次傳文閉絶即病訣第一百六十六子為天來學問疑吾為天授子也願聞其訣意以何明之也其以又明之云何哉今有德之君得吾書心解行之與衆賢共議以化凡民必與天立響相應是其明證也吾道以誡成不設偽言行已訣矣唯唯弟子無狀數愁天師不也子不好問亦無從知之也吾含此學久矣無可與語者故不得以時傳之今使人不知白黑其過在吾也今得傳真人問誠喜甚喜比若春得登臺而出見天無異何乎哉天怨結有劇病變不絶此其悒悒不通得與子言喜也天師何不自往與之位次不得也吾位職在天真人位職在地地者出萬物故天生者於地養之故吾傳道於真人地生君王凡民萬二千物悉得陽施從陰中出故子得傳於人善哉善哉愚生大自怪當得此響不力問天師無由知之也但猜疑故也敢冒過問之耳善乎是名為曉事之生是亦非獨子力也實天授子心使其言也今蔽塞不自知行今使子大自知照若日月之光子以吾言不誠信也夫天雖欲有所出不與人語難知情吾書承天教令明丹青也子為不然今私匿閉絶吾文而不以時出之天即且病子災子子或遏之猶不出子已凶矣是其天使子來學問明證也使真人出之明信也善哉善哉真人重戒慎之唯唯今天師職在天覆加不得已欲復請問一疑不敢言乎行今凡天事皆為天使有所傳耶獨天師與愚生邪噫子益愚何知天下凡物皆為天使故各有所職共成天道也一物不具足即天道有不具者子何故乃不知是乎其冥冥何劇也愚蒙未悉開得天師解之昭然行子亦易示矣行弩力勉之凡民各有所職乃復為天使物敢獨自勞自然也不敢不敢行去矣經文部數所應訣第一百六十七天數之始也是故天地未分之時積氣都合為一分為二成夫婦天下施於地懷妊於玄冥字為甲子布根東北丑與寅始見於卯畢生東南辰與巳垂枝於南養於午向老西南未與申成西方日入酉畢藏西北戌與亥故起數於一十而止十者十干之始五行之本也數以一乘十百而備是也故天生內百日故畢終是故斗建於辰破於戌建者立也故萬物欲畢生破者敗也萬物畢死於戌數從天地八方十而備陰陽建破以此往來復其故隨天斗所指以明事吾書乃為除害氣故象天為法右問天師書文徵信明訣來善集三道文書訣一百二十七六方真人俱謹再拜前得天師教人集共上書嚴勑歸各分處結胸心思其意七日七夜六真人三集議俱有不解三集露議者三睹天流星變光一者見流星出天門入地戶再者見流星出太陽入太陰三者見列宿流入天獄中因三并而共策之恐天師三道行書為下所斷絶使不得上通復令天怒重忿忿上皇氣不得來也令帝王道德之君固固承負先王餘災不絶而得愁苦焉咄咄六真人為皇靈共來問事益精進天焉哉吾見諸弟子言無可復以加諸真人也今試自説其流星意六弟子愚蔽敢不言初始一流星出天門入地戶天門者陽也君也地戶者陰也民臣也今民臣其行不流而上附返上施恩於下夫門戶乃主通事今下戶不上行返上門通門而下知為下辭會見斷絶不得上行也善哉真人言吾無以加之也行雖苦復説二事唯唯二事見太陽星乃流入太陰中太陽君也太陰民臣也太陽明也太陰暗昧也今暗昧當上流入太明中此比若民臣暗昧無知困窮當上自附歸明王聖主求見理冤結今反太明下入暗昧中是象詔書施恩下行者見斷絶暗昧而不明下治內獨亂而暗蔽其上也又象比近下民所屬長吏共蔽匿天地災變使不得上通冥冥與民臣共欺其上共為姦之證也善哉善哉吾無以加六子言也行雖苦復説其三事唯唯三事見列宿星流入天獄中夫列宿者善正星也乃流入天之獄獄者天之治罪名處也恐列士善人欲為帝王盡力上書以通天地之談返為間野遠京師之長吏所共疾惡後返以他事害之故列宿乃流入獄中也善哉精哉吾無以加六子言今六子問事乃何一怒也獨不懈倦耶不敢也常見天師言真人為天來問事今欲止恐天辭不通今凡人命屬天地天地不喜返且害病人則不得竟吾天年壽矣善哉真人之言是也不失之也今吾為諸真人説亦不敢遺懈止也吾與諸真人等耳俱命屬天地若閉不説説而中止也天地同且害我故我説亦不敢妄道止也行且為六真人具説之今六真人新出穴為天思可以除天病者為有德君思可以除解災安身者六真人極共説其意盡心所欲言者令使不得閉絶唯唯天師所勑不敢不盡雀鼠之智悉言之不也大慊唯唯今天下所畏口閉為其不敢妄誕今日月星曆親天之列宿神也尚相畏是故日出星輒逃匿不敢見畏其威夫四境之內有嚴帝王天下驚駭雖去京師大遠者畏詔書不敢語也一州界有強長吏一州不敢語也一郡有強長吏一郡不敢語也一縣有剛強長吏一縣不敢語也一閭亭有剛強亭長尚乃一亭部為不敢語此亭長尚但吏之最小者也何況其臣者哉皆恐見害焉各取其解免而已雖有善心意不敢自達於上也使道斷絶於此今但一里有剛強之人常持一里之正者一里尚為其不敢語後恐恨之得害焉但一家有剛強武氣之人常持政尚一家為其不敢語也一家尚親自共血脈同種類而生尚乃相厭畏如此何況異世乎今太上中古以來多失道德反多以威武相治威相迫協有不聽者後會大得其害為傷甚深流子孫故人民雖見天災怪咎駭畏其比近所屬而不敢妄言為是獨積久更相承負到下古尤益劇小有欲上書言事自達於帝王者比近持其命者輒殺之不即時害傷後會更相屬託而傷害之故民臣悉結舌杜口為喑雖見愁冤睹惡不敢上通故今帝王聰明絶也而天變日多是明證效也今民親得生於父母受命於天地以天地為父母見其有災變善惡是天地之談語欲有此言也人尚皆駭畏且見害於比近所繫屬者不敢語言泄事乃相勑教共背天地與共斷絶不通皇天后土所欲言也共蔽冤天地乃使其辭語不通天地長懷恨悒而不達今帝王雖神聖一人之源乃處百重人之內萬里之外百重之內雖欲往通言迫脅於比近不得往達也夫帝王雖有萬萬人之仁聖人各迫劫畏事天地極最神聖人乃仰視俯睹尚倚之當前自解而已帝王安能神聖於天與地乎愚生六人常逢猛虎於遠方間野六人俱止足不敢移口不敢語頭不敢動目不敢瞑夫人之所迫脅所畏如此矣善哉善哉今見六真人言承知天獨久病苦冤辭語不得通雖為帝王作萬萬怪變以為談下會閉絶不得上達獨悒悒積久今故風諸真人教其丁寧勑此行書之事故諸真人悚悚倦倦是天使也諾諾吾其畏天威方為子思惟其要意而具説今之六真人問此事常何一最劇也愚生六人七日七夜共念此行書事三集議三睹流星以為天告人教勑使人問也又六人俱食氣俱咽不下通氣逆而更上當此之時耳目為之眩瞑無睹俱怪而相從議之不知其為何等大駭驚怖唯天師為愚生説之善哉諸真人古變得具意見諸真人言乃知三道書真人會且復見閉絶何乎願聞其意決然夫九竅乃象九州之分也今諸真人自言俱食氣乃㘉不通眩瞑無光明是九州大小相迫脅下不得上通其言急事也夫氣者所以通天地萬物之命也天地者乃以氣風化萬物之命也而氣㘉不通者是天道閉不得通達之明效也天欲使真人丁寧此事故以此氣動感真人也子知之耶唯唯行子已知之矣諾天告六真人教吾極言耶六子安坐為諸弟子悉説之道之為畏其州郡長吏不敢言者一州中諸善士賢明相索共集議於他州上之畏其郡集議於他郡上之畏其縣集議於他縣上之畏其鄉亭集議於他鄉亭上之畏其里集議於他里上之皆悉在方其禁畏人者以其所上罪變怪輕重罪之復加故罪一等何其重也不應重也尚恐其輕今天地愛有德帝王欲為其具談人生於天地乃背天地斷絶天談使天有病乃畜積不除悃悒不得通言報其子是一大逆重罪也夫民臣乃是帝王之使也手足也當主為君王達聰明使上得安而無憂共稱天心天喜説則使君延年今返居下不忠背反天地閉絶帝王聰明使其愁苦常自責治失正災變紛紛危而不安皆應不孝不忠不信大逆法不當得與於赦今何重之有乎天談不得通天地大怒賊殺凡物乃為毀天地乃為太凶之歲國斷無聰明乃為大危之國此罪不可復名故為當死過也真人知之耶唯唯行子已知之矣吾所以敢不者見六子來問事致承知為天使諸真人故敢不也子知之耶唯唯今不之名為誤上也德君見文皆令勑上書者使其大有功者德賜之也如此則天下莫不歡喜樂盡其力共上書言事也勿得獨有孤一人言也皆令集議一人言或妄偽佞欺名為使上失實不可聽大過也比連年上書比比有信有大功者上士之人衆集者常病不多兩三人集固固有有姦偽多者無姦偽何也願聞之然多者則其上書者便自傳相畏恐事漏泄見得長短反為欺上為傍人所上故盡實核乃敢言之也不不敢言又不敢有可隱皆畏恐有後事是故悉信也比若一里百戶共欺也男女小兒巨人會有泄之者旁里會有知之者其里賢明畏事者會不敢匿恐坐其事何況乃一州一郡一縣一鄉一亭郡有非常事陽陽何可隱猶為旁人所得長短故善惡都畢出天乃大喜災除去與流水無異也子知之耶唯唯又大集議無敢欺者一兩人欲欺餘人會不從之也有欲欺不信者即時衆共記之上之其法應為背天地欺帝王詐偽大逆不道之人也天怨之人惡之其罪不得與赦也真人知之耶唯唯行子已覺矣已行上書還反其家有怨其行上書欲害者即左方之名為怨章罪過不除如是則三道行書已通無敢閉絶者也如是則天地已悅矣帝王承負之災厄已大除去天下太平矣上皇氣悉來到助德君治矣不負六真人也唯唯行六真人精已大進為天除病矣為帝王除厄會矣功已著於天矣王者已日強明矣六真人為善已得其數矣宜勉力慎之慎之唯唯願問一大訣惟天師示之欲知行書乃出入究洽於神靈未豈可聞乎然自有大驗天道不欺人也各以其類相求索令德君數遣信吏問民間有疽癘疥者無有者多少有疽癘疥者行書未究洽於神靈自苦有餘蟲食人蟲乃食人即蟲治人也固固下有餘無道德臣民比若蟲矣反食於人是使蟲治人之效也無有疽癘疥者即皆應善人在位無復蟲也此者萬不失一善哉善哉獨以此明之耶復有餘耶凡天下災異皆隨治而起各有可為但精思其事且自知之也何獨以疽癘疥言之乎其餘災尚但見於萬物蟲反食人最劇故以效之也善哉善哉嚮不力問於天師無從得知之也觀諸真人今且説已自知之矣但引謙耳不敢不敢愚生六人重得天師嚴教各歸居便間處惟思其要意今天師書文悉使小大下及奴婢皆集議共上書道災異善惡曾不太繁耶哉異生願聞其意善哉子六人為天問事詳慎乎天使諸真人言也然所以使下及庶人奴婢者今天之法界萬里異天地五千里復小異千里異風氣五百里復小異百里異陰雨五十里復小異一縣異變災怪善惡也夫皇天有災怪變非必常當處帝王之宅縣官之庭長吏之前也災變異之見常於曠野民間庶賤反先知之也各為其部吏諱不敢言吏復各為其君諱而不敢言反共斷絶天地談人人欲譽其長吏使其名善而高功疾遷共作無道互天地之災異變怪令閉塞不得通達帝王之前使帝王無故斷絶無聰明不得天地心意其治危亂難安得愁苦焉夫帝王天所父命生以天為以地為母帝王為天子民臣共為無道乃斷人父母談語不得通於其子其罪莫大焉為共斷絶天地之談共欺其上為人民臣不忠信遇乃如斯罪當輕重寧可名字耶子覺未唯唯又凡民臣奴婢皆得生於天長於地得見養理於帝王以此三事為命無此三事則無緣得生長自養理也而反下皆共欺其上共無知天與地使帝王無聰明閉塞罪皆應萬死尚復有餘罪何其重也真人其愚暗不解何哉人得生於天長於地天地愁苦有病故作怪變以報其子欲樂見理愚民反共斷絶天辭天地大怒之帝王民臣之父母也民臣反共欺其父母使其常用心意愁困而不能平其治咎莫大焉天地開闢已來承負之厄會大積悉起於是故使民間上書也今陽明德君治天難愁苦之故使吾言也善哉善哉行今為真人道之今天下日蝕極天下之大怪也尚或有睹或有不睹天下之災異怪變萬類皆天地陰陽之變革談語也或國不睹而州睹或州不睹而郡睹或郡不睹而縣睹或縣不覩而鄉亭睹或鄉亭不睹而民間人睹或甲里不睹而乙里睹故古者賢聖之治下及庶賤者樂得異聞以稱天心地意以安其身也故其治獨常安平與天合同也今太平盛氣至有一事不得輒有不和即天正氣為不至比若愚民竭水而漁蛟龍為不見此之謂也今故悉使民間言事乃不失天心絲髮之間乃治可安也民間自力集上書部諸長吏亦且恐後民言事且力遣吏問民間所睹疾復上之則變災無有失也如是皇天后土為其大喜愛其帝王以何明之乎然有證乃日月為其大明列星守度不亂錯行是天喜之證也地喜則百川順流不妄動出萬物見養長好善也即是地之悅喜之證也真人知之耶唯唯天師幸哀愚生得其事者進問緣見待厚乃得悉問所疑今使民間記災變怪云何哉然善乎子問事也然當見之時支日晏蚤戶記之月盡者共集議之可上而上之未足上者復待後月災異如此縣邑長吏且取晏蚤之時於民間也則可謂為不失天之災絲髮之間也吏亦畏民民亦畏吏兩相畏恐所上皆得實不失銖分之間則令帝王安坐幽室無憂矣民臣百姓大小盡忠信得達其情實矣天下莫不歡喜如有止者即共記之皆應姦臣不忠孝之民無知天地共欺其上使上聰明斷絶是大過也故當共急記之真人知之耶唯唯行去有疑來問之今六真人俱歸慕思惟天師使長吏民間共記災異變怪皆當共記何等者哉善乎六子問事詳善不失天心不負德君是為有功於天地萬物莫不被蒙之也所以然者乃其為天問事悉究竟詳善故不失銖分天地陰陽三光五行四時神祇萬物所欲言悉得見故為大有功也子知之耶唯唯行今為六真人陳之詳自隨而記之唯唯然夫大災異變怪者是天地之大談也中災異變怪者是天地之中談也小災異變怪者是天地之小談也子欲樂知其大意要比若人大事大談中事中談小事小談此大小皆有可言也不空見也天地不妄欺人也見大善瑞應是其大悅喜也見中善瑞應是其中悅喜也見小善瑞應是其小悅喜也見大惡凶不祥是天地之大怒也見中惡凶不祥是天地之中怒也見小惡凶不祥是天地之小怒也平平無善變亦無惡變是其平平亦不喜亦不怒子知之耶唯唯災異變怪大小記之勿失銖分也何其悉詳乎真人何其愚也過大小盡當見知善惡大小亦悉當見知也善者當謝其功以善踰異之過者數讓之以稱天地之心意子欲知其效者天比若人君長也一小言不見從則小恨更中言中言不見從則更大恨更大言則為害矣故當大小記之不當使天地恨怒也善哉善哉願聞所記意記變怪災異疾病大小多少風雨非常人民萬物所病苦大小皆集議而記之所以使其共記之者吏自相知長短民民自相知長短迫近山阜而居者知山阜變近巿城郭而居者知巿城郭變近平土而居者知平土變近水下田而居者知水下田變高下外內悉得知之故無失也是立致太平之術也而帝王所宜用不失大心之法也真人知之耶唯唯行子已知之矣天地開闢以來所以多承負之災者由其記事不及民間大小共集記之故也有變怪反乃他所長吏來行之比近各為其部界長吏諱不言共匿之因使天地辭語斷絶不得上通達其帝王為害甚深令天悒悒災為之復增益咎在此也他所長吏來考事安知民間素所苦者乎或相與厚善反復相與共隱匿之或得素有所不比之家反復增加災妄增益其事故之也共匿之則使天地談斷絶加故共冤無罪之人復令下比貨財相隨此三事皆為大害冤結氣復更增其災害也故其治殊不可平也令夫太陽興平氣盛出德君當治天下太平莫不各得其所者是故六真人來為其具問事吾為其悉語也子知之耶唯唯是故天將興祐帝王皆令自有意從古到今將興祐之輒為奇文異策令可案以治故所為者悉大吉也將不祐利之悉斷之奇文異策使不得之也如得之又使其心愚不知策而用之也將興利之使其心曠然開通而好嬉用之也此者天之格法也不欺人也故凡人將興者多好善將衰者多好惡也將吉者易開導也將凶者好抵冒人也不可開導也真人知之耶唯唯是故天者常祐善人道者思歸有德故天者不肯祐惡人道者不肯附於愚蔽人也故常勑真人以付歸有德之君也所以悉記其災異變怪大小善惡外內遠近者欲令上有德之君與衆賢原其災異所起夫天下變怪災異皆象其事法其行緣類而生衆賢共集議思之曠然如其意以其事類考問之則得之矣則天地日為其大喜帝王日為其大安如此則德究洽於神祇莫不饗應欲知其大效天下所疾苦災異悉盡民臣悉善應詔書而行不失銖分下不欺其上之明效也有餘多害自若多欺者少害少欺者無一餘害無一欺者常安觀下所上以占民臣大小忠信與不以其事對之比若窺明鏡相對而面語神哉為道如斯此乃天祐上德之君子其治天下之明鏡也真人知之耶唯唯行去付上德之君急急一人獨上書名為投書治事付一信名為大欺與皇天為重怨天道為其常亂也二人共上書名為太陰合姦共欺二猾人固固相勑戒或共有可怨惡共上之共為虛偽也與地為咎地道為其大亂也三人共上書固固尚不實三人固固可相勑教共有所疾共上事以公報私固固為共欺其上也與中和為仇令和氣大亂也四人共上書中輒有畏事不真者為傍人所得長短為罪名固固耶將似類真也其不信者亂四時也五人共上書似真未信也其不信者輒亂五行也六人共上書將真未信也其不信者輒亂六合也七人共上書似信八人近真九人近實十人而小今天師何其疑之多也願聞其要意然所以疑之多者或五方好猾人俱自有私怨咎以公報私固固可共相與為大欺猾姦人亂天地道而誤上故未疾純敢信之也但為小是故使衆人老小賢不肖男女下及奴婢者大小集議不可得以偽其以公報私也中會有不安而言之者或有不肖或有輕口不能匿或有老人壽在旦暮不復忌諱或有婦女小兒行言不能隱匿共為姦也故其事會泄故無姦悉得真也得真則天地心調真人知之耶唯唯本帝王所以連連相承負之過責治常失天心流災不絶絶者復起皇天不安多害氣疾病不得久大樂須臾樂者復惡其大咎正在此猾姦人共背天地而欺帝王人乃以天地為命以帝王為父母愚人及背其命而共欺其父母故天地共憎之帝王惡之其法惡死有餘罪當流後生也是故災不絶害日多人壽日少萬物常亂也正咎在是也豈真人已大覺重知之耶唯唯子可謂已知之矣是故吾知皇天深疾惡是故吾使是文復重為其平遺失其一事一事可起失之于前得之于後此事尤重天大惡之也吾知其以示勑真人以付歸上道德之君得而行之與神無異也乃且太平上皇正氣立自來也吾之文不敢負天地不負上德君不負後生下古之人不負萬物行之立效善哉善哉願聞一人上書何故亂天二人何故亂地然此者各從其家并策相應者相感動此自然法子知之耶唯唯行子已知之矣天下之事各從其類也願問天師今應此文言為之寧能盡實核天下悉信耶然天下悉信矣願聞其意然且語真人大要説今是主者長吏亦畏民泄其事而生之六考問長得其信也民亦畏縣官得其短亦復信也縣官長吏居民亦畏行於他方上書者得其短亦信也行上書者亦畏縣長吏居民得其短也亦信也更相畏非敢有妄語者也亦非有可隱也是故使三處上書縣官與居民與行者悉旦三相應不失銖分也神哉為道如此願聞到也所集議人當於何期乎善哉子之言悉記於太平來善之宅下何必於此然其有奇方殊文可使投於太平來善宅中因集議善惡於其下而四方共上事也為一人議中悔而止或為旁人所止上書便在方道中止意以其所匿事罪之如此書者天下已得矣帝王已長遊矣善哉善哉今天師文積備多當盡何投之其文獨為上出者止於上悉為天下事出者悉出之子知之耶唯唯行去夫上德之君天自使有聖心且緣是自有善意自有善令儀此為天法不失絲髮也事亦不可勝記常苦文行去唯唯右天告六真人使重知三道行文書訣長存符圖第一百二十八天符還精以丹書書以入腹當見腹中之文大吉百邪去矣五官五王為道初為神祖審能閉之閉門戶外暗內明何不洞覩守之積久天醫自下百病悉除因得老壽愚者捐去賢者以為重寶此可謂長存之道獨貴自然形神相守此兩者同相抱其有奇思反為咎子失自然不可壽也嬰兒五精還自保也作來善宅法第一百二十九六方真人再拜願有所問一疑行言之今天師前所勑愚生拘校上古中古下古之要文及究竟賢明之善辭口中訣事也今四境之界外內或去帝王萬萬里或有善書其文少不足乃遠持往到京師或有奇文殊方妙術大儒穴處之士義不遠萬里往詣帝王衒賣道德或有黎庶幼弱老小田家嬰兒婦女胸心各有所懷善字訣事各有一兩十數少少又不足使人遠齎持往詣京師或有四境夷狄隱人胡貊之屬其善人深知祕道者雖知中國有大明道德之君不能遠故齎其奇文善策殊方往也今天師言乃都合古今河洛神書善文之屬及賢明口中訣事以為洞極之經乃後天地開闢以來災悉可除也帝王長遊樂垂拱無憂也言一事不足備輒有餘災故當都合之今不知當以何來致此奇方殊策善字乃悉得之善哉善哉諸真人思念劇也天神已下告諸真人矣上皇之氣來祐助道德之君矣行真人今乃為皇靈天具問事吾職當為天下具談何敢有懈焉諾諸真人安坐方為真人悉説之唯唯以此書付歸上皇道德之帝王見天文必思其要意勑州郡下及四境遠方縣邑鄉部宜各作一善好宅於都巿四達大道之上也高三丈其中廣縱亦三丈為四方作善踈使與人面等其踈間使可容手往來善庇其戶也勿令人得妄開入也懸書於其外而大明其文使其書其宅四面亦可也其文言帝王來索善人奇文殊異之方及善策辭口中訣事人胸心常所懷所能言各悉書記之投於此宅中自記姓字已且徵索之各以其道德能大小署其職也所言多少其能不可徵者且悉勑所屬縣邑長吏以職仕之也其老弱婦女有善言者且勑主者賜之其有大功而不可仕者且復之也四境之外其有所貢進善奇異策用之有大效者且重賞賜之也如此四境外內一旦而同計大興俱喜思為帝王盡力從上到下從內到外遠方無有餘遺策善字奇殊方也人皆一旦轉樂為善也隱士穴處人中出遊於都巿觀帝王太平來善之宅無有自藏匿者也風雨為其時節三光為其大明是天大喜之效也四夷八十一域中善人賢聖聞中國有大德之君治如此莫不樂來降服皆齎其珍奇物來前後成行吾之書萬不失一也豈不大樂哉大德之治如此諸真人寧解曉之耶唯唯然子已覺矣於其宅中文太多者主者更開其宅戶收其中書文持入與長吏衆賢共次其中善者以類相從除其惡者去其復重因事前後齎而上付帝王帝王復使衆賢共次去其中復重及惡不正者以類相從而置一間處復令須四方書來前後次之復以類相從復令須後書至也其四方來善宅已出中奇文殊方善策者復善閉之於其畜積多者復出次之復齎上之於四方辭旦日少畢竟也所上略同使衆賢明共集次之編以為洞極之經因以大覺賢者乃以下付歸民間百姓萬民一旦俱化為善不復知為惡之數也此所謂畢得天地人及四夷之心大樂日至并合為一家共成一治者也六真人豈知之耶唯唯行六真人已知之矣夷狄聞之日自卻去中國日以廣不戰鬭伐而日強也天地助其除惡是為天地開闢以來未常有也是故天下大喜也天地神靈共除帝王承負也災變已消去其治與神無異也天下人且大得道德奇方皆思善文正字不復為邪惡也所上且歲益善於其後三歲一小録五歲一大録次之此以下附歸於民間也使其各好為善不能自禁止也取其中大善之事有益於帝王正治者留之勿下之也真人知之耶唯唯然今真人天使諸弟子問是今既為天問事乃為德君作大樂之經努力勿懈也天且報子功子乃為皇天后土除病為帝王除災毒承負之厄會子明自當增算吾言不敢欺真人也慎之唯唯行去歸努力精行有疑者來唯唯真人前子前問事之時吾欲去久矣故中與子斷訣之文見子惓惓知為皇天祐陽精所以然者見真人精中國當大興平八十一域善人當降來歸中國故吾為子更止留悉究竟説之也所以然者見真人為天問事不止反恐得大過於子得謫於天地故不敢棄道而中去也真人知之耶唯唯行努力精卒之勿棄天道問一訣也唯唯願請訣事言之天師何睹正於都巿四達道上為太平作來善文奇策密方之室乎善哉真人之難問也得其大要意天積悒悒帝王使子難問耶其投辭何一工也然吾居天上觀之有可覩見不空妄作此皇平之宅於四達道上也天公問天下何故難平安哉五行神吏上對言今帝王乃居百重之內去其四境萬萬餘里大遠者多冤結善惡不得上通達也奇方殊文異策斷絶不得到其帝王前也民臣冤結不得自訟通也為此積久四方蔽塞賢儒因而伏藏久懷道德悒悒而到死亡帝王不得其奇策異辭以安天下大咎在四面八方遠界閉不通今故承天心意為太平道德之君作來善致上皇良平之氣宅於四達道上也欲樂四方悉知德君有此教令翕然俱喜各持其善物殊方來付歸之於上無遠近悉出也無復斷絶者也善哉善哉響不及天師力問不得知之也然真若真人言也夫人天性自知之其上也不能自知之力問亦其次也子知之邪唯唯願請問一事言之何故必使其廣縱三丈高三丈乎哉善乎子之言也一者數之始也天數亦終於十地數亦終於十人數亦終於十故使三丈也欲樂合天地人使其俱悅喜也故象天地人為之也今請問三數何故俱十乎哉然天有五行亦自有陰陽地有五行亦自有陰陽人有五行亦自有陰陽也故皆十善哉善哉今獨天地人如此邪哉然萬物悉如此邪哉然萬物悉象天地人也故天地人皆隨四時五行為盛衰也真人知之邪善乎善乎然子可謂已知之矣願請問一事言之今何故必為其四方作踈與面齊者然踈者欲使賢儒策之也踈者樂四方踈達不復閉絶也欲使賢者各踈記其辭投此太平來善之室中也與面齊者面者最人之善者也太陽之分象天道也樂人各順天心思為善與德君并力共平天下也故使與面齊面者有七正耳目口鼻可以通氣神祇往來樂大賢策之使四方八極遠境聰明悉來至也今帝王雖居百重之內與民相去萬萬里光明教令悉暢達也不失天地之心以安其身善哉善哉願請問當使何吏守此宅哉長吏直署唱名為太平之宅樂善之吏也善乎愚生知天已大喜矣地已大悅慎行也人已太平理矣萬物已得其所矣今真人何以知之乎愚生見天師為太平德君制作大樂之宅以通天地人之談語今使下民臣各得奏上其辭於其君令帝王得奇策異文殊方可以長自安全者又天地得通其談語百姓下賤得達其善辭以解天地悒悒以助其君為聰明天地與人為凡物之長也乃得悉通達故大樂也真人説是也善哉吾無以加之也子之言事大入真道矣願請問一疑言之今天乃悒悒欲言何故返使人談哉善乎子之難問得其意然夫天道乃轉而相因更相使也故兌為天地之口人亦然故以類相求故人為天地談也真人知之耶唯唯行子易開哉勉力勉力唯唯然辭小竟勿復問令道文難知反益憒憒也唯唯行戒真人一事為已校書文殊方也卷投一善方始善養性之術於書卷下使衆賢誦讀此當為洞極之經竟者因各集此方以自養誦此術以自全令各樂得久存上賢可以為國輔中賢可為國小吏下小人不能仕者可長養其親而久守其子孫善哉善哉天下大樂悅也為善無雙無復惡人也子已知之矣行去思之念之既為天問事勿懈唯唯右求善以致太平令天下一旦合心上皇大樂之宅文八卦還精念文第一百三十玄明內光大幽多氣與賢同位壬癸之居亥子共身周流相抱極陰生陽名為初九一合生物陰止陽起受施於亥懷妊於壬藩滋於子子子孫孫陽入陰中其生無已思外洞內壽命增倍不可卒致宜以長久少陽有氣與肝共位甲乙寅卯青色相類萬物之精前後雜出仁恩心著勇士將發念之覩此字光若日之始出百病除愈增年三倍太陽盛氣與心相類丙丁之家巳午養位覩之百邪除去身日以正宜意柔明大不可強求見字而壽光若日中之明中和之氣與脾相連四出季鄉乃返還戊己中居辰戌丑未為根舉順之而思其意還以治其病精若黃龍而見此字其病消亡增年五倍令人順孝臣愛其君子愛其父少陰之旬與師精并靈扇出氣位屬庚辛申酉義誅猾邪盜賊不起邪不得害人腎盛之氣增年百倍極陰生陽其國大昌常而思之不知死亡陰上陽起故玄武為初始龍德生北位在東方故隨其後朱雀治病黃氣正中君而行之壽命無窮升執其平百邪滅亡八卦在內神成列行白虎在後誅禍滅殃正道日到邪氣消亡思精而不止延年之紀身而服之何憂之有下承其上名為順道無有謫過萬病自愈念字覩形容愛若父子令人常喜洞照無已審而用者其效立可待長與書俱日與神遊道以自然為洞虛無一旦自來其道仁良子為之孝臣為其忠信知則令人愛其身不敢妄言守而不止命無窮焉書不空出與道連思深知其意神自來焉初端形念字反得道元精得神明因無自然天道萬端在人可為道成其事不為非患人不力為正氣何從得來行而不上日吉遠危大人為之其國太平小人為之去禍招福形思之幽處趣具成子而守道亂何從得生思念而不止自太平心中不亂無邪傾守之不止日自生道不妄出付有德歸其人右升平八卦六甲追道還精念文冤流災求奇方訣第一百三十一真人前子學是凡事積之當知天下大訣分理後乃言事無復有疑也今見凡人死當大冤之叩胸心而呼天自投劈而告地邪不當邪宜自精道之令使可萬世誦讀以為常法而不可復忘也今天師有嚴教愚生敢不強一言也平行勿疑也然人死者大劇事當大冤之叩胸心自投劈也力盡長悲哀而已此亦無傷生也當冤何等人哉皆當冤之何也夫人死者乃盡滅盡成灰土將不復見今人居天地之間從天地開闢以來人人各一生不得再生也自有名字為人人者乃中和凡物之長也而尊且貴與天地相似今一死乃終古窮天畢地不得復見自名為人也不復起行也故悲之大冤之也噫子説與俗人同又實非也愚生甚不覩其意人死當奈何哉願聞之唯天師然夫物生者皆有終盡人生亦有死天地之格法也天為其中時時且有自冤死者或自少年不壽者天地乃為萬物父母恐其中有自冤哭淚仰呼天俯叩地而自悲冤得年少故天為其生真道奇方可以自防而得小壽者物生皆自有老終而愚人不肯力學真道善方何以小增其年不死遲老者反各自輕忽不求奇方而共笑賤真道反曰共作邪偽以亂天道共欺其上爭置死地名為冢修之治之以待死預作死約及凶服求死得死有何可冤哉年竟算盡此比若日出自有入也真人何故反冤之乎真人投辭多與俗人同正似無一知人何也當冤其何等者願聞之當冤其年少未有所知而死者也未知學問求可自防禦者故當冤之也又復當冤其常謹良畏不壽年少常自若行求真道善德奇方為行常善不為陰賊或逢流災而中死或到老力盡而訖不得遭逢明師可得須臾竟其天年者是者大冤可悲傷也若無故冤悲不求奇方真道而死者反捶胸哭泣呼天叩地汝身自得之反過天地是為反民天甚怨惡之真人怨是不若早自悲傷學不得真道不知天地陰陽大分部訣也久苦無明師而長懷悒悒而天年將竟也是誠可悲傷子知之乎唯唯愚生甚恐駭命在天師吾同乞真道與子欲使子努力不懈天下何不有但求之不力至誠淚出感動天故天不與之耳若不道懈止亦將得之不久也子知之耶唯唯夫愚人不自重愛力求奇殊方可得須臾反預置死器死處求得死天之為法若慈父母賢明君不奪人可求也是自然常求之名為得其所求之名為得其所求亦可毋大冤之也是以古者聖人帝王時時有大自重愛而畏死者旦夕思行求異聞殊方敬事道人力盡財空而已至誠涕出感動皇天天乃為出瑞應道術之士悉往佑之故多得老壽或得度世其中時時有求而不得者但未至誠固固好俗事輕忽其身言可再得也今天地乃以人為子帝王乃最天之所貴子也不惜真道奇方焉子知之耶唯唯是故古者聖人深計遠慮知天下之財物會非久是其有也身在財物固固屬人身身亡財物他人有也故無可愛惜極以財物自輔求索真道異聞也故其身反得長存財則在常屬於人也是故當極力財空盡而已財者但過求須臾得之耳失財乃天下人之有也會不久吾有也此名為賢聖明智養身以道知用財法故多得老壽也子知之乎唯唯行為人師者多難訾真人悒悒為子更復分別悉道其意夫天道乃有格法不以故人也子欲樂知其審此若冬至之後天當大寒殺人乃以五月初始見陰氣於井中為其清日日益劇到冬至後乃大寒傷殺人不可無衣也賢者預防也則獨得大樂不傷於寒而無憂其懈惰不力不預備之則獨飢寒而窮矣此之謂也天無過也人自得之子寧重曉不哉唯唯行子已覺矣夫天之為法不以卒故人也愚人自故觸冒之耳願請問不及復當冤何等者哉復當冤大賢少而學善順良有真道德當為帝王輔助其理陰陽帝王得之抱腹因心垂拱而無憂或反蔽塞不通懷真道德到老死亡是可冤悲傷而帝王治不得大賢明反與愚者共治陰陽亂萬變起常旦夕自苦得大愁焉是復大冤可悲傷之甚是故古者聖人聰明大達衆賢悉出上集為輔故兩無冤者也天地亦為其理無病而不冤何況於人乎哉真人知之耶唯唯善哉天師之言也以何為善乎然此乃天得之以解病苦帝王得之以垂拱無憂賢者亦得盡其忠信之心上輔其君為治亦得盡其能力勉勉使共解天地大憂百姓萬物亦復得之而興也故言善哉也善乎真人之言吾無以加之也是故凡人可求作者皆不為冤結也自行得之也所求不得反為大冤今人求死得死求惡得惡求善得善天順其心是為大吉可求者得若人預爭置死地作死約得死是也日求凶得凶惡而死復是也名偽凡事所求者得天與地無可大負於此人也真人寧亦大覺未唯唯行子已覺矣行今欲為子悉説之益文今已為子舉其大綱自思其意以付上道德之君以示衆賢各加努力在所求求而不得未一至誠也夫天地比若影響不欺人乃愁愚人各自欺自輕自忽大咎在此夫群愚乃共亂天與地不獨自愁也其過乃如此也天乃得大愁於是也愚人自身求而得之窮則反啼呼天與地為是積久天地大疾之悒悒故遣吾下具語分解天下人意使衆賢明共策吾辭吾辭則天談地語也吾不空乙二與真人道事也乃天示教勑吾下言之也使一各自知過所由來勿復更相罪責也故吾悉言之吾不敢妄語吾所以究竟盡言者獨知天地心意故見遣下與真人共議天下分別其曲直使德君與賢者俱思惟之使可萬萬世傳後生者歌誦以為常法而不復忘也故吾每見真人問事常喜為天訣訣得一解其憂故睹天言者輒承天心地意分別道説之也不敢有懈也子有疑者為復來共議之既見信而見遣下語實畏天威無可惜也子重明知之邪唯唯行子已得天地之意應曉事生哉夫人積愚不知早學真道善德殊方以為小事不知其過積大乃亂天地而共愁其帝王身尚得天死不得竟其天年而亡也真人熟思吾書言天下過寧復有大於是死者邪善哉善哉愚生已大覺矣子知早覺可謂為曉事之生遠凶而近吉乎覺而不止也真道畢乎一旦得王侯不若得仙人乎今行逢千斤之金萬雙之璧不若得明師乎帝王有愚臣億萬不若得一大賢明乎父母生百子而不肖不若生一子而賢乎一里百戶不好學不若近一大德乎萬目慺慺不若一大綱乎天下擾擾無不有不若天獨神且聖乘氣而飛行乎凡物雖衆多不若一氣獨活人乎故今勑真人學者疾棄浮華能務核事求真道乎欲太吉者真若稱天乎天地無病而長悅喜真道奇殊方出祐人乎是以古者聖人常稱天不敢懈也故常獨吉也賢儒集策天道畢也各言一善而陰陽理神靈悅也災害悉伏不復發也所謂治得天心而祅臣絶也神哉為道自然術也善哉善哉愚生向不力問復無緣得知是也然子言是也學而不力問何從得日進乎行而不數移其足道何從得達乎學而不得明師知何從得發乎治國欲樂安之不得大賢事之何從得一旦而理乎善哉天師之言也然子已覩其微意矣故金城九重不如事一大賢也是故古者聖賢皆事明師以解憂患也故聖賢悉有師法也真人宜戒凡事自愛吉凶門戶可睹乎唯唯戒真人一言唯唯人所求而得者天以順其所求不負焉也勿復臨死而哭天泣地也是名為自求而得之反以罪天地是名為大逆之人也天不好也地不嬉也鬼神會不祐也所冤者獨當冤求而不得者耳夫萬物各得其所求何故自冤哉真人熟思吾言是實非也吾之文不誤也大萬不失一也今天乃惡之疾之故吾反覆道之雖上已言復戒真人於下也吾乃故使其復重樂下古之人深思之美之念之傳之寫之以相示勿匿之也天之戒書樂見發揚不欲見藏也唯唯行去右集難人死當見冤與不所求得與不合國安危學逢明師與不肖師拘校三古文法第一百三十二請問天師之書乃拘校天地開闢以來前後賢聖之文河雒圖書神文之屬下及凡民之辭語下及奴婢遠及夷狄皆受其奇辭殊策合以為一語以明天道曾不煩乎哉不也為其遠煩而不通故各就其為作求善太平之宅於其所屬邑鄉主備其遠不能自致故為其立宅道上使其投異辭善奇策殊方於其中也因取中事傅持往付於上有德之君令其群臣臣共定案之以類相求上第一善者去其邪辭以為洞極之經名為天洞極政事乃後天地之病且悉除去也帝王之治且一大安也承負萬萬世之災厄會且一都去也然後萬物群神且無一可言而不復上白人惡於上天也故勑使其拘校之者乃天使吾下言也雖煩安得不力為之乎天下文書及人各言一或言十數而天下之疑事悉自解亦無大煩也但各居其處而言之傅持付上耳是名為天下集久集言而共語以通達天地之意以通達天地之氣以除帝王災害以利凡民及萬物莫不各得處其所者乃後天地一且大悅喜病一除喜則祐帝王也今使無事而長遊也願問天地何故一時使天下人共集辭策及古今神聖之文以為洞極經乎善哉子之問然天地有劇病亂未嘗得善理也故教示人使集議而共集出正語奇策以除其病也故使其大共集言事也願請問天地亂而有劇病何不更生善聖人乎力復生後聖人乃無益何也噫真人愚哉吾聞前已有言矣下賤暗之生積愚固固不能察察知之真人尚乃言如此俗人何以可曉乎必且互置吾文而更大忿天災害反且更大起而不可救故天使子反覆問是也欲使吾更具言耶諾諾吾親見遣為是事下吾不敢有所匿而忿天也行真人明聽為子條訣解之更以上下悉説道之但安坐唯唯行古今聖人有優劣各長於一事俱為天談地語而所作殊異是故衆聖前後出者所為各異也俱樂得天心地意去惡而致善而辭不盡同一合一不大類相似故衆聖不能悉知天地意故天地常有劇病而不悉除復欲生聖人會復如斯天久悒悒於是故遣吾下具為其語以告真人所以告真人者天上諸神言天下有樂善欲稱天心者獨有真人耳故吾以辭情告於真人也吾不同空語耳真人自知之耶唯唯行子已自知矣行所以拘校上古神文中古神文下古神文者或上古神文未及言之中古神文言之中古神文未及言之下古神文言之也因以類相從相補共成一善辭故使集之也乃後神書天地意可睹矣真人知之耶唯唯行子已解矣行上古聖人失之中古聖人得之中古聖人失之下古聖人得之下古聖人失之上古聖人得之以類相從因以相補共成一善聖辭矣真人知之耶唯唯行子可謂大解已行大聖或有短失之中聖得之中聖失之小聖得之因復以類相從因而相補共成一善聖辭矣真人知之耶唯唯行子已解矣行大賢以短失之中賢得之中賢失之小賢得之以類相從因以相補共成一善賢辭矣真人知耶唯唯行子已大解矣行帝王失之臣子得之臣子失之庶民得之以類相從因以相補共成一善辭矣真人知之耶唯唯行子已大解矣行上老失之丁壯得之丁壯失之少者得之以類相從因以相補共成一善辭矣真人知之耶唯唯行子已解矣行男子失之女子得之女子失之奴婢夷狄得之以類相從因以相補共成一善辭矣真人知之耶唯唯行子已知之矣行或上古文失之中古文得之或中古文失之下古文得之以類相從因以相補共成一善辭矣真人知之耶唯唯行子以大解矣行或上古人失之中古人得之中古人失之下古人得之以類相從因以相補共成一善辭矣真人知之乎唯唯行子已解矣行或上失之而下得之或下失之而上得之或上下失之而中得之或中失之而上下得之或天神文失之反聖文得之或聖文失之反賢者文得之或賢者文失之而百姓文得之或百姓文失之而夷狄得之或內失之反外得之或外失之反內得之會有失之者會有得之也故上下外內尊卑遠近俱收其文與要語而集其長短以類相從因以相補則俱矣然後文書及辭言一都通具也真人知之耶唯唯行之子已知之矣天地出生凡事人民聖賢跂行萬物之屬各有短長各有所不及各有所失故所為所作各異不同其大率要俱欲樂得天地之心而自安也當時各自言所為是也孔孔以為真真也而俱反失天地之心故常有餘災毒或大或小相流而不絶是其明效也故生承負之責後生者病之日劇真人知之耶唯唯行子已解矣故今天遣吾下為上德道君更考文教吾都合之從神文聖賢辭下及庶人奴婢夷狄以類相從合其辭語善者以為洞極之經名為皇天洞極政事之文也乃後天地病一悉除去也真人知之耶唯唯可㤥哉可㤥哉行真人已應曉事生已知之矣天已使子壽矣及上真人矣不敢不敢子自行得之非吾力也子為善天下無雙故天愛之也不敢不敢今愚生但無忿天而已無敢可望也不嗛也唯唯請問合是衆類以相從願聞其訣意然善哉子難問天使之乎哉諾安坐為子分別道之也唯唯行假令正共説一甲字也是一事也正投衆賢明前是宜天下文書衆人之辭各有言説此一且無訾之文無訾之言取中善者合衆人心第一解者集之以相徵明而起合於人心者即合於天地心矣以何明之願聞其訣然凡人之行也考之於心及衆賢聖心而合而俱言善是也其應即合於天心矣考之於心自疑者考之於衆賢聖心下及小人心而言非者即凶天竟應之以凶也是即其明徵也故集此説以為經都合人心者是不合人心者非也子知之耶唯唯行凡書文凡事各自有本按本共以衆文人辭葉共因而説之如此矣俱合人心意者即合神祇不合人心意者不合神祇善哉善哉聞命矣今真人何故言聞命乎然行善正則得天心而生行惡失天心則凶死此死生即命所屬也故言聞命也善哉真人言是也吾無以加之也是故天正其言與文則吉不正其言與文則凶是以吾教真人拘校之也唯唯然後太平上皇之氣立出延年立來天文聖人之辭尚乃有短長故上皇之氣見圄於邪辭誤言未嘗得來也故天地後開闢以來未嘗有上皇之氣來助帝王治也今天欲都開出之故拘校文書也有餘一邪言輒餘一病餘一邪説誤文輒有餘一病餘十十病餘百百病餘千千病餘萬萬病隨此餘邪言邪文誤辭為病天地病之故使人亦病之人無病即天無病也人半病之即天半病之人悉大小有病即天悉病之矣故使人病者乃樂覺之也而不覺故死無數也願聞以何以天病邪言邪辭邪文而有病乎噫子反更冥冥暗愚何哉行安坐為真人説之夫邪言邪文以説經道也則亂道經書道經亂則天文地理亂矣天文地理亂則天地病矣故使三光風雨四時五行戰鬭無常歲為其凶年帝王為其愁苦縣官亂治民愁恚飢寒此非邪文邪言所病邪如大用之乃到于大亂不治也子知耶唯唯夫邪文邪言誤辭以治國也日日得亂於是邪言邪辭誤文為耳所共欺則國為之亂危臣為之枉法而妄為民為之困窮共汙天地之治亂天官大怒日教不絶也人哭泣呼冤亦不絶也子知之耶唯唯邪言邪文誤辭以治家也則父子夫婦亂更相憎惡而常鬭辨不絶遂為凶家子知之耶唯唯可㤥哉見天師言誠怖惶愚生不深計不知是惡致此也真人獨愚日久矣夫俗人以為小事而不去之乃不知此邪言邪辭邪文乃與天地為大怨也是乃國家之大賊也百姓之烈鬼也寧可不一都投而力去之耶是故天愛上德之君恐其不覺悟復彼是大災故遣吾下具言之真人疾以文付之使其疾思天意可以自安不者天怒會不絶也故天不復使聖人語會不能悉都除其病故使天下人共一言俱一集古文考之也今天忿忿積恚於是邪言邪文單言孤佞辭也今考是真人欲知之比若帝王愁恚夷狄數來害人也故發兵士萬萬往擊之病不怒也怒者功賜多不怒者帝王復考之今考邪文如此矣真人知之耶唯唯可畏乎天下已正矣真人可謂已知之矣今急是孤辭一人邪言邪文邪辭天地今以是為大怨是帝王大賊也本治不安悉亂於是也故今斷之皆使集言集説集上書定安事乃天氣旦一悉得其所邪言邪辭乃旦一悉絶也滅亡也天從今以往旦使人亦考之神亦且行考之但有日急非有懈時也真人知之耶唯唯愚生甚㤥子知㤥可無并見考唯唯愚生事事不及有重謫過於天地為天師憂念謹已見此邪文邪辭一人之言戒今願更見勑戒丁寧是正文之所到至戒善哉書文已比言矣子自若問之何也暗昧之人固固心結聰明猶不達不重反覆見曉勑者猶曚曚冥冥復亂天師道故敢不反復問之也善哉子言也諾安坐為諸群真人具説之夫正言正文正辭乃是正天地之根而安國家之寶器父母也而天下凡人萬物所受命也故當力正之也唯唯願聞正言正文正辭為天地根國家寶器凡民萬物所受命決意噫真人已比比受此語吾文書中悉病疾浮華邪言子乃復重問之何也愚生而隨俗為愚積久不知邪止所在故不重見丁寧解之殊不解也然子欲知其審實也俗人俱言善善而共力行之而災殊不除去者即不善之文不善之言之亂也俗人言此可耳不能善也而按行之反與天相應災日除去者即正文正言正辭也內獨與天相應得天地心意之明徵也是故正言正文乃見是正天地之心也故言悉正文悉正辭悉正而帝王按而行之下及小民莫不俱好行正天地乃為大正四時五行萬物一旦皆各得其正日月三光守度各得正也國家大安無憂乃到于神負不老之方賜之奇物善應悉出姦猾妖惡悉滅絶凡民各得保其家而竟其天年萬物悉得長老終各以時也是即正言正文正辭之為天地根而國家寶器父母民萬物之命大明效也真人知之耶唯唯可㤥哉可㤥哉天地之根國家寶器命反在此行子可謂曉事之生知之矣是故天遣吾下悉考正之也天地開闢以來行正言正文者天地常為其大喜説故常善行邪言邪文者天地常為其大怒不悅喜故常凶不安而多危亡也俗人不知是為天地大病而亂帝王治也而下愚之士反共巧工下作篇記習邪言邪文以相高下以欺其上而汙天正法亂天正儀是乃天之大怨地之大咎也而國家之大賊也今乃得天怨地咎國家賊而日共行之其治安得平哉今天師責此邪言邪文罪之何一重也噫真人其愚耶今人而共以邪言邪文共亂天地天地乃為其常有病是非天之怨咎耶比若人常行病人害人人亦怨咎之不耶唯唯是故為天怨地咎明白矣今邪言邪文邪辭乃已共欺其上危國家其治常失天心其年命不增為之絶者前後非一人坐之是非國家之大賤耶諸真人知之不唯唯下古人多愚或有見天文反言不若此言是純復國賊之長也天地之大怨咎也民之大害萬物之烈鬼物也德君慎毋用其言也用其言者天怨不正當為身深計遠慮思其患害以長自安天乃與德君獨厚故為其製作可以自安而保國者也真人知之耶唯唯行子已大覺矣自慎自慎天威不可犯也唯唯戒真人一言自是之後德君詳察思天教天文為得下吏民三道所共集上書文到八月拘校之分處為三部始校書者於君之東已一通傳校於君之南已再通傳校於君之西已三通傳校者棄去於君之北校者各異處不得相時也何乎願聞之然相睹復有姦有可弊不實復為欺如是復忿天地為怨咎為國之大賊天地惡人使帝王治亂故異其處使三校之當共實核之也以解天心以安王者治也何必始校於君之東東者天氣有心而仁也校源事者當用心詳務力仁以稱天地而念欲安帝王也故於東也仁者以行當明察之故傳於君之陽也已明察當以義斷除之有功者因記有功無功者使記無功以為行狀已者藏於君之北幽室而置之以是知天下人行知善惡勿去也故德君桉行是名為大神人悉坐知天下之心凡變異之動靜也真人知耶可㤥哉可㤥哉子知㤥畏天談子長活矣唯唯是故自是之後長吏不復言行狀行狀見於是因以此為行狀故德君乃安枕而臥無憂也豫知之耶唯唯天戒校書脫一事者笞三十十事者笞三百百事者笞三千德君使退之勿復仕也此人乃輕忽事是天怨地咎國之大賊夫怨咎與賊不可與久共事必且忿天地故當疾去之善哉善哉戒真人一大要吾書文道所以從上到下無窮也悉愛正言正辭正文者吾乃深受天勑而下也誠知天愛是正言正文正辭所以大疾是邪言邪辭邪文者正知天地大怨咎之以是勑吾使吾下校去是怨咎與賊以安有道德之國以長解天地開闢已來承負之謫使害一悉去得休使正氣悉得前治也然後六方極八遠皇天平氣悉一旦自來子知之耶唯唯是故吾文者純天語不失銖分也天疾是邪文故吾疾之也天愛是正文故吾愛之也故吾之為道悉守本而戒中而棄末天守本故吾守本也天戒中故吾戒中也天棄末故吾棄末也吾之為文也乃與天地同身同心同意同分同理同好同惡同道同路故令德君桉用之無一誤也萬萬歲不可去但有日章明無有冥冥時也但有日理無有亂時也但有日善無有惡時也但有日吉無有凶時也故號為天之洞極正道乃與天地心相抱故得其上訣者可老壽得其中訣者為國輔得其下訣者可以常自安行吾語辭小竟疑者乃復來問之唯唯請問無故脫誤事一正笞三十乎善哉子問也天使子言耶然夫數者起於一十而終是誤脫一事即其問一之本也脫誤不實復為欺則復為天怨地咎國家之大賊也笞十者以謝於地笞十者以謝於帝王天地人各十合這為三十也笞此以謝過以解天怨地咎帝王之賊也乃天地喜悅神祇戰怒也本天地所以常亂而戰怒者本由考實文書人言不詳多誤故生此流災承負之厄也今復不詳旦復如此故當笞之也不以故人也乃以正事也今已集議實核乃右上之尚復集實核乃右下之則名為上下已俱實矣如獨下上不實固固無益也如獨上下不實亦無益也上下俱為實乃天氣平也下實上不實為上冤下下復自冤力為善無益天怒復發矣如上實下不實為下冤上地怒復發矣上下盡已實帝王不以意平理之則四時五行六親之神吏六宗之氣中和戰怒凶氣復發矣雖力使三道行文書正天下之言及文而自不力平之無益也故吾乃承天心為上皇德君作化不敢失天心也故悉拘天法以天地象為經隨陽為正順四時五行為令萬世不易也子知之耶唯唯愚生謹以覺矣甚畏天法子知畏之已長吉矣戒真人一大要言也夫拘校文書法毋但言其神文如其書文言如此以為真也是名為聾文也言事獨無本柄耶何以言如此哉不禁其有也但問其言之意當得其意乃事可明也如不説其意以何能得知之乎哉故當問其解決意不者不可用也名為聾治子欲樂知其意比若人語必有本當有可由而起不可但言東公言以立事也夫人證立事者悉有本安得但空設偽空言乎故赤凡事者皆當以其實有據乃可立事也子欲得知其大效明徵比若吾為德君化法皆以試立應為效言也行之而不應即偽言也行之而不應即為天也夫實説文與言矣比若此矣安得空立徵而言其文言而無説乎愚人或反有拘何各神文言如是也但可以解難拒窮之辭耳夫神文何雄或獨有意但傳言其文不居一卷也獨自傳遙相説人不深得其訣意反但以拒難救窮言東久言以是自明實非也皆為失説意令至道德辭不得通達者悉坐是子知之乎唯唯愚生謹已覺矣然子如此而不覺則遂迷矣是故桉吾書考文及人辭者皆竟問其意何以得其説者以類聚之乃後天下之文及辭言且一窮竟天道法可睹矣善惡之辭得通矣善哉善哉行吾之道見於此真人自上下思之思之悉更相徵明則無不解矣天下之事無不畢矣大道得矣天地悅矣德君長安矣天下俱同口皆曰善哉無復言天治乃復得天地心意故曰安舉事得凡人之心故天下無復言真人知之耶唯唯行辭小異有疑復來問唯唯右天怨地咎國之害徵立洞極經文三光蝕訣第一百三十三請問天之三光何故時蝕邪善哉子之所問是天地之大怒天地戰鬭不和其驗見效於日月星辰然亦可蝕亦可不蝕咎在陰陽氣戰鬭何故戰鬭乎陰陽相姦遞諍勝負夫陰與陽本當更相利祐共為和氣而反戰鬭悉過在此不和調如使和調不蝕亦當不蝕邪然大洞上古最善之時常不蝕後生彌彌共失天地意遂使陰陽稍稍不相愛故至於戰鬭子以吾言不然也子使德君案行吾文盡得其意戰鬭且止小得其意小止半得其意半止如不力行固困耳請問夫日月蝕以何時運相逢邪噫子其愚哉真人正復更發天怒今真人以何知為時運邪愚生見其同處也冥冥哉子之心也其暗冥何劇也審若子言運相逢也何故於一年之間日月蝕無解矣或連歲不蝕運何以然帝王多行道德日月為之不蝕星辰不亂其運何以然哉又天性陰陽同處本當相愛何反相害耶又陰陽本當轉相生轉相成功何反相賊害哉是子之愚也子欲知其實比若人矣人常相厚久不相覩一相得逢遇大喜則更相祐利相譽相明及其素相與不比也卒相逢便戰鬭大不比鬭死而已小不比小鬭可駭哉可駭哉愚生已解矣請問今日乃太陽火之精神也月乃太陰水之精神也今水火不同處自相遭逢則相滅何謂也不比邪善哉子言得其意然水火各以其道守其行皆相得乃立功成事比若五行不可無一也皆轉相生成子欲知其實也比若五藏居人腹中同一處心乃火也腎乃水也豈可為同處而日相與戰鬭相蝕邪子寧解知不乎唯唯愚生已覺矣是故和平氣至三光不復戰鬭蝕也三光不相蝕乃後始可言得天地之心矣以是為證故欲自知優劣行道德未俱觀此天證而聚衆文言同處相蝕是者但記同愛之文未深得之意也正使有神文言天乃未深見其情實也子知之耶唯唯行子已覺矣吾文出之後帝王德君思此天意勿忘此言此言所以致得天心之文也如得天意命乃長全也不得天意亂命門也行而不稱天心亦大患也初上古以來衆聖帝王以此為戒深記吾言結於胸心乃微言可見道可得也以付上德之君以救三光之鬭蝕也唯唯行去辭小竟疑復來問之唯唯萬二千國始火始氣訣第一百三十四請問天下共日月共斗極一大部乃萬二千國中部八十一域分為小部各一國德優者張地萬二千里其次張地廣從萬里其次九千里其次八千里其次七千里其次六千里其次五千里其次四千里其次三千里其次二千里其次千里其次五百里其次百里此乃平平之土德優劣之所張保也德劣者乃或無一平之土悉有病變令一國日月戰蝕萬二千國中寧盡蝕不斗極不明萬二千國寧盡不明不乎善哉深邪遠邪眇邪子所問也何故正問此變今怪一國有變萬二千國何譽當復有變者邪怪之不及天師問恐終古無以知之故問之也善哉子之所疑可謂入道矣一國有變獨一國日不明名為蝕比近之國亦遙覩之其四遠之國固不蝕也斗極凡星不明獨失其天意者不明其四遠固不蝕今請問於何障隱而獨不明邪噫子固童蒙未開也類俗人哉今是天與地相去積遠是其失道無德之國下邪氣共上蔽隱天三光各以其類上行使其不明比若霧中之處其三光獨不明無霧之處固大明也子欲重知之陰處獨不見月蝕陽處獨見日蝕子欲重知其審實比若今年太歲在子有德之國獨樂歲無德之國獨凶年今是俱共一國一歲共一年而其吉凶異比若人俱共一天一地其安危處異俗不同子知之邪唯唯善哉善哉今是日月運照萬二千國俱共之而其明與不明者處異也有道德之國其治清白靜而無邪故其三光獨大明也乃下邪陰氣不得上蔽之也不明者咎在下共欺上邪氣俱上蔽其上也無道之國其治汙濁多姦邪自蔽隱故其三光不明矣子欲重知其審比若翕目視日與張目視日比若善張目視日與蒙薄帛視日正此也寧解不邪唯唯可駭哉可駭哉子知駭是則得長生矣唯唯其且凶衰之國三光盡不明比若盲人而獨不覩三光明三光自若以其人盲獨不見之矣比若年盛者獨覩三光明年老者獨不覩三光明是其盛衰之效也悉寧解邪唯唯行去矣請問一絶訣説何等也今不審知一者何等也噫真人守文極多何故為疑此邪今眩冥也子知守一萬事畢子何問眇哉宜思其言唯唯一者心也意也志也念此一身中之神也凡天下之事盡是所成也自古到今賢聖之化盡以是成器名以其早知學其心意志念善也守善業也愚者盡凶是也以其守學之以惡業也天地之性蚑行萬物悉然故在師學之壽可得也在學何道天地可按也聚衆人億萬不若事一賢也衆愚億萬但可疾凶敗耳審能守一賢身何害有身者不能還自鏡照見念反還鏡身志念遠即身疾衰枯落務志念近則身有澤凡志念所成衆多不豫記之天下之事悉是也子知之邪唯唯請問旱凍盡死民困飢寒而烈而死何殺也此者皇天太陽之殺也六陽俱恨因能為害也何謂邪願聞之然六方洞極其中大剛俱恨人久為亂惡之故殺也其害於人何哉無有名字也但逢其承負之極天怒發不道人善與惡也遭逢者即大凶矣子欲知其實比若人矣人大忿忿怒乃忿甲善人不避之反賊害乙丙丁今乙丙丁何過邪而逢人怒發天之怒發亦如此矣故承負之責最劇故使人死善惡不復分別也大咎在此故吾書應天教今欲一斷絶承負責也天其為過深重多害無罪人天甚憂之故教吾勑真人以書付上德之君令惡邪佞偽人斷絶而天道理子知之邪唯唯願請問天地開闢以來人或烈病而死盡或水而死盡或兵而死盡願聞其意何所犯坐哉將悉天地之際會邪承負之厄耶然古今之文多説為天地陰陽之會非也是皆承負厄也天氣中和氣怒神靈戰鬭烈病而死者天伐除之水而死者地伐除之兵而死者人伐除也願聞烈病而死者何故為天殺天者為神主神靈之長也故使精神鬼殺人地者陰之卑水者陰之劇者也屬地陰者主懷妊凡物懷妊而傷者必為血血者水之類也懷妊而傷者必怒不悅更以其血行汙傷人水者乃地之血脈也地之陰也陰者卑怒必以其身行戰鬭殺人比若臣往捕賊必以其身行捕取之也不得若君但居其處而言也中和者人主之四時五行共治焉人當調和而行之人失道不能順忿之故四時逆氣五行戰鬭故使人自相攻擊也此者皆天地中和忿忿不悅積久有病悒悒故致此善哉嚮不力問無從知之也願聞此悉承負之厄乃忿三氣其不承負之時人死云何哉然人生有終上下中各竟其天年或有得真道因能得度世去者是人乃無承負之過自然之術也子知之耶唯唯行子曉哉乃一旦而相隨死者皆非命也是乃天地中和四時五行戰怒伏殺效也善哉善哉嚮不及天師問無緣知是也故天地開闢以來常有此厄也人皆不得知之今甚病之憂之人多無罪而死上感天天故遣吾下為其具言已行吾天文之後人民萬物且各以其壽命死無復并死之會也善哉善哉後生各得其命矣真人知之邪唯唯請問即非天道時運周而死何故常以天地際會而亂哉五行際會而戰邪五帝之神歷竟而窮困邪噫善哉真人之難也今天且使子問邪其投辭乃入天心讖其何一要訣哉吾甚嬉之今是真若子言今為子具條解之今諸真人遠來為天地具問事乃為天地開闢以來帝王問疑宜安坐聽吾辭唯唯然夫天之為法人民萬物之為數也比若四時之氣但當更相生成相傳而去比若人生少者後當老長更迭相傳而去不當乃道鬭戰因絶滅世類也所以道戰水旱癘病死盡者人主由先王先人獨積稍失道心意積久至是際會即自不而自度因而滅盡矣既滅盡無餘種類夫天地人三統相須而立相形而成比若人有頭足腹身一統凶滅三統反俱毀敗若人無頭足腹有一亡者便三凶矣故人大道大毀敗天地三統滅亡更冥冥憒憒萬物因而亡矣夫物盡又不能卒生也由是失幾何滅絶幾何更起或即復或大久大敗久乃能復也故小毀則疾復也子欲重知其審實令後世德君察察知天地冤不之大效比若家人治生有畜積多者雖邂逅逢承負凶年不收也固固而自存大多畜積之家雖連年遭惡歲猶常活小有畜積之家遭連年不收餓而死盡常貧之家遭一年凶便盡死不而自度出也困而無世天道有格法運非際會也比若夏秋當力收冬春當坐食成事夏秋不善力收冬春當餓死滅盡古者聖人天書因此共記為際會也真人欲知之如此矣今太平氣至當常平不當復道際會死亡者也夫天命帝王治故覺德君凡民為其道事要使一覩覺知如此矣嚮使先生凡民人常守要道與要德雖遭際會不死亡也夫天命帝王治國之法以有道德為大富無道德為大貧困名為無道無德者恐不能安天地而失之也先生稍稍共廢絶道德積久復久乃至於更相承負後生者被其冤毒災劇悉應無道而治至於運會滅絶不能自出大咎在此子知之邪唯唯可駭哉可駭哉行復更曉真人一語夫道德與人正天之心也比若人有心矣人心善守道則常與吉人心惡不守道則常衰凶矣心神去則死亡矣是故要道與德絶人死亡天地亦亂毀矣故道使天地人本同憂同事故能迭相生成也如不得同憂同事不肯迭相生成也相憂相利也故道德連之使同命是故天地覩人有道德為善則大喜見人為惡則大怒忿忿真人豈解邪唯唯可駭哉愚生甚畏之子知畏之則可長生無凶矣不知畏之則天已易去子矣宜重慎之唯唯行復重曉真人一解今是吉凶之行比若道德禮義與刑罰矣人而守其道德禮義則刑罰不起矣失其道德禮義則刑罰興起矣故守善道者凶路自絶不教其去而自去守凶道者言路自絶此猶若日出而星逃星出而日入不失銖分善哉善哉今曉真人一大訣言也今世人積愚暗甚劇傳相告語言時運周有吉凶如此言為善復何益邪為惡何傷乎哉乃時運自然力行善復何功邪而吉者聖人常承天心教人為善正是也言時運而反共亂天道者是辭也使天地常不悅喜實人行致之反言天時運自惡不肯自言惡反意天地為惡比若人家不孝惡子不肯自言惡反言父母惡此之謂也故天常苦忿忿悒悒因是運會者殺之鬭之樂易其世類也嚮不但當相隨老者去少者長各以其年命窮變化比若天地開闢以來人形變化不同是也善哉愚生以一大解於是古今人形雖異而氣同子欲重知其審比若四時氣五行位雖不同受內同氣轉相生成猶若人頭足不相似內反合成一人也善哉善哉今復重曉真人一言天積疾人為惡反常言時運凶上皇氣至當助德君治恐時人行不改易為惡行以亂正氣毀天寶故遣吾下為德君出文以曉衆人使共常按吾文為行不復共愁天地而不犯天禁自是之後行吾天文使神助德君治犯者誅之人不誅之神且誅之子知邪唯唯不敢犯也行辭小小竟凡書自思其要唯唯請問天師萬二千國之策符各異意皆當於何置之各隨其國俗宜以何為始以斗極東南火氣起願聞其意訣何也火者陽也其符今主天心和者主施開者主通明者主理凡事火者為心心者主神和者可為化首萬事將興從心起心者主正事倚仁而明復有神光萬二千國殊策一通以為文書上章天氣且自隨而流行真人自勵興之子勿逆之子喪乃天樂出書故使吾言子乃不信吾言也求信於子之身也子行之而災日除是天樂行之喜也故災除也子不行而多疾災是天忿忿悒悒子留難其道也火凶勿問於人取效於此明於日月天意所欲為子不可不慎也不行不順令使人心亂也真人慎之唯唯行復誡真人一言天不欲行子獨行之且病之吾文以此為信自是之後亦皆然文已復重不復多言益文使道難知唯唯行重復誡子一言此災病非一世人過也其所從來久遠勿反卒害之但當行天道以消亡之耳如是者所謂得天心意矣不如吾文言復枉急其刑罰災日多天不悅喜真人知之邪唯唯火氣正神道訣第一百三十五請問古者火行同當太平而不正神道今天師獨使令火行正神道何也善哉子之問也是故百人百意千人千意萬人萬意用策不同各殊異故多不得天心意真人言是也今乃火氣最盛上皇氣至乃凡陪古者火行太平之氣後天地開闢以來未嘗有也夫火氣盛者必正神道何也願聞其意然夫火者乃是天之心也心主神心正則神當明故天使吾下理神道也夫神道已自神何必當理之邪善哉子之言夫神乃天之正吏也今邪神多則正神不得其處天神道內獨大亂俱失其居今天氣不調帝王為之愁苦而人又不得知其要意子欲樂知其也此比若人矣今邪人多居位共亂帝王之治今使正人不得其處天地為其邪氣失正夫邪多則共害正正多則共禁止邪此二者天地自然之術也子知之邪故令太陽最盛未嘗有也陽者稱神故天為神陰者稱邪故姦氣常以陰中往來不敢正晝行姦而正晝行為名陰乘陽路病而晝作名為陰盛興為陽失其道君衰間為是久矣故天道吾正神道也令使不敢復為也子知之耶唯唯善哉善哉洞極上平氣無蟲重復字訣第一百三十六請問洞極上平氣至無不治故天師乃考疽疥蟲食人也今獨以此驗之邪其餘蟲云何哉善哉真人今旦問事也天疾是教子問此邪天甚疾人為惡猾吏民背天逆地共欺其上獨陰伏為姦積久如蟲食人也天毒惡之故使子反覆問之然蟲食人所謂蟲而治人也其為災最甚劇逆氣亂正者也今皇平氣至不宜有此應真人付德君欲知道洞洽未令民間悉移蟲主名大小為害之屬何也謂疽癘傷疥盡從腹中三蟲之屬皆移主名其移大多者固固下多蟲治人此蟲無者下無蟲治人此少者少蟲治人善哉小生愚暗覩此以為天性也故反應治邪子其愚何一劇痛也夫天地之性人為貴蟲為至賤反乃俱食人是為反正象賤人無道以蟲食人故天深見其象故使賢聖策之改其正也凡災異各以類見故古者聖賢得知之若不以類目不可思策也所以逃匿於內者象下共為姦而不敢見於外外者陽也陽者天也君也天正帝王也故蟲逃於內而竊食人象無功之臣逃於內而竊蠶食人也可駭哉愚生甚畏之子知畏天固是也若不畏天早已死矣真人慎之唯唯是故古者為治神者致真神為治鬼者致鬼為治物者致物為治蟲者治蟲為治何畏也願聞之然神者動作與天合心與神同意故神者天之使也天愛之鬼者動作避逃人所鬼倚陰中竊隱語似鬼故致鬼物者動作共欺其上猾若物故致物蟲者動作價利人共價利其上其用意雜若故致蟲天天變相應悉如此矣太平德君得天下上書文悉源其災異意以報之其正如神哉善哉善哉災氣已究洽矣子何以知之見天師之正以知無復逃蟲食人故洽矣子可謂知道意邪請問重復之字何所主主導正導正開神為思之也端及入室以為保券其為之云何豈可聞邪然易知而微密此辭輕而重不可妄傳也精者吞之謂之神也不精者吞之謂之不神也不精吞之謂之妄言也故道者傳其人乃行凡事者得其人乃明非其人謂之為妄行過還及入其人身真人知之邪唯唯不敢妄行誠歸付其人如是者為子言之以丹為字以上第一次下行將告人必使沐浴端精北面西面南面東面告之使其嚴以善酒如清水已飲隨思其字終古以為事身且曰向正平善氣至病為其除去面目益潤澤或見其字隨病所居而思之名為還精養形或無病人為之日益安靜或身有強邪鬼物反且變爭雖忿爭自若力思勿惑也久久且服去矣自是之後天樂人為正直以他文為之天神亦助下之隨人意往來上士見人吞字歸思亦然當一吞字皆能教故曰天道一旦而行吾之為道不效辭語效立與天道響相應和以是為神真人慎之既開天神道歸于德君付于賢良人立自正有益於上政明矣德君明師告之以威為嚴所告悉愈為有所覩見神靈慎勿道之上士因是乃至度世中士至於無為下士至於平平人所得各有厚薄天神隨符書而命之故言勿傳其所思不可得不同也不同故不可相語也信哉易哉其為道也要哉約哉其為志壽也因而學之其人將自順也將自善有神明轉其心意使其悅也或今日吞吾字後皆能以他文教教十十百百而相應其為道須臾之間乃周流八方六合之間精神隨而行治病故自是之後天下人畢早正易其行皆樂真文不復為邪偽也真人欲樂安天地道使疾正最以三道行書為前願聞為前言善哉子之問事愚者難正自若亂人治令德君愁故投行書於前令使上下大小自相拾正其俗人無孤言辨士之害善哉善哉願聞三道行書文何但使一通集行書而上必使有前後文書衆多善哉善哉子之言中天心意所以使有前後難問者欲使俗人深自知過也獨言之大病也不見孤辭單文之惡則無以見集行書之善不傳其誤分別其大失皆解人心乃後且可救也心不解不如其所行久大誤也人心覺則易正凡吾為文皆如此矣非獨是也子知之邪唯唯行子已曉矣真人慎事書文已足無輕數句問欲不為子説之恐恨子意欲復為子道之今道大文又天道不可句極得其意天大喜不得其意逆天道反與天為咎不敢復數言也行去右大集難問天地毀起日月星蝕人烈死萬二千國策符字開神訣方藥厭固相治訣第一百三十七今愚生得天師文書拘校諸文及方書歸居間處分別惟思其要意有疑不能解願請問一事言之今天師拘校諸方言十十治愈者方使天神治之也十九治愈者方使地神治之十八治愈者方使人精神治之過此以下者不可用也愚生以為但得其厭固可畏者能相治也不得其厭固者不能相治也善哉真人言也得其難意然夫凡洞無極之表裏目所見耳所聞蠕動之屬悉天所生也天不生之無此也因而各自有神長命各屬焉比若六畜命屬人也死生但在人耳人即是六畜之司命神也是萬二千物悉皆受天地統而行一物不具即天統有不足者因使其更相治服也因復各使有尊卑君長故天道悉能相治制也得其所畏而十十者治愈者即是其命所屬天也真人知之邪唯唯行子已知之矣請問一疑甚不謙順豈不言哉平行勿諱今若盜賊劫人者同服人耳豈可以為天命君長邪善哉子之難也夫盜賊劫人者但以無義妄於枉服人耳不得常服久也一過服人即有重罪長吏遂之不止也子何以言是為天命乎今若王者治服人豈當見逐索邪凡人生以王者為君長為命也真人亦寧解不今已大解善哉善哉行學者精之亦無妄難問也天且非人也唯唯有過有過不也敬慎之勿但若俗夫之人欲言便語也唯唯今愚生每語有劇過不言又無緣得知之今欲復有可問不敢卒言平行今獨萬物各有君長天地亦有君長邪噫子難問何一深妙遠劇也今自知所問不謙不及天師問之會遂不得知之也然天者以中極最高者為君長地以崑崙墟為君長日以王日為君長月以大月為君長星以中極一星為君長衆山以五嶽為君長五嶽以中極下泰山為君長百川以江海為君長有甲者以神龜為君長有鱗之屬以龍為君長飛有翼之屬以鳳凰為君長獸有毛者以麒麟為君長裸蟲者以人為君長人以帝王為君長天下若此者積衆多不可勝記才為真人舉其綱見其始子豈解邪唯唯宜自深思其意亦不可盡記也難為財用唯唯今故言蚑行有知之屬方在其身者不待而成事者無妄殺傷何乎主恐忿其君長也今天太平氣至當與有德君并力治無妄傷害則亂太平之氣令治憒憒今小物安能感動天使其治亂憒憒乎噫子自若愚蒙未大解也今是各自有君長若遠方四境之下賤小人極最帝王之下極螻蟻惡人也無可比數人無故共賊傷此百數十人其家自冤枉上書帝王帝王聞之即大怒下令以章考問之紛紛州郡縣以為大事因而坐之危亡者非一人也子知之邪可駭哉可駭哉行子知大駭乃且長生矣唯唯是故古者聖王知天法象格明故不敢妄用刑也乃深思遠慮之極也故其治常平不用筋力而得天心者以其重慎之也今先王小小失之承負之後各有得失故治難平也子知之邪唯唯今太平氣至天愛有德之君故具為陳戒也難其犯之也以吾文歸上德之君自使思其惡意唯唯右集難方藥命所屬物各自有君長陽尊陰卑訣第一百三十八願問陽何從獨得尊而貴陰獨名卑而賤哉善乎子之難也幾覩道德意陽所以獨名尊而貴者守本常盈滿而有實也陰所以獨名卑且賤者以其虛空而無實也故見惡見賤也愚生受天命劣少無知蔽暗難開願天師具為分解其意子學何不具覩天道意何哉真人尚乃不解俗人冥冥固是也然夫天名陰陽男女者本元氣之所始起陰陽之門戶也人所受命生處是其本也故男所以受命者盈滿而有餘其下左右尚各有一實上者盈滿而有餘尚常施與下陰有餘積聚而常有實上施者應太陽天行也無不能生無不能成下有積聚應太陰應地而有文理應阡陌左實者應人右實者應萬物實者核實也則仁好施又有核實也故陽得稱尊而貴也子知之耶唯唯陰為女所以卑而賤者其所受命處戶空而虛無盈餘又無實故見卑且賤也本名為陰陽男女者此二事也其一身上下既盡無名者也本名陰陽以此二事分別之也念女之頭目面耳支體俱與男等耳其好善尚乃或好於男子而反卑賤者此也男子其頭面肢體其好善不及女也而名尊且貴者正以此也善哉善哉然子可謂已覺知之矣是故天道重本守始是以聖人覩天法象明故當反本守元正字考文以解迷惑也故能使天地長安國家樂也故守本而有實好施與者為善人本空虛無實核常不足而反好求者為惡人為賤人此之謂也今願訣問一疑行言之令女見懷妊實如天師言無實何也噫子內空虛略類似無道之人但天見子勉勉一心故使子來問事耳今女之妊子陰本空虛但陽往施化實於陰中而陰卑賤畏陽順而養之不敢去也陽乃天也君也陰乃地也臣也故重尊敬陽之施因而養之而不敢去也子欲知其實比若君王有客託於小家小家養之不敢去也客亦遂得肥巨成人正此也今俗者言陽生陰成但陰隨而養成陽實也吾書中同多以養説之如此矣吾見真人欲樂得知真道之核天之至要意故為子要言之耳子知之邪唯唯行子已覺矣今願問獨人有男女可以分別陰陽實邪天地萬物盡然邪噫子自若癡迷不解善哉真人之難問也然天地之性萬物盡然吾為子説一事已上洞下達子自若言不行更開兩耳聽勿失銖分也唯唯行然陽在外之時凡物盡上懷妊於上枝葉之間時天陽氣在外未還反下根也故皆實於表也蚑行衆生人民積聚亦於外及陽氣還反內在地中也萬物之屬上悉空無實盡下懷妊實於下地中養根葉蚑行人民亦入實積聚於內此即皇天證明陽實核之大明效也是故執陽道者有實核守陰道者天實核故古者聖人治常象天不敢象地也願聞之何謂為象天乎象天者聚仁賢明儒道術聖智此者名為象天也聚財貨小人不肖無知文章名為象地也善哉善哉願聞此仁賢明儒道術聖智何以象天天者仁賢明儒道術聖智也又天者能乘氣而飛此六人其上才而志真道不懈者亦乃至於能乘氣而飛故屬天象天也是以古者聖人獨深知皇天意故不敢失之也願聞此聚財貨小人不肖何以象地乎然夫財者會下財成塗塗化成糞糞化成土夫小人愚不肖者會聾暗不知道術入凶門戶會當早居地下若令不葬久則為天地之害甚深與之為治則共亂天文地理五行日戰乎四時失紀三光少明天地惡之百神不愛之矣無益於分理當早終死如此財矣真人知之邪唯唯可駭哉可駭哉子知駭者可謂將長存矣不知早駭與天地為重咎愚生甚畏之子知畏此天法天且活子如不敬畏之與生同理夫吉凶本非天也過也人自求得之耳子知之邪唯唯行去去戒之唯唯右集難男女本所以得尊卑陰陽實核君子小人訣國不可勝數訣第一百三十九請問一事平道之願聞天下凡有幾國深哉妙哉子所問也然中部有八十一域次其外復一周天下有萬國乃遠出到洞虛無表合三部為萬二千國何故乃有萬二千國乎天數始起於一終於十十而相乘天道到於五而反故適萬國也其二千國者應陰陽更數比若數十而終也歲月數獨十二也尚五歲再閏在其中也此應天地之更起在天天洞虛之表裏應為天地并數故十二月反并為一歲尚從閏其中此十二月者乃元氣幽冥陰陽更建始之數也比若萬物終死於亥乾因建初立位於天門始凝核於亥懷妊於壬成形初九於子日始還九二於丑而陰陽運九三於寅天地人萬物俱欲背陰向陽窺於寅故萬物始布根於東北見頭於寅物之大者以木為長也故寅為始生木甲最為木之初也故萬物見於甲寅終死於癸亥故木也乃受命生於元氣太陰水中故以甲子為初始天道變數因五相乘而周故五千加十二支字適六十癸亥為數終也真人知之邪唯唯未得其意也今眩冥行子思之久久自得其意行子思之今真人恆何故問天下有幾國哉愚生受天師書言可以報天地重功療天地病而為有德帝王除天地立事以來流災厄會今以天師文書道一付一有德之國今一國之原雖其君有德萬萬人者安能乃并解陰陽無極天地之災乎乃周流遍治天地之表裏絶洞虛洞遠無極之天地病乎噫善哉天乃使子問是邪咄咄可駭哉咄咄可駭哉吾欲不言也今恐得大適死過不除於子也真人何以乃知問是乎愚生得天師教勑者歸別處思惟其意各有不解者故問之也今子解一國有德之君而已何故為問之乎今以天師文但解一有德之君國之災名為但療治一國耳安能乃療治天地病而報皇天重功乎哉善哉子之言也吾無以加子言也真人試説其意然今天師乃言天地洞虛有萬二千國今一有德之國受道安能乃解是萬二千國之災而都安天地者乎善哉子之言子果見使主問是邪諾今為真人具分別説之使其昭然可以畢除天下病災吾畏天威義不敢有可匿也子力隨記吾言唯唯行天數本起於一十而終一乘十十也各乘十而至百百乘十至於千千乘十至於萬一者其數之始也十者其數之終也百者其有德之國鄉子但持吾書往授教其一有大德之國傳記吾書者持本去無盡以與也周流以授百有德之鄉一國得吾書者國善人并歸向之其德乃并洽四方百國皆被其化而為善天地乃俱為其安災害為其除以授百有德之國而萬國無害天地病悉除去矣善哉善哉願聞何故不教愚生比以教授之然所以不可比以教者無道德之國天所衰會不能行真道故但歸有德之國也今無德之國并歸有道德之國亦自理矣善哉善哉願聞何故正以是百國有德為法乎善哉子之難也得其意然天地人之數也天數起於一終於十天下布施於地而生數成乃後出適合為百天地人備天地人三合同心乃成德也一事有不和輒不成道德也願聞天數何故正一乎一者其元氣純純之時也元氣合無理若風無理也故都合名為一也一凝成天天有上下八方故為十也又有五方各自有陰陽故數十也下因地也一下因地者數俱於十乃生故人象天數至十月乃生也一者正是其施和洞洞之時也已愛施者反當象天數十月乃出故數終於十故一者乘十地道者母也當禺故與和并連人天地人三相得乃成道德故適百國有德也故天主生地主養人主成一事失正俱三邪是故天為惡亦凶地為惡亦凶人為惡亦凶三共為惡天地人滅盡更數也三共為善德洞虛合同故至於三合而成德適百國善哉善哉是者天下萬國之綱天地人合德之鄉也子知之邪唯唯故真人今既為天地除病為德君除承負雖苦持吾文往授百有德國而陰陽病悉消亡帝王之災皆已除矣善哉善哉愚生嚮不力問無緣得知是也子言是也學而不力問與不學者等耳是故古聖賢之學旦夕問於師不敢懈也故遂得知天之道也唯唯誠得力問不敢有懈也如是者子已知道矣願聞今天下乃習俗不同以一道往教勑之曾不疑乎噫子於是言者更愚略冥冥無知何哉今是習俗禮義者但偽行耳非其真也天下人乃俱受天地之性五行為藏四時為氣亦合陰陽以傳其類俱樂生而惡死悉皆飲食以養其體好善而惡惡無有異也於其有不曉真人文而不達者當授教之時真人宜以其俗語習教其言隨其俗使人自力記之如是者天下悉知用之無有疑也吾之道比若日月周流運行照天下各自言昭昭大明而足子欲重知其審實比若萬物蚑行之屬共一天地六甲五行四時以是為大足故皆以天地陰陽格法教示之也子知之邪唯唯行去難不止則説無窮今道大文反但難得意唯唯願復問一事而止行言之今其萬二千國當云何哉然此者并於數中與閏同子欲知其審比若數十而終一歲反十二月乃終尚閏并其中時有十三月此之謂也但百國行道德乃萬國無災天地病已盡也此亦并除善哉善哉子能自力以吾文周流百有德之國使其各隨俗説吾書者即萬二千國悉安天地病大除子已增年亦無極矣子安之少也則得少年安之半則得半年盡安之則得無極之年真人既有善意天使子具問是宜具安之子亦無大自苦勞也夫天極自神且明而無上也尚常行道自苦日一周行凡物而安之故獨得常吉而長生也地亦順隨天所為而養之也如天一日不行日月星不移即有不周之氣天則毀矣天尚乃行道不敢止故長生也而況子乎努力各自為身屈不能為他人也吾所以説而不止者吾亦為吾身屈非而為子也凡六極之表裏擾擾之屬俱各為其身計不能為他人也子知之邪唯唯吾得天師言行之使有德之國記之不敢懈也行子已知之矣俱努力努力事畢而相從唯唯行去願問一事何等也今六人謹歸居間處共思天師言時時若且大解時時有迷亂不懈者願及天師決其意今念數愁天師欲忍不言也恐與天師相離終古竟天年無以復得知之故冒慚復前假一言平行天使吾與六子相覩共語勿辭謝也唯唯今願聞天下之國獨有萬二千國邪復有餘邪噫密哉子之問也天地開闢以來未嘗有也然此萬二千國者記一大部耳其餘者何有窮極乎哉何一多也噫子今旦問疑極知也今反覆閉冥冥愚哉實不及然觀弟子問事未大究洽知天道也適應校綝綝若且及而內獨不及夫俗人冥冥憒憒固是也以真人況之吾不非也然更開耳為六真人説之天者乃上下無極傍行無極往往一合為一部界復分何極乎願聞之然天上當於何極上復有何等而中得止極乎地下當於何極下復有何等於何得中止而言極乎天地傍行於何極何故得中上而反極窮乎此六表者當於何窮極乎是故天道乃無有窮已也大用之亦適足小用之亦適足大用亦有餘小用亦有餘真人寧知其意乎唯唯可駭哉可駭哉嚮不力問復無從得知之也然子可謂小覺矣行去勿復竟問也恐六真人驚而敗也非力所及而強問之是亦大害也然為人師者多難今訾子悒悒為子更明之行更明開耳安坐聽唯唯子欲樂知其大效也比若一家有父有母有子亦天道具成一家父象天母象地子象中和其聚財物家中所有象萬物亦成一家父為君母為臣子為民財貨以相通養共之象萬物此一家亦共一大憂一縣萬戶亦合成一家共一大憂十縣合成為一郡亦合成一家共一大憂十郡合成一大州亦合成一家共一大憂十州合共成一大國亦合成一大家亦共一大憂而為一大界其帝王有德憂及十二州大憂及十三州亦共為一大家亦共一大憂也其外界遠方不屬於人國者於人國有道德其中善人來於人國無道德則不來於人德劣則來害人也此一部者一界也天地之分畫也樂使天下擾擾之屬各有處不相剋賊也故為太極中極小極何謂也太極者主無復外表也中極者主中部也小極者各應其部界而止也但可以道德相求不得大相剋賊也天怨之此名為共一家故各共一大憂也子欲知其審實比若一家父子夫婦但獨憂其家不富不肯憂他家也一縣但共憂其君善則當遷之使高功各爭進其長吏惡則欲共去之一縣一郡一州一國皆義説等此其共一大憂也今故記萬二千國乃共一大部以與真人共一大憂也共一界其餘若此萬二千國者不可勝數是故古者聖人之作皆共記一小部也何不記大部界乎天使不言也大化未出所作者異不得同法故不記之也今者為大化出萬二千國歷運周故天使真人來問無極之經洞竟之政故以文付百有德之國一有德之國兼化九十九國其萬二千國并數若一歲十二月為一部時十三月閏亦并其中此之謂也子知之邪唯唯行去唯唯慎天道神靈守之勿妄亂毀唯唯今已受天明師嚴勑文慺慺小覺知一大部願聞一小界見示説此無極之國諾為真人悒悒且小言子詳記之今欲使真人積財用上柱天日月下柱地廣從萬里恐財用固固常病苦少也不能記是其國多少之名字也子知之邪唯唯愚生不敢極問天道也見天師言今恍若失氣惚若亡魂不敢重問之也然子可謂曉事之生子欲報天地重功而命無極者但周流是一大部萬二千國則壽已無極矣其上下六方洞極者天亦不獨使六子憂之也憂之者自有人與子異界亦不以過責反罪子也其安危善惡亦自有主之者也一部説絶勿復問唯唯行六子努力請真人學為小通但未大覩天道意耳加精勿懈唯唯學而不精與狂同精而不得名瘖聾示之以西反問東故天下師共辨難何恟恟雖恟恟無益也猶不知比若嬰兒蒙蒙未出胞中隨其母身而行安知天道廣遠而無方是故小師強怒喜狂説反令使天地道傷故失道意不能安其君王天下恟恟皆被其過言之殊異令災害橫行不可禁防書雖億億萬卷天下流災害猶不絶前後合同皆由強説之生不知道要之過也真人知之邪唯唯行欲復為子具説無窮竟難為財用又且復重故一小止疑復來問之唯唯右集難問授書訣諸國部界敬事神十五年太平訣第一百四十願請問一事平言之今天將太平寧亦可預知邪哉然可知占天五帝神氣太平而其歲將樂平矣何謂也願聞之然春也青帝神氣太平夏也赤帝神氣太平六月也黃帝神氣太平秋也白帝神氣太平冬也黑帝神氣太平今以何明之然太平者乃無一傷物為太平氣之為言也凡事無一傷病者悉得其處故為平也若有一物傷輒為不平也二物傷輒為被刑也三物傷輒為群物傷也四物傷輒為四方傷也五物傷輒為五方傷天下有大害也六物傷輒為惡究於六方也七物傷輒為其害氣乃橫行也八物傷輒使人賢不肖異計不并力也九物傷輒為惡究竟陰陽令物雲亂席轉也十物傷乃為大綱傷天數終盡更數也是故古者上聖人但明觀天五帝神氣平未輒自知治得失且平與未哉願聞其平訣意然春物悉生無一傷者為青帝太平也夏物悉長無一傷者為赤帝太平也六月物悉見養無一傷者為黃帝太平也秋物悉成實收無一傷者為白帝太平也冬物悉藏無一傷者為黑帝太平也五帝太平一歲人為其喜樂順善二歲地上為其太樂三歲恩澤究竟於天四歲風氣順行五歲九神不戰祅惡伏滅六歲而究著六綱七歲乃三光更明八歲而恩究達八方九歲陰陽俱悅十歲萬物悉各得其所為數小終物因而三合之乃天地人備故三十歲而太平也今上皇氣出真道至以治故十五年而太平也如不力行真道安得空致太平乎此十五歲而太平者乃謂帝王以下及臣大小案行真道共卻邪偽故十五年而平也真人知之邪是故欲知將平與未平但觀五帝神平與未足以自明足以自知也是故凡象乃先見於天神也天神不平人安得獨稱平乎哉是故五帝更迭治可皆致太平其失天神意者皆不能平其治也是故謹順四時慎五行無使九神戰也故當敬其行而事其神今天第一上平氣且至故教真人敬四時五行而令人大小共興用事其神事古者但敬事四時五行故致太平遲三十年致平今乃并敬事其神故疾十五年而平也真人知之耶唯唯可駭哉可駭哉然子已覺矣願請問人行忠直有實寧可知邪善哉子之所問也與其交也言行日若惡忿人長念之反月善月若惡忿人反歲善少時觀其所為作若最惡老反最善也人皆歸其言而樂其行而好愛其道是即忠信上善有實核之人善哉善哉願復請問不忠信佞行亦可知邪然可知也與之交也觀其所言行也日月合於人心若順善長念用之反月使人益惡邪月若善反歲惡少時觀其人可為若善也言若忠信至老念用其所為反最惡邪是純為偽佞不忠信之人行也至老長則窮其言與行最賤矣災及妻子禍流後生善哉善哉效言不效行致災訣第一百四十一太上中古以來人多效言乃不效行故致災害疾病畜積而不可除去以是自窮也是故吾敬受此道於天乃效信實不效虛言也執一行吾書道者下古人且日言吾道惡無益也反月善月言無益反且歲善歲言無益反至老常善久久不而去也後生者以為世學矣不知疾行者但空獨一世之間久苦耳故吾教勑真人常眷眷勉勉也道為有德人出先生與後俱與吾無有獨奇親也吾受之等耳故但得而力行之者即其人也無有甲與乙也子知之邪唯唯行天道無親歸于人地德無私付于謹民人交無有先後但愛于有實信是故古者帝王有宮宅以仕有德不仕無功之臣有德之人天地所愛可助帝王安萬物無德之人天地所怨陰陽之賊何其重也子自若愚哉然無德之人其行無數乃逆天地故與天地為怨也乃亂陰陽故與陰陽為賊也子知之邪唯唯行去勿復問善惡可覩矣唯唯行為子悒悒且為子分別解下古人之行人人曰自言惠且善曉事而反其行徵也反月德惡月月各自言有善行不負於天而反歲得災多且凶惡夭死少時人人自言善且大賢賢過其父與母而行到老長反無一善賢者皆為不肖之人貧賤且共壽則日少無一知真道夫下古之人善惡賢與不肖見於是矣何須自言賢且曉事乎但觀其徵可自知矣可長明可行真與偽矣何須復辨陳之成事已真人以吾書文示之令使一覺悟可天久迷與無地為重怨行吾辭小竟後復有疑乃來共議之唯唯右集難問太平訣人行有實與邪文闕題神人語真人言古始學道之時神遊守柔以自全積德不止道致仙乘雲駕龍行天門隨天轉易若循環真人專一老壽命與天連陽道積專日有單至信所致無爭榮名而居高官孝順事師道自來焉神乃知善人與語言夫師開曚為道之端君父及師天下命門能敬事此三人道乃大陳不事此三人室閉無門福德皆逃禍亂為憐詳惟其事無失書言父母生之師教其交居親仕之可不慎焉天下至士去官就仙仙無窮時命與天連長吏治民仙吏天官與俗何事其事異焉長吏治民仙萬神天下之事各自有君努力思善身可完全以是遂去不負祖先吾圖書已盡無復可陳致勉學詳請其文神人將去故戒真人慎之慎之亦無妄傳不得其人慎無出焉藏之深淵幽冥之間道不飲血無語要文外內已悉無可復言六極六竟孝順忠訣第一百五十一真人前子共記吾辭受天道文比久豈得其大部界分盡邪吾道有幾部以何為極以何為大究竟哉文中有道六極六竟愚生今説不知以何為六極六竟咄子其愚不開又學實自若未大精也故不知道之所到至也有過負於天師其責必不可復除不嫌也真人自責何一重也愚生聞子不孝則不能盡力養其親弟子不順則不能盡力修明其師道臣不忠則不能盡力共敬事其君為此三行而不善罪名不可除也天地憎之鬼神害之人共惡之死尚有餘責於地下名為三行不順善之子也常以月盡朔旦見對於天主正理陰陽是尊卑之神吏魂魄為之愁至滅乃已故自知不精有過於師不除也善哉善哉子於何受此辭語乎受之於先師也又愚生瞥覩天師説受天師之法見天象天地乃是四時五行之父母也四時五行不盡力供養天地所欲生為不孝之子其歲少善物為凶年人亦天地之子也子不慎力養天地所為名為不孝之子也故好用刑罰者其國常亂危而毀也萬物者隨四時五行而衰興而生長自養是其弟子也不能盡力隨其時氣而生長實老終為不順之弟子其年物傷人反共罪過其時氣不和為時氣得重過民者聖人賢者之弟子也今下愚弟子妄盜強説反使聖人賢者有過名為共亂逆天道其罪至重不可赦除故愚生過不除也風雨者乃是天地之忠臣也受天命而共行氣與澤不調均使天下不平比若人之受命為帝王之臣背上向下用心意不調均衆臣共為不忠信而共欺其上使天下恟恟多變諍國治為之危亂比三事者子不孝弟子不順臣不忠罪皆不與於赦令天甚疾之地甚惡之以為大事以為大咎也鬼神甚非之故為最惡下行也噫真人久懷智而反詐愚使吾妄説説得過於天地也吾之所説不若子今且所言深遠也愚生意適達於是今不能復有所言也大謙然亦不失之也下而不謙其過亦重唯唯不敢不敢也是故愚生為弟子不能明理師道之部界自知過重故説天象以是自責也善哉子之言也吾亦無以復加之也今以子説況之子已自知也書之部界矣實不及之也然子真不及之為子具分別解之使相次各有部界萬世不可復忘也今真人言人三行不順修善言魂魄見對極巧也於何受是説哉比若天師會事先師自言為上古真人戒愚生以此言又見天師書文中言故重知之也愚生問上古真人時不知屈折有所疑然上古真人言是也吾無以加之也今願及天師問其是意行明聽然所以月盡歲盡見對非獨生時不孝不順不忠大逆惡人魂神也天地神皆然天以十五日為一小界故月到十五日而折小還也以一月為中部以一歲為大部天地之間諸神精當共助天共生養長是萬二千物故諸神精悉皆得祿食也比若群臣賢者共助帝王養長凡民萬物皆得祿食也故隨天為法常以月十五日而小上對一月而中上對一歲而大對故有大功者賜遷舉之其無功者退去之或擊治此亂治者專邪惡之神也邪惡之神行與是故生時不善之人魂魄俱行對善人魂魄不肯為其使也是故逆不孝不順不忠之人為其使共亂天儀汙天治故其惡神見收治故并收治其客比若反逆惡臣為無狀乃罪及其客也此之謂之也善哉善哉愚生已解矣故人生之時為子當孝為臣當忠為弟子當順孝忠順不離其身然後死魂魄神精不見對也子知之耶唯唯可駭哉可駭哉今唯天師幸哀開示其天法象多少願無中棄唯見示勑書文部界所到至也然子問之大致數吾猶當言也如吾不言名為妒道業學而止而反得天適諾六真人安坐為子分別其部署凡有六屬一大集夫守一者以類相從古今守一其文大同大賢見吾文守行之不解策之得其要意如學可為孝子中學可為忠臣終老學之不中止不懈皆可得度世尚有餘策也行之不止尚或乃洞於六方八極也萬事已畢何不有也上乃可助有德帝君共安天地其恩乃下可及草木也萬物擾擾之屬莫不盡理也天地為之歡喜帝王為之長遊但響琴瑟唱樂而無復憂子知之耶唯唯中賢守行之力之旦夕惟思其意亦可少為孝子長為良臣助國致太平天下悉伏莫不言善哉外謹內信還各自責自正不敢負於天地不敢欺其上也衆賢共案力行之令使君治乃與天相似象天為行恩愛下及草木蚊蚋之屬皆得其所子知之耶唯唯凡民守讀之共強行之且相易共好嬉之不能自禁令人父慈母愛子孝妻順兄良弟恭鄰里悉思樂為善無復陰賊好竊相災害有人盡思樂忠順孝欲思上及中賢大賢故民不知復為凶惡家家人人自勑自治故可無刑罰而治也上人中人下人共行之天下立平不移時子知之耶唯唯守一入室知神戒第一百五十二是故夫守一之道得古今守一者復以類聚之上賢明力為之可得度世中賢力為之可為帝王良輔善吏小人力為之不知喜怒天下無怨咎也此者是吾書上首一部大界也恐俗人積愚迷惑日久不信吾文故教示使與古今守一之文合之以類相從乃以相證明也善哉善哉愚生謹以覺矣夫守一者大人守之亦有餘中人守之亦有餘小人守之亦有餘三人俱守行之其善乃洞洽於六方八遠其恩愛與天地同計也如最下愚有不樂守行者名為天下最惡凶人也天地疾惡之鬼神不復祐之也凡人久久共不好利之也此即天書所以簡人善惡之法也其好欲讀視者天知為善人示之不欲視者天知之為凶惡人也以此占人萬不失一也吾為上德君作文上不負天下不負地中不負德君不欺真人也守此得其意者道已畢矣竟矣六真人自深思其意吾不能悉記此之善夫一乃至道之喉襟也上士所樂德中士所響知下士之所疾惡也子知之耶唯唯是故上士得之大喜不而自禁為也中士得之不而自止常悅欲言也下士見之是其大忌也以吾文觀此三人而天下善惡分別明矣子知之乎唯唯是文乃天所以券正凡人之心以除下古承負先人之餘流災以解天病以除上德之君承負之謫也子知之邪唯唯善哉善哉行子已覺矣其二部界者其讀吾書道文合於古今以類相從都得其要意上賢明翕然喜之不能自禁止為善也乃上到於敢入茆室堅守之不失必得度世而去也志與神靈大合洞不得復譽於俗事也其善乃洞究洽於天地其神乃助天地復還助帝王化惡恩下及草木小微莫不被蒙其德化者是故古者賢明德師乃能助帝王致太平者皆得此人也故其言事悉順善而忠信也乃其所受道師善也真人知之耶唯唯其中中賢力共讀而吾文書合於古今道文書以類相從力共讀而不止其賢才者乃可上為帝王良輔善吏助德君化惡恩下及小微草木陰陽和合無復有戰鬭者帝王長遊而無憂事群臣下俱相示教力為之莫不順善而忠信無刑罰而治其善不可勝書真人知之耶唯唯其百姓俱共讀吾書道文上下通都合計同策為一無復知為凶惡者也拘校古今道文以類相從相明因以為世學父子相傳無窮已也如三人大賢中賢下賢及百姓俱為之占天地之惡氣畢去矣無復承負之厄會也善乃合陰陽天地和氣瑞應畢出遊於帝王之都是皇天后土洽悅喜之證也故讀吾文者宜精詳之以上到下思惟其要意得其訣與神明無異也真人知之耶唯唯其三部界者夫人得道者必多見神能使之其上賢明者治十中十可以為帝王使辟邪去惡之臣也或久久乃復能入茆室而度去不復譽於俗事也故守一然後且具知善惡過失處然後能守道入茆室精修然後能守神故第三也賢者得拘校古今神書以相證明也真人知之耶唯唯中賢守一入道亦且自覩神治十中九可為王侯大臣共辟除邪惡或久久亦冀及入茆室矣真人知之邪唯唯其小賢守一入道讀書亦或覩神可治十中八可為百姓共辟邪除惡也亦皆當拘校古今道文以自相證明乃愚者一明悉解信道也如使讀一卷書必且不信之也反且言其非而自解則邪惡日興得害人也如大賢中賢下及百姓俱守神道而為之則天地四時之神悉興邪自消亡矣真人知之耶唯唯如此則天下地上四方六屬六親之神悉悅喜大興助人為吉以解邪害上為帝王除災病中為賢者除疾下為百姓除惡氣令姦鬼物不得行也善哉善哉須有大訣戒見神以占事言十中十者法與天神相應言十中九與地神相應也言十中八者與人神相應也過此而下者言不可用也或有初覩神反十十相應久久反日不中者見試於神道故使不中也見是能復更自新力自正思過更為精善無惡意者且復日上行或中神意乃射十中十或出十或射十乃中一十日以大中而上行者是其日思為善得道意之人也故曰進以是自占萬不失一也或有初見神占事不中已反日已上行大中是者精得道神意日上進之人也或有平平如故不進不退是其用精不過故之人也日衰者曰懈之人也以是占之不得道意矣見試而不覺悟固固自若為惡者諸神且共欺之牽人入邪中則致吉凶無常或入祅言或坐病止故大賢中賢小賢百姓男女為道悉以是自占不失之也非猶神道試人也凡天下之事皆以試敗天地有試人故人亦象天地有相試也真人知之耶唯唯子欲重知其大信效天道神靈及人民相得意相合與心而至誠信不相得意則相欺是故上古之人誠信相得意故上下不相欺中古人半不相得意故半相欺下古之人純不相信故上下純以相欺為事故上古舉事悉中中古半中下古純不中故危亡是故古者賢聖常以是自占可為得與不得則無失也以此戒真人吾見子常苦勞故深戒子子乃為天地長使也解天地流災為王者除害其功甚大少雙恐子為道中懈故以是神事以戒子子乃為天地使而日吉者是其得天地心意也日凶衰惡是其失天地心意也與道神交日吉善者是其得道心意也而日凶衰者是其失道心意也與人交日益厚善者是其相得心意也而反日凶惡薄者是其相失心意也比若耕田得穀獨成實多善者是用心密用力多也而耕得穀少不成善實者是其用心小懈用力少也此但草木尚乃隨人心意用力多少功苦為善惡何況天地神靈與人哉可不戒耶真人也此之為戒若薄少不足言而深思念之反大重此正所為謂安危吉凶門戶也子知之耶唯唯愚生已覺矣受命受命夫賢明為上德君拘校上古中古下古文書之屬以類相從更相證明道一旦而正與日月無異復大集聚大賢中賢下賢乃及人民男女口辭訣事以類相從還以相證明書文且大合比若與重規合矩無殊異也天地人策俱并合比若一也如此則天地人情悉在萬二千物亦然故德君當努力用之則災害一旦而去天下自治無有餘邪文邪辭洞白悉正則無餘邪氣夫邪文邪辭繫災之根也子欲重知其明審信效比若人以邪文相記於君比若人以邪言相惡則怨咎日興衆多人亦自相怨咎相惡君亦聽之反失正聰明不達為天地所非治危辭不吉又下反以邪文邪言共欺熒惑其上久久上知之亦復君臣相咎故是邪文邪言日至凶惡之門戶也故當力拘校去之也真人知之耶唯唯故德君盡以正辭而天地開闢以來承負之災厄悉除無復災害真人欲重知其大信也夫正文正辭乃為天地人萬物之正本根也是故上古大聖賢案正文正辭而行者天地為其正三光為其正四時五行乃為其正人民凡物為其正是則正文正辭乃為天地人民萬物之正根大效也子欲重明知其信比若人以正文正辭相譽於君前君得以為大聰明大達也舉事悉得無失正者下上乃得天地之心意三光為其不失行度四時五行為其不錯人民莫不歡喜皆言善哉萬物各得其所矣恩洽神祇則名聞遠方群神瑞應奇物為喜而出天下賢儒盡悉樂往輔其君為不閉藏仙人神靈乃負不老之方與之祅癢為其滅絶人民為其行政言正文正辭乃無復相憎惡者則怨咎為其絶天下凡善悉出凡邪惡悉藏德君但當垂拱而自治何有危亡之憂此即吾正文正辭為善根之明證效也可不力正哉真人寧解不唯唯可駭哉見天師言謹已大覺矣愚生知天下已太平矣德君聽用之已延命矣善哉子可謂為曉事之生也已洞知之矣樂乎樂乎天憂已解矣地病已除矣真人以何知之然此邪惡盡應當見去天地人民萬物之大病已除也今已拘校正文正辭故知天地之大病已除也善哉善哉子已知之矣帝王力行吾文與天地厚無復厄會也善哉善哉語真人一大要言也上德之君得吾文天法象以仕臣上至神人下至小微賤凡此九人神真仙道聖賢凡民奴婢此九人有真信忠誠有善真道樂來為德君輔者悉問其能而仕之慎無署非其職也亦無逆去之也名為逆人勉勉眷眷之心天非人但因據而任之而各問其所能長則無所不治矣德君宜試之日有善效者進之慎無失也無效者疾退之此名為汙亂天官使正氣不得來咎在此邪人也夫正善人心常欲陰祐凡事為憂故曰致正善人也邪人有邪心不欲陰祐利凡事則致邪此乃皇天自然之格法也故當即退之不退之且忿天使地殺氣出故當疾去之是大事也真人知之耶唯唯愚生甚畏之子知畏之可謂曉事生矣天且祐子不敢不敢此無可讓也非吾而使子見祐於天也子為善自然行得之也故古者聖人之為行也不敢失繩墨者乃覩天戒明知其善惡各為其身也故常求與賢者為治乃恐忿天也得罪於天無所禱也是故古者帝王其心明達不敢妄與愚者共事也故獨得長吉也真人知之耶唯唯夫中古以來人半愚以為選舉為小事也不詳察之半得非其人半亂天官政半凶也下古復承負中古輕事復令自易不詳察之選舉多不俱得其人汙亂天官三光為其不正證上見於天天不喜之也故多凶年不絶絶者復起不知天甚怨惡之人不深自責反言天時運也古者為有如此者天道非人反以其太過上歸天下愚不自思過失反復上共責歸過於帝王天乃名此為大反逆之民過在下傳欺其上以惡為善以善為惡共致此災反以上歸天以歸天者復上責其君天下絶洞凶民臣無狀之人也今天地神靈共疾惡之故天乃親自謁遣吾下為德君更制作法也選舉署人官職不可不審且詳也真人欲知是惡民臣之審也比若家人父母共生數子子共欺其父母行為惡父母默坐家一室中安而知之已行為凶惡盜劫人反還共罪其父母父母惡故生我惡也縣官吏得之不直殺其惡子反復還罪其父母夫父母生子皆樂其賢且善何時樂汝行為惡哉反還罪其父母是為大逆不孝子也夫君之謂臣皆樂其為善何時教其為惡而民臣自下共為凶惡之行得天地災者反以還罪責其君百姓愁苦於是猾吏亦復共上責於天名是為民臣共作反逆罪不除也共責其君極已應大劇矣尚復乃上罪責天下罪責地人之反逆乃如此可不短其命而疾殺之哉故下古皆應霸命死生無時也比若民家欲殺畜生忽欲殺之便殺之也善畜尚惜其死惡畜樂其病死真人知之耶唯唯愚生甚畏天威行子已覺矣出此文令德君以示諸賢儒慎無匿天樂出之急急唯唯告真人一大要大德上君已仕臣各得其人合於天心則當知治民除害之術夫四遠伏匿甚難知也夫下愚之人各取自利反共欺其上德君當與賢明共正之悉正乃天地之心意且大悅喜使帝王長吉也天明知下古人且愚難治正故故為其出券文名為天書也書之為法著也明也天下共以記事當共所行也可以記天下人之文章也故文書者天下人所當共讀也不為一人單孤生也故天下共以記凡事也聖人共以記天地文理賢者用記聖人之文辭凡人所當學而共讀之乃後得其意也書之為類乃當共原共策共記共誦讀之乃以無姦也故自古到今賢聖之文也幾何校幾何傳幾何實核幾何共安之尚故故有餘邪文誤辭不可純行故大賢諸道士乃周流遍天下考辭習語視異同以歸喻愚蒙尚故故誤人赤子使妄説其學則不可妄仕不足以為帝王之臣也故一本文者章句衆多故異言令使天地之道乃大亂不理故生承負之災也真人知之耶唯唯行子已覺矣子明更聽且語子一大戒下古之人所以久失天心使天地常悒悒者君乃用單言孤亂核事其不實甚失其意明矣真人但以此上乃使天下衆賢共考辭文而不知皆為誤學故生災異不絶天甚疾之得亂生病焉陰陽戰鬭而不止也故天教吾下拘校正之今大中古以來信孤辭單言每視覆下之文為不敬共以是相法罪遂用孤辭單言反應投書治事故與天為怨亂天官文書本使人共議其是與非反使一人陰為辭夫聖人尚不而獨畢知天地之道故聖賢前後生所作各異天上言其各長於一分不能具除災故教吾都合集校之今反信一人之言寧可用不故教其三道行書大小賢不肖男女共為之參錯共議是與非皆令得其實核乃可上也中一人欲欺輒記之如是則天地病已除帝王無承負之貴矣天地得以無病而喜帝王得以自安而喜賢者得以自達而喜百姓得以自解不見冤家富人足而喜奴婢得其主不為非而喜四時五行得順行民謹不犯之而喜萬二十物各得其處所不見害而喜鬼神見德君可為積善亦復悅喜惡氣不復上蔽日月三光亦喜太上平氣得來治王者用事亦喜惡氣得一伏藏不伏見使行誅伐亦喜夷狄得安其處不復數來為天戰鬭亦喜軍師使兵器得休止不用士卒不戰死亦喜凡天地之間若此喜者衆多不可勝記行為真人舉其大綱見其始子自思其意凡事以類推之盡以得矣德君案行之天下咸服矣故天尤急此三道行書慎無復廢故災不去也欲斷天文反復為聾盲之治也夫聾盲之治亂危之本也滅身之災害也可不慎乎夫文乃天下之人所當共案行也不可信一人之言也故天地開闢以來文書及人辭更相傳以相考明也不考明則不可獨行獨信一人言而行之則危亡矣是天下之大失大傷也故吾書不敢容單言孤辭也故教真人拘校上古中古下古文以相明拘校天下凡人之辭以相證盟然後天地之間可正陰陽之間無病也以吾書往考古今之天文地神書與人辭必且與響相應與神無異也乃吾道且可信也故吾為道不試言也乃求試行不行之安知吾道與天相應而信哉今日行之比若與天語十十五五無有脫者神哉為道如斯誠可謂大樂矣真人知之耶唯唯行去曉事生矣告真人一大訣此本守一專善得其意故得入道故次之以道文也為道乃到于入室入真道而入室必知神故次之以神戒也得守一得道得神必上能為帝王德君良臣臣者必當助帝王德君共安天地六方八洞得其意乃國可長安也欲安之必當正文正辭正言故以拘校文辭得以大正必當群賢上士出共輔帝王為其聰明股肱故次之以仕臣九人九人各得其所當共安天地天下并力同心為一也必常相與常通語言相報善惡故次之以三道行書也人已都知守一已入道已入神已入正文以尊卑仕臣各得其處也已行文書并力六事已究竟都天下共一心無敢復相憎惡者皆且相愛利若同父母而生故德君深得天心樂乎無事也以為道恐有遺失使天地文不畢備故復次之以大集之難以解其疑深者居其下畢書出之以書付有德君天下一旦轉計響善自治其為易比若火沿高燥水從下不教其為自然往也不可禁止也故為太皇天道教化立可待也德君行之乃名為天之神子也號曰上皇與天地元氣相似故天下之神盡可使也從天地開闢以來未嘗有天書神文使真人傳之為真道記也以往付德君名為道母也太陽之氣火行有也得而行之得其信也不知行之則不真也真人知之耶唯唯誠寄謹民往付歸德君不敢久留也行子已曉之矣天書不可久留也天神考人使人不吉子慎之行去唯唯六究洽洞極七竟以類次書文使相得災悉滅亡致洞極之吉文忍辱象天地至誠與神相應大戒第一百五十三真人前唯唯今且戒真人一大戒吾道乃為理天地安帝王生天地所愛者乃當愛真道與真德也故天者乃道之真道之綱道之信道之所因緣而行也地者乃德之長德之紀德之所因緣而止也故能長為萬物之母也常忍辱居其下也不自言勞且苦也吾之為德君教化下愚正以此天地二事為祖也故常案天地之法度不失其門戶也吾之書即天談地語與神祇深獨相應若表裏也步即相隨若規矩也故順行者得天地意失之者凶衰矣今以戒真人子宜思吾言而常慎之矣唯唯行見子好真道德好為善少雙且示子一言今上士多樂真道善德中士半好之下士無狀純無道無德皆應大逆無道之人也大凶無德之人與天地內獨不比不而相知非天常所宥也愛子也故無道德者命不在天地也與禽獸同祿同命今不解願聞其要意然六真人明聽唯唯然天者純為道地者純為德此無道德之人與天地絶屬無所象象於天行當有真道而好生象地當有善德而好養長今人無道與無德故天地不宥子也欲知其明信效也比若道人知道人德人知德人各自相收録故命迭相在故道人者好興道人德人者好興德人有道德之人與無道德之人不比故不肯相收録命不繫天也善哉善哉願聞其與禽獸同命意善乎子難深得其數然禽獸者命繫於四方其為性者好相抵觸無有道德勝者為右無道德下愚之人亦好相觸冒勝者為右其氣與禽獸同故同命也天道為法以是分別人優劣故知之也凡天下之名命所屬皆以類相從故知其命所屬故含五性多者象陽而仁含六情多者象陰而貪受陽施多者為男受陰施多者為女受王相氣多者為尊貴則壽受休廢囚氣多者數病而早死又貧極也故凡人生者在其所象何行之氣其命者繫於六甲何曆以類占之萬不失一也故古者聖人深原凡事知人情者以此也真人知之耶唯唯善哉善哉今故下古之人承負先人失計稍稍共絶道德日獨積久與天地斷絶精氣不通不相知命反與四足同命故天地憎惡之鬼神精氣因而不祐之病之無數殺之無期其大咎在此今上德之君命繫天地當更象天地以道德治故吾更理出天道出以上付之天樂其為善不欲復使其有餘是四足之人行也故吾書復重丁寧欲使其大覺悟也故敘六極一大集難以付歸之真人知之耶唯唯可駭乎樂哉樂哉真人以何知其可駭而樂哉然愚生見天師言真道德出民一旦而轉皆守為道德象天地不復為四足之人行人人道人人德故知其大樂至意矣善哉真人之言無以加之也今願及天師請問一事言之今人求道德及凡人行當以何為急務哉以何而得知之以何而與天地響相應也善乎子之問也當以至誠五內情實為之乃可得也如不以五內情實為之是道德之所怨也求善不可得也神靈不應也今願聞至誠以何而感動天地神靈乎噫真人於是殊為愚學吾書文多固固未解邪愚生其為暗昧曚乃久重難一旦而開然子亦大謙行更明聽為子道至誠感動天地之意唯唯聞命然夫至誠者名為至誠乃言其上視天而行象天道可為俯視地而行象地德而移念天地使父母生長我不欲樂我為惡也還考之於心乃行心者最藏之神尊者也心者神聖純陽火之行也火者動而上行與天同光故日者乃火之王為天之正無不照明故人為至誠心中正疾痛應心神至聖乃上白於日日乃上白於天故至誠於五內者動神靈也是故可不慎乎真人曰可畏哉可畏哉愚生過問是甚大怖子知怖活之根也子不知怖死之門也安危在子之身無於他所焉今雖每問天師而怖駭者又問乃訣乃大解不問又無緣得知之然子言是也暗而不好問何時復得昭昭哉行言欲問何等今謹已聞至誠動天願聞動地意善哉子言日益大深不惜之也行安坐為子道之不言恐得過於子若天獨疾後世人不至誠而使真人來主問之也諾今為子説之明聽唯唯行人之至誠有所可念心中為其疾痛故乃發心腹不而食也念之者心也意也心意不忘肝最仁故目為其主出涕泣是其精思之至誠也精明人者心也念而不置者意也脾也心者純陽位屬天脾者純陰位屬地至誠可專念乃心痛涕出心使意念主行告示遠方意陰也陰有憂者當報陽故上報皇天神靈脾者陰家在地故下入地報地故天地乃為其移凡神為其動也子欲知其大效吾不欺真人也真人但安坐深幽室間處念心思神神悉自來到此不明效證邪是吾告子至誠之信也吾未嘗空無法而説也故求道德凡人行皆由至誠乃天地應之神靈來告之也如不至誠不而感動天地移神靈也故承負之後下古之人實無信不至誠不而感動天地共欺天與地故神靈害之不止也願聞以何明之乎然有大明證於日月今願聞之然下古之人生於父與母而共忽其父母背叛其父母萬未一人而孝也得解蒙暗於師已覺去者忽其師不師為其師自屈折執勞苦也以貧賤得富貴於君而反相教下皆共日欺其上萬未有一人有誠信也群愚共欺其三綱名為反逆而無信也其罪過彰彰下可覆蓋皆上見於日月三光也故天地甚疾之惡之使其短命而早死也不自深十問過罪重反復哭而行也言天酷何一冤也汝乃自冤何時天冤汝哉可駭乎善哉善哉愚生已聞命矣然子而守此以為重戒則可萬萬世無患矣然辭小竟疑者復來問之唯唯右大集難道德至誠天戒以示賢妒道不傳處士助化訣第一百五十四真真愚暗日益劇不曉大不達之生謹再拜問一從事言之必為過不問又愚心不能獨自解行言之愚生竊聞祕道要德是乃天地之珍寶天下之珍奇物也故名之為至道不傳其非凡人所宜聞所宜言所宜用也而令天師都開太平學之路悉勑使人為道德要文不得蔽匿皆言其有天謫到死罪尚不除復流後世皆授以真道祕德曾不大哉令小人與君子不別愚生以為真道祕德不宜使小人聞小人言小人用之也咄噫子今且言有萬死之責於皇天后土不復除也自天地開闢以來後生日益薄妒道小人斷絶天地之珍寶以是為失積久故生承負令天災不絶常使天地內獨歲不平安災變盜賊衆多國家為其愁苦正起於是子今且所言是正是也亂天反地使治昏憒民難治正是也子今且語正與天為重怨錯哉錯哉亡子功矣何謂也今要道善德出之以教化小人得之守道德更相倣學不敢為非其中小賢得善道德可為良順之吏其中大賢可上為國家輔其中最下極無知者猶為善人夫天以要真道生物乃下及六畜禽獸夫四時五行乃天地之真要道也天地之神寶也天地之藏氣也六畜禽獸皆懷之以為性草木得之然後生長若天不施具要道焉安能相生長哉而真人言小人不宜聞要道不宜言不宜用也天地之神保終類人乃不若六畜草木善邪哉真人自知今且言有萬死之罪不復除也愚生事師日少淺不深知天道見天師言乃自知罪重上負皇天下負后土中負於大德之君然子退自責是也凡舉事可不慎乎哉皇天常獨視人口言何故使響隨人音為吉凶故響應不失銖分也子獨不常觀此天地之音證邪宜自慎不及勿強妄語其為害重子今且言至道不傳人何以傳知之乎終類至道不可傳天道無私但當獨為誰生乎弟子自慎戒事甚無狀子欲若俗夫小人復相教妒天道耶不敢不敢真人自精戒事天怒一發罪過著不復除也天道正由此言廢毀子復共增之耶帝王所以不能理其治而嘗多災者但由盡若子今旦可言因使真道道絶也邪道起故不可理也寧曉心解不乎唯唯已覺矣慚負天師不也常常慎事唯唯今念每言有過欲不言也又不知平言今人所不宜聞所不宜言所不宜用者何等也然凡人乃不宜聞非真要道非真要德是故夫下愚之師教化小人也忽事不以要祕道真德勑教之反以浮華偽文巧述示教凡人其中大賢得邪偽巧文習知便上共欺其君其中中賢得習偽文便成猾吏上共佞欺其上下共巧其謹良民下愚小人得之以作無義理欺其父母巧其鄰里或成盜賊不可止賢不肖吏民共為姦偽俱不能相禁絶覩邪不正乃上亂天文下亂地理賊五行所成逆四時所養共欺其上國家昏亂其為害甚甚不可勝記真人反言小人不宜聞要道要德反當以邪巧偽之事教化使天下人眩瞑共習偽非而不自知遂俱為無道耶是以真人有萬死之罪不復除也天下所不宜聞所不宜言所不宜用正不宜聞此偽文邪巧大猾所生正由此故吾為天陳法為德君作教不敢及之所以專開道德之門而閉絶狡猾階路也故吾書本道德之根棄除邪文巧偽之法悉不與焉子獨不怪之耶是乃天地以為病帝王以為害行復為真人具説之其以要道德以教化小人也上賢得以守儒良中賢德以上為國家至德之輔臣其中小賢化為順善之吏其中下愚猶為謹民不知相害傷故自天地四時五行日月星宿共以真道要德養萬二千物下及六畜糞土草皆被服其祕道要德而以得生長今若以真人今且言終類此人不若六畜及糞土草耶子今且言寧自知有萬死之過不除邪有死過有死過勿謝同不解耳今過言當奈何哉今欲解此過常以除日於曠野四達道上四面謝叩頭各五行先上視天回下叩頭於地唯唯今且天師教愚生何一急也然所以急者不以故真人也乃真人言得天地之忌太上中古以來人教化多妒真道善德反相教逃匿之閉藏絶之反以邪巧道相教導化愚人使俱為非其中大賢遠去避世獨其中小賢為吏無有真道亂其民其中下愚因為無道起為盜賊民臣俱為邪聚蚊成雷動共逆天文毀天道逆地意反四時氣逆五行使災怪億億三光失其正明帝王大愁苦之得昏亂焉治不得平安正由此也故真人寧知此罪重不天不除之也吾不教子當謝也故所以當於曠野者當於鮮明地所以四達道上者道者主通事所以四達者當付於四時天之使氣也且為子上通於天也四時者仁而生成且解子過於天地也後有過者皆象子也天從今以往大疾人為惡故夫君子乃當常過於大善不宜過於大惡慎之慎之子尚若此何況於俗人愚哉相教嫉妒道藏匿之是也子所言常善是今旦一言名為大逆天地從古到今人君所得愁也然真人前人安得生為君子哉皆由學之耳學之以道其人道學之以德其人得學之以善其人善學之以至道善德其人到老長乃復大益善良故懷要道善德之人乃名為帝王之處士人之第一上善者也能助君子化者也其不仕者為上謹之人學之人學之以惡其人惡學之以文其人文學之以偽其人偽學之以巧其人巧學之其中大賢者則巧言其習書者則巧文小人得之為猾民於子心寧可以教不哉故夫要道祕德乃所以承天心而順地意可以長安國家使帝王樂者也而反禁絶不以力化人有謫於天罪不除也天以至道為行地以至德為家共以生萬物無所匿無可私也故古者聖人象天地為行以至道要德力教化愚人使為謹良令易治今世反多閉絶之故愚人共為狡猾失天道不自知為非咎在真道善德不施行故人多被天謫當死不除也愚人無道不避忌諱遂共犯天地由不知道德要也吾之為書所以反覆勉勉眷眷者恐人積愚一言不信吾文故復重之也人俱習為邪久或反謂吾可言非也復令使真道祕德門絶斷不行天怒不絶帝長愁苦吏民無所投頭足相隨雲亂不能相救試誠冤吾辭於天正為解除此制作道也人人被邪文愚蒙積久故常勑真人使出吾道以付上道德之君以示衆賢疾試吾道乃知吾書之信與天地相似不用不試安知其哉今保吾道不誤故求試非一卷之文真人慎之唯唯行去常慎吾言勿自易妄語也唯唯出之無匿藏使凡人言語學問當知得失處不復妄為唯唯右解人常所不宜聞所不宜言所不宜用斷邪出真文事師如事父言當成法訣第一百五十五今愚生舉言不中天師心常為重謫過不冒過問又到年竟猶無從得知之願復請問一言平道之何所謙哉不知而問之是其數也今以第一上道要德以教凡人曾不大知乎善哉子言也何有大知之有乎子何故疑此哉吾聞子智過其父弟子智過其師臣智過其君則名為下賢智過於其上以為不宜今子言是也又非也今下智過於上者乃謂不當使下智為巧偽之法其智過其上則還欺其上子欲樂知其效比若教學巧家弟子智過其師則還害其師矣夫為人下習知猾偽姦道則下共還熒惑欺其上矣是故古者大聖賢不敢妄授教猾巧偽文道也常深念其本而斷其末不使愚人知之故以猾智知國國之大賊也故古者聖人常務授其真道不授浮華偽相巧弄之法也知其為害大深故常閉其凶學而務開其吉路使民常自謹不知為非子欲重知其信是故上三皇乃師事臣如父也時臣各懷真道要德無巧偽文猾人故其時臣智悉過其君能為帝王師其教若父故師父事之是則道德過其君之則也故能使其君安坐垂拱而無憂故言十中十可輔帝王言十中九可佐大臣言十中八可為小吏過此而下不足取策所言不中名為妄語亂誤上者也子知之耶唯唯行子欲重知其大效到于五帝道小衰故君臣道德不能復相問同門為朋同志為友所知君臣同不能復大相高上要道祕德小塞不通故無可師父事但朋友事之也到于三王師授者多妒學閉絶真道奇德其弟子日益愚蔽無知反多入浮文使君洽眩亂其道德淺薄不足父事不足友事故子事之其智少故不而為帝王圖難易故使天地大怒災變連起不可禁絶大咎在此子知之耶唯唯行子已覺矣復為子重明之今五霸其臣悉無真道德皆能作巧偽猾所以相欺詐者其臣多知邪猾佞偽巧所以相驚動惑之道或乃過其君因而反逆子殺其父臣殺其君下殺其上悉懷無義夷狄之心人人有巧偽之術各有姦心無有真道故數反逆故事斧鑽視臣若死籍乃其臣皆懷佞文多巧猾道不足重故視之若畜也是明效也故古者聖賢應天心娉真道德士仁人而放佞偽猾以稱皇天之心是故吾道悉開吉門而閉凶戶不敢及猾知可以過其君者也子寧曉知之耶唯唯慎之矣太上古之臣多仙壽故能使其君壽中古臣多知懷道德故能使其君常無憂下古臣多無真道而愚故多使其君愚甚君愚其洽常亂憒不得天心霸君之臣盡佞偽多猾巧詐共熒惑其君使其失天正路反入凶戶故與天為大怨子知之乎故其治悉凶不得大久真人為天問事宜日謹不可但恣意妄言言當成法言不成經不若默也舉言不中罪深不除唯唯行去子已知矣右智賢過其君難解訣神司人守本陰祐訣第一百五十六請問一大疑事行言之今天師廣開天道之路悉拘校古者道書之文以為真要祕道真道者多善其文乃入神故能睹神與神為治所治若神入神則真其道也乃多成於幽室或有使度於室中而去者或有一出一入未能去者或有但見神而終古不去者夫度去者萬未有一人大壽者千未有一人也小壽者百未有一人也竟其天年者比是也凡天下之人學問也萬未一人得上官也千未一人得中官也百未一人得小官也其於佃家活生萬未一人得億萬也千未一人得千萬也百未一人得百萬也凡事者皆如此矣故其本者衆多其度世及富貴者少也愚生甚憂之今為道當以何為大戒而得長成乎學問當以何為大戒而得到大官乎治生聚財當以何為大戒而得致富乎今不及天師力問諸疑恐終古蒙昧不復開通無以得知之也善哉善哉諸真人問疑事也天使子來問之諾安坐善問身聽今為真人悉道之使可知自隨而力記之唯唯行後世得吾文為其廣開真道之路必且俱學真道夫真道而多與神交際神道專以司人為事親人且喜善與不視人且驚駭與不俱爭語言於人旁狀若群鳥相與往來無有窮極或言人且度去或言人且富而貴或言人且貧而賤或譽旁人或毀旁人或使人大悅喜或使人常苦大忿夫神乃無形象變化無窮極之物也人為之能專心自守能不聽其言考心乃行閉口不傳其言又不隨為其愁怒喜固固堅守本不移務陰利祐人及凡物不欲為害以年一知道之後常為上善務利而不害傷求道為善到年窮乃止為是不敢懈怠萬萬度世一不耳萬得大吉一凶耳如此則群神轉共祐助人也使人日樂善不知復為邪惡也真人知之耶唯唯行子已知矣行為真人道其且亂敗者人用心意不專純又易喜易怒易驚易惑又易事輕口清辨慧常欲語善惡無可能隱匿遭者欲言不能自禁止於其如是則群神共來欺之或之小人則且上入祅言而死也或數爭辨口而妄言也或為鬼神所驚因而病狂也大用心意不專一人怒喜無常舉事失正惚恍無方或以是失其賢友善輔也因以危亡是者大咎在不愛利為上則不欲利其下聽邪神反欲害之故賢者使去反失其賢輔用其於小人也不欲尊重其上反聽邪神詐偽祅言妄語是即為道不成所以得凶之門戶也吾不能豫勝記之也凡人用心不能專堅密者易營或皆舉事不吉所為多害得凶其過失積衆多不可盡言但為真人舉道其大綱見其端首使賢明深見吾文自精詳隨而察之必已知矣真人寧曉不耶唯唯行子已大覺矣守吾文以為深戒以為行者萬世可無凶害誠故後世讀吾文書從上到下盡睹其要意義而行者萬不失一也守之不置自然畢也專心善意乃與神交結也邪心惡意道必失也大人不精聽耶或失其正位小人不精聽耶與祅結也此悉成身之害不可不大戒慎也凡人舉事有過皆自身得之也夫禍變近從胸心中出不以他所來也真人知耶唯唯可駭哉可駭哉子知懼駭於是可謂已得入真道矣愚生已大覺矣賢儀此以為行成事得長入吉門辟凶戶矣死生之路可長睹矣案此為行凶耶日遠去吉者來矣然子已知之矣不復重戒子也唯唯行為子道學而得大官者決意凡人學問也今日入學門用心專一常欲祐利愛而不妄語年少而學至老窮無復知乃止不樂得官也但身好學務欲得知經道積為善而不止行名立經道成深知古今災變所從起其行與學有益於上有利於下為善積聞不可闔閉名聞四遠明王好之因而徵索召取百姓俱言善哉俱言大吉是其人也旁人為其説喜是者即其善人學而度世者也真人知之耶唯唯為道敗成戒第一百五十七行復為子説道其不度者意今日入學門不樂思得真道善説但欲博聞多睹可以行窮極聖人者又不樂推行作善反好浮華之文可以相欺偽者或既得入經道又用心不專一常欲妄語辨於口辭以害人為職不尊重上不利愛下其行與經道實空虛未足以為帝王之良臣反行守長者旁人以財貨自助欲得大官以起名譽因而盜採財利以公趣私背上利下是即亂敗正治天地之害國家之賊也民之虎狼父母之惡子也天地憎之鬼神惡之故其罪泄見者時時見誅於帝王以稱天心以解民之大害也是其工欺而得官者也或有用心不專實空虛無真守反積常思欲得官官者乃天之列宿之官也以封有德賞有功也不以妄豫無功之人也無功之人天地所忽神靈所不好愛也下愚不能深自知惡反妄思得天官而不止邪鬼物因而共下其心使其妄語因而妖言不而自禁止也故時有邪言而死者此之謂也非獨為道不得其意則凶也凡人為行不欲樂善為悉凶也真人努力子幸有善意常欲愛利為事已度矣雖然真人凡人且度不度不在於前也其失皆在於後皆由不自愛自易自言且度反中有過而不度也故吾今説而不得中止者乃真人使吾説不得止也今欲中閉説而自易不言恐恨真人真人恨則上視天反且使天害吾故吾言不敢道自易閉學而中止也子知之耶唯唯行凡人之得害如此矣常得於未解不與本相應故失之也子既有大功於天努力努力唯唯不敢自易業學而道上也行子已知自度之術矣吾無以加之也行復為真人具説其人樂治家畜財得富貴者年少力能布作而長思為事力盡因乃止能揚善隱惡常用心樂為善栗栗思尊上凡疑悉慎戒之不敢妄為又愛下不欲害人不枉王法不樂隨邪禮相隨飲食也凡不急之事不敢與焉有知而為此行到老無知乃已雖實若虛口不輕語故能致珍物畜積因以成人也夫人賢不肖用意各異或有不善之人輕上害下好從邪禮不急之行數到巿道用口妄語不能忍非即凶亂危亡之人也非為道也子知之耶唯唯是故夫為道者專汝心閉汝口毋妄言也是故古者聖賢睹天法明故能行道守德也天乃專一晝夜行道而不言故能獨吉也地乃晝夜行道而不言愛養萬物故能長獨安也四時乃獨行道晝夜不止故能常獨興王而不止也三光乃獨行真道而不言故能常明隨天運行也五行乃獨行真道而不言故能與天地為常也凡天下之為道行者象此不可勝書也故能愛利口不妄言則道可得也欲輕忽事反吾文言者成為道所賊萬不失一也真人既遠來問疑故以戒子也得書思之惟之吾不負子也吾乃為天談以戒上德之君夫德君天與之必且好道百姓且象其君而為之皆以此文為大戒則可得吉而遠凶也出此之書以戒下愚慎毋藏之唯唯行去此説戒乃若小而反大若薄而反厚何謂也然念其辭言也若小耳其戒反大也念其言若類似俗辨士所為也則似薄不足傳也念其戒人成人則厚矣故念吾為真人作道其大也則洞至無表其小也則洞達無裏尊則極其上卑則極其下故上及神人下及奴婢所以然者欲使大人為之亦言足小人為之亦言足賢聖為之亦言足百姓為之亦言足何也願聞其意善哉子之難也得其意然吾乃為太平之君作經夫太平之君治乃當象天為法不可若小國但長於一界也是故天之為象法也乃尊無上反卑無下大無外反小無內包養萬二千物善惡大小皆利祐之授以元氣而生之終之不害傷也故能為天最稱神也最名無上之君也今上皇氣至德君治當象此為法故吾道一高一下一沈一浮欲使衆賢共察之也是故東南地戶乃有柱天之水不逆小流之力也善惡大小皆歸之真人知之耶唯唯行欲復説辭無極為其大文且小止息各歸思之於胸臆作道不得其意示之以南反問北用心如此則終古所學不得也不敢不行子已曉矣右集難道戒學治生成與不成吉凶何所起訣核文壽長訣第一百五十八願請問一疑事言之今願及天師問文之訣人之實長可與共事而終古無復厭之時豈可得聞乎然子欲核衆文知賢者處耶諾安坐為真人道之積文億卷不能得壽何益於命乎文書滿室而不能理平其治又何益於政乎臣子滿朝而不能為君致太平樂其上又何益於帝王乎一人生百子使父母飢寒又何益於親乎積方重車不能益壽又何益於人命乎説事無窮於不能為君除災患又何益於朝廷乎凡事類若此者衆多不可勝記也但為真人舉綱見始令諸賢柔自深察之耳願得其效子欲知之耶唯天師諾安坐自精方為子言之文書億卷中有能增人壽益人命安人身者真文也其餘非也文書滿室中有能得天心平理治者真文也其餘非也臣子滿朝廷中有能樂其君助其君致太平者是帝王之真臣良吏也其餘者佐職之臣子也人生一子而父母常得其樂而不飢寒者是賢孝之子其餘悉備數也積方重車中有能益年者是真方也其餘悉非也天下若此比類衆多不可勝記豫説也真人自深思其意吾文以一推萬足以明天下之道矣故令使真人付道於上德之君拘校凡文人辭聖書者明以示衆賢使一俱覺解迷與惑也已拘校凡文之後災日去矣夫邪文邪言乃是姦災之主人也夫正文正言乃逐除邪姦惡之吏也文已正言已正姦偽無主人則無於止宿也夫邪文邪言為姦主人比若盜賊有主舍止宿者主人已死亡盜賊無緣復得來止息也真人亦曉知之耶唯唯行天道之為法以一況萬亦不可盡書也真人得之自深惟思其要意賢明心有九孔易達見文自大覺矣勿復問也曾文唯唯文多使人眩冥不若舉其一綱使萬目自列而張也故萬民擾擾不若一帝王也衆星億億不若一日之明也柱天群蚑行之言不若國一賢良也天道廣從無復窮極不若一元氣與天持其命綱也賢者上德之君深思吾言壽自長也後世共思吾言自父慈子孝日廣且明也母愛婦順俱一國旦而賢良也大小爭為善後者無強也不知復有邪文佞人因以藏也災變盡除三光明也自然之術天神所共純行也為道如此乎大樂何有傷遂以為法乃天行也誰書記之是乃天地神明也以徵之文與天地響相應也是天合信符也上君賢者宜共察此辭行之者日興與時宜為期得天地之欲故吉哉陰陽順行風雨時萬變除去以徵書吾不自譽也誠知之不但飾言也宜疾效之真人知之耶唯唯行去矣行去矣精之詳之道自來唯唯男女反形訣第一百五十九願復請問一疑事言之天師前所賜子愚生書本文有男女反形願聞其意噫子書略已説可睹何故復問之乎心愚閉難闓示唯及天師訣問之諾安坐方為子言之天地之性陽好陰陰好陽故陽當變於陰陰當變於陽凡陰陽之道皆如此矣更相好故其開練日疾但宜以品訣之耳不可徑以示教人也且入邪中然子明聽陽者以其形反為陰形陰者以其形反為陽形正自以其身為其人形容也不可徑及也且中於耶唯唯若且曉而疑也噫子何一難示也但便以自身為其形陽者若陰人身也陰者若陽人身也唯唯子已知矣行去事可知唯唯右集難解凡文方訣簡賢得失實陰陽反形以致道包天裹地守氣不絶訣第一百六十願及天師請問一事乃止行言何疑哉凡道包天裹地誰持其氣候者深哉遠哉妙哉子之所問也何睹而問此有睹有見見天地之道獨不知窮極故怪而問之也善哉子之言入微意然天地之道所以能長且久者以其守氣而不絶也故天專以氣為吉凶也萬物象之無氣則終死也子欲不終窮宜與氣為玄牝象天為之安得死也亦不可卒得乃成幽室也入室思道自不食與氣結也因為天地神明畢也不復與於俗治也乃上從天太一也朝於中極受符而行周流洞達六方八遠無窮時也子思書言自得之也為神之階可見矣去世上天而治不復見矣子欲重知其明效也世不可得久有而獨治也故得道者則當飛上天亦是其去世也不肯力為道者死當下入地會不得久居是中部也故天地開闢以來更去避世聖文常格在而不見其人是明效也不死得道則當上天死則當下入地不得久當害中和之路也子得吾文自深思其意欲樂上行常生在與天并力隨四時天下祭祀而飲食者努力為真道是其汙法也若不樂常在而樂死者棄道隨俗亦將歸地下不得久睹天日月星曆也吾文萬萬不失一也故古者聖賢人盡去今無見者是其大效也子自思之樂上則上樂下則下無奪子志者也故吾為太平德君制作法度不限一人也夫太平氣來有一人自冤不得其欲者則上皇平氣不得俱來至也故天教吾廣開闢其路使得自恣自擇可為也賢明欲樂活者可學吾文思其意入室成道可得活賢柔欲樂輔帝王治象吾文為之可以致太平欲樂居家治生畜財者思吾文可竟其天年而終死故各為得其所願無大自冤者也故太平之氣得來前也平之為言者乃平平無冤者故為平也是故德君以治太平之氣立來也所以然者乃天下無自冤者各自得其所樂所以勑真人以付上德之君者上德之君其用心必仁賢而明明者不奪人所欲必得天下之心欲承天意以道歸之也真人知之耶唯唯署置官得失訣第一百六十一行且重戒真人一言使其有似天行也天之為行不奪人所欲為也地之為行亦不奪人所欲為也明君之為行亦樂象天地不奪人所為也與天地相似故能獨長稱天地得其心也子知之耶唯唯夫天且為惡其歲且大凶者常害人所為故民無可收也其歲凶飢寒也是故地將為惡也傷人所養其根不固而有病也其歲不成多傷民困窮也衰惡之君將凶署置不以其人所任職名為故亂天官犯天禁失天儀反復就責而罪之不原其力所不及人之所不及比若一旦使君王步行百里恐其不能到而道止也人所不及正是此也故不擇選人而妄事署其職則名為愁人而危其國也則名為亂治政敗也夫天地極神且明尚不敢奪人所欲為奪之則為大凶歲也何況人哉真人寧解迷曉耶唯唯誠得隨其國以師書授之因就其俗示之曉之解之行子可謂曉事之生天不奪人願也子行正自得天命年日益增何有窮已子學不求居世尊榮何復求索得天意而增年今已告子子今寧能説不耶然其受恩大喜無復有所恨但恐力極行以師文授教恐不能一旦而遍也何必一旦而遍但為之不止自舟流不久唯唯受嚴勑不敢雖繩墨子已知其意吾無復以戒子也行辭小竟事畢異日有疑乃復來唯唯右大集難問天地氣候為道與不吉凶君署置官得失文乘雲駕龍圖第一百六十二東壁圖第一百六十三著東壁上古神人戒弟子後學者為善圖象陰祐利人常吉其功增倍陽善者人即相冗答而解陰善者乃天地諸神知之故增倍也積德者富人愛好之其善自日來也人之所譽鬼神亦然因而祐助之好道者長壽乃與陰陽同其憂順皇靈之行天地之性得其道理故天祐之也失者亂故天不祐之也夫求善以善無可怪者學以仁得之道之始也以德得之道之中和也以道得之道之上也咄咄慎之慎之行無妄也極思此書傳之後世可無傷也隨四時轉道之上也善者自興惡者自病吉凶之事皆出於身以類相呼不失其身天道無私但行之所致故前有弟子後有善氣趣學不止令命得陽遂也或得長壽身不敗故為善乃於內外神反為其除害弟子居前主為其對物有自然天下之事各從其類也西壁圖第一百六十四上古神人真人誡後學者為惡圖象無為陰賊不好順事反好為害嫉妒令人死凶天道不可強劫劫必致兵喪威之死滅世亡道神書必敗欲以為利反以為害此即響應天地之性也乃致自然之際會審樂以長存慎之慎之無好無害善者自興惡者自敗觀此二象思其利害凡天下之事各從其類毛髮之間無有過差但人不自精自以不知罪名一著不可奈何不守其本身死有餘過乃為惡於內邪氣相召於外故前有害獄後有惡鬼皆來趨鬭欲止不得也因以亡身故畫象以示後來賢明得之以為大誡愚者不信道自若忽事書審如言不失銖分故守柔者長壽好鬭者令人不存物事各從其類不復得還雖悔之無益鬼已著焉見誡當覺以時自還今尚未傷固可得為善人善者乃上行惡者下降天道無私乃有自然故不失法也其事若神右著西壁位次傳文閉絶即病訣第一百六十六子為天來學問疑吾為天授子也願聞其訣意以何明之也其以又明之云何哉今有德之君得吾書心解行之與衆賢共議以化凡民必與天立響相應是其明證也吾道以誡成不設偽言行已訣矣唯唯弟子無狀數愁天師不也子不好問亦無從知之也吾含此學久矣無可與語者故不得以時傳之今使人不知白黑其過在吾也今得傳真人問誠喜甚喜比若春得登臺而出見天無異何乎哉天怨結有劇病變不絶此其悒悒不通得與子言喜也天師何不自往與之位次不得也吾位職在天真人位職在地地者出萬物故天生者於地養之故吾傳道於真人地生君王凡民萬二千物悉得陽施從陰中出故子得傳於人善哉善哉愚生大自怪當得此響不力問天師無由知之也但猜疑故也敢冒過問之耳善乎是名為曉事之生是亦非獨子力也實天授子心使其言也今蔽塞不自知行今使子大自知照若日月之光子以吾言不誠信也夫天雖欲有所出不與人語難知情吾書承天教令明丹青也子為不然今私匿閉絶吾文而不以時出之天即且病子災子子或遏之猶不出子已凶矣是其天使子來學問明證也使真人出之明信也善哉善哉真人重戒慎之唯唯今天師職在天覆加不得已欲復請問一疑不敢言乎行今凡天事皆為天使有所傳耶獨天師與愚生邪噫子益愚何知天下凡物皆為天使故各有所職共成天道也一物不具足即天道有不具者子何故乃不知是乎其冥冥何劇也愚蒙未悉開得天師解之昭然行子亦易示矣行弩力勉之凡民各有所職乃復為天使物敢獨自勞自然也不敢不敢行去矣
