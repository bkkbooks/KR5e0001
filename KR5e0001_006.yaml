front:
  text: 神人自序出書圖服色訣第一百六十五吾本少學而不止精神念之涕常欲下為此積久蒙皇天大恩今日幸得逢天師人於曠野始學若虧司問小事外浮華也本求守一養性之法凡三百首乃見天師説而無極故敢問身寧可得長存與不見天師説而無極故敢問小政事見師説無極乃敢具問天地開闢以來帝王更相承負愁苦天災變怪訖不絶何以除之又群神無故共害人人不得竟其年命以何止之今受天師嚴教深戒之後宜何時出此止姦偽興天地道之書乎乙巳而出以付郵客而往通之者也後世歲歲在玄甲乃出之是天諸甲之首最上旬也與元氣為初乃以書前後付國家可以解天地初起以來更相承負之厄會也比付當以何字其文教積纍其字獨自深知之勿令泄皇天上和與第一之道也將傳與能往付者共分別解之比到玄甲使其憤憤如有求吾書者以守一浮華為前以付之已付郵客方士往付上有至德之君何謂也得而防行之即其人也不知行之即非其人也真人勿先出之也且天威怒反殺人也吾戒悉盡於是矣所以誠畏天有言也今天師教勑下愚弟子胸中慺慺若且可知不敢負也誠問著圖者畫神衣云何哉皆象天法無隨俗事也今不曉天法其人圖大小自以意為衣衣者隨五行色也今使母含子居其內以色相次也大重之衣五也中重之衣四也小重之衣三也微重之衣象陰陽二也大集之衣亂彩六重也願聞大重何象象五行氣相合也四重何象象四時轉相生也三重何象象父母子陰陽合和也二重何象象王相氣相及也六重何象象六方之彩雜也故天下有雜色也此之謂善哉善哉行去慎圖密文唯唯今弟子至愚且賤蒙恩得與天師文用日久凡事響且畢願更問一疑平言何等也今見天地開闢以來文書前後出非一乃積多復多河洛出之今此書何不須河洛出之乎善哉善哉子今難也天使子言可謂得其意矣今天悉使吾為帝王人民具出陳承負之責會也文書積衆多不可以河洛出之也夫河洛文書文多當見其策文多難以策悉知之故天因人出之也天乃深知吾而為其言知而具難問故反使子與吾共傳其要言也子亦自知學而不得道心真人為何來哉今愚蔽暗不自知也右問閉藏出其圖畫衣服文
